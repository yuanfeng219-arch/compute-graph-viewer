<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSeek V3.2 Source Graph Report Overlay</title>
  <script>
    if (new URLSearchParams(window.location.search).has("preview")) {
      document.documentElement.dataset.preview = "true";
    }
  </script>
  <link rel="stylesheet" href="../vendor/pto-design-system/tokens/foundation.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/tokens/semantic.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/tokens/components.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/css/style.css">
  <style>
    :root {
      color-scheme: dark;
      --report-p0: #ff2d7a;
      --report-p1: #ff9d00;
      --report-p2: #ffe600;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body.source-report-app {
      margin: 0;
      overflow: hidden;
      background: var(--background);
      color: var(--foreground);
      font-family: var(--font-sans);
    }

    .source-shell {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(var(--border-subtle) 1px, transparent 1px),
        linear-gradient(90deg, var(--border-subtle) 1px, transparent 1px),
        var(--background);
      background-size: 32px 32px;
    }

    .source-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
    }

    .overlay-header {
      position: absolute;
      z-index: var(--z-overlay);
      top: var(--space-4);
      left: var(--space-4);
      right: 432px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      pointer-events: none;
    }

    .overlay-header-left,
    .overlay-header-right {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      min-width: 0;
      pointer-events: auto;
    }

    .report-home-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: var(--button-height-sm);
      padding: 0 var(--button-padding-x-sm);
      border: 1px solid var(--button-secondary-border);
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--surface-2) 78%, transparent);
      color: var(--foreground-secondary);
      font: var(--button-font);
      text-decoration: none;
      cursor: pointer;
    }

    .report-home-button:hover {
      color: var(--foreground);
      background: var(--button-ghost-bg-hover);
    }

    .overlay-brand {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      min-width: 0;
      color: var(--foreground);
      font: var(--text-body);
      font-weight: var(--font-weight-semibold);
      white-space: nowrap;
    }

    .overlay-brand-mark {
      flex: 0 0 auto;
      width: 8px;
      height: 8px;
      border-radius: var(--radius-pill);
      background: var(--success);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--success) 16%, transparent);
    }

    .overlay-source {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--foreground-secondary);
      font: var(--text-mono);
    }

    .segment-control {
      display: inline-flex;
      align-items: center;
      gap: var(--segmented-control-gap);
      padding: var(--segmented-control-padding);
      border: 1px solid var(--segmented-control-border);
      border-radius: var(--segmented-control-radius);
      background: color-mix(in srgb, var(--background) 56%, transparent);
    }

    .segment-control button,
    .header-action {
      height: var(--button-height-sm);
      border: 0;
      border-radius: var(--radius-md);
      padding: 0 var(--button-padding-x-sm);
      background: transparent;
      color: var(--foreground-secondary);
      font: var(--button-font);
      cursor: pointer;
    }

    .segment-control button:hover,
    .header-action:hover {
      color: var(--foreground);
      background: var(--button-ghost-bg-hover);
    }

    .segment-control button.is-active {
      color: var(--foreground);
      background: var(--state-selected);
    }

    .header-action {
      border: 1px solid var(--button-secondary-border);
      background: color-mix(in srgb, var(--surface-2) 78%, transparent);
    }

    .panel-shell.report-inspector {
      position: absolute;
      z-index: var(--z-overlay);
      top: var(--space-4);
      right: var(--space-4);
      bottom: var(--space-4);
      width: 400px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 0;
      border-radius: var(--workbench-pane-radius, var(--panel-shell-radius, var(--radius-xl)));
      background: var(--workbench-pane-bg, var(--surface-2));
      box-shadow: none;
      backdrop-filter: none;
    }

    body.is-report-off .overlay-header {
      right: var(--space-4);
    }

    body.is-report-off .panel-shell.report-inspector {
      display: none;
    }

    body.is-report-off .timeline-panel {
      display: none;
    }

    .report-inspector .panel-shell-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-3);
      padding: var(--panel-shell-header-padding, 12px 14px);
      border-bottom: 0;
    }

    .inspector-title-group {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      min-width: 0;
    }

    .inspector-kicker {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      min-width: 0;
    }

    .priority-badge,
    .status-chip,
    .node-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: max-content;
      max-width: 100%;
      min-height: var(--tag-height);
      padding: 0 var(--tag-padding-x);
      border: 1px solid var(--comp-tag-border);
      border-radius: var(--tag-radius);
      background: var(--comp-tag-bg);
      color: var(--comp-tag-fg);
      font: var(--text-label);
      white-space: nowrap;
    }

    .priority-badge[data-priority="P0"] {
      border-color: transparent;
      color: var(--foreground);
      background: var(--report-p0);
    }

    .priority-badge[data-priority="P1"] {
      border-color: transparent;
      color: var(--background);
      background: var(--report-p1);
    }

    .priority-badge[data-priority="P2"] {
      border-color: transparent;
      color: var(--background);
      background: var(--report-p2);
    }

    .status-chip {
      flex: 0 0 auto;
      color: var(--foreground-secondary);
    }

    .inspector-title {
      margin: 0;
      color: var(--foreground);
      font: var(--text-title-2);
      letter-spacing: 0;
    }

    .node-id {
      color: var(--foreground-muted);
      font: var(--text-mono);
      word-break: break-all;
    }

    .report-inspector .panel-shell-body {
      min-height: 0;
      overflow: auto;
      padding: 0 var(--space-4) var(--space-4);
    }

    .report-inspector .inspector-section {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      padding: var(--inspector-section-padding-y, var(--space-4)) 0;
      border-bottom: 1px solid var(--inspector-section-divider, var(--border-subtle));
    }

    .report-inspector .inspector-section:first-child {
      padding-top: var(--space-3);
    }

    .report-inspector .inspector-section:last-child {
      border-bottom: 0;
    }

    .section-title {
      margin: 0;
      color: var(--foreground-secondary);
      font: var(--text-label);
      letter-spacing: var(--letter-spacing-label);
      text-transform: uppercase;
    }

    .section-copy {
      margin: 0;
      color: var(--foreground);
      font: var(--text-body-sm);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-2);
    }

    .metric-tile {
      min-width: 0;
      padding: var(--inspector-soft-card-padding, var(--space-3));
      border: 0;
      border-radius: var(--inspector-soft-card-radius, var(--radius-md));
      background: var(--inspector-soft-card-bg, var(--surface-2));
    }

    .metric-tile[data-tone="critical"] {
      background: color-mix(in srgb, var(--danger) 18%, var(--surface-2));
    }

    .metric-tile[data-tone="warning"] {
      background: color-mix(in srgb, var(--warning) 20%, var(--surface-2));
    }

    .metric-tile[data-tone="info"] {
      background: color-mix(in srgb, var(--primary) 18%, var(--surface-2));
    }

    .metric-tile[data-tone="success"] {
      background: color-mix(in srgb, var(--success) 18%, var(--surface-2));
    }

    .metric-label {
      color: var(--foreground-muted);
      font: var(--text-label);
    }

    .metric-value {
      margin-top: var(--space-1);
      color: var(--foreground);
      font: var(--text-mono);
      overflow-wrap: anywhere;
    }

    .metric-bar {
      position: relative;
      height: 4px;
      margin-top: var(--space-2);
      overflow: hidden;
      border-radius: var(--radius-pill);
      background: color-mix(in srgb, var(--background) 46%, transparent);
    }

    .metric-bar span {
      display: block;
      width: var(--metric-bar-width);
      height: 100%;
      border-radius: inherit;
      background: var(--foreground-muted);
    }

    .metric-tile[data-tone="critical"] .metric-bar span {
      background: var(--danger);
    }

    .metric-tile[data-tone="warning"] .metric-bar span {
      background: var(--warning);
    }

    .metric-tile[data-tone="info"] .metric-bar span {
      background: var(--primary-hover);
    }

    .metric-tile[data-tone="success"] .metric-bar span {
      background: var(--success);
    }

    .fact-list,
    .action-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .fact-list li,
    .action-list li {
      position: relative;
      padding-left: var(--space-4);
      color: var(--foreground-secondary);
      font: var(--text-body-sm);
    }

    .fact-list li::before,
    .action-list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.72em;
      width: 5px;
      height: 5px;
      border-radius: var(--radius-pill);
      background: var(--foreground-muted);
    }

    .operator-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .operator-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: var(--space-2);
      align-items: center;
      padding: var(--space-2);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--surface-2) 78%, transparent);
    }

    .operator-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--foreground);
      font: var(--text-mono);
    }

    .operator-value {
      color: var(--foreground-secondary);
      font: var(--text-mono);
      white-space: nowrap;
    }

    .node-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .node-list button {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: var(--space-2);
      align-items: center;
      min-height: 36px;
      padding: var(--space-2);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--foreground-secondary);
      text-align: left;
      cursor: pointer;
    }

    .node-list button:hover {
      background: var(--state-hover);
      color: var(--foreground);
    }

    .node-list button.is-active {
      border-color: var(--border-default);
      background: var(--state-selected);
      color: var(--foreground);
    }

    .node-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font: var(--text-body-sm);
    }

    .node-metric {
      color: var(--foreground-muted);
      font: var(--text-mono);
      white-space: nowrap;
    }

    .empty-state {
      padding: var(--space-4);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      background: var(--inspector-soft-card-bg, var(--surface-2));
      color: var(--foreground-secondary);
      font: var(--text-body-sm);
    }

    .timeline-panel {
      position: absolute;
      z-index: var(--z-overlay);
      left: var(--space-4);
      right: 432px;
      bottom: var(--space-4);
      height: var(--timeline-panel-height, min(34vh, 330px));
      min-height: 260px;
      max-height: calc(100vh - 96px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 0;
      border-radius: var(--workbench-pane-radius, var(--panel-shell-radius, var(--radius-xl)));
      background: var(--workbench-pane-bg, var(--surface-2));
      color: var(--foreground);
    }

    .timeline-resize-handle {
      position: absolute;
      z-index: 2;
      top: 0;
      left: 0;
      right: 0;
      height: 24px;
      cursor: ns-resize;
      touch-action: none;
    }

    .timeline-resize-handle::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 9px;
      width: 104px;
      height: 5px;
      border-radius: var(--radius-pill);
      background: color-mix(in srgb, var(--foreground) 24%, transparent);
      transform: translateX(-50%);
    }

    .timeline-resize-handle:hover::before,
    .timeline-resize-handle:focus-visible::before,
    body.timeline-resizing .timeline-resize-handle::before {
      background: color-mix(in srgb, var(--primary) 72%, transparent);
    }

    body.timeline-resizing {
      cursor: ns-resize;
      user-select: none;
    }

    .timeline-panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-3);
      padding: 24px 14px 8px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .timeline-title-group {
      min-width: 0;
      display: grid;
      gap: var(--space-1);
    }

    .timeline-title {
      margin: 0;
      color: var(--foreground);
      font: var(--text-title-3);
      letter-spacing: 0;
    }

    .timeline-caption {
      margin: 0;
      color: var(--foreground-secondary);
      font: var(--text-body-sm);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .timeline-tabs {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: var(--segmented-control-gap);
      padding: var(--segmented-control-padding);
      border: 1px solid var(--segmented-control-border);
      border-radius: var(--segmented-control-radius);
      background: color-mix(in srgb, var(--background) 42%, transparent);
    }

    .timeline-tabs button {
      height: var(--button-height-sm);
      border: 0;
      border-radius: var(--radius-md);
      padding: 0 var(--button-padding-x-sm);
      background: transparent;
      color: var(--foreground-secondary);
      font: var(--button-font);
      cursor: pointer;
    }

    .timeline-tabs button:hover {
      color: var(--foreground);
      background: var(--button-ghost-bg-hover);
    }

    .timeline-tabs button.is-active {
      color: var(--foreground);
      background: var(--state-selected);
    }

    .timeline-panel-body {
      min-height: 0;
      flex: 1;
      overflow: auto;
      padding: var(--space-3) 14px 14px;
    }

    .timeline-tab-panel {
      display: none;
      min-height: 100%;
    }

    .timeline-tab-panel.is-active {
      display: block;
    }

    .timeline-summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--space-2);
      margin-bottom: var(--space-3);
    }

    .timeline-stat {
      min-width: 0;
      padding: var(--space-2);
      border-radius: var(--radius-md);
      background: var(--surface-3);
    }

    .timeline-stat-label {
      color: var(--foreground-muted);
      font: var(--text-label);
    }

    .timeline-stat-value {
      margin-top: var(--space-1);
      color: var(--foreground);
      font: var(--text-mono);
    }

    .timeline-legend {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      margin-bottom: var(--space-3);
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      min-height: var(--tag-height);
      padding: 0 var(--tag-padding-x);
      border-radius: var(--tag-radius);
      background: var(--state-muted);
      color: var(--foreground-secondary);
      font: var(--text-label);
      white-space: nowrap;
    }

    .legend-swatch {
      width: 8px;
      height: 8px;
      border-radius: var(--radius-pill);
      background: var(--legend-color);
    }

    .step-timeline,
    .module-timeline,
    .stream-summary-list,
    .coverage-list {
      display: grid;
      gap: var(--space-2);
    }

    .step-row {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr) 152px;
      gap: var(--space-2);
      align-items: center;
      min-height: 42px;
      padding: var(--space-2);
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--surface-3) 72%, transparent);
    }

    .step-row[data-kind="warmup"] {
      background: color-mix(in srgb, var(--warning) 18%, var(--surface-3));
    }

    .step-label,
    .module-label,
    .stream-label {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .step-name,
    .module-name,
    .stream-name {
      color: var(--foreground);
      font: var(--text-body-sm);
      font-weight: var(--font-weight-semibold);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .step-meta,
    .module-meta,
    .stream-meta {
      color: var(--foreground-muted);
      font: var(--text-mono);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .step-stack {
      display: flex;
      height: 12px;
      overflow: hidden;
      border-radius: var(--radius-pill);
      background: color-mix(in srgb, var(--background) 48%, transparent);
    }

    .step-stack span {
      min-width: 2px;
      height: 100%;
    }

    .step-stack-compute {
      background: var(--success);
    }

    .step-stack-comm {
      background: var(--warning);
    }

    .step-stack-free {
      background: var(--danger);
    }

    .step-values {
      color: var(--foreground-secondary);
      font: var(--text-mono);
      text-align: right;
      white-space: nowrap;
    }

    .module-row {
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr) 190px;
      gap: var(--space-2);
      align-items: center;
      min-height: 44px;
      padding: var(--space-2);
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--surface-3) 72%, transparent);
    }

    .module-row[data-node-id] {
      cursor: pointer;
    }

    .module-row[data-node-id]:hover {
      background: var(--state-hover);
    }

    .module-row.is-active {
      background: color-mix(in srgb, var(--primary) 18%, var(--surface-3));
      outline: 1px solid color-mix(in srgb, var(--primary) 50%, transparent);
    }

    .stream-player {
      display: grid;
      gap: var(--space-3);
      margin-bottom: var(--space-3);
      padding: var(--space-3);
      border-radius: var(--radius-md);
      background: var(--surface-3);
    }

    .stream-player-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
    }

    .stream-play-button {
      height: var(--button-height-md, 36px);
      border: 0;
      border-radius: var(--radius-md);
      padding: 0 var(--button-padding-x-md, 16px);
      background: var(--primary);
      color: var(--background);
      font: var(--button-font);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--primary) 18%, transparent);
    }

    .stream-play-button:hover {
      background: var(--primary-hover);
      color: var(--background);
    }

    .stream-time-readout {
      color: var(--foreground-secondary);
      font: var(--text-mono);
      white-space: nowrap;
    }

    .stream-axis {
      position: relative;
      height: 52px;
      border-radius: var(--radius-md);
      background:
        linear-gradient(90deg, transparent 0 24%, color-mix(in srgb, var(--border-subtle) 78%, transparent) 24% 24.5%, transparent 24.5% 49%,
        color-mix(in srgb, var(--border-subtle) 78%, transparent) 49% 49.5%, transparent 49.5% 74%,
        color-mix(in srgb, var(--border-subtle) 78%, transparent) 74% 74.5%, transparent 74.5%),
        color-mix(in srgb, var(--background) 48%, transparent);
      cursor: pointer;
    }

    .stream-axis-segment {
      position: absolute;
      top: 16px;
      left: var(--axis-left);
      width: var(--axis-width);
      min-width: 3px;
      height: 16px;
      border-radius: var(--radius-pill);
      background: var(--axis-color);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--foreground) 10%, transparent);
      opacity: 0.9;
    }

    .stream-axis-segment[data-hot="true"] {
      box-shadow: 0 0 0 1px var(--danger);
    }

    .stream-axis-segment.is-active {
      opacity: 1;
      box-shadow:
        0 0 0 2px var(--foreground),
        0 0 0 6px color-mix(in srgb, var(--foreground) 12%, transparent);
    }

    .stream-axis-playhead {
      position: absolute;
      top: 5px;
      bottom: 5px;
      left: var(--playhead-left, 0%);
      width: 2px;
      border-radius: var(--radius-pill);
      background: var(--foreground);
      transform: translateX(-1px);

        const group = findSourceGroup(nodeId);
        const data = group && Array.isArray(group.__data__) ? group.__data__[1] : null;
        const children = Array.isArray(data && data.nodes) ? data.nodes : [];
        children.forEach((childId) => {
          ids.add(childId);
          collectRenderedDescendantIds(childId, ids);
        });

      function selectedSourceRootId() {

        if (!nodeId || findSourceGroup(nodeId)) return nodeId;

        const ancestors = Object.keys(DESCENDANT_NODE_IDS)
          .filter((key) => (DESCENDANT_NODE_IDS[key] || []).includes(nodeId))
          .sort((a, b) => DESCENDANT_NODE_IDS[a].length - DESCENDANT_NODE_IDS[b].length);
        for (const ancestor of ancestors) {
          if (findSourceGroup(ancestor)) return ancestor;
        }

        const guard = new Set();
        let current = FOCUS_FALLBACKS[nodeId];
        while (current && !guard.has(current)) {
          guard.add(current);
          if (findSourceGroup(current)) return current;
          current = FOCUS_FALLBACKS[current];
        }
        return nodeId;

      function metricTone(label, value, report) {
        const text = `${label} ${value}`.toLowerCase();
        if (/free|underfeed|wait|false|host_bound|total_cost/.test(text)) return "critical";
        if (/comm|matmul|grouped|qbm|duration|kernel|count|ratio/.test(text)) return "warning";
        if (/normal|cube util|success/.test(text)) return "success";
        if (report.priority === "P0") return "critical";
        if (report.priority === "P1") return "warning";
        return "info";
      }

      function metricPercent(value) {
        const match = String(value).match(/(\d+(?:\.\d+)?)\s*%/);
        if (!match) return null;
        return Math.max(0, Math.min(100, Number(match[1])));
      }

      function renderMetrics(report) {
        els.metricGrid.innerHTML = report.metrics.map(([label, value]) => {
          const tone = metricTone(label, value, report);
          const percent = metricPercent(value);
          const bar = percent == null
            ? ""
            : `<div class="metric-bar" style="--metric-bar-width:${percent}%"><span></span></div>`;
          return `
          <div class="metric-tile" data-tone="${tone}">
            <div class="metric-label">${escapeHtml(label)}</div>
            <div class="metric-value">${escapeHtml(value)}</div>
            ${bar}
          </div>
        `;
        }).join("");
      }

      function renderOperators(report) {
        if (!report.operators.length) {
          els.operatorList.innerHTML = `<div class="empty-state">No operator evidence.</div>`;
          return;
        }

        els.operatorList.innerHTML = report.operators.map(([name, value]) => `
          <div class="operator-row">
            <div class="operator-name">${escapeHtml(name)}</div>
            <div class="operator-value">${escapeHtml(value)}</div>
          </div>
        `).join("");
      }

      function renderNodeList() {
        const ids = visibleReportIds();
        els.nodeList.innerHTML = ids.map((id) => {
          const report = REPORTS[id];
          const activeClass = id === state.selectedNodeId ? " is-active" : "";
          return `
            <button type="button" class="${activeClass.trim()}" data-node-id="${escapeHtml(id)}">
              <span class="priority-badge" data-priority="${escapeHtml(report.priority)}">${escapeHtml(report.priority)}</span>
              <span class="node-name">${escapeHtml(report.title)}</span>
              <span class="node-metric">${escapeHtml(report.metricShort)}</span>
            </button>
          `;
        }).join("");
      }

      function formatDuration(us) {
        if (us >= 1000) {
          const value = us / 1000;
          return `${value >= 10 ? value.toFixed(1) : value.toFixed(2)} ms`;
        }
        return `${us < 10 ? us.toFixed(1) : us.toFixed(0)} us`;
      }

      function clampTimelineHeight(value) {
        const max = Math.max(300, window.innerHeight - 96);
        return Math.max(260, Math.min(max, value));
      }

      function setTimelineHeight(value) {
        if (!els.timelinePanel) return;
        const height = clampTimelineHeight(value);
        els.timelinePanel.style.setProperty("--timeline-panel-height", `${Math.round(height)}px`);
        els.timelineResizeHandle?.setAttribute("aria-valuenow", String(Math.round(height)));
      }

      function initTimelineResize() {
        if (!els.timelinePanel || !els.timelineResizeHandle) return;
        const initialHeight = Number(window.localStorage.getItem("dsv32-report-timeline-height"));
        if (Number.isFinite(initialHeight) && initialHeight > 0) setTimelineHeight(initialHeight);

        let startY = 0;
        let startHeight = 0;

        const resizeTo = (clientY) => {
          setTimelineHeight(startHeight + (startY - clientY));
        };

        const stopResize = (event) => {
          document.body.classList.remove("timeline-resizing");
          window.removeEventListener("pointermove", onPointerMove);
          window.removeEventListener("pointerup", stopResize);
          window.removeEventListener("pointercancel", stopResize);
          if (event && typeof els.timelineResizeHandle.releasePointerCapture === "function") {
            try {
              els.timelineResizeHandle.releasePointerCapture(event.pointerId);
            } catch (_) {}
          }
          const height = Math.round(els.timelinePanel.getBoundingClientRect().height);
          window.localStorage.setItem("dsv32-report-timeline-height", String(height));
        };

        const onPointerMove = (event) => {
          resizeTo(event.clientY);
        };

        els.timelineResizeHandle.addEventListener("pointerdown", (event) => {
          if (event.button !== 0) return;
          event.preventDefault();
          startY = event.clientY;
          startHeight = els.timelinePanel.getBoundingClientRect().height;
          document.body.classList.add("timeline-resizing");
          if (typeof els.timelineResizeHandle.setPointerCapture === "function") {
            els.timelineResizeHandle.setPointerCapture(event.pointerId);
          }
          window.addEventListener("pointermove", onPointerMove);
          window.addEventListener("pointerup", stopResize, { once: true });
          window.addEventListener("pointercancel", stopResize, { once: true });
        });

        els.timelineResizeHandle.addEventListener("keydown", (event) => {
          if (event.key !== "ArrowUp" && event.key !== "ArrowDown" && event.key !== "Home" && event.key !== "End") return;
          event.preventDefault();
          const current = els.timelinePanel.getBoundingClientRect().height;
          if (event.key === "ArrowUp") setTimelineHeight(current + 24);
          if (event.key === "ArrowDown") setTimelineHeight(current - 24);
          if (event.key === "Home") setTimelineHeight(260);
          if (event.key === "End") setTimelineHeight(window.innerHeight - 96);
          const height = Math.round(els.timelinePanel.getBoundingClientRect().height);
          window.localStorage.setItem("dsv32-report-timeline-height", String(height));
        });

        window.addEventListener("resize", () => {
          const height = els.timelinePanel.getBoundingClientRect().height;
          setTimelineHeight(height);
        });
      }

      function streamBounds() {
        const minStart = Math.min(...MODULE_TIMELINE.map((item) => item.startUs));
        const maxEnd = Math.max(...MODULE_TIMELINE.map((item) => item.endUs));
        return { minStart, maxEnd, span: maxEnd - minStart };
      }

      function segmentAtPosition(pct) {
        const { minStart, span } = streamBounds();
        const time = minStart + span * Math.max(0, Math.min(100, pct)) / 100;
        const sorted = MODULE_TIMELINE
          .map((item, index) => ({ ...item, index }))
          .sort((a, b) => a.startUs - b.startUs);
        const current = sorted.find((item) => time >= item.startUs && time <= item.endUs);
        if (current) return current;

        for (let i = sorted.length - 1; i >= 0; i -= 1) {
          if (time >= sorted[i].endUs) return sorted[i];
        }
        return sorted[0] || null;
      }

      function setActiveTimelineSegment(segment, options = {}) {
        const index = segment ? segment.index : -1;
        document.querySelectorAll("[data-segment-index]").forEach((item) => {
          item.classList.toggle("is-active", Number(item.dataset.segmentIndex) === index);
        });

        if (!segment || !segment.nodeId || !REPORTS[segment.nodeId]) {
          state.activeTimelineSegment = index;
          return;
        }

        const shouldSelect = state.activeTimelineSegment !== index || state.selectedNodeId !== segment.nodeId;
        state.activeTimelineSegment = index;
        if (shouldSelect) {
          selectNode(segment.nodeId, { focusSource: options.focusSource });
        }
      }

      function syncStreamTimelineSelection(options = {}) {
        const segment = segmentAtPosition(state.streamPosition);
        setActiveTimelineSegment(segment, options);
      }

      function updateStreamPlayhead(options = {}) {
        const playhead = document.getElementById("streamPlayhead");
        const scrubber = document.getElementById("streamScrubber");
        const readout = document.getElementById("streamTimeReadout");
        const button = document.getElementById("streamPlayButton");
        if (!playhead || !scrubber || !readout || !button) return;

        const { span } = streamBounds();
        const pct = Math.max(0, Math.min(100, state.streamPosition));
        const currentUs = span * pct / 100;
        const segment = segmentAtPosition(pct);
        playhead.style.setProperty("--playhead-left", `${pct}%`);
        scrubber.value = String(pct);
        readout.textContent = `${formatDuration(currentUs)} / ${formatDuration(span)} · ${segment ? segment.name : "gap"}`;
        button.textContent = state.streamPlaying ? "Pause" : "Play";
        if (options.syncSelection !== false) {
          syncStreamTimelineSelection({ focusSource: Boolean(options.focusSource || state.streamPlaying) });
        }
      }

      function clearStreamTimelineSelection() {
        state.activeTimelineSegment = -1;
        document.querySelectorAll("[data-segment-index].is-active").forEach((item) => {
          item.classList.remove("is-active");
        });
      }

      function stopStreamPlayback() {
        if (state.streamAnimation) {
          window.cancelAnimationFrame(state.streamAnimation);
          state.streamAnimation = 0;
        }
        state.streamPlaying = false;
        updateStreamPlayhead({ syncSelection: false });
      }

      function resetStreamPlayback() {
        if (state.streamAnimation) {
          window.cancelAnimationFrame(state.streamAnimation);
          state.streamAnimation = 0;
        }
        state.streamPlaying = false;
        state.streamPosition = 0;
        state.streamStartedAt = 0;
        state.streamStartPosition = 0;
        state.sourceDimEnabled = false;
        state.selectedNodeId = DEFAULT_SELECTED_NODE_ID;
        clearStreamTimelineSelection();
        renderInspector();
        updateStreamPlayhead({ syncSelection: false });
      }

      function startStreamPlayback() {
        stopStreamPlayback();
        state.streamPlaying = true;
        state.sourceDimEnabled = true;
        state.streamStartedAt = 0;
        state.streamStartPosition = state.streamPosition >= 99.9 ? 0 : state.streamPosition;

        const durationMs = 9000;
        const tick = (timestamp) => {
          if (!state.streamPlaying) return;
          if (!state.streamStartedAt) state.streamStartedAt = timestamp;
          const elapsed = timestamp - state.streamStartedAt;
          const pct = state.streamStartPosition + (elapsed / durationMs) * 100;
          state.streamPosition = Math.min(100, pct);
          updateStreamPlayhead();
          if (state.streamPosition >= 100) {
            resetStreamPlayback();
            return;
          }
          state.streamAnimation = window.requestAnimationFrame(tick);
        };

        state.streamAnimation = window.requestAnimationFrame(tick);
        updateStreamPlayhead();
      }

      function seekStreamPosition(pct) {
        stopStreamPlayback();
        state.streamPosition = Math.max(0, Math.min(100, pct));
        updateStreamPlayhead({ focusSource: true });
      }

      function renderStepTimeline() {
        const normalSteps = STEP_TIMELINE.filter((step) => step.kind === "normal");
        const meanStage = normalSteps.reduce((sum, step) => sum + step.stageUs, 0) / normalSteps.length;
        const meanCompute = normalSteps.reduce((sum, step) => sum + step.compute, 0) / normalSteps.length;
        const meanComm = normalSteps.reduce((sum, step) => sum + step.comm, 0) / normalSteps.length;
        const meanFree = normalSteps.reduce((sum, step) => sum + step.free, 0) / normalSteps.length;

        const summary = [
          ["normal stage", formatDuration(meanStage)],
          ["Computing", `${meanCompute.toFixed(1)}%`],
          ["CommNO", `${meanComm.toFixed(1)}%`],
          ["Free", `${meanFree.toFixed(1)}%`]
        ].map(([label, value]) => `
          <div class="timeline-stat">
            <div class="timeline-stat-label">${escapeHtml(label)}</div>
            <div class="timeline-stat-value">${escapeHtml(value)}</div>
          </div>
        `).join("");

        const rows = STEP_TIMELINE.map((step) => `
          <div class="step-row" data-kind="${escapeHtml(step.kind)}">
            <div class="step-label">
              <span class="step-name">Step ${step.step}</span>
              <span class="step-meta">${step.kind === "warmup" ? "warmup" : "normal"}</span>
            </div>
            <div class="step-stack" title="Computing ${step.compute}%, CommNO ${step.comm}%, Free ${step.free}%">
              <span class="step-stack-compute" style="width:${step.compute}%"></span>
              <span class="step-stack-comm" style="width:${step.comm}%"></span>
              <span class="step-stack-free" style="width:${step.free}%"></span>
            </div>
            <div class="step-values">${formatDuration(step.stageUs)} · O ${step.overlap}%</div>
          </div>
        `).join("");

        const legend = `
          <div class="timeline-legend" aria-label="step color legend">
            <span class="legend-item"><span class="legend-swatch" style="--legend-color:var(--success)"></span>Green Computing</span>
            <span class="legend-item"><span class="legend-swatch" style="--legend-color:var(--warning)"></span>Yellow CommNO</span>
            <span class="legend-item"><span class="legend-swatch" style="--legend-color:var(--danger)"></span>Red Free / bubble</span>
          </div>
        `;

        els.stepTimelinePanel.innerHTML = `
          <div class="timeline-summary-grid">${summary}</div>
          ${legend}
          <div class="step-timeline">${rows}</div>
        `;
      }

      function renderStreamTimeline() {
        const { minStart, span } = streamBounds();
        const maxStreamCost = Math.max(...STREAM_SUMMARY.map((item) => item.opUs + item.waitUs));

        const axisSegments = MODULE_TIMELINE
          .map((item, index) => ({ ...item, index }))
          .sort((a, b) => a.startUs - b.startUs)
          .map((item) => {
            const left = ((item.startUs - minStart) / span) * 100;
            const width = Math.max(0.6, (item.wallUs / span) * 100);
            const hot = item.waitUs > item.opUs;
            return `
              <span
                class="stream-axis-segment"
                data-segment-index="${item.index}"
                data-hot="${hot ? "true" : "false"}"
                style="--axis-left:${left.toFixed(2)}%;--axis-width:${width.toFixed(2)}%;--axis-color:${escapeHtml(item.color)}"
                title="${escapeHtml(item.name)} · wall ${formatDuration(item.wallUs)}"></span>
            `;
          }).join("");

        const timelineSegments = MODULE_TIMELINE
          .map((item, index) => ({ ...item, index }))
          .sort((a, b) => a.startUs - b.startUs);

        const streamLaneRows = STREAM_SUMMARY.map((item) => {
          const cost = item.opUs + item.waitUs;
          const workPct = cost ? Math.max(2, Math.min(100, item.opUs / cost * 100)) : 100;
          const widthPct = Math.max(8, Math.min(100, cost / maxStreamCost * 100));
          const segments = timelineSegments
            .filter((segment) => segment.streams.includes(item.stream) || segment.dominant === item.stream)
            .map((segment) => {
              const left = ((segment.startUs - minStart) / span) * 100;
              const width = Math.max(0.6, (segment.wallUs / span) * 100);
              const hot = segment.waitUs > segment.opUs;
              const role = segment.dominant === item.stream ? "dominant" : "secondary";
              return `
                <span
                  class="stream-lane-segment"
                  data-segment-index="${segment.index}"
                  data-role="${role}"
                  data-hot="${hot ? "true" : "false"}"
                  style="--lane-left:${left.toFixed(2)}%;--lane-width:${width.toFixed(2)}%;--lane-color:${escapeHtml(segment.color)}"
                  title="${escapeHtml(segment.name)} · stream ${escapeHtml(item.stream)} · wall ${formatDuration(segment.wallUs)} · wait ${formatDuration(segment.waitUs)}"></span>
              `;
            }).join("");
          const operatorNames = timelineSegments
            .filter((segment) => segment.streams.includes(item.stream) || segment.dominant === item.stream)
            .map((segment) => {
              const role = segment.dominant === item.stream ? "dominant" : "secondary";
              return `
                <button
                  type="button"
                  class="stream-lane-op-chip"
                  data-segment-index="${segment.index}"
                  data-role="${role}"
                  title="${escapeHtml(segment.name)} · stream ${escapeHtml(item.stream)}">
                  ${escapeHtml(segment.name)}
                </button>
              `;
            }).join("");

          return `
            <div class="stream-lane-row" data-stream="${escapeHtml(item.stream)}">
              <div class="stream-label">
                <span class="stream-name">Stream ${escapeHtml(item.stream)}</span>
                <span class="stream-meta">${item.ops} ops · ${formatDuration(cost)}</span>
              </div>
              <div class="stream-lane-cell">
                <div class="stream-lane-track">${segments}</div>
                <div class="stream-lane-ops">${operatorNames}</div>
              </div>
              <div class="stream-lane-summary">
                <div class="stream-lane-meter" style="width:${widthPct.toFixed(1)}%;--stream-work:${workPct.toFixed(1)}%">
                  <span></span><span></span>
                </div>
                <div class="stream-lane-values">work ${formatDuration(item.opUs)} · wait ${formatDuration(item.waitUs)}</div>
              </div>
            </div>
          `;
        }).join("");

        els.streamTimelinePanel.innerHTML = `
          <div class="stream-player">
            <div class="stream-player-header">
              <button id="streamPlayButton" type="button" class="stream-play-button">Play</button>
              <span id="streamTimeReadout" class="stream-time-readout">0 us / ${formatDuration(span)}</span>
            </div>
            <div id="streamAxis" class="stream-axis" aria-label="playable Step 15 timeline">
              ${axisSegments}
              <span id="streamPlayhead" class="stream-axis-playhead"></span>
            </div>
            <input id="streamScrubber" class="stream-scrubber" type="range" min="0" max="100" step="0.1" value="0" aria-label="stream timeline scrubber">
          </div>
          <div class="stream-lane-chart">${streamLaneRows}</div>
        `;
        bindStreamPlayer();
      }

      function bindStreamPlayer() {
        const button = document.getElementById("streamPlayButton");
        const scrubber = document.getElementById("streamScrubber");
        const axis = document.getElementById("streamAxis");
        if (!button || !scrubber || !axis) return;

        button.addEventListener("click", () => {
          if (state.streamPlaying) {
            stopStreamPlayback();
          } else {
            startStreamPlayback();
          }
        });

        scrubber.addEventListener("input", () => {
          seekStreamPosition(Number(scrubber.value));
        });

        axis.addEventListener("click", (event) => {
          const rect = axis.getBoundingClientRect();
          if (!rect.width) return;
          const pct = ((event.clientX - rect.left) / rect.width) * 100;
          seekStreamPosition(pct);
        });

        updateStreamPlayhead({ syncSelection: false });
      }

      function renderCoverageAudit() {
        const context = [
          ["chip", "Ascend 910B3"],
          ["schema", "V2"],
          ["steps", "10-19"],
          ["device", "Device_id=3"]
        ].map(([label, value]) => `
          <div class="timeline-stat">
            <div class="timeline-stat-label">${escapeHtml(label)}</div>
            <div class="timeline-stat-value">${escapeHtml(value)}</div>
          </div>
        `).join("");

        const columns = Object.entries(COVERAGE_AUDIT).map(([status, items]) => `
          <div class="coverage-column" data-status="${escapeHtml(status)}">
            <h3 class="coverage-title">${escapeHtml(status)}</h3>
            <ul class="coverage-list">
              ${items.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
            </ul>
          </div>
        `).join("");

        els.coverageTimelinePanel.innerHTML = `
          <div class="timeline-summary-grid">${context}</div>
          <div class="coverage-grid">${columns}</div>
        `;
      }

      function renderTimelinePanels() {
        renderStepTimeline();
        renderStreamTimeline();
        renderCoverageAudit();
      }

      function activateTimelineTab(tabName) {
        state.activeTimelineTab = tabName;
        if (tabName !== "streams") stopStreamPlayback();
        const captions = {
          steps: "Step 10-19 stage split from report (5).html",
          streams: "Step 15 fused operator segments and stream work/wait lanes",
          coverage: "Coverage audit against both HTML reports"
        };
        document.querySelectorAll("[data-timeline-tab]").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.timelineTab === tabName);
        });
        document.querySelectorAll(".timeline-tab-panel").forEach((panel) => {
          panel.classList.toggle("is-active", panel.id === `${tabName === "steps" ? "step" : tabName === "streams" ? "stream" : "coverage"}TimelinePanel`);
        });
        els.timelineCaption.textContent = captions[tabName] || captions.steps;
        if (tabName === "streams") updateStreamPlayhead({ syncSelection: state.sourceDimEnabled });
      }

      function renderInspector() {
        syncOverlayMode();
        if (!isReportOverlayEnabled()) {
          updateCounts();
          applySelectedState();
          return;
        }

        let report = REPORTS[state.selectedNodeId];
        if (!report || !isReportVisible(report)) {
          state.selectedNodeId = visibleReportIds()[0] || REPORT_ORDER[0];
          report = REPORTS[state.selectedNodeId];
        }

        els.priorityBadge.textContent = report.priority;
        els.priorityBadge.dataset.priority = report.priority;
        els.reportDimension.textContent = report.dimension;
        els.inspectorTitle.textContent = report.title;
        els.inspectorNodeId.textContent = state.selectedNodeId;
        els.inspectorSummary.textContent = report.summary;
        renderMetrics(report);
        renderList(els.factList, report.facts);
        renderOperators(report);
        renderList(els.actionList, report.actions);
        renderNodeList();
        updateCounts();
        applySelectedState();
      }

      function updateCounts() {
        if (!isReportOverlayEnabled()) {
          els.overlayCount.textContent = "Off";
          els.sourceStatus.textContent = state.sourceNodes
            ? `source graph · ${state.sourceNodes} nodes · overlay off`
            : "source graph loading";
          return;
        }

        const visibleTotal = visibleReportIds().length;
        els.overlayCount.textContent = `${state.decorated} / ${visibleTotal}`;
        els.sourceStatus.textContent = state.sourceNodes
          ? `source graph · ${state.sourceNodes} nodes · ${state.decorated} overlays`
          : "source graph loading";
      }

      function nodeIdFromGroup(group) {
        const data = group.__data__;
        if (Array.isArray(data)) return data[0];
        return group.dataset.reportNodeId || "";
      }

      function getNodeBox(group, nodeData) {
        const rect = group.querySelector("rect");
        const width = Number(rect && rect.getAttribute("width")) || Number(nodeData && nodeData.width) || 120;
        const height = Number(rect && rect.getAttribute("height")) || Number(nodeData && nodeData.height) || 36;
        const x = Number(rect && rect.getAttribute("x"));
        const y = Number(rect && rect.getAttribute("y"));
        return {
          x: Number.isFinite(x) ? x : -width / 2,
          y: Number.isFinite(y) ? y : -height / 2,
          width,
          height
        };
      }

      function getClusterBox(clusterData) {
        const parts = String(clusterData && clusterData.bb || "").split(",").map(Number);
        if (parts.length === 4 && parts.every(Number.isFinite)) {
          const [x1, y1, x2, y2] = parts;
          return { x: x1, y: y1, width: x2 - x1, height: y2 - y1 };
        }
        return { x: 0, y: 0, width: 120, height: 48 };
      }

      function getElementBoxInGroup(element, group) {
        const box = element.getBBox();
        const svg = element.ownerSVGElement;
        const elementMatrix = element.getCTM && element.getCTM();
        const groupMatrix = group.getCTM && group.getCTM();
        if (!svg || !elementMatrix || !groupMatrix) return box;

        const matrix = groupMatrix.inverse().multiply(elementMatrix);
        const corners = [
          [box.x, box.y],
          [box.x + box.width, box.y],
          [box.x + box.width, box.y + box.height],
          [box.x, box.y + box.height]
        ].map(([x, y]) => {
          const point = svg.createSVGPoint();
          point.x = x;
          point.y = y;
          return point.matrixTransform(matrix);
        });

        const xs = corners.map((point) => point.x);
        const ys = corners.map((point) => point.y);
        const minX = Math.min(...xs);
        const minY = Math.min(...ys);
        return {
          x: minX,
          y: minY,
          width: Math.max(...xs) - minX,
          height: Math.max(...ys) - minY
        };
      }

      function svgElement(doc, tagName, attrs = {}, text = "") {
        const node = doc.createElementNS("http://www.w3.org/2000/svg", tagName);
        Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, value));
        if (text) node.textContent = text;
        return node;
      }

      function estimateTextWidth(text, minWidth, maxWidth) {
        return Math.max(minWidth, Math.min(maxWidth, text.length * 5.8 + 18));
      }

      function overlaySignature(report, box) {
        return [report.priority, Math.round(box.x), Math.round(box.width), Math.round(box.height), state.activeFilter].join("|");
      }

      function getBadgePlacement(group, bounds, badgeWidth) {
        const label = group.querySelector(`.${LABEL_CLASS}`) || group.querySelector("text");
        if (label && typeof label.getBBox === "function") {
          try {
            const labelBox = getElementBoxInGroup(label, group);
            return {
              x: Math.max(bounds.x + 8, labelBox.x - badgeWidth - 6),
              y: labelBox.y + labelBox.height / 2 - 8
            };
          } catch (error) {

        }

        return {
          x: bounds.x + 8,
          y: bounds.y + bounds.height / 2 - 8

      function reserveBadgeSpace(group, report, box) {
        const rect = group.querySelector("rect");
        const label = group.querySelector(`.${LABEL_CLASS}`);
        if (!rect || !label) return box;

        try {
          const badgeWidth = estimateTextWidth(report.priority, 30, 36);
          const labelBox = getElementBoxInGroup(label, group);
          const targetX = labelBox.x - badgeWidth - 6;
          const minLeftPadding = 8;
          const requiredRectX = targetX - minLeftPadding;
          const rectX = Number(rect.getAttribute("x"));
          const rectY = Number(rect.getAttribute("y"));
          const rectWidth = Number(rect.getAttribute("width"));
          const rectHeight = Number(rect.getAttribute("height"));
          if (!Number.isFinite(rectX) || !Number.isFinite(rectWidth)) return box;

          if (rectX > requiredRectX) {
            const delta = rectX - requiredRectX;
            if (!rect.dataset.reportOriginalX) {
              rect.dataset.reportOriginalX = String(rectX);
              rect.dataset.reportOriginalWidth = String(rectWidth);
            }
            rect.setAttribute("x", requiredRectX);
            rect.setAttribute("width", rectWidth + delta);
            return {
              x: requiredRectX,
              y: Number.isFinite(rectY) ? rectY : box.y,
              width: rectWidth + delta,
              height: Number.isFinite(rectHeight) ? rectHeight : box.height
            };
          }
        } catch (error) {
          return box;
        }

        return box;
      }

      function restoreBadgeSpace(group) {
        const rect = group.querySelector("rect");
        if (!rect || !rect.dataset.reportOriginalX) return;
        rect.setAttribute("x", rect.dataset.reportOriginalX);
        rect.setAttribute("width", rect.dataset.reportOriginalWidth);
        delete rect.dataset.reportOriginalX;
        delete rect.dataset.reportOriginalWidth;
      }

      function createPriorityBadge(doc, report, x, y, width) {
        const badge = svgElement(doc, "g", {
          class: `report-source-badge-group report-priority-${report.priority.toLowerCase()}`,
          "pointer-events": "none"
        });

        badge.appendChild(svgElement(doc, "rect", {
          class: "report-source-badge",
          x,
          y,
          width,
          height: 16,
          rx: 8,
          ry: 8
        }));
        badge.appendChild(svgElement(doc, "text", {
          class: "report-source-badge-text",
          x: x + width / 2,
          y: y + 11.2,
          "text-anchor": "middle"
        }, report.priority));

        return badge;
      }

      function getClusterSourceLabel(group) {
        return Array.from(group.querySelectorAll("text"))
          .find((text) => !text.classList.contains(COLLAPSE_ICON_CLASS) && text.textContent.trim());
      }

      function getRootOverlayLayer(doc) {
        const inner = doc.querySelector("#graph_8738e552-e764-4a57-839a-6321bc3ae7d3 svg > g");
        if (!inner) return null;

        let layer = inner.querySelector(":scope > .report-root-overlay-layer");

      function removeRootOverlay(nodeId) {

          label.classList.remove("report-cluster-source-label");

      function createNodeOverlay(doc, group, report, box) {

        const { x, y } = getBadgePlacement(group, box, badgeWidth);
        overlay.appendChild(createPriorityBadge(doc, report, x, y, badgeWidth));
        return overlay;
      }

      function createClusterOverlay(doc, group, report, box, nodeId) {
        const overlay = svgElement(doc, "g", {
          class: `report-source-overlay report-cluster-overlay report-priority-${report.priority.toLowerCase()}`

        const radius = Math.min(24, Math.max(12, Math.min(box.width, box.height) * 0.08));
        overlay.appendChild(svgElement(doc, "rect", {
          class: "report-boundary-hit-target",
          x: box.x,
          y: box.y,
          width: box.width,
          height: box.height,
          rx: radius,
          ry: radius
        }));

        const sourceLabel = getClusterSourceLabel(group);
        if (!sourceLabel) return overlay;

        sourceLabel.classList.add("report-cluster-source-label");
        const labelBox = getElementBoxInGroup(sourceLabel, group);
        const labelText = sourceLabel.textContent.trim();
        const tagWidth = estimateTextWidth(report.priority, 20, 24);
        const tagHeight = 12;
        const pillPaddingLeft = 6;
        const pillPaddingRight = 12;
        const tagGap = 8;
        const height = 18;
        const width = pillPaddingLeft + tagWidth + tagGap + labelBox.width + pillPaddingRight;
        const centeredX = box.x + (box.width - width) / 2;
        const minX = box.x + 8;
        const maxX = box.x + box.width - width - 8;
        const x = maxX >= minX ? Math.min(Math.max(centeredX, minX), maxX) : centeredX;
        const centerY = box.y;
        const tagX = x + pillPaddingLeft;

        const titleGroup = svgElement(doc, "g", {
          class: `report-root-overlay report-cluster-title report-priority-${report.priority.toLowerCase()}`,

        titleGroup.appendChild(svgElement(doc, "rect", {
          class: "report-cluster-title-pill",

          height,
          rx: height / 2,
          ry: height / 2

        titleGroup.appendChild(svgElement(doc, "rect", {
          class: "report-cluster-title-tag",
          x: tagX,
          y: centerY - tagHeight / 2,
          width: tagWidth,
          height: tagHeight,

          ry: tagHeight / 2

        titleGroup.appendChild(svgElement(doc, "text", {

      function hideSourcePopup() {
        const popup = state.sourceDoc && state.sourceDoc.getElementById(POPUP_ID);
        if (popup) popup.style.display = "none";

      function onSourceNodeClick(event) {
        const target = event.target;
        if (target.closest && (target.closest(`.${COLLAPSE_CLASS}`) || target.closest(`.${COLLAPSE_ICON_CLASS}`))) {
          return;
        }

        const group = event.currentTarget;
        const nodeId = nodeIdFromGroup(group);
        const report = REPORTS[nodeId];
        if (!report || !isReportVisible(report)) return;

        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation();
        hideSourcePopup();
        selectNode(nodeId);

      function decorateSourceGraph() {
        if (!state.sourceDoc) return;
        getRootOverlayLayer(state.sourceDoc);
        const groups = Array.from(state.sourceDoc.querySelectorAll(`.${NODE_CLASS}, .${BOUNDARY_CLASS}`));
        const selectedIds = selectedSourceIds();
        const selectedBounds = selectedBoundaryBounds();
        let decorated = 0;

        groups.forEach((group) => {
          const nodeId = nodeIdFromGroup(group);
          const report = REPORTS[nodeId];
          group.dataset.reportNodeId = nodeId;
          group.removeEventListener("click", onSourceNodeClick, true);
          group.addEventListener("click", onSourceNodeClick, true);

          const shouldShow = Boolean(report && isReportVisible(report));
          const isSelected = selectedIds.has(nodeId) || isGroupInsideBounds(group, selectedBounds);
          const isPrimarySelected = isPrimarySelectedSource(nodeId);
          group.classList.remove("report-priority-p0", "report-priority-p1", "report-priority-p2");
          group.classList.toggle("report-source-hit", shouldShow);
          group.classList.toggle("report-source-selected", isSelected);
          group.classList.toggle("report-source-primary-selected", isPrimarySelected);
          group.classList.toggle("report-source-context-selected", isSelected && !isPrimarySelected);
          if (shouldShow) group.classList.add(`report-priority-${report.priority.toLowerCase()}`);

          const oldOverlay = group.querySelector(".report-source-overlay");
          if (!shouldShow) {
            if (oldOverlay) oldOverlay.remove();
            removeRootOverlay(nodeId);
            if (group.classList.contains(BOUNDARY_CLASS)) {
              restoreClusterLabel(group);
            } else {
              restoreBadgeSpace(group);
            }
            return;
          }

          decorated += 1;
          const data = Array.isArray(group.__data__) ? group.__data__[1] : null;
          const isCluster = group.classList.contains(BOUNDARY_CLASS);
          const rawBox = isCluster ? getClusterBox(data) : getNodeBox(group, data);
          const box = isCluster ? rawBox : reserveBadgeSpace(group, report, rawBox);
          const signature = overlaySignature(report, box);
          if (oldOverlay && oldOverlay.dataset.signature === signature) return;

          if (oldOverlay) oldOverlay.remove();
          if (isCluster) removeRootOverlay(nodeId);
          const overlay = isCluster
            ? createClusterOverlay(state.sourceDoc, group, report, box, nodeId)
            : createNodeOverlay(state.sourceDoc, group, report, box);
          if (overlay) {
            overlay.dataset.signature = signature;
            group.appendChild(overlay);
          }
        });

        state.decorated = decorated;
        state.sourceNodes = groups.length;
        updateCounts();
      }

      function scheduleDecorate() {

      function groupBounds(group) {
        if (!group || typeof group.getBBox !== "function") return null;
        try {
          const box = group.getBBox();
          const transform = group.transform && group.transform.baseVal.consolidate();
          if (!transform) return box;
          const matrix = transform.matrix;
          return {
            x: box.x + matrix.e,
            y: box.y + matrix.f,
            width: box.width,
            height: box.height
          };
        } catch (error) {
          return null;
        }
      }

      function selectedBoundaryBounds() {
        const group = findSourceGroup(selectedSourceRootId());
        if (!group || !group.classList.contains(BOUNDARY_CLASS)) return null;
        return groupBounds(group);
      }

      function isGroupInsideBounds(group, bounds) {
        const box = groupBounds(group);
        if (!box || !bounds) return false;
        const centerX = box.x + box.width / 2;
        const centerY = box.y + box.height / 2;
        return centerX >= bounds.x
          && centerX <= bounds.x + bounds.width
          && centerY >= bounds.y
          && centerY <= bounds.y + bounds.height;
      }

      function applySelectedState() {
        if (!state.sourceDoc) return;
        const selectedIds = selectedSourceIds();

        const hasSelection = selectedIds.size > 0;
        state.sourceDoc.documentElement.classList.toggle("report-has-selection", hasSelection && state.sourceDimEnabled);

        state.sourceDoc.querySelectorAll(`.${NODE_CLASS}.report-source-selected, .${BOUNDARY_CLASS}.report-source-selected`).forEach((group) => {

        });

        state.sourceDoc.querySelectorAll(`.${NODE_CLASS}, .${BOUNDARY_CLASS}`).forEach((group) => {
          const nodeId = nodeIdFromGroup(group);

      function getSourceTargetPoint(group) {
        if (!group) return null;
        const data = Array.isArray(group.__data__) ? group.__data__[1] : null;
        if (group.classList.contains(BOUNDARY_CLASS)) {
          const box = getClusterBox(data);
          return {
            x: box.x + box.width / 2,
            y: box.y + box.height / 2
          };
        }

        if (data && data.position && Number.isFinite(Number(data.position.x)) && Number.isFinite(Number(data.position.y))) {
          return {
            x: Number(data.position.x),
            y: Number(data.position.y)
          };
        }

        try {
          const box = group.getBBox();
          return {
            x: box.x + box.width / 2,
            y: box.y + box.height / 2
          };
        } catch (error) {

      function focusSourceNode(nodeId) {
        if (!state.sourceDoc) return;

        const point = getSourceTargetPoint(group);
        const svg = state.sourceDoc.querySelector("#graph_8738e552-e764-4a57-839a-6321bc3ae7d3 svg");
        const inner = svg && svg.querySelector(":scope > g");
        const d3 = state.sourceDoc.defaultView && state.sourceDoc.defaultView.d3;

        const inspectorReserve = window.matchMedia("(max-width: 980px)").matches ? 0 : 416;
        const timelineReserve = window.matchMedia("(max-width: 980px)").matches ? 0 : Math.min(330, window.innerHeight * 0.34) + 32;
        const availableWidth = Math.max(360, frameRect.width - inspectorReserve);

        applySelectedState();

      function installSourceObserver(doc) {

          subtree: true
        });

      function waitForSourceGraph(doc, attempt = 0) {
        const nodes = doc.querySelectorAll(`.${NODE_CLASS}, .${BOUNDARY_CLASS}`);

          state.sourceDoc = doc;
          injectSourceStyle(doc);
          decorateSourceGraph();
          installSourceObserver(doc);
          renderInspector();
          return;
        }

        if (attempt > 120) {
          els.sourceStatus.textContent = "source graph not ready";
          return;
        }

        window.setTimeout(() => waitForSourceGraph(doc, attempt + 1), 120);
      }

      function handleFrameLoad() {
        try {
          const doc = els.frame.contentDocument || els.frame.contentWindow.document;
          waitForSourceGraph(doc);
        } catch (error) {
          els.sourceStatus.textContent = "source graph access blocked";
          console.error(error);

            .find((item) => item.index === Number(segmentTarget.dataset.segmentIndex));

        renderInspector();
      });

      els.frame.addEventListener("load", handleFrameLoad);
      window.setTimeout(() => {
        if (!state.sourceDoc && els.frame.contentDocument && els.frame.contentDocument.readyState !== "loading") {
          handleFrameLoad();
        }
      }, 300);

      initTimelineResize();
      renderTimelinePanels();
      renderInspector();
    })();
  </script>
</body>
</html>
