<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>训练管理平台 · 训练总览</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --card: #ffffff; --border: rgba(33,33,33,.10); --border-strong: rgba(33,33,33,.18);
    --text: #16161b; --text-2: #555561; --text-3: #787886;
    --blue: #1863dc; --blue-strong: #0f56ca; --blue-soft: rgba(24,99,220,.10);
    --green: #177245; --green-soft: rgba(23,114,69,.10);
    --red: #b42318; --red-soft: rgba(180,35,24,.08);
    --orange: #b45c17; --purple: #9b60aa; --purple-soft: rgba(155,96,170,.12);
    --radius: 20px;
    --shadow-card: 0 18px 38px rgba(22,23,28,.08);
    --shadow-soft: 0 26px 64px rgba(48,42,76,.12);
    --font-display: "Space Grotesk", "Inter", ui-sans-serif, system-ui, sans-serif;
    --font-body: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: "Space Mono", ui-monospace, SFMono-Regular, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    font-family: var(--font-body);
    color: var(--text); font-size: 13px; line-height: 1.55;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    background:
      radial-gradient(circle at 12% 10%, rgba(155,96,170,.16), transparent 26%),
      radial-gradient(circle at 88% 6%, rgba(24,99,220,.14), transparent 30%),
      radial-gradient(circle at 72% 92%, rgba(155,96,170,.08), transparent 24%),
      linear-gradient(180deg, #fdfdff 0%, #f6f7fb 44%, #eceff6 100%);
    background-attachment: fixed;
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(33,33,33,.16); border-radius: 999px;
    border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(33,33,33,.26); border: 2px solid transparent; background-clip: padding-box; }
  .app { display: flex; min-height: 100vh; gap: 16px; padding: 16px; }

  /* Sidebar */
  .sidebar { width: 224px; flex-shrink: 0; align-self: flex-start; position: sticky; top: 16px;
    background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(252,252,255,.92));
    border: 1px solid var(--border); border-radius: 26px; box-shadow: var(--shadow-card);
    padding: 20px 14px; display: flex; flex-direction: column; gap: 4px;
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); }
  .brand { font-family: var(--font-display); font-size: 18px; font-weight: 600; letter-spacing: -.02em; padding: 6px 10px 18px; }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 999px;
    color: var(--text-2); cursor: pointer; transition: background .15s, color .15s; }
  .nav-item:hover { background: rgba(255,255,255,.85); color: var(--text); }
  .nav-sep { height: 1px; background: var(--border); margin: 10px 6px; }
  .task-item { display: flex; align-items: center; gap: 9px; padding: 10px 12px; border-radius: 14px;
    cursor: pointer; color: var(--text-2); border: 1px solid transparent; transition: all .15s; }
  .task-item:hover { background: rgba(255,255,255,.85); color: var(--text); }
  .task-item.active { background: linear-gradient(135deg, rgba(24,99,220,.10), rgba(155,96,170,.08));
    border-color: rgba(24,99,220,.20); color: var(--blue); font-weight: 600;
    box-shadow: 0 8px 18px rgba(24,99,220,.10); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.blue { background: var(--blue); } .dot.green { background: var(--green); } .dot.red { background: var(--red); }
  .dot.purple { background: var(--purple); }

  /* Main */
  .main { flex: 1; min-width: 0; padding: 10px 8px; max-width: 1180px; }
  .page-title { display: flex; align-items: center; gap: 11px; font-family: var(--font-display);
    font-size: 24px; font-weight: 600; letter-spacing: -.02em; }
  .page-title .status { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .page-subtitle { display: flex; align-items: center; gap: 6px; margin-top: 4px; margin-left: 1px;
    font-size: 11.5px; color: var(--text-3); font-family: var(--font-mono); }
  .subtitle-sep { color: var(--border-strong); margin: 0 2px; }
  .task-desc-outer { display: inline-block; max-width: 600px; vertical-align: bottom; cursor: default; }
  .task-desc-text { display: block; max-width: 600px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .desc-tooltip { display: none; position: fixed; z-index: 9999;
    background: rgba(255,255,255,.98); border: 1px solid var(--border-strong); border-radius: 12px;
    padding: 10px 14px; font-size: 12px; line-height: 1.7; max-width: 380px; min-width: 80px;
    box-shadow: var(--shadow-soft); color: var(--text); font-family: var(--font-body);
    word-break: break-word; pointer-events: auto;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
  .desc-tooltip a { color: var(--blue); text-decoration: none; }
  .desc-tooltip a:hover { text-decoration: underline; }
  .tabs { display: flex; gap: 4px; margin: 18px 0 20px; background: rgba(236,238,245,.9);
    border: 1px solid var(--border); border-radius: 999px; padding: 4px; width: fit-content; }
  .tab { padding: 8px 18px; border-radius: 999px; color: var(--text-2); cursor: pointer;
    font-size: 13px; font-weight: 500; transition: all .15s; }
  .tab:hover { color: var(--text); }
  .tab.active { background: #fff; color: var(--text); font-weight: 600; box-shadow: 0 6px 14px rgba(22,23,28,.08); }

  .card { background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(252,252,255,.95));
    border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow-card); }
  .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .card-head h3 { font-family: var(--font-display); font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
  .more { color: var(--text-3); font-size: 12px; cursor: pointer; font-family: var(--font-mono); transition: color .15s; }
  .more:hover { color: var(--blue); }

  .row { display: flex; gap: 12px; margin-bottom: 14px; align-items: stretch; }
  .metric-bar { position: relative; }
  #cards { display: flex; gap: 12px; flex: 1; }
  .metric-card { flex: 1; background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(252,252,255,.95));
    border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-card);
    padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px;
    transition: transform .15s, box-shadow .15s; }
  .metric-card:hover { transform: translateY(-2px); box-shadow: 0 22px 40px rgba(24,99,220,.10); }
  .metric-card .mc-info { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
  .metric-card .label { color: var(--text-3); font-size: 11px; font-family: var(--font-mono); letter-spacing: .03em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .metric-card .value { font-family: var(--font-display); font-size: 26px; font-weight: 600; letter-spacing: -.03em; }
  .metric-card .spark { flex-shrink: 0; }
  .menu-btn { position: absolute; top: -24px; right: -24px; width: 48px; height: 48px;
    border: 1px solid var(--border); background: rgba(255,255,255,.92); border-radius: 999px;
    cursor: pointer; color: var(--text-2); font-size: 18px; line-height: 1; display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-card); transition: opacity .15s, background .15s, color .15s, border-color .15s;
    opacity: 0; pointer-events: none; z-index: 12; }
  .metric-bar:hover .menu-btn,
  .metric-bar:has(.dropdown.open) .menu-btn { opacity: 1; pointer-events: auto; }
  .menu-btn:hover { background: #fff; border-color: var(--border-strong); color: var(--text); }
  .dropdown { position: absolute; top: 32px; right: 0; width: 250px; background: rgba(255,255,255,.98); border: 1px solid var(--border);
    border-radius: 18px; box-shadow: var(--shadow-soft); padding: 12px; z-index: 20; display: none;
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); }
  .dropdown.open { display: block; }
  .dropdown .dd-title { color: var(--text-3); font-size: 11px; font-family: var(--font-mono); letter-spacing: .06em; text-transform: uppercase;
    padding: 10px 4px 6px; display: flex; justify-content: space-between; align-items: center; }
  .dropdown .dd-title:first-child { padding-top: 2px; }
  .dropdown .dd-title .hint { font-weight: 400; color: var(--text-3); text-transform: none; }
  .dd-item { display: flex; align-items: center; gap: 8px; padding: 8px 8px; cursor: pointer; border-radius: 12px; transition: background .12s; }
  .dd-item:hover { background: rgba(236,238,245,.7); }
  .dd-item.muted { color: var(--text-3); }
  .dd-item.dragging { opacity: .4; background: var(--blue-soft); }
  .dd-item .dd-handle { cursor: grab; color: var(--text-3); font-size: 13px; line-height: 1; user-select: none; }
  .dd-item .dd-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dropdown input { accent-color: var(--blue); flex-shrink: 0; }

  .grid-3 { display: grid; grid-template-columns: minmax(0,2fr) minmax(0,1fr) minmax(0,1fr); gap: 12px; margin-bottom: 14px; }
  .grid-3 > .card { min-width: 0; }
  .runtime { font-family: var(--font-display); font-size: 28px; font-weight: 600; letter-spacing: -.03em; }
  .progress-meta { display: flex; gap: 18px; margin-left: auto; font-size: 12px; color: var(--text-2); align-items: baseline; }
  .progress-meta b { color: var(--text); font-weight: 600; }
  .pbar { height: 8px; background: rgba(33,33,33,.06); border-radius: 999px; margin: 14px 0 18px; overflow: hidden; }
  .pbar > span { display: block; height: 100%; border-radius: 999px; position: relative; overflow: hidden; }
  .pbar > span.live { transition: width .5s linear; }
  .pbar > span.live::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.65) 50%, transparent 100%);
    transform: translateX(-100%); animation: pbar-shimmer 1.5s linear infinite; }
  @keyframes pbar-shimmer { to { transform: translateX(100%); } }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px 24px; font-size: 12px; }
  .info-grid .item { display: flex; gap: 6px; }
  .info-grid .k { color: var(--text-3); white-space: nowrap; }
  .info-grid .v { color: var(--text); word-break: break-all; }

  .list-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0;
    border-bottom: 1px solid rgba(33,33,33,.06); }
  .list-row:last-child { border-bottom: none; }
  .list-row .meta { display: flex; align-items: center; gap: 8px; color: var(--text-3); font-size: 11px; font-family: var(--font-mono); }
  .list-row .art-main { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
  .list-row .art-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  .info-grid .v a.link { color: var(--blue); text-decoration: none; cursor: pointer; }
  .info-grid .v a.link:hover { text-decoration: underline; }
  .km-axis { display: flex; justify-content: space-between; margin-top: 8px; padding: 0 2px;
    font-size: 10px; color: var(--text-3); font-family: var(--font-mono); }
  .km-axis-title { text-align: center; font-size: 11px; color: var(--text-3); margin-top: 2px; font-family: var(--font-mono); }
  .tag { font-size: 10px; padding: 3px 10px; border-radius: 999px; font-family: var(--font-mono); letter-spacing: .04em; }
  .tag.best { background: var(--green-soft); color: var(--green); border: 1px solid rgba(23,114,69,.18); }
  .ev-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid rgba(33,33,33,.06); }
  .ev-row:last-child { border-bottom: none; }
  .ev-row .ev-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 4px rgba(33,33,33,.04); }
  .ev-time { color: var(--text-3); font-size: 11px; font-family: var(--font-mono); flex-shrink: 0; }
  .ev-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; cursor: default; }

  .diag { display: grid; grid-template-columns: 1.4fr 1.3fr; gap: 24px; margin-bottom: 14px; }
  .diag p { color: var(--text-2); margin-bottom: 9px; line-height: 1.7; }
  .diag .hl { color: var(--blue); font-weight: 600; }
  .diag .hl-red { color: var(--red); font-weight: 600; }
  .btns { display: flex; gap: 10px; margin-top: 16px; }
  .btn { padding: 10px 20px; border-radius: 999px; cursor: pointer; border: 1px solid transparent;
    font-family: var(--font-body); font-size: 13px; font-weight: 600; transition: all .15s; }
  .btn.primary { background: #000; color: #fff; border-color: #000; box-shadow: 0 12px 24px rgba(22,23,28,.14); }
  .btn.primary:hover { background: #212121; transform: translateY(-1px); }
  .btn.ghost { background: rgba(255,255,255,.9); color: var(--text-2); border-color: var(--border); box-shadow: inset 0 1px 0 rgba(255,255,255,.65); }
  .btn.ghost:hover { background: #fff; border-color: var(--border-strong); color: var(--text); }
  .diag-prev { display: flex; flex-direction: column; }
  .diag-prev .cap { color: var(--text-3); font-size: 12px; font-family: var(--font-mono); }
  .diag-prev .big { font-family: var(--font-display); font-size: 20px; font-weight: 600; margin: 2px 0 6px; }
  .diag-split-head { display: flex; flex-direction: column; gap: 8px; margin-bottom: 6px; }
  .diag-legend { display: flex; gap: 16px; font-size: 12px; font-weight: 600; }
  .diag-legend i.lg { display: inline-block; width: 14px; height: 0; border-top: 2px solid currentColor;
    vertical-align: middle; margin-right: 5px; }
  .diag-legend i.lg.dash { border-top-style: dashed; }

  .section-title { font-family: var(--font-display); font-size: 17px; font-weight: 600; letter-spacing: -.02em;
    margin: 24px 0 14px; display: flex; justify-content: space-between; align-items: center; }
  .km-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .km-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .km-label { color: var(--text-3); font-size: 11px; font-family: var(--font-mono); letter-spacing: .03em; }
  .km-val { font-family: var(--font-display); font-size: 26px; font-weight: 600; letter-spacing: -.03em; }
  .km-val.bad { color: var(--red); }
  .km-anom { color: var(--red); font-size: 12px; max-width: 230px; text-align: right; line-height: 1.5; }
  .km-chart { position: relative; }
  .km-band-label { position: absolute; left: 50%; transform: translate(-50%,-50%); z-index: 2;
    background: rgba(232,244,238,.92); color: var(--green); font-size: 11px; white-space: nowrap;
    padding: 2px 10px; border-radius: 999px; border: 1px solid rgba(23,114,69,.30);
    font-family: var(--font-mono); letter-spacing: .03em; pointer-events: none;
    box-shadow: 0 2px 6px rgba(23,114,69,.10); }
  svg { display: block; }

  /* dual-line key metric card */
  .km-dual-vals { display:flex; gap:16px; margin-top:4px; }
  .km-dual-item { display:flex; flex-direction:column; gap:1px; }
  .km-dual-legend { font-size:10px; font-family:var(--font-mono); letter-spacing:.03em; }
  .km-dual-val { font-family:var(--font-display); font-size:20px; font-weight:600; letter-spacing:-.03em; color:var(--red); }

  /* causal chain diagnosis */
  .causal-wrap { display:flex; flex-direction:column; gap:0; margin-bottom:12px; }
  .causal-row { display:flex; gap:10px; align-items:flex-start; position:relative; }
  .causal-row:not(:last-child)::after { content:""; position:absolute; left:83px; top:26px; bottom:-2px;
    width:1px; background:var(--border); }
  .causal-step-col { min-width:72px; text-align:right; font-family:var(--font-mono); font-size:11px;
    color:var(--text-3); padding-top:5px; flex-shrink:0; }
  .causal-dot-col { padding-top:5px; flex-shrink:0; }
  .causal-dot2 { width:10px; height:10px; border-radius:50%; }
  .causal-dot2.warn { background:#ffab00; }
  .causal-dot2.crit { background:var(--red); }
  .causal-dot2.stop { background:var(--text-3); }
  .causal-body { flex:1; padding:0 0 13px; }
  .causal-signal { font-size:13px; font-weight:600; line-height:1.4; }
  .causal-signal.warn { color:var(--orange); }
  .causal-signal.crit { color:var(--red); }
  .causal-signal.stop { color:var(--text-2); }
  .causal-note { font-size:11px; color:var(--text-3); margin-top:2px; line-height:1.5; }
  .causal-badge { display:inline-block; font-size:10px; font-family:var(--font-mono);
    background:rgba(23,114,69,.12); color:var(--green); border:1px solid rgba(23,114,69,.25);
    border-radius:999px; padding:1px 9px; margin-top:5px; }
  .diag-recommend { font-size:12px; color:var(--text-2); line-height:1.7;
    background:rgba(24,99,220,.05); border:1px solid rgba(24,99,220,.12);
    border-radius:12px; padding:9px 13px; margin-bottom:12px; }

  #evLineTooltip { display:none; position:fixed; z-index:9999; pointer-events:none;
    background:rgba(255,255,255,.98); border:1px solid var(--border-strong); border-radius:10px;
    padding:8px 12px; font-size:12px; line-height:1.65; max-width:280px;
    box-shadow:var(--shadow-soft); color:var(--text);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); }
  #evLineTooltip b { font-weight:600; font-family:var(--font-mono); color:var(--blue); }

  /* compare mode */
  .nav-item.cmp-active { background: var(--blue-soft); color: var(--blue); font-weight: 600; }
  .cmp-task-item { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-radius: 14px;
    cursor: pointer; color: var(--text-2); border: 1px solid transparent; transition: all .15s; user-select: none; }
  .cmp-task-item:hover { background: rgba(255,255,255,.85); }
  .cmp-task-item.cmp-checked { color: var(--text); font-weight: 500;
    background: linear-gradient(135deg, rgba(24,99,220,.07), rgba(155,96,170,.04));
    border-color: rgba(24,99,220,.14); }
  .cmp-cb { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; cursor: pointer; }
  .cmp-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .cmp-header h2 { font-family: var(--font-display); font-size: 20px; font-weight: 600; letter-spacing: -.02em; flex: 1; }
  .cmp-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px;
    padding: 10px 16px; background: rgba(255,255,255,.85); border: 1px solid var(--border);
    border-radius: 16px; box-shadow: var(--shadow-card); }
  .cmp-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-2); }
  .cmp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  .cmp-chart-title { font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
    letter-spacing: .04em; text-transform: uppercase; margin-bottom: 6px; }
  .cmp-chart-area { position: relative; cursor: crosshair; }
  .cmp-chart-area svg { display: block; }
  #cmpTooltip { position: fixed; background: rgba(255,255,255,.98); border: 1px solid var(--border-strong);
    border-radius: 12px; padding: 9px 13px; font-size: 12px; z-index: 9999; pointer-events: none;
    display: none; box-shadow: var(--shadow-soft); min-width: 160px;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
  .cmp-tip-row { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
  .cmp-tip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cmp-tip-name { color: var(--text-2); flex: 1; }
  .cmp-tip-val { font-family: var(--font-mono); font-weight: 600; color: var(--text); }
  .cmp-tip-head { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); margin-bottom: 5px;
    padding-bottom: 4px; border-bottom: 1px solid var(--border); letter-spacing: .04em; }

  .disteff-blocks { display: flex; gap: 10px; width: 100%; margin-top: 8px; }
  .disteff-block { flex: 1; background: rgba(33,33,33,.04); border-radius: 12px; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
  .disteff-label { font-size: 11px; color: var(--text-2); font-family: var(--font-mono); letter-spacing: .03em; line-height: 1.3; }
  .disteff-bar-wrap { position: relative; height: 22px; }
  .disteff-bar-track { position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); height: 8px; background: rgba(33,33,33,.08); border-radius: 999px; overflow: visible; }
  .disteff-bar-fill { height: 100%; border-radius: 999px; transition: width .3s; }
  .disteff-target-line { position: absolute; top: -4px; bottom: -4px; width: 2px; background: var(--green); border-radius: 1px; z-index: 2; }
  .disteff-meta { display: flex; justify-content: space-between; align-items: center; }
  .disteff-val { font-family: var(--font-display); font-size: 16px; font-weight: 600; }
  .disteff-target-label { font-size: 9px; font-family: var(--font-mono); white-space: nowrap; }
  .disteff-chart { margin-top: 4px; min-height: 70px; }

  @media (max-width: 980px) {

// ---------- chart helpers ----------
function pathFrom(data, w, h, pad){
  const min = Math.min(...data), max = Math.max(...data), rng = (max-min)||1;
  const step = (w-pad*2)/(data.length-1);
  return data.map((v,i)=>{
    const x = pad+i*step, y = pad+(h-pad*2)*(1-(v-min)/rng);
    return (i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1);
  }).join(' ');
}
function sparkSVG(data, color){
  const w=110,h=34,pad=3;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><path d="${pathFrom(data,w,h,pad)}"
    fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}
// 返回值：若存在「最佳收敛区间」绿带，返回其在图内的垂直中心 y（像素，与 SVG 高度 1:1），否则 null。
// 绿带由曲线尾段（已收敛的平稳段）的取值范围自动推导，因此始终贴合曲线收敛后停留的水平区间。
function bigChart(el, data, color, band){
  const w = el.clientWidth||460, h=150, pad=12;
  const min = Math.min(...data), max = Math.max(...data), rng=(max-min)||1;
  const Y = v => pad + (h-pad*2)*(1-(v-min)/rng);
  const line = pathFrom(data,w,h,pad);
  let bandRect='', bandY=null;
  if(band==='red'){
    bandRect=`<rect x="${w*0.62}" y="${pad}" width="${w*0.38-pad}" height="${h-pad*2}" fill="rgba(180,35,24,.10)"/>`;
  } else if(band && band.indexOf('green')===0){
    // 取尾段（最后约 1/4，至少 5 个点）作为收敛后的平稳段，绿带恰好落在曲线停留的水平区间
    const tail = data.slice(Math.max(0, data.length - Math.max(5, Math.round(data.length*0.25))));
    let top = Y(Math.max(...tail)), bot = Y(Math.min(...tail));
    const minH = 24;                                   // 平稳段过窄时给绿带一个最小可视厚度
    if(bot-top < minH){ const c=(top+bot)/2; top=c-minH/2; bot=c+minH/2; }
    top = Math.max(pad, top); bot = Math.min(h-pad, bot);
    bandRect=`<rect x="${pad}" y="${top.toFixed(1)}" width="${w-pad*2}" height="${(bot-top).toFixed(1)}" fill="rgba(23,114,69,.15)"/>`;
    bandY = (top+bot)/2;
  }
  const area = line+` L ${w-pad} ${h-pad} L ${pad} ${h-pad} Z`;
  el.innerHTML = `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    ${bandRect}<path d="${area}" fill="${color}" opacity="0.06"/>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
  return bandY;
}
// 修改前/修改后共享同一段历史，在 splitIdx（修改点 step 500）处分叉：
// 之前是同一条连续曲线，之后分裂为「不修改」与「修改后」两条分支，首尾相连但走势差异大。
function splitChart(el, before, after, splitIdx, cBefore, cAfter){
  const w = el.clientWidth||300, h=120, pad=12;
  const all = before.concat(after);
  const min = Math.min(...all), max = Math.max(...all), rng = (max-min)||1;
  const n = before.length, dx = (w-pad*2)/(n-1);
  const X = i => pad + i*dx, Y = v => pad + (h-pad*2)*(1-(v-min)/rng);
  const seg = (arr,from,to)=>{ let d=''; for(let i=from;i<=to;i++) d+=(i===from?'M':'L')+X(i).toFixed(1)+' '+Y(arr[i]).toFixed(1)+' '; return d.trim(); };
  const mx = X(splitIdx).toFixed(1), jy = Y(before[splitIdx]).toFixed(1);
  el.innerHTML = `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <line x1="${mx}" y1="${pad}" x2="${mx}" y2="${h-pad}" stroke="var(--border)" stroke-width="1" stroke-dasharray="3 3"/>
    <path d="${seg(before,0,splitIdx)}" fill="none" stroke="var(--text-3)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="${seg(after,splitIdx,n-1)}" fill="none" stroke="${cAfter}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="${seg(before,splitIdx,n-1)}" fill="none" stroke="${cBefore}" stroke-width="2" stroke-dasharray="5 3" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${mx}" cy="${jy}" r="3" fill="#fff" stroke="var(--text-2)" stroke-width="1.5"/></svg>`;
}
function fillChart(el, data, color){
  const w = el.clientWidth||200, h=90, pad=8;
  const line = pathFrom(data,w,h,pad), area = line+` L ${w-pad} ${h-pad} L ${pad} ${h-pad} Z`;
  el.innerHTML = `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path d="${area}" fill="${color}" opacity="0.18"/><path d="${line}" fill="none" stroke="${color}" stroke-width="1.8"/></svg>`;
}
function dualChart(el, dataA, dataB){
  const w = el.clientWidth||460, h=150, pad=12;
  const all = dataA.concat(dataB);
  const min = Math.min(...all), max = Math.max(...all), rng=(max-min)||1;
  let crossIdx = -1;
  for(let i=1; i<dataA.length; i++){
    if(dataB[i] <= dataA[i] && dataB[i-1] > dataA[i-1]){ crossIdx = i; break; }
  }
  const lineA = pathFrom(dataA,w,h,pad);
  const lineB = pathFrom(dataB,w,h,pad);
  const areaA = lineA+` L ${w-pad} ${h-pad} L ${pad} ${h-pad} Z`;
  let crossLine = '';
  if(crossIdx > 0){
    const cx = (pad + crossIdx*(w-pad*2)/(dataA.length-1)).toFixed(1);
    crossLine = `<line x1="${cx}" y1="${pad+10}" x2="${cx}" y2="${h-pad}" stroke="var(--red)" stroke-width="1" stroke-dasharray="3 3" opacity=".6"/>
      <text x="${cx}" y="${pad+8}" font-size="9" fill="var(--red)" font-family="monospace" text-anchor="middle">区分度反转</text>`;
  }
  el.innerHTML = `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path d="${areaA}" fill="var(--blue)" opacity="0.04"/>
    ${crossLine}
    <path d="${lineA}" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="${lineB}" fill="none" stroke="var(--orange)" stroke-width="2" stroke-dasharray="5 3" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

// ---------- live ticker ----------
// 页面加载时刻 = 起算基准；刷新页面即复位
const PAGE_START = Date.now();
let liveTimer = null;

function parseHM(s){ const m=/(\d+)\s*小时\s*(\d+)\s*分/.exec(s); return m ? (+m[1]*3600 + +m[2]*60) : 0; }
function fmtHMS(sec){
  sec = Math.floor(sec);
  const h = Math.floor(sec/3600), m = Math.floor(sec%3600/60), s = sec%60;
  return `${h}小时${m}分${String(s).padStart(2,'0')}秒`;
}

function startLiveTicker(r){
  const baseStep     = parseFloat(r.stepCur);
  const stepTotal    = parseFloat(r.stepTotal);
  const epochTotal   = parseFloat(r.epochTotal);
  const stepsPerEpoch= stepTotal / epochTotal;
  const baseSeconds  = parseHM(r.big);
  const STEP_PER_SEC = 0.7;   // 每秒推进的 step 数（演示速率）

  function update(){
    const elapsed   = (Date.now() - PAGE_START) / 1000;
    const stepFloat = Math.min(baseStep + elapsed * STEP_PER_SEC, stepTotal);
    const pct       = stepFloat / stepTotal * 100;
    const epoch     = Math.min(Math.floor(stepFloat / stepsPerEpoch), Math.floor(epochTotal));

    const rt = document.getElementById('liveRuntime');
    const st = document.getElementById('liveStep');
    const ep = document.getElementById('liveEpoch');
    const bar= document.getElementById('liveBar');
    if(!rt || !bar){ clearInterval(liveTimer); return; }  // 卡片已被重渲染

    rt.textContent  = fmtHMS(baseSeconds + elapsed);
    st.textContent  = Math.floor(stepFloat);
    ep.textContent  = epoch;
    bar.style.width = pct + '%';

    if(stepFloat >= stepTotal) clearInterval(liveTimer);  // 跑满即停
  }
  update();
  liveTimer = setInterval(update, 500);
}

function renderCards(){
  const t = TASKS[current];
  const shown = t.metrics.filter(m=>m.shown);
  document.getElementById('cards').innerHTML = shown.length ? shown.map(c=>
    `<div class="metric-card">
       <div class="mc-info"><span class="label">${c.label}</span><span class="value">${c.value}</span></div>
       <div class="spark">${sparkSVG(t.series[c.key],'#1863dc')}</div></div>`).join('')
    : `<div class="metric-card" style="justify-content:center;color:var(--text-3)">未选择任何指标</div>`;
}

function renderDropdown(){
  const t = TASKS[current];
  const dd = document.getElementById('dropdown');
  const shown = t.metrics.filter(m=>m.shown);
  const hidden = t.metrics.filter(m=>!m.shown);
  dd.innerHTML =
    `<div class="dd-title">已显示 <span class="hint">拖动排序</span></div>` +
    `<div id="ddShown">` + shown.map(c=>
      `<div class="dd-item" draggable="true" data-key="${c.key}">
         <span class="dd-handle">⠿</span>
         <span class="dd-label">${c.label}</span>
         <input type="checkbox" checked data-key="${c.key}"></div>`).join('') + `</div>` +
    `<div class="dd-title">未显示 <span class="hint">常见观测参数</span></div>` +
    hidden.map(c=>
      `<div class="dd-item muted" data-key="${c.key}">
         <span class="dd-handle" style="visibility:hidden">⠿</span>
         <span class="dd-label">${c.label}</span>
         <input type="checkbox" data-key="${c.key}"></div>`).join('');
  bindDropdown();
}

function bindDropdown(){
  const t = TASKS[current];
  // 勾选切换：显示 / 隐藏
  document.querySelectorAll('#dropdown input[type=checkbox]').forEach(cb=>{
    cb.addEventListener('change', e=>{
      e.stopPropagation();
      const m = t.metrics.find(x=>x.key===cb.dataset.key);
      if(!m) return;
      if(cb.checked){               // 隐藏 → 显示：移到已显示末尾
        m.shown = true;
        t.metrics.splice(t.metrics.indexOf(m),1);
        t.metrics.push(m);
      } else {
        m.shown = false;
      }
      renderCards();
      renderDropdown();
    });
  });
  // 拖动排序（仅已显示区）
  const container = document.getElementById('ddShown');
  if(!container) return;
  let dragEl = null;
  container.querySelectorAll('.dd-item').forEach(item=>{
    item.addEventListener('dragstart', ()=>{ dragEl = item; item.classList.add('dragging'); });
    item.addEventListener('dragend', ()=>{
      item.classList.remove('dragging');
      const order = [...container.querySelectorAll('.dd-item')].map(el=>el.dataset.key);
      applyShownOrder(order);
    });
  });
  container.addEventListener('dragover', e=>{
    e.preventDefault();
    if(!dragEl) return;
    const after = afterElement(container, e.clientY);
    if(after == null) container.appendChild(dragEl);
    else container.insertBefore(dragEl, after);
  });
}

function afterElement(container, y){
  const items = [...container.querySelectorAll('.dd-item:not(.dragging)')];
  let closest = { dist: -Infinity, el: null };
  for(const el of items){
    const box = el.getBoundingClientRect();
    const offset = y - box.top - box.height/2;
    if(offset < 0 && offset > closest.dist) closest = { dist: offset, el };
  }
  return closest.el;
}

function applyShownOrder(order){
  const t = TASKS[current];
  const rank = {};
  order.forEach((k,i)=> rank[k]=i);
  // 已显示按拖动后顺序排列；未显示保持相对顺序并整体置后
  t.metrics.sort((a,b)=>{
    if(a.shown && b.shown) return rank[a.key]-rank[b.key];
    if(a.shown) return -1;
    if(b.shown) return 1;
    return 0;
  });
  renderCards();
}

function dualChart(el, dataA, dataB, labels){
  const w = el.clientWidth||460, h=150, pad=12;
  const all = dataA.concat(dataB);
  const min = Math.min(...all), max = Math.max(...all), rng=(max-min)||1;
  const lineA = pathFrom(dataA,w,h,pad);
  const lineB = pathFrom(dataB,w,h,pad);
  let crossX = null;
  for(let i=1;i<dataA.length;i++){
    const d0=dataA[i-1]-dataB[i-1], d1=dataA[i]-dataB[i];
    if(d0*d1<=0){ crossX=pad+(i-0.5)*(w-pad*2)/(dataA.length-1); break; }
  }
  const crossLine = crossX!=null
    ? `<line x1="${crossX.toFixed(1)}" y1="${pad}" x2="${crossX.toFixed(1)}" y2="${h-pad}" stroke="rgba(180,35,24,.35)" stroke-width="1" stroke-dasharray="3 3"/>`
    : '';
  const labA = labels?.[0]||'A', labB = labels?.[1]||'B';
  el.innerHTML = `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    ${crossLine}
    <path d="${lineA}" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="${lineB}" fill="none" stroke="var(--orange)" stroke-width="2" stroke-dasharray="5 3" stroke-linejoin="round" stroke-linecap="round"/>
    <text x="${pad+4}" y="${pad+11}" font-size="9" fill="var(--blue)" font-family="monospace">${labA}</text>
    <text x="${pad+4}" y="${pad+22}" font-size="9" fill="var(--orange)" font-family="monospace">${labB}</text>
  </svg>`;
}

function mfuChart(el, data, peak){
  const w = el.clientWidth||460, h=150, pad=12;
  const maxV = peak * 1.08;
  const Y = v => pad + (h-pad*2)*(1 - v/maxV);
  const stepX = (w-pad*2)/(data.length-1);
  const line = data.map((v,i)=>(i?'L':'M')+(pad+i*stepX).toFixed(1)+' '+Y(v).toFixed(1)).join(' ');
  const area = line+` L ${w-pad} ${h-pad} L ${pad} ${h-pad} Z`;
  const py = Y(peak).toFixed(1);
  el.innerHTML = `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <line x1="${pad}" y1="${py}" x2="${w-pad}" y2="${py}" stroke="var(--green)" stroke-width="1" stroke-dasharray="4 3" opacity=".75"/>
    <text x="${w-pad-4}" y="${(+py-3).toFixed(1)}" font-size="9" fill="var(--green)" font-family="monospace" text-anchor="end">H800 BF16 峰值 ${(peak*100).toFixed(0)}%</text>
    <path d="${area}" fill="var(--blue)" opacity="0.06"/>
    <path d="${line}" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

function gpuutilChart(el, data){
  const w = el.clientWidth||460, h=150, pad=12;
  const maxV = 1.0;
  const Y = v => pad + (h-pad*2)*(1 - v/maxV);
  const stepX = (w-pad*2)/(data.length-1);
  const line = data.map((v,i)=>(i?'L':'M')+(pad+i*stepX).toFixed(1)+' '+Y(v).toFixed(1)).join(' ');
  const area = line+` L ${w-pad} ${h-pad} L ${pad} ${h-pad} Z`;
  const ty = Y(0.80).toFixed(1);
  el.innerHTML = `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <line x1="${pad}" y1="${ty}" x2="${w-pad}" y2="${ty}" stroke="var(--orange)" stroke-width="1" stroke-dasharray="4 3" opacity=".75"/>
    <text x="${w-pad-4}" y="${(+ty-3).toFixed(1)}" font-size="9" fill="var(--orange)" font-family="monospace" text-anchor="end">目标 80%</text>
    <path d="${area}" fill="var(--blue)" opacity="0.06"/>
    <path d="${line}" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>

}

function disteffChart(el, gauges, series){
  const card = el.closest('.card');
  const charts = card.querySelectorAll('.disteff-chart');
  el.style.display = 'none';
  const axis = card.querySelector('.km-axis');
  const title = card.querySelector('.km-axis-title');
  if(axis) axis.style.display = 'none';
  if(title) title.style.display = 'none';
  gauges.forEach((g, pi) => {
    const chartEl = charts[pi];
    if(!chartEl) return;
    const data = series[g.key] || [];
    if(!data.length){ chartEl.style.display = 'none'; return; }
    const w = chartEl.clientWidth || 140, h = 80, pad = 8;
    const allV = [...data, g.target];
    const minV = Math.min(...allV) * 0.85, maxV = Math.max(...allV) * 1.15;
    const rng = (maxV - minV) || 1;
    const Y = v => pad + (h - pad * 2) * (1 - (v - minV) / rng);
    const sx = (w - pad * 2) / (data.length - 1);
    const pts = data.map((v, i) => (i ? 'L' : 'M') + (pad + i * sx).toFixed(1) + ' ' + Y(v).toFixed(1)).join(' ');
    const ty = Y(g.target).toFixed(1);
    const lastV = data[data.length - 1];
    const good = g.lte ? lastV <= g.target : lastV >= g.target;
    const col = good ? 'var(--green)' : g.lte ? 'var(--red)' : 'var(--orange)';
    chartEl.innerHTML = `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <line x1="${pad}" y1="${ty}" x2="${(w - pad).toFixed(1)}" y2="${ty}" stroke="var(--green)" stroke-width="1" stroke-dasharray="3 2" opacity=".5"/>
      <path d="${pts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${(pad + (data.length - 1) * sx).toFixed(1)}" cy="${Y(lastV).toFixed(1)}" r="2.5" fill="${col}"/>
    </svg>`;
  });
}

function drawCharts(){
  const t = TASKS[current];
  splitChart(document.getElementById('diagSplit'),
    t.series[t.diag.before.key], t.series[t.diag.after.key], 6,
    t.diag.before.color.includes('red')?'#b42318':'#177245',
    t.diag.after.color.includes('red')?'#b42318':'#177245');
  const firstKeyed = t.key.find(k=>k.key);
  const stepMax = Math.round(parseFloat(t.runtime.stepCur)) || (firstKeyed ? t.series[firstKeyed.key].length : 20);
  t.key.forEach((k,i)=>{
    const el = document.getElementById('km'+i);
    if(k.type === 'dual'){
      dualChart(el, t.series[k.keys[0]], t.series[k.keys[1]], k.labels);
    } else if(k.type === 'mfu'){
      mfuChart(el, t.series[k.key], k.peak);
    } else if(k.type === 'gpuutil'){
      gpuutilChart(el, t.series[k.key]);
    } else if(k.type === 'disteff'){
      disteffChart(el, k.gauges, t.series);
      return;
    } else {
      const bandY = bigChart(el, t.series[k.key], '#1863dc', k.band);
      if(!k.anom && bandY!=null)
        el.insertAdjacentHTML('beforeend',
          `<span class="km-band-label" style="top:${bandY.toFixed(1)}px">最佳收敛区间</span>`);
    }
    overlayEventLines(el, t.events, stepMax);
    const ax = document.getElementById('kmAxis'+i);
    if(ax){
      const ticks = 4;
      ax.innerHTML = Array.from({length: ticks+1}, (_,j)=>
        `<span>${Math.round(stepMax*j/ticks)}</span>`).join('');
    }
  });
}

// ---------- overlay event vertical lines on km charts ----------
function overlayEventLines(el, events, stepMax){
  if(!el||!events||!events.length||!stepMax) return;
  const svg = el.querySelector('svg');
  if(!svg) return;
  const vb = svg.viewBox.baseVal;
  const w = vb.width||460, h = vb.height||150, pad = 12;
  events.forEach(ev=>{
    if(ev.step==null) return;
    const x = pad + (ev.step/stepMax)*(w-pad*2);
    const col = ev.c.includes('red') ? 'rgba(180,35,24,.55)'
      : ev.c.includes('#ffab00') ? 'rgba(180,92,23,.55)'
      : 'rgba(23,114,69,.55)';
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x.toFixed(1)); line.setAttribute('y1',String(pad));
    line.setAttribute('x2',x.toFixed(1)); line.setAttribute('y2',String(h-pad));
    line.setAttribute('stroke',col); line.setAttribute('stroke-width','1');
    line.setAttribute('stroke-dasharray','3 3');
    svg.appendChild(line);
    const hit = document.createElementNS('http://www.w3.org/2000/svg','rect');
    hit.setAttribute('x', String(x-5)); hit.setAttribute('y', String(pad));
    hit.setAttribute('width','10'); hit.setAttribute('height', String(h-pad*2));
    hit.setAttribute('fill','transparent'); hit.style.cursor='default';
    hit.addEventListener('mouseover',()=>{
      _evTip.innerHTML = `<b>step ${ev.step}</b><br>${ev.t}`;
      _evTip.style.display='block';
    });
    hit.addEventListener('mousemove',e=>{
      _evTip.style.left=(e.clientX+14)+'px';
      _evTip.style.top=(e.clientY-42)+'px';
    });
    hit.addEventListener('mouseout',()=>{ _evTip.style.display='none'; });
    svg.appendChild(hit);
  });
}

// ---------- render events tab ----------
function renderEventsTab(){
  const t = TASKS[current];
  const el = document.getElementById('eventsTable');
  if(!el) return;
  const typeOf = c=>{
    if(c.includes('red')) return {label:'错误',bg:'var(--red-soft)',fg:'var(--red)'};
    if(c.includes('#ffab00')) return {label:'警告',bg:'rgba(255,171,0,.12)',fg:'#b45c17'};
    return {label:'信息',bg:'var(--green-soft)',fg:'var(--green)'};
  };
  el.innerHTML = `<table style="width:100%;border-collapse:collapse;">
    <thead><tr style="font-size:11px;color:var(--text-3);font-family:var(--font-mono);text-align:left;">
      <th style="padding:6px 20px 10px 0;width:80px;border-bottom:1px solid rgba(33,33,33,.08)">Step</th>
      <th style="padding:6px 20px 10px;width:95px;border-bottom:1px solid rgba(33,33,33,.08)">时间</th>
      <th style="padding:6px 20px 10px;width:66px;border-bottom:1px solid rgba(33,33,33,.08)">类型</th>
      <th style="padding:6px 0 10px;border-bottom:1px solid rgba(33,33,33,.08)">描述</th>
    </tr></thead>
    <tbody>${[...t.events].reverse().map(e=>{
      const tp=typeOf(e.c);
      return `<tr>
        <td style="padding:10px 20px 10px 0;font-family:var(--font-mono);font-size:12px;color:var(--text-3);border-bottom:1px solid rgba(33,33,33,.05);vertical-align:top">${e.step!=null?e.step:'—'}</td>
        <td style="padding:10px 20px;font-family:var(--font-mono);font-size:11px;color:var(--text-3);border-bottom:1px solid rgba(33,33,33,.05);vertical-align:top">${e.time}</td>
        <td style="padding:10px 20px;border-bottom:1px solid rgba(33,33,33,.05);vertical-align:top">
          <span style="font-size:10px;padding:2px 8px;border-radius:999px;font-family:var(--font-mono);white-space:nowrap;background:${tp.bg};color:${tp.fg}">${tp.label}</span>
        </td>
        <td style="padding:10px 0;font-size:12.5px;border-bottom:1px solid rgba(33,33,33,.05);vertical-align:top;line-height:1.6">${e.t}</td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

initTabs();
renderAll();
window.addEventListener('resize', drawCharts);

const menuBtn = document.getElementById('menuBtn'), dropdown = document.getElementById('dropdown');
menuBtn.addEventListener('click', e=>{ e.stopPropagation(); dropdown.classList.toggle('open'); });
document.addEventListener('click', ()=> dropdown.classList.remove('open'));
dropdown.addEventListener('click', e=> e.stopPropagation());
</script>
