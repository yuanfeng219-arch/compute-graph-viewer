<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>训练管理平台 · 训练总览</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --card: #ffffff; --border: rgba(33,33,33,.10); --border-strong: rgba(33,33,33,.18);
    --text: #16161b; --text-2: #555561; --text-3: #787886;
    --blue: #1863dc; --blue-strong: #0f56ca; --blue-soft: rgba(24,99,220,.10);
    --green: #177245; --green-soft: rgba(23,114,69,.10);
    --red: #b42318; --red-soft: rgba(180,35,24,.08);
    --orange: #b45c17; --purple: #9b60aa; --purple-soft: rgba(155,96,170,.12);
    --radius: 20px;
    --shadow-card: 0 18px 38px rgba(22,23,28,.08);
    --shadow-soft: 0 26px 64px rgba(48,42,76,.12);
    --font-display: "Space Grotesk", "Inter", ui-sans-serif, system-ui, sans-serif;
    --font-body: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: "Space Mono", ui-monospace, SFMono-Regular, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    font-family: var(--font-body);
    color: var(--text); font-size: 13px; line-height: 1.55;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    background:
      radial-gradient(circle at 12% 10%, rgba(155,96,170,.16), transparent 26%),
      radial-gradient(circle at 88% 6%, rgba(24,99,220,.14), transparent 30%),
      radial-gradient(circle at 72% 92%, rgba(155,96,170,.08), transparent 24%),
      linear-gradient(180deg, #fdfdff 0%, #f6f7fb 44%, #eceff6 100%);
    background-attachment: fixed;
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(33,33,33,.16); border-radius: 999px;
    border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(33,33,33,.26); border: 2px solid transparent; background-clip: padding-box; }
  .app { display: flex; min-height: 100vh; gap: 16px; padding: 16px; }

  /* Sidebar */
  .sidebar { width: 240px; flex-shrink: 0; align-self: flex-start; position: sticky; top: 16px;
    background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(252,252,255,.92));
    border: 1px solid var(--border); border-radius: 26px; box-shadow: var(--shadow-card);
    padding: 20px 14px; display: flex; flex-direction: column; gap: 4px;
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); }
  .brand { font-family: var(--font-display); font-size: 18px; font-weight: 600; letter-spacing: -.02em;
    padding: 6px 10px 18px; display: flex; align-items: center; gap: 8px; }
  .brand-text { flex: 1; min-width: 0; }
  .icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px;
    flex-shrink: 0; padding: 0; border: 1px solid var(--border); border-radius: 9px;
    background: rgba(255,255,255,.6); color: var(--text-2); cursor: pointer; transition: all .15s; }
  .icon-btn:hover { background: #fff; color: var(--text); border-color: var(--border-strong); }
  .icon-btn svg { width: 16px; height: 16px; }
  /* collapsed sidebar */
  .app.nav-collapsed .sidebar { display: none; }
  #navExpand, #navHomeCollapsed, #cmpNavExpand, #cmpNavHomeCollapsed { display: none; }
  .app.nav-collapsed #cmpNavExpand, .app.nav-collapsed #cmpNavHomeCollapsed { display: inline-flex; }
  .app.nav-collapsed #navExpand, .app.nav-collapsed #navHomeCollapsed { display: inline-flex; }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 999px;
    color: var(--text-2); cursor: pointer; transition: background .15s, color .15s; }
  .nav-item:hover { background: rgba(255,255,255,.85); color: var(--text); }
  .nav-sep { height: 1px; background: var(--border); margin: 10px 6px; }
  .task-item { display: flex; align-items: center; gap: 9px; padding: 10px 12px; border-radius: 14px;
    cursor: pointer; color: var(--text-2); border: 1px solid transparent; transition: all .15s; }
  .task-item:hover { background: rgba(255,255,255,.85); color: var(--text); }
  .task-item.active { background: linear-gradient(135deg, rgba(24,99,220,.10), rgba(155,96,170,.08));
    border-color: rgba(24,99,220,.20); color: var(--blue); font-weight: 600;
    box-shadow: 0 8px 18px rgba(24,99,220,.10); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.blue { background: var(--blue); } .dot.green { background: var(--green); } .dot.red { background: var(--red); }
  .dot.purple { background: var(--purple); } .dot.orange { background: var(--orange); }

  /* Main */
  .main { flex: 1; min-width: 0; padding: 10px 8px; }
  .page-title { display: flex; align-items: center; gap: 11px; font-family: var(--font-display);
    font-size: 24px; font-weight: 600; letter-spacing: -.02em; }
  .page-title .status { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .page-subtitle { display: flex; align-items: center; gap: 6px; margin-top: 4px; margin-left: 1px;
    font-size: 11.5px; color: var(--text-3); font-family: var(--font-mono); }
  .subtitle-sep { color: var(--border-strong); margin: 0 2px; }
  .task-desc-outer { display: inline-block; max-width: 600px; vertical-align: bottom; cursor: default; }
  .task-desc-text { display: block; max-width: 600px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .desc-tooltip { display: none; position: fixed; z-index: 9999;
    background: rgba(255,255,255,.98); border: 1px solid var(--border-strong); border-radius: 12px;
    padding: 10px 14px; font-size: 12px; line-height: 1.7; max-width: 380px; min-width: 80px;
    box-shadow: var(--shadow-soft); color: var(--text); font-family: var(--font-body);
    word-break: break-word; pointer-events: auto;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
  .desc-tooltip a { color: var(--blue); text-decoration: none; }
  .desc-tooltip a:hover { text-decoration: underline; }
  .tabs-row { display: flex; align-items: center; gap: 16px; margin: 18px 0 20px; }
  .tabs { display: flex; gap: 4px; background: rgba(236,238,245,.9);
    border: 1px solid var(--border); border-radius: 999px; padding: 4px; width: fit-content; }
  .tab { padding: 8px 18px; border-radius: 999px; color: var(--text-2); cursor: pointer;
    font-size: 13px; font-weight: 500; transition: all .15s; }
  .tab:hover { color: var(--text); }
  .tab.active { background: #fff; color: var(--text); font-weight: 600; box-shadow: 0 6px 14px rgba(22,23,28,.08); }
  .dash-source { margin-left: auto; display: flex; gap: 2px; background: rgba(236,238,245,.9);
    border: 1px solid var(--border); border-radius: 999px; padding: 3px; }
  .dash-src-btn { padding: 6px 14px; border: none; background: transparent; border-radius: 999px;
    font-size: 12px; font-weight: 500; color: var(--text-2); cursor: pointer; font-family: inherit; transition: all .15s; }
  .dash-src-btn:hover { color: var(--text); }
  .dash-src-btn.active { background: #fff; color: var(--text); font-weight: 600; box-shadow: 0 6px 14px rgba(22,23,28,.08); }

  /* Floating tab bar */
  .float-bar {
    position: fixed; top: 16px; z-index: 200;
    background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(252,252,255,.92));
    border: 1px solid var(--border); border-radius: 26px; box-shadow: var(--shadow-card);
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    padding: 8px 8px 8px 16px;
    display: flex; align-items: center; gap: 16px;
    opacity: 0; pointer-events: none; transform: translateY(-8px);
    transition: opacity .2s ease, transform .2s ease; }
  .float-bar.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
  .float-bar-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
  .float-bar-nav { display: none; align-items: center; gap: 4px; flex-shrink: 0; }
  .app.nav-collapsed .float-bar-nav { display: flex; }
  .float-bar-identity { display: flex; align-items: center; gap: 9px; min-width: 0; }
  .float-bar-name { font-family: var(--font-display); font-size: 14px; font-weight: 600;
    letter-spacing: -.02em; max-width: 600px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .float-tabs { display: flex; gap: 4px; background: rgba(236,238,245,.9);
    border: 1px solid var(--border); border-radius: 999px; padding: 4px; flex-shrink: 0; }
  .float-tab { padding: 8px 18px; border-radius: 999px; color: var(--text-2); cursor: pointer;
    font-size: 13px; font-weight: 500; transition: all .15s; }
  .float-tab:hover { color: var(--text); }
  .float-tab.active { background: #fff; color: var(--text); font-weight: 600; box-shadow: 0 6px 14px rgba(22,23,28,.08); }

  .card { background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(252,252,255,.95));
    border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow-card); }
  .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .card-head h3 { font-family: var(--font-display); font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
  .more { color: var(--text-3); font-size: 12px; cursor: pointer; font-family: var(--font-mono); transition: color .15s; }
  .more:hover { color: var(--blue); }

  .row { display: flex; gap: 12px; margin-bottom: 14px; align-items: stretch; }
  .metric-bar { position: relative; }
  #cards { display: flex; gap: 12px; flex: 1; }
  .metric-card { flex: 1; background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(252,252,255,.95));
    border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-card);
    padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px;
    transition: transform .15s, box-shadow .15s; }
  .metric-card:hover { transform: translateY(-2px); box-shadow: 0 22px 40px rgba(24,99,220,.10); }
  .metric-card .mc-info { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
  .metric-card .label { color: var(--text-3); font-size: 11px; font-family: var(--font-mono); letter-spacing: .03em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .metric-card .value { font-family: var(--font-display); font-size: 26px; font-weight: 600; letter-spacing: -.03em; }
  .metric-card .spark { flex-shrink: 0; }
  .menu-btn { position: absolute; top: -24px; right: -24px; width: 48px; height: 48px;
    border: 1px solid var(--border); background: rgba(255,255,255,.92); border-radius: 999px;
    cursor: pointer; color: var(--text-2); font-size: 18px; line-height: 1; display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-card); transition: opacity .15s, background .15s, color .15s, border-color .15s;
    opacity: 0; pointer-events: none; z-index: 12; }
  .metric-bar:hover .menu-btn,
  .metric-bar:has(.dropdown.open) .menu-btn { opacity: 1; pointer-events: auto; }
  .menu-btn:hover { background: #fff; border-color: var(--border-strong); color: var(--text); }
  .dropdown { position: absolute; top: 32px; right: 0; width: 250px; background: rgba(255,255,255,.98); border: 1px solid var(--border);
    border-radius: 18px; box-shadow: var(--shadow-soft); padding: 12px; z-index: 20; display: none;
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); }
  .dropdown.open { display: block; }
  .dropdown .dd-title { color: var(--text-3); font-size: 11px; font-family: var(--font-mono); letter-spacing: .06em; text-transform: uppercase;
    padding: 10px 4px 6px; display: flex; justify-content: space-between; align-items: center; }
  .dropdown .dd-title:first-child { padding-top: 2px; }
  .dropdown .dd-title .hint { font-weight: 400; color: var(--text-3); text-transform: none; }
  .dd-item { display: flex; align-items: center; gap: 8px; padding: 8px 8px; cursor: pointer; border-radius: 12px; transition: background .12s; }
  .dd-item:hover { background: rgba(236,238,245,.7); }
  .dd-item.muted { color: var(--text-3); }
  .dd-item.dragging { opacity: .4; background: var(--blue-soft); }
  .dd-item .dd-handle { cursor: grab; color: var(--text-3); font-size: 13px; line-height: 1; user-select: none; }
  .dd-item .dd-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dropdown input { accent-color: var(--blue); flex-shrink: 0; }

  .grid-3 { display: grid; grid-template-columns: minmax(0,2fr) minmax(0,1fr) minmax(0,1fr); gap: 12px; margin-bottom: 14px; }
  .grid-3 > .card { min-width: 0; }
  .runtime { font-family: var(--font-display); font-size: 28px; font-weight: 600; letter-spacing: -.03em; }
  .progress-meta { display: flex; gap: 18px; margin-left: auto; font-size: 12px; color: var(--text-2); align-items: baseline; }
  .progress-meta b { color: var(--text); font-weight: 600; }
  .pbar { height: 8px; background: rgba(33,33,33,.06); border-radius: 999px; margin: 14px 0 18px; overflow: hidden; }
  .pbar > span { display: block; height: 100%; border-radius: 999px; position: relative; overflow: hidden; }
  .pbar > span.live { transition: width .5s linear; }
  .pbar > span.live::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.65) 50%, transparent 100%);
    transform: translateX(-100%); animation: pbar-shimmer 1.5s linear infinite; }
  @keyframes pbar-shimmer { to { transform: translateX(100%); } }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px 24px; font-size: 12px; }
  .info-grid .item { display: flex; gap: 6px; }
  .info-grid .k { color: var(--text-3); white-space: nowrap; }
  .info-grid .v { color: var(--text); word-break: break-all; }

  .list-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0;
    border-bottom: 1px solid rgba(33,33,33,.06); }
  .list-row:last-child { border-bottom: none; }
  .list-row .meta { display: flex; align-items: center; gap: 8px; color: var(--text-3); font-size: 11px; font-family: var(--font-mono); }
  .list-row .art-main { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
  .list-row .art-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  .info-grid .v a.link { color: var(--blue); text-decoration: none; cursor: pointer; }
  .info-grid .v a.link:hover { text-decoration: underline; }
  .km-axis { display: flex; justify-content: space-between; margin-top: 8px; padding: 0 2px;
    font-size: 10px; color: var(--text-3); font-family: var(--font-mono); }
  .km-axis-title { text-align: center; font-size: 11px; color: var(--text-3); margin-top: 2px; font-family: var(--font-mono); }
  .km-chart-row { display:flex; }
  .km-chart-row > .km-chart, .km-chart-row > .cmp-chart-area { flex:1; min-width:0; }
  .km-yaxis { display:flex; flex-direction:column; justify-content:space-between; padding:12px 0; width:30px; flex-shrink:0; }
  .km-yaxis span { font-size:9px; font-family:var(--font-mono); color:var(--text-3); text-align:right; line-height:1; white-space:nowrap; padding-right:4px; display:block; }
  .km-chart-row + .km-axis { padding-left:30px; }
  .km-chart-row + .km-axis + .km-axis-title { padding-left:30px; }
  .tag { font-size: 10px; padding: 3px 10px; border-radius: 999px; font-family: var(--font-mono); letter-spacing: .04em; }
  .tag.best { background: var(--green-soft); color: var(--green); border: 1px solid rgba(23,114,69,.18); }
  .ev-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid rgba(33,33,33,.06); }
  .ev-row:last-child { border-bottom: none; }
  .ev-row .ev-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 4px rgba(33,33,33,.04); }
  .ev-time { color: var(--text-3); font-size: 11px; font-family: var(--font-mono); flex-shrink: 0; }
  .ev-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; cursor: default; }

  .diag { display: grid; grid-template-columns: 1.4fr 1.3fr; gap: 24px; margin-bottom: 14px; }
  .diag p { color: var(--text-2); margin-bottom: 9px; line-height: 1.7; }
  .diag .hl { color: var(--blue); font-weight: 600; }
  .diag .hl-red { color: var(--red); font-weight: 600; }
  .btns { display: flex; gap: 10px; margin-top: 16px; }
  .btn { padding: 10px 20px; border-radius: 999px; cursor: pointer; border: 1px solid transparent;
    font-family: var(--font-body); font-size: 13px; font-weight: 600; transition: all .15s; }
  .btn.primary { background: #000; color: #fff; border-color: #000; box-shadow: 0 12px 24px rgba(22,23,28,.14); }
  .btn.primary:hover { background: #212121; transform: translateY(-1px); }
  .btn.ghost { background: rgba(255,255,255,.9); color: var(--text-2); border-color: var(--border); box-shadow: inset 0 1px 0 rgba(255,255,255,.65); }
  .btn.ghost:hover { background: #fff; border-color: var(--border-strong); color: var(--text); }
  .diag-prev { display: flex; flex-direction: column; }
  .diag-prev .cap { color: var(--text-3); font-size: 12px; font-family: var(--font-mono); }
  .diag-prev .big { font-family: var(--font-display); font-size: 20px; font-weight: 600; margin: 2px 0 6px; }
  .diag-split-head { display: flex; flex-direction: column; gap: 8px; margin-bottom: 6px; }
  .diag-legend { display: flex; gap: 16px; font-size: 12px; font-weight: 600; }
  .diag-legend i.lg { display: inline-block; width: 14px; height: 0; border-top: 2px solid currentColor;
    vertical-align: middle; margin-right: 5px; }
  .diag-legend i.lg.dash { border-top-style: dashed; }

  .section-title { font-family: var(--font-display); font-size: 17px; font-weight: 600; letter-spacing: -.02em;
    margin: 24px 0 14px; display: flex; justify-content: space-between; align-items: center; }
  .km-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .km-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .km-label { color: var(--text-3); font-size: 11px; font-family: var(--font-mono); letter-spacing: .03em; }
  .km-val { font-family: var(--font-display); font-size: 26px; font-weight: 600; letter-spacing: -.03em; }
  .km-val.bad { color: var(--red); }
  .km-anom { color: var(--red); font-size: 12px; max-width: 230px; text-align: right; line-height: 1.5; }
  .km-chart { position: relative; }
  .km-band-label { position: absolute; left: 50%; transform: translate(-50%,-50%); z-index: 2;
    background: rgba(232,244,238,.92); color: var(--green); font-size: 11px; white-space: nowrap;
    padding: 2px 10px; border-radius: 999px; border: 1px solid rgba(23,114,69,.30);
    font-family: var(--font-mono); letter-spacing: .03em; pointer-events: none;
    box-shadow: 0 2px 6px rgba(23,114,69,.10); }
  svg { display: block; }

  /* dual-line key metric card */
  .km-dual-vals { display:flex; gap:16px; margin-top:4px; }
  .km-dual-item { display:flex; flex-direction:column; gap:1px; }
  .km-dual-legend { font-size:10px; font-family:var(--font-mono); letter-spacing:.03em; }
  .km-dual-val { font-family:var(--font-display); font-size:20px; font-weight:600; letter-spacing:-.03em; color:var(--red); }

  /* causal chain diagnosis */
  .causal-wrap { display:flex; flex-direction:column; gap:0; margin-bottom:12px; }
  .causal-row { display:flex; gap:10px; align-items:flex-start; position:relative; }
  .causal-row:not(:last-child)::after { content:""; position:absolute; left:83px; top:26px; bottom:-2px;
    width:1px; background:var(--border); }
  .causal-step-col { min-width:72px; text-align:right; font-family:var(--font-mono); font-size:11px;
    color:var(--text-3); padding-top:5px; flex-shrink:0; }
  .causal-dot-col { padding-top:5px; flex-shrink:0; }
  .causal-dot2 { width:10px; height:10px; border-radius:50%; }
  .causal-dot2.warn { background:#ffab00; }
  .causal-dot2.crit { background:var(--red); }
  .causal-dot2.stop { background:var(--text-3); }
  .causal-body { flex:1; padding:0 0 13px; }
  .causal-signal { font-size:13px; font-weight:600; line-height:1.4; }
  .causal-signal.warn { color:var(--orange); }
  .causal-signal.crit { color:var(--red); }
  .causal-signal.stop { color:var(--text-2); }
  .causal-note { font-size:11px; color:var(--text-3); margin-top:2px; line-height:1.5; }
  .causal-badge { display:inline-block; font-size:10px; font-family:var(--font-mono);
    background:rgba(23,114,69,.12); color:var(--green); border:1px solid rgba(23,114,69,.25);
    border-radius:999px; padding:1px 9px; margin-top:5px; }
  .diag-recommend { font-size:12px; color:var(--text-2); line-height:1.7; margin-bottom:12px; }

  /* drill-down horizontal chain */
  .dd-spike-title { font-family:var(--font-display); font-size:13px; font-weight:600; color:var(--red);
    margin-bottom:11px; line-height:1.45; letter-spacing:-.01em; }
  .dd-chain { display:flex; gap:0; margin-bottom:14px; align-items:stretch; }
  .dd-sep { display:flex; align-items:center; padding:0 4px; flex-shrink:0; }
  .dd-sep-arrow { display:flex; align-items:center; gap:0; color:rgba(180,35,24,.65); }
  .dd-sep-line { width:16px; height:3px; background:rgba(180,35,24,.50); border-radius:2px; }

  .ev .msg{color:var(--ink);}
  .ev.warn .msg{color:var(--amber);} .ev.warn .sev{background:var(--amber);}
  .ev.crit .msg{color:var(--red);} .ev.crit .sev{background:var(--red);}
  .ev.info .sev{background:var(--blue);} .ev.info .msg{color:var(--mut);}
  .ev.ok .sev{background:var(--teal);} .ev.ok .msg{color:var(--teal);}
 
  /* data pipeline */
  .pipe{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .mix{margin-top:4px;}
  .mixrow{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:6px;}
  .mixrow .nm{width:62px;color:var(--mut);}
  .mixbar{flex:1;height:6px;background:var(--bg2);border-radius:4px;overflow:hidden;}
  .mixbar i{display:block;height:100%;background:var(--blue);border-radius:4px;}
  .mixrow .pc{font-family:var(--mono);color:var(--ink);width:36px;text-align:right;}
 
  /* what-if */
  .ctrl{display:grid;grid-template-columns:1fr 1fr;gap:13px 18px;}
  .ctrl .field label{display:flex;justify-content:space-between;font-size:12px;color:var(--mut);margin-bottom:6px;}
  .ctrl .field label b{color:var(--purple);font-family:var(--mono);font-weight:600;}
  input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:5px;border-radius:4px;background:var(--bg2);outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--purple);cursor:pointer;border:2px solid var(--panel);}
  input[type=range]::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:var(--purple);cursor:pointer;border:2px solid var(--panel);}
  .outgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px;}
  .out{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:11px 12px;}
  .out .k{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;}
  .out .v{font-size:18px;font-weight:600;font-family:var(--mono);margin-top:3px;}
  .out .d{font-size:11px;font-family:var(--mono);margin-top:2px;}
  .up{color:var(--teal)} .down{color:var(--red)} .flat{color:var(--dim)}
  .note{font-size:11px;color:var(--dim);margin-top:13px;line-height:1.6;}
 
  @media(max-width:820px){.grid{grid-template-columns:1fr}.vitals{grid-template-columns:repeat(3,1fr)}.chartrow{grid-template-columns:1fr}.heat{grid-template-columns:repeat(32,1fr)}}
  @media(max-width:640px){.vitals{grid-template-columns:repeat(2,1fr)}.ctrl,.outgrid,.pipe{grid-template-columns:1fr 1fr}.outgrid{grid-template-columns:1fr 1fr}}

  /* 任务模式下无数据区域置灰 */
  .no-data{position:relative;pointer-events:none;}
  .no-data > *{opacity:.18;filter:grayscale(.85);}
  .card.no-data::after{content:'暂无任务数据';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--mut);letter-spacing:1px;}
  .chartbox.no-data::after{content:'暂无';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--mut);}
</style>

<body>
<div class=&quot;wrap&quot;>
 
  <header>
    <div class=&quot;run&quot;>
      <h1>训练孪生体控制台</h1>
      <div class=&quot;meta mono&quot;>run <b style=&quot;color:var(--ink)&quot;>atlas-70B-r3</b> · 70B dense · seq 8192 · 512×H100</div>
    </div>
    <span class=&quot;pill ok&quot;><span class=&quot;dot&quot;></span>TRAINING</span>
    <div class=&quot;sync&quot;><span class=&quot;dot&quot;></span>孪生镜像同步 · <span id=&quot;syncLag&quot; class=&quot;mono&quot;>12</span>ms 前 · 回灌校准 OK</div>
  </header>
 
  <!-- vitals -->
  <div class=&quot;vitals&quot;>
    <div class=&quot;vital&quot;><div class=&quot;k&quot;>Step</div><div class=&quot;v&quot; id=&quot;vStep&quot;>—</div><div class=&quot;s&quot; id=&quot;vStepSub&quot;>—</div></div>
    <div class=&quot;vital&quot;><div class=&quot;k&quot;>Train loss</div><div class=&quot;v&quot; id=&quot;vLoss&quot;>—</div><div class=&quot;s&quot; id=&quot;vLossSub&quot;>—</div></div>
    <div class=&quot;vital&quot;><div class=&quot;k&quot;>MFU</div><div class=&quot;v&quot; id=&quot;vMfu&quot;>—</div><div class=&quot;s&quot;>model flops util</div></div>
    <div class=&quot;vital&quot;><div class=&quot;k&quot;>Throughput</div><div class=&quot;v&quot; id=&quot;vTok&quot;>—</div><div class=&quot;s&quot;>tokens / sec</div></div>
    <div class=&quot;vital&quot;><div class=&quot;k&quot;>Tokens seen</div><div class=&quot;v&quot; id=&quot;vSeen&quot;>—</div><div class=&quot;s&quot; id=&quot;vSeenSub&quot;>—</div></div>
    <div class=&quot;vital&quot;><div class=&quot;k&quot;>ETA</div><div class=&quot;v&quot; id=&quot;vEta&quot;>—</div><div class=&quot;s&quot;>至 3.0T tokens</div></div>
  </div>
 
  <div class=&quot;grid&quot;>
    <!-- LEFT COLUMN -->
    <div class=&quot;col&quot;>
 
      <!-- training dynamics -->
      <div class=&quot;card&quot;>
        <h2>训练动态 · 模型层 <span class=&quot;tag&quot;>dim 3</span></h2>
        <p class=&quot;desc&quot;>loss / 梯度 / 学习率 / MFU 实时曲线 — 孪生体据此判断收敛健康度并捕捉 loss spike</p>
        <div class=&quot;chartrow&quot;>
          <div class=&quot;chartbox&quot;>
            <div class=&quot;lbl&quot;><span class=&quot;name&quot;>Train / Val loss</span><span class=&quot;now&quot; id=&quot;lossNow&quot; style=&quot;color:var(--teal)&quot;>—</span></div>
            <svg class=&quot;chart&quot; id=&quot;lossChart&quot; viewBox=&quot;0 0 320 110&quot; preserveAspectRatio=&quot;none&quot;></svg>
          </div>
          <div class=&quot;chartbox&quot;>
            <div class=&quot;lbl&quot;><span class=&quot;name&quot;>MFU %</span><span class=&quot;now mono&quot; id=&quot;mfuNow&quot; style=&quot;color:var(--purple)&quot;>—</span></div>
            <svg class=&quot;chart&quot; id=&quot;mfuChart&quot; viewBox=&quot;0 0 150 110&quot; preserveAspectRatio=&quot;none&quot;></svg>
          </div>
          <div class=&quot;chartbox&quot;>
            <div class=&quot;lbl&quot;><span class=&quot;name&quot;>Grad norm</span><span class=&quot;now mono&quot; id=&quot;gnNow&quot; style=&quot;color:var(--amber)&quot;>—</span></div>
            <svg class=&quot;chart&quot; id=&quot;gnChart&quot; viewBox=&quot;0 0 150 110&quot; preserveAspectRatio=&quot;none&quot;></svg>
          </div>
        </div>
      </div>
 
      <!-- gpu cluster -->
      <div class=&quot;card&quot; id=&quot;cardHw&quot;>
        <h2>硬件 · 基础设施层 <span class=&quot;tag&quot;>dim 1</span></h2>
        <p class=&quot;desc&quot;>512×H100 · 64 节点 — 单元格按结温着色，红色为降频/掉卡风险</p>
        <div class=&quot;heat&quot; id=&quot;heat&quot;></div>
        <div class=&quot;legend&quot;>
          <span><i class=&quot;sw&quot; style=&quot;background:var(--teal-d)&quot;></i>&amp;lt;72°C</span>
          <span><i class=&quot;sw&quot; style=&quot;background:var(--amber)&quot;></i>72–82°C</span>
          <span><i class=&quot;sw&quot; style=&quot;background:var(--red)&quot;></i>&amp;gt;82°C / 异常</span>
          <span style=&quot;margin-left:auto&quot; id=&quot;heatStat&quot; class=&quot;mono&quot;></span>
        </div>
      </div>
 
      <!-- system / software -->
      <div class=&quot;card&quot; id=&quot;cardSys&quot;>
        <h2>系统 · 软件运行层 <span class=&quot;tag&quot;>dim 2</span></h2>
        <p class=&quot;desc&quot;>并行配置 TP4·PP4·DP32 · NCCL 集合通信与显存占用</p>
        <div class=&quot;bars&quot; id=&quot;sysBars&quot;></div>
      </div>
 
    </div>
 
    <!-- RIGHT COLUMN -->
    <div class=&quot;col&quot;>
 
      <!-- fault prediction -->
      <div class=&quot;card&quot; id=&quot;cardRisk&quot;>
        <h2>预测 · 故障预警 <span class=&quot;tag&quot;>twin · forecast</span></h2>
        <p class=&quot;desc&quot;>代理模型综合多维信号，给出未来 30 分钟中断概率</p>
        <div class=&quot;risk&quot;>
          <div class=&quot;risknum&quot; id=&quot;riskNum&quot;>—</div>
          <div>
            <div id=&quot;riskLabel&quot; style=&quot;font-weight:600&quot;>—</div>
            <div class=&quot;riskmeta&quot;>30-min 中断概率 · 置信 87%</div>
          </div>
        </div>
        <div class=&quot;factors&quot; id=&quot;factors&quot;></div>
      </div>
 
      <!-- event feed -->
      <div class=&quot;card&quot; id=&quot;cardFeed&quot;>
        <h2>可靠性 · 运维事件 <span class=&quot;tag&quot;>dim 7</span></h2>
        <p class=&quot;desc&quot;>异常 / 重启 / 抢占 / straggler 实时流</p>
        <div class=&quot;feed&quot; id=&quot;feed&quot;></div>
      </div>
 
      <!-- data pipeline -->
      <div class=&quot;card&quot; id=&quot;cardPipe&quot;>
        <h2>数据管道层 <span class=&quot;tag&quot;>dim 4</span></h2>
        <p class=&quot;desc&quot;>配比 · 加载吞吐 · 序列长度分布</p>
        <div class=&quot;pipe&quot;>
          <div>
            <div style=&quot;font-size:11px;color:var(--mut);margin-bottom:7px&quot;>数据混合配比</div>
            <div class=&quot;mix&quot; id=&quot;mix&quot;></div>
          </div>
          <div class=&quot;bars&quot; id=&quot;dataBars&quot;></div>
        </div>
      </div>
 
    </div>
  </div>
 
  <!-- WHAT-IF -->
  <div class=&quot;card&quot; id=&quot;cardWhatif&quot; style=&quot;margin-top:14px&quot;>
    <h2>What-if · 配置 / 扩容推演 <span class=&quot;tag&quot;>dim 5 · twin sim</span></h2>
    <p class=&quot;desc&quot;>调整并行与批处理配置，孪生体预测吞吐、MFU、训练时长与成本（相对当前运行的变化）</p>
    <div class=&quot;ctrl&quot;>
      <div class=&quot;field&quot;><label>张量并行 TP <b id=&quot;lTP&quot;>4</b></label><input type=&quot;range&quot; id=&quot;rTP&quot; min=&quot;0&quot; max=&quot;3&quot; value=&quot;2&quot;></div>
      <div class=&quot;field&quot;><label>流水并行 PP <b id=&quot;lPP&quot;>4</b></label><input type=&quot;range&quot; id=&quot;rPP&quot; min=&quot;0&quot; max=&quot;4&quot; value=&quot;2&quot;></div>
      <div class=&quot;field&quot;><label>数据并行 DP <b id=&quot;lDP&quot;>32</b></label><input type=&quot;range&quot; id=&quot;rDP&quot; min=&quot;1&quot; max=&quot;64&quot; value=&quot;32&quot;></div>
      <div class=&quot;field&quot;><label>Micro-batch <b id=&quot;lMB&quot;>2</b></label><input type=&quot;range&quot; id=&quot;rMB&quot; min=&quot;0&quot; max=&quot;3&quot; value=&quot;1&quot;></div>
      <div class=&quot;field&quot;><label>梯度累积 <b id=&quot;lGA&quot;>8</b></label><input type=&quot;range&quot; id=&quot;rGA&quot; min=&quot;0&quot; max=&quot;5&quot; value=&quot;3&quot;></div>
      <div class=&quot;field&quot;><label>GPU 单价 $/h <b id=&quot;lPR&quot;>2.5</b></label><input type=&quot;range&quot; id=&quot;rPR&quot; min=&quot;10&quot; max=&quot;40&quot; value=&quot;25&quot;></div>
    </div>
    <div class=&quot;outgrid&quot;>
      <div class=&quot;out&quot;><div class=&quot;k&quot;>集群规模 GPUs</div><div class=&quot;v&quot; id=&quot;oWorld&quot;>—</div><div class=&quot;d flat&quot; id=&quot;dWorld&quot;>—</div></div>
      <div class=&quot;out&quot;><div class=&quot;k&quot;>预测 MFU</div><div class=&quot;v&quot; id=&quot;oMfu&quot;>—</div><div class=&quot;d&quot; id=&quot;dMfu&quot;>—</div></div>
      <div class=&quot;out&quot;><div class=&quot;k&quot;>预测吞吐 tok/s</div><div class=&quot;v&quot; id=&quot;oTok&quot;>—</div><div class=&quot;d&quot; id=&quot;dTok&quot;>—</div></div>
      <div class=&quot;out&quot;><div class=&quot;k&quot;>全局 batch</div><div class=&quot;v&quot; id=&quot;oBatch&quot;>—</div><div class=&quot;d flat&quot; id=&quot;dBatch&quot;>—</div></div>
      <div class=&quot;out&quot;><div class=&quot;k&quot;>预计剩余时长</div><div class=&quot;v&quot; id=&quot;oEta&quot;>—</div><div class=&quot;d&quot; id=&quot;dEta&quot;>—</div></div>
      <div class=&quot;out&quot;><div class=&quot;k&quot;>剩余 GPU·小时</div><div class=&quot;v&quot; id=&quot;oGh&quot;>—</div><div class=&quot;d&quot; id=&quot;dGh&quot;>—</div></div>
      <div class=&quot;out&quot;><div class=&quot;k&quot;>剩余算力成本</div><div class=&quot;v&quot; id=&quot;oCost&quot;>—</div><div class=&quot;d&quot; id=&quot;dCost&quot;>—</div></div>
      <div class=&quot;out&quot;><div class=&quot;k&quot;>流水 bubble</div><div class=&quot;v&quot; id=&quot;oBub&quot;>—</div><div class=&quot;d flat&quot;>PP 气泡占比</div></div>
    </div>
    <p class=&quot;note&quot;>模型为演示用简化代理：MFU 随 TP 通信开销与 PP 气泡下降，micro-batch 过小损失核效率；真实孪生体会用历史 run 校准这些系数。当前基线 TP4·PP4·DP32 · MFU≈51% · 512 GPU。</p>
  </div>
 
</div>
 
<script>
(function(){
  const $=id=>document.getElementById(id);
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const rand=(a,b)=>a+Math.random()*(b-a);
 
  // ---- formatters ----
  function fmtBig(n){ if(n>=1e12)return (n/1e12).toFixed(2)+'T'; if(n>=1e9)return (n/1e9).toFixed(2)+'B'; if(n>=1e6)return (n/1e6).toFixed(1)+'M'; if(n>=1e3)return (n/1e3).toFixed(1)+'k'; return Math.round(n).toString(); }
  function fmtTime(s){ s=Math.max(0,s); const d=Math.floor(s/86400),h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60); if(d>0)return d+'d '+h+'h'; if(h>0)return h+'h '+m+'m'; return m+'m'; }
  function fmtMoney(n){ if(n>=1e6)return '$'+(n/1e6).toFixed(2)+'M'; if(n>=1e3)return '$'+(n/1e3).toFixed(1)+'k'; return '$'+Math.round(n); }
 
  // ---- state ----
  const S={
    step:48230, totalSteps:120000,
    seen:1.31e12, target:3.0e12,
    loss:2.182, lossEMA:2.182, val:2.246,
    mfu:0.512, gn:0.84, lr:2.4e-4,
    world:512, params:70e9, peak:989e12,
    hist:{loss:[],val:[],mfu:[],gn:[]},
    gpus:[], spike:0, riskHist:0.08
  };
  const N=512, COLS=32;
  for(let i=0;i<N;i++){ S.gpus.push({util:rand(.88,.99),temp:rand(58,70),mem:rand(.74,.86),ecc:0,bad:false}); }
  // seed a few warm + one straggler
  S.gpus[37].temp=84; S.gpus[37].bad='straggler'; S.gpus[37].util=.71;
  S.gpus[201].temp=78; S.gpus[330].temp=76;
 
  // seed history (~96 pts) with realistic decay
  for(let i=0;i<96;i++){
    const t=i/96;
    const l=2.55-0.42*t+ (Math.random()-.5)*0.04;
    S.hist.loss.push(l);
    S.hist.val.push(l+0.06+(Math.random()-.5)*0.02);
    S.hist.mfu.push(0.51+(Math.random()-.5)*0.05);
    S.hist.gn.push(0.8+(Math.random()-.5)*0.25);
  }
  S.loss=S.hist.loss[95]; S.lossEMA=S.loss;
 
  // ---- svg line drawing ----
  function path(data,W,H,pad){
    pad=pad||4; let mn=Math.min(...data),mx=Math.max(...data); if(mx-mn<1e-6)mx=mn+1;
    const n=data.length;
    return data.map((v,i)=>{
      const x=pad+(W-2*pad)*i/(n-1);
      const y=H-pad-(H-2*pad)*(v-mn)/(mx-mn);
      return (i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1);
    }).join(' ');
  }
  function drawChart(svg,series){
    const vb=svg.getAttribute('viewBox').split(' '),W=+vb[2],H=+vb[3];
    let html='';
    // grid baseline
    html+='<line x1=&quot;0&quot; y1=&quot;'+(H-4)+'&quot; x2=&quot;'+W+'&quot; y2=&quot;'+(H-4)+'&quot; stroke=&quot;rgba(255,255,255,.06)&quot;/>';
    series.forEach(s=>{
      const d=path(s.data,W,H,5);
      if(s.fill){
        const area=d+' L'+(W-5)+' '+(H-5)+' L5 '+(H-5)+' Z';
        html+='<path d=&quot;'+area+'&quot; fill=&quot;'+s.color+'&quot; opacity=&quot;.10&quot;/>';
      }
      html+='<path d=&quot;'+d+'&quot; fill=&quot;none&quot; stroke=&quot;'+s.color+'&quot; stroke-width=&quot;'+(s.w||1.6)+'&quot; stroke-linejoin=&quot;round&quot; stroke-linecap=&quot;round&quot; opacity=&quot;'+(s.op||1)+'&quot;/>';
    });
    svg.innerHTML=html;
  }
 
  // ---- heatmap ----
  const heat=$('heat');
  for(let i=0;i<N;i++){ const c=document.createElement('div'); c.className='cell'; heat.appendChild(c); }
  const cells=heat.children;
  function tempColor(t,bad){
    if(bad)return 'var(--red)';
    if(t>82)return 'var(--red)';
    if(t>72)return 'var(--amber)';
    // interpolate teal darkness by util
    return 'var(--teal-d)';
  }
  function renderHeat(){
    let mx=0,nbad=0,avg=0;
    for(let i=0;i<N;i++){ const g=S.gpus[i]; const c=cells[i];
      c.style.background=tempColor(g.temp,g.bad);
      c.style.boxShadow = g.bad ? '0 0 0 1px var(--red)' : 'none';
      c.title='GPU '+i+' · node-'+(i>>3)+' · '+g.temp.toFixed(0)+'°C · util '+(g.util*100).toFixed(0)+'% · HBM '+(g.mem*100).toFixed(0)+'%'+(g.bad?' · '+g.bad:'');
      mx=Math.max(mx,g.temp); avg+=g.temp; if(g.temp>82||g.bad)nbad++;
    }
    $('heatStat').textContent='peak '+mx.toFixed(0)+'°C · avg '+(avg/N).toFixed(0)+'°C · 异常 '+nbad;
  }
 
  // ---- system bars ----
  function bar(name,val,pct,color){
    return '<div class=&quot;bar&quot;><div class=&quot;top&quot;><span style=&quot;color:var(--mut)&quot;>'+name+'</span><span class=&quot;val&quot;>'+val+'</span></div>'+
      '<div class=&quot;track&quot;><div class=&quot;fill&quot; style=&quot;width:'+clamp(pct,0,100)+'%;background:'+color+'&quot;></div></div></div>';
  }
 
  // ---- data mix ----
  const MIX=[['Web',43,'var(--blue)'],['Code',22,'var(--purple)'],['书籍/论文',16,'var(--teal)'],['多语种',13,'var(--amber)'],['数学',6,'var(--red)']];
  $('mix').innerHTML=MIX.map(m=>'<div class=&quot;mixrow&quot;><span class=&quot;nm&quot;>'+m[0]+'</span><span class=&quot;mixbar&quot;><i style=&quot;width:'+m[1]+'%;background:'+m[2]+'&quot;></i></span><span class=&quot;pc&quot;>'+m[1]+'%</span></div>').join('');
 
  // ---- event feed ----
  const feed=$('feed'); const EVB=[
    ['info','checkpoint 写入完成 · step {s} · 用时 41s'],
    ['ok','NCCL all-reduce 带宽恢复至 388 GB/s'],
    ['info','数据分片 shard-{r} 预取完成'],
    ['warn','node-{r} GPU{g} 结温 84°C · 触发降频预警'],
    ['warn','straggler 检测 · node-37 落后 1.8× · 平均步长'],
    ['info','梯度同步耗时 11.2ms · overlap 92%'],
    ['ok','EMA loss 持续下降 · 收敛正常'],
    ['warn','dataloader 等待 6.3% · I/O 轻度瓶颈'],
  ];
  function clock(){ const d=new Date(); return d.toTimeString().slice(0,8); }
  function pushEvent(sev,msg){
    const el=document.createElement('div'); el.className='ev '+sev;
    el.innerHTML='<span class=&quot;t&quot;>'+clock()+'</span><span class=&quot;sev&quot;></span><span class=&quot;msg&quot;>'+msg+'</span>';
    feed.insertBefore(el,feed.firstChild);
    while(feed.children.length>40)feed.removeChild(feed.lastChild);
  }
  function seedEvents(){ for(let i=0;i<6;i++){ const e=EVB[Math.floor(rand(0,EVB.length))]; const msg=e[1].replace('{s}',(S.step-i*40)).replace('{r}',Math.floor(rand(0,64))).replace('{g}',Math.floor(rand(0,8))); pushEvent(e[0],msg); } }
 
  // ---- fault risk ----
  function computeRisk(){
    let mx=0,bad=0,warm=0; for(const g of S.gpus){ mx=Math.max(mx,g.temp); if(g.bad)bad++; if(g.temp>78)warm++; }
    const fThermal=clamp((mx-72)/18,0,1);
    const fStrag=clamp(bad*0.4,0,1);
    const fSpike=clamp(S.spike,0,1);
    const fEcc=clamp(warm/14,0,1);
    let r=0.04+0.45*fThermal+0.30*fStrag+0.30*fSpike+0.12*fEcc;
    r=clamp(r,0.02,0.97);
    S.riskHist=S.riskHist*0.6+r*0.4;
    return {r:S.riskHist,f:[['热/降频',fThermal],['Straggler',fStrag],['Loss spike',fSpike],['ECC/告警',fEcc]]};
  }
  function renderRisk(){
    const {r,f}=computeRisk(); const pct=Math.round(r*100);
    const col = r>0.5?'var(--red)': r>0.22?'var(--amber)':'var(--teal)';
    const lab = r>0.5?'高 · 建议预防性 checkpoint': r>0.22?'中 · 持续观察':'低 · 稳定';
    $('riskNum').textContent=pct+'%'; $('riskNum').style.color=col;
    $('riskLabel').textContent=lab; $('riskLabel').style.color=col;
    $('factors').innerHTML=f.map(x=>'<div class=&quot;factor&quot;><span style=&quot;color:var(--mut);width:78px&quot;>'+x[0]+'</span><span class=&quot;ftrack&quot;><i class=&quot;ffill&quot; style=&quot;width:'+Math.round(x[1]*100)+'%;background:'+col+'&quot;></i></span><span class=&quot;mono&quot; style=&quot;width:34px;text-align:right;color:var(--ink)&quot;>'+Math.round(x[1]*100)+'%</span></div>').join('');
  }
 
  // ---- main tick ----
  function tick(){
    S.step+=2;
    // loss dynamics + occasional spike
    if(Math.random()<0.03 &amp;&amp; S.spike<0.2){ S.spike=rand(0.5,1); pushEvent('crit','⚠ loss spike 检测 · '+(S.loss+rand(.1,.3)).toFixed(3)+' · 孪生体上调中断概率'); }
    let target=Math.max(1.55, S.lossEMA-0.0008);
    S.loss=target + (Math.random()-.5)*0.03 + S.spike*rand(.05,.2);
    S.lossEMA=S.lossEMA*0.98+S.loss*0.02;
    S.spike*=0.78;
    S.val=S.lossEMA+0.06+(Math.random()-.5)*0.015;
    S.mfu=clamp(0.512+(Math.random()-.5)*0.04 - S.spike*0.05 - (S.gpus[37].bad?0.015:0),0.3,0.62);
    S.gn=clamp(0.82+(Math.random()-.5)*0.3+S.spike*1.5,0.2,4);
    S.seen+=S.mfu*S.world*S.peak/(6*S.params)*1; // ~tokens this tick
 
    // gpu thermal drift
    for(const g of S.gpus){ g.temp=clamp(g.temp+(Math.random()-.5)*1.4 + (g.bad?0.3:0) ,52,92); g.util=clamp(g.util+(Math.random()-.5)*0.03,.5,1); }
    if(Math.random()<0.04){ const i=Math.floor(rand(0,N)); S.gpus[i].temp=clamp(S.gpus[i].temp+rand(4,9),52,92); }
 
    // history push
    S.hist.loss.push(S.loss); S.hist.val.push(S.val); S.hist.mfu.push(S.mfu*100); S.hist.gn.push(S.gn);
    for(const k in S.hist){ if(S.hist[k].length>96)S.hist[k].shift(); }
 
    // random events
    if(Math.random()<0.5){ const e=EVB[Math.floor(rand(0,EVB.length))]; pushEvent(e[0],e[1].replace('{s}',S.step).replace('{r}',Math.floor(rand(0,64))).replace('{g}',Math.floor(rand(0,8)))); }
 
    render();
  }
 
  function render(){
    const tokps=S.mfu*S.world*S.peak/(6*S.params);
    const eta=(S.target-S.seen)/tokps;
    // vitals
    $('vStep').textContent=S.step.toLocaleString(); $('vStepSub').textContent='/ '+S.totalSteps.toLocaleString()+' · '+(S.step/S.totalSteps*100).toFixed(1)+'%';
    $('vLoss').textContent=S.loss.toFixed(3); $('vLossSub').textContent='val '+S.val.toFixed(3)+' · ema '+S.lossEMA.toFixed(3);
    $('vLoss').style.color = S.spike>0.3?'var(--red)':'var(--ink)';
    $('vMfu').innerHTML=(S.mfu*100).toFixed(1)+'<small>%</small>';
    $('vTok').textContent=fmtBig(tokps);
    $('vSeen').textContent=fmtBig(S.seen); $('vSeenSub').textContent='/ 3.0T · '+(S.seen/S.target*100).toFixed(1)+'%';
    $('vEta').textContent=fmtTime(eta);
 
    // charts
    $('lossNow').textContent=S.loss.toFixed(3);
    $('mfuNow').textContent=(S.mfu*100).toFixed(1)+'%';
    $('gnNow').textContent=S.gn.toFixed(2);
    drawChart($('lossChart'),[
      {data:S.hist.val,color:'var(--dim)',w:1.2,op:.7},
      {data:S.hist.loss,color:'var(--teal)',fill:true,w:1.8}
    ]);
    drawChart($('mfuChart'),[{data:S.hist.mfu,color:'var(--purple)',fill:true,w:1.6}]);
    drawChart($('gnChart'),[{data:S.hist.gn,color:'var(--amber)',w:1.6}]);
 
    renderHeat();
    renderRisk();
 
    // system bars
    const hbm=78+ (Math.random()-.5)*3, nvl=rand(360,420), net=rand(180,210), nccl=rand(8,14), frag=rand(4,9);
    $('sysBars').innerHTML=
      bar('HBM 显存占用','80.4 / 80 GB · '+hbm.toFixed(0)+'%',hbm,'var(--blue)')+
      bar('NVLink 带宽',nvl.toFixed(0)+' GB/s',nvl/450*100,'var(--teal)')+
      bar('IB 网络吞吐',net.toFixed(0)+' Gbps',net/200*100,'var(--purple)')+
      bar('NCCL all-reduce 耗时',nccl.toFixed(1)+' ms',100-nccl*4,'var(--amber)')+
      bar('显存碎片率',frag.toFixed(1)+'%',frag*4,'var(--mut)');
 
    // data bars
    const load=rand(580,640), prep=rand(2.1,3.4), wait=rand(2,7);
    $('dataBars').innerHTML=
      bar('加载吞吐',load.toFixed(0)+'k tok/s',load/700*100,'var(--blue)')+
      bar('预处理耗时',prep.toFixed(1)+' ms/batch',100-prep*15,'var(--teal)')+
      bar('dataloader 等待',wait.toFixed(1)+'%',100-wait*6,'var(--amber)')+
      bar('平均序列长度','7.6k / 8k tokens',95,'var(--purple)');
 
    $('syncLag').textContent=Math.floor(rand(8,22));
  }
 
  // ---- what-if ----
  const TPv=[1,2,4,8], PPv=[1,2,4,8,16], MBv=[1,2,4,8], GAv=[1,2,4,8,16,32];
  const baseline={mfu:0.512,world:512,tokps:0,eta:0,gh:0,cost:0,batch:512};
  function modelMFU(c){
    let m=0.58;
    m-=(c.TP-1)*0.012;                       // tensor-parallel comm overhead
    const bubble=(c.PP-1)/(c.GA+c.PP-1);     // pipeline bubble
    m*=(1-bubble*0.6);
    if(c.MB<2)m*=0.90;                        // tiny micro-batch hurts kernel eff
    m-=Math.max(0,(c.TP*c.PP-16))*0.004;
    return {mfu:clamp(m,0.12,0.62),bubble};
  }
  function whatif(){
    const c={TP:TPv[+$('rTP').value],PP:PPv[+$('rPP').value],DP:+$('rDP').value,MB:MBv[+$('rMB').value],GA:GAv[+$('rGA').value],price:(+$('rPR').value)/10};
    $('lTP').textContent=c.TP; $('lPP').textContent=c.PP; $('lDP').textContent=c.DP; $('lMB').textContent=c.MB; $('lGA').textContent=c.GA; $('lPR').textContent=c.price.toFixed(1);
    const world=c.TP*c.PP*c.DP;
    const {mfu,bubble}=modelMFU(c);
    const tokps=world*S.peak*mfu/(6*S.params);
    const batch=c.DP*c.MB*c.GA;
    const remaining=S.target-S.seen;
    const eta=remaining/tokps;
    const gh=world*eta/3600;
    const cost=gh*c.price;
 
    function delta(id,cur,base,inv,fmt){
      const e=$(id); if(base===0){e.textContent='—';e.className='d flat';return;}
      const pc=(cur-base)/base*100; const good = inv? pc<0 : pc>0;
      e.textContent=(pc>=0?'+':'')+pc.toFixed(0)+'% vs 当前';
      e.className='d '+(Math.abs(pc)<0.5?'flat':(good?'up':'down'));
    }
    $('oWorld').textContent=world; $('dWorld').textContent=(world-512>=0?'+':'')+(world-512)+' GPU';
    $('dWorld').className='d '+(world===512?'flat':(world>512?'down':'up'));
    $('oMfu').textContent=(mfu*100).toFixed(1)+'%'; delta('dMfu',mfu,baseline.mfu,false);
    $('oTok').textContent=fmtBig(tokps); delta('dTok',tokps,baseline.tokps,false);
    $('oBatch').textContent=batch; $('dBatch').textContent=(batch-512>=0?'+':'')+(batch-512)+' samples';
    $('oEta').textContent=fmtTime(eta); delta('dEta',eta,baseline.eta,true);
    $('oGh').textContent=fmtBig(gh); delta('dGh',gh,baseline.gh,true);
    $('oCost').textContent=fmtMoney(cost); delta('dCost',cost,baseline.cost,true);
    $('oBub').textContent=(bubble*100).toFixed(0)+'%';
  }
  ['rTP','rPP','rDP','rMB','rGA','rPR'].forEach(id=>$(id).addEventListener('input',whatif));
  // set baseline from default config
  (function(){ const c={TP:4,PP:4,DP:32,MB:2,GA:8,price:2.5}; const world=c.TP*c.PP*c.DP; const {mfu}=modelMFU(c);
    const tokps=world*S.peak*mfu/(6*S.params); const eta=(S.target-S.seen)/tokps;
    baseline.world=world;baseline.mfu=mfu;baseline.tokps=tokps;baseline.eta=eta;baseline.gh=world*eta/3600;baseline.cost=baseline.gh*c.price;baseline.batch=c.DP*c.MB*c.GA;
  })();
 
  // boot
  seedEvents(); render(); whatif();
  let simTimer=setInterval(tick,1200);

  // ================= 任务模式（来自父页面 postMessage）=================
  let MODE='demo';
  function greyVital(id){ const el=$(id); if(!el)return; el.innerHTML='—'; el.style.color=''; const v=el.closest('.vital'); if(v)v.classList.add('no-data'); }
  function ungreyVital(id){ const el=$(id); if(!el)return; const v=el.closest('.vital'); if(v)v.classList.remove('no-data'); }
  function greyCard(id){ const el=$(id); if(el)el.classList.add('no-data'); }
  function normMfu(arr){ if(!arr||!arr.length)return null; const mx=Math.max.apply(null,arr); return mx>1.5?arr.map(v=>v/100):arr.slice(); }

  function enterTaskMode(d){
    MODE='task'; d=d||{};
    if(simTimer){ clearInterval(simTimer); simTimer=null; }

    // header
    const h=document.querySelector('header .run h1'); const meta=document.querySelector('header .meta'); const sync=document.querySelector('header .sync');
    if(h) h.textContent='训练任务实况';
    if(meta) meta.innerHTML='run <b style=&quot;color:var(--ink)&quot;>'+(d.name||d.title||'-')+'</b>'+(d.gpuInfo?' · '+d.gpuInfo:'');
    if(sync) sync.style.display='none';

    // vitals — step / loss
    if(d.step!=null){ ungreyVital('vStep'); $('vStep').textContent=Number(d.step).toLocaleString(); $('vStepSub').textContent=(d.totalSteps!=null?'/ '+Number(d.totalSteps).toLocaleString():'')+(d.pct!=null?' · '+d.pct+'%':''); }
    else greyVital('vStep');
    if(d.lossLast!=null){ ungreyVital('vLoss'); $('vLoss').textContent=Number(d.lossLast).toFixed(3); $('vLoss').style.color='var(--ink)'; $('vLossSub').textContent=(d.val&amp;&amp;d.val.length)?('val '+d.val[d.val.length-1].toFixed(3)):'当前 loss'; }
    else greyVital('vLoss');
    const mfuArr=normMfu(d.mfu);
    if(mfuArr){ ungreyVital('vMfu'); $('vMfu').innerHTML=(mfuArr[mfuArr.length-1]*100).toFixed(1)+'<small>%</small>'; }
    else greyVital('vMfu');
    if(d.tput!=null){ ungreyVital('vTok'); $('vTok').textContent=fmtBig(d.tput); }
    else greyVital('vTok');
    greyVital('vSeen'); greyVital('vEta');

    // charts — loss / mfu / grad
    if(d.loss&amp;&amp;d.loss.length){
      const series=[]; if(d.val&amp;&amp;d.val.length)series.push({data:d.val,color:'var(--dim)',w:1.2,op:.7});
      series.push({data:d.loss,color:'var(--teal)',fill:true,w:1.8});
      drawChart($('lossChart'),series); $('lossNow').textContent=d.loss[d.loss.length-1].toFixed(3);
      $('lossChart').closest('.chartbox').classList.remove('no-data');
    } else { $('lossChart').innerHTML=''; $('lossNow').textContent='—'; $('lossChart').closest('.chartbox').classList.add('no-data'); }
    if(mfuArr){ drawChart($('mfuChart'),[{data:mfuArr.map(v=>v*100),color:'var(--purple)',fill:true,w:1.6}]); $('mfuNow').textContent=(mfuArr[mfuArr.length-1]*100).toFixed(1)+'%'; $('mfuChart').closest('.chartbox').classList.remove('no-data'); }
    else { $('mfuChart').innerHTML=''; $('mfuNow').textContent='—'; $('mfuChart').closest('.chartbox').classList.add('no-data'); }
    if(d.gradNorm&amp;&amp;d.gradNorm.length){ drawChart($('gnChart'),[{data:d.gradNorm,color:'var(--amber)',w:1.6}]); $('gnNow').textContent=d.gradNorm[d.gradNorm.length-1].toFixed(2); $('gnChart').closest('.chartbox').classList.remove('no-data'); }
    else { $('gnChart').innerHTML=''; $('gnNow').textContent='—'; $('gnChart').closest('.chartbox').classList.add('no-data'); }

    // events
    feed.innerHTML='';
    const evs=d.events||[];
    if(evs.length){ evs.forEach(e=>{ const el=document.createElement('div'); el.className='ev '+(e.sev||'info'); el.innerHTML='<span class=&quot;t&quot;>'+(e.time||'')+'</span><span class=&quot;sev&quot;></span><span class=&quot;msg&quot;>'+(e.msg||'')+'</span>'; feed.appendChild(el); }); $('cardFeed').classList.remove('no-data'); }
    else greyCard('cardFeed');

    // 无任务遥测的区域整体置灰
    greyCard('cardHw'); greyCard('cardSys'); greyCard('cardRisk'); greyCard('cardPipe'); greyCard('cardWhatif');
  }

  function exitTaskMode(){ location.reload(); }

  window.addEventListener('message',function(e){
    const m=e&amp;&amp;e.data; if(!m||typeof m!=='object')return;
    if(m.type==='twin:task') enterTaskMode(m.data);
    else if(m.type==='twin:demo'){ if(MODE==='task') exitTaskMode(); }
  });
})();
</script>

// ---------- chart helpers ----------
function pathFrom(data, w, h, pad){
  const min = Math.min(...data), max = Math.max(...data), rng = (max-min)||1;
  const step = (w-pad*2)/(data.length-1);
  return data.map((v,i)=>{
    const x = pad+i*step, y = pad+(h-pad*2)*(1-(v-min)/rng);
    return (i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1);
  }).join(' ');
}
// TensorBoard 式指数滑动平均（带去偏修正）。weight∈[0,1)，0=不平滑，越大越平滑。
function smoothEMA(data, weight){
  if(!(weight>0) || !data || data.length===0) return (data||[]).slice();
  const res = new Array(data.length);
  let acc = 0, deb = 0;
  for(let i=0;i<data.length;i++){
    const v = data[i];
    if(!isFinite(v)){ res[i] = v; continue; }
    acc = acc*weight + (1-weight)*v;
    deb = deb*weight + (1-weight);
    res[i] = acc/deb;
  }
  return res;
}
// 按外部给定的 min/max 生成折线路径，使平滑曲线与原始曲线共用同一纵轴刻度。
function pathScaled(data, w, h, pad, min, max){
  const rng = (max-min)||1;
  const step = (w-pad*2)/((data.length-1)||1);
  return data.map((v,i)=>{
    const x = pad+i*step, y = pad+(h-pad*2)*(1-(v-min)/rng);
    return (i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1);
  }).join(' ');
}
// 平滑拖动条控件 HTML（label + range + 数值）。val∈[0,1)
function smoothCtrlHtml(id, val){
  return `<span class="smooth-ctrl" title="曲线平滑（指数滑动平均）">
    <span class="smooth-label">Smoothing</span>
    <input type="range" id="${id}" min="0" max="0.95" step="0.05" value="${val}">
    <span class="smooth-val" id="${id}Val">${(+val).toFixed(2)}</span>
  </span>`;
}
let _sparkId = 0;
function sparkSVG(data, color){
  const w=110,h=34,pad=3;
  const line = pathFrom(data,w,h,pad);
  const area = line + ` L ${w-pad} ${h-pad} L ${pad} ${h-pad} Z`;
  const gid = 'sg'+(_sparkId++);
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${color}" stop-opacity="0.30"/>
      <stop offset="1" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#${gid})" stroke="none"/>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}
// 返回值：若存在「最佳收敛区间」绿带，返回其在图内的垂直中心 y（像素，与 SVG 高度 1:1），否则 null。
// 绿带由曲线尾段（已收敛的平稳段）的取值范围自动推导，因此始终贴合曲线收敛后停留的水平区间。
function bigChart(el, data, color, band, smooth){
  const w = el.clientWidth||460, h=150, pad=12;
  const min = Math.min(...data), max = Math.max(...data), rng=(max-min)||1;
  const Y = v => pad + (h-pad*2)*(1-(v-min)/rng);
  const line = pathFrom(data,w,h,pad);
  const sm = (smooth>0) ? smoothEMA(data, smooth) : null;
  const smLine = sm ? pathScaled(sm, w, h, pad, min, max) : '';
  let bandRect='', bandY=null;
  if(band==='red'){
    bandRect=`<rect x="${w*0.62}" y="${pad}" width="${w*0.38-pad}" height="${h-pad*2}" fill="rgba(180,35,24,.10)"/>`;
  } else if(band && band.indexOf('green')===0){
    // 取尾段（最后约 1/4，至少 5 个点）作为收敛后的平稳段，绿带恰好落在曲线停留的水平区间
    const tail = data.slice(Math.max(0, data.length - Math.max(5, Math.round(data.length*0.25))));
    let top = Y(Math.max(...tail)), bot = Y(Math.min(...tail));
    const minH = 24;                                   // 平稳段过窄时给绿带一个最小可视厚度
    if(bot-top < minH){ const c=(top+bot)/2; top=c-minH/2; bot=c+minH/2; }
    top = Math.max(pad, top); bot = Math.min(h-pad, bot);
    bandRect=`<rect x="${pad}" y="${top.toFixed(1)}" width="${w-pad*2}" height="${(bot-top).toFixed(1)}" fill="rgba(23,114,69,.15)"/>`;
    bandY = (top+bot)/2;
  }
  const area = line+` L ${w-pad} ${h-pad} L ${pad} ${h-pad} Z`;
  el.innerHTML = `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    ${bandRect}<path d="${area}" fill="${color}" opacity="0.06"/>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="${sm?1.2:2}" opacity="${sm?0.32:1}" stroke-linejoin="round" stroke-linecap="round"/>
    ${sm?`<path d="${smLine}" fill="none" stroke="${color}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>`:''}</svg>`;
  return bandY;
}
// 为 km-chart 内的 bigChart 添加鼠标悬浮气泡（step + 指标值），兼容 linkKmTopCards 三表联动
function addKmHoverTip(el, data, label, color, stepMax){

  if(!svg) return;
  const vb = svg.viewBox.baseVal;
  const w = vb.width||460, h = vb.height||150, pad = 12;
  const N = data.length, span = N > 1 ? N-1 : 1;
  const stepX = (w - pad*2)/span;
  const minV = Math.min(...data), maxV = Math.max(...data), rng = (maxV-minV)||1;
  const Y = v => pad + (h-pad*2)*(1-(v-minV)/rng);

  const vline = document.createElementNS('http://www.w3.org/2000/svg','line');
  vline.setAttribute('x1','0'); vline.setAttribute('y1',String(pad));
  vline.setAttribute('x2','0'); vline.setAttribute('y2',String(h-pad));
  vline.setAttribute('stroke','rgba(33,33,33,.32)'); vline.setAttribute('stroke-width','1');
  vline.setAttribute('stroke-dasharray','3 3'); vline.style.display = 'none';
  svg.appendChild(vline);

  const dotsG = document.createElementNS('http://www.w3.org/2000/svg','g');
  svg.appendChild(dotsG);

  const card = el.closest('.card');
  let tip = card && card.querySelector('.km-hover-tip');
  if(card && !tip){ tip = document.createElement('div'); tip.className = 'km-hover-tip'; card.appendChild(tip); }

  el._chartW = w;
  el._kmStep = (frac, e) => {
    const i = Math.max(0, Math.min(N-1, Math.round(frac * span)));
    const x = (pad + i*stepX).toFixed(1);
    vline.setAttribute('x1', x); vline.setAttribute('x2', x); vline.style.display = '';
    dotsG.innerHTML = `<circle cx="${x}" cy="${Y(data[i]).toFixed(1)}" r="3.5" fill="${color}" stroke="#fff" stroke-width="1.5"/>`;
    const step = Math.round(stepMax * frac);
    if(tip){
      tip.innerHTML = `<div class="kmt-head">step ${step}</div>
        <div class="kmt-row"><span><i style="background:${color}"></i>${label}</span><b>${fmtNum(data[i])}</b></div>`;
      tip.style.display = 'block';
      if(e){
        const tw = tip.offsetWidth||140, th = tip.offsetHeight||60;
        const vw = window.innerWidth, vh = window.innerHeight;
        let tx = e.clientX + 14; if(tx + tw > vw - 4) tx = e.clientX - tw - 14;
        tx = Math.max(4, Math.min(vw - tw - 4, tx));

// 修改前/修改后共享同一段历史，在 splitIdx（修改点 step 500）处分叉：
// 之前是同一条连续曲线，之后分裂为「不修改」与「修改后」两条分支，首尾相连但走势差异大。
function splitChart(el, before, after, splitIdx, cBefore, cAfter){
  const w = el.clientWidth||300, h=120, pad=12;
  const all = before.concat(after);
  const min = Math.min(...all), max = Math.max(...all), rng = (max-min)||1;
  const n = before.length, dx = (w-pad*2)/(n-1);
  const X = i => pad + i*dx, Y = v => pad + (h-pad*2)*(1-(v-min)/rng);
  const seg = (arr,from,to)=>{ let d=''; for(let i=from;i<=to;i++) d+=(i===from?'M':'L')+X(i).toFixed(1)+' '+Y(arr[i]).toFixed(1)+' '; return d.trim(); };
  const mx = X(splitIdx).toFixed(1), jy = Y(before[splitIdx]).toFixed(1);
  const mid = (min+max)/2;
  const yTicks = [[max,pad],[mid,h/2],[min,h-pad]].map(([v,y])=>
    `<text x="2" y="${(y+3.5).toFixed(1)}" font-size="9" font-family="monospace" fill="var(--text-3)" dominant-baseline="auto">${fmtNum(v)}</text>`).join('');
  el.innerHTML = `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    ${yTicks}
    <line x1="${mx}" y1="${pad}" x2="${mx}" y2="${h-pad}" stroke="var(--border)" stroke-width="1" stroke-dasharray="3 3"/>
    <path d="${seg(before,0,splitIdx)}" fill="none" stroke="var(--text-3)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="${seg(after,splitIdx,n-1)}" fill="none" stroke="${cAfter}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="${seg(before,splitIdx,n-1)}" fill="none" stroke="${cBefore}" stroke-width="2" stroke-dasharray="5 3" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${mx}" cy="${jy}" r="3" fill="#fff" stroke="var(--text-2)" stroke-width="1.5"/></svg>`;
}
function fillChart(el, data, color){
  const w = el.clientWidth||200, h=90, pad=8;
  const line = pathFrom(data,w,h,pad), area = line+` L ${w-pad} ${h-pad} L ${pad} ${h-pad} Z`;
  el.innerHTML = `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path d="${area}" fill="${color}" opacity="0.18"/><path d="${line}" fill="none" stroke="${color}" stroke-width="1.8"/></svg>`;
}
// ---------- live ticker ----------
// 页面加载时刻 = 起算基准；刷新页面即复位
const PAGE_START = Date.now();
let liveTimer = null;

function parseHM(s){ const m=/(\d+)\s*小时\s*(\d+)\s*分/.exec(s); return m ? (+m[1]*3600 + +m[2]*60) : 0; }
function fmtHMS(sec){
  sec = Math.floor(sec);
  const h = Math.floor(sec/3600), m = Math.floor(sec%3600/60), s = sec%60;
  return `${h}小时${m}分${String(s).padStart(2,'0')}秒`;
}

function startLiveTicker(r){
  const baseStep     = parseFloat(r.stepCur);
  const stepTotal    = parseFloat(r.stepTotal);
  const epochTotal   = parseFloat(r.epochTotal);
  const stepsPerEpoch= stepTotal / epochTotal;
  const baseSeconds  = parseHM(r.big);
  const STEP_PER_SEC = 0.7;   // 每秒推进的 step 数（演示速率）

  function update(){
    const elapsed   = (Date.now() - PAGE_START) / 1000;
    const stepFloat = Math.min(baseStep + elapsed * STEP_PER_SEC, stepTotal);
    const pct       = stepFloat / stepTotal * 100;
    const epoch     = Math.min(Math.floor(stepFloat / stepsPerEpoch), Math.floor(epochTotal));

    const rt = document.getElementById('liveRuntime');
    const st = document.getElementById('liveStep');
    const ep = document.getElementById('liveEpoch');
    const bar= document.getElementById('liveBar');
    if(!rt || !bar){ clearInterval(liveTimer); return; }  // 卡片已被重渲染

    rt.textContent  = fmtHMS(baseSeconds + elapsed);
    st.textContent  = Math.floor(stepFloat);
    ep.textContent  = epoch;
    bar.style.width = pct + '%';

    if(stepFloat >= stepTotal) clearInterval(liveTimer);  // 跑满即停
  }
  update();
  liveTimer = setInterval(update, 500);
}

// ---------- 顶部卡片流动（仅进行中的任务）----------
// 每 2 秒：mini 曲线向左滚动一个新点，卡片数值做轻微抖动，模拟实时数据。
let cardsTimer = null;

function startCardsTicker(){
  clearInterval(cardsTimer);
  const r = TASKS[current].runtime;
  if(!r || !r.live) return;
  cardsTimer = setInterval(tickLiveCards, 2000);
}

// 保留原数值的前缀/小数位/单位，仅对数字部分做 ±1% 抖动；科学计数法（如 lr）不抖动。
function jitterValue(str){
  const m = /^(\D*?)(-?\d*\.?\d+)([^\d]*)$/.exec(str);
  if(!m || /e/i.test(str)) return str;
  const prefix = m[1], numStr = m[2], suffix = m[3];
  const num = parseFloat(numStr);
  const decimals = (numStr.split('.')[1] || '').length;
  let next = num * (1 + (Math.random()-0.5)*0.02);
  if(decimals === 0 && Math.abs(num) < 5) return str;   // 过小的整数不抖动，避免突变
  return prefix + next.toFixed(decimals) + suffix;
}

function tickLiveCards(){
  const t = TASKS[current];
  if(!t.runtime || !t.runtime.live){ clearInterval(cardsTimer); return; }
  const cards = document.querySelectorAll('#cards .metric-card');
  if(!cards.length){ clearInterval(cardsTimer); return; }   // 卡片已被重渲染
  const shown = t.metrics.filter(m=>m.shown);
  cards.forEach((card, i)=>{
    const c = shown[i];
    if(!c) return;
    // 曲线滚动：尾部推入一个沿当前水平的小幅波动点，头部弹出一个，长度不变
    const series = t.series[c.key];
    if(series && series.length > 1){
      const min = Math.min(...series), max = Math.max(...series), rng = (max-min)||Math.abs(max)||1;
      const last = series[series.length-1];
      let next = last + (Math.random()-0.5)*rng*0.12;
      next = Math.max(min - rng*0.1, Math.min(max + rng*0.1, next));   // 软约束在历史区间附近
      series.push(next); series.shift();
      const sp = card.querySelector('.spark');
      if(sp) sp.innerHTML = sparkSVG(series, '#1863dc');
    }
    // 数值轻微抖动
    const valEl = card.querySelector('.value');
    if(valEl){
      c.value = jitterValue(c.value);
      valEl.textContent = c.value;
    }
  });
}

// ---------- 指标卡片 + 数据配置 ----------
function renderCards(){
  const t = TASKS[current];
  const shown = t.metrics.filter(m=>m.shown);
  document.getElementById('cards').innerHTML = shown.length ? shown.map(c=>
    `<div class="metric-card">
       <div class="mc-info"><span class="label">${c.label}</span><span class="value">${c.value}</span></div>
       <div class="spark">${sparkSVG(t.series[c.key],'#1863dc')}</div></div>`).join('')
    : `<div class="metric-card" style="justify-content:center;color:var(--text-3)">未选择任何指标</div>`;
}

function renderDropdown(){
  const t = TASKS[current];
  const dd = document.getElementById('dropdown');
  const shown = t.metrics.filter(m=>m.shown);
  const hidden = t.metrics.filter(m=>!m.shown);
  dd.innerHTML =
    `<div class="dd-title">已显示 <span class="hint">拖动排序</span></div>` +
    `<div id="ddShown">` + shown.map(c=>
      `<div class="dd-item" draggable="true" data-key="${c.key}">
         <span class="dd-handle">⠿</span>
         <span class="dd-label">${c.label}</span>
         <input type="checkbox" checked data-key="${c.key}"></div>`).join('') + `</div>` +
    `<div class="dd-title">未显示 <span class="hint">常见观测参数</span></div>` +
    hidden.map(c=>
      `<div class="dd-item muted" data-key="${c.key}">
         <span class="dd-handle" style="visibility:hidden">⠿</span>
         <span class="dd-label">${c.label}</span>
         <input type="checkbox" data-key="${c.key}"></div>`).join('');
  bindDropdown();
}

function bindDropdown(){
  const t = TASKS[current];
  // 勾选切换：显示 / 隐藏
  document.querySelectorAll('#dropdown input[type=checkbox]').forEach(cb=>{
    cb.addEventListener('change', e=>{
      e.stopPropagation();
      const m = t.metrics.find(x=>x.key===cb.dataset.key);
      if(!m) return;
      if(cb.checked){               // 隐藏 → 显示：移到已显示末尾
        m.shown = true;
        t.metrics.splice(t.metrics.indexOf(m),1);
        t.metrics.push(m);
      } else {
        m.shown = false;
      }
      renderCards();
      renderDropdown();
    });
  });
  // 拖动排序（仅已显示区）
  const container = document.getElementById('ddShown');
  if(!container) return;
  let dragEl = null;
  container.querySelectorAll('.dd-item').forEach(item=>{
    item.addEventListener('dragstart', ()=>{ dragEl = item; item.classList.add('dragging'); });
    item.addEventListener('dragend', ()=>{
      item.classList.remove('dragging');
      const order = [...container.querySelectorAll('.dd-item')].map(el=>el.dataset.key);
      applyShownOrder(order);
    });
  });
  container.addEventListener('dragover', e=>{
    e.preventDefault();
    if(!dragEl) return;
    const after = afterElement(container, e.clientY);
    if(after == null) container.appendChild(dragEl);
    else container.insertBefore(dragEl, after);
  });
}

function afterElement(container, y){
  const items = [...container.querySelectorAll('.dd-item:not(.dragging)')];
  let closest = { dist: -Infinity, el: null };
  for(const el of items){
    const box = el.getBoundingClientRect();
    const offset = y - box.top - box.height/2;
    if(offset < 0 && offset > closest.dist) closest = { dist: offset, el };
  }
  return closest.el;
}

function applyShownOrder(order){
  const t = TASKS[current];
  const rank = {};
  order.forEach((k,i)=> rank[k]=i);
  // 已显示按拖动后顺序排列；未显示保持相对顺序并整体置后
  t.metrics.sort((a,b)=>{
    if(a.shown && b.shown) return rank[a.key]-rank[b.key];
    if(a.shown) return -1;
    if(b.shown) return 1;
    return 0;
  });
  renderCards();
}

function dualChart(el, dataA, dataB, labels){
  const w = el.clientWidth||460, h=150, pad=12;
  const all = dataA.concat(dataB);
  const min = Math.min(...all), max = Math.max(...all), rng=(max-min)||1;
  const lineA = pathFrom(dataA,w,h,pad);
  const lineB = pathFrom(dataB,w,h,pad);
  let crossX = null;
  for(let i=1;i<dataA.length;i++){
    const d0=dataA[i-1]-dataB[i-1], d1=dataA[i]-dataB[i];
    if(d0*d1<=0){ crossX=pad+(i-0.5)*(w-pad*2)/(dataA.length-1); break; }
  }
  const crossLine = crossX!=null
    ? `<line x1="${crossX.toFixed(1)}" y1="${pad}" x2="${crossX.toFixed(1)}" y2="${h-pad}" stroke="rgba(180,35,24,.35)" stroke-width="1" stroke-dasharray="3 3"/>`
    : '';
  const labA = labels?.[0]||'A', labB = labels?.[1]||'B';
  el.innerHTML = `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    ${crossLine}
    <path d="${lineA}" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="${lineB}" fill="none" stroke="var(--orange)" stroke-width="2" stroke-dasharray="5 3" stroke-linejoin="round" stroke-linecap="round"/>
    <text x="${pad+4}" y="${pad+11}" font-size="9" fill="var(--blue)" font-family="monospace">${labA}</text>
    <text x="${pad+4}" y="${pad+22}" font-size="9" fill="var(--orange)" font-family="monospace">${labB}</text>
  </svg>`;
}

function mfuChart(el, data, peak, stepMax){
  const w = el.clientWidth||460, h=150, pad=12;
  const maxV = peak * 1.08;
  const Y = v => pad + (h-pad*2)*(1 - v/maxV);
  const stepX = (w-pad*2)/(data.length-1);
  const line = data.map((v,i)=>(i?'L':'M')+(pad+i*stepX).toFixed(1)+' '+Y(v).toFixed(1)).join(' ');
  const area = line+` L ${w-pad} ${h-pad} L ${pad} ${h-pad} Z`;
  const py = Y(peak).toFixed(1);
  el.innerHTML = `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <line x1="${pad}" y1="${py}" x2="${w-pad}" y2="${py}" stroke="var(--green)" stroke-width="1" stroke-dasharray="4 3" opacity=".75"/>
    <text x="${w-pad-4}" y="${(+py-3).toFixed(1)}" font-size="9" fill="var(--green)" font-family="monospace" text-anchor="end">H800 BF16 峰值 ${(peak*100).toFixed(0)}%</text>
    <path d="${area}" fill="var(--blue)" opacity="0.06"/>
    <path d="${line}" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <line class="km-hover-guide" x1="0" y1="${pad}" x2="0" y2="${h-pad}" stroke="#1863dc" stroke-width="1" stroke-dasharray="3 2" opacity="0"/>
    <circle class="km-hover-dot" r="3.5" fill="#1863dc" stroke="#fff" stroke-width="1.5" opacity="0"/>
  </svg>`;
  if(!stepMax) return;
  const guide = el.querySelector('.km-hover-guide');
  const dot = el.querySelector('.km-hover-dot');
  const card = el.closest('.card');
  let tip = card && card.querySelector('.km-hover-tip');
  if(card && !tip){ tip = document.createElement('div'); tip.className = 'km-hover-tip'; card.appendChild(tip); }
  const N = data.length;
  el._chartW = w;
  el._kmStep = (frac, e) => {
    const i = Math.max(0, Math.min(N-1, Math.round(frac*(N-1))));
    const gx = (pad + i*stepX).toFixed(1);
    guide.setAttribute('x1', gx); guide.setAttribute('x2', gx); guide.setAttribute('opacity','.55');
    dot.setAttribute('cx', gx); dot.setAttribute('cy', Y(data[i]).toFixed(1)); dot.setAttribute('opacity','1');
    const step = Math.round(stepMax * frac);
    if(tip){
      tip.innerHTML = `<div class="kmt-head">step ${step}</div>
        <div class="kmt-row"><span><i style="background:#1863dc"></i>MFU</span><b>${(data[i]*100).toFixed(0)}%</b></div>`;
      tip.style.display='block';
      if(e){
        const tw = tip.offsetWidth||140, th = tip.offsetHeight||60;
        const vw = window.innerWidth, vh = window.innerHeight;
        let tx = e.clientX + 14; if(tx + tw > vw - 4) tx = e.clientX - tw - 14;
        tx = Math.max(4, Math.min(vw - tw - 4, tx));
        let ty = e.clientY - th - 10; if(ty < 4) ty = e.clientY + 14;
        ty = Math.min(vh - th - 4, ty);
        tip.style.position='fixed'; tip.style.left=tx+'px'; tip.style.top=ty+'px'; tip.style.right='auto';
      } else {
        const cr = (card||el.closest('.card')).getBoundingClientRect();
        tip.style.position='fixed'; tip.style.top=(cr.top+6)+'px';
        tip.style.right=(window.innerWidth-cr.right+8)+'px'; tip.style.left='auto';
      }
    }
  };
  el._kmClear = () => {
    guide.setAttribute('opacity','0'); dot.setAttribute('opacity','0');
    if(tip) tip.style.display='none';
  };
}

  const maxV = peak * 1.08;
  const Y = v => pad + (h-pad*2)*(1 - v/maxV);
  const stepX = (w-pad*2)/(data.length-1);
  const baseY = h-pad;
  const pts = data.map((v,i)=>[+(pad+i*stepX).toFixed(1), +Y(v).toFixed(1)]);
  const line = pts.map((p,i)=>(i?'L':'M')+p[0]+' '+p[1]).join(' ');
  const segs = [
    {c:'#1863dc',          f:bd.compute, op:0.55},
    {c:'#555561',          f:bd.comm,    op:0.45},
    {c:'rgba(33,33,33,1)', f:bd.other,   op:0.16},
  ];
  let acc = 0;
  const bands = segs.map(s=>{ const lo=acc; acc+=s.f; return Object.assign({lo,hi:acc}, s); });
  const bandPath = (lo,hi)=>{
    const up = pts.map((p,i)=>(i?'L':'M')+p[0]+' '+(baseY+(p[1]-baseY)*hi).toFixed(1)).join(' ');
    const dn = pts.slice().reverse().map(p=>'L'+p[0]+' '+(baseY+(p[1]-baseY)*lo).toFixed(1)).join(' ');
    return up+' '+dn+' Z';
  };
  const py = Y(peak).toFixed(1);
  el.innerHTML = `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    ${bands.map(s=>`<path d="${bandPath(s.lo,s.hi)}" fill="${s.c}" opacity="${s.op}"/>`).join('')}
    <line x1="${pad}" y1="${py}" x2="${w-pad}" y2="${py}" stroke="var(--green)" stroke-width="1" stroke-dasharray="4 3" opacity=".75"/>
    <text x="${w-pad-4}" y="${(+py-3).toFixed(1)}" font-size="9" fill="var(--green)" font-family="monospace" text-anchor="end">H800 BF16 峰值 ${(peak*100).toFixed(0)}%</text>
    <path d="${line}" fill="none" stroke="#1863dc" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <line class="km-hover-guide" x1="0" y1="${pad}" x2="0" y2="${h-pad}" stroke="#1863dc" stroke-width="1" stroke-dasharray="3 2" opacity="0"/>
    <circle class="km-hover-dot" r="3.5" fill="#1863dc" stroke="#fff" stroke-width="1.5" opacity="0"/>
  </svg>`;
  const guide = el.querySelector('.km-hover-guide');
  const dot = el.querySelector('.km-hover-dot');
  const card = el.closest('.card');
  let tip = card && card.querySelector('.km-hover-tip');
  if(card && !tip){ tip = document.createElement('div'); tip.className = 'km-hover-tip'; card.appendChild(tip); }
  const N = data.length;
  const normalMfu = 0.54;
  const _clearMfu = ()=>{ if(tip) tip.style.display='none'; guide.setAttribute('opacity','0'); dot.setAttribute('opacity','0'); };
  const _stepMfu = (frac, e)=>{
    const i = Math.max(0, Math.min(N-1, Math.round(frac*(N-1))));
    const gx = (pad + i*stepX).toFixed(1);
    guide.setAttribute('x1', gx); guide.setAttribute('x2', gx); guide.setAttribute('opacity','.55');
    dot.setAttribute('cx', gx); dot.setAttribute('cy', Y(data[i]).toFixed(1)); dot.setAttribute('opacity','1');
    const step = Math.round(stepMax * frac);
    const r = Math.min(1, data[i] / normalMfu);
    const compute_i = +(bd.compute * r).toFixed(2);
    const other_i = +bd.other.toFixed(2);
    const comm_i = +(1 - compute_i - other_i).toFixed(2);
    if(tip){
      tip.innerHTML = `<div class="kmt-head">step ${step} · MFU <b style="color:var(--text)">${(data[i]*100).toFixed(0)}%</b></div>
        <div class="kmt-row"><span><i style="background:var(--blue)"></i>计算</span><b>${(compute_i*100).toFixed(0)}%</b></div>
        <div class="kmt-row"><span><i style="background:#555561"></i>通信</span><b>${(comm_i*100).toFixed(0)}%</b></div>
        <div class="kmt-row"><span><i style="background:rgba(33,33,33,.4)"></i>其他</span><b>${(other_i*100).toFixed(0)}%</b></div>`;
      tip.style.display='block';

}

    const ty = Y(g.target).toFixed(1);

    const _ytop = fmtNum(maxV), _ybot = fmtNum(minV);
