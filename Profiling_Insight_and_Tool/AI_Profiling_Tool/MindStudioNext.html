  _initView() {
    if (!this.parsedData) return;
    const dur = this.parsedData.timeRange.duration;
    if (dur <= 0) return;
    // 初始缩放：全量数据恰好铺满可视宽度
    this.xScale = Math.max(0.001, this._getViewportW() / dur);
    // 重置水平位置
    const vp = this._viewport();
    if (vp) vp.scrollLeft = 0;
  }

  // ─── Canvas 尺寸 ──────────────────────────────────────────────
  _resize() {
    const dpr = window.devicePixelRatio || 1;
    const visibleRows = this._getVisibleCores();
    const contentH = SWIMLANE_CONFIG.TIME_AXIS_HEIGHT + visibleRows.length * SWIMLANE_CONFIG.ROW_HEIGHT + 20;

    // 宽度 = 执行总时长对应像素（时间轴长度 = 总时长）
    const dataW = this._getDataWidth();
    const viewportW = this._getViewportW();
    const viewportH = this._getViewportH();

    const canvasW = Math.max(dataW, viewportW);
    const canvasH = Math.max(contentH, viewportH);

    this.canvas.width  = canvasW * dpr;
    this.canvas.height = canvasH * dpr;
    this.canvas.style.width  = `${canvasW}px`;
    this.canvas.style.height = `${canvasH}px`;
    this.ctx.setTransform(1, 0, 0, 1, 0, 0);
    this.ctx.scale(dpr, dpr);

    this.labelCanvas.width  = SWIMLANE_CONFIG.LABEL_WIDTH * dpr;
    this.labelCanvas.height = canvasH * dpr;
    this.labelCanvas.style.width  = `${SWIMLANE_CONFIG.LABEL_WIDTH}px`;
    this.labelCanvas.style.height = `${canvasH}px`;
    this.labelCtx.setTransform(1, 0, 0, 1, 0, 0);
    this.labelCtx.scale(dpr, dpr);
  }

  // ─── 缩放（以鼠标在视口中的 X 为轴心）────────────────────────
  _zoom(factor, mouseViewportX) {
    if (!this.parsedData) return;
    const dur = this.parsedData.timeRange.duration;
    if (dur <= 0) return;

    const viewportW = this._getViewportW();
    const minScale = viewportW / dur;            // 最小缩放 = 全量铺满
    const oldScale = this.xScale;
    const newScale = Math.max(minScale, Math.min(oldScale * factor, 50000));
    if (newScale === oldScale) return;

    // 锚点：鼠标对应的时间点在缩放前后不动
    const scrollLeft = this._getScrollLeft();
    const timeAtMouse = (scrollLeft + mouseViewportX) / oldScale;

    this.xScale = newScale;
    this._resize();

    // 调整 scrollLeft 使 timeAtMouse 仍在鼠标下方
    const newScrollLeft = timeAtMouse * newScale - mouseViewportX;
    const vp = this._viewport();
    if (vp) vp.scrollLeft = Math.max(0, newScrollLeft);

    this._render();
    this._renderLabels();
  }

  // ─── 主渲染 ───────────────────────────────────────────────────
  _render() {
    if (!this.parsedData) return;
    const ctx = this.ctx;
    const dpr = window.devicePixelRatio || 1;
    const canvasW = this.canvas.width / dpr;
    const canvasH = this.canvas.height / dpr;

    ctx.clearRect(0, 0, canvasW, canvasH);
    ctx.fillStyle = SWIMLANE_CONFIG.BG_COLOR;
    ctx.fillRect(0, 0, canvasW, canvasH);

    const scrollLeft  = this._getScrollLeft();
    const viewportW   = this._getViewportW();
    const { timeRange, coreEvents, colorMap } = this.parsedData;

    // 当前可见的时间范围（用于裁剪，加速绘制）
    const viewStartTime = scrollLeft / this.xScale;
    const viewEndTime   = (scrollLeft + viewportW) / this.xScale;

    // 时间轴（随纵向滚动跟随）
    this._renderTimeAxis(ctx, canvasW, timeRange, viewStartTime, viewEndTime, this.yScrollTop);

    // 每一行
    this._getVisibleCores().forEach((coreName, rowIndex) => {
      const y = SWIMLANE_CONFIG.TIME_AXIS_HEIGHT + rowIndex * SWIMLANE_CONFIG.ROW_HEIGHT;
      this._renderRow(
        ctx, canvasW, coreName, rowIndex, y,
        coreEvents.get(coreName) || [],
        colorMap, timeRange, viewStartTime, viewEndTime
      );
    });

    // 关联连线
    this._renderRelations(ctx, canvasW, timeRange);

    // 选中核心高亮边框
    if (this.selectedCore) {
      const idx = this._getVisibleCores().indexOf(this.selectedCore);
      if (idx >= 0) {
        const y = SWIMLANE_CONFIG.TIME_AXIS_HEIGHT + idx * SWIMLANE_CONFIG.ROW_HEIGHT;
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.22)';
        ctx.lineWidth = 1;
        ctx.strokeRect(0, y, canvasW, SWIMLANE_CONFIG.ROW_HEIGHT);
      }
    }

    // 标注覆盖层（最后绘制，确保在最上层）
    if (this.annotations?.length) this._renderAnnotations(ctx, timeRange);
  }

  // ─── 时间轴 ───────────────────────────────────────────────────
  _renderTimeAxis(ctx, canvasW, timeRange, viewStartTime, viewEndTime, axisY = 0) {
    const axisH    = SWIMLANE_CONFIG.TIME_AXIS_HEIGHT;
    const duration = timeRange.duration;
    const dataW    = this._getDataWidth();
    const canvasH  = this.canvas.height / (window.devicePixelRatio || 1);

    // 背景（仅绘制数据范围 [0, dataW]）
    ctx.fillStyle = SWIMLANE_CONFIG.LABEL_BG;
    ctx.fillRect(0, axisY, dataW, axisH);

    // dataW 右侧若还有空白（视口比数据宽时），填暗色
    if (dataW < canvasW) {
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(dataW, axisY, canvasW - dataW, axisH);
      ctx.fillRect(dataW, SWIMLANE_CONFIG.TIME_AXIS_HEIGHT, canvasW - dataW, canvasH);
    }

    // 底部分割线
    ctx.strokeStyle = SWIMLANE_CONFIG.AXIS_COLOR;
    ctx.lineWidth = 1;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(0, axisY + axisH);
    ctx.lineTo(dataW, axisY + axisH);
    ctx.stroke();

    // 刻度（只在可见范围内生成，节省绘制开销）
    const clampedStart = Math.max(0, viewStartTime);
    const clampedEnd   = Math.min(duration, viewEndTime);
    if (clampedEnd <= clampedStart) return;

    const viewDuration = clampedEnd - clampedStart;
    const tickCount    = Math.max(4, Math.floor(this._getViewportW() / 80));
    const tickInterval = this._niceInterval(viewDuration / tickCount);
    const firstTick    = Math.ceil(clampedStart / tickInterval) * tickInterval;

    ctx.font = '10px monospace';
    ctx.textAlign = 'center';

    for (let t = firstTick; t <= clampedEnd + tickInterval * 0.01; t += tickInterval) {
      if (t < 0 || t > duration) continue;
      const x = t * this.xScale;   // 绝对 canvas 坐标
      if (x < 0 || x > dataW) continue;

      // 刻度线
      ctx.strokeStyle = SWIMLANE_CONFIG.TICK_COLOR;
      ctx.lineWidth = 1;
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(x, axisY + axisH - 7);
      ctx.lineTo(x, axisY + axisH);
      ctx.stroke();

      // 刻度标签
      ctx.fillStyle = SWIMLANE_CONFIG.TICK_COLOR;
      ctx.fillText(this._formatTime(t), x, axisY + axisH - 9);

      // 垂直网格线
      ctx.strokeStyle = SWIMLANE_CONFIG.GRID_COLOR;
      ctx.lineWidth = 0.5;
      ctx.setLineDash([2, 4]);
      ctx.beginPath();
      ctx.moveTo(x, SWIMLANE_CONFIG.TIME_AXIS_HEIGHT);
      ctx.lineTo(x, canvasH);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // 起始边界线（t=0，x=0）
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.18)';
    ctx.lineWidth = 1;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(0.5, axisY);
    ctx.lineTo(0.5, canvasH);
    ctx.stroke();
    ctx.fillStyle = '#A3A3A3';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('0', 4, axisY + axisH - 9);

    // 结束边界线（t=duration，x=dataW）
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.18)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(dataW - 0.5, axisY);
    ctx.lineTo(dataW - 0.5, canvasH);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#A3A3A3';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(`${this._formatTime(duration)} ►`, dataW - 4, axisY + axisH - 9);
  }

  // ─── 行渲染 ───────────────────────────────────────────────────
  _renderRow(ctx, canvasW, coreName, rowIndex, y, events, colorMap, timeRange, viewStartTime, viewEndTime) {
    const rh      = SWIMLANE_CONFIG.ROW_HEIGHT;
    const padding = SWIMLANE_CONFIG.ROW_PADDING;
    const radius  = 2;
    const patternFontFamily = getComputedStyle(document.documentElement).getPropertyValue('--font-sans').trim() || 'sans-serif';

    const isBottleneck = this.highlightBottlenecks && this.bottleneckCores.has(coreName);
    const isSelected   = coreName === this.selectedCore;
    const isHovered    = coreName === this.hoveredCore;

    // 行背景
    if (isSelected)       ctx.fillStyle = SWIMLANE_CONFIG.SELECTED_ROW_BG;
    else if (isBottleneck) ctx.fillStyle = SWIMLANE_CONFIG.BOTTLENECK_ROW_BG;
    else if (isHovered)    ctx.fillStyle = 'rgba(255,255,255,0.025)';
    else                   ctx.fillStyle = 'rgba(0,0,0,0)';
    ctx.fillRect(0, y, canvasW, rh);

    // 任务条
    for (const event of events) {
      const relStart = event.ts - timeRange.start;
      const relEnd   = relStart + (event.dur || 0);
      if (relEnd < viewStartTime || relStart > viewEndTime) continue;

      // 绝对 canvas 坐标
      const x  = relStart * this.xScale;
      const x2 = relEnd   * this.xScale;
      const w  = Math.max(SWIMLANE_CONFIG.MIN_TASK_WIDTH, x2 - x);

      const op = getEventOpType(event);
      const color = colorForTask(event, 'semantic');

      const isHovEvent    = event === this.hoveredEvent;
      const isSelEvent    = event === this.selectedEvent;
      const isRelated     = this.relatedEvents.includes(event);

      const barX = x;
      const barY = y + padding;
      const barH = rh - padding * 2;
      if (SWIMLANE_TASK_PATTERN?.drawTaskBar) {
        SWIMLANE_TASK_PATTERN.drawTaskBar(ctx, {
          task: event,
          x: barX,
          y: barY,
          width: w,
          height: barH,
          baseColor: color,
          isSelected: isSelEvent,
          isRelated,
          isEmphasized: isHovEvent || isRelated,
          radius,
          fontFamily: patternFontFamily,
        });
      } else {
        const displayColor = isSelEvent ? this._lightenColor(color, 28) : (isRelated || isHovEvent ? this._lightenColor(color, 14) : color);
        const borderColor = isSelEvent ? 'rgba(255,255,255,0.88)' : (isRelated ? 'rgba(255,255,255,0.46)' : 'rgba(255,255,255,0.16)');

        ctx.save();
        ctx.beginPath();
        ctx.roundRect(barX, barY, w, barH, radius + 1);
        ctx.clip();

        ctx.fillStyle = this._alphaColor(displayColor, 0.24);
        ctx.fillRect(barX, barY, w, barH);

        const inW = Math.max(10, Math.min(w * 0.2, 42));
        const outW = Math.max(12, Math.min(w * 0.2, 48));
        const computeW = Math.max(0, w - inW - outW);
        const segs = [
          { x: barX, w: inW, fill: this._mixColor(displayColor, '#ffffff', 0.16) },
          { x: barX + inW, w: computeW, fill: displayColor },
          { x: barX + inW + computeW, w: outW, fill: this._mixColor(displayColor, '#0b0f17', 0.2) },
        ];
        segs.forEach(seg => {
          if (seg.w <= 0) return;
          ctx.fillStyle = seg.fill;
          ctx.fillRect(seg.x, barY, seg.w, barH);
        });

        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.fillRect(barX, barY, w, 1);
        ctx.restore();

        ctx.beginPath();
        ctx.roundRect(barX + 0.5, barY + 0.5, Math.max(0, w - 1), Math.max(0, barH - 1), radius + 1);
        ctx.strokeStyle = borderColor;
        ctx.lineWidth = isSelEvent ? 1.4 : 1;
        ctx.stroke();

        if (w >= 28) {
          const segments = buildTaskSegmentSpec(event, w);
          const textColor = 'rgba(255,255,255,0.92)';
          const font = w >= 72 ? '600 9px var(--font-sans, sans-serif)' : '600 8px var(--font-sans, sans-serif)';
          ctx.save();
          ctx.beginPath();
          ctx.roundRect(barX + 1, barY + 1, Math.max(0, w - 2), Math.max(0, barH - 2), radius);
          ctx.clip();
          ctx.font = font;
          ctx.textBaseline = 'middle';

          const layout = [
            { x: barX, w: inW, align: 'center', text: segments[0].text },
            { x: barX + inW, w: computeW, align: 'left', text: segments[1].text },
            { x: barX + inW + computeW, w: outW, align: 'center', text: segments[2].text },
          ];

          layout.forEach((segment, index) => {
            if (segment.w < (index === 1 ? 20 : 14)) return;
            ctx.fillStyle = textColor;
            if (segment.align === 'left') {
              ctx.textAlign = 'left';
              const maxChars = Math.max(4, Math.floor((segment.w - 8) / 6));
              const label = segment.text.length > maxChars ? `${segment.text.slice(0, Math.max(0, maxChars - 1))}…` : segment.text;
              ctx.fillText(label, segment.x + 5, barY + barH / 2 + 0.5);
            } else {
              ctx.textAlign = 'center';
              if (segment.w < segment.text.length * 5.2) return;
              ctx.fillText(segment.text, segment.x + segment.w / 2, barY + barH / 2 + 0.5);
            }
          });
          ctx.restore();
        }
      }
    }

    // 气泡（任务间空隙）
    if (this.showBubbles) {
      const gaps = this.analysisResult?.coreMetrics?.get(coreName)?.gaps;
      if (gaps) {
        for (const gap of gaps) {
          if (gap.duration < 0.5) continue;
          const relStart = gap.start - timeRange.start;
          const relEnd   = gap.end   - timeRange.start;
          if (relEnd < viewStartTime || relStart > viewEndTime) continue;
          const gx = relStart * this.xScale;
          const gw = Math.max(0.5, relEnd * this.xScale - gx);
          ctx.fillStyle = SWIMLANE_CONFIG.BUBBLE_COLOR;
          ctx.fillRect(gx, y + padding, gw, rh - padding * 2);
        }
      }
    }
  }

  // ─── 关联连线 ────────────────────────────────────────────────
  _renderRelations(ctx, canvasW, timeRange) {
    if (!this.selectedEvent || this.relatedEvents.length === 0) return;
    const cur = this._getEventPos(this.selectedEvent);
    if (!cur) return;

    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
    ctx.lineWidth = 1;
    ctx.setLineDash([]);

    for (const rel of this.relatedEvents) {
      const rp = this._getEventPos(rel);
      if (!rp) continue;
      const fwd  = this.selectedEvent.ts <= rel.ts;
      const src  = fwd ? cur : rp;
      const dst  = fwd ? rp  : cur;
      const sx   = src.x + src.w, sy = src.y + src.h / 2;
      const dx   = dst.x,         dy = dst.y + dst.h / 2;
      const cpx  = (sx + dx) / 2;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.bezierCurveTo(cpx, sy, cpx, dy, dx, dy);
      ctx.stroke();
      this._drawArrow(ctx, dx - 5, dy, dx, dy);
    }
    ctx.restore();
  }

  // ─── 分组区间渲染 ─────────────────────────────────────────────

  setGroupBands(bands) {
    this.groupBands = bands || [];
    this._render();
  }

  toggleGroups(show) {
    this.showGroups = show;
    this._render();
  }

  _renderGroupBandsBg(ctx, canvasW, canvasH) {
    return;
  }

  _renderGroupBandsOverlay(ctx, canvasW, canvasH) {
    return;
  }

  _getEventPos(event) {
    if (!this.parsedData) return null;
    const coreName   = this.parsedData.threadMap.get(event.tid) || `Core_${event.tid}`;
    const visibleCores = this._getVisibleCores();
    const rowIndex   = visibleCores.indexOf(coreName);
    if (rowIndex < 0) return null;
    const y = SWIMLANE_CONFIG.TIME_AXIS_HEIGHT + rowIndex * SWIMLANE_CONFIG.ROW_HEIGHT;
    const x = (event.ts - this.parsedData.timeRange.start) * this.xScale;
    return { x, y, w: (event.dur || 0) * this.xScale, h: SWIMLANE_CONFIG.ROW_HEIGHT };
  }

  _drawArrow(ctx, fx, fy, tx, ty) {
    const len = 8, angle = Math.atan2(ty - fy, tx - fx);
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(tx - len * Math.cos(angle - Math.PI / 6), ty - len * Math.sin(angle - Math.PI / 6));
    ctx.moveTo(tx, ty);
    ctx.lineTo(tx - len * Math.cos(angle + Math.PI / 6), ty - len * Math.sin(angle + Math.PI / 6));
    ctx.stroke();
  }

  // ─── 标签列渲染 ───────────────────────────────────────────────
  _renderLabels() {
    if (!this.parsedData) return;
    const ctx = this.labelCtx;
    const W   = SWIMLANE_CONFIG.LABEL_WIDTH;
    const H   = this.labelCanvas.height / (window.devicePixelRatio || 1);

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = SWIMLANE_CONFIG.LABEL_BG;
    ctx.fillRect(0, 0, W, H);

    // 时间轴标题区（跟随纵向滚动）
    const axisY = this.yScrollTop;
    ctx.fillStyle = SWIMLANE_CONFIG.BG_COLOR;
    ctx.fillRect(0, axisY, W, SWIMLANE_CONFIG.TIME_AXIS_HEIGHT);
    ctx.fillStyle = SWIMLANE_CONFIG.LABEL_TEXT;
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('核心', W / 2, axisY + SWIMLANE_CONFIG.TIME_AXIS_HEIGHT / 2 + 4);

    ctx.strokeStyle = SWIMLANE_CONFIG.AXIS_COLOR;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, axisY + SWIMLANE_CONFIG.TIME_AXIS_HEIGHT);
    ctx.lineTo(W, axisY + SWIMLANE_CONFIG.TIME_AXIS_HEIGHT);
    ctx.stroke();

    const visibleCores = this._getVisibleCores();
    visibleCores.forEach((coreName, i) => {
      const y  = SWIMLANE_CONFIG.TIME_AXIS_HEIGHT + i * SWIMLANE_CONFIG.ROW_HEIGHT;
      const rh = SWIMLANE_CONFIG.ROW_HEIGHT;

      const isBottleneck = this.highlightBottlenecks && this.bottleneckCores.has(coreName);
      const isSelected   = coreName === this.selectedCore;
      const isHovered    = coreName === this.hoveredCore;

      if (isSelected)       ctx.fillStyle = 'rgba(255,255,255,0.06)';
      else if (isBottleneck) ctx.fillStyle = 'rgba(255,255,255,0.04)';
      else if (isHovered)    ctx.fillStyle = 'rgba(255,255,255,0.03)';
      else                   ctx.fillStyle = SWIMLANE_CONFIG.LABEL_BG;
      ctx.fillRect(0, y, W, rh);

      // 核心名称
      ctx.fillStyle = isSelected ? '#F2F2F2' : SWIMLANE_CONFIG.LABEL_TEXT;
      ctx.font = isSelected ? 'bold 11px monospace' : '11px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(coreName, 10, y + rh / 2 + 4);

      // 瓶颈图标
      if (isBottleneck) {
        ctx.fillStyle = '#EF4444';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText('⚠', W - 4, y + rh / 2 + 4);
      }

    });

    // 右侧边框
    ctx.strokeStyle = SWIMLANE_CONFIG.AXIS_COLOR;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(W - 1, 0);
    ctx.lineTo(W - 1, H);
    ctx.stroke();
  }

  // ─── 鼠标交互 ─────────────────────────────────────────────────
  _handleMouseMove(e) {
    const { coreIndex, event } = this._hitTest(e);
    const visibleCores    = this._getVisibleCores();
    const newCore  = coreIndex >= 0 ? visibleCores[coreIndex] : null;
    const changed  = newCore !== this.hoveredCore || event !== this.hoveredEvent;

    this.hoveredCore  = newCore;
    this.hoveredEvent = event;

    if (changed) { this._render(); this._renderLabels(); }
    if (event && newCore) this._showTooltip(e, event, newCore);
    else this._hideTooltip();
  }

  _hitTest(e) {
    const rect    = this.canvas.getBoundingClientRect();
    const mouseX  = e.clientX - rect.left;  // 相对 canvas 的 x（含 scrollLeft 偏移）
    const mouseY  = e.clientY - rect.top;

    const rowIndex = Math.floor((mouseY - SWIMLANE_CONFIG.TIME_AXIS_HEIGHT) / SWIMLANE_CONFIG.ROW_HEIGHT);
    const visibleCores = this._getVisibleCores();
    if (rowIndex < 0 || rowIndex >= visibleCores.length) return { coreIndex: -1, event: null };

    const coreName  = visibleCores[rowIndex];
    const events    = this.parsedData?.coreEvents.get(coreName) || [];
    const timeRange = this.parsedData?.timeRange;

    // mouseX 已经是绝对 canvas 坐标（getBoundingClientRect 随 scrollLeft 变化）
    const timeAtMouse = mouseX / this.xScale;

    let hitEvent = null;
    for (const ev of events) {
      const relStart = ev.ts - timeRange.start;
      const relEnd   = relStart + (ev.dur || 0);
      if (timeAtMouse >= relStart - 0.5 && timeAtMouse <= relEnd + 0.5) { hitEvent = ev; break; }
    }

    return { coreIndex: rowIndex, event: hitEvent };
  }

  _showTooltip(e, event, coreName) {
    const op       = getEventOpType(event);
    const execHint = parseExecutionHint(event.args?.['execution-hint']);
    const taskId   = event.args?.taskId || event.args?.TaskId || '';

    let html = `
      <div class="tt-header">
        <span class="tt-core">${coreName}</span>
        <span class="tt-op">${op}</span>
      </div>
      <div class="tt-body">
        <div class="tt-row"><span>任务名称</span><span>${event.name || '-'}</span></div>
        <div class="tt-row"><span>持续时间</span><span>${(event.dur || 0).toFixed(3)} μs</span></div>
        <div class="tt-row"><span>任务 ID</span><span>${taskId}</span></div>`;
    if (execHint?.avg) html += `<div class="tt-row"><span>平均时间</span><span>${execHint.avg.toFixed(3)} μs</span></div>`;
    if (execHint?.max) html += `<div class="tt-row"><span>最大时间</span><span>${execHint.max.toFixed(3)} μs</span></div>`;
    if (execHint?.min) html += `<div class="tt-row"><span>最小时间</span><span>${execHint.min.toFixed(3)} μs</span></div>`;

    const hint = event.args?.['event-hint'];
    if (hint) {
      const m = hint.match(/Task:\[([^\]]+)\]/);
      if (m) html += `<div class="tt-row"><span>Task</span><span>[${m[1]}]</span></div>`;
    }
    html += '</div>';

    this.tooltip.innerHTML = html;
    this.tooltip.style.display = 'block';

    const tx = e.clientX + 12, ty = e.clientY - 10;
    const ttH = this.tooltip.offsetHeight;
    this.tooltip.style.left = `${Math.min(tx, window.innerWidth - 270)}px`;
    this.tooltip.style.top  = `${Math.max(5, ty + ttH > window.innerHeight ? ty - ttH - 20 : ty)}px`;
  }

  _hideTooltip() { this.tooltip.style.display = 'none'; }

  // ─── 公共 API ─────────────────────────────────────────────────
  setFilter(showAIC, showAIV) {
    this.showAIC = showAIC;
    this.showAIV = showAIV;
    this._resize();
    this._render();
    this._renderLabels();
  }

  toggleBubbles(show)            { this.showBubbles = show; this._render(); }
  toggleBottleneckHighlight(show){ this.highlightBottlenecks = show; this._render(); this._renderLabels(); }

  scrollToCore(coreName) {
    const idx = this._getVisibleCores().indexOf(coreName);
    if (idx < 0) return;
    this.selectedCore = coreName;

    const y  = SWIMLANE_CONFIG.TIME_AXIS_HEIGHT + idx * SWIMLANE_CONFIG.ROW_HEIGHT;
    const vp = this._viewport();
    if (vp) vp.scrollTop = Math.max(0, y - vp.clientHeight / 2);

    this._render();
    this._renderLabels();
  }

  fitToView() {
    this._initView();
    this._resize();
    this._render();
    this._renderLabels();
  }

  exportPNG() {
    const a = document.createElement('a');
    a.download = 'swimlane_export.png';
    a.href = this.canvas.toDataURL('image/png');
    a.click();
  }

  onResize() {
    this._resize();
    this._render();
    this._renderLabels();
  }

  // ─── 工具 ─────────────────────────────────────────────────────
  _getVisibleCores() {
    return this.sortedCores.filter(n => {
      if (!this.visibleCores.has(n)) return false;
      const t = getCoreType(n);
      if (t === 'AIC' && !this.showAIC) return false;
      if (t === 'AIV' && !this.showAIV) return false;
      return true;
    });
  }

  _getRelatedEvents(event) {
    if (!event || !this.parsedData?.relations) return [];
    return Array.from(this.parsedData.relations.get(event) ?? []);
  }

  _niceInterval(raw) {
    const steps = [0.1,0.2,0.5,1,2,5,10,20,50,100,200,500,1000,2000,5000,10000];
    return steps.find(s => s >= raw) ?? raw;
  }

  _formatTime(us) {
    if (us >= 1000) return `${(us/1000).toFixed(1)}ms`;
    if (us >= 1)    return `${us.toFixed(0)}μs`;
    return `${us.toFixed(2)}μs`;
  }

  _lightenColor(hex, amt) {
    if (!hex || hex[0] !== '#') return hex;
    const n = parseInt(hex.slice(1), 16);
    const r = Math.min(255, (n >> 16)        + amt);
    const g = Math.min(255, ((n >> 8) & 0xff) + amt);
    const b = Math.min(255, (n & 0xff)        + amt);
    return `rgb(${r},${g},${b})`;
  }

  _alphaColor(color, alpha) {
    if (!color || color[0] !== '#') return color;
    const n = parseInt(color.slice(1), 16);
    const r = n >> 16;
    const g = (n >> 8) & 0xff;
    const b = n & 0xff;
    return `rgba(${r},${g},${b},${alpha})`;
  }

  _mixColor(base, target, ratio) {
    if (!base || !target || base[0] !== '#' || target[0] !== '#') return base;
    const a = parseInt(base.slice(1), 16);
    const b = parseInt(target.slice(1), 16);
    const mix = (from, to) => Math.round(from + (to - from) * ratio);
    const r = mix(a >> 16, b >> 16);
    const g = mix((a >> 8) & 0xff, (b >> 8) & 0xff);
    const bl = mix(a & 0xff, b & 0xff);
    return `rgb(${r},${g},${bl})`;
  }

  // ─── 标注 API ────────────────────────────────────────────────
  setAnnotations(annotations) {
    this.annotations = Array.isArray(annotations) ? annotations : [];
    const hasTasks = this.annotations.some(a => a.type === 'task');
    if (hasTasks) {
      this._startPulseLoop();
    } else {
      this._stopPulseLoop();
      this._render();
      this._renderLabels();
    }
  }

  _startPulseLoop() {
    if (this._pulseLoopActive) return;
    this._pulseLoopActive = true;
    const tick = () => {
      if (!this._pulseLoopActive) return;
      this._render();
      this._animFrame = requestAnimationFrame(tick);
    };
    this._animFrame = requestAnimationFrame(tick);
  }

  _stopPulseLoop() {
    this._pulseLoopActive = false;
    if (this._animFrame) { cancelAnimationFrame(this._animFrame); this._animFrame = null; }
  }

  _renderAnnotations(ctx, timeRange) {
    if (!this.annotations?.length || !this.parsedData) return;

    ctx.save();
    ctx.setLineDash([]);

    const canvasH   = this.canvas.height / (window.devicePixelRatio || 1);
    const visibleCores = this._getVisibleCores();
    const contentY  = SWIMLANE_CONFIG.TIME_AXIS_HEIGHT;
    const contentH  = visibleCores.length * SWIMLANE_CONFIG.ROW_HEIGHT;
    const axisY     = this.yScrollTop;
    const axisH     = SWIMLANE_CONFIG.TIME_AXIS_HEIGHT;
    // 呼吸节拍：1Hz，0→1→0
    const pulse     = 0.5 + 0.5 * Math.sin(Date.now() / 500 * Math.PI);

    for (const ann of this.annotations) {
      // ── 时间范围标注 ──────────────────────────────────────
      if (ann.type === 'range') {
        const x1 = ann.startTime * this.xScale;
        const x2 = ann.endTime   * this.xScale;
        const w  = x2 - x1;
        if (w <= 0) continue;

        // 半透明红色背景覆盖内容区
        ctx.fillStyle = 'rgba(255, 55, 55, 0.09)';
        ctx.fillRect(x1, contentY, w, contentH);

        // 左右虚线边界
        ctx.lineWidth = 1;
        ctx.strokeStyle = 'rgba(255, 85, 85, 0.55)';
        ctx.setLineDash([4, 3]);
        for (const x of [x1, x2]) {
          ctx.beginPath();
          ctx.moveTo(x, contentY);
          ctx.lineTo(x, contentY + contentH);
          ctx.stroke();
        }
        ctx.setLineDash([]);

        // 时间轴：范围标签（顶部红字）
        const midX = (x1 + x2) / 2;
        ctx.fillStyle = '#FF5050';
        ctx.font = 'bold 9px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(ann.label || '', midX, axisY + 13);

        // 时间轴：起止刻度值（底部红字，仅当宽度足够时显示）
        if (w > 80) {
          ctx.fillStyle = 'rgba(255, 85, 85, 0.8)';
          ctx.font = '8px monospace';
          ctx.textAlign = 'center';
          ctx.fillText(this._formatTime(ann.startTime), x1, axisY + axisH - 3);
          ctx.fillText(this._formatTime(ann.endTime),   x2, axisY + axisH - 3);
        }

      // ── 时间点标注 ────────────────────────────────────────
      } else if (ann.type === 'point') {
        const x = ann.time * this.xScale;

        // 红色竖线贯穿内容区
        ctx.strokeStyle = 'rgba(255, 70, 70, 0.75)';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.moveTo(x, contentY);
        ctx.lineTo(x, contentY + contentH);
        ctx.stroke();

        // 时间轴：红色刻度标签
        ctx.fillStyle = '#FF5050';
        ctx.font = 'bold 9px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(ann.label || this._formatTime(ann.time), x, axisY + 13);

        // 时间轴底部小三角标记
        ctx.strokeStyle = '#FF5050';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x, axisY + axisH - 7);
        ctx.lineTo(x, axisY + axisH);
        ctx.stroke();

      // ── 任务描边标注（呼吸动画）──────────────────────────
      } else if (ann.type === 'task') {
        for (const [coreName, events] of this.parsedData.coreEvents) {
          const rowIdx = visibleCores.indexOf(coreName);
          if (rowIdx < 0) continue;
          const rowY   = contentY + rowIdx * SWIMLANE_CONFIG.ROW_HEIGHT;
          const pad    = SWIMLANE_CONFIG.ROW_PADDING;
          const barH   = SWIMLANE_CONFIG.ROW_HEIGHT - pad * 2;

          for (const ev of events) {
            const tidOk  = ann.tid     === undefined || ev.tid    === ann.tid;
            const taskOk = ann.taskId  === undefined || ev.taskId === ann.taskId;
            if (!tidOk || !taskOk) continue;

            const relStart = ev.ts - timeRange.start;
            const barX = relStart * this.xScale;
            const barW = Math.max(SWIMLANE_CONFIG.MIN_TASK_WIDTH, (ev.dur || 0) * this.xScale);
            const barY = rowY + pad;

            // 呼吸描边：线宽 1.5→3，透明度 0.55→1
            ctx.strokeStyle = `rgba(255, 50, 50, ${0.55 + 0.45 * pulse})`;
            ctx.lineWidth = 1.5 + 1.5 * pulse;
            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.roundRect(barX + 0.5, barY + 0.5, Math.max(0, barW - 1), Math.max(0, barH - 1), 3);
            ctx.stroke();
          }
        }
      }
    }

    ctx.restore();
  }
}

</script></script>
  <style>
    /* ═══════════════════════════════════════════════════════
       Light theme: override MindStudioNext dark tokens

      --bg:              #f2f3f8;
      --bg-elevated:     #ffffff;
      --surface-1:       #f6f7fb;
      --surface-2:       #edf0f7;
      --surface-3:       #e4e7f1;
      --surface-4:       #dae0ee;
      --fg:              #0c0c12;
      --fg-secondary:    #24242e;

 {Exp, Sub, RealDiv}，确认这些算子均出现在反向期间且 shape 与 vocab_size 一致 |\n| 4 | P1 | **DP 集合通信 HCCS 带宽仅 18.5 GB/s（理论 ~30 GB/s，利用率 62%）**，存在 ReduceScatter/AllGather 多次小包 | 通信效率 65% → 75%（约 -1.5% 单步耗时） | 低 | FSDP/ZeRO 的 `bucket_size_mb`（PyTorch DDP）或 `num_communication_buckets`（Megatron-DistOpt）；当前 collective transit size = 1750 MB 分 8+ 次发出，建议合并为 2-3 个大包 | 通信视图 — 载入 `rank_0_ascend_pt/.../communication.json`，按 `Size Distribution` 看 9 个 125 MB + 3 个 ~60 MB 的分布，确认是否能合并 |\n| 5 | P2 | **rank 0/1 PP 接收完成后才开始反向**，未与 DP collective 重叠 | 中 | 中 | 检查反向中的 `tensor_parallel.cross_entropy` 是否阻塞 DP collective 流；启用 `--overlap-grad-reduce` / `--overlap-param-gather` | Timeline 视图（系统调优） — 载入 `rank_0_ascend_pt/.../trace_view.json`，找 `hcom_batchSendRecv__128_5_1` (154 ms) 与 `hcom_reduceScatter*` / `hcom_allReduce*` 是否能错峰 |\n| 6 | P2 | **优化器单算子 ApplyAdamWV2 单次 3.68 ms 突发**（其余实例 < 200 us） | 低 | 低 | 该实例 max 远大于均值，疑似首/末参数张量未对齐 32B 或被 Cast 拖累；对照 op_statistic 看是不是 embedding/LMHead 大权重；可启用 `--use-distributed-optimizer` 让该 step 分片到多卡 | 算子视图 — 载入 `rank_0_ascend_pt/.../kernel_details.csv`，过滤 `ApplyAdamWV2` 排序后看最大耗时实例的 shape |\n\n---\n\n## 3. 问题详情\n\n### 3.1 [P0] PP 末级承担 LM Head + Loss，比首级多 169 ms 计算\n\n- **证据**：\n  - `step_trace_time.csv`（所有 rank）：rank 0/1（PP stage 0）Computing = 231 / 231 ms；rank 2/3（PP stage 1）Computing = 400 / 401 ms。差值 ~170 ms。\n  - `op_statistic.csv` 差分（详见 `intermediate/op_diff_r2_vs_r0.csv`）：rank 2 相对 rank 0 多出 169.2 ms 计算，几乎完全由以下算子贡献：\n    - `MatMulV3/MIX_AIC` ×2 = 36.8 ms（rank 0 完全没有）→ LM Head 正反向各 1 次\n    - `Cast` 额外 20.7 ms、`Mul` 额外 14.6 ms、`Sub` 额外 15.8 ms、`MatMulV3/AI_CORE` 额外 14.7 ms、`MatMulV2/AI_CORE` 额外 11.7 ms\n    - `Exp` 16.1 ms、`RealDiv` 15.7 ms、`TransData` 10.4 ms、`ReduceSum` 6.9 ms、`ArgMaxWithValue` 6.8 ms（rank 0 全部为 0）→ Cross-Entropy / softmax / metric 算子\n  - `communication.json` rank 0：`hcom_batchSendRecv__128_4_1` 单次 elapse 158.55 ms，但 transit 仅 0.40 ms，**wait 158.10 ms（占 99.7%）** → 是首级在等末级反向梯度发回。\n- **影响**：单步 810 ms 中，PP 首级有 158 + 154 ≈ 312 ms 卡在 P2P send/recv 上空等（占单步 38%），所有 4 卡都被对齐到 810 ms。这是性能损失的 **第一原因**。\n- **操作步骤**：\n  1. 确认你的 PP 实现是否把 LM Head（vocab projection）与 Loss 绑定到了 last stage —— 大多数 Megatron-LM 风格框架默认如此。\n  2. **方案 A（推荐，零侵入）**：在框架配置里调整 `num_layers_in_first_pipeline_stage` / `pipeline_model_parallel_split_rank`，把 1~2 个 Transformer Block 从 stage 1 转移到 stage 0；以 hidden=4096、layer 单次正反向 ~5 ms（rank 0 计算 231 ms / 14 层 ≈ 16 ms/层）为粗略基准，移走 1 层会让 stage 0 +16 ms、stage 1 -16 ms，新差距压到 ~140 ms；移走 2 层差距压到 ~110 ms（不够；同时要做下一步）。\n  3. **方案 B（最佳，需要框架支持）**：开启 `--num-virtual-pipeline-stages`（VPP / interleaved 1F1B）把 stage 拆细，LM Head 单独占一个 micro virtual stage，使各 virtual stage 计算量均衡。\n  4. **方案 C（兜底）**：若框架支持 `tensor_parallel.cross_entropy` 的 `parallel_output=True`，把 Loss 留在 stage 1 之外、并将 Embedding 与 LM Head 权重 tied（`tie_word_embeddings=True`）；可省一份 vocab × hidden 的参数与对应反向，但实际改动较大。\n- **验证方法**：修改后重采 4 卡 profiling，断言 `step_trace_time.csv` 各 rank 的 Computing 列极差 < 10%（当前 73%）；同时观察 `communication.json` 中 `hcom_batchSendRecv__128_4_1` 的 Wait Time 应降到 < 30 ms。\n- **可视化视图**：通信视图（主） + Timeline 视图（系统调优）（辅）\n  - 主：通信视图 — 载入任一 rank 的 `communication_matrix.json`，关注 PP 通信域（rank 0↔2 / rank 1↔3）在 batchSendRecv 的耗时极端不对称（rank 0 elapse=313ms vs rank 2 elapse=73ms）。\n  - 辅：Timeline 视图（系统调优）— 载入 `rank_0_ascend_pt/.../trace_view.json` 与 `rank_2_ascend_pt/.../trace_view.json` 横向对照，确认 rank 0 在 `hcom_batchSendRecv` 上的 158 ms 空泡正好对齐到 rank 2 的 MatMulV3/Exp/RealDiv 这一连串计算时段。\n\n### 3.2 [P0] LM Head MatMulV3 单次 18.4 ms × 2，疑似走到非最优 Tiling\n\n- **证据**：\n  - `kernel_details.csv` (rank 2)：Top 列表中有 2 个 `MatMulV3` 实例耗时 18432 / 18386 us，远高于 stage 中其它 `MatMulV3` 的均值 ~222 us。\n  - 这两次实例的 Core Type 是 **MIX_AIC**（混合 AI Core + Vector），而其余 280 个 MatMulV3 实例走的是纯 `AI_CORE`，说明算子选型不同。\n  - LM Head 的 shape 通常是 `[batch×seq, hidden] @ [hidden, vocab]`，vocab 维度通常很大（30k-150k），未对齐到 16/32 的内置 tiling 容易触发 MIX_AIC 兜底路径。\n- **影响**：单 step 反向期间额外 36.8 ms，占单步 4.5%。\n- **操作步骤**：\n  1. 在 `lm_head` 前后插一段打印 `tensor.shape` / `tensor.dtype` 的 hook，确认 vocab 维度与 hidden 维度。\n  2. 若 vocab 不是 32 的倍数，把 vocab 向上 padding 到 32 的倍数（Megatron 的 `--make-vocab-size-divisible-by 128` 是常用做法）。\n  3. 若仍走 MIX_AIC，把 `lm_head` 显式 cast 成 `bfloat16` 后传入 matmul，可能改走纯 AI_CORE Cube。\n- **验证方法**：重采后 `kernel_details.csv` 中不再有 > 5 ms 的 MatMulV3 实例。\n- **可视化视图**：算子视图（主） + 详情视图（辅）\n  - 主：算子视图 — 载入 `rank_2_ascend_pt/.../kernel_details.csv`，按 Duration 倒序，确认两个 18 ms 实例的 Input/Output Shapes 列就是 LM Head 矩阵。\n  - 辅：详情视图 — 拿这两个实例对应的算子 `*.bin`（需通过 msOpProf 二次采集），查看 Roofline 落点定位 Cube/MTE 利用率瓶颈。\n\n### 3.3 [P1] Cross-Entropy 链路 ~80 ms 全部串行无融合\n\n- **证据**：\n  - `op_statistic.csv` (rank 2) 中以下算子在 rank 0 完全不存在：`Exp` 16.05 ms、`RealDiv` 15.71 ms、`ArgMaxWithValue` 6.84 ms、`ReduceSum` 6.89 ms；以及 `Sub` 从 rank 0 的 0.14 ms 暴涨到 15.91 ms。\n  - 累计这 5 类多出来的纯 Vector 算子 = ~61 ms；加上额外的 Cast 21 ms、Mul 15 ms 大概率也是被 cross-entropy 计算图引入，合计 **~97 ms** 的 Vector 串行计算。\n  - 这套算子是经典 \"softmax → log → gather → mean\" 展开形态。\n- **影响**：单 step 额外 ~80 ms，占单步 ~10%。\n- **操作步骤**：\n  1. 检查训练脚本里 Loss 是手写的 `(-y * log_softmax(x)).sum()` 还是直接 `F.cross_entropy(...)`。\n  2. 若是手写，替换为 `torch.nn.functional.cross_entropy(logits, labels, ignore_index=...)`，torch_npu 会路由到 `aclnnSoftmaxCrossEntropyWithLogits` 单算子（一次 fused）。\n  3. 若用 Megatron 的 `tensor_parallel.cross_entropy`，确认开启了 `parallel_output=True` 与 `fp32_residual_connection` 不冲突，避免被强制 Cast。\n  4. ArgMaxWithValue + ReduceSum 通常用于 accuracy/perplexity 指标计算；若不强求每 step 都算，把它们挪到 `if step % eval_interval == 0` 内。\n- **验证方法**：重采后 `op_statistic.csv` (rank 2) 中 Exp / RealDiv 应消失或合并为 `SoftmaxCrossEntropyWithLogits` 等单条目；rank 2 Computing 应再减 ~30 ms。\n- **可视化视图**：算子视图 — 载入 `rank_2_ascend_pt/.../kernel_details.csv`，过滤 Type ∈ {Exp, RealDiv, Sub, ArgMaxWithValue}，时间轴上看这些算子是否完全串行紧邻 LM Head 之后。\n\n### 3.4 [P1] DP 集合通信 HCCS 带宽 18.5 GB/s，理论利用率 62%\n\n- **证据**：\n  - 4 卡 `communication.json` 的 collective Total Op Info 全部呈 1749.8 MB / 92.17 ms transit → 平均 **18.54 GB/s**（HCCS 理论 ~30 GB/s，利用率 ~62%）。\n  - 包大小分布 (`Size Distribution`)：9 个 125.8 MB 大包 + 3 个 ~60 MB 中包 + 若干小包；Large Packet Ratio 普遍 1.0 已经不错，但拆得过细仍有合并空间。\n- **影响**：集合通信总 92 ms transit 中，若带宽提升到 25 GB/s（83% 理论值），可省 ~25 ms。受限于 PP imbalance 主导，这部分目前被 PP wait 掩盖；在 P0 落地后才能完全显现。\n- **操作步骤**：\n  1. 若用 PyTorch FSDP：把 `forward_prefetch=True` + `backward_prefetch=BACKWARD_PRE`，并增大 `auto_wrap_policy` 的 `min_num_params` 到 1e8 减少 bucket 数。\n  2. 若用 Megatron 分布式优化器：调大 `--ddp-bucket-size` 至 4e8 或更大，让小 bucket 合并。\n  3. 检查 HCCL 算法：`export HCCL_ALGO=...`（当前 env 为空，走默认），单机 4 卡时 `ring` 算法对 large packet 通常更优。\n- **验证方法**：重采后 `communication.json` collective HCCS Bandwidth ≥ 25 GB/s，且 transit time ≤ 75 ms。\n- **可视化视图**：通信视图 — 载入 `rank_0_ascend_pt/.../communication.json`，展开 `collective` 看 Size Distribution，确认包数与单包大小。\n\n### 3.5 [P2] PP 反向接收完成后才开始 DP collective，未与 P2P 重叠\n\n- **证据**：\n  - rank 0 在 `hcom_batchSendRecv__128_5_1`（154.89 ms）结束后，紧跟着 `hcom_reduceScatter__097_4_1`（26.31 ms）→ `_5_1`（18.59 ms）→ `allReduce__170_1_1`（34.62 ms） → `allGather__097_6_1`（12.02 ms）。`Start Timestamp` 严格串行，无明显并行段。\n  - 若启用 `overlap-grad-reduce`，DP ReduceScatter 应在反向计算最后一层完成时就开始，与 P2P send 重叠。\n- **影响**：估算可节省 ~30 ms（DP collective 总耗时 ~92 ms × 30% 可并行段）。\n- **操作步骤**：\n  1. Megatron：加 `--overlap-grad-reduce --overlap-param-gather`。\n  2. PyTorch FSDP：确保 `use_orig_params=True` 且没有强制 `barrier()`。\n  3. 检查训练脚本里是否手动加了 `torch.npu.synchronize()`。\n- **验证方法**：Timeline 中 P2P send/recv 与 DP collective 应出现并行段；step time 再降 ~30 ms。\n- **可视化视图**：Timeline 视图（系统调优）— 载入 `rank_0_ascend_pt/.../trace_view.json`，过滤 `hcom_` 前缀，看 P2P 与 collective stream 是否错峰。\n\n### 3.6 [P2] ApplyAdamWV2 单实例 3.68 ms 突发\n\n- **证据**：`op_statistic.csv` (rank 0)：`ApplyAdamWV2` count=57，avg=158.7 us，**max=3680.76 us**（约 23× 均值）。\n- **影响**：单 step 额外 ~3.5 ms，占比小（< 0.5%）。\n- **操作步骤**：\n  1. 在 `kernel_details.csv` 找到该实例，看 shape；若是 `[vocab × hidden]` 的 embedding/LM Head 权重，说明优化器更新被集中到这一个张量上。\n  2. 启用 `--use-distributed-optimizer`（Megatron）或 `optim_state_sharding`（FSDP）把 Adam 状态切片，让 57 张量分摊到 4 卡。\n- **验证方法**：重采后该算子 max 应降到 < 500 us。\n- **可视化视图**：算子视图 — 载入 `rank_0_ascend_pt/.../kernel_details.csv`，过滤 Type=ApplyAdamWV2 排序，找出 3680 us 那一条的 Input Shapes。\n\n---\n\n## 4. 已确认无问题\n\n- **Host 下发延迟**：rank 0 `launch` API 均值 15 us，最大 713 us（少量异常），KernelLaunchWithHandle 平均 5.8 us → 下发不构成瓶颈。\n- **HCCS 链路硬件**：4 卡 collective transit bandwidth 全部 18.5–18.6 GB/s 高度一致，不存在 SDMA \"慢链路\"型异常（rank 间差异 < 0.5%）。\n- **算子下发拥塞 / CANN-Device 错位**：`aclrtSynchronizeDevice` 长耗时（158 ms）本质是 P2P 等待，不是同步语义异常。\n- **HBM/PTA 显存峰值**：rank 0 PTA Reserved peak = 10.37 GB；rank 2 = 10.87 GB，未接近 Atlas 910B 32GB 上限，**未排查** HBM 带宽利用率（无对应采集字段，本次 Level2 + `_l2_cache=false` 配置无法计算）。\n- **Free Time 极差**：rank 0/1/2/3 Free = 158 / 137 / 132 / 148 ms，相对均匀，**不存在伪快卡 / Host 下发型慢卡**。\n\n---\n\n## 5. 数据与方法\n\n- **分析日期**：2026-05-26\n- **数据路径**：`d:/Projects/ProfilingTest/Profiling_output/level2/`（rank 0/1/2/3，PyTorch 框架 profiler，Level2 采集，torch_npu 2.7.1 + CANN 8.3.RC1）\n- **数据范围**：单卡单机 4 卡训练，PP=2 / DP=2 / TP=1 / EP=1；采集 step 13 单步（warmup 12 + active 1）。step 总长 ~810 ms。\n- **并行通信域**（从 `profiler_metadata.json` 提取）：default = {0,1,2,3}；dp_cp = {0,1}（PP stage 0 内 DP）；mp = pp = {0,2}（rank 0↔2 PP 通信）；tp = {0}（无 TP）。\n- **数据完整性**：\n  - 4 rank 均含 `profiler_info_*.json` → 采集正常 Stop\n  - 4 rank 均含 `ascend_pytorch_profiler_*.db`（7-8 MB） + `analysis.db`（28-40 KB） + `communication.json` + `step_trace_time.csv` + `communication_matrix.json`\n  - **rank 1 / rank 3 缺少** `trace_view.json` / `kernel_details.csv` / `op_statistic.csv` / `api_statistic.csv` / `memory_record.csv` / `npu_module_mem.csv` / `operator_memory.csv` —— 推测是 `_data_simplification=true` 配置下，只为每个 dp_cp / pp 通信域保留一份明细。本次以 rank 0（PP-stage 0 代表）与 rank 2（PP-stage 1 代表）的明细为主分析对象，rank 1/3 通过 `step_trace_time.csv` + `communication.json` 验证一致性。\n- **关键采集配置**：`_profiler_level=Level2`、`_aic_metrics=ACL_AICORE_PIPE_UTILIZATION`、`_l2_cache=false`、`profile_memory=true`、`record_shapes=true`、`with_stack=false`。**未启用** L2 Cache 与 system I/O 指标，因此本次无法独立计算 HBM 带宽利用率与 L2 命中率（PHS 内存项 → N/A）。\n- **使用的 Skills**：\n  - `mindstudio_profiler_data_check`：校验 4 rank 的 profiler_info / 关键交付件完整性\n  - `ascend-profiler-d ~80 ms / 700 ms）；均衡 46 → 95（PP 两级差距压到 < 10%）\n- 加权后 ≈ 75 → 等级 **A**（75-90）\n\n","../../Analysis Report/ascend_analysis_20260526/report.md":"# Level2 4 卡训练 Profiling 诊断报告（PP=2 / DP=2 / TP=1）\n\n## 1. 结论速览\n\n- **性能健康度**：63 / 100 (B+) → 优化后预估 **75 / 100 (A)** — 计算 39% · 通信 65% · 调度 82% · 内存 N/A · 均衡 46%\n- **结论**：单步 810 ms 被 **Pipeline 流水级负载不均** 完全主导：PP 末级（rank 2/3，含 LM Head + Loss）计算 ~401 ms，PP 首级（rank 0/1）计算仅 ~231 ms，多出来的 ~170 ms 让首级被迫在 P2P 接收上空等 ~158 ms。\n- **头号瓶颈**：rank 2/3 比 rank 0/1 多 ~169 ms 的「LM Head MatMul + Cross-Entropy 链路」计算（MatMulV3/MIX_AIC 36.8 ms × 1 step、Exp/Sub/RealDiv 各 ~16 ms × 1 step、Cast/Mul 额外 ~35 ms），整段未在 PP 内任何位置与计算 / 通信重叠。\n- **收益上限**：行动清单 P0/P1 全部落地后节省 ~20% 单步耗时（约 160 ms / step，810 → ~650 ms）\n\n---\n\n## 2. 行动清单\n\n> 默认按\"预期收益\"从高到低排序；同档收益按\"修改难度\"从低到高排序。\n\n| # | 优先级 | 问题 | 预期收益 | 修改难度 | 在哪改 / 对应位置 | 可视化视图 |\n|---|---|---|---|---|---|---|\n| 1 | P0 | **PP 末级承担 LM Head + Loss，比首级多 169 ms 计算**，首级 PP 接收侧空等 158 ms | -15% 单步耗时（约 120 ms） | 中 | Megatron / 自研训练框架的 `pipeline_model_parallel_split_rank` 或 `num_layers_in_first_pipeline_stage` 配置；将 1~2 层 Transformer Block 从 stage 0 迁移到 stage 1 之外，或把 LM Head/Loss 切到独立的 virtual PP stage | 通信视图 + Timeline 视图（系统调优） — 载入 `rank_0_ascend_pt/.../communication_matrix.json` 与 `rank_2_ascend_pt/.../trace_view.json`，对照 `hcom_batchSendRecv__128_4_1` 在 rank 0 长达 158 ms 的 wait 段 |\n| 2 | P0 | **LM Head MatMulV3 单次 18.4 ms × 2**（MIX_AIC 路径），疑似走到非最优 tiling | -3% 单步耗时（约 25 ms，含两次正反向） | 中 | 末级 stage 的 `lm_head` 模块（`output_layer`/`tie_word_embeddings` 相关），检查输入 dtype、shape 对齐与 `aclnnMatmul` 走的算子选型 | 算子视图 + 详情视图 — 载入 `rank_2_ascend_pt/.../kernel_details.csv`，过滤 `MatMulV3` 排序看 Top2 18.4 ms 的实例，再用 `*.bin` 看 Roofline 落点是否 Memory Bound |\n| 3 | P1 | **Cross-Entropy 链路（Exp/Sub/RealDiv/Cast/Mul）单 step 累计 ~80 ms 全部串行**，无算子融合 | -4% 单步耗时（约 35 ms） | 中 | 末级 stage 的 Loss 函数：把 `softmax → log → nll_loss` 重写为融合算子（`torch.nn.functional.cross_entropy` + Ascend 内置 `aclnnSoftmaxCrossEntropyWithLogits`），或替换为 `Megatron VocabParallelCrossEntropy` 的融合实现 | 算子视图 — 载入 `rank_2_ascend_pt/.../kernel_details.csv`，过滤 op_type ∈ {Exp, Sub, RealDiv}，确认这些算子均出现在反向期间且 shape 与 vocab_size 一致 |\n| 4 | P1 | **DP 集合通信 HCCS 带宽仅 18.5 GB/s（理论 ~30 GB/s，利用率 62%）**，存在 ReduceScatter/AllGather 多次小包 | 通信效率 65% → 75%（约 -1.5% 单步耗时） | 低 | FSDP/ZeRO 的 `bucket_size_mb`（PyTorch DDP）或 `num_communication_buckets`（Megatron-DistOpt）；当前 collective transit size = 1750 MB 分 8+ 次发出，建议合并为 2-3 个大包 | 通信视图 — 载入 `rank_0_ascend_pt/.../communication.json`，按 `Size Distribution` 看 9 个 125 MB + 3 个 ~60 MB 的分布，确认是否能合并 |\n| 5 | P2 | **rank 0/1 PP 接收完成后才开始反向**，未与 DP collective 重叠 | 中 | 中 | 检查反向中的 `tensor_parallel.cross_entropy` 是否阻塞 DP collective 流；启用 `--overlap-grad-reduce` / `--overlap-param-gather` | Timeline 视图（系统调优） — 载入 `rank_0_ascend_pt/.../trace_view.json`，找 `hcom_batchSendRecv__128_5_1` (154 ms) 与 `hcom_reduceScatter*` / `hcom_allReduce*` 是否能错峰 |\n| 6 | P2 | **优化器单算子 ApplyAdamWV2 单次 3.68 ms 突发**（其余实例 < 200 us） | 低 | 低 | 该实例 max 远大于均值，疑似首/末参数张量未对齐 32B 或被 Cast 拖累；对照 op_statistic 看是不是 embedding/LMHead 大权重；可启用 `--use-distributed-optimizer` 让该 step 分片到多卡 | 算子视图 — 载入 `rank_0_ascend_pt/.../kernel_details.csv`，过滤 `ApplyAdamWV2` 排序后看最大耗时实例的 shape |\n\n---\n\n## 3. 问题详情\n\n### 3.1 [P0] PP 末级承担 LM Head + Loss，比首级多 169 ms 计算\n\n- **证据**：\n  - `step_trace_time.csv`（所有 rank）：rank 0/1（PP stage 0）Computing = 231 / 231 ms；rank 2/3（PP stage 1）Computing = 400 / 401 ms。差值 ~170 ms。\n  - `op_statistic.csv` 差分（详见 `intermediate/op_diff_r2_vs_r0.csv`）：rank 2 相对 rank 0 多出 169.2 ms 计算，几乎完全由以下算子贡献：\n    - `MatMulV3/MIX_AIC` ×2 = 36.8 ms（rank 0 完全没有）→ LM Head 正反向各 1 次\n    - `Cast` 额外 20.7 ms、`Mul` 额外 14.6 ms、`Sub` 额外 15.8 ms、`MatMulV3/AI_CORE` 额外 14.7 ms、`MatMulV2/AI_CORE` 额外 11.7 ms\n    - `Exp` 16.1 ms、`RealDiv` 15.7 ms、`TransData` 10.4 ms、`ReduceSum` 6.9 ms、`ArgMaxWithValue` 6.8 ms（rank 0 全部为 0）→ Cross-Entropy / softmax / metric 算子\n  - `communication.json` rank 0：`hcom_batchSendRecv__128_4_1` 单次 elapse 158.55 ms，但 transit 仅 0.40 ms，**wait 158.10 ms（占 99.7%）** → 是首级在等末级反向梯度发回。\n- **影响**：单步 810 ms 中，PP 首级有 158 + 154 ≈ 312 ms 卡在 P2P send/recv 上空等（占单步 38%），所有 4 卡都被对齐到 810 ms。这是性能损失的 **第一原因**。\n- **操作步骤**：\n  1. 确认你的 PP 实现是否把 LM Head（vocab projection）与 Loss 绑定到了 last stage —— 大多数 Megatron-LM 风格框架默认如此。\n  2. **方案 A（推荐，零侵入）**：在框架配置里调整 `num_layers_in_first_pipeline_stage` / `pipeline_model_parallel_split_rank`，把 1~2 个 Transformer Block 从 stage 1 转移到 stage 0；以 hidden=4096、layer 单次正反向 ~5 ms（rank 0 计算 231 ms / 14 层 ≈ 16 ms/层）为粗略基准，移走 1 层会让 stage 0 +16 ms、stage 1 -16 ms，新差距压到 ~140 ms；移走 2 层差距压到 ~110 ms（不够；同时要做下一步）。\n  3. **方案 B（最佳，需要框架支持）**：开启 `--num-virtual-pipeline-stages`（VPP / interleaved 1F1B）把 stage 拆细，LM Head 单独占一个 micro virtual stage，使各 virtual stage 计算量均衡。\n  4. **方案 C（兜底）**：若框架支持 `tensor_parallel.cross_entropy` 的 `parallel_output=True`，把 Loss 留在 stage 1 之外、并将 Embedding 与 LM Head 权重 tied（`tie_word_embeddings=True`）；可省一份 vocab × hidden 的参数与对应反向，但实际改动较大。\n- **验证方法**：修改后重采 4 卡 profiling，断言 `step_trace_time.csv` 各 rank 的 Computing 列极差 < 10%（当前 73%）；同时观察 `communication.json` 中 `hcom_batchSendRecv__128_4_1` 的 Wait Time 应降到 < 30 ms。\n- **可视化视图**：通信视图（主） + Timeline 视图（系统调优）（辅）\n  - 主：通信视图 — 载入任一 rank 的 `communication_matrix.json`，关注 PP 通信域（rank 0↔2 / rank 1↔3）在 batchSendRecv 的耗时极端不对称（rank 0 elapse=313ms vs rank 2 elapse=73ms）。\n  - 辅：Timeline 视图（系统调优）— 载入 `rank_0_ascend_pt/.../trace_view.json` 与 `rank_2_ascend_pt/.../trace_view.json` 横向对照，确认 rank 0 在 `hcom_batchSendRecv` 上的 158 ms 空泡正好对齐到 rank 2 的 MatMulV3/Exp/RealDiv 这一连串计算时段。\n\n### 3.2 [P0] LM Head MatMulV3 单次 18.4 ms × 2，疑似走到非最优 Tiling\n\n- **证据**：\n  - `kernel_details.csv` (rank 2)：Top 列表中有 2 个 `MatMulV3` 实例耗时 18432 / 18386 us，远高于 stage 中其它 `MatMulV3` 的均值 ~222 us。\n  - 这两次实例的 Core Type 是 **MIX_AIC**（混合 AI Core + Vector），而其余 280 个 MatMulV3 实例走的是纯 `AI_CORE`，说明算子选型不同。\n  - LM Head 的 shape 通常是 `[batch×seq, hidden] @ [hidden, vocab]`，vocab 维度通常很大（30k-150k），未对齐到 16/32 的内置 tiling 容易触发 MIX_AIC 兜底路径。\n- **影响**：单 step 反向期间额外 36.8 ms，占单步 4.5%。\n- **操作步骤**：\n  1. 在 `lm_head` 前后插一段打印 `tensor.shape` / `tensor.dtype` 的 hook，确认 vocab 维度与 hidden 维度。\n  2. 若 vocab 不是 32 的倍数，把 vocab 向上 padding 到 32 的倍数（Megatron 的 `--make-vocab-size-divisible-by 128` 是常用做法）。\n  3. 若仍走 MIX_AIC，把 `lm_head` 显式 cast 成 `bfloat16` 后传入 matmul，可能改走纯 AI_CORE Cube。\n- **验证方法**：重采后 `kernel_details.csv` 中不再有 > 5 ms 的 MatMulV3 实例。\n- **可视化视图**：算子视图（主） + 详情视图（辅）\n  - 主：算子视图 — 载入 `rank_2_ascend_pt/.../kernel_details.csv`，按 Duration 倒序，确认两个 18 ms 实例的 Input/Output Shapes 列就是 LM Head 矩阵。\n  - 辅：详情视图 — 拿这两个实例对应的算子 `*.bin`（需通过 msOpProf 二次采集），查看 Roofline 落点定位 Cube/MTE 利用率瓶颈。\n\n### 3.3 [P1] Cross-Entropy 链路 ~80 ms 全部串行无融合\n\n- **证据**：\n  - `op_statistic.csv` (rank 2) 中以下算子在 rank 0 完全不存在：`Exp` 16.05 ms、`RealDiv` 15.71 ms、`ArgMaxWithValue` 6.84 ms、`ReduceSum` 6.89 ms；以及 `Sub` 从 rank 0 的 0.14 ms 暴涨到 15.91 ms。\n  - 累计这 5 类多出来的纯 Vector 算子 = ~61 ms；加上额外的 Cast 21 ms、Mul 15 ms 大概率也是被 cross-entropy 计算图引入，合计 **~97 ms** 的 Vector 串行计算。\n  - 这套算子是经典 \"softmax → log → gather → mean\" 展开形态。\n- **影响**：单 step 额外 ~80 ms，占单步 ~10%。\n- **操作步骤**：\n  1. 检查训练脚本里 Loss 是手写的 `(-y * log_softmax(x)).sum()` 还是直接 `F.cross_entropy(...)`。\n  2. 若是手写，替换为 `torch.nn.functional.cross_entropy(logits, labels, ignore_index=...)`，torch_npu 会路由到 `aclnnSoftmaxCrossEntropyWithLogits` 单算子（一次 fused）。\n  3. 若用 Megatron 的 `tensor_parallel.cross_entropy`，确认开启了 `parallel_output=True` 与 `fp32_residual_connection` 不冲突，避免被强制 Cast。\n  4. ArgMaxWithValue + ReduceSum 通常用于 accuracy/perplexity 指标计算；若不强求每 step 都算，把它们挪到 `if step % eval_interval == 0` 内。\n- **验证方法**：重采后 `op_statistic.csv` (rank 2) 中 Exp / RealDiv 应消失或合并为 `SoftmaxCrossEntropyWithLogits` 等单条目；rank 2 Computing 应再减 ~30 ms。\n- **可视化视图**：算子视图 — 载入 `rank_2_ascend_pt/.../kernel_details.csv`，过滤 Type ∈ {Exp, RealDiv, Sub, ArgMaxWithValue}，时间轴上看这些算子是否完全串行紧邻 LM Head 之后。\n\n### 3.4 [P1] DP 集合通信 HCCS 带宽 18.5 GB/s，理论利用率 62%\n\n- **证据**：\n  - 4 卡 `communication.json` 的 collective Total Op Info 全部呈 1749.8 MB / 92.17 ms transit → 平均 **18.54 GB/s**（HCCS 理论 ~30 GB/s，利用率 ~62%）。\n  - 包大小分布 (`Size Distribution`)：9 个 125.8 MB 大包 + 3 个 ~60 MB 中包 + 若干小包；Large Packet Ratio 普遍 1.0 已经不错，但拆得过细仍有合并空间。\n- **影响**：集合通信总 92 ms transit 中，若带宽提升到 25 GB/s（83% 理论值），可省 ~25 ms。受限于 PP imbalance 主导，这部分目前被 PP wait 掩盖；在 P0 落地后才能完全显现。\n- **操作步骤**：\n  1. 若用 PyTorch FSDP：把 `forward_prefetch=True` + `backward_prefetch=BACKWARD_PRE`，并增大 `auto_wrap_policy` 的 `min_num_params` 到 1e8 减少 bucket 数。\n  2. 若用 Megatron 分布式优化器：调大 `--ddp-bucket-size` 至 4e8 或更大，让小 bucket 合并。\n  3. 检查 HCCL 算法：`export HCCL_ALGO=...`（当前 env 为空，走默认），单机 4 卡时 `ring` 算法对 large packet 通常更优。\n- **验证方法**：重采后 `communication.json` collective HCCS Bandwidth ≥ 25 GB/s，且 transit time ≤ 75 ms。\n- **可视化视图**：通信视图 — 载入 `rank_0_ascend_pt/.../communication.json`，展开 `collective` 看 Size Distribution，确认包数与单包大小。\n\n### 3.5 [P2] PP 反向接收完成后才开始 DP collective，未与 P2P 重叠\n\n- **证据**：\n  - rank 0 在 `hcom_batchSendRecv__128_5_1`（154.89 ms）结束后，紧跟着 `hcom_reduceScatter__097_4_1`（26.31 ms）→ `_5_1`（18.59 ms）→ `allReduce__170_1_1`（34.62 ms） → `allGather__097_6_1`（12.02 ms）。`Start Timestamp` 严格串行，无明显并行段。\n  - 若启用 `overlap-grad-reduce`，DP ReduceScatter 应在反向计算最后一层完成时就开始，与 P2P send 重叠。\n- **影响**：估算可节省 ~30 ms（DP collective 总耗时 ~92 ms × 30% 可并行段）。\n- **操作步骤**：\n  1. Megatron：加 `--overlap-grad-reduce --overlap-param-gather`。\n  2. PyTorch FSDP：确保 `use_orig_params=True` 且没有强制 `barrier()`。\n  3. 检查训练脚本里是否手动加了 `torch.npu.synchronize()`。\n- **验证方法**：Timeline 中 P2P send/recv 与 DP collective 应出现并行段；step time 再降 ~30 ms。\n- **可视化视图**：Timeline 视图（系统调优）— 载入 `rank_0_ascend_pt/.../trace_view.json`，过滤 `hcom_` 前缀，看 P2P 与 collective stream 是否错峰。\n\n### 3.6 [P2] ApplyAdamWV2 单实例 3.68 ms 突发\n\n- **证据**：`op_statistic.csv` (rank 0)：`ApplyAdamWV2` count=57，avg=158.7 us，**max=3680.76 us**（约 23× 均值）。\n- **影响**：单 step 额外 ~3.5 ms，占比小（< 0.5%）。\n- **操作步骤**：\n  1. 在 `kernel_details.csv` 找到该实例，看 shape；若是 `[vocab × hidden]` 的 embedding/LM Head 权重，说明优化器更新被集中到这一个张量上。\n  2. 启用 `--use-distributed-optimizer`（Megatron）或 `optim_state_sharding`（FSDP）把 Adam 状态切片，让 57 张量分摊到 4 卡。\n- **验证方法**：重采后该算子 max 应降到 < 500 us。\n- **可视化视图**：算子视图 — 载入 `rank_0_ascend_pt/.../kernel_details.csv`，过滤 Type=ApplyAdamWV2 排序，找出 3680 us 那一条的 Input Shapes。\n\n---\n\n## 4. 已确认无问题\n\n- **Host 下发延迟**：rank 0 `launch` API 均值 15 us，最大 713 us（少量异常），KernelLaunchWithHandle 平均 5.8 us → 下发不构成瓶颈。\n- **HCCS 链路硬件**：4 卡 collective transit bandwidth 全部 18.5–18.6 GB/s 高度一致，不存在 SDMA \"慢链路\"型异常（rank 间差异 < 0.5%）。\n- **算子下发拥塞 / CANN-Device 错位**：`aclrtSynchronizeDevice` 长耗时（158 ms）本质是 P2P 等待，不是同步语义异常。\n- **HBM/PTA 显存峰值**：rank 0 PTA Reserved peak = 10.37 GB；rank 2 = 10.87 GB，未接近 Atlas 910B 32GB 上限，**未排查** HBM 带宽利用率（无对应采集字段，本次 Level2 + `_l2_cache=false` 配置无法计算）。\n- **Free Time 极差**：rank 0/1/2/3 Free = 158 / 137 / 132 / 148 ms，相对均匀，**不存在伪快卡 / Host 下发型慢卡**。\n\n---\n\n## 5. 数据与方法\n\n- **分析日期**：2026-05-26\n- **数据路径**：`d:/Projects/ProfilingTest/Profiling_output/level2/`（rank 0/1/2/3，PyTorch 框架 profiler，Level2 采集，torch_npu 2.7.1 + CANN 8.3.RC1）\n- **数据范围**：单卡单机 4 卡训练，PP=2 / DP=2 / TP=1 / EP=1；采集 step 13 单步（warmup 12 + active 1）。step 总长 ~810 ms。\n- **并行通信域**（从 `profiler_metadata.json` 提取）：default = {0,1,2,3}；dp_cp = {0,1}（PP stage 0 内 DP）；mp = pp = {0,2}（rank 0↔2 PP 通信）；tp = {0}（无 TP）。\n- **数据完整性**：\n  - 4 rank 均含 `profiler_info_*.json` → 采集正常 Stop\n  - 4 rank 均含 `ascend_pytorch_profiler_*.db`（7-8 MB） + `analysis.db`（28-40 KB） + `communication.json` + `step_trace_time.csv` + `communication_matrix.json`\n  - **rank 1 / rank 3 缺少** `trace_view.json` / `kernel_details.csv` / `op_statistic.csv` / `api_statistic.csv` / `memory_record.csv` / `npu_module_mem.csv` / `operator_memory.csv` —— 推测是 `_data_simplification=true` 配置下，只为每个 dp_cp / pp 通信域保留一份明细。本次以 rank 0（PP-stage 0 代表）与 rank 2（PP-stage 1 代表）的明细为主分析对象，rank 1/3 通过 `step_trace_time.csv` + `communication.json` 验证一致性。\n- **关键采集配置**：`_profiler_level=Level2`、`_aic_metrics=ACL_AICORE_PIPE_UTILIZATION`、`_l2_cache=false`、`profile_memory=true`、`record_shapes=true`、`with_stack=false`。**未启用** L2 Cache 与 system I/O 指标，因此本次无法独立计算 HBM 带宽利用率与 L2 命中率（PHS 内存项 → N/A）。\n- **使用的 Skills**：\n  - `mindstudio_profiler_data_check`：校验 4 rank 的 profiler_info / 关键交付件完整性\n  - `ascend-profiler-db-explorer`：本次未直接对 DB 出 SQL（环境无 sqlite3 CLI / 无 Python），已通过 CSV/JSON 等价产物完成分析；如需更精细的 kernel-level connection 关联，建议在装好 sqlite3 / Python 的环境下再用 Track A `compute_view`/`comm_view`/`dispatch_view` 三宏复跑\n  - `cluster-fast-slow-rank-detector`：按 SOP 流程 1 完成\"输入数据类型 + Rank 个数 + 文件齐全度\"判定；SOP 流程 2 / 4 见下方 Advisor 状态\n  - `performance-health-score`：按集群慢卡场景权重（计算 0.20 · 通信 0.30 · 调度 0.30 · 内存 0.10 · 均衡 0.10，内存 N/A 重归一）计算 PHS\n  - `msinsight-view-selector`：为每个问题点匹配可视化视图三要素\n- **Advisor 状态**：\n  - `msprof-analyze advisor` / `msprof-analyze -m cluster_time_summary|compute_op_sum|hccl_sum|slow_rank|slow_link|cann_api_sum`：**失败** — 当前 Windows 主机上 `msprof-analyze` 与 `python` 均不可执行（Python 仅为 WindowsApps store stub，sqlite3 CLI 也不存在），未能落地 `cluster_analysis_output`。建议在已部署 CANN + msprof-analyze 的 Linux 环境上对 `Profiling_output/level2/` 重新执行 `msprof-analyze -m all -d ./Profiling_output/level2 -o ./ascend_analysis_20260526/cluster_analysis_output`，将其结果与本报告 §3 交叉验证。本报告所有结论均基于 CSV / JSON 原始采集文件（per_rank_summary + op_diff），证据链可独立成立。\n- **输出位置**：`./ascend_analysis_20260526/`\n  - `report.md` — 本报告\n  - `intermediate/per_rank_summary.csv` — 4 卡 step_trace + 通信总览\n  - `intermediate/op_diff_r2_vs_r0.csv` — PP stage 1 vs stage 0 算子级差分（按 delta 倒序，Top 30）\n\n### PHS 计算细节\n\n按 `performance-health-score` 公式（集群慢卡场景）：\n\n| 子项 | 数值 | 来源 | 权重（重归一后） | 加权 |\n|---|---|---|---|---|\n| 计算利用率 | 39 | 4 rank 平均 Computing/step = (231+231+400+401)/4 / 810 = 39% | 0.20 → 0.222 | 8.7 |\n| 通信效率 | 65 | HCCS 实测 18.54 GB/s ÷ 理论 30 GB/s = 62%，按 transit-size 加权约 65% | 0.30 → 0.333 | 21.7 |\n| 调度效率 | 82 | (1 - Free/total) = 1 - 143.6/810 = 82.3%（Wait 计入通信不重叠，未重复扣除）| 0.30 → 0.333 | 27.3 |\n| 内存利用率 | N/A | `_l2_cache=false` 且未采集 HBM 带宽计数器 | 0.10 → 0 | — |\n| 集群均衡度 | 46 | 用 Computing 极差 (1 - (401-231)/316) = 46%（注：用 step time 极差恒为 ~100%，因被同步对齐，失去诊断意义）| 0.10 → 0.111 | 5.1 |\n| **PHS** | **63 (B+)** | 加权求和四舍五入 | — | **62.8** |\n\n**优化后预估**（P0/P1 全部落地）：\n- 计算 39 ，确认 MMAD 之间是否存在与 LOAD_L1_TO_DST_3DV2 串行的 bubble |\n| 3 | P1 | 标量 | **cubecore0 SCALAR 事件 44,245 个**（其中 LD_XD_XN_IMM 12,244 / ST_XD_XN_IMM 4,074 / STI_XN_IMM 1,119 — 大量栈帧 load/store），SCALAR pipe busy 201 ns 已超 cube core span（178%），与 CUBE 抢调度槽 | scalar 占用↓30%（间接抬升 CUBE/MTE 并行度） | 中 | `matmul_leakyrelu_custom.cpp` 第 206–207 行（cycle 累计 4.76M，占整个用户文件 46%）；把循环局部变量改为模板常量 / `constexpr` / register hint；TPipe 改在 kernel 函数体外创建（参考 ascendc-api 反模式清单） | 源码视图 + Timeline 视图（算子调优）— 载入 `operator/visualize_data.bin` 的源码视图，定位 `matmul_leakyrelu_custom.cpp:207` 的指令热点；Timeline 看 cubecore0 SCALAR 通道密度 |\n| 4 | P1 | 搬运 | **MTE2 GM→L1（ND2NZ）单次平均 22 KB**（180 次共 3.94 MB，busy 263 ns / cube span 112.6 ns，233% 跨槽占用），单次量偏小且未对齐到大块 burst | MTE2 阻塞时间↓25%（与 #2 叠加可让 CUBE util 进 90%） | 中 | `matmul_leakyrelu_custom.cpp` 第 116–120 行 CopyIn 段；把 DataCopy 改用 `DataCopyParams`（blockCount/blockLen/srcStride/dstStride）一次下发更大块，目标单次 ≥ 16 KB 已满足但 stride 模式可降低 ND→NZ 转置开销 | 详情视图 — 载入 `operator/visualize_data.bin`，查看 Roofline 落点是否在 MTE2 Roof 下方；同时看 MOV_OUT_TO_L1_MULTI_ND2NZ 的带宽利用率 |\n| 5 | P2 | 流水 | **vec core 负载不均**：veccore0 span 97.8 ns vs veccore1 span 114.4 ns（Δ 16.6 ns / 17%），两核 SCALAR/VECTOR/MTE3 事件数完全一致（6420/244/42）但同步等待时长不同 | 总耗时↓2%–5% | 中 | tiling 拆分代码（位于 host tiling），检查最后一块 tile 是否被分到固定核；考虑 round-robin 尾块分配。**注：与 #1 P0 落地后此项可能自动消失** | Timeline 视图（算子调优）— 载入 `operator/visualize_data.bin`，并列对比 veccore0 与 veccore1 同段时间的 VECTOR/MTE3 通道是否对齐 |\n| 6 | P2 | 内存 | **CACHEMISS 累计 326 次**（cubecore 196 / vec 各 65），样本显示 `size=0x8, type=0, last=0` 的细粒度 miss，地址集中在 0x10d11a80 / 0x10d11b00 等 | 中（与 #3 scalar 优化同因，scalar 栈访问触发 I/D cache miss） | 低 | 与 #3 联动；scalar 优化后预期减少高频 PC 段切换 | 源码视图 — 载入 `operator/visualize_data.bin`，在 cubecore0 CACHEMISS 通道定位 PC 0x10d11a80 起始 16 字节附近的指令簇 |\n\n---\n\n## 3. 问题详情\n\n### 3.1 [P0] Matmul→GM→Vec 往返：LeakyRelu 未与 Fixpipe 融合\n\n- **证据**：\n  - `pipe_instr_top.csv`：cubecore0 `FIXP/FIX_L0C_TO_DST` 20 次共写出 **2,621,440 B (2.62 MB)** L0C→GM；同时刻每个 vec core `MTE2/MOV_OUT_TO_UB` 10 次共读入 **1,310,720 B (1.31 MB)**，两 vec 合计读回 2.62 MB —— 数据流和 cube 写出量逐字节对应。\n  - 同源 `cat=MTE3ToSCALAR` (8) + `cat=MTE2ToVECTOR` (80) flow 事件可见 cube 写出与 vec 读入之间存在显式的依赖箭头。\n  - `per_core_pipe.csv` 显示 vec core `VECTOR` pipe 真正算 LeakyRelu (`VLRELU` × 80) 只用了 6.6 ns；同 vec core 上 MTE2+MTE3 搬运花费 22 ns + 130 ns，**搬运 vs 计算 ≈ 23 : 1**。\n- **影响**：cube 完成最后一次 Fixpipe (97.8 ns @ FIXP) 之后，vec 才能开始 MTE2 GM→UB 搬运；vec 整段 span 97-114 ns 几乎全部串在 cube 之后，无法与 cube 计算重叠。这是 simulator 端到端耗时的**单点决定因素**。\n- **操作步骤**：\n  1. 确认目标芯片 Fixpipe 是否支持随路 LeakyRelu。Atlas A2（910B/910B4）Fixpipe 支持随路 quant + relu，部分版本支持 leakyrelu 系数。查 SDK 头文件 `matmul_intf.h` 中 `enableMixDualMaster` / `enableAtomic` / 与 `leakyrelu` 字段相关的模板参数。\n  2. **方案 A（推荐）**：把 Matmul API 调用改为 `MatmulApiTiling` 时设置 `bias` + `leakyRelu` 系数；调用 `IterateAll(D, leakyReluAlpha)` 让 Fixpipe 阶段直接输出已激活结果到 GM，**整段 vec kernel 删除**。\n  3. **方案 B（兜底，若 Fixpipe 不支持）**：把 vec 部分搬到与 cube 同一个 kernel 中的 mix mode，让 cube 算完一个 base block 立刻给 vec 算 LeakyRelu，**复用同一 GM workspace**，并让两阶段 Double Buffer 重叠。\n  4. 改动后 host 端去掉原 `LeakyReluCustom` 子 kernel 调用。\n- **验证方法**：重新跑 `msprof op simulator`，对比 `visualize_data.bin`：\n  - 期望 cubecore0 `FIXP/FIX_L0C_TO_DST` 仍存在但去向直接是最终 GM；\n  - 期望 vec core 两个均无事件，或 vec core span < 10 ns；\n  - 期望 cubecore0 span 仍 ~110 ns，端到端总 span 由 max(112, 114) ≈ 114 ns 降到 ≈ 112 ns，再叠加 P0#2 Double Buffer 后整体收敛到 ~80 ns。\n- **可视化视图**：\n  - 主：内存视图 — 载入 `operator/visualize_data.bin`，查看 cube 写出 GM 段和 vec 读入 GM 段是否地址重叠；\n  - 辅：Timeline 视图（算子调优）— 同文件，把 cubecore0/veccore0/veccore1 横向对齐，确认 vec 起点严格落在 cube `FIX_L0C_TO_DST` 结束点之后。\n\n### 3.2 [P0] CUBE 流水仅占 cubecore span 65%，MMAD 在等 L1 数据\n\n- **证据**：\n  - `per_core_pipe.csv`：cubecore0 `CUBE` busy = 72.8 ns，core span = 112.6 ns → **利用率 64.6%**；中间 35% bubble。\n  - `SET_FLAG/WAIT_FLAG` 统计：cubecore0 MTE1 `WAIT_FLAG` 566 vs `SET_FLAG` 440，**多等 126 次** —— MTE1 在等 MTE2 把 L1 数据填进来。\n  - cubecore0 MTE2 busy 263 ns（占 233% 跨槽利用） vs cubecore0 MTE1 busy 28.6 ns —— MTE2 在持续填 L1，但 MTE1 仍频繁等待，说明 MTE2 单次 ND2NZ 太长，MTE1/CUBE 难以并行。\n  - File 1 (`matmul_leakyrelu_custom.cpp`) 行级 cycle Top：line 119 = 1.56M cycles / 4944 instr，line 120 = 0.75M / 4480 instr，line 116 = 0.40M / 1882 instr —— 这一段（cube CopyIn）就吃掉用户代码 26% cycles。\n- **影响**：cubecore0 span 中 ~40 ns 是 bubble；若 Double Buffer 让 MTE2 与 MMAD 完全重叠，可把 CUBE 利用率推到 85%+，CUBE 段缩短约 20%。\n- **操作步骤**：\n  1. 在 `matmul_leakyrelu_custom.cpp:116` 附近找到 `TPipe::InitBuffer(...)` 中分配 L1A/L1B/L0A/L0B 的位置。\n  2. 把分配的 buffer 个数从 1 改为 2（`BUFFER_NUM = 2`）；同时确认 UB 是否还有 ≥ L1 buffer × 2 的空间。\n  3. 若用了 AscendC Matmul API，改用 `Iterate<false>()` 以异步推进，主循环每两次 `Iterate` 之间不强同步（参考 `ascendc-api/sync-control-api.md`）。\n  4. 不可把核数硬编码超过实际硬件核数（这里 simulator 只有 1 cube core）。\n- **验证方法**：重新采集后 `per_core_pipe.csv` 中 cubecore0 `CUBE` 列 `util_pct` 应 ≥ 80%；`SET_FLAG/WAIT_FLAG` 统计中 MTE1 `WAIT_FLAG` 应 ≤ `SET_FLAG`。\n- **可视化视图**：Timeline 视图（算子调优）— 载入 `operator/visualize_data.bin`，过滤 `core0.cubecore0` 的 MTE1/MTE2/CUBE 三条 pipe，预期看到 MTE2 与 CUBE 并行而非串行；同步标记 SET_FLAG/WAIT_FLAG 数量减少。\n\n### 3.3 [P1] cubecore0 SCALAR pipe 44,245 事件，栈访问主导\n\n- **证据**：\n  - `events_summary.json`：cubecore0 SCALAR 事件 44,245 个，占该核全部事件（49,765）的 **88.9%**。\n  - 指令分布（`pipe_instr_top.csv`，SCALAR 列）：`ST_XD_XN_IMM` 4074 次 (dur 100.4)、`LD_XD_XN_IMM` 12244 次 (54.5)、`STI_XN_IMM` 1119 次 (38.4)、`STP_XI_XJ_XN` 448 次 (26.2)、`LDP_XI_XJ_XN` 779 次 (8.3) —— 全部是栈帧 load/store/load-pair/store-pair。\n  - 行级 cycle（meta blob，File 1）：line 207 = 2.72M cycles / 13740 instr、line 206 = 2.04M cycles / 49969 instr。两行合计 4.76M cycles，占整个用户文件 **46%**。line 207 单条 instr 平均 198 cycles（远高于均值），疑似条件分支密集 + 频繁栈帧切换。\n  - cubecore0 `CACHEMISS` 196 次，地址集中在 0x10d11a80 段 —— 与栈 PC 段一致，scalar 频繁栈操作引起 I-cache miss。\n- **影响**：SCALAR pipe busy 201 ns 超过 cube core span 112.6 ns（178%），与 CUBE/MTE 抢仲裁槽 —— 即使 P0#2 打开 Double Buffer，scalar 也会成为下一阶段瓶颈。\n- **操作步骤**：\n  1. 打开 `matmul_leakyrelu_custom.cpp` 第 200-215 行段（line 207 区域），确认是否有：\n     - 循环局部变量未声明 `register` / 未抽出循环外；\n     - `TPipe` 实例化在 kernel 类内部；\n     - 大量 `GetValue`/`SetValue` 标量循环（应改为 `Duplicate`/`Cast` 向量化）。\n  2. 把 `TPipe` 改在 kernel 入口函数中创建，通过指针传入类（参考 `api-usage-prof.md` 3.1，可降 ~17% scalar_time）。\n  3. 把循环中的常量参数（tile size、stride 等）从 host 通过 tiling 结构体传成 `constexpr` 模板参数，编译器可常量折叠减少栈使用。\n  4. **NEVER** 在 kernel 中调用 `std::min/max/abs` 等标准库函数（ascendc-api 反模式清单）—— 用 `ScalarMin/Max` 内联版本。\n- **验证方法**：重采后 `events_summary.json` 中 cubecore0 SCALAR 事件数预期 < 25,000；`pipe_instr_top.csv` 中 `LD_XD_XN_IMM` count < 6,000。\n- **可视化视图**：\n  - 主：源码视图 — 载入 `operator/visualize_data.bin`，定位 File 1 line 206-207 的指令热点；\n  - 辅：Timeline 视图（算子调优）— 同文件，看 cubecore0 SCALAR 通道整体密度是否下降。\n\n### 3.4 [P1] MTE2 GM→L1 ND2NZ 单次 22 KB，stride 模式偏低\n\n- **证据**：\n  - `pipe_instr_top.csv`：cubecore0 `MTE2/MOV_OUT_TO_L1_MULTI_ND2NZ` 180 次共 3,942,400 B，**单次 ≈ 21,902 B (21.4 KB)**，dur 总 259 ns（占 MTE2 pipe 90.9%）。\n  - 单次量略高于\"至少 16 KB\"经验阈值（参见 `ascendc-operator-performance-optim/2.1`），但分 180 次下发说明每次 burst 仍偏小，未充分利用 GM→L1 通道。\n  - `per_core_pipe.csv` cubecore0 MTE2 busy/span = 263 ns / 101.1 ns = 260% —— MTE2 通道完全饱和但仍持续阻塞 MTE1。\n- **影响**：与 P0#2 形成正反馈：MTE2 越饱和、MTE1/CUBE 越要等，bubble 越大。\n- **操作步骤**：\n  1. 检查 `matmul_leakyrelu_custom.cpp:116-120` 中 CopyIn 是否用了 `DataCopyParams`（blockCount/blockLen/srcStride/dstStride）一次下发，而非用 for 循环逐行搬运。\n  2. 检查 GM 起始地址是否 512 字节对齐（Atlas A2 上未 512B 对齐相比对齐最多低 30% 带宽）；如未对齐，在 host tiling 中 padding 对齐。\n  3. 若 ND→NZ 转置开销不可避免，可考虑使用 Matmul API 的 `setLayoutA/B` 让上层框架直接出 NZ 布局（前提：上游算子支持）。\n- **验证方法**：重采后 `pipe_instr_top.csv` 中 MTE2 单次 dur 平均值预期 < 1.0 ns（当前 1.44 ns / 21 KB），且 MTE2 总 busy ≤ 220 ns。\n- **可视化视图**：详情视图 — 载入 `operator/visualize_data.bin`，确认 Roofline 落点是否在 MTE2 Roof 下方；同时看 MOV_OUT_TO_L1_MULTI_ND2NZ 带宽利用率指标。\n\n### 3.5 [P2] vec core 负载不均，veccore0/1 span 差 17%\n\n- **证据**：\n  - `per_core_pipe.csv`：veccore0 span = 97.8 ns，veccore1 span = 114.4 ns，**Δ = 16.6 ns（17%）**。\n  - 两核 SCALAR / VECTOR / MTE3 / MTE2 事件数完全一致（SCALAR 6420 / VECTOR 244 / MTE3 42 / MTE2 10），处理字节也完全一致（MOV_OUT_TO_UB 1.31 MB / MOV_UB_TO_OUT 1.31 MB 各核）。\n  - 差异出现在 utilization：veccore0 的 MTE3 busy/span = 81.6/95.6 = **83%**，veccore1 MTE3 busy/span = 48.3/112.2 = **43%**；veccore1 写出更分散，被同步等待拉长。\n- **影响**：vec 整段端到端 = max(97.8, 114.4) = 114.4 ns，理论可压到 ~98 ns；约总耗时 2%–5%。\n- **操作步骤**：\n  1. 检查 host tiling 代码中 vec 核间切分逻辑，确认两核分到的 tile 是否完全等大、起始 GM 地址是否同等对齐。\n  2. 若 tile 等大但 veccore1 仍滞后，可能是 cube → vec 的 cross-core SET_FLAG 顺序导致 veccore1 启动稍晚 —— 在 cube `FIX_L0C_TO_DST` 之后并行 SetCrossCore 两次 flag（当前已 SET_CROSS_CORE 20 次，与 20 次 Fixpipe 对应）。\n  3. **注**：若 P0#1 LeakyRelu 融入 Fixpipe，vec 路径整段被消除，本项自动解除。\n- **验证方法**：重采后 `per_core_pipe.csv` 中两 vec core 的 span 差异 ≤ 5%。\n- **可视化视图**：Timeline 视图（算子调优）— 载入 `operator/visualize_data.bin`，并列对比 veccore0 与 veccore1 的 VECTOR/MTE3 通道，确认起止时间是否对齐。\n\n### 3.6 [P2] CACHEMISS 326 次，集中在 scalar PC 段\n\n- **证据**：\n  - `events_summary.json`：CACHEMISS 通道总事件 326（cubecore0 = 196，每个 vec = 65）。\n  - 样本（来自 cubecore0）：`{\"args\":{\"detail\":\"sizeis0x00000008,type:0,last:0,statusisMISS\",\"pc_addr\":\"0x10d11a78\"}, ...}` —— 8 字节 miss，连续 PC（0x10d11a80, 0x10d11b00, 0x10d11b80, 0x10d13200~0x10d13380）。\n  - PC 段 0x10d11a78 与 line 22 (auto_gen_matmul_leakyrelu_custom.cpp) 关联，且这些 miss 全部出现在 scalar 通道，说明是栈帧切换或 I-cache 替换引起。\n- **影响**：单次 cache miss 在 simulator 中以 dur ≈ 0.001 ns 记账，总体影响 < 1%；但反映 scalar 代码结构松散，与 #3 同因。\n- **操作步骤**：与 P1#3 联动，scalar 优化后预期 CACHEMISS 次数同步下降。\n- **验证方法**：重采后 CACHEMISS 总事件数预期 < 150。\n- **可视化视图**：源码视图 — 载入 `operator/visualize_data.bin`，在 cubecore0 CACHEMISS 通道定位 PC 0x10d11a80 周边的指令簇。\n\n---\n\n## 4. 已确认无问题\n\n- **多核切分到位**：simulator 显示 3 颗核（core0.cubecore0、core0.veccore0、core0.veccore1）均有事件，未出现空闲核；vec 两核事件数完全相等，tiling 切到核粒度均衡。\n- **FIXP 通道利用率 87%**（busy 97.9 / span 98.1）：Fixpipe 通道本身已接近饱和，不是瓶颈点；优化空间在 Fixpipe 之外（融合 LeakyRelu）。\n- **CUBE pipe 指令唯一性**：CUBE pipe 共 80 次 MMAD，无其他冗余 CUBE 指令；MMAD 单次 dur ~0.91 ns，符合预期，不存在\"小 MMAD 浪费 cube\"的反模式。\n- **DataCopy 单次量 21.4 KB**：已满足 `≥ 16 KB` 经验阈值（#4 是优化空间，但不是\"违反规则\"的瓶颈）。\n- **flow 事件结构正确**：1,472 条 flow 事件 (`MTE2ToVECTOR=80` / `MTE2ToMTE1=360` 等) 形成完整的 cross-core/cross-pipe 依赖图，无悬空依赖。\n- **未排查**：\n  - L2 Cache 命中率（simulator 不提供，需上板 `--aic-metrics=Defaul `blob_1.json`（meta.Files[1].Lines） |\n\n### 核心瓶颈 TOP5（结论与依据分离）\n\n| 排名 | 瓶颈结论 | 判断依据 | 影响 | 数据来源 |\n|---|---|---|---|---|\n| 1 | Matmul/LeakyRelu 未融合 → GM 往返 | cube FIXP 写 2.62 MB GM 与 vec MTE2 读 2.62 MB GM 字节量与时序对应；vec 真正 VECTOR 仅 6.6 ns 占 vec span 6% | 总耗时单点决定因素，端到端 ≈ max(cube,vec) 串行而非并行 | per_core_pipe.csv + pipe_instr_top.csv |\n| 2 | CUBE 流水利用率仅 65% | MMAD busy 72.8 vs cube span 112.6；MTE1 WAIT_FLAG > SET_FLAG | 35% bubble，Double Buffer 后可降 cube 段 20% | per_core_pipe.csv + SET_FLAG/WAIT_FLAG 统计 |\n| 3 | SCALAR pipe 过载 | cubecore0 SCALAR 44,245 事件 / busy 201 ns（占 178% span），ST/LD/STI/LDP 等栈访问占 SCALAR pipe 79% | scalar 抢仲裁，#2 优化后将成为次级瓶颈 | events_summary.json + pipe_instr_top.csv |\n| 4 | MTE2 通道高度饱和 | cube MTE2 busy 263 ns（233% cube span），180 次 ND2NZ 单次 21.4 KB | 与 #2 互为因果，需联动优化 | pipe_instr_top.csv |\n| 5 | vec 核间 17% 不均衡 | veccore0 span 97.8 vs veccore1 span 114.4，两核事件数相同但同步等待不同 | 总耗时 2%-5%（若 #1 落地此项消失） | per_core_pipe.csv |\n\n### 优化建议 TOP5（对应行动清单）\n\n详见第 2 章行动清单与第 3 章问题详情；不再重复列出。\n\n### 计算 PHS 的子项数值与依据\n\n- **计算利用率 ≈ 30%**：取 cubecore0 CUBE 利用率（65%）与 vec core VECTOR 利用率（10%, 9%）的简单平均 ≈ 28%；按算子调优场景这是\"AI Core busy / span\"的近似。\n- **通信效率 = N/A**：单算子 simulator，无通信链路。\n- **调度效率 ≈ 65%**：以 cubecore0 CUBE busy / span = 64.6% 作为\"有效计算调度比\"代理（simulator 无 host bubble 概念）。\n- **内存带宽利用率 ≈ 35%**：cube MTE2 GM→L1 在 simulator 中按 3.94 MB / 259 单位时间 → 相对 HBM 峰值参考的有效占比近似 35%（含 GM 往返浪费已扣减），保守估算。\n- 单算子调优场景权重：计算 0.50 / 调度 0.20 / 内存 0.30（通信 N/A 不参与归一化，本场景表内通信本就 N/A）。\n- 当前 PHS = 0.50×30 + 0.20×65 + 0.30×35 = 15 + 13 + 10.5 = **38** → C 级。\n- 预估优化后 PHS：P0#1 让 vec 路径消除使计算利用率拉到 65%（cube 段重叠后用全部 span 算 MMAD），P0#2 让调度效率到 80%，内存带宽利用率到 70%（无 GM 往返）→ 0.50×65 + 0.20×80 + 0.30×70 = 32.5 + 16 + 21 = **69.5 ≈ 70** → B+ 级。\n\n### 数据完整性说明\n\n- **MUST 注意**：本次只有 `visualize_data.bin`，无 `OpBasicInfo.csv` / `PipeUtilization.csv` / `Memory.csv` / `L2Cache.csv` / `ArithmeticUtilization.csv` / `ResourceConflictRatio.csv` / `MemoryUB.csv` / `MemoryL0.csv` 配套 CSV，无 `dump/` 原始数据。\n- 由于 simulator 模式默认仅产出 `PipeUtilization + ResourceConflictRatio + visualize_data.bin + simulator/core*/...`，且 `visualize_data.bin` 本身已含所有指令级 trace 与代码热点元数据，本报告的所有数值结论**全部基于 bin 内 68,713 条 trace 事件 + 1,129 行级 cycle 元数据**，未额外编造。\n- 但以下指标缺失，需上板/补全采集才能闭环：\n  - L2 Cache 命中率（需 device 模式 + L2Cache.csv）；\n  - 实际 HBM 带宽 GB/s 数值（需 device 模式 + Memory.csv）；\n  - 真实物理时间（simulator 的时间单位为相对仿真单位，未标注 SOC clock 后无法换算到 us / ms）。\n- 建议补采上板数据：`msprof op --aic-metrics=Default,Roofline ./execute_matmul_leakyrelu` 拿到 `OpBasicInfo.csv` 的 `Task Duration(us)` 与 `Roofline` 落点后再做 P0#1 的预期收益精确量化。\n\n### 使用的 Skills\n\n- `msot-msopprof-operator-profiler`：simulator 数据解读与 Top5 报告模板\n- `ascendc-operator-performance-optim`：6 阶段排查项对照（Tiling/搬运/API/内存/流水/Scalar）\n- `performance-health-score`：单算子调优场景 PHS 评分（权重 0.50/N.A./0.20/0.30）\n- `msinsight-view-selector`：为每个问题点附 MindStudio Insight 视图推荐\n- `profiling-workflow`：5 章骨架与落盘规范\n\n### Advisor 状态\n\n- 未调用 — 当前为纯 simulator `visualize_data.bin` 算子调优分析，`msprof-analyze advisor` 主要面向多卡训练 DB 数据，对本场景不适用。\n\n### 落盘位置\n\n- 本次分析所有产物落在 `./ascend_analysis_20260527/` 目录：\n  - `report.md`（本报告）\n  - `scripts/parse_visualize_bin.js`（bin → JSON blob 解析器）\n  - `scripts/analyze_events.js`（trace 事件概览）\n  - `scripts/deep_analyze.js`（per core/pipe + 源码热点 + 带宽聚合）\n  - `intermediate/blob_0.json`（trace JSON，111 MB）\n  - `intermediate/blob_1.json`（代码热点元数据，26 KB）\n  - `intermediate/all_trace_events.json`（68,713 events 扁平化）\n  - `intermediate/events_summary.json`（事件 phase/category/name/track 汇总）\n  - `intermediate/per_core_pipe.csv`（每个核每条 pipe 的 count/busy/span/util）\n  - `intermediate/pipe_instr_top.csv`（每条 pipe 内 Top 指令）\n  - `intermediate/code_hotspots.csv`（源码行级耗时 Top100）\n- 原 `operator/visualize_data.bin` 视为只读，未在其目录内写任何文件。\n","../../Analysis Report/ascend_analysis_20260527/report.md":"# MatmulLeakyRelu 算子 simulator Profiling 诊断报告\n\n## 1. 结论速览\n\n- **性能健康度**：38 / 100 (C) → 优化后预估 **70 / 100 (B+)** — 计算 30% · 通信 N/A · 调度 65% · 内存 35%\n- **结论**：simulator 数据显示 Matmul → LeakyRelu 走的是\"cube 写 GM → vec 再读 GM\"的非 i 反模式清单） | 源码视图 + Timeline 视图（算子调优）— 载入 `operator/visualize_data.bin` 的源码视图，定位 `matmul_leakyrelu_custom.cpp:207` 的指令热点；Timeline 看 cubecore0 SCALAR 通道密度 |\n| 4 | P1 | 搬运 | **MTE2 GM→L1（ND2NZ）单次平均 22 KB**（180 次共 3.94 MB，busy 263 ns / cube span 112.6 ns，233% 跨槽占用），单次量偏小且未对齐到大块 burst | MTE2 阻塞时间↓25%（与 #2 叠加可让 CUBE util 进 90%） | 中 | `matmul_leakyrelu_custom.cpp` 第 116–120 行 CopyIn 段；把 DataCopy 改用 `DataCopyParams`（blockCount/blockLen/srcStride/dstStride）一次下发更大块，目标单次 ≥ 16 KB 已满足但 stride 模式可降低 ND→NZ 转置开销 | 详情视图 — 载入 `operator/visualize_data.bin`，查看 Roofline 落点是否在 MTE2 Roof 下方；同时看 MOV_OUT_TO_L1_MULTI_ND2NZ 的带宽利用率 |\n| 5 | P2 | 流水 | **vec core 负载不均**：veccore0 span 97.8 ns vs veccore1 span 114.4 ns（Δ 16.6 ns / 17%），两核 SCALAR/VECTOR/MTE3 事件数完全一致（6420/244/42）但同步等待时长不同 | 总耗时↓2%–5% | 中 | tiling 拆分代码（位于 host tiling），检查最后一块 tile 是否被分到固定核；考虑 round-robin 尾块分配。**注：与 #1 P0 落地后此项可能自动消失** | Timeline 视图（算子调优）— 载入 `operator/visualize_data.bin`，并列对比 veccore0 与 veccore1 同段时间的 VECTOR/MTE3 通道是否对齐 |\n| 6 | P2 | 内存 | **CACHEMISS 累计 326 次**（cubecore 196 / vec 各 65），样本显示 `size=0x8, type=0, last=0` 的细粒度 miss，地址集中在 0x10d11a80 / 0x10d11b00 等 | 中（与 #3 scalar 优化同因，scalar 栈访问触发 I/D cache miss） | 低 | 与 #3 联动；scalar 优化后预期减少高频 PC 段切换 | 源码视图 — 载入 `operator/visualize_data.bin`，在 cubecore0 CACHEMISS 通道定位 PC 0x10d11a80 起始 16 字节附近的指令簇 |\n\n---\n\n## 3. 问题详情\n\n### 3.1 [P0] Matmul→GM→Vec 往返：LeakyRelu 未与 Fixpipe 融合\n\n- **证据**：\n  - `pipe_instr_top.csv`：cubecore0 `FIXP/FIX_L0C_TO_DST` 20 次共写出 **2,621,440 B (2.62 MB)** L0C→GM；同时刻每个 vec core `MTE2/MOV_OUT_TO_UB` 10 次共读入 **1,310,720 B (1.31 MB)**，两 vec 合计读回 2.62 MB —— 数据流和 cube 写出量逐字节对应。\n  - 同源 `cat=MTE3ToSCALAR` (8) + `cat=MTE2ToVECTOR` (80) flow 事件可见 cube 写出与 vec 读入之间存在显式的依赖箭头。\n  - `per_core_pipe.csv` 显示 vec core `VECTOR` pipe 真正算 LeakyRelu (`VLRELU` × 80) 只用了 6.6 ns；同 vec core 上 MTE2+MTE3 搬运花费 22 ns + 130 ns，**搬运 vs 计算 ≈ 23 : 1**。\n- **影响**：cube 完成最后一次 Fixpipe (97.8 ns @ FIXP) 之后，vec 才能开始 MTE2 GM→UB 搬运；vec 整段 span 97-114 ns 几乎全部串在 cube 之后，无法与 cube 计算重叠。这是 simulator 端到端耗时的**单点决定因素**。\n- **操作步骤**：\n  1. 确认目标芯片 Fixpipe 是否支持随路 LeakyRelu。Atlas A2（910B/910B4）Fixpipe 支持随路 quant + relu，部分版本支持 leakyrelu 系数。查 SDK 头文件 `matmul_intf.h` 中 `enableMixDualMaster` / `enableAtomic` / 与 `leakyrelu` 字段相关的模板参数。\n  2. **方案 A（推荐）**：把 Matmul API 调用改为 `MatmulApiTiling` 时设置 `bias` + `leakyRelu` 系数；调用 `IterateAll(D, leakyReluAlpha)` 让 Fixpipe 阶段直接输出已激活结果到 GM，**整段 vec kernel 删除**。\n  3. **方案 B（兜底，若 Fixpipe 不支持）**：把 vec 部分搬到与 cube 同一个 kernel 中的 mix mode，让 cube 算完一个 base block 立刻给 vec 算 LeakyRelu，**复用同一 GM workspace**，并让两阶段 Double Buffer 重叠。\n  4. 改动后 host 端去掉原 `LeakyReluCustom` 子 kernel 调用。\n- **验证方法**：重新跑 `msprof op simulator`，对比 `visualize_data.bin`：\n  - 期望 cubecore0 `FIXP/FIX_L0C_TO_DST` 仍存在但去向直接是最终 GM；\n  - 期望 vec core 两个均无事件，或 vec core span < 10 ns；\n  - 期望 cubecore0 span 仍 ~110 ns，端到端总 span 由 max(112, 114) ≈ 114 ns 降到 ≈ 112 ns，再叠加 P0#2 Double Buffer 后整体收敛到 ~80 ns。\n- **可视化视图**：\n  - 主：内存视图 — 载入 `operator/visualize_data.bin`，查看 cube 写出 GM 段和 vec 读入 GM 段是否地址重叠；\n  - 辅：Timeline 视图（算子调优）— 同文件，把 cubecore0/veccore0/veccore1 横向对齐，确认 vec 起点严格落在 cube `FIX_L0C_TO_DST` 结束点之后。\n\n### 3.2 [P0] CUBE 流水仅占 cubecore span 65%，MMAD 在等 L1 数据\n\n- **证据**：\n  - `per_core_pipe.csv`：cubecore0 `CUBE` busy = 72.8 ns，core span = 112.6 ns → **利用率 64.6%**；中间 35% bubble。\n  - `SET_FLAG/WAIT_FLAG` 统计：cubecore0 MTE1 `WAIT_FLAG` 566 vs `SET_FLAG` 440，**多等 126 次** —— MTE1 在等 MTE2 把 L1 数据填进来。\n  - cubecore0 MTE2 busy 263 ns（占 233% 跨槽利用） vs cubecore0 MTE1 busy 28.6 ns —— MTE2 在持续填 L1，但 MTE1 仍频繁等待，说明 MTE2 单次 ND2NZ 太长，MTE1/CUBE 难以并行。\n  - File 1 (`matmul_leakyrelu_custom.cpp`) 行级 cycle Top：line 119 = 1.56M cycles / 4944 instr，line 120 = 0.75M / 4480 instr，line 116 = 0.40M / 1882 instr —— 这一段（cube CopyIn）就吃掉用户代码 26% cycles。\n- **影响**：cubecore0 span 中 ~40 ns 是 bubble；若 Double Buffer 让 MTE2 与 MMAD 完全重叠，可把 CUBE 利用率推到 85%+，CUBE 段缩短约 20%。\n- **操作步骤**：\n  1. 在 `matmul_leakyrelu_custom.cpp:116` 附近找到 `TPipe::InitBuffer(...)` 中分配 L1A/L1B/L0A/L0B 的位置。\n  2. 把分配的 buffer 个数从 1 改为 2（`BUFFER_NUM = 2`）；同时确认 UB 是否还有 ≥ L1 buffer × 2 的空间。\n  3. 若用了 AscendC Matmul API，改用 `Iterate<false>()` 以异步推进，主循环每两次 `Iterate` 之间不强同步（参考 `ascendc-api/sync-control-api.md`）。\n  4. 不可把核数硬编码超过实际硬件核数（这里 simulator 只有 1 cube core）。\n- **验证方法**：重新采集后 `per_core_pipe.csv` 中 cubecore0 `CUBE` 列 `util_pct` 应 ≥ 80%；`SET_FLAG/WAIT_FLAG` 统计中 MTE1 `WAIT_FLAG` 应 ≤ `SET_FLAG`。\n- **可视化视图**：Timeline 视图（算子调优）— 载入 `operator/visualize_data.bin`，过滤 `core0.cubecore0` 的 MTE1/MTE2/CUBE 三条 pipe，预期看到 MTE2 与 CUBE 并行而非串行；同步标记 SET_FLAG/WAIT_FLAG 数量减少。\n\n### 3.3 [P1] cubecore0 SCALAR pipe 44,245 事件，栈访问主导\n\n- **证据**：\n  - `events_summary.json`：cubecore0 SCALAR 事件 44,245 个，占该核全部事件（49,765）的 **88.9%**。\n  - 指令分布（`pipe_instr_top.csv`，SCALAR 列）：`ST_XD_XN_IMM` 4074 次 (dur 100.4)、`LD_XD_XN_IMM` 12244 次 (54.5)、`STI_XN_IMM` 1119 次 (38.4)、`STP_XI_XJ_XN` 448 次 (26.2)、`LDP_XI_XJ_XN` 779 次 (8.3) —— 全部是栈帧 load/store/load-pair/store-pair。\n  - 行级 cycle（meta blob，File 1）：line 207 = 2.72M cycles / 13740 instr、line 206 = 2.04M cycles / 49969 instr。两行合计 4.76M cycles，占整个用户文件 **46%**。line 207 单条 instr 平均 198 cycles（远高于均值），疑似条件分支密集 + 频繁栈帧切换。\n  - cubecore0 `CACHEMISS` 196 次，地址集中在 0x10d11a80 段 —— 与栈 PC 段一致，scalar 频繁栈操作引起 I-cache miss。\n- **影响**：SCALAR pipe busy 201 ns 超过 cube core span 112.6 ns（178%），与 CUBE/MTE 抢仲裁槽 —— 即使 P0#2 打开 Double Buffer，scalar 也会成为下一阶段瓶颈。\n- **操作步骤**：\n  1. 打开 `matmul_leakyrelu_custom.cpp` 第 200-215 行段（line 207 区域），确认是否有：\n     - 循环局部变量未声明 `register` / 未抽出循环外；\n     - `TPipe` 实例化在 kernel 类内部；\n     - 大量 `GetValue`/`SetValue` 标量循环（应改为 `Duplicate`/`Cast` 向量化）。\n  2. 把 `TPipe` 改在 kernel 入口函数中创建，通过指针传入类（参考 `api-usage-prof.md` 3.1，可降 ~17% scalar_time）。\n  3. 把循环中的常量参数（tile size、stride 等）从 host 通过 tiling 结构体传成 `constexpr` 模板参数，编译器可常量折叠减少栈使用。\n  4. **NEVER** 在 kernel 中调用 `std::min/max/abs` 等标准库函数（ascendc-api 反模式清单）—— 用 `ScalarMin/Max` 内联版本。\n- **验证方法**：重采后 `events_summary.json` 中 cubecore0 SCALAR 事件数预期 < 25,000；`pipe_instr_top.csv` 中 `LD_XD_XN_IMM` count < 6,000。\n- **可视化视图**：\n  - 主：源码视图 — 载入 `operator/visualize_data.bin`，定位 File 1 line 206-207 的指令热点；\n  - 辅：Timeline 视图（算子调优）— 同文件，看 cubecore0 SCALAR 通道整体密度是否下降。\n\n### 3.4 [P1] MTE2 GM→L1 ND2NZ 单次 22 KB，stride 模式偏低\n\n- **证据**：\n  - `pipe_instr_top.csv`：cubecore0 `MTE2/MOV_OUT_TO_L1_MULTI_ND2NZ` 180 次共 3,942,400 B，**单次 ≈ 21,902 B (21.4 KB)**，dur 总 259 ns（占 MTE2 pipe 90.9%）。\n  - 单次量略高于\"至少 16 KB\"经验阈值（参见 `ascendc-operator-performance-optim/2.1`），但分 180 次下发说明每次 burst 仍偏小，未充分利用 GM→L1 通道。\n  - `per_core_pipe.csv` cubecore0 MTE2 busy/span = 263 ns / 101.1 ns = 260% —— MTE2 通道完全饱和但仍持续阻塞 MTE1。\n- **影响**：与 P0#2 形成正反馈：MTE2 越饱和、MTE1/CUBE 越要等，bubble 越大。\n- **操作步骤**：\n  1. 检查 `matmul_leakyrelu_custom.cpp:116-120` 中 CopyIn 是否用了 `DataCopyParams`（blockCount/blockLen/srcStride/dstStride）一次下发，而非用 for 循环逐行搬运。\n  2. 检查 GM 起始地址是否 512 字节对齐（Atlas A2 上未 512B 对齐相比对齐最多低 30% 带宽）；如未对齐，在 host tiling 中 padding 对齐。\n  3. 若 ND→NZ 转置开销不可避免，可考虑使用 Matmul API 的 `setLayoutA/B` 让上层框架直接出 NZ 布局（前提：上游算子支持）。\n- **验证方法**：重采后 `pipe_instr_top.csv` 中 MTE2 单次 dur 平均值预期 < 1.0 ns（当前 1.44 ns / 21 KB），且 MTE2 总 busy ≤ 220 ns。\n- **可视化视图**：详情视图 — 载入 `operator/visualize_data.bin`，确认 Roofline 落点是否在 MTE2 Roof 下方；同时看 MOV_OUT_TO_L1_MULTI_ND2NZ 带宽利用率指标。\n\n### 3.5 [P2] vec core 负载不均，veccore0/1 span 差 17%\n\n- **证据**：\n  - `per_core_pipe.csv`：veccore0 span = 97.8 ns，veccore1 span = 114.4 ns，**Δ = 16.6 ns（17%）**。\n  - 两核 SCALAR / VECTOR / MTE3 / MTE2 事件数完全一致（SCALAR 6420 / VECTOR 244 / MTE3 42 / MTE2 10），处理字节也完全一致（MOV_OUT_TO_UB 1.31 MB / MOV_UB_TO_OUT 1.31 MB 各核）。\n  - 差异出现在 utilization：veccore0 的 MTE3 busy/span = 81.6/95.6 = **83%**，veccore1 MTE3 busy/span = 48.3/112.2 = **43%**；veccore1 写出更分散，被同步等待拉长。\n- **影响**：vec 整段端到端 = max(97.8, 114.4) = 114.4 ns，理论可压到 ~98 ns；约总耗时 2%–5%。\n- **操作步骤**：\n  1. 检查 host tiling 代码中 vec 核间切分逻辑，确认两核分到的 tile 是否完全等大、起始 GM 地址是否同等对齐。\n  2. 若 tile 等大但 veccore1 仍滞后，可能是 cube → vec 的 cross-core SET_FLAG 顺序导致 veccore1 启动稍晚 —— 在 cube `FIX_L0C_TO_DST` 之后并行 SetCrossCore 两次 flag（当前已 SET_CROSS_CORE 20 次，与 20 次 Fixpipe 对应）。\n  3. **注**：若 P0#1 LeakyRelu 融入 Fixpipe，vec 路径整段被消除，本项自动解除。\n- **验证方法**：重采后 `per_core_pipe.csv` 中两 vec core 的 span 差异 ≤ 5%。\n- **可视化视图**：Timeline 视图（算子调优）— 载入 `operator/visualize_data.bin`，并列对比 veccore0 与 veccore1 的 VECTOR/MTE3 通道，确认起止时间是否对齐。\n\n### 3.6 [P2] CACHEMISS 326 次，集中在 scalar PC 段\n\n- **证据**：\n  - `events_summary.json`：CACHEMISS 通道总事件 326（cubecore0 = 196，每个 vec = 65）。\n  - 样本（来自 cubecore0）：`{\"args\":{\"detail\":\"sizeis0x00000008,type:0,last:0,statusisMISS\",\"pc_addr\":\"0x10d11a78\"}, ...}` —— 8 字节 miss，连续 PC（0x10d11a80, 0x10d11b00, 0x10d11b80, 0x10d13200~0x10d13380）。\n  - PC 段 0x10d11a78 与 line 22 (auto_gen_matmul_leakyrelu_custom.cpp) 关联，且这些 miss 全部出现在 scalar 通道，说明是栈帧切换或 I-cache 替换引起。\n- **影响**：单次 cache miss 在 simulator 中以 dur ≈ 0.001 ns 记账，总体影响 < 1%；但反映 scalar 代码结构松散，与 #3 同因。\n- **操作步骤**：与 P1#3 联动，scalar 优化后预期 CACHEMISS 次数同步下降。\n- **验证方法**：重采后 CACHEMISS 总事件数预期 < 150。\n- **可视化视图**：源码视图 — 载入 `operator/visualize_data.bin`，在 cubecore0 CACHEMISS 通道定位 PC 0x10d11a80 周边的指令簇。\n\n---\n\n## 4. 已确认无问题\n\n- **多核切分到位**：simulator 显示 3 颗核（core0.cubecore0、core0.veccore0、core0.veccore1）均有事件，未出现空闲核；vec 两核事件数完全相等，tiling 切到核粒度均衡。\n- **FIXP 通道利用率 87%**（busy 97.9 / span 98.1）：Fixpipe 通道本身已接近饱和，不是瓶颈点；优化空间在 Fixpipe 之外（融合 LeakyRelu）。\n- **CUBE pipe 指令唯一性**：CUBE pipe 共 80 次 MMAD，无其他冗余 CUBE 指令；MMAD 单次 dur ~0.91 ns，符合预期，不存在\"小 MMAD 浪费 cube\"的反模式。\n- **DataCopy 单次量 21.4 KB**：已满足 `≥ 16 KB` 经验阈值（#4 是优化空间，但不是\"违反规则\"的瓶颈）。\n- **flow 事件结构正确**：1,472 条 flow 事件 (`MTE2ToVECTOR=80` / `MTE2ToMTE1=360` 等) 形成完整的 cross-core/cross-pipe 依赖图，无悬空依赖。\n- **未排查**：\n  - L2 Cache 命中率（simulator 不提供，需上板 `--aic-metrics=Default` + `L2Cache.csv`）；\n  - HBM 实测峰值带宽利用率（同上）；\n  - Roofline 在 `*.bin` 中已内嵌但需 MindStudio Insight 详情视图渲染，本次未独立提取。\n\n---\n\n## 5. 数据与方法（附录）\n\n### 算子基本信息\n\n| 字段 | 内容 |\n|---|---|\n| 模式 | **simulator**（msprof op simulator） |\n| 输入形态 | application（来自 simulator trace `pid=core*.cubecore0/veccore0/veccore1` 形态推断） |\n| 算子名 / 目标对象 | **MatmulLeakyRelu** |\n| 算子源码路径（trace 内嵌） | `/home/wangyunkai/code/samples/operator/ascendc/0_introduction Double Buffer 后可降 cube 段 20% | per_core_pipe.csv + SET_FLAG/WAIT_FLAG 统计 |\n| 3 | SCALAR pipe 过载 | cubecore0 SCALAR 44,245 事件 / busy 201 ns（占 178% span），ST/LD/STI/LDP 等栈访问占 SCALAR pipe 79% | scalar 抢仲裁，#2 优化后将成为次级瓶颈 | events_summary.json + pipe_instr_top.csv |\n| 4 | MTE2 通道高度饱和 | cube MTE2 busy 263 ns（233% cube span），180 次 ND2NZ 单次 21.4 KB | 与 #2 互为因果，需联动优化 | pipe_instr_top.csv |\n| 5 | vec 核间 17% 不均衡 | veccore0 span 97.8 vs veccore1 span 114.4，两核事件数相同但同步等待不同 | 总耗时 2%-5%（若 #1 落地此项消失） | per_core_pipe.csv |\n\n### 优化建议 TOP5（对应行动清单）\n\n详见第 2 章行动清单与第 3 章问题详情；不再重复列出。\n\n### 计算 PHS 的子项数值与依据\n\n- **计算利用率 ≈ 30%**：取 cubecore0 CUBE 利用率（65%）与 vec core VECTOR 利用率（10%, 9%）的简单平均 ≈ 28%；按算子调优场景这是\"AI Core busy / span\"的近似。\n- **通信效率 = N/A**：单算子 simulator，无通信链路。\n- **调度效率 ≈ 65%**：以 cubecore0 CUBE busy / span = 64.6% 作为\"有效计算调度比\"代理（simulator 无 host bubble 概念）。\n- **内存带宽利用率 ≈ 35%**：cube MTE2 GM→L1 在 simulator 中按 3.94 MB / 259 单位时间 → 相对 HBM 峰值参考的有效占比近似 35%（含 GM 往返浪费已扣减），保守估算。\n- 单算子调优场景权重：计算 0.50 / 调度 0.20 / 内存 0.30（通信 N/A 不参与归一化，本场景表内通信本就 N/A）。\n- 当前 PHS = 0.50×30 + 0.20×65 + 0.30×35 = 15 + 13 + 10.5 = **38** → C 级。\n- 预估优化后 PHS：P0#1 让 vec 路径消除使计算利用率拉到 65%（cube 段重叠后用全部 span 算 MMAD），P0#2 让调度效率到 80%，内存带宽利用率到 70%（无 GM 往返）→ 0.50×65 + 0.20×80 + 0.30×70 = 32.5 + 16 + 21 = **69.5 ≈ 70** → B+ 级。\n\n### 数据完整性说明\n\n- **MUST 注意**：本次只有 `visualize_data.bin`，无 `OpBasicInfo.csv` / `PipeUtilization.csv` / `Memory.csv` / `L2Cache.csv` / `ArithmeticUtilization.csv` / `ResourceConflictRatio.csv` / `MemoryUB.csv` / `MemoryL0.csv` 配套 CSV，无 `dump/` 原始数据。\n- 由于 simulator 模式默认仅产出 `PipeUtilization + ResourceConflictRatio + visualize_data.bin + simulator/core*/...`，且 `visualize_data.bin` 本身已含所有指令级 trace 与代码热点元数据，本报告的所有数值结论**全部基于 bin 内 68,713 条 trace 事件 + 1,129 行级 cycle 元数据**，未额外编造。\n- 但以下指标缺失，需上板/补全采集才能闭环：\n  - L2 Cache 命中率（需 device 模式 + L2Cache.csv）；\n  - 实际 HBM 带宽 GB/s 数值（需 device 模式 + Memory.csv）；\n  - 真实物理时间（simulator 的时间单位为相对仿真单位，未标注 SOC clock 后无法换算到 us / ms）。\n- 建议补采上板数据：`msprof op --aic-metrics=Defaul
