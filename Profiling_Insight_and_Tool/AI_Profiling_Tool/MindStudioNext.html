*：\n  1. 用 `kernel_details.csv` 中 `Input Shapes` 列定位 IndexPut 调用上下文（典型 shape `128,50; ; 2; 1359; 1359`）\n  2. 在业务代码中搜索 `_index_put_impl_` 调用源，把高维布尔索引 `t[bool_mask] = val` 改写为 `t = torch.where(bool_mask, val, t)`，强制走 AI_VECTOR_CORE\n  3. 若必须使用索引赋值，用 `scatter_` 配合预先计算好的 INT32 索引（避免动态 1D index 触发 AI_CPU fallback）\n- **验证方法**：改写后 `op_statistic.csv` 中 `IndexPut` Core Type 应从 AI_CPU 变为 AI_VECTOR_CORE，且 `aten::_index_put_impl_` 在 `operator_details.csv` 中的 Host Self Duration（当前 1,205,985 us）下降 ≥ 80%\n- **可视化视图**：算子视图 — 载入 `kernel_details.csv`，按 `Accelerator Core = AI_CPU` 过滤，关注 `IndexPut` 在每个 step 中的分布密度（应为每 step 5 次）；辅以 Timeline 视图观察 IndexPut 前后的同步事件\n\n### 3.3 [P0] NonZero 触发 D2H 同步，是慢 step 的根本触发器\n\n- **证据**：\n  - `api_statistic.csv`：`aclnnNonzeroV2` 调用 600 次，总耗时 313,515 us，**单次最大 72,009 us（72 ms），均值 522 us，方差 24,853,118**（极端长尾）\n  - `aclnnInplaceCopyGetWorkspaceSize` 最大 64,064 us、`aclnnGather` 最大 68,127 us——这三个 API 的极值均接近 70 ms，恰好对应慢 step 的 ~85 ms 总耗时\n  - `kernel_details.csv`：`aclnnNonzeroV2_NonzeroAiCore_NonZero` 输出形状是动态的 `(2, N)`（N=94, 1359, ...），证实存在 host 等待 device 完成才能拿到 shape\n  - `aclrtSynchronizeStreamWithTimeout` 调用 600 次（恰等于 NonZero 调用次数），证实每个 NonZero 后都跟着一次 stream sync\n- **影响**：双峰分布的成因——59 个慢 step 是 NonZero 后 host 拿到的 shape 较大，触发额外 IndexPut 分支；41 个快 step shape 较小，跳过分支\n- **操作步骤**：\n  1. 业务代码中搜索 `torch.nonzero(...)` / `(x > 0).nonzero()` / `torch.where(x)` 调用（每 step 5–6 处）\n  2. 若 nonzero 是为了取 top-k 大值索引，改用 `torch.topk(x, k=固定值)`，保持静态 shape\n  3. 若 nonzero 是为了做稀疏 mask，改用 `x.masked_select(...)` 或 `x[mask].view(-1, d)` 配合 boolean mask 索引（torch_npu 已优化为 AI_VECTOR_CORE）\n  4. 若动态 shape 无法消除，封装为子图并用 `aclmdlSetDynamicShape` 提前注册可能的 shape 集合\n- **验证方法**：重采后 `aclnnNonzeroV2` 在 `api_statistic.csv` 中的 Max 值应从 72,009 us 降到 < 5,000 us；`step_trace_time.csv` 中慢 step 的占比从当前 59% 降到 < 10%\n- **可视化视图**：Timeline 视图（系统调优）— 载入 `trace_view.json`，搜索 `aclnnNonzeroV2`，观察其后紧跟的 `aclrtSynchronizeStreamWithTimeout` 与下一个 `aclnnXxx` launch 之间的 host gap，即为 D2H 同步开销\n\n### 3.4 [P0] GatherElements 同样落 AI_CPU\n\n- **证据**：\n  - `op_statistic.csv`：`GatherElements` Core Type = **AI_CPU**，400 次共 28,642 us，单次均值 71.6 us，最大 100 us\n  - `kernel_details.csv`：dtype 路径为 `INT64; INT64; INT64`，证实是 INT64 索引触发的 AI_CPU fallback（CANN 对部分 INT64 维度的 GatherElements 暂未实现 AI Core 算子）\n- **影响**：占 NPU 计算 6.62%；与 IndexPut 类似，AI_CPU 任务会阻塞 device 后续 kernel 下发\n- **操作步骤**：\n  1. 在调用前对索引 tensor 做 `.to(torch.int32)`，让 `aclnnGather` 走 AI Core 路径\n  2. 若可能，把 `gather` 改写为 `index_select`（AI Core 支持更全）\n  3. 升级到 CANN 8.3 latest hotfix（当前 8.3.RC1）后再次复测，确认 INT64 GatherElements 算子白名单是否覆盖到本场景 shape\n- **验证方法**：改写后 `kernel_details.csv` 中所有 `GatherElements` Accelerator Core 应不再出现 `AI_CPU`\n- **可视化视图**：算子视图 — `kernel_details.csv`，按 Type=`GatherElements` + dtype 过滤，确认 dtype 变更后 Core 切换情况\n\n### 3.5 [P1] MatMul/BatchMatMul 算子粒度过小，Cube 单元利用率 5.8%\n\n- **证据**：\n  - `kernel_details.csv` 中 6,100 个 AI_CORE kernel：`aic_mac_ratio` 均值 0.058（5.8%），`aic_scalar_ratio` 均值 0.811（81.1%），`aic_mte2_ratio` 均值 0.142（14.2%），`cube_utilization` 均值 47%\n  - 典型 MatMul shape：`128,64 × 16,64`、`2048,16 × 64,16`、`128,16 × 64,16`，K 维仅 16–64，远低于 Ascend 910B Cube 单元 16×16×16 单次完成的设计利用阈值\n  - MatMulV2 4500 次共 15.8 ms（单次 3.5 us），BatchMatMulV2 1600 次共 16.9 ms（单次 10.6 us）——Cube 在做\"瞎忙\"\n- **影响**：即便消除 host 瓶颈，Cube 单元的浪费意味着 NPU 算力理论上限的 95% 未被使用\n- **操作步骤**：\n  1. 用 `operator_details.csv` 反查所有 MatMul 来源——很可能是模型中多 head/多塔的分头 Linear\n  2. 把多个 `nn.Linear(d, h)` 合并为单个 `nn.Linear(d, n*h)` 后切分，或包成 `BatchMatMul`（M 维做 batch）\n  3. K 维从 16/64 提升到 128 以上后，`aic_mac_ratio` 可提升到 30–50%\n- **验证方法**：算子改造后单 MatMul 的 `aic_mac_ratio` 应 ≥ 0.3；`op-mfu-calculator` 计算的 MFU 从当前 < 1% 提升到 5–10%\n- **可视化视图**：详情视图 — 载入算子 `.bin`（位于 `PROF_*/` 目录下），观察 Roofline 图（当前落点应在 Memory Bound 区域且远低于 Compute Roof）；辅以算子视图看耗时分布\n\n### 3.6 [P1] MemSet 每步触发 46 次，workspace 未复用\n\n- **证据**：\n  - `op_statistic.csv`：`MemSet` 4600 次共 46,189 us（占 NPU 计算 **10.67%**，居第二）\n  - `profiler_metadata.json` 中 `ACLNN_CACHE_LIMIT`、`HOST_CACHE_CAPACITY` 环境变量均为空\n- **影响**：每个 aclnn 算子调用前都重新分配 workspace 并清零，浪费 device 算力\n- **操作步骤**：\n  1. 设置环境变量：`export ACLNN_CACHE_LIMIT=10000`、`export HOST_CACHE_CAPACITY=20`\n  2. 若使用 PyTorch + torch_npu，确认 `torch_npu.npu.set_device(...)` 之前完成环境变量设置\n- **验证方法**：重采后 `MemSet` 调用次数应从 4600 降到 < 1000；Total Time 占比从 10.67% 降到 < 3%\n- **可视化视图**：Timeline 视图（系统调优）— 过滤 `MemSet` 任务点，观察其在每个算子前的密度变化\n\n### 3.7 [P1] aclnnInplaceCopyGetWorkspaceSize 极端长尾\n\n- **证据**：\n  - `api_statistic.csv`：`aclnnInplaceCopyGetWorkspaceSize` 调用 1800 次，总耗时 108,387 us，**单次最大 64,065 us，方差 2,279,200**\n  - `aclnnInplaceCopy` 本身只占 27,830 us、最大 76 us，问题完全在 GetWorkspaceSize 调用\n- **影响**：少数 GetWorkspaceSize 调用一次卡 50–64 ms，与 NonZero / Gather 长尾叠加形成 host 端 stall\n- **操作步骤**：\n  1. 升级 CANN 到 8.3 latest 修复版\n  2. 同时启用上一条的 `ACLNN_CACHE_LIMIT` 让 workspace 计算缓存生效\n  3. 若仍存在长尾，提 ticket：`aclnnInplaceCopyGetWorkspaceSize` 在 dynamic shape 路径下应避免重新计算\n- **验证方法**：单次 Max 应从 64 ms 降到 < 200 us\n- **可视化视图**：Timeline 视图（系统调优）— `trace_view.json` host 泳道，按 API 名字过滤 `aclnnInplaceCopyGetWorkspaceSize`，观察长尾分布\n\n### 3.8 [P2] 每步 7 次同步调用，建议清查显式同步\n\n- **证据**：\n  - `api_statistic.csv`：`aclrtSynchronizeDeviceWithTimeout` 101 次（每 step 1 次 + 1 次结束），`aclrtSynchronizeStreamWithTimeout` 600 次（每 step 6 次）\n  - 600 次 stream sync 与 600 次 `aclnnNonzeroV2` 调用数完全一致——大部分 sync 是 NonZero 引发，3.3 解决后会自动消失\n- **影响**：device sync 直接序列化 host/device 流水线\n- **操作步骤**：\n  1. 业务代码中搜索 `torch.npu.synchronize()` / `.cpu()` / `.item()` / `.tolist()` / `print(tensor)` 等显式同步点\n  2. 把它们集中到 step 末尾或后处理阶段，避免在主循环里穿插\n- **验证方法**：`aclrtSynchronizeDeviceWithTimeout` 应降到每 step ≤ 1 次（即 100 次以内）\n- **可视化视图**：Timeline 视图（系统调优）— 过滤 `aclrtSynchronize*`，按 step 切片观察分布\n\n---\n\n## 4. 已确认无问题\n\n- **通信** — 单卡场景，`step_trace_time.csv` 中 Communication 列恒为 0，无通信瓶颈（N/A）\n- **采集完整性** — `profiler_info.json` 正常 Stop，`ASCEND_PROFILER_OUTPUT/` 下 8 个交付件（含 db + text 双模式）齐全\n- **Step 间稳定性** — 100 步 Computing 时间标准差 < 1%（4277–4477 us），NPU 算子执行本身没有波动\n- **Preparing 阶段** — 均值 218 us，最大 447 us，远低于 step 耗时，dataloader / 输入准备无瓶颈\n- **MemCopy 算子** — `aclnnInplaceCopy` 的 device 端表现正常（最大 76 us），仅其 GetWorkspaceSize 异常（见 3.7）\n- **通信** —（重申）单卡无需检查 HCCL / 链路；本报告完全跳过 `msprof-analyze advisor cluster*` 流程\n\n未排查项：\n- **HBM 带宽 / L2Cache 命中率** — `profiler_info.json` 中 `_l2_cache: false`、`profile_memory: false`，未采集，**内存子项判 N/A**\n- **算子源码热点（.bin Roofline）** — 框架 profiler 不导出 `.bin`，需后续单独跑 msOpProf 才能定性 MatMul 是否 Memory / Compute Bound\n\n---\n\n## 5. 数据与方法\n\n- **分析日期**：2026-05-28\n- **数据路径**：`d:/Projects/ProfilingTest/eta_eager_l1/1640123b27bd_12093_20260110074326034_ascend_pt/`\n- **数据范围**：单卡（Device 0），step 10–109 共 100 步，采集时长 ~5.88 s，采集级别 Level1，profile_memory=false、with_stack=false\n- **torch_npu / CANN 版本**：torch_npu 2.6.0 / CANN 8.3.RC1\n- **使用的 Skills**：\n  - `mindstudio_profiler_data_check`：校验 Profiling 数据完整性（valid，框架 profiler PyTorch 单卡）\n  - `ascend-profiler-db-explorer`：未直接调用（环境无 Python，改走 CSV 聚合）\n  - `performance-health-score`：按\"单卡推理\"场景权重（计算 0.50 / 调度 0.30，通信 N/A、内存 N/A）计算 PHS\n  - `msinsight-view-selector`：为每个问题点附 Insight 可视化视图（Timeline 系统调优 / 算子视图 / 详情视图）\n- **Advisor 状态**：\n  - `msprof-analyze advisor`：**失败** — 当前环境 `python` / `msprof-analyze` 均不在 PATH（仅有 Microsoft Store 别名）；建议在装有 CANN toolkit 的 Linux 节点上执行 `msprof-analyze advisor -d eta_eager_l1/1640123b27bd_12093_20260110074326034_ascend_pt/ASCEND_PROFILER_OUTPUT/` 进行二次诊断\n- **输出位置**：`./eta_eager_l1_analysis_20260528/`（本次分析所有产物均在此目录下）\n  - `report.md` — 本报告\n  - `intermediate/step_summary.csv` — 100 步的 Compute/Free/Stage/Preparing 时间提取\n  - `intermediate/top_apis.csv` — 按 Total Time 降序的 Top 15 host API\n  - `intermediate/top_ops.csv` — 按 Total Time 降序的 Top 12 NPU 算子\n  - `figures/` — 预留（本次未生成图表，因 Python 不可用；可在带 Python 环境的机器上用上述 CSV 自行生成）\n- **PHS 计算细节**：\n  - 计算利用率 = NPU 实际算子时间 432.77 ms ÷ Stage 总时间 5883.72 ms = **7.36%** → 取整 7%\n  - 调度效率 = (1 − Free 5450.95 ms ÷ Stage 5883.72 ms) × 100 = **7.36%** → 取整 7%\n  - 通信 / 内存子项 N/A，权重归一化：计算 0.50 / 0.80 = 0.625，调度 0.30 / 0.80 = 0.375\n  - **当前 PHS** = 0.625 × 7 + 0.375 × 7 = 7 → 等级 **D**\n  - 优化后预估：若 P0/P1 全部落地（图模式 + 消除 AI_CPU 算子 + 消除 D2H 同步 + 算子合并），计算利用率有望提升到 35%、调度效率提升到 75%，PHS = 0.625 × 35 + 0.375 × 75 ≈ **48** → 等级 **B**\n","../../Analysis Report/eta_eager_l1_analysis_20260528/report.md":"# eta_eager_l1 推理 Profiling 性能分析报告\n\n## 1. 结论速览\n\n- **性能健康度**：7 / 100 (D) → 优化后预估 **48 / 100 (B)** — 计算 7% · 通信 N/A · 调度 7% · 内存 N/A\n- **结论**：单卡推理被 Host 下发完全主导，NPU 100 个 step 中只用 7.36% 的墙钟在跑算子；其余 92.6% 是 device idle（Free Time）\n- **头号瓶颈**：steps 呈双峰分布——59 个\"慢 step\"平均 86.7 ms（Free 82 ms），41 个\"快 step\"平均 18.7 ms（Free 14 ms），计算时间在所有 step 完全恒定 4.3 ms；瓶颈完全在 host launch 与 AI_CPU 算子（`IndexPut` / `GatherElements`）\n- **收益上限**：行动清单 P0/P1 全部落地后预估单步耗时从均值 58.8 ms 降到 ~18 ms，全程节省 **~3.9 s（~69%）**\n\n---\n\n## 2. 行动清单\n\n> 默认按\"预期收益\"从高到低排序；同档收益按\"修改难度\"从低到高排序。\n\n| # | 优先级 | 问题 | 预期收益 | 修改难度 | 在哪改 / 对应位置 | 可视化视图 |\n|---|---|---|---|---|---|---|\n| 1 | P0 | NPU 整体 idle 92.6%，每步 ~54 ms host 下发气泡，eager 模式逐算子下发 353 个 kernel/step | -65% 单步耗时 | 中 | 切换到图模式：`torch.compile(backend=\"npu\")` 或 `torch_npu.npu.experimental_config(graph_mode=True)` | Timeline 视图（系统调优）— 载入 `trace_view.json`，过滤 PyTorch / CANN / Ascend Hardware 三泳道，观察 launch API 与 device task 之间的水平空隙 |\n| 2 | P0 | `IndexPut` 算子全部跑在 AI_CPU 上，500 次调用 68.2 ms（占 NPU 计算 15.76%），单次 136 us 是普通 AI_VECTOR 算子的 13 倍 | -15% 单步耗时 | 中 | 业务代码中 `tensor[idx] = val` / `torch.index_put_` 的 5 处调用，改用 `scatter_` 或预先把 mask 转 dense，避免触发 AI_CPU 分支 | 算子视图 — 载入 `kernel_details.csv`，按 `Accelerator Core=AI_CPU` 过滤，定位 `aclnnIndexPutImpl_IndexPut_IndexPut` 的调用 step 与 shape |\n| 3 | P0 | `NonZero` + `aclnnNonzeroV2` 产生 D2H 同步，单次最大 72 ms（均值 522 us），是慢 step 的直接触发源 | -15% 单步耗时 | 高 | 业务代码中用 `nonzero()` / `torch.where()` 拿索引的地方（500 次/100 step = 5 次/step），改成 `topk(mask, k=固定值)` 或 boolean mask × 静态索引，消除动态 shape | Timeline 视图（系统调优）— 载入 `trace_view.json`，搜索 `aclnnNonzeroV2`，观察其后紧跟 `aclrtSynchronizeStream` / `aclrtSynchronizeDevice` 的间隔 |\n| 4 | P0 | `GatherElements` 同样落 AI_CPU，400 次共 28.6 ms（占 NPU 6.6%），单次 71.6 us | -7% 单步耗时 | 低 | 业务代码中 `torch.gather(dim=...)` 的调用，将输入 dtype 由 INT64 转 INT32 或 FP16，让 `aclnnGather` 走 AI Core 路径（参考 CANN 8.3 算子白名单） | 算子视图 — `kernel_details.csv`，按 Type=`GatherElements` 过滤，对比 input dtype 与 core type 关系 |\n| 5 | P1 | MatMul 类算子 cube `mac_ratio` 均值 5.8%、scalar_ratio 81.1%、cube_utilization 47% — 算子粒度过小（如 128×64 × 16×64），Cube 单元基本闲置 | 中 | 中 | 把多个小 MatMul / Linear 合并成 BatchMatMul；或对模型中 ≤128 维的 head 增大 batch 维 / 折叠为 grouped GEMM | 详情视图 — 载入算子 `.bin`，观察 Roofline 落点（应在 Memory Bound 区且远低于 Compute Roof）；辅以算子视图看耗时占比 |\n| 6 | P1 | `MemSet` 算子被调用 4600 次 / 100 step（每步 46 次），占 NPU 计算 10.7% — 大量被动 buffer 清零 | -3% 单步耗时 | 中 | 检查框架是否对每个 `aclnnXxx` 都做 workspace clear，开启 `ACLNN_CACHE_LIMIT` 和 `HOST_CACHE_CAPACITY` 环境变量（当前都为空）启用 workspace 复用 | Timeline 视图（系统调优）— 过滤 `MemSet` task，观察其与算子主体的时间关系 |\n| 7 | P1 | `aclnnInplaceCopyGetWorkspaceSize` 单次最大 64 ms（均值 60 us），是 host launch 的尾延迟首位 | -2% 单步耗时 | 低 | 已是 8.3.RC1 CANN 版本，建议升级到包含 workspace 计算缓存的最新 hotfix，或显式开启 `_data_simplification: true` | Timeline 视图（系统调优）— `trace_view.json` 过滤 host CANN 泳道，观察 `aclnnInplaceCopyGetWorkspaceSize` 长尾 |\n| 8 | P2 | 600 次 `aclrtSynchronizeStream` + 101 次 `aclrtSynchronizeDeviceWithTimeout`（每步 ~7 次同步），强制阻塞 host | 低 | 中 | 业务代码中显式或隐式 `.cpu()` / `.item()` / `print(tensor)` 调用全部清查，移到后处理阶段 | Timeline 视图（系统调优）— 过滤 `aclrtSynchronize*` API，统计落点 step 与对应业务函数 |\n\n---\n\n## 3. 问题详情\n\n### 3.1 [P0] NPU 92.6% 时间空转，host 下发模式无法跟上 device\n\n- **证据**：\n  - `step_trace_time.csv` 100 步：Computing 总和 432.77 ms，Stage 总和 5883.72 ms，**NPU 计算占比仅 7.36%**\n  - Free Time 5450.95 ms（92.6%）；Computing 均值 4327 us/step，标准差 < 1%（极度稳定）\n  - `kernel_details.csv`：每步固定 353 个 kernel，平均单 kernel 仅 12.26 us\n  - `api_statistic.csv` 中 `node launch` 共 35,300 次，平均 14.45 us/次，最大 71,944 us（单次 launch 长尾 72 ms）\n- **影响**：在 V100/910B 量级硬件上，每个推理样本本应 ~5 ms 完成，实际 58.8 ms，吞吐损失 ~10×\n- **操作步骤**：\n  1. 优先切换到 PyTorch 图模式：`model = torch.compile(model, backend=\"npu\", mode=\"reduce-overhead\")`（torch_npu 2.6 已支持）；或迁移到 GE 图模式\n  2. 验证下发瓶颈解除：单步 `Free / Stage` 应从 0.93 降到 < 0.3\n  3. 若无法切图，至少开启 `taskqueue_enable=1` 让 host launch 异步化（环境变量 `TASK_QUEUE_ENABLE=2`）\n- **验证方法**：重采 profiling 后，对比 `step_trace_time.csv` 的 Computing/Stage 比值——目标 ≥ 50%；并确认 `kernel_details.csv` 的 Wait Time 总和（当前 5+ s）降到 < 1 s\n- **可视化视图**：Timeline 视图（系统调优）— 载入 `trace_view.json`，并排查看 PyTorch / CANN / Ascend Hardware 三个泳道，观察 host launch 与 device 算子的水平间隙（当前肉眼可见的\"空白条带\"即为 Free Time）\n\n### 3.2 [P0] AI_CPU 算子 IndexPut 阻塞 device pipeline\n\n- **证据**：\n  - `op_statistic.csv`：`IndexPut` Core Type = **AI_CPU**，500 次调用，总耗时 68,186 us（占 NPU 计算的 **15.76%**），单次均值 136 us，最大 234 us\n  - `kernel_details.csv`：`aclnnIndexPutImpl_IndexPut_IndexPut` 是 AI_CPU 算子，**500 次平均 Wait Time 1502 us**（在所有算子类型中排第一）——意味着每次 IndexPut 后 device 平均空转 1.5 ms 等待下一个 kernel\n  - 关联 API：`aclnnIndexPutImpl` 总耗时 28 ms，最大单次 414 us，方差极大（1509）\n- **影响**：500 × 1.5 ms = 750 ms 的额外 device idle，几乎与 IndexPut 自身耗时同量级\n- **操作步骤**：\n  1. 用 `kernel_details.csv` 中 `Input Shapes` 列定位 IndexPut 调用上下文（典型 shape `128,50; ; 2; 1359; 1359`）\n  2. 在业务代码中搜索 `_index_put_impl_` 调用源，把高维布尔索引 `t[bool_mask] = val` 改写为 `t = torch.where(bool_mask, val, t)`，强制走 AI_VECTOR_CORE\n  3. 若必须使用索引赋值，用 `scatter_` 配合预先计算好的 INT32 索引（避免动态 1D index 触发 AI_CPU fallback）\n- **验证方法**：改写后 `op_statistic.csv` 中 `IndexPut` Core Type 应从 AI_CPU 变为 AI_VECTOR_CORE，且 `aten::_index_put_impl_` 在 `operator_details.csv` 中的 Host Self Duration（当前 1,205,985 us）下降 ≥ 80%\n- **可视化视图**：算子视图 — 载入 `kernel_details.csv`，按 `Accelerator Core = AI_CPU` 过滤，关注 `IndexPut` 在每个 step 中的分布密度（应为每 step 5 次）；辅以 Timeline 视图观察 IndexPut 前后的同步事件\n\n### 3.3 [P0] NonZero 触发 D2H 同步，是慢 step 的根本触发器\n\n- **证据**：\n  - `api_statistic.csv`：`aclnnNonzeroV2` 调用 600 次，总耗时 313,515 us，**单次最大 72,009 us（72 ms），均值 522 us，方差 24,853,118**（极端长尾）\n  - `aclnnInplaceCopyGetWorkspaceSize` 最大 64,064 us、`aclnnGather` 最大 68,127 us——这三个 API 的极值均接近 70 ms，恰好对应慢 step 的 ~85 ms 总耗时\n  - `kernel_details.csv`：`aclnnNonzeroV2_NonzeroAiCore_NonZero` 输出形状是动态的 `(2, N)`（N=94, 1359, ...），证实存在 host 等待 device 完成才能拿到 shape\n  - `aclrtSynchronizeStreamWithTimeout` 调用 600 次（恰等于 NonZero 调用次数），证实每个 NonZero 后都跟着一次 stream sync\n- **影响**：双峰分布的成因——59 个慢 step 是 NonZero 后 host 拿到的 shape 较大，触发额外 IndexPut 分支；41 个快 step shape 较小，跳过分支\n- **操作步骤**：\n  1. 业务代码中搜索 `torch.nonzero(...)` / `(x > 0).nonzero()` / `torch.where(x)` 调用（每 step 5–6 处）\n  2. 若 nonzero 是为了取 top-k 大值索引，改用 `torch.topk(x, k=固定值)`，保持静态 shape\n  3. 若 nonzero 是为了做稀疏 mask，改用 `x.masked_select(...)` 或 `x[mask].view(-1, d)` 配合 boolean mask 索引（torch_npu 已优化为 AI_VECTOR_CORE）\n  4. 若动态 shape 无法消除，封装为子图并用 `aclmdlSetDynamicShape` 提前注册可能的 shape 集合\n- **验证方法**：重采后 `aclnnNonzeroV2` 在 `api_statistic.csv` 中的 Max 值应从 72,009 us 降到 < 5,000 us；`step_trace_time.csv` 中慢 step 的占比从当前 59% 降到 < 10%\n- **可视化视图**：Timeline 视图（系统调优）— 载入 `trace_view.json`，搜索 `aclnnNonzeroV2`，观察其后紧跟的 `aclrtSynchronizeStreamWithTimeout` 与下一个 `aclnnXxx` launch 之间的 host gap，即为 D2H 同步开销\n\n### 3.4 [P0] GatherElements 同样落 AI_CPU\n\n- **证据**：\n  - `op_statistic.csv`：`GatherElements` Core Type = **AI_CPU**，400 次共 28,642 us，单次均值 71.6 us，最大 100 us\n  - `kernel_details.csv`：dtype 路径为 `INT64; INT64; INT64`，证实是 INT64 索引触发的 AI_CPU fallback（CANN 对部分 INT64 维度的 GatherElements 暂未实现 AI Core 算子）\n- **影响**：占 NPU 计算 6.62%；与 IndexPut 类似，AI_CPU 任务会阻塞 device 后续 kernel 下发\n- **操作步骤**：\n  1. 在调用前对索引 tensor 做 `.to(torch.int32)`，让 `aclnnGather` 走 AI Core 路径\n  2. 若可能，把 `gather` 改写为 `index_select`（AI Core 支持更全）\n  3. 升级到 CANN 8.3 latest hotfix（当前 8.3.RC1）后再次复测，确认 INT64 GatherElements 算子白名单是否覆盖到本场景 shape\n- **验证方法**：改写后 `kernel_details.csv` 中所有 `GatherElements` Accelerator Core 应不再出现 `AI_CPU`\n- **可视化视图**：算子视图 — `kernel_details.csv`，按 Type=`GatherElements` + dtype 过滤，确认 dtype 变更后 Core 切换情况\n\n### 3.5 [P1] MatMul/BatchMatMul 算子粒度过小，Cube 单元利用率 5.8%\n\n- **证据**：\n  - `kernel_details.csv` 中 6,100 个 AI_CORE kernel：`aic_mac_ratio` 均值 0.058（5.8%），`aic_scalar_ratio` 均值 0.811（81.1%），`aic_mte2_ratio` 均值 0.142（14.2%），`cube_utilization` 均值 47%\n  - 典型 MatMul shape：`128,64 × 16,64`、`2048,16 × 64,16`、`128,16 × 64,16`，K 维仅 16–64，远低于 Ascend 910B Cube 单元 16×16×16 单次完成的设计利用阈值\n  - MatMulV2 4500 次共 15.8 ms（单次 3.5 us），BatchMatMulV2 1600 次共 16.9 ms（单次 10.6 us）——Cube 在做\"瞎忙\"\n- **影响**：即便消除 host 瓶颈，Cube 单元的浪费意味着 NPU 算力理论上限的 95% 未被使用\n- **操作步骤**：\n  1. 用 `operator_details.csv` 反查所有 MatMul 来源——很可能是模型中多 head/多塔的分头 Linear\n  2. 把多个 `nn.Linear(d, h)` 合并为单个 `nn.Linear(d, n*h)` 后切分，或包成 `BatchMatMul`（M 维做 batch）\n  3. K 维从 16/64 提升到 128 以上后，`aic_mac_ratio` 可提升到 30–50%\n- **验证方法**：算子改造后单 MatMul 的 `aic_mac_ratio` 应 ≥ 0.3；`op-mfu-calculator` 计算的 MFU 从当前 < 1% 提升到 5–10%\n- **可视化视图**：详情视图 — 载入算子 `.bin`（位于 `PROF_*/` 目录下），观察 Roofline 图（当前落点应在 Memory Bound 区域且远低于 Compute Roof）；辅以算子视图看耗时分布\n\n### 3.6 [P1] MemSet 每步触发 46 次，workspace 未复用\n\n- **证据**：\n  - `op_statistic.csv`：`MemSet` 4600 次共 46,189 us（占 NPU 计算 **10.67%**，居第二）\n  - `profiler_metadata.json` 中 `ACLNN_CACHE_LIMIT`、`HOST_CACHE_CAPACITY` 环境变量均为空\n- **影响**：每个 aclnn 算子调用前都重新分配 workspace 并清零，浪费 device 算力\n- **操作步骤**：\n  1. 设置环境变量：`export ACLNN_CACHE_LIMIT=10000`、`export HOST_CACHE_CAPACITY=20`\n  2. 若使用 PyTorch + torch_npu，确认 `torch_npu.npu.set_device(...)` 之前完成环境变量设置\n- **验证方法**：重采后 `MemSet` 调用次数应从 4600 降到 < 1000；Total Time 占比从 10.67% 降到 < 3%\n- **可视化视图**：Timeline 视图（系统调优）— 过滤 `MemSet` 任务点，观察其在每个算子前的密度变化\n\n### 3.7 [P1] aclnnInplaceCopyGetWorkspaceSize 极端长尾\n\n- **证据**：\n  - `api_statistic.csv`：`aclnnInplaceCopyGetWorkspaceSize` 调用 1800 次，总耗时 108,387 us，**单次最大 64,065 us，方差 2,279,200**\n  - `aclnnInplaceCopy` 本身只占 27,830 us、最大 76 us，问题完全在 GetWorkspaceSize 调用\n- **影响**：少数 GetWorkspaceSize 调用一次卡 50–64 ms，与 NonZero / Gather 长尾叠加形成 host 端 stall\n- **操作步骤**：\n  1. 升级 CANN 到 8.3 latest 修复版\n  2. 同时启用上一条的 `ACLNN_CACHE_LIMIT` 让 workspace 计算缓存生效\n  3. 若仍存在长尾，提 ticket：`aclnnInplaceCopyGetWorkspaceSize` 在 dynamic shape 路径下应避免重新计算\n- **验证方法**：单次 Max 应从 64 ms 降到 < 200 us\n- **可视化视图**：Timeline 视图（系统调优）— `trace_view.json` host 泳道，按 API 名字过滤 `aclnnInplaceCopyGetWorkspaceSize`，观察长尾分布\n\n### 3.8 [P2] 每步 7 次同步调用，建议清查显式同步\n\n- **证据**：\n  - `api_statistic.csv`：`aclrtSynchronizeDeviceWithTimeout` 101 次（每 step 1 次 + 1 次结束），`aclrtSynchronizeStreamWithTimeout` 600 次（每 step 6 次）\n  - 600 次 stream sync 与 600 次 `aclnnNonzeroV2` 调用数完全一致——大部分 sync 是 NonZero 引发，3.3 解决后会自动消失\n- **影响**：device sync 直接序列化 host/device 流水线\n- **操作步骤**：\n  1. 业务代码中搜索 `torch.npu.synchronize()` / `.cpu()` / `.item()` / `.tolist()` / `print(tensor)` 等显式同步点\n  2. 把它们集中到 step 末尾或后处理阶段，避免在主循环里穿插\n- **验证方法**：`aclrtSynchronizeDeviceWithTimeout` 应降到每 step ≤ 1 次（即 100 次以内）\n- **可视化视图**：Timeline 视图（系统调优）— 过滤 `aclrtSynchronize*`，按 step 切片观察分布\n\n---\n\n## 4. 已确认无问题\n\n- **通信** — 单卡场景，`step_trace_time.csv` 中 Communication 列恒为 0，无通信瓶颈（N/A）\n- **采集完整性** — `profiler_info.json` 正常 Stop，`ASCEND_PROFILER_OUTPUT/` 下 8 个交付件（含 db + text 双模式）齐全\n- **Step 间稳定性** — 100 步 Computing 时间标准差 < 1%（4277–4477 us），NPU 算子执行本身没有波动\n- **Preparing 阶段** — 均值 218 us，最大 447 us，远低于 step 耗时，dataloader / 输入准备无瓶颈\n- **MemCopy 算子** — `aclnnInplaceCopy` 的 device 端表现正常（最大 76 us），仅其 GetWorkspaceSize 异常（见 3.7）\n- **通信** —（重申）单卡无需检查 HCCL / 链路；本报告完全跳过 `msprof-analyze advisor cluster*` 流程\n\n未排查项：\n- **HBM 带宽 / L2Cache 命中率** — `profiler_info.json` 中 `_l2_cache: false`、`profile_memory: false`，未采集，**内存子项判 N/A**\n- **算子源码热点（.bin Roofline）** — 框架 profiler 不导出 `.bin`，需后续单独跑 msOpProf 才能定性 MatMul 是否 Memory / Compute Bound\n\n---\n\n## 5. 数据与方法\n\n- **分析日期**：2026-05-28\n- **数据路径**：`d:/Projects/ProfilingTest/eta_eager_l1/1640123b27bd_12093_20260110074326034_ascend_pt/`\n- **数据范围**：单卡（Device 0），step 10–109 共 100 步，采集时长 ~5.88 s，采集级别 Level1，profile_memory=false、with_stack=false\n- **torch_npu / CANN 版本**：torch_npu 2.6.0 / CANN 8.3.RC1\n- **使用的 Skills**：\n  - `mindstudio_profiler_data_check`：校验 Profiling 数据完整性（valid，框架 profiler PyTorch 单卡）\n  - `ascend-profiler-db-explorer`：未直接调用（环境无 Python，改走 CSV 聚合）\n  - `performance-health-score`：按\"单卡推理\"场景权重（计算 0.50 / 调度 0.30，通信 N/A、内存 N/A）计算 PHS\n  - `msinsight-view-selector`：为每个问题点附 Insight 可视化视图（Timeline 系统调优 / 算子视图 / 详情视图）\n- **Advisor 状态**：\n  - `msprof-analyze advisor`：**失败** — 当前环境 `python` / `msprof-analyze` 均不在 PATH（仅有 Microsoft Store 别名）；建议在装有 CANN toolkit 的 Linux 节点上执行 `msprof-analyze advisor -d eta_eager_l1/1640123b27bd_12093_20260110074326034_ascend_pt/ASCEND_PROFILER_OUTPUT/` 进行二次诊断\n- **输出位置**：`./eta_eager_l1_analysis_20260528/`（本次分析所有产物均在此目录下）\n  - `report.md` — 本报告\n  - `intermediate/step_summary.csv` — 100 步的 Compute/Free/Stage/Preparing 时间提取\n  - `intermediate/top_apis.csv` — 按 Total Time 降序的 Top 15 host API\n  - `intermediate/top_ops.csv` — 按 Total Time 降序的 Top 12 NPU 算子\n  - `figures/` — 预留（本次未生成图表，因 Python 不可用；可在带 Python 环境的机器上用上述 CSV 自行生成）\n- **PHS 计算细节**：\n  - 计算利用率 = NPU 实际算子时间 432.77 ms ÷ Stage 总时间 5883.72 ms = **7.36%** → 取整 7%\n  - 调度效率 = (1 − Free 5450.95 ms ÷ Stage 5883.72 ms) × 100 = **7.36%** → 取整 7%\n  - 通信 / 内存子项 N/A，权重归一化：计算 0.50 / 0.80 = 0.625，调度 0.30 / 0.80 = 0.375\n  - **当前 PHS** = 0.625 × 7 + 0.375 × 7 = 7 → 等级 **D**\n  - 优化后预估：若 P0/P1 全部落地（图模式 + 消除 AI_CPU 算子 + 消除 D2H 同步 + 算子合并），计算利用率有望提升到 35%、调度效率提升到 75%，PHS = 0.625 × 35 + 0.375 × 75 ≈ **48** → 等级 **B**\n","../Analysis Report/ascend_analysis_multi_20260602/report.md":"# MultiProfLevel2MemoryUB_db 集群性能诊断报告\n\n## 1. 结论速览\n\n- **性能健康度**：62 / 100 (B+) → 优化后预估 **72 / 100 (B+→A-)** — 计算 70% · 通信 55% · 调度 73% · 内存 N/A\n- **结论**：16 卡（2 节点）训练存在严重的计算负载不均衡，Rank 15 计算速度显著快于同节点其他卡（MatmulReduceScatter 快 2.2×），导致其 NPU 设备有 40.3% 时间空闲（2558 ms/step），是集群最大的\"伪快卡\"慢阻源。同时，集群内存在 Host 下发调度间隙、小包 RDMA 通信和 JIT 算子编译三类可优化问题叠加。\n- **头号瓶颈**：Rank 15 设备空闲率 40.3%（2558 ms），slowAffectCount=70（全集群最高），是所有通信 barrier 的主要阻塞源\n- **收益上限**：P0/P1 全部落地后预估单步节省 ~12–18%（约 780–1145 ms），集群均衡度提升 25%+\n\n---\n\n## 2. 行动清单\n\n> 按\"预期收益\"从高到低排序；同档收益按\"修改难度\"从低到高排序。\n\n| # | 优先级 | 问题 | 预期收益 | 修改难度 | 在哪改 / 对应位置 | 问题举证视图 |\n|---|--------|------|----------|----------|-------------------|--------------|\n| 1 | P0 | Rank 15 算子编译(JIT)导致 Host 下发间隙（8390 ops 编译异常） | -8% 单步耗时（约 500 ms 空闲消减） | 低 | 训练脚本启动前设置：`torch_npu.npu.set_compile_mode(jit_compile=False)` + `torch_npu.npu.config.allow_internal_format=False` | Timeline 视图（系统调优）— 载入 `ubuntu2204_1660973_20240619060440181_ascend_pt/ASCEND_PROFILER_OUTPUT/ascend_pytorch_profiler_15.db`，过滤 `aclopCompileAndExecute`，确认 JIT 耗时集中段 |\n| 2 | P0 | 小包 RDMA 通信（71.43% 包 < 1 MB，带宽仅 0.0005 GB/s） | -5% 通信耗时，减少 Host 侧 HCCL 发包压力 | 中 | ZeRO-3 → 降级为 ZeRO-2/ZeRO-1；或启用梯度累积增大 RDMA 包 | 通信视图 — 载入 `cluster_analysis_output/cluster_analysis.db`，查 `ClusterCommunicationBandwidth` 中 `band_type=RDMA` 的行，关注 `package_size` 列 |\n| 3 | P1 | Rank 15 计算负载显著低于同节点其他 Rank（MatmulReduceScatter 快 2.2×，设备空闲 2558 ms） | -10% 集群均衡度，减少其他卡 barrier 等待 | 高 | 排查 Rank 15 对应的张量并行/序列并行切分策略；若使用 MoE，检查专家负载分配是否偏斜（Rank 15 分到的 expert 少） | 算子视图 + Timeline 视图（系统调优）— 载入 Rank 15 的 `ascend_pytorch_profiler_15.db`，对比 `AllGatherMatmulAicpu`/`MatmulReduceScatterAicpu` 与 Rank 9 的执行时间分布 |\n| 4 | P1 | AllGatherMatmulAicpu / MatmulReduceScatterAicpu 走 AICPU 路径（执行时间远超 20 µs） | -5% 计算耗时 | 中 | 升级 CANN/torch_npu 版本；或检查算子融合配置，确保 AG-Matmul 使用 MIX_AIC 而非 AI_CPU 路径 | 算子视图 — 载入 `ascend_pytorch_profiler_15.db`，按 Task Type 过滤 AI_CPU，定位 AllGatherMatmulAicpu 及其持续时间 |\n| 5 | P1 | Ranks 8 / 11 / 13 设备空闲率偏高（20–22%），同为 ubuntu2204 节点 | -5% node2 步时 | 中 | 检查上述 rank 的 Host 下发策略和亲和 API 替换（advisor 推荐 2 处亲和 API）；参考 P0 的 JIT 设置 | Timeline 视图（系统调优）— 载入对应 Rank 的 `trace_view`，过滤 `launch` 间隙（> 3 ms 的 Free 段） |\n| 6 | P2 | HCCS 节点内通信带宽 12.9–19.8 GB/s（理论 30 GB/s，效率 43–66%） | -3% 通信耗时 | 低 | 检查 AllGather/ReduceScatter 前后数据是否已对齐（字节对齐检测）；考虑启用通信-计算 overlap | 通信视图 — `cluster_communication.json`（若存在），关注 HCCS 链路的 bandwidth 列 |\n| 7 | P2 | Rank 4 AllGatherMatmulAicpu 极端单次耗时 774 ms（均值 6.68 ms，116× 放大） | 消除单次尖峰，稳定 node1 步时 | 低 | 检查是否为动态 shape 导致 tiling 重计算；开启算子编译缓存 `jit_compile=False` 可能同时缩短此类尖峰 | 算子视图 — 载入 `node1_2166655_20240619060505059_ascend_pt/ASCEND_PROFILER_OUTPUT/ascend_pytorch_profiler_4.db`，按耗时降序排列 `AllGatherMatmulAicpu`，定位 774 ms 的单次记录 |\n\n---\n\n## 3. 问题详情\n\n### 3.1 [P0] Rank 15 JIT 算子编译导致 Host 下发间隙，NPU 大量空闲\n\n- **证据**：\n  - `CannApiSumRank` 中 Rank 15 的 `aclopCompileAndExecute` 调用次数=8390，total=352 ms，avg=42 µs；对比 Rank 9 的 avg 约 40 µs（接近）但 Rank 4 avg=243 µs，说明存在编译调用。\n  - `FreeAnalysis` 为 Rank 15 捕获到 4 条 \"Abnormal CANN layer: long time between two node@launch\"，间隙时长 3.3–5.5 ms；另有 2 条大段空闲（22–29 ms）原因为设备只剩 EVENT 任务。\n  - Advisor 明确报告：8390 个算子存在编译问题，建议关闭 JIT 编译。\n- **影响**：编译期间 CPU 无法继续下发，NPU 耗尽任务队列后空闲等待。每次编译间隙 3–30 ms，累积贡献 Rank 15 约 84 ms 已捕获空闲；未捕获的小碎片是 2558 ms 总空闲的重要组成部分。\n- **修复建议**：\n  1. 在训练脚本初始化段加入：\n     ```python\n     torch_npu.npu.set_compile_mode(jit_compile=False)\n     torch_npu.npu.config.allow_internal_format = False\n     ```\n  2. 同时在所有 16 个 Rank 对应的进程中生效（影响全集群下发效率）。\n  3. 首次运行后检查算子缓存是否生效（`aclopCompileAndExecute` count 应显著减少）。\n- **验证方法**：重采 profiling 后查看 `CannApiSumRank` 中 `aclopCompileAndExecute` 的 total 时间，预期下降 >50%；同时观察 `FreeAnalysis` 中 \"Abnormal CANN layer\" 条目消失或减少。\n- **问题举证视图**：Timeline 视图（系统调优）— 载入 Rank 15 的 `ascend_pytorch_profiler_15.db`，在 Host API 时间轴上搜索 `aclopCompileAndExecute`，观察其后 device 侧的空闲间隙。\n\n---\n\n### 3.2 [P0] 小包 RDMA 通信导致 Host 侧 HCCL 瓶颈\n\n- **证据**：\n  - `ClusterCommunicationBandwidth` 中 `hcom_allReduce__520_0_1`（RDMA 链路）：transit_size=4×10⁻⁶ MB（4 字节），bandwidth=0.0005 GB/s。\n  - Advisor：RDMA 通信中 71.43% 的包 < 1 MB，耗时 0.0548 ms，属于明确的\"小包通信\"问题。\n  - `ClusterCommunicationTime` 中该 AllReduce：elapsed=237 ms，transit=0.009 ms，wait=237 ms — 几乎全是等待时间。\n- **影响**：跨节点 RDMA AllReduce 极小包（4 字节）导致每次发包都有固定开销，且在等待对端时，通信算子占用 barrier 时间高达 237 ms。\n- **修复建议**：\n  1. 若使用 ZeRO-3：考虑将 ZeRO 级别降低到 ZeRO-2 或 ZeRO-1，以增大每次 RDMA 通信的数据量。\n  2. 若为梯度全局 norm 计算产生的 AllReduce（跨节点同步 scalar），可考虑将多个标量合并为一次通信（梯度 norm bucket）。\n  3. 使用 HCCL 参数 `HCCL_COMM_LEVEL=1` 等环境变量调整通信策略（需测试）。\n- **验证方法**：重采后检查 `ClusterCommunicationBandwidth` 中 RDMA 行，确认 `package_size > 1 MB`；`ClusterCommunicationTime` 中该 AllReduce 的 wait 时间应显著下降。\n- **问题举证视图**：通信视图 — 载入 `communication_time_sum/cluster_analysis_output/cluster_analysis.db`，查看 `ClusterCommunicationBandwidth` 表中 `band_type=RDMA`，关注 `package_size` 和 `bandwidth` 列，与 HCCS 行对比。\n\n---\n\n### 3.3 [P1] Rank 15 计算负载显著低于同节点其他卡（负载切分不均）\n\n- **证据**：\n  - `ClusterTimeSummary`：Rank 15 compute=3300 ms（51.9%），Rank 9 compute=5138 ms（81.1%），差距 1838 ms。\n  - `compare_op_stats.py`（Rank 15 vs Rank 9）：\n    - `MatmulReduceScatterAicpu`：Rank15=1114 ms vs Rank9=2439 ms，比值 0.46（Rank15 快 2.2×）\n    - `AllGatherMatmulAicpu`：Rank15=1713 ms vs Rank9=2600 ms，比值 0.66（Rank15 快 1.5×）\n  - `SlowRank`：Rank 15 slowAffectCount=70（全集群最高，第二名=24），说明 Rank 15 在 70 次通信算子中是最后完成方，阻塞其他卡前进。\n  - `AbnormalFrequencyRanks`：Rank 15 在 node2 的 `hcom_allReduce__903_*` 系列算子上被标记为慢卡（6.95 µs）——这些是 Rank 15 在节点内通信中\"最后到达\"的体现。\n- **影响**：Rank 15 完成计算后，NPU 进入空闲等待其他 node2 Rank 追上，再一起进行跨节点 AllReduce。2558 ms 的空闲主要由此\"计算提前完成后的 barrier 等待\"构成。\n- **修复建议**：\n  1. **排查并行切分策略**：检查 Rank 15 在张量并行（TP）中所负责的矩阵分片是否偏小（shape 差异），或序列并行中序列段是否不均匀。\n  2. **若为 MoE 模型**：检查专家路由是否导致 Rank 15 对应的专家被路由的 token 数目系统性偏少，触发专家负载不均（ep_load_balance 分析）。\n  3. **若负载均衡无法改变**：考虑在 Rank 15 完成计算后插入 padding 计算（如强制同步等待），但此举不推荐——应优先解决根本不均原因。\n- **验证方法**：重采后 `compute_op_sum` 中 Rank 15 的 `AllGatherMatmulAicpu` 总时间与 Rank 9 的差异应 < 20%；`ClusterTimeSummary` 中 Rank 15 的 free 应降低到 < 1000 ms。\n- **问题举证视图**：\n  - 主：算子视图 — 载入 `ascend_pytorch_profiler_15.db`，对比 `AllGatherMatmulAicpu` 的耗时分布（与 Rank 9 对比）\n  - 辅：Timeline 视图（系统调优）— 载入 Rank 15 的 trace，观察 compute 段结束到下一次 comm 开始之间的大段 free 区域\n\n---\n\n### 3.4 [P1] AllGatherMatmulAicpu / MatmulReduceScatterAicpu 走 AICPU 路径，执行超时\n\n- **证据**：\n  - `ComputeOpAllRankStats`：`AllGatherMatmulAicpu (AI_CPU)` 全集群 count=10240，mean=5.13 ms；`MatmulReduceScatterAicpu (AI_CPU)` count=5120，mean=4.62 ms。\n  - 同时存在 MIX_AIC 路径：`AllGatherMatmul (MIX_AIC)` mean=1.69 ms；`MatmulReduceScatter (MIX_AIC)` mean=4.16 ms。\n  - Advisor：AllGatherMatmulAicpu, MatmulReduceScatterAicpu 执行超过 20 µs，属于 AICPU 性能问题。\n- **影响**：AICPU 版本（AllGatherMatmulAicpu）比 MIX_AIC 版本（AllGatherMatmul）慢 3× 以上，全集群 15255 次调用中的 AICPU 版本是计算热点来源之一。\n- **修复建议**：\n  1. 检查算子调用触发 AICPU 路径的条件（通常是特定 shape/dtype 下找不到 AIC kernel），优先通过 shape padding 或 dtype 对齐使算子走 MIX_AIC 路径。\n  2. 升级 CANN 版本（当前 cann-8.0.0），新版本可能已补充 AllGatherMatmul 的 AIC kernel 覆盖。\n  3. 检查 `torch_npu.npu.config.allow_internal_format=False` 是否影响 kernel 选择。\n- **验证方法**：重采后 `ComputeOpAllRankStats` 中 `AllGatherMatmulAicpu` count 应接近 0，或 mean 耗时显著下降；`AllGatherMatmul (MIX_AIC)` count 对应增加。\n- **问题举证视图**：算子视图 — 载入任意 Rank 的 `ascend_pytorch_profiler_*.db`，在 Task Type 维度过滤 `AI_CPU`，确认 `AllGatherMatmulAicpu` 出现频率与总耗时。\n\n---\n\n### 3.5 [P1] Ranks 8 / 11 / 13 设备空闲率偏高（20–22%）\n\n- **证据**：\n  - `ClusterTimeSummary`：Rank 8 free=1377 ms（21.7%），Rank 11 free=1312 ms（20.7%），Rank 13 free=1255 ms（19.8%）。\n  - `FreeAnalysis`：Rank 8 最大单段空闲 46.2 ms（5 组 MEMCPY + EVENT 任务持续占满 device task queue，推测为 checkpoint 或大块数据搬运）。\n  - 三个 Rank 均在 node2（ubuntu2204），且均位于\"隔一个 Rank\"的位置（8、11、13），暗示与 pipeline 阶段或 expert 分配周期有关。\n- **影响**：这 3 张卡共贡献约 4000 ms 的额外空闲（相比正常 node2 Rank 的 650 ms），影响 node2 整体效率。\n- **修复建议**：\n  1. 对 Rank 8/11/13 各自运行 `msprof-analyze advisor all` 获取针对性建议。\n  2. 重点检查是否存在 `aclrtSynchronizeStreamWithTimeout` 过长（类似 Rank 15 但更轻微）。\n  3. 检查是否有梯度 checkpoint replay 在这三张卡上触发额外的 MEMCPY 操作。\n- **验证方法**：重采后 `ClusterTimeSummary` 中 Rank 8/11/13 的 free 应降低到 < 800 ms（接近 Rank 9 水平）。\n- **问题举证视图**：Timeline 视图（系统调优）— 载入 Rank 8 的 `trace_view.json`，关注大段 MEMCPY 任务触发前后的 free 区域，判断是否为 checkpoint replay 或数据预取触发。\n\n---\n\n### 3.6 [P2] HCCS 节点内通信带宽偏低（43–66% 理论值）\n\n- **证据**：\n  - `ClusterCommunicationBandwidth`：主通信算子（AllGather 73 GB 包）HCCS 带宽范围 12.9–19.8 GB/s，理论上限 30 GB/s，效率 43–66%。\n  - ReduceScatter 算子带宽 12.9–18.7 GB/s。\n  - 所有节点内 HCCS 链路带宽均低于理论值，无单条明显慢链路（排除硬件故障）。\n- **影响**：通信效率整体偏低，是通信时间高于理想值的直接原因（`comm_tx_ms ≈ 760 ms`/Rank）。\n- **修复建议**：\n  1. 检查通信算子内 MTE 和 HCCS 是否存在带宽竞争（`_l2_cache=false` 当前设置可以避免 L2 缓存占用，已是正确配置）。\n  2. 确认 AllGather 前后数据对齐至 512 字节（字节对齐检测）。\n  3. 考虑调整流水线重叠策略使通信与计算更充分重叠，以掩盖带宽不足的影响。\n- **验证方法**：重采后 `ClusterCommunicationBandwidth` 中大包（>4 MB）的 HCCS bandwidth 应提升至 > 22 GB/s。\n- **问题举证视图**：通信视图 — 载入 `cluster_analysis_output/cluster_analysis.db` 的 `ClusterCommunicationBandwidth` 表，按 `transit_size` 降序排列，关注大包 HCCS 的 `bandwidth` 列。\n\n---\n\n### 3.7 [P2] Rank 4 AllGatherMatmulAicpu 单次极端耗时 774 ms\n\n- **证据**：\n  - `ComputeOpPerRankStatsByOpType`：Rank 4 AllGatherMatmulAicpu count=640，mean=6.68 ms，max=774.26 ms，std=49.06 ms——极端单次耗时为均值的 116 倍。\n  - 全集群 AllGatherMatmulAicpu max=774.58 ms 由 Rank 4 贡献。Rank 15 max 仅 10.42 ms，无类似尖峰。\n- **影响**：该单次 774 ms 尖峰在 node1 广播，可能导致 node1 所有 8 张卡在该时间点的全体等待，节点内 AllGather barrier 被阻塞。\n- **修复建议**：\n  1. 设置 `jit_compile=False`（P0 已含），可消除编译耗时导致的尖峰。\n  2. 若尖峰仍存在：检查是否为动态 shape 触发，排查该次调用的 input shapes。\n  3. 若为内存碎片导致：检查 HBM 内存管理策略，设置 `max_split_size_mb` 避免频繁碎片化。\n- **验证方法**：重采后 `ComputeOpPerRankStatsByOpType` 中 Rank 4 的 AllGatherMatmulAicpu max 应 < 50 ms（降至 std 范围内）。\n- **问题举证视图**：算子视图 — 载入 Rank 4 的 `ascend_pytorch_profiler_4.db`，按耗时降序列出 `AllGatherMatmulAicpu`，定位 774 ms 的具体调用时间戳；对应 Timeline 视图（系统调优）查看该时间点 node1 其他 Rank 的状态（是否也有 barrier 等待）。\n\n---\n\n## 4. 已确认无问题\n\n- **AICore 频率**：所有 16 Rank 频率为 1850 MHz（轻微超出标称 1800 MHz），属正常硬件 boost 状态，非降频或频率异常（800 MHz），不影响计算性能。\n- **采集完整性**：16 个 Rank 的 `profiler_info_{rank}.json` 均包含有效 `end_info`，采集正常结束；`ASCEND_PROFILER_OUTPUT` 下 db 文件完整，Level2 + ACL_AICORE_MEMORY_UB 配置解析无误。\n- **通信组拓扑一致性**：两节点 HCCL 组正确，node1(Rank 0-7) 和 node2(Rank 8-15) 各自的节点内通信组（group 891、903）独立且对称，无丢组或组 ID 错误。\n- **step 数据完整性**：所有 Rank step2 均采到完整 step，无截断。\n- **AllReduce / AllGather / ReduceScatter 调用次数对称**：各 Rank 同类型 HCCL 算子 count 完全一致（AllGather=333，ReduceScatter=324，AllReduce=25），无通信组不对称。\n- **HBM 带宽**：Rank 15 avg~20.5 GB/s，Rank 4 avg~20.3 GB/s，两节点 HBM 带宽无差异，排除内存硬件故障。\n\n---\n\n## 5. 数据与方法（附录）\n\n- **分析日期**：2026-06-02\n- **数据路径**：`d:\\Projects\\ProfilingTest\\MultiProfLevel2MemoryUB_db\\`\n- **数据范围**：16 Rank（Rank 0–7 on node1 / Rank 8–15 on node2/ubuntu2204），step 2，框架 profiler (PyTorch)，DB 格式\n- **采集配置**：Level2，`_aic_metrics=ACL_AICORE_MEMORY_UB`，`profile_memory=true`，`with_flops=true`，`_data_simplification=false`\n- **输出位置**：`d:\\Projects\\ProfilingTest\\ascend_analysis_20260602\\`\n  ```\n  ascend_analysis_20260602/\n  ├── report.md                  ← 本报告\n  ├── cluster_time_summary/      ← msprof-analyze cluster_time_summary 结果\n  ├── slow_rank/                 ← msprof-analyze slow_rank 结果\n  ├──  1275 ms |\n| aclopCompileAndExecute total | 352 ms | 2036 ms |\n","../../Analysis Report/ascend_analysis_multi_20260602/report.md":"# MultiProfLevel2MemoryUB_db 集群性能诊断报告\n\n## 1. 结论速览\n\n- **性能健康度**：62 / 100 (B+) → 优化后预估 **72 / 100 (B+→A-)** — 计算 70% · 通信 55% · 调度 73% · 内存 N/A\n- **结论**：16 卡（2 节点）训练存在严重的计算负载不均衡，Rank 15 计算速度显著快于同节点其他卡（MatmulReduceScatter 快 2.2×），导致其 NPU 设备有 40.3% 时间空闲（2558 ms/step），是集群最大的\"伪快卡\"慢阻源。同时，集群内存在 Host 下发调度间隙、小包 RDMA 通信和 JIT 算子编译三类可优化问题叠加。\n- **头号瓶颈**：Rank 15 设备空闲率 40.3%（2558 ms），slowAffectCount=70（全集群最高），是所有通信 barrier 的主要阻塞源\n- **收益上限**：P0/P1 全部落地后预估单步节省 ~12–18%（约 780–1145 ms），集群均衡度提升 25%+\n\n---\n\n## 2. 行动清单\n\n> 按\"预期收益\"从高到低排序；同档收益按\"修改难度\"从低到高排序。\n\n| # | 优先级 | 问题 | 预期收益 | 修改难度 | 在哪改 / 对应位置 | 问题举证视图 |\n|---|--------|------|----------|----------|-------------------|--------------|\n| 1 | P0 | Rank 15 算子编译(JIT)导致 Host 下发间隙（8390 ops 编译异常） | -8% 单步耗时（约 500 ms 空闲消减） | 低 | 训练脚本启动前设置：`torch_npu.npu.set_compile_mode(jit_compile=False)` + `torch_npu.npu.config.allow_internal_format=False` | Timeline 视图（系统调优）— 载入 `ubuntu2204_1660973_20240619060440181_ascend_pt/ASCEND_PROFILER_OUTPUT/ascend_pytorch_profiler_15.db`，过滤 `aclopCompileAndExecute`，确认 JIT 耗时集中段 |\n| 2 | P0 | 小包 RDMA 通信（71.43% 包 < 1 MB，带宽仅 0.0005 GB/s） | -5% 通信耗时，减少 Host 侧 HCCL 发包压力 | 中 | ZeRO-3 → 降级为 ZeRO-2/ZeRO-1；或启用梯度累积增大 RDMA 包 | 通信视图 — 载入 `cluster_analysis_output/cluster_analysis.db`，查 `ClusterCommunicationBandwidth` 中 `band_type=RDMA` 的行，关注 `package_size` 列 |\n| 3 | P1 | Rank 15 计算负载显著低于同节点其他 Rank（MatmulReduceScatter 快 2.2×，设备空闲 2558 ms） | -10% 集群均衡度，减少其他卡 barrier 等待 | 高 | 排查 Rank 15 对应的张量并行/序列并行切分策略；若使用 MoE，检查专家负载分配是否偏斜（Rank 15 分到的 expert 少） | 算子视图 + Timeline 视图（系统调优）— 载入 Rank 15 的 `ascend_pytorch_profiler_15.db`，对比 `AllGatherMatmulAicpu`/`MatmulReduceScatterAicpu` 与 Rank 9 的执行时间分布 |\n| 4 | P1 | AllGatherMatmulAicpu / MatmulReduceScatterAicpu 走 AICPU 路径（执行时间远超 20 µs） | -5% 计算耗时 | 中 | 升级 CANN/torch_npu 版本；或检查算子融合配置，确保 AG-Matmul 使用 MIX_AIC 而非 AI_CPU 路径 | 算子视图 — 载入 `ascend_pytorch_profiler_15.db`，按 Task Type 过滤 AI_CPU，定位 AllGatherMatmulAicpu 及其持续时间 |\n| 5 | P1 | Ranks 8 / 11 / 13 设备空闲率偏高（20–22%），同为 ubuntu2204 节点 | -5% node2 步时 | 中 | 检查上述 rank 的 Host 下发策略和亲和 API 替换（advisor 推荐 2 处亲和 API）；参考 P0 的 JIT 设置 | Timeline 视图（系统调优）— 载入对应 Rank 的 `trace_view`，过滤 `launch` 间隙（> 3 ms 的 Free 段） |\n| 6 | P2 | HCCS 节点内通信带宽 12.9–19.8 GB/s（理论 30 GB/s，效率 43–66%） | -3% 通信耗时 | 低 | 检查 AllGather/ReduceScatter 前后数据是否已对齐（字节对齐检测）；考虑启用通信-计算 overlap | 通信视图 — `cluster_communication.json`（若存在），关注 HCCS 链路的 bandwidth 列 |\n| 7 | P2 | Rank 4 AllGatherMatmulAicpu 极端单次耗时 774 ms（均值 6.68 ms，116× 放大） | 消除单次尖峰，稳定 node1 步时 | 低 | 检查是否为动态 shape 导致 tiling 重计算；开启算子编译缓存 `jit_compile=False` 可能同时缩短此类尖峰 | 算子视图 — 载入 `node1_2166655_20240619060505059_ascend_pt/ASCEND_PROFILER_OUTPUT/ascend_pytorch_profiler_4.db`，按耗时降序排列 `AllGatherMatmulAicpu`，定位 774 ms 的单次记录 |\n\n---\n\n## 3. 问题详情\n\n### 3.1 [P0] Rank 15 JIT 算子编译导致 Host 下发间隙，NPU 大量空闲\n\n- **证据**：\n  - `CannApiSumRank` 中 Rank 15 的 `aclopCompileAndExecute` 调用次数=8390，total=352 ms，avg=42 µs；对比 Rank 9 的 avg 约 40 µs（接近）但 Rank 4 avg=243 µs，说明存在编译调用。\n  - `FreeAnalysis` 为 Rank 15 捕获到 4 条 \"Abnormal CANN layer: long time between two node@launch\"，间隙时长 3.3–5.5 ms；另有 2 条大段空闲（22–29 ms）原因为设备只剩 EVENT 任务。\n  - Advisor 明确报告：8390 个算子存在编译问题，建议关闭 JIT 编译。\n- **影响**：编译期间 CPU 无法继续下发，NPU 耗尽任务队列后空闲等待。每次编译间隙 3–30 ms，累积贡献 Rank 15 约 84 ms 已捕获空闲；未捕获的小碎片是 2558 ms 总空闲的重要组成部分。\n- **修复建议**：\n  1. 在训练脚本初始化段加入：\n     ```python\n     torch_npu.npu.set_compile_mode(jit_compile=False)\n     torch_npu.npu.config.allow_internal_format = False\n     ```\n  2. 同时在所有 16 个 Rank 对应的进程中生效（影响全集群下发效率）。\n  3. 首次运行后检查算子缓存是否生效（`aclopCompileAndExecute` count 应显著减少）。\n- **验证方法**：重采 profiling 后查看 `CannApiSumRank` 中 `aclopCompileAndExecute` 的 total 时间，预期下降 >50%；同时观察 `FreeAnalysis` 中 \"Abnormal CANN layer\" 条目消失或减少。\n- **问题举证视图**：Timeline 视图（系统调优）— 载入 Rank 15 的 `ascend_pytorch_profiler_15.db`，在 Host API 时间轴上搜索 `aclopCompileAndExecute`，观察其后 device 侧的空闲间隙。\n\n---\n\n### 3.2 [P0] 小包 RDMA 通信导致 Host 侧 HCCL 瓶颈\n\n- **证据**：\n  - `ClusterCommunicationBandwidth` 中 `hcom_allReduce__520_0_1`（RDMA 链路）：transit_size=4×10⁻⁶ MB（4 字节），bandwidth=0.0005 GB/s。\n  - Advisor：RDMA 通信中 71.43% 的包 < 1 MB，耗时 0.0548 ms，属于明确的\"小包通信\"问题。\n  - `ClusterCommunicationTime` 中该 AllReduce：elapsed=237 ms，transit=0.009 ms，wait=237 ms — 几乎全是等待时间。\n- **影响**：跨节点 RDMA AllReduce 极小包（4 字节）导致每次发包都有固定开销，且在等待对端时，通信算子占用 barrier 时间高达 237 ms。\n- **修复建议**：\n  1. 若使用 ZeRO-3：考虑将 ZeRO 级别降低到 ZeRO-2 或 ZeRO-1，以增大每次 RDMA 通信的数据量。\n  2. 若为梯度全局 norm 计算产生的 AllReduce（跨节点同步 scalar），可考虑将多个标量合并为一次通信（梯度 norm bucket）。\n  3. 使用 HCCL 参数 `HCCL_COMM_LEVEL=1` 等环境变量调整通信策略（需测试）。\n- **验证方法**：重采后检查 `ClusterCommunicationBandwidth` 中 RDMA 行，确认 `package_size > 1 MB`；`ClusterCommunicationTime` 中该 AllReduce 的 wait 时间应显著下降。\n- **问题举证视图**：通信视图 — 载入 `communication_time_sum/cluster_analysis_output/cluster_analysis.db`，查看 `ClusterCommunicationBandwidth` 表中 `band_type=RDMA`，关注 `package_size` 和 `bandwidth` 列，与 HCCS 行对比。\n\n---\n\n### 3.3 [P1] Rank 15 计算负载显著低于同节点其他卡（负载切分不均）\n\n- **证据**：\n  - `ClusterTimeSummary`：Rank 15 compute=3300 ms（51.9%），Rank 9 compute=5138 ms（81.1%），差距 1838 ms。\n  - `compare_op_stats.py`（Rank 15 vs Rank 9）：\n    - `MatmulReduceScatterAicpu`：Rank15=1114 ms vs Rank9=2439 ms，比值 0.46（Rank15 快 2.2×）\n    - `AllGatherMatmulAicpu`：Rank15=1713 ms vs Rank9=2600 ms，比值 0.66（Rank15 快 1.5×）\n  - `SlowRank`：Rank 15 slowAffectCount=70（全集群最高，第二名=24），说明 Rank 15 在 70 次通信算子中是最后完成方，阻塞其他卡前进。\n  - `AbnormalFrequencyRanks`：Rank 15 在 node2 的 `hcom_allReduce__903_*` 系列算子上被标记为慢卡（6.95 µs）——这些是 Rank 15 在节点内通信中\"最后到达\"的体现。\n- **影响**：Rank 15 完成计算后，NPU 进入空闲等待其他 node2 Rank 追上，再一起进行跨节点 AllReduce。2558 ms 的空闲主要由此\"计算提前完成后的 barrier 等待\"构成。\n- **修复建议**：\n  1. **排查并行切分策略**：检查 Rank 15 在张量并行（TP）中所负责的矩阵分片是否偏小（shape 差异），或序列并行中序列段是否不均匀。\n  2. **若为 MoE 模型**：检查专家路由是否导致 Rank 15 对应的专家被路由的 token 数目系统性偏少，触发专家负载不均（ep_load_balance 分析）。\n  3. **若负载均衡无法改变**：考虑在 Rank 15 完成计算后插入 padding 计算（如强制同步等待），但此举不推荐——应优先解决根本不均原因。\n- **验证方法**：重采后 `compute_op_sum` 中 Rank 15 的 `AllGatherMatmulAicpu` 总时间与 Rank 9 的差异应 < 20%；`ClusterTimeSummary` 中 Rank 15 的 free 应降低到 < 1000 ms。\n- **问题举证视图**：\n  - 主：算子视图 — 载入 `ascend_pytorch_profiler_15.db`，对比 `AllGatherMatmulAicpu` 的耗时分布（与 Rank 9 对比）\n  - 辅：Timeline 视图（系统调优）— 载入 Rank 15 的 trace，观察 compute 段结束到下一次 comm 开始之间的大段 free 区域\n\n---\n\n### 3.4 [P1] AllGatherMatmulAicpu / MatmulReduceScatterAicpu 走 AICPU 路径，执行超时\n\n- **证据**：\n  - `ComputeOpAllRankStats`：`AllGatherMatmulAicpu (AI_CPU)` 全集群 count=10240，mean=5.13 ms；`MatmulReduceScatterAicpu (AI_CPU)` count=5120，mean=4.62 ms。\n  - 同时存在 MIX_AIC 路径：`AllGatherMatmul (MIX_AIC)` mean=1.69 ms；`MatmulReduceScatter (MIX_AIC)` mean=4.16 ms。\n  - Advisor：AllGatherMatmulAicpu, MatmulReduceScatterAicpu 执行超过 20 µs，属于 AICPU 性能问题。\n- **影响**：AICPU 版本（AllGatherMatmulAicpu）比 MIX_AIC 版本（AllGatherMatmul）慢 3× 以上，全集群 15255 次调用中的 AICPU 版本是计算热点来源之一。\n- **修复建议**：\n  1. 检查算子调用触发 AICPU 路径的条件（通常是特定 shape/dtype 下找不到 AIC kernel），优先通过 shape padding 或 dtype 对齐使算子走 MIX_AIC 路径。\n  2. 升级 CANN 版本（当前 cann-8.0.0），新版本可能已补充 AllGatherMatmul 的 AIC kernel 覆盖。\n  3. 检查 `torch_npu.npu.config.allow_internal_format=False` 是否影响 kernel 选择。\n- **验证方法**：重采后 `ComputeOpAllRankStats` 中 `AllGatherMatmulAicpu` count 应接近 0，或 mean 耗时显著下降；`AllGatherMatmul (MIX_AIC)` count 对应增加。\n- **问题举证视图**：算子视图 — 载入任意 Rank 的 `ascend_pytorch_profiler_*.db`，在 Task Type 维度过滤 `AI_CPU`，确认 `AllGatherMatmulAicpu` 出现频率与总耗时。\n\n---\n\n### 3.5 [P1] Ranks 8 / 11 / 13 设备空闲率偏高（20–22%）\n\n- **证据**：\n  - `ClusterTimeSummary`：Rank 8 free=1377 ms（21.7%），Rank 11 free=1312 ms（20.7%），Rank 13 free=1255 ms（19.8%）。\n  - `FreeAnalysis`：Rank 8 最大单段空闲 46.2 ms（5 组 MEMCPY + EVENT 任务持续占满 device task queue，推测为 checkpoint 或大块数据搬运）。\n  - 三个 Rank 均在 node2（ubuntu2204），且均位于\"隔一个 Rank\"的位置（8、11、13），暗示与 pipeline 阶段或 expert 分配周期有关。\n- **影响**：这 3 张卡共贡献约 4000 ms 的额外空闲（相比正常 node2 Rank 的 650 ms），影响 node2 整体效率。\n- **修复建议**：\n  1. 对 Rank 8/11/13 各自运行 `msprof-analyze advisor all` 获取针对性建议。\n  2. 重点检查是否存在 `aclrtSynchronizeStreamWithTimeout` 过长（类似 Rank 15 但更轻微）。\n  3. 检查是否有梯度 checkpoint replay 在这三张卡上触发额外的 MEMCPY 操作。\n- **验证方法**：重采后 `ClusterTimeSummary` 中 Rank 8/11/13 的 free 应降低到 < 800 ms（接近 Rank 9 水平）。\n- **问题举证视图**：Timeline 视图（系统调优）— 载入 Rank 8 的 `trace_view.json`，关注大段 MEMCPY 任务触发前后的 free 区域，判断是否为 checkpoint replay 或数据预取触发。\n\n---\n\n### 3.6 [P2] HCCS 节点内通信带宽偏低（43–66% 理论值）\n\n- **证据**：\n  - `ClusterCommunicationBandwidth`：主通信算子（AllGather 73 GB 包）HCCS 带宽范围 12.9–19.8 GB/s，理论上限 30 GB/s，效率 43–66%。\n  - ReduceScatter 算子带宽 12.9–18.7 GB/s。\n  - 所有节点内 HCCS 链路带宽均低于理论值，无单条明显慢链路（排除硬件故障）。\n- **影响**：通信效率整体偏低，是通信时间高于理想值的直接原因（`comm_tx_ms ≈ 760 ms`/Rank）。\n- **修复建议**：\n  1. 检查通信算子内 MTE 和 HCCS 是否存在带宽竞争（`_l2_cache=false` 当前设置可以避免 L2 缓存占用，已是正确配置）。\n  2. 确认 AllGather 前后数据对齐至 512 字节（字节对齐检测）。\n  3. 考虑调整流水线重叠策略使通信与计算更充分重叠，以掩盖带宽不足的影响。\n- **验证方法**：重采后 `ClusterCommunicationBandwidth` 中大包（>4 MB）的 HCCS bandwidth 应提升至 > 22 GB/s。\n- **问题举证视图**：通信视图 — 载入 `cluster_analysis_output/cluster_analysis.db` 的 `ClusterCommunicationBandwidth` 表，按 `transit_size` 降序排列，关注大包 HCCS 的 `bandwidth` 列。\n\n---\n\n### 3.7 [P2] Rank 4 AllGatherMatmulAicpu 单次极端耗时 774 ms\n\n- **证据**：\n  - `ComputeOpPerRankStatsByOpType`：Rank 4 AllGatherMatmulAicpu count=640，mean=6.68 ms，max=774.26 ms，std=49.06 ms——极端单次耗时为均值的 116 倍。\n  - 全集群 AllGatherMatmulAicpu max=774.58 ms 由 Rank 4 贡献。Rank 15 max 仅 10.42 ms，无类似尖峰。\n- **影响**：该单次 774 ms 尖峰在 node1 广播，可能导致 node1 所有 8 张卡在该时间点的全体等待，节点内 AllGather barrier 被阻塞。\n- **修复建议**：\n  1. 设置 `jit_compile=False`（P0 已含），可消除编译耗时导致的尖峰。\n  2. 若尖峰仍存在：检查是否为动态 shape 触发，排查该次调用的 input shapes。\n  3. 若为内存碎片导致：检查 HBM 内存管理策略，设置 `max_split_size_mb` 避免频繁碎片化。\n- **验证方法**：重采后 `ComputeOpPerRankStatsByOpType` 中 Rank 4 的 AllGatherMatmulAicpu max 应 < 50 ms（降至 std 范围内）。\n- **问题举证视图**：算子视图 — 载入 Rank 4 的 `ascend_pytorch_profiler_4.db`，按耗时降序列出 `AllGatherMatmulAicpu`，定位 774 ms 的具体调用时间戳；对应 Timeline 视图（系统调优）查看该时间点 node1 其他 Rank 的状态（是否也有 barrier 等待）。\n\n---\n\n## 4. 已确认无问题\n\n- **AICore 频率**：所有 16 Rank 频率为 1850 MHz（轻微超出标称 1800 MHz），属正常硬件 boost 状态，非降频或频率异常（800 MHz），不影响计算性能。\n- **采集完整性**：16 个 Rank 的 `profiler_info_{rank} n| 9 | ubuntu2204 | 6338 | 5138 | 507 | 652 | 81.1 | 10.3 |\n| 10 | ubuntu2204 | 6360 | 5165 | 512 | 641 | 81.2 | 10.1 |\n| 11 | ubuntu2204 | 6336 | 4469 | 513 | **1312** | 70.5 | **20.7** |\n| 12 | ubuntu2204 | 6332 | 5082 | 506 | 703 | 80.3 | 11.1 |\n| 13 | ubuntu2204 | 6348 | 4553 | 499 | **1255** | 71.7 | **19.8** |\n| 14 | ubuntu2204 | 6344 | 5150 | 527 | 625 | 81.2 | 9.9 |\n| **15** | ubuntu2204 | 6354 | **3301** | 452 | **2559** | **51.9** | **40.3** |\n\n**SlowRank 影响次数排名**\n\n| Rank | slowAffectCount | 定性 |\n|------|-----------------|------|\n| **15** | **70** | 主要慢卡（计算完成后 barrier 等待） |\n| 0 | 24 | 次要 |\n| 8 | 24 | 次要 |\n| 5 | 21 | 次要 |\n| 1 | 10 | 轻微 |\n\n**核心计算算子对比（AllGatherMatmulAicpu，单位 ms）**\n\n| Rank | mean | max | total（s） |\n|------|------|-----|----------|\n| 4 (node1参考) | 6.68 | **774.26** | 4.28 |\n| 9 (node2正常) | 4.06 | 6.46 | 2.60 |\n| 15 (主慢卡) | **2.68** | 10.42 | 1.71 |\n\n**CANN API 关键对比**\n\n| API | Rank 15 | Rank 4 |\n|-----|---------|--------|\n| launch avgUs | 29.0 µs | 155.7 µs |\n| KernelLaunch avgUs | 4.4 µs | 188.8 µs |\n| aclrtSynchronizeStreamWithTimeout total | 295 ms | 1275 ms |\n| aclopCompileAndExecute total | 352 ms | 2036 ms |\n","../Analysis Report/ascend_analysis_verl_20260602/report.md":"# verl RL 训练性能诊断报告（Ascend 910B · rank 0）\n\n## 1. 结论速览\n\n- **性能健康度**：25 / 100 (D) → 优化后预估 **45 / 100 (B)** — 计算 12% · 通信 33% · 调度 39% · 内存 N/A\n  - （订正：通信子项由初版 57% 下调至 33%——初版误用了「逐 op 平均带宽」17 GB/s，按字节加权的有效带宽实为 ~10 GB/s，详见 3.7 链路分析与第 5 章）\n- **结论**：本次采集的 54.2 s 窗口里，**Rollout 生成阶段独占 48.0 s（88.5%）**，而生成阶段 NPU 只忙 37%、其余 63% 在等 Host 下发——整段被「Eager 模式逐 token 解码」的下发与通信暴露彻底拖慢；真正的训练（update_actor）只占 3.5 s 且健康（设备占用 75%）。\n- **头号瓶颈**：生成阶段 Eager 解码，48 s 内下发 **136 万次 CANN API**（≈2.8 万次/s），设备占用仅 **37%**，AI Core MAC 利用率均值仅 **3.8%**。\n- **次号瓶颈**：TP All-Reduce 在解码中**完全暴露**——27,687 次 All-Reduce 累计 12.95 s，其中 **9.4 s 是 wait（等其他卡/同步）**，几乎不与计算重叠（全程仅 0.32 s overlap）。\n- **收益上限**：生成阶段转图模式 + 通信重叠 + 内存复用落地后，墙钟有望从 54.2 s 压到 ~34–38 s，**最多省 ~30%–37%（约 16–20 s）**。\n\n---\n\n## 2. 行动清单\n\n> 默认按\"预期收益\"从高到低排序；同档收益按\"修改难度\"从低到高排序。\n\n| # | 优先级 | 问题 | 预期收益 | 修改难度 | 在哪改 / 对应位置 | 问题举证视图 |\n|---|---|---|---|---|---|---|\n| 1 | P0 | Rollout 生成 Eager 解码，48 s 内 136 万次下发，设备占用仅 37% | -20%~-35% 墙钟 | 中 | 推理后端开图模式：vllm-ascend `enforce_eager=False` / ACL Graph / torchair 捕获 | Timeline 视图（系统调优）— `ascend_pytorch_profiler_0.db` |\n| 2 | P0 | TP All-Reduce 解码中全暴露，27687 次累计 12.95 s（wait 9.4 s），overlap 仅 0.32 s | -10%~-15% 墙钟 | 中 | rollout TP 配置 / 通信-计算重叠（图模式内）/ 评估 rollout TP=1 | 通信视图 + Timeline 视图（系统调优）— `analysis.db` |\n| 3 | P1 | `aclrtFreePhysical`/`MallocPhysical` 共 184 次累计 ~2.5 s，rollout↔train 反复申请释放物理内存 | -3%~-5% 墙钟 | 低 | `PYTORCH_NPU_ALLOC_CONF` 调大缓存 / 复用 KV、关闭 offload 抖动 | Timeline 视图（系统调优）— `ascend_pytorch_profiler_0.db` |\n| 4 | P1 | 采样开销大：`DSARandomUniform` 565 次 688 ms（占设备算力 10.6%）+ `ArgMaxV2` 76 ms | -2%~-4% 墙钟 | 中 | 采样路径：批量化采样 / 可贪心处温度=0 走 greedy | 算子视图 — `ascend_pytorch_profiler_0.db` |\n| 5 | P1 | 解码算术强度极低：AI Core MAC 占比 3.8%、Vector 占比 4.9%，受内存/launch 限制 | 提升单 kernel MFU | 高 | 增大 rollout 有效 batch / continuous batching，把碎 GEMM 喂成大 GEMM | 算子视图 + 详情视图 — `ascend_pytorch_profiler_0.db` |\n| 6 | P1 | HCCS 小包通信：有效带宽仅 ~10 GB/s（≈理论 30 GB/s 的 33%），逐 op 低至 5.9 GB/s | 提升带宽利用 | 中 | 增大通信 bucket / 字节对齐 / 减少切分粒度（FSDP `reduce_dtype`、bucket_cap） | 通信视图 — `analysis.db`（`CommAnalyzerMatrix`） |\n| 7 | P2 | Host 侧 `aten::copy_`/`aten::to`/`_to_copy` 累计 ~11.5 s，dtype/device 转换冗余 | -2% 墙钟 | 中 | 排查 rollout↔train 张量搬运与 dtype 转换，定长复用 | Timeline 视图（系统调优）— `ascend_pytorch_profiler_0.db` |\n\n---\n\n## 3. 问题详情\n\n### 3.1 [P0] Rollout 生成 Eager 解码，设备占用仅 37%\n\n- **证据**：\n  - MSTX 相位标记还原时间轴：`compute_log_prob`(1.08 s) 起于采集第 ~48 s、`update_actor`(3.54 s) 起于第 ~50.7 s——**前 48.0 s 无任何训练标记，即 Rollout 生成阶段，占墙钟 88.5%**。\n  - 分相位统计（`phase_split.cjs`）：生成阶段 48,009 ms 内**设备并集忙时仅 17,748 ms = 37.0%**，其中真实计算只有 3,597 ms；同期 `CANN_API` 调用 **1,356,400 次**（≈2.8 万次/s）。\n  - 设备算子明细全是 vLLM 解码核：`PagedAttentionMaskNdKernel` 13,464 次、`ReshapeAndCacheNdKernel` 13,560 次、`AtbRopeKernel` 13,560 次——典型 paged-attention 自回归解码。\n  - Host 大头 `launch` 287,326 次 11,762 ms、`vllm::unified_ascend_attention_with_output` 13,560 次 5,206 ms——逐算子下发喂不饱设备。\n- **影响**：生成阶段 63% 时间设备空等 Host，而生成占整窗 88.5%，是端到端吞吐的根本制约；RL 单次迭代的 rollout 墙钟被 Host 串行下发卡死。\n- **修复建议**：\n  1. 给 rollout 推理后端开**图模式**：vllm-ascend 关闭 `enforce_eager`、启用 ACL Graph 捕获（或 torchair 图模式），把每 token ~数千次 Host 下发收敛为整图重放，让 device 背靠背执行。\n  2. 确认 `ASCEND_LAUNCH_BLOCKING` 未置 1（`META_DATA.ENV_VARIABLES` 中为空，正常），保证下发队列可加深。\n  3. 配合 3.2（先消通信暴露）再做图捕获，避免图被同步打断。\n- **验证方法**：重采 profiling，确认生成阶段设备并集占用率从 37% 升到 ≥60%，`CANN_API` 调用次数显著下降，墙钟回落。\n- **问题举证视图**：Timeline 视图（系统调优）— 载入 `ASCEND_PROFILER_OUTPUT/ascend_pytorch_profiler_0.db`（本次为 DB 导出，无 `trace_view.json`），对比 Host `launch` 行与 Ascend Hardware device task 行之间的大段空隙（Free），确认设备在等下发。\n\n### 3.2 [P0] TP All-Reduce 在解码中完全暴露，9.4 s 花在 wait\n\n- **证据**：`analysis.db` 通信分析——`hcom_allReduce` **27,687 次累计 12,954 ms，其中 wait_time 9,355 ms（72%）、transit 几乎为 0**；`hcom_allGather` 1,175 次 1,662 ms、`hcom_reduceScatter` 100 次 622 ms。`StepTraceTime`：communication 15,238 ms 中 **comm_not_overlapped 14,918 ms（98%），仅 320 ms 与计算重叠**。带宽侧 HCCS 实测均值 **17.1 GB/s（约理论 30 GB/s 的 57%）**，包小（reduceScatter 仅 4.6 GB/s），属延迟/同步受限而非带宽受限。\n- **影响**：解码 batch 小、逐 token 串行，TP=2 的 per-layer All-Reduce 无法被计算掩盖；27,687 次小集合通信的同步等待累计近 9.4 s，是生成阶段设备空转的第二大来源。\n- **修复建议**：\n  1. 图模式内开启**通信-计算重叠**（comm stream 与 compute stream 并行），把 0.32 s 的 overlap 拉高。\n  2. 评估 rollout 阶段降低张量并行：若单卡显存放得下权重+KV，rollout 用 **TP=1** 可直接消除这批 All-Reduce。\n  3. 减少集合通信次数：算子/层融合后合并相邻 All-Reduce，提升单次消息体量（当前包过小，带宽利用仅 57%）。\n- **验证方法**：重采后 `CommAnalyzerTime` 中 All-Reduce 次数与 wait_time 下降，`StepTraceTime.overlapped` 占 communication 比例从 2% 升到 >30%。\n- **问题举证视图**：\n  - 主：通信视图 — 载入 `ASCEND_PROFILER_OUTPUT/analysis.db`（`CommAnalyzerMatrix`/`CommAnalyzerBandwidth`），看 HCCS 链路带宽与小包占比。\n  - 辅：Timeline 视图（系统调优）— `ascend_pytorch_profiler_0.db`，过滤 `hcom_allReduce`，观察其后 device 计算行是否串行等待（无重叠）。\n\n### 3.3 [P1] 物理内存反复申请/释放占 ~2.5 s\n\n- **证据**：`CANN_API` 中 `aclrtFreePhysical` **92 次 2,019 ms（均 22 ms/次）**、`aclrtMallocPhysical` 92 次 446 ms——合计 ~2.5 s（占墙钟 4.6%）花在物理内存页申请/释放，远高于普通 `aclrtMalloc`/`Free`。\n- **影响**：rollout 与 train 共卡（colocate）时反复重建显存/KV 物理映射，单次释放 22 ms 量级，叠加成秒级纯开销且打断流水。\n- **修复建议**：\n  1. 调大 `PYTORCH_NPU_ALLOC_CONF`（增大缓存段、减少归还），让 allocator 复用而非反复 `FreePhysical`。\n  2. 排查 rollout↔train 的权重/KV offload-reload 策略，能常驻则常驻，减少物理内存抖动。\n- **验证方法**：重采后 `aclrtFreePhysical`/`MallocPhysical` 次数与总耗时明显下降。\n- **问题举证视图**：Timeline 视图（系统调优）— 载入 `ascend_pytorch_profiler_0.db`，过滤 `aclrtFreePhysical`/`aclrtMallocPhysical`，定位其在相位切换处的密集出现。\n\n### 3.4 [P1] 采样开销大：DSARandomUniform 占设备算力 10.6%\n\n- **证据**：设备算子统计 `DSARandomUniform` **565 次累计 688 ms（均 1,218 µs/次），占全部计算设备时间 10.6%**，是仅次于 MatMulV2 的第二大计算开销；配套 `ArgMaxV2` 565 次 76 ms。\n- **影响**：解码采样（随机数生成 + argmax）单次毫秒级，且每个生成步都要走一遍，显著抬高生成阶段的有效计算占比中的\"非模型\"部分。\n- **修复建议**：\n  1. 批量化采样：把逐步采样合并为按 batch 一次性生成随机数。\n  2. 对温度=0 / 贪心解码路径直接走 greedy（argmax），跳过随机数生成。\n  3. 检查是否可用更轻量的采样核实现。\n- **验证方法**：重采后 `DSARandomUniform` 调用次数/总耗时下降，其占计算设备时间比例回落。\n- **问题举证视图**：算子视图 — 载入 `ascend_pytorch_profiler_0.db`，按 opType 聚合查看 `DSARandomUniform`/`ArgMaxV2` 的调用次数与单次耗时。\n\n### 3.5 [P1] 解码算术强度极低，单 kernel MFU 很低\n\n- **证据**：`TASK_PMU_INFO`（`ACL_AICORE_PIPE_UTILIZATION`）均值——**AI Core MAC 占比 `aic_mac_ratio` 仅 3.8%**、Vector 占比 `aiv_vec_ratio` 仅 4.9%，而搬运 `aic_mte2_ratio` 14.7%、标量 `aic_scalar_ratio` 13.3% / `aiv_scalar_ratio` 23.7%——计算单元被搬运与标量主导。`MatMulV2` 57,881 次均 28 µs（小 GEMM），blockDim 22–24（核数已基本铺满，瓶颈不在多核切分而在 shape 太小）。\n- **影响**：解码 batch 小、算术强度低，cube/vector 几乎空转；即便解决下发与通信，碎小算子仍限制有效算力，MFU 远低于 910B 能力。\n- **修复建议**：\n  1. 增大 rollout 有效 batch（continuous batching / 提高并发请求数），把 28 µs 的小 matmul 喂成大 GEMM。\n  2. 算子融合（attention 已用 paged 融合核，可进一步融合 RoPE/Cast/Gather 等碎核）。\n- **验证方法**：重采后 `aic_mac_ratio` 上升，MatMulV2 平均耗时上升而单位 token 总耗时下降。\n- **问题举证视图**：\n  - 主：算子视图 — `ascend_pytorch_profiler_0.db`，看 MatMulV2/PagedAttention 的耗时与次数分布。\n  - 辅：详情视图 — Roofline 定性（需算子 `*.bin`，本次 DB 导出未含；可在重采时加 `_export_type` 输出 text/bin 以查看 Roofline 落点）。\n\n### 3.6 [P1] HCCS 链路均衡（无慢链路），但小包导致带宽利用仅 ~33%\n\n> 本节按 `cluster-fast-slow-rank-detector` 与 `msprof-analyze-cli` 的「慢链路定位」专家规则，对 rank 0 的 `CommAnalyzerMatrix` 做逐链路（src→dst）带宽对比。msprof-analyze CLI 在本环境不可用（见第 5 章），故用 `node:sqlite` 复刻其 `communication_matrix_sum` / `slow_link` 逻辑。\n\n- **拓扑证据**：rank 0 到 peer 1–7 全部经 **HCCS**（+ 自身 LOCAL），**无 RDMA** → 8 卡同处单节点（单机 8 卡），不存在跨节点慢链路风险。\n- **链路均衡（无慢链路）**：DP 组（default_group [0–7]）的 6 条链路 0→2…0→7 有效带宽 **7.63 / 7.63 / 7.63 / 7.63 / 7.63 / 7.67 GB/s**，极差 < 1%，高度一致；0→1 较高（**14.59 GB/s**）是因 [0,1] TP 组承载 ~5× 字节量（14,384 vs 2,869），属流量差异而非故障。**结论：无故障/慢链路。**\n- **真问题是小包**：HCCS 按字节加权有效带宽 **≈10 GB/s（31.26 GB ÷ 3.12 s），仅理论 ~30 GB/s 的 33%**；逐 op 平均带宽低至 5.9 GB/s、大量 op 趋近 0——典型**小包/延迟受限**（与 3.2 的 27,687 次微型 All-Reduce 互证），而非链路带宽硬件瓶颈。\n- **快慢卡判定（证据不足，需补卡）**：仅有 rank 0 数据，无法点名慢卡 Rank ID。rank 0 在 All-Reduce 上的 **wait_time 高达 9.4 s**——按专家规则，高 wait 既可能是「通信暴露/串行」（最可能，因解码逐 token），也可能是「其他卡为 straggler 致 rank 0 早到空等」。**区分二者必须补采 ≥1–2 张其他卡**：若各卡 wait 对称偏大 → 暴露/序列化问题；若某卡 wait 显著小而 compute 大 → 该卡为计算型慢卡。\n- **修复建议**：\n  1. 增大通信 bucket、提升单次消息体量（小包是带宽利用低的根因，与 3.2 #2 同向）。\n  2. 检查 FSDP `reduce_dtype` / bucket 大小与字节对齐，减少 ZeRO 切分过细导致的碎包。\n  3. **补采全部 8 卡的 Level1 DB**，跑 `msprof-analyze -m slow_rank/slow_link/cluster_time_summary` 做真正的快慢卡定位。\n- **验证方法**：补采多卡后 `slow_rank` 无明显慢卡候选、各 Rank wait 对称；增大 bucket 后 `CommAnalyzerMatrix` 有效带宽从 ~10 GB/s 升到 >18 GB/s。\n- **问题举证视图**：通信视图 — 载入 `ASCEND_PROFILER_OUTPUT/analysis.db`（`CommAnalyzerMatrix`/`CommAnalyzerBandwidth`），看 0→1…0→7 各 HCCS 链路带宽热力是否均衡、小包占比是否偏高。\n\n### 3.7 [P2] Host 侧 dtype/device 转换冗余约 11.5 s\n\n- **证据**：`PYTORCH_API` 中 `aten::copy_` 92,177 次 6,030 ms、`aten::to` 8,507 次 2,793 ms、`aten::_to_copy` 4,016 次 2,699 ms——合计 ~11.5 s Host 时间在张量拷贝与类型/设备转换（注：Host 时间含异步下发，不直接等于墙钟，但反映冗余度）。\n- **影响**：rollout 与 train 之间的数据搬运、精度转换重复发生，加重 Host 负载、放大下发气泡。\n- **修复建议**：排查 rollout 产出→train 输入的搬运链路，定长缓冲复用、减少 `.to()`/`.cpu()` 与 dtype 反复转换。\n- **验证方法**：重采后 `aten::copy_`/`aten::to`/`_to_copy` 次数与总耗时下降。\n- **问题举证视图**：Timeline 视图（系统调优）— 载入 `ascend_pytorch_profiler_0.db`，过滤 `aten::copy_`/`aten::to`，观察其在相位边界的密集搬运。\n\n---\n\n## 4. 已确认无问题 / 未排查\n\n- **训练阶段（update_actor）健康**：3.54 s 内设备占用 **75.4%**、计算 1,935 ms、通信仅 971 ms（FSDP 反向 + 优化器），**不是瓶颈**，无需优先优化。\n- **频率无降频**：`AICORE_FREQ` 全程在 800–1800 MHz 区间，主体 1800 MHz，无异常降频。\n- **多核切分充分**：主要算子 blockDim 22–48（910B 核数已基本铺满），瓶颈在 shape/下发而非多核未铺满。\n- **慢链路（已排查，无问题）**：基于 rank 0 的 `CommAnalyzerMatrix` 逐链路对比——单节点 8 卡全 HCCS 互联（无 RDMA），DP 组 6 条链路有效带宽 7.63–7.67 GB/s 极差 < 1%，**无故障/慢链路**（详见 3.7）。链路低带宽（~33% 理论值）已归因为小包而非链路故障。\n- **快慢卡（未排查，需补卡）**：仅 rank 0 一张卡，无法点名慢卡 Rank ID；rank 0 的 9.4 s All-Reduce wait 需 **补采 ≥1–2 张其他卡**才能区分「通信暴露」与「其他卡 straggler」（判别方法见 3.7）。\n- **内存带宽（未排查）**：采集时 `profile_memory=false`、`_l2_cache=false`，无 HBM/L2 带宽数据，PHS 内存项记 N/A。\n\n---\n\n## 5. 数据与方法\n\n- **分析日期**：2026-06-02\n- **数据路径**：`verl/1/e2e/localhost.localdomain_214483_20260116064439460_ascend_pt/`\n- **数据范围**：单卡（rank 0 / device 0，Ascend 910B），采集墙钟 **54,234 ms**，整窗按 MSTX 标记分相位：Rollout 生成 ~48.0 s（88.5%）、compute_log_prob 1.08 s、相位间隙 1.57 s、update_actor 3.54 s。作业拓扑（`META_DATA.parallel_group_info`）：default_group = 8 卡 [0–7]，group_17 = [0,1]（疑似 rollout TP=2）。\n- **采集配置**（`profiler_info_0.json`）：`profiler_level=Level1`、`aic_metrics=ACL_AICORE_PIPE_UTILIZATION`、`_export_type=[db]`、`_msprof_tx=true`；`record_shapes=false`、`profile_memory=false`、`with_stack=false`、`with_flops=false`。torch_npu 2.7.1 / CANN 8.3.RC1。\n  - **配置局限**：未采 shape/flops → 无法精确算 MFU（已用 `aic_mac_ratio` 3.8% 与设备占用率替代定性）；未采 memory → 内存子项 N/A；未采 stack → 无法回溯 Python 源码行；DB-only 导出 → 无 `trace_view.json`/算子 `*.bin`，Insight 需直接载入 `*_ascend_pt` 目录或 `.db`。\n- **使用的 Skills**：\n  - `mindstudio_profiler_data_check`：校验数据完整性（框架 PyTorch profiler / 单卡 / valid，采集已正常 Stop、已解析）\n  - `ascend_pytorch_profiler_db_explorer`：用 Track A compute 宏 + DB 查询做算子/通信/下发分析（经 `node:sqlite` 执行，脚本见 `intermediate/`）\n  - `cluster-fast-slow-rank-detector` / `msprof-analyze-cli`：按「慢链路定位」专家规则，对 rank 0 的 `CommAnalyzerMatrix` 做逐链路（src→dst）带宽对比（复刻 `communication_matrix_sum`/`slow_link` 逻辑），判定无慢链路；快慢卡因仅 1 卡数据暂无法点名（见 3.7、第 4 章）\n  - `performance-health-score`：按\"大模型多卡训练\"权重（计算 0.40 / 通信 0.30 / 调度 0.20 / 内存 0.10）计算 PHS，内存 N/A 后归一化（计算 0.444 / 通信 0.333 / 调度 0.222）\n  - `op-mfu-calculator`：评估计算受限性（MAC 占比 3.8%，确认解码非计算瓶颈而是内存/下发受限）\n  - `msinsight-view-selector`：为每个问题点附 MindStudio Insight 视图\n- **Advisor 状态**：\n  - `msprof-analyze advisor`：**失败** — 本环境 Python 为 Microsoft Store 占位 stub（执行 exit 49）、无 `sqlite3` CLI 与 `msprof-analyze` 命令；改用 Node.js v24 内置 `node:sqlite` 直接查询 `ascend_pytorch_profiler_0.db` 与 `analysis.db`，并以 `StepTraceTime`/`CommAnalyzer*`/MSTX 相位标记交叉验证，结论已并入第 2、3 章。\n- **PHS 计算说明**：\n  - 计算利用率 ≈ AI Core 占用率 = 计算设备时间 6,472 ms ÷ 墙钟 54,234 ms = **11.9%**（真实 MFU 更低，MAC 占比仅 3.8%）。\n  - 通信效率 = HCCS 按字节加权有效带宽 **~10 GB/s（31.26 GB ÷ 3.12 s）÷ 理论 30 GB/s = 33%**（订正：初版误用逐 op 平均带宽 17.1 GB/s，实际有效带宽由 3.7 链路分析得 ~10 GB/s；通信另受同步/暴露拖累，本子项仅反映带宽维度）。\n  - 调度效率 = (1 − Free 占比 60.6%) × 100 = **39.4%**。\n  - 内存、（集群均衡度）N/A。\n  - 当前 PHS = 0.444×12 + 0.333×33 + 0.222×39 ≈ **25（D）**。优化后按 P0/P1 落地（生成设备占用 37%→~65%、增大消息体后带宽利用 33%→~60%、调度→~65%）代回公式 ≈ **45（B）**。\n- **输出位置**：`./ascend_analysis_verl_20260602/`（`report.md` + `intermediate/` 下的 `node:sqlite` 查询脚本：overview / steptrace_comm / comm_detail / mstx_compute / phase_split / pmu_size / slowlink）\n","../../Analysis Report/ascend_analysis_verl_20260602/report.md":"# verl RL 训练性能诊断报告（Ascend 910B · rank 0）\n\n## 1. 结论速览\n\n- **性能健康度**：25 / 100 (D) → 优化后预估 **45 / 100 (B)** — 计算 12% · 通信 33% · 调度 39% · 内存 N/A\n  - （订正：通信子项由初版 57% 下调至 33%——初版误用了「逐 op 平均带宽」17 GB/s，按字节加权的有效带宽实为 ~10 GB/s，详见 3.7 链路分析与第 5 章）\n- **结论**：本次采集的 54.2 s 窗口里，**Rollout 生成阶段独占 48.0 s（88.5%）**，而生成阶段 NPU 只忙 37%、其余 63% 在等 Host 下发——整段被「Eager 模式逐 token 解码」的下发与通信暴露彻底拖慢；真正的训练（update_actor）只占 3.5 s 且健康（设备占用 75%）。\n- **头号瓶颈**：生成阶段 Eager 解码，48 s 内下发 **136 万次 CANN API**（≈2.8 万次/s），设备占用仅 **37%**，AI Core MAC 利用率均值仅 **3.8%**。\n- **次号瓶颈**：TP All-Reduce 在解码中**完全暴露**——27,687 次 All-Reduce 累计 12.95 s，其中 **9.4 s 是 wait（等其他卡/同步）**，几乎不与计算重叠（全程仅 0.32 s overlap）。\n- **收益上限**：生成阶段转图模式 + 通信重叠 + 内存复用落地后，墙钟有望从 54.2 s 压到 ~34–38 s，**最多省 ~30%–37%（约 16–20 s）**。\n\n---\n\n## 2. 行动清单\n\n> 默认按\"预期收益\"从高到低排序；同档收益按\"修改难度\"从低到高排序。\n\n| # | 优先级 | 问题 | 预期收益 | 修改难度 | 在哪改 / 对应位置 | 问题举证视图 |\n|---|---|---|---|---|---|---|\n| 1 | P0 | Rollout 生成 Eager 解码，48 s 内 136 万次下发，设备占用仅 37% | -20%~-35% 墙钟 | 中 | 推理后端开图模式：vllm-ascend `enforce_eager=False` / ACL Graph / torchair 捕获 | Timeline 视图（系统调优）— `ascend_pytorch_profiler_0.db` |\n| 2 | P0 | TP All-Reduce 解码中全暴露，27687 次累计 12.95 s（wait 9.4 s），overlap 仅 0.32 s | -10%~-15% 墙钟 | 中 | rollout TP 配置 / 通信-计算重叠（图模式内）/ 评估 rollout TP=1 | 通信视图 + Timeline 视图（系统调优）— `analysis.db` |\n| 3 | P1 | `aclrtFreePhysical`/`MallocPhysical` 共 184 次累计 ~2.5 s，rollout↔train 反复申请释放物理内存 | -3%~-5% 墙钟 | 低 | `PYTORCH_NPU_ALLOC_CONF` 调大缓存 / 复用 KV、关闭 offload 抖动 | Timeline 视图（系统调优）— `ascend_pytorch_profiler_0.db` |\n| 4 | P1 | 采样开销大：`DSARandomUniform` 565 次 688 ms（占设备算力 10.6%）+ `ArgMaxV2` 76 ms | -2%~-4% 墙钟 | 中 | 采样路径：批量化采样 / 可贪心处温度=0 走 greedy | 算子视图 — `ascend_pytorch_profiler_0.db` |\n| 5 | P1 | 解码算术强度极低：AI Core MAC 占比 3.8%、Vector 占比 4.9%，受内存/launch 限制 | 提升单 kernel MFU | 高 | 增大 rollout 有效 batch / continuous batching，把碎 GEMM 喂成大 GEMM | 算子视图 + 详情视图 — `ascend_pytorch_profiler_0.db` |\n| 6 | P1 | HCCS 小包通信：有效带宽仅 ~10 GB/s（≈理论 30 GB/s 的 33%），逐 op 低至 5.9 GB/s | 提升带宽利用 | 中 | 增大通信 bucket / 字节对齐 / 减少切分粒度（FSDP `reduce_dtype`、bucket_cap） | 通信视图 — `analysis.db`（`CommAnalyzerMatrix`） |\n| 7 | P2 | Host 侧 `aten::copy_`/`aten::to`/`_to_copy` 累计 ~11.5 s，dtype/device 转换冗余 | -2% 墙钟 | 中 | 排查 rollout↔train 张量搬运与 dtype 转换，定长复用 | Timeline 视图（系统调优）— `ascend_pytorch_profiler_0.db` |\n\n---\n\n## 3. 问题详情\n\n### 3.1 [P0] Rollout 生成 Eager 解码，设备占用仅 37%\n\n- **证据**：\n  - MSTX 相位标记还原时间轴：`compute_log_prob`(1.08 s) 起于采集第 ~48 s、`update_actor`(3.54 s) 起于第 ~50.7 s——**前 48.0 s 无任何训练标记，即 Rollout 生成阶段，占墙钟 88.5%**。\n  - 分相位统计（`phase_split.cjs`）：生成阶段 48,009 ms 内**设备并集忙时仅 17,748 ms = 37.0%**，其中真实计算只有 3,597 ms；同期 `CANN_API` 调用 **1,356,400 次**（≈2.8 万次/s）。\n  - 设备算子明细全是 vLLM 解码核：`PagedAttentionMaskNdKernel` 13,464 次、`ReshapeAndCacheNdKernel` 13,560 次、`AtbRopeKernel` 13,560 次——典型 paged-attention 自回归解码。\n  - Host 大头 `launch` 287,326 次 11,762 ms、`vllm::unified_ascend_attention_with_output` 13,560 次 5,206 ms——逐算子下发喂不饱设备。\n- **影响**：生成阶段 63% 时间设备空等 Host，而生成占整窗 88.5%，是端到端吞吐的根本制约；RL 单次迭代的 rollout 墙钟被 Host 串行下发卡死。\n- **修复建议**：\n  1. 给 rollout 推理后端开**图模式**：vllm-ascend 关闭 `enforce_eager`、启用 ACL Graph 捕获（或 torchair 图模式），把每 token ~数千次 Host 下发收敛为整图重放，让 device 背靠背执行。\n  2. 确认 `ASCEND_LAUNCH_BLOCKING` 未置 1（`META_DATA.ENV_VARIABLES` 中为空，正常），保证下发队列可加深。\n  3. 配合 3.2（先消通信暴露）再做图捕获，避免图被同步打断。\n- **验证方法**：重采 profiling，确认生成阶段设备并集占用率从 37% 升到 ≥60%，`CANN_API` 调用次数显著下降，墙钟回落。\n- **问题举证视图**：Timeline 视图（系统调优）— 载入 `ASCEND_PROFILER_OUTPUT/ascend_pytorch_profiler_0.db`（本次为 DB 导出，无 `trace_view.json`），对比 Host `launch` 行与 Ascend Hardware device task 行之间的大段空隙（Free），确认设备在等下发。\n\n### 3.2 [P0] TP All-Reduce 在解码中完全暴露，9.4 s 花在 wait\n\n- **证据**：`analysis.db` 通信分析——`hcom_allReduce` **27,687 次累计 12,954 ms，其中 wait_time 9,355 ms（72%）、transit 几乎为 0**；`hcom_allGather` 1,175 次 1,662 ms、`hcom_reduceScatter` 100 次 622 ms。`StepTraceTime`：communication 15,238 ms 中 **comm_not_overlapped 14,918 ms（98%），仅 320 ms 与计算重叠**。带宽侧 HCCS 实测均值 **17.1 GB/s（约理论 30 GB/s 的 57%）**，包小（reduceScatter 仅 4.6 GB/s），属延迟/同步受限而非带宽受限。\n- **影响**：解码 batch 小、逐 token 串行，TP=2 的 per-layer All-Reduce 无法被计算掩盖；27,687 次小集合通信的同步等待累计近 9.4 s，是生成阶段设备空转的第二大来源。\n- **修复建议**：\n  1. 图模式内开启**通信-计算重叠**（comm stream 与 compute stream 并行），把 0.32 s 的 overlap 拉高。\n  2. 评估 rollout 阶段降低张量并行：若单卡显存放得下权重+KV，rollout 用 **TP=1** 可直接消除这批 All-Reduce。\n  3. 减少集合通信次数：算子/层融合后合并相邻 All-Reduce，提升单次消息体量（当前包过小，带宽利用仅 57%）。\n- **验证方法**：重采后 `CommAnalyzerTime` 中 All-Reduce 次数与 wait_time 下降，`StepTraceTime.overlapped` 占 communication 比例从 2% 升到 >30%。\n- **问题举证视图**：\n  - 主：通信视图 — 载入 `ASCEND_PROFILER_OUTPUT/analysis.db`（`CommAnalyzerMatrix`/`CommAnalyzerBandwidth`），看 HCCS 链路带宽与小包占比。\n  - 辅：Timeline 视图（系统调优）— `ascend_pytorch_profiler_0.db`，过滤 `hcom_allReduce`，观察其后 device 计算行是否串行等待（无重叠）。\n\n### 3.3 [P1] 物理内存反复申请/释放占 ~2.5 s\n\n- **证据**：`CANN_API` 中 `aclrtFreePhysical` **92 次 2,019 ms（均 22 ms/次）**、`aclrtMallocPhysical` 92 次 446 ms——合计 ~2.5 s（占墙钟 4.6%）花在物理内存页申请/释放，远高于普通 `aclrtMalloc`/`Free`。\n- **影响**：rollout 与 train 共卡（colocate）时反复重建显存/KV 物理映射，单次释放 22 ms 量级，叠加成秒级纯开销且打断流水。\n- **修复建议**：\n  1. 调大 `PYTORCH_NPU_ALLOC_CONF`（增大缓存段、减少归还），让 allocator 复用而非反复 `FreePhysical`。\n  2. 排查 rollout↔train 的权重/KV offload-reload 策略，能常驻则常驻，减少物理内存抖动。\n- **验证方法**：重采后 `aclrtFreePhysical`/`MallocPhysical` 次数与总耗时明显下降。\n- **问题举证视图**：Timeline 视图（系统调优）— 载入 `ascend_pytorch_profiler_0.db`，过滤 `aclrtFreePhysical`/`aclrtMallocPhysical`，定位其在相位切换处的密集出现。\n\n### 3.4 [P1] 采样开销大：DSARandomUniform 占设备算力 10.6%\n\n- **证据**：设备算子统计 `DSARandomUniform` **565 次累计 688 ms（均 1,218 µs/次），占全部计算设备时间 10.6%**，是仅次于 MatMulV2 的第二大计算开销；配套 `ArgMaxV2` 565 次 76 ms。\n- **影响**：解码采样（随机数生成 + argmax）单次毫秒级，且每个生成步都要走一遍，显著抬高生成阶段的有效计算占比中的\"非模型\"部分。\n- **修复建议**：\n  1. 批量化采样：把逐步采样合并为按 batch 一次性生成随机数。\n  2. 对温度=0 / 贪心解码路径直接走 greedy（argmax），跳过随机数生成。\n  3. 检查是否可用更轻量的采样核实现。\n- **验证方法**：重采后 `DSARandomUniform` 调用次数/总耗时下降，其占计算设备时间比例回落。\n- **问题举证视图**：算子视图 — 载入 `ascend_pytorch_profiler_0.db`，按 opType 聚合查看 `DSARandomUniform`/`ArgMaxV2` 的调用次数与单次耗时。\n\n### 3.5 [P1] 解码算术强度极低，单 kernel MFU 很低\n\n- **证据**：`TASK_PMU_INFO`（`ACL_AICORE_PIPE_UTILIZATION`）均值——**AI Core MAC 占比 `aic_mac_ratio` 仅 3.8%**、Vector 占比 `aiv_vec_ratio` 仅 4.9%，而搬运 `aic_mte2_ratio` 14.7%、标量 `aic_scalar_ratio` 13.3% / `aiv_scalar_ratio` 23.7%——计算单元被搬运与标量主导。`MatMulV2` 57,881 次均 28 µs（小 GEMM），blockDim 22–24（核数已基本铺满，瓶颈不在多核切分而在 shape 太小）。\n- **影响**：解码 batch 小、算术强度低，cube/vector 几乎空转；即便解决下发与通信，碎小算子仍限制有效算力，MFU 远低于 910B 能力。\n- **修复建议**：\n  1. 增大 rollout 有效 batch（continuous batching / 提高并发请求数），把 28 µs 的小 matmul 喂成大 GEMM。\n  2. 算子融合（attention 已用 paged 融合核，可进一步融合 RoPE/Cast/Gather 等碎核）。\n- **验证方法**：重采后 `aic_mac_ratio` 上升，MatMulV2 平均耗时上升而单位 token 总耗时下降。\n- **问题举证视图**：\n  - 主：算子视图 — `ascend_pytorch_profiler_0.db`，看 MatMulV2/PagedAttention 的耗时与次数分布。\n  - 辅：详情视图 — Roofline 定性（需算子 `*.bin`，本次 DB 导出未含；可在重采时加 `_export_type` 输出 text/bin 以查看 Roofline 落点）。\n\n### 3.6 [P1] HCCS 链路均衡（无慢链路），但小包导致带宽利用仅 ~33%\n\n> 本节按 `cluster-fast-slow-rank-detector` 与 `msprof-analyze-cli` 的「慢链路定位」专家规则，对 rank 0 的 `CommAnalyzerMatrix` 做逐链路（src→dst）带宽对比。msprof-analyze CLI 在本环境不可用（见第 5 章），故用 `node:sqlite` 复刻其 `communication_matrix_sum` / `slow_link` 逻辑。\n\n- **拓扑证据**：rank 0 到 peer 1–7 全部经 **HCCS**（+ 自身 LOCAL），**无 RDMA** → 8 卡同处单节点（单机 8 卡），不存在跨节点慢链路风险。\n- **链路均衡（无慢链路）**：DP 组（default_group [0–7]）的 6 条链路 0→2…0→7 有效带宽 **7.63 / 7.63 / 7.63 / 7.63 / 7.63 / 7.67 GB/s**，极差 < 1%，高度一致；0→1 较高（**14.59 GB/s**）是因 [0,1] TP 组承载 ~5× 字节量（14,384 vs 2,869），属流量差异而非故障。**结论：无故障/慢链路。**\n- **真问题是小包**：HCCS 按字节加权有效带宽 **≈10 GB/s（31.26 GB ÷ 3.12 s），仅理论 ~30 GB/s 的 33%**；逐 op 平均带宽低至 5.9 GB/s、大量 op 趋近 0——典型**小包/延迟受限**（与 3.2 的 27,687 次微型 All-Reduce 互证），而非链路带宽硬件瓶颈。\n- **快慢卡判定（证据不足，需补卡）**：仅有 rank 0 数据，无法点名慢卡 Rank ID。rank 0 在 All-Reduce 上的 **wait_time 高达 9.4 s**——按专家规则，高 wait 既可能是「通信暴露/串行」（最可能，因解码逐 token），也可能是「其他卡为 straggler 致 rank 0 早到空等」。**区分二者必须补采 ≥1–2 张其他卡**：若各卡 wait 对称偏大 → 暴露/序列化问题；若某卡 wait 显著小而 compute 大 → 该卡为计算型慢卡。\n- **修复建议**：\n  1. 增大通信 bucket、提升单次消息体量（小包是带宽利用低的根因，与 3.2 #2 同向）。\n  2. 检查 FSDP `reduce_dtype` / bucket 大小与字节对齐，减少 ZeRO 切分过细导致的碎包。\n  3. **补采全部 8 卡的 Level1 DB**，跑 `msprof-analyze -m slow_rank/slow_link/cluster_time_summary` 做真正的快慢卡定位。\n- **验证方法**：补采多卡后 `slow_rank` 无明显慢卡候选、各 Rank wait 对称；增大 bucket 后 `CommAnalyzerMatrix` 有效带宽从 ~10 GB/s 升到 >18 GB/s。\n- **问题举证视图**：通信视图 — 载入 `ASCEND_PROFILER_OUTPUT/analysis.db`（`CommAnalyzerMatrix`/`CommAnalyzerBandwidth`），看 0→1…0→7 各 HCCS 链路带宽热力是否均衡、小包占比是否偏高。\n\n### 3.7 [P2] Host 侧 dtype/device 转换冗余约 11.5 s\n\n- **证据**：`PYTORCH_API` 中 `aten::copy_` 92,177 次 6,030 ms、`aten::to` 8,507 次 2,793 ms、`aten::_to_copy` 4,016 次 2,699 ms——合计 ~11.5 s Host 时间在张量拷贝与类型/设备转换（注：Host 时间含异步下发，不直接等于墙钟，但反映冗余度）。\n- **影响**：rollout 与 train 之间的数据搬运、精度转换重复发生，加重 Host 负载、放大下发气泡。\n- **修复建议**：排查 rollout 产出→train 输入的搬运链路，定长缓冲复用、减少 `.to()`/`.cpu()` 与 dtype 反复转换。\n- **验证方法**：重采后 `aten::copy_`/`aten::to`/`_to_copy` 次数与总耗时下降。\n- **问题举证视图**：Timeline 视图（系统调优）— 载入 `ascend_pytorch_profiler_0.db`，过滤 `aten::copy_`/`aten::to`，观察其在相位边界的密集搬运。\n\n---\n\n## 4. 已确认无问题 / 未排查\n\n- **训练阶段（update_actor）健康**：3.54 s 内设备占用 **75.4%**、计算 1,935 ms、通信仅 971 ms（FSDP 反向 + 优化器），**不是瓶颈**，无需优先优化。\n- **频率无降频**：`AICORE_FREQ` 全程在 800–1800 MHz 区间，主体 1800 MHz，无异常降频。\n- **多核切分充分**：主要算子 blockDim 22–48（910B 核数已基本铺满），瓶颈在 shape/下发而非多核未铺满。\n- **慢链路（已排查，无问题）**：基于 rank 0 的 `CommAnalyzerMatrix` 逐链路对比——单节点 8 卡全 HCCS 互联（无 RDMA），DP 组 6 条链路有效带宽 7.63–7.67 GB/s 极差 < 1%，**无故障/慢链路**（详见 3.7）。链路低带宽（~33% 理论值）已归因为小包而非链路故障。\n- **快慢卡（未排查，需补卡）**：仅 rank 0 一张卡，无法点名慢卡 Rank ID；rank 0 的 9.4 s All-Reduce wait 需 **补采 ≥1–2 张其他卡**才能区分「通信暴露」与「其他卡 straggler」（判别方法见 3.7）。\n- **内存带宽（未排查）**：采集时 `profile_memory=false`、`_l2_cache=false`，无 HBM/L2 带宽数据，PHS 内存项记 N/A。\n\n---\n\n## 5. 数据与方法\n\n- **分析日期**：2026-06-02\n- **数据路径**：`verl/1/e2e/localhost.localdomain_214483_20260116064439460_ascend_pt/`\n- **数据范围**：单卡（rank 0 / device 0，Ascend 910B），采集墙钟 **54,234 ms**，整窗按 MSTX 标记分相位：Rollout 生成 ~48.0 s（88.5%）、compute_log_prob 1.08 s、相位间隙 1.57 s、update_actor 3.54 s。作业拓扑（`META_DATA.parallel_group_info`）：default_group = 8 卡 [0–7]，group_17 = [0,1]（疑似 rollout TP=2）。\n- **采集配置**（`profiler_info_0.json`）：`profiler_level=Level1`、`aic_metrics=ACL_AICORE_PIPE_UTILIZATION`、`_export_type=[db]`、`_msprof_tx=true`；`record_shapes=false`、`profile_memory=false`、`with_stack=false`、`with_flops=false`。torch_npu 2.7.1 / CANN 8.3.RC1。\n  - **配置局限**：未采 shape/flops → 无法精确算 MFU（已用 `aic_mac_ratio` 3.8% 与设备占用率替代定性）；未采 memory → 内存子项 N/A；未采 stack → 无法回溯 Python 源码行；DB-only 导出 → 无 `trace_view.json`/算子 `*.bin`，Insight 需直接载入 `*_ascend_pt` 目录或 `.db`。\n- **使用的 Skills**：\n  - `mindstudio_profiler_data_check`：校验数据完整性（框架 PyTorch profiler / 单卡 / valid，采集已正常 Stop、已解析）\n  - `ascend_pytorch_profiler_db_explorer`：用 Track A compute 宏 + DB 查询做算子/通信/下发分析（经 `node:sqlite` 执行，脚本见 `intermediate/`）\n  - `cluster-fast-slow-rank-detector` / `msprof-analyze-cli`：按「慢链路定位」专家规则，对 rank 0 的 `CommAnalyzerMatrix` 做逐链路（src→dst）带宽对比（复刻 `communication_matrix_sum`/`slow_link` 逻辑），判定无慢链路；快慢卡因仅 1 卡数据暂无法点名（见 3.7、第 4 章）\n  - `performance-health-score`：按\"大模型多卡训练\"权重（计算 0.40 / 通信 0.30 / 调度 0.20 / 内存 0.10）计算 PHS，内存 N/A 后归一化（计算 0.444 / 通信 0.333 / 调度 0.222）\n  - `op-mfu-calculator`：评估计算受限性（MAC 占比 3.8%，确认解码非计算瓶颈而是内存/下发受限）\n  - `msinsight-view-selector`：为每个问题点附 MindStudio Insight 视图\n- **Advisor 状态**：\n  - `msprof-analyze advisor`：**失败** — 本环境 Python 为 Microsoft Store 占位 stub（执行 exit 49）、无 `sqlite3` CLI 与 `msprof-analyze` 命令；改用 Node.js v24 内置 `node:sqlite` 直接查询 `ascend_pytorch_profiler_0.db` 与 `analysis.db`，并以 `StepTraceTime`/`CommAnalyzer*`/MSTX 相位标记交叉验证，结论已并入第 2、3 章。\n- **PHS 计算说明**：\n  - 计算利用率 ≈ AI Core 占用率 = 计算设备时间 6,472 ms ÷ 墙钟 54,234 ms = **11.9%**（真实 MFU 更低，MAC 占比仅 3.8%）。\n  - 通信效率 = HCCS 按字节加权有效带宽 **~10 GB/s（31.26 GB ÷ 3.12 s）÷ 理论 30 GB/s = 33%**（订正：初版误用逐 op 平均带宽 17.1 GB/s，实际有效带宽由 3.7 链路分析得 ~10 GB/s；通信另受同步/暴露拖累，本子项仅反映带宽维度）。\n  - 调度效率 = (1 − Free 占比 60.6%) × 100 = **39.4%**。\n  - 内存、（集群均衡度）N/A。\n  - 当前 PHS = 0.444×12 + 0.333×33 + 0.222×39 ≈ **25（D）**。优化后按 P0/P1 落地（生成设备占用 37%→~65%、增大消息体后带宽利用 33%→~60%、调度→~65%）代回公式 ≈ **45（B）**。\n- **输出位置**：`./ascend_analysis_verl_20260602/`（`report.md` + `intermediate/` 下的 `node:sqlite` 查询脚本：overview / steptrace_comm / comm_detail / mstx_compute / phase_split / pmu_size / slowlink）\n"};
  var _f=window.fetch.bind(window);
  window.fetch=function(url,opts){

  };
})();

// ---- Init ----
async function init() {
  await loadPresetReports();
  setupTabs();
  setupDrop();
  setupSidebarCollapse();
  setupChatInput();
  setupBenefitTooltip();
  buildHistory();
  selectReport(REPORTS[REPORTS.length - 1]);
  window.addEventListener('resize', () => {
    phsChartInst?.resize();
    subChartInst?.resize();
    issueChartInst?.resize();
    _opCharts.forEach(c => c.resize());
  });
}

function setupBenefitTooltip() {
  const tip = document.createElement('div');
  tip.className = 'g-tooltip';
  document.body.appendChild(tip);

  document.addEventListener('mouseover', e => {
    const el = e.target.closest('.ac-benefit[data-tooltip]');
    if (!el) return;
    tip.textContent = el.dataset.tooltip;
    tip.classList.add('visible');
  });

  document.addEventListener('mousemove', e => {
    if (!tip.classList.contains('visible')) return;
    const GAP = 10;
    let x = e.clientX + GAP;
    let y = e.clientY - tip.offsetHeight - GAP;
    if (x + tip.offsetWidth > window.innerWidth - 8) x = e.clientX - tip.offsetWidth - GAP;
    if (y < 8) y = e.clientY + GAP;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  });

  document.addEventListener('mouseout', e => {
    if (!e.target.closest('.ac-benefit[data-tooltip]')) return;
    tip.classList.remove('visible');
  });
}

async function loadPresetReports() {
  await Promise.all(REPORTS.map(async r => {
    try {
      const resp = await fetch('../' + r.filename);
      if (!resp.ok) return;
      const md = await resp.text();
      const parsed = parseReport(md, r.filename);
      if (parsed.issues.length) r.issues = parsed.issues;
    } catch(e) {
      console.warn('loadPresetReports skipped:', r.filename);
    }
  }));
}

// ---- Sidebar History ----
function buildHistory() {
  const list = $('historyList');
  list.innerHTML = '';
  [...REPORTS].reverse().forEach(r => {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.dataset.id = r.id;
    if (r.id === 'r20260602multi') {
      item.dataset.tip = '点击顶部拖入文件框，可查看本记录的分析过程';
    }
    const gradeColor = gradeToColor(r.phs.grade);
    item.innerHTML = `
      <div class="history-title">${r.title}</div>
      <div class="history-meta">
        <span>${r.reportDate}</span>
        <span class="hi-badge" style="background:${gradeColor}20;color:${gradeColor}">${r.phs.grade}</span>
        <span class="hi-type">${r.taskType}</span>
      </div>`;
    item.addEventListener('click', () => selectReport(r));
    list.appendChild(item);
  });
}

function selectReport(report) {
  currentReport = report;
  document.querySelectorAll('.history-item').forEach(el =>
    el.classList.toggle('active', el.dataset.id === report.id));
  renderOverview(report);
  renderIssues(report);
  renderCode(report);
  renderDocs(report);
  renderRawReport(report);
  initChat(report);
}

async function renderRawReport(report) {
  const el = $('reportMdContent');
  if (!el) return;
  let md = report.rawMd;
  if (!md && report.filename) {
    el.innerHTML = '<div class="report-md-status">加载中…</div>';
    try {
      const res = await fetch(report.filename);
      if (!res.ok) throw new Error();
      md = await res.text();
      report.rawMd = md;
    } catch {
      el.innerHTML = '<div class="report-md-status">原始报告文件不可用</div>';
      return;
    }
  }
  if (!md) { el.innerHTML = '<div class="report-md-status">无原始报告</div>'; return; }
  el.innerHTML = `<div class="report-md-body">${marked.parse(md)}</div>`;
}

// ---- Tabs ----
function setupTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === tab));
      document.querySelectorAll('.tab-pane').forEach(p =>
        p.classList.toggle('active', p.id === `tab-${tab.dataset.tab}`));
      if (tab.dataset.tab === 'overview') { phsChartInst?.resize(); subChartInst?.resize(); }
      if (tab.dataset.tab === 'issues') { issueChartInst?.resize(); }
    });
  });
}

// ─── N/A 维度说明 ────────────────────────────────────────────
function getNaReason(dim, r) {
  const taskType = r.taskType || '';
  const subtitle = r.subtitle || '';
  const isOp = taskType.includes('算子');
  const isRL = taskType === 'RL 训练';
  const isSingleCard = subtitle.includes('单卡') || isOp;
  if (dim === '通信') {
    if (isOp) return '单算子调优任务不涉及跨卡通信，该维度不适用';
    if (isSingleCard && !isRL) return '单卡场景无跨卡通信链路，该维度不适用';
    return '本次 Profiling 未开启通信域事件采集';
  }
  if (dim === '内存') {
    if (isRL) return '本次采集 profile_memory=false，无 HBM/L2 带宽数据，内存子项记 N/A';
    return '本次 Profiling 未开启内存事件采集（需追加 memory 分析选项重新采集）';
  }
  if (dim === '均衡') {
    if (isOp) return '单算子调优无多卡负载均衡概念，该维度不适用';
    if (isRL) return '仅采集 rank 0 单卡数据，无法点名慢卡——需补采其余卡才能评估均衡度';
    if (isSingleCard) return '单卡场景无多卡均衡维度，该维度不适用';
    return '当前并行配置下无法评估跨卡负载均衡';
  }
  return '当前任务类型下无对应数据';
}

  const rid = cardEl.dataset.report;

  cardEl.closest('.issues-card-list')
    ?.querySelectorAll('.ic-card')
    .forEach(c => c.classList.remove('active'));

  const a = currentReport.actions.find(x => x.id === aid);
  if (a) renderIssueDetail(currentReport, a);
};
