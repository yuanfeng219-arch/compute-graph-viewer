<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindStudioNext</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
/* ===================== PTO Design System Tokens ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Color foundation */
  --primary:        #4369EF;
  --primary-hover:  #5A92E6;
  --accent:         #7C8DB8;
  --success:        #04D793;
  --warning:        #FFAA3B;
  --danger:         #FF4B7B;

  /* Surfaces — true neutral, no blue tint */
  --bg:             #101010;
  --bg-elevated:    #141414;
  --surface-1:      #161616;
  --surface-2:      #1C1C1C;
  --surface-3:      #262626;
  --surface-4:      #313131;

  /* Foreground */
  --fg:             #E6E6E6;
  --fg-secondary:   #999999;
  --fg-muted:       #666666;

  /* Borders */
  --border-subtle:  #202020;
  --border:         #292929;
  --border-strong:  #3A3A3A;

  /* Primary foreground */
  --primary-fg:     #F5F9FF;

  /* Typography */
  --font-sans: 'Inter', 'Source Han Sans SC', 'PingFang SC', 'Noto Sans SC', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;

  /* Radii */
  --radius-sm:  6px;
  --radius-md:  8px;
  --radius-lg:  12px;
  --radius-xl:  16px;
  --radius-pill: 999px;

  /* Layout */
  --topbar-h:  44px;
  --sidebar-w: 240px;
  --chat-w:    300px;
}

html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg); color: var(--fg);
  font-family: var(--font-sans); font-size: 14px; line-height: 1.5;
}

/* ===================== Layout ===================== */
.app { display: flex; flex-direction: column; height: 100vh; }

.topbar {
  height: var(--topbar-h); background: var(--bg-elevated);
  border-bottom: 1px solid var(--border-subtle);
  display: flex; align-items: center; padding: 0 16px; gap: 10px; flex-shrink: 0;
}
.logo { font-size: 14px; font-weight: 600; color: var(--fg); letter-spacing: 0.2px; }
.tagline { font-size: 11px; color: var(--fg-muted); flex: 1; letter-spacing: 0.3px; }

/* Product intro link */
.topbar-product-link {
  font-size: 11px; font-weight: 500; letter-spacing: 0.3px;
  padding: 3px 10px; border-radius: var(--radius-pill);
  border: 1px solid rgba(99,130,200,0.3);
  background: rgba(67,105,239,0.08); color: #7C8DB8;
  text-decoration: none; transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.topbar-product-link:hover {
  border-color: rgba(99,130,200,0.6); color: #aabde0;
  background: rgba(67,105,239,0.15);
}

.workspace { display: flex; flex: 1; overflow: hidden; }

/* ===================== Sidebar (Col 1) ===================== */
.sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--bg-elevated); border-right: 1px solid var(--border-subtle);
  display: flex; flex-direction: column; overflow: hidden;
  transition: width 0.22s ease, min-width 0.22s ease; flex-shrink: 0;
}
.sidebar.collapsed { width: 0; min-width: 0; }

.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px 6px; flex-shrink: 0;
}
.sidebar-body {
  flex: 1; overflow: hidden; display: flex; flex-direction: column;
  gap: 8px; padding: 4px 12px 12px;
}
.sidebar-collapse-btn {
  background: none; border: none; color: var(--fg-muted); cursor: pointer;
  font-size: 11px; padding: 3px 5px; border-radius: var(--radius-sm);
  transition: color 0.15s, background 0.15s;
}
.sidebar-collapse-btn:hover { background: var(--surface-2); color: var(--fg-secondary); }

.section-label {
  font-size: 10px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--fg-muted);
}

/* ===================== Chat Panel (Col 2) ===================== */
.chat-panel {
  width: var(--chat-w); min-width: var(--chat-w); flex-shrink: 0;
  background: var(--bg-elevated); border-right: 1px solid var(--border-subtle);
  display: flex; flex-direction: column; overflow: hidden;
}
.chat-panel-header {
  display: flex; align-items: center; gap: 8px;
  padding: 0 12px; height: 40px; border-bottom: 1px solid var(--border-subtle);
  background: var(--bg-elevated); flex-shrink: 0;
}
.sidebar-toggle-btn {
  background: none; border: none; color: var(--fg-muted); cursor: pointer;
  font-size: 14px; padding: 4px 6px; border-radius: var(--radius-sm); flex-shrink: 0;
  transition: color 0.15s, background 0.15s; display: none; align-items: center; justify-content: center;
}
.sidebar-toggle-btn:hover { background: var(--surface-2); color: var(--fg-secondary); }
.chat-report-info { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; overflow: hidden; }
.chat-report-title {
  font-size: 11px; color: var(--fg-secondary); font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
}
.chat-report-badge {
  font-size: 9px; font-weight: 500; padding: 1px 5px; border-radius: var(--radius-pill);
  flex-shrink: 0; letter-spacing: 0.3px; border: 1px solid transparent;
}
.chat-report-badge:empty { display: none; }
.badge-train  { background: rgba(67,105,239,0.15); color: #4369EF; border-color: rgba(67,105,239,0.3); }
.badge-infer  { background: rgba(4,215,147,0.12);  color: #04D793; border-color: rgba(4,215,147,0.3); }
.badge-op     { background: rgba(255,140,66,0.15);  color: #FF8C42; border-color: rgba(255,140,66,0.3); }
.badge-rl     { background: rgba(155,89,182,0.15);  color: #A78BFA; border-color: rgba(155,89,182,0.3); }

/* Chat messages */
.chat-messages {
  flex: 1; overflow-y: auto; padding: 12px 10px;
  display: flex; flex-direction: column; gap: 10px;
}
.chat-welcome {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px; padding: 20px 10px;
}
.chat-welcome-icon { font-size: 28px; }
.chat-welcome-text { font-size: 12px; color: var(--fg-muted); text-align: center; line-height: 1.6; }

.chat-message.user {
  align-self: flex-end; color: var(--primary); text-align: right;
  font-size: 12px; line-height: 1.65; word-break: break-word; margin-bottom: 6px;
}
.chat-messages { font-size: 12px; line-height: 1.65; color: var(--fg-secondary); word-break: break-word; }
.chat-messages p { margin-bottom: 6px; }
.chat-messages p:last-child { margin-bottom: 0; }
.chat-messages strong { color: var(--fg); }
.chat-messages ul,
.chat-messages ol { padding-left: 16px; margin-bottom: 6px; }
.chat-messages li { margin-bottom: 2px; }
.chat-messages code {
  font-family: var(--font-mono); font-size: 11px; color: var(--accent);
  background: rgba(124,141,184,0.1); padding: 1px 4px; border-radius: 3px;
}
.chat-messages hr { border: none; border-top: 1px solid var(--border); margin: 6px 0; }
.chat-messages h1,
.chat-messages h2,
.chat-messages h3 { font-size: 12px; color: var(--fg); margin-bottom: 5px; }

/* Suggestion bubbles */
.chat-suggestions {
  padding: 6px 10px 5px; display: flex; flex-wrap: wrap; gap: 5px;
  flex-shrink: 0; border-top: 1px solid var(--border-subtle);
}
.chat-suggestion {
  padding: 4px 10px; border-radius: var(--radius-pill); flex-shrink: 0;
  border: 1px solid rgba(67,105,239,0.25); color: var(--accent);
  background: rgba(67,105,239,0.06); cursor: pointer; font-size: 11px;
  white-space: nowrap; transition: background 0.15s, border-color 0.15s;
}
.chat-suggestion:hover { background: rgba(67,105,239,0.14); border-color: rgba(67,105,239,0.5); }

/* Input bar */
.chat-input-bar {
  padding: 8px 10px; position: relative;
  border-top: 1px solid var(--border-subtle); flex-shrink: 0;
}
.chat-input {
  width: 100%; box-sizing: border-box;
  background: var(--surface-1); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 7px 42px 7px 10px; color: var(--fg);
  font-size: 12px; font-family: var(--font-sans); resize: none; max-height: 120px;
  overflow-y: auto; line-height: 1.5; transition: border-color 0.15s;
}
.chat-input:focus { outline: none; border-color: rgba(67,105,239,0.5); }
.chat-input::placeholder { color: var(--fg-muted); }
.chat-send-btn {
  position: absolute; right: 16px; bottom: 14px;
  width: 28px; height: 28px; border-radius: var(--radius-md);
  background: var(--primary); border: none; color: var(--primary-fg);
  cursor: pointer; font-size: 15px; font-weight: 700;
  transition: background 0.15s; display: flex; align-items: center; justify-content: center;
}
.chat-send-btn:hover { background: var(--primary-hover); }

.sidebar-section { display: flex; flex-direction: column; }

/* ===================== Drop Zone ===================== */
.drop-zone {
  position: relative; border: 1.5px dashed var(--border);
  border-radius: var(--radius-md); padding: 14px; text-align: center;
  cursor: pointer; transition: border-color 0.2s, background 0.2s;
}
.drop-zone:hover, .drop-zone.drag-over { border-color: var(--primary); background: rgba(67,105,239,0.05); }
.drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.drop-hint { pointer-events: none; }
.drop-icon { font-size: 22px; margin-bottom: 4px; }
.drop-hint > div { font-size: 12px; color: var(--fg-secondary); line-height: 1.6; }
.drop-sub { font-size: 10px; color: var(--fg-muted); margin-top: 2px; }

/* ===================== History List ===================== */
.history-list {
  flex: 1; overflow-y: auto;
  display: flex; flex-direction: column; gap: 3px;
}
.history-item {
  padding: 8px 10px; border-radius: var(--radius-sm); cursor: pointer;
  border: 1px solid transparent; transition: background 0.15s, border-color 0.15s; flex-shrink: 0;
}
.history-item:hover { background: var(--surface-2); }
.history-item.active { background: var(--surface-2); border-color: rgba(67,105,239,0.4); }
.history-title { font-size: 12px; color: var(--fg-secondary); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.history-meta {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; color: var(--fg-muted); margin-top: 3px;
}
.hi-badge {
  font-size: 9px; font-weight: 600; padding: 1px 5px;
  border-radius: var(--radius-pill); letter-spacing: 0.3px;
}
.hi-type { font-size: 10px; color: var(--fg-muted); }

/* ===================== Content Panel ===================== */
.content-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

.tab-bar {
  display: flex; border-bottom: 1px solid var(--border-subtle);
  background: var(--bg-elevated); padding: 0 16px; flex-shrink: 0;
}
.tab {
  background: none; border: none; color: var(--fg-muted);
  font-size: 12px; font-weight: 500; padding: 10px 14px; cursor: pointer;
  border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s;
}
.tab:hover { color: var(--fg-secondary); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }

.tab-pane { display: none; flex: 1; overflow: hidden; }
.tab-pane.active { display: flex; flex-direction: column; }

/* ===================== 总览 Tab ===================== */
.overview-scroll {
  flex: 1; overflow-y: auto; padding: 20px 24px;
  display: flex; flex-direction: column; gap: 20px;
}
.overview-main { display: flex; gap: 20px; align-items: flex-start; }

.overview-left {
  width: 340px; min-width: 300px; flex-shrink: 0;
  background: var(--surface-1); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden;
}
.phs-chart-wrap { width: 100%; }
.overview-right { flex: 1; display: flex; flex-direction: column; gap: 10px; min-width: 0; }

/* Summary cards */
.summary-cards { display: flex; flex-direction: column; gap: 8px; }
.sum-card {
  background: var(--surface-1); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 10px 13px;
}
.sum-label {
  font-size: 10px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--fg-muted); margin-bottom: 4px;
}
.sum-text { font-size: 12px; color: var(--fg-secondary); line-height: 1.5; }
.sum-conclusion .sum-text { color: var(--fg); }
.sum-bottleneck { border-left: 2px solid var(--warning); }
.sum-bottleneck .sum-text { color: #FFD080; }
.sum-gain { border-left: 2px solid var(--success); }
.sum-gain .sum-text { color: #60EEC0; }

.meta-panel {
  background: var(--surface-1); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 14px 16px;
}
.meta-title {
  font-size: 10px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--fg-muted); margin-bottom: 10px;
}
.meta-grid { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
.meta-row { display: flex; gap: 8px; align-items: baseline; }
.meta-key { font-size: 11px; color: var(--fg-muted); width: 72px; flex-shrink: 0; }
.meta-val { font-size: 12px; color: var(--fg-secondary); flex: 1; word-break: break-all; }
.meta-val code { background: none; font-family: var(--font-mono); color: var(--accent); font-size: 11px; }
.meta-path {
  font-family: var(--font-mono); font-size: 11px; color: var(--accent);
  word-break: break-all; margin-bottom: 10px; line-height: 1.5;
}
.meta-path code { font-family: inherit; color: inherit; background: none; }
.meta-skills-label { font-size: 10px; color: var(--fg-muted); font-weight: 500; margin-bottom: 5px; }
.skills-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
.skill-tag {
  font-size: 10px; background: var(--surface-3); color: var(--accent);
  border: 1px solid rgba(124,141,184,0.2); border-radius: var(--radius-sm); padding: 2px 7px;
  font-family: var(--font-mono);
}
.meta-ok-label { font-size: 10px; color: var(--fg-muted); font-weight: 500; margin-bottom: 5px; }
.ok-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }
.ok-list li {
  font-size: 11px; color: var(--fg-secondary); padding-left: 14px;
  position: relative; line-height: 1.5;
}
.ok-list li::before { content: '✓'; position: absolute; left: 0; color: var(--success); font-size: 10px; top: 1px; }

.disk-llm-badge {
  display: inline-block; padding: 1px 7px; border-radius: 10px;
  font-size: 11px; font-weight: 600; line-height: 1.6;
}
.disk-llm-yes { background: #1a3a2a; color: #3fb950; }
.disk-llm-no  { background: #3a1a1a; color: #f85149; }
.disk-llm-na  { background: #2a2a3a; color: #a371f7; }
.disk-link { color: var(--accent); text-decoration: none; font-size: 11px; }
.disk-link:hover { text-decoration: underline; }
.disk-size { color: var(--fg-primary); font-size: 12px; }

.sub-items-wrap {
  border-top: 1px solid var(--border); overflow: hidden;
}

/* ===================== 问题 Tab ===================== */
.issues-layout {
  flex: 1; display: flex; overflow: hidden;
}
.issues-card-list {
  width: 272px; min-width: 220px; flex-shrink: 0;
  border-right: 1px solid var(--border-subtle);
  overflow-y: auto; padding: 8px;
  display: flex; flex-direction: column; gap: 4px;
  background: var(--surface-1);
}
.issue-detail-pane {
  flex: 1; overflow-y: auto; padding: 16px 20px;
}
.issue-detail-empty {
  display: flex; align-items: center; justify-content: center;
  height: 100%; font-size: 13px; color: var(--fg-muted);
}
.ic-card {
  padding: 10px 12px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--bg-elevated);
  cursor: pointer; transition: background 0.12s, border-color 0.12s;
}
.ic-card:hover { background: var(--surface-2); border-color: var(--border-strong); }
.ic-card.active { border-color: var(--primary); background: rgba(24,99,220,0.06); }
.ic-card-title { font-size: 12px; color: var(--fg); line-height: 1.4; margin-bottom: 12px; }
.ic-card-meta { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
.id-header {
  display: flex; align-items: flex-start; gap: 10px;
  padding-bottom: 14px; margin-bottom: 16px;
  border-bottom: 1px solid var(--border-subtle);
}
.id-title { font-size: 15px; font-weight: 700; color: var(--fg); line-height: 1.4; flex: 1; }

/* Action card */
.action-card {
  background: var(--surface-1); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden; border-left: 3px solid var(--border);
}
.ac-header {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px; cursor: pointer; user-select: none;
  transition: background 0.12s;
}
.ac-header:hover { background: rgba(255,255,255,0.02); }
.ac-priority {
  font-size: 10px; font-weight: 600; padding: 2px 6px;
  border-radius: var(--radius-sm); flex-shrink: 0;
}
.ac-title { flex: 1; font-size: 13px; color: var(--fg); font-weight: 400; min-width: 0; line-height: 1.4; }
.ac-meta { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }
.ac-benefit {
  font-size: 11px; font-weight: 600; color: var(--success);
  background: rgba(4,215,147,0.1); padding: 2px 6px; border-radius: var(--radius-sm);
  cursor: default;
}

/* 全局浮层 tooltip（挂在 body，不受父容器 overflow 裁剪） */
.g-tooltip {
  position: fixed;
  z-index: 9999;
  max-width: 240px;
  background: #2a2a2a;
  color: #e0e0e0;
  font-size: 11px;
  font-weight: 400;
  line-height: 1.5;
  padding: 6px 10px;
  border-radius: 6px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.5);
  pointer-events: none;
  white-space: normal;
  opacity: 0;
  transition: opacity 0.15s;
}
.g-tooltip.visible { opacity: 1; }
.ac-diff {
  font-size: 11px; color: var(--fg-muted);
  background: var(--surface-2); padding: 2px 6px; border-radius: var(--radius-sm);
}
.ac-chevron {
  font-size: 10px; color: var(--fg-muted);
  transition: transform 0.2s; display: inline-block;
}
.action-card.expanded .ac-chevron { transform: rotate(180deg); }

.ac-body { display: none; padding: 12px 14px; border-top: 1px solid var(--border-subtle); }
.action-card.expanded .ac-body { display: block; }

.ac-section-title {
  font-size: 14px; font-weight: 600; color: var(--fg);
  margin-bottom: 6px; margin-top: 16px;
}
.ac-section-title:first-child { margin-top: 0; }
.ac-section-group-title {
  font-size: 16px; font-weight: 700; color: var(--fg);
  margin-top: 24px; margin-bottom: 8px;
  padding-bottom: 6px; border-bottom: 1px solid var(--border);
}
.ac-evidence { font-size: 12px; color: var(--fg-secondary); line-height: 1.6; }
.ac-steps { list-style: decimal; padding-left: 18px; display: flex; flex-direction: column; gap: 3px; }
.ac-steps li { font-size: 12px; color: var(--fg-secondary); line-height: 1.5; }

/* Markdown rendered issue detail */
.ac-md { font-size: 12px; color: var(--fg-secondary); line-height: 1.6; }
.ac-md p { margin: 0 0 4px; }
.ac-md p:last-child { margin-bottom: 0; }
.ac-md ul, .ac-md ol { padding-left: 18px; margin: 2px 0; display: flex; flex-direction: column; gap: 2px; }
.ac-md li { line-height: 1.5; }
.ac-md li > ul, .ac-md li > ol { margin-top: 2px; }
.ac-md code { background: var(--surface-3); padding: 1px 4px; border-radius: 3px; font-family: var(--font-mono, monospace); font-size: 11px; color: var(--fg-primary); }
.ac-md strong { color: var(--fg-primary); font-weight: 600; }
.ac-md em { color: var(--fg-secondary); }
.ac-md a { color: var(--accent); text-decoration: none; }
.ac-md hr { border: none; border-top: 1px solid var(--border-subtle); margin: 6px 0; }

/* ===================== 代码 Tab ===================== */
.code-layout { flex: 1; display: flex; overflow: hidden; }

.code-locations {
  width: 240px; min-width: 200px; flex-shrink: 0;
  border-right: 1px solid var(--border-subtle); overflow-y: auto;
  background: var(--surface-1); padding: 12px 0;
}
.code-loc-title {
  font-size: 10px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.7px; color: var(--fg-muted); padding: 0 14px; margin-bottom: 8px;
}
.code-count {
  font-size: 10px; color: var(--fg-muted); font-weight: normal;
  text-transform: none; letter-spacing: 0; margin-left: 4px;
}
.code-loc-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; cursor: pointer; transition: background 0.12s;
}
.code-loc-item:hover { background: var(--surface-2); }
.code-loc-item.active { background: var(--surface-2); border-right: 2px solid var(--primary); }
.cli-priority {
  font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 3px; flex-shrink: 0;
  color: var(--bg);
}
.cli-label {
  font-size: 11px; color: var(--fg-secondary); flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.code-drop-hint {
  padding: 16px 14px; font-size: 11px; color: var(--fg-muted); line-height: 1.7;
  border-top: 1px solid var(--border-subtle); margin-top: 8px;
}

.code-viewer { flex: 1; overflow: hidden; display: flex; flex-direction: column; background: var(--bg); }

.cv-header {
  padding: 12px 18px; border-bottom: 1px solid var(--border-subtle);
  background: var(--surface-1); display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.cv-priority { font-size: 11px; font-weight: 700; flex-shrink: 0; }
.cv-title { font-size: 13px; color: var(--fg); font-weight: 500; flex: 1; }
.cv-lang {
  font-size: 10px; color: var(--fg-muted); background: var(--surface-2);
  border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1px 6px;
  font-family: var(--font-mono);
}

.cv-diff {
  flex: 1; overflow-y: auto; padding: 16px 18px;
  display: flex; gap: 14px;
}
.cv-diff-side { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }

.cv-diff-label {
  font-size: 10px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.6px; padding: 3px 8px; border-radius: var(--radius-sm); width: fit-content;
  color: var(--fg-muted); background: var(--surface-2);
}
.cv-diff-label.cv-before { background: rgba(255,75,123,0.10); color: #FF8FAB; }
.cv-diff-label.cv-after  { background: rgba(4,215,147,0.10);  color: #04D793; }

pre.cv-code {
  flex: 1; background: var(--surface-1); border: 1px solid var(--border);
  border-radius: var(--radius-sm); overflow: auto;
  margin: 0; padding: 12px 14px;
  font-family: var(--font-mono); font-size: 12px;
  line-height: 1.7; color: var(--fg-secondary); white-space: pre;
}
pre.cv-code code { background: none; padding: 0; color: inherit; font-family: inherit; font-size: inherit; }
pre.cv-code-before { border-left: 3px solid rgba(255,75,123,0.4); }
pre.cv-code-after  { border-left: 3px solid rgba(4,215,147,0.4); }

.cv-footer {
  padding: 7px 18px; border-top: 1px solid var(--border-subtle);
  background: var(--surface-1); font-size: 11px; color: var(--fg-muted); flex-shrink: 0;
}

.cv-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px; color: var(--fg-muted);
}
.cv-empty-icon { font-size: 32px; }
.cv-empty-text { font-size: 12px; }

/* ===================== 文档 Tab ===================== */
.docs-scroll { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; }
.docs-section-title {
  font-size: 10px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.7px; color: var(--fg-muted); margin-bottom: 8px;
}
.docs-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px;
}
.doc-card {
  background: var(--surface-1); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 12px 13px;
  transition: border-color 0.15s, background 0.15s; cursor: default;
}
.doc-card:hover { border-color: var(--border-strong); }
.doc-card.doc-used { border-color: rgba(67,105,239,0.35); background: rgba(67,105,239,0.04); }
.dc-icon { font-size: 18px; margin-bottom: 5px; }
.dc-name {
  font-size: 11px; font-weight: 500; color: var(--fg-secondary);
  font-family: var(--font-mono); margin-bottom: 4px;
}
.dc-name code { background: none; padding: 0; color: inherit; font-family: inherit; font-size: inherit; }
.doc-card.doc-used .dc-name { color: var(--accent); }
.dc-desc { font-size: 11px; color: var(--fg-muted); line-height: 1.5; }

.advisor-status {
  background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius-md);
  padding: 10px 13px; font-size: 12px; color: var(--fg-secondary); line-height: 1.6;
}

.docs-concepts { display: flex; flex-direction: column; gap: 6px; }
.concept-item {
  display: flex; gap: 12px; align-items: baseline;
  padding: 8px 12px; background: var(--surface-1); border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}
.concept-term {
  font-size: 11px; font-weight: 500; color: var(--accent);
  font-family: var(--font-mono); flex-shrink: 0; min-width: 170px;
}
.concept-def { font-size: 12px; color: var(--fg-secondary); line-height: 1.5; }

/* ===================== Report Tab ===================== */
.report-scroll {
  flex: 1; overflow-y: auto; overflow-x: auto; padding: 32px 24px;
  box-sizing: border-box; min-width: 0;
}
.report-md-body {
  max-width: 920px; width: 100%; margin: 0 auto;
  font-size: 13px; color: var(--fg-secondary); line-height: 1.75;
  box-sizing: border-box;
}
.report-md-body h1 {
  font-size: 20px; font-weight: 700; color: var(--fg);
  margin: 0 0 8px; padding-bottom: 10px; border-bottom: 1px solid var(--border-subtle);
}
.report-md-body h2 {
  font-size: 15px; font-weight: 600; color: var(--fg);
  margin: 28px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border-subtle);
}
.report-md-body h3 {
  font-size: 13px; font-weight: 600; color: var(--fg); margin: 18px 0 6px;
}
.report-md-body h4, .report-md-body h5 {
  font-size: 12px; font-weight: 600; color: var(--fg-secondary); margin: 12px 0 4px;
}
.report-md-body p { margin: 0 0 10px; }
.report-md-body ul, .report-md-body ol { padding-left: 20px; margin: 0 0 10px; }
.report-md-body li { margin-bottom: 3px; }
.report-md-body strong { color: var(--fg); font-weight: 600; }
.report-md-body code {
  font-family: var(--font-mono); font-size: 12px; color: var(--accent);
  background: rgba(124,141,184,0.1); padding: 1px 5px; border-radius: 3px;
}
.report-md-body pre {
  background: var(--surface-1); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 12px 14px; margin: 10px 0 14px;
  overflow-x: auto;
}
.report-md-body pre code {
  background: none; padding: 0; color: var(--fg-secondary); font-size: 12px;
}
.report-md-body table {
  width: 100%; border-collapse: collapse; font-size: 12px; margin: 10px 0 16px;
}
.report-md-body th {
  background: var(--surface-1); color: var(--fg); font-weight: 600;
  padding: 7px 10px; text-align: left; border: 1px solid var(--border);
}
.report-md-body td {
  padding: 6px 10px; border: 1px solid var(--border-subtle); color: var(--fg-secondary);
  vertical-align: top;
}
.report-md-body tr:nth-child(even) td { background: rgba(124,141,184,0.04); }
.report-md-body blockquote {
  border-left: 3px solid var(--primary); margin: 0 0 12px;
  padding: 4px 14px; background: rgba(67,105,239,0.04); border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.report-md-body hr {
  border: none; border-top: 1px solid var(--border-subtle); margin: 20px 0;
}
.report-md-status {
  padding: 40px; text-align: center; color: var(--fg-muted); font-size: 12px;
}

/* ===================== Buttons ===================== */
.btn-primary {
  background: var(--primary); color: var(--primary-fg); border: none;
  border-radius: var(--radius-lg); padding: 0 14px; height: 36px; font-size: 11px;
  font-weight: 500; font-family: var(--font-sans); cursor: pointer; transition: background 0.15s;
  letter-spacing: 0.5px;
}
.btn-primary:hover { background: var(--primary-hover); }
.btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

.btn-ghost {
  background: var(--surface-1); color: var(--fg-secondary); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 0 14px; height: 36px; font-size: 11px;
  font-family: var(--font-sans); cursor: pointer; transition: background 0.15s;
}
.btn-ghost:hover { background: var(--surface-3); }

/* ===================== Loading / Spinner ===================== */
.spinner {
  width: 28px; height: 28px; border: 3px solid var(--border);
  border-top-color: var(--primary); border-radius: 50%;
  animation: spin 0.8s linear infinite; display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

/* ===================== Fabricated Content Banner ===================== */
.fabricated-banner {
  background: rgba(255,170,59,0.07);
  border-bottom: 1px solid rgba(255,170,59,0.25);
  color: var(--warning);
  font-size: 11px; padding: 7px 16px;
  display: flex; align-items: center; gap: 6px;
  flex-shrink: 0; letter-spacing: 0.2px;
}

/* ===================== PHS Info Tooltip ===================== */
.phs-header {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 12px 6px 12px;
}
.phs-title {
  font-size: 10px; font-weight: 500; color: var(--fg-muted);
  letter-spacing: 0.6px; text-transform: uppercase;
}

.phs-info-icon {
  position: relative;
  display: inline-flex; align-items: center; justify-content: center;
  width: 16px; height: 16px;
  font-size: 14px; line-height: 1;
  color: var(--fg-muted); cursor: default; user-select: none;
}
.phs-info-icon:hover { color: var(--accent); }

.phs-tooltip {
  display: none;
  position: fixed;
  z-index: 9999;
  width: 420px;
  max-height: 80vh;
  overflow-y: auto;
  background: var(--surface-2);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.7);
}

.ptt-title { font-size: 13px; font-weight: 600; color: var(--fg); margin-bottom: 4px; }
.ptt-subtitle { font-size: 11px; color: var(--fg-muted); line-height: 1.5; margin-bottom: 12px; }
.ptt-section {
  font-size: 10px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--primary); margin: 10px 0 5px;
}
.ptt-formula {
  font-size: 12px; color: var(--fg-secondary); background: var(--surface-3);
  border-radius: var(--radius-sm); padding: 8px 10px;
  font-family: var(--font-mono); line-height: 1.6;
}
.ptt-sub { font-size: 10px; color: var(--fg-muted); line-height: 1.6; margin-top: 4px; }
.ptt-item { font-size: 11px; color: var(--fg-secondary); line-height: 1.7; margin-bottom: 3px; }
.ptt-item b { color: var(--fg); font-weight: 500; }

.ptt-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.ptt-table th {
  background: var(--surface-3); color: var(--fg-muted);
  padding: 5px 8px; text-align: center; border: 1px solid var(--border); font-weight: 500;
}
.ptt-table td { padding: 4px 8px; text-align: center; border: 1px solid var(--border); color: var(--fg-secondary); }
.ptt-table tr:first-child td { font-weight: 500; color: var(--fg); }
.ptt-table td:first-child { text-align: left; }

.ptt-grades { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.ptt-grade {
  padding: 3px 10px; border-radius: var(--radius-sm);
  font-size: 11px; font-weight: 600;
}
.grade-s  { background: rgba(4,215,147,0.13);   color: #04D793; }
.grade-a  { background: rgba(67,105,239,0.13);   color: #7C8DB8; }
.grade-bp { background: rgba(167,139,250,0.13);  color: #A78BFA; }
.grade-b  { background: rgba(255,170,59,0.13);   color: #FFAA3B; }
.grade-c  { background: rgba(255,140,66,0.13);   color: #FF8C42; }
.grade-d  { background: rgba(255,75,123,0.13);   color: #FF4B7B; }

/* ===================== Action Card Swimlane ===================== */
.ac-sl-title {
  margin-top: 16px;
  display: flex; align-items: center; gap: 6px;
}
.ac-sl-title::before {
  content: ''; display: inline-block;
  width: 3px; height: 12px; border-radius: 2px;
  background: var(--primary);
}
.ac-swimlane-wrap {
  margin-top: 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
  background: #111111;
}
.ac-sl-vp {
  scrollbar-width: thin;
  scrollbar-color: var(--surface-4) transparent;
}
.ac-sl-label {
  background: #1B1B1B;
  border-right: 1px solid var(--border-subtle);
}

/* ===================== Swimlane Tooltip ===================== */
.swimlane-tooltip {
  position: fixed;
  z-index: 10000;
  background: var(--surface-3);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-md);
  padding: 0;
  min-width: 220px;
  max-width: 380px;
  font-size: 12px;
  color: var(--fg);
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  pointer-events: none;
  overflow: hidden;
}
.swimlane-tooltip .tt-header {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  background: var(--surface-4);
  border-bottom: 1px solid var(--border);
}
.swimlane-tooltip .tt-core {
  font-size: 11px; font-weight: 600;
  color: var(--fg-secondary);
}
.swimlane-tooltip .tt-op {
  font-size: 11px; font-weight: 700;
  color: var(--fg);
  margin-left: auto;
}
.swimlane-tooltip .tt-body {
  padding: 8px 12px;
  display: flex; flex-direction: column; gap: 4px;
}
.swimlane-tooltip .tt-row {
  display: flex; justify-content: space-between; gap: 12px;
  font-size: 11px; line-height: 1.5;
}
.swimlane-tooltip .tt-row span:first-child { color: var(--fg-muted); flex-shrink: 0; }
.swimlane-tooltip .tt-row span:last-child { color: var(--fg); text-align: right; word-break: break-all; }

/* ── 算子视图 / Timeline 占位符（导入报告无附带数据时） ─────── */
.ac-viz-placeholder {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px; margin-top: 8px;
  border: 1px dashed var(--border); border-radius: var(--radius-md);
  background: var(--surface-1);
}
.ac-vp-icon { font-size: 14px; color: var(--border-strong); flex-shrink: 0; line-height: 1; }
.ac-vp-label { font-size: 11px; color: var(--fg-muted); margin-bottom: 3px; }
.ac-vp-hint { font-size: 10px; color: var(--border-strong); font-family: monospace; letter-spacing: 0.2px; }

/* ── 雷达图 N/A 维度说明 ──────────────────────────────────── */
.sub-na-notes {
  border-top: 1px solid var(--border);
  padding: 10px 14px 12px;
}
.sub-na-header {
  font-size: 10px; color: var(--border-strong);
  text-transform: uppercase; letter-spacing: 0.6px;
  margin-bottom: 7px;
}
.sub-na-row {
  display: flex; align-items: baseline; gap: 8px;
  padding: 3px 0;
  line-height: 1.45;
}
.sub-na-dim {
  flex-shrink: 0; min-width: 28px;
  font-weight: 600; color: var(--fg-muted);
  font-size: 10px;
}
.sub-na-reason { color: #4a4a4a; font-size: 11px; }

/* ===================== Operator Parent-Child Table ===================== */
.ac-op-table { overflow: hidden; }
.op-table-scroll {
  overflow-x: auto; overflow-y: auto;
  max-height: 280px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}
.op-parent-table {
  width: 100%; border-collapse: collapse;
  font-size: 11px; font-family: var(--font-mono);
}
.op-parent-table thead th {
  position: sticky; top: 0; z-index: 1;
  background: var(--surface-3); color: var(--fg-secondary);
  padding: 5px 10px; text-align: left; font-weight: 500;
  border-bottom: 1px solid var(--border); white-space: nowrap;
}
.op-parent-table thead th:not(:first-child) { text-align: right; }
.op-pt-row td {
  padding: 5px 10px; border-bottom: 1px solid var(--border-subtle);
  color: var(--fg); cursor: pointer; white-space: nowrap;
}
.op-pt-row td:not(:first-child) { text-align: right; }
.op-pt-row:hover td { background: var(--surface-2); }
.op-expand-icon { color: var(--fg-muted); margin-right: 6px; font-size: 10px; }

.op-child-table {
  width: 100%; border-collapse: collapse;
  font-size: 10px; font-family: var(--font-mono);
  background: var(--surface-2);
}
.op-child-table thead th {
  background: var(--surface-3); color: var(--fg-muted);
  padding: 4px 10px 4px 24px; text-align: left; font-weight: 400;
  border-bottom: 1px solid var(--border); white-space: nowrap;
}
.op-child-table thead th:not(:first-child) { text-align: right; padding-left: 10px; }
.op-child-table tbody td {
  padding: 3px 10px 3px 24px; border-bottom: 1px solid var(--border-subtle);
  color: var(--fg-secondary);
}
.op-child-table tbody td:not(:first-child) { text-align: right; padding-left: 10px; }
.op-child-table tbody tr:hover td { background: var(--surface-3); }
.op-ct-name, .op-ct-shapes {
  max-width: 200px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
  text-align: left !important;
}
.num { text-align: right; font-variant-numeric: tabular-nums; }

/* Core type badges */
.op-core-badge {
  font-size: 10px; padding: 1px 5px; border-radius: 3px;
  font-family: var(--font-mono); white-space: nowrap;
}
.op-core-ai-vector-core { background: rgba(58,123,255,.15); color: #3A7BFF; }
.op-core-ai-core        { background: rgba(67,105,239,.15); color: #4369EF; }
.op-core-ai-cpu         { background: rgba(255,75,123,.15); color: #FF4B7B; }
.op-core-mix-aic        { background: rgba(255,140,66,.15); color: #FF8C42; }
.op-core-mix-aiv        { background: rgba(46,196,182,.15); color: #2EC4B6; }

/* Problem-row highlighting — mirrors Timeline annotation red marks */
.op-warn-icon { color: #FF4B7B; font-size: 9px; margin-right: 4px; vertical-align: middle; }
.op-pt-row.op-row-problem td { background: rgba(255,75,123,0.05); }
.op-pt-row.op-row-problem:hover td { background: rgba(255,75,123,0.10); }
.op-pt-row.op-row-problem .op-expand-icon { color: #FF4B7B; }
.op-child-table tbody tr.op-row-highlight td {
  background: rgba(255,75,123,0.07);
}
.op-child-table tbody tr.op-row-highlight td.num { color: #FF4B7B; font-weight: 600; }
.op-child-table tbody tr.op-row-highlight td.op-ct-name { color: #FF4B7B; }
.op-child-table tbody tr.op-row-highlight:hover td { background: rgba(255,75,123,0.13); }

/* ===================== Comm View Table ===================== */
.cv-legend {
  display: flex; flex-wrap: wrap; gap: 8px; padding: 6px 10px;
  border-bottom: 1px solid var(--border-subtle);
  font-size: 10px; font-family: var(--font-mono);
}
.cv-leg-item { display: flex; align-items: center; gap: 4px; color: var(--fg-muted); }
.cv-leg-sw { display: inline-block; width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.cv-leg-prob-col { color: #FF4B7B; font-weight: 600; margin-left: auto; }

.cv-comm-table thead th { text-align: right; }
.cv-comm-table thead th:nth-child(1),
.cv-comm-table thead th:nth-child(2) { text-align: left; }
.cv-prob-th { background: rgba(255,75,123,0.06) !important; color: #FF4B7B !important; }
.cv-unit-row th { font-size: 9px !important; padding-top: 2px !important; padding-bottom: 2px !important; }
.cv-comm-table td { text-align: right; white-space: nowrap; }
.cv-comm-table td:nth-child(1),
.cv-comm-table td:nth-child(2) { text-align: left; }

.cv-bw-cell {
  display: inline-block; padding: 2px 6px; border-radius: 4px;
  font-size: 10.5px; font-weight: 600; font-family: var(--font-mono);
  white-space: nowrap;
}
.cv-small-pkt {
  font-size: 8px; padding: 0 3px; border-radius: 2px; margin-left: 3px;
  background: rgba(255,75,123,0.35); color: #FF4B7B; vertical-align: middle;
}
.cv-node-tag {
  display: inline-block; padding: 1px 4px; border-radius: 3px;
  font-size: 9.5px; font-weight: 600; font-family: var(--font-sans); white-space: nowrap;
}
.cv-node-1 { background: rgba(67,105,239,0.20); color: #5A92E6; }
.cv-node-2 { background: rgba(255,170,59,0.18); color: #FFAA3B; }

.cv-group-sep td {
  background: var(--surface-3); padding: 3px 10px;
  font-size: 10px; font-weight: 600; color: var(--fg-muted);
  letter-spacing: 0.04em; text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}
.cv-row-problem td { background: rgba(255,75,123,0.04); }
.cv-row-problem:hover td { background: rgba(255,75,123,0.09) !important; }
.cv-row-mark { border-left: 2px solid #FF4B7B !important; padding-left: 8px !important; }
.cv-summary-row td { background: var(--surface-2); border-top: 1px solid var(--border) !important; }

/* ===================== Free Analysis Table ===================== */
.fa-container { display: flex; flex-direction: column; gap: 10px; padding: 2px 0 8px; }
.fa-rank-section {}
.fa-rank-header {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0 5px; margin-bottom: 3px;
  border-bottom: 1px solid var(--border-subtle);
}
.fa-rank-tag {
  font-size: 11px; font-weight: 600; color: var(--fg);
  background: var(--surface-2); padding: 1px 8px; border-radius: 4px;
  font-family: var(--font-mono);
}
.fa-rank-free  { font-size: 11px; color: var(--fg-secondary); font-family: var(--font-mono); }
.fa-rank-captured { font-size: 10px; color: var(--fg-muted); margin-left: auto; font-family: var(--font-mono); }
.fa-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.fa-table th {

/**
 * parser.js - 泳道图 JSON 数据解析模块
 * 解析 merged_swimlane.json (Chrome Trace Format / Perfetto 格式)
 */

'use strict';

/**
 * 解析泳道图 JSON 数据
 * @param {Object} data - 原始 JSON 对象
 * @returns {Object} 解析结果
 */
function parseTraceJSON(data) {
  if (Array.isArray(data)) {
    return parseCoreTaskJSON(data);
  }

  if (!data || !Array.isArray(data.traceEvents)) {
    throw new Error('无效的泳道图 JSON 格式');
  }

  const events = data.traceEvents;

  // 1. 提取线程名称映射 (M 类型事件)
  const threadMap = buildThreadMap(events);

  // 2. 提取所有执行事件 (X 类型事件)
  const execEvents = events.filter(e => e.ph === 'X');

  // 3. 提取所有关联关系事件 (Flow events: s, t, f)
  const flowEvents = events.filter(e => e.ph === 's' || e.ph === 't' || e.ph === 'f');

  // 4. 提取计数器事件 (C 类型事件, 内存使用等)
  const counterEvents = events.filter(e => e.ph === 'C');

  // 5. 按核心分组执行事件
  const coreEvents = groupEventsByCore(execEvents, threadMap);

  // 6. 计算时间范围
  const timeRange = computeTimeRange(execEvents);

  // 7. 提取操作类型
  execEvents.forEach((event, index) => enrichTraceEvent(event, threadMap, index));

  const operationTypes = extractOperationTypes(execEvents);

  // 8. 计算操作颜色映射
  const colorMap = buildColorMap(operationTypes);

  // 9. 构建任务索引和关系网
  const taskIndex = buildTaskIndex(execEvents);
  const relations = buildRelations(execEvents, flowEvents);

  // 10. 构建任务分组 (按名称第一位数字)
  const groupBands = buildGroupBands(execEvents, timeRange);

  return {
    threadMap,
    execEvents,
    flowEvents,
    counterEvents,
    coreEvents,
    timeRange,
    operationTypes,
    colorMap,
    taskIndex,
    relations,
    groupBands,
    totalEventCount: execEvents.length,
    coreCount: coreEvents.size,
  };
}

function parseCoreTaskJSON(entries) {
  const normalizedEntries = Array.isArray(entries) ? entries : [];
  const threadMap = new Map();
  const coreEvents = new Map();
  const execEvents = [];
  const flowEvents = [];
  const counterEvents = [];
  const relations = new Map();

  let minTs = Infinity;

  normalizedEntries.forEach(entry => {
    (entry?.tasks || []).forEach(task => {
      const ts = Number(task?.execStart);
      if (Number.isFinite(ts)) minTs = Math.min(minTs, ts);
    });
  });

  if (!Number.isFinite(minTs)) minTs = 0;

  normalizedEntries.forEach((entry, laneIndex) => {
    const coreName = String(entry?.coreType || entry?.threadName || `Core_${laneIndex}`);
    const tid = laneIndex;
    threadMap.set(tid, coreName);

    const events = Array.isArray(entry?.tasks)
      ? entry.tasks.map((task, taskIndex) => normalizeCoreTaskEvent(task, coreName, tid, taskIndex, minTs))
      : [];

    events.sort((a, b) => a.ts - b.ts || (a.dur || 0) - (b.dur || 0));
    coreEvents.set(coreName, events);
    execEvents.push(...events);
  });

  const timeRange = computeTimeRange(execEvents);
  const operationTypes = extractOperationTypes(execEvents);
  const colorMap = buildColorMap(operationTypes);
  const taskIndex = buildTaskIndex(execEvents);
  const groupBands = buildGroupBands(execEvents, timeRange);

  return {
    threadMap,
    execEvents,
    flowEvents,
    counterEvents,
    coreEvents,
    timeRange,
    operationTypes,
    colorMap,
    taskIndex,
    relations,
    groupBands,
    totalEventCount: execEvents.length,
    coreCount: coreEvents.size,
  };
}

/**
 * 构建任务索引 (按 taskId 和 name)
 */
function buildTaskIndex(execEvents) {
  const index = {
    byTaskId: new Map(),
    byName: new Map()
  };

  execEvents.forEach(e => {
    const taskId = e.args?.taskId || e.args?.TaskId;
    if (taskId !== undefined) {
      if (!index.byTaskId.has(taskId)) index.byTaskId.set(taskId, []);
      index.byTaskId.get(taskId).push(e);
    }
    
    if (e.name) {
      if (!index.byName.has(e.name)) index.byName.set(e.name, []);
      index.byName.get(e.name).push(e);
    }
  });

  return index;
}

/**
 * 构建任务间的显式关联关系 (解析 Chrome Trace 的 flow events: s 和 f)
 */
function buildRelations(execEvents, flowEvents) {
  // src -> Set of dst
  const relations = new Map();

  // 1. 根据 id 组合 s (start) 和 f (finish) 事件
  const flowMap = new Map(); // id -> { s: event, f: event }
  flowEvents.forEach(e => {
    if (e.id === undefined) return;
    if (!flowMap.has(e.id)) flowMap.set(e.id, {});
    
    if (e.ph === 's') {
      flowMap.get(e.id).s = e;
    } else if (e.ph === 'f') {
      flowMap.get(e.id).f = e;
    }
  });

  // 2. 按 tid 分组 X 事件，以便快速查找
  const xByTid = new Map();
  execEvents.forEach(x => {
    if (!xByTid.has(x.tid)) xByTid.set(x.tid, []);
    xByTid.get(x.tid).push(x);
  });
  
  // 3. 将 flow 事件关联回具体的 X 事件
  flowMap.forEach(flow => {
    const sEvent = flow.s;
    const fEvent = flow.f;
    if (!sEvent || !fEvent) return; // 缺少成对的 s 或 f

    const srcTidEvents = xByTid.get(sEvent.tid);
    const dstTidEvents = xByTid.get(fEvent.tid);
    if (!srcTidEvents || !dstTidEvents) return;

    // 寻找 source X event (结束时间最接近 s.ts)
    let srcX = null;
    let minSrcDist = Infinity;
    for (const x of srcTidEvents) {
      const endTs = x.ts + (x.dur || 0);
      const dist = Math.min(Math.abs(x.ts - sEvent.ts), Math.abs(endTs - sEvent.ts));
      if (dist < minSrcDist) {
        minSrcDist = dist;
        srcX = x;
      }
    }

    // 寻找 destination X event (开始时间最接近 f.ts)
    let dstX = null;
    let minDstDist = Infinity;
    for (const x of dstTidEvents) {
      const dist = Math.abs(x.ts - fEvent.ts);
      if (dist < minDstDist) {
        minDstDist = dist;
        dstX = x;
      }
    }

    // 建立关联
    if (srcX && dstX && minSrcDist < 100 && minDstDist < 100) { // 设置一个合理的最大偏差容忍度
      if (!relations.has(srcX)) relations.set(srcX, new Set());
      relations.get(srcX).add(dstX);
      
      // 同时也建立反向关联，以便点击任意一个都能看到对方
      if (!relations.has(dstX)) relations.set(dstX, new Set());
      relations.get(dstX).add(srcX);
    }
  });

  return relations;
}


/**
 * 构建线程 ID → 核心名称映射
 */
function buildThreadMap(events) {
  const map = new Map();
  events
    .filter(e => e.ph === 'M' && e.name === 'thread_name' && e.args?.name)
    .forEach(e => {
      map.set(e.tid, e.args.name);
    });
  return map;
}

/**
 * 按核心分组执行事件，并排序
 */
function groupEventsByCore(execEvents, threadMap) {
  const coreEvents = new Map();

  execEvents.forEach(event => {
    const coreName = threadMap.get(event.tid) || `Core_${event.tid}`;
    if (!coreEvents.has(coreName)) {
      coreEvents.set(coreName, []);
    }
    coreEvents.get(coreName).push(event);
  });

  // 每个核心内按时间戳排序
  coreEvents.forEach((events, coreName) => {
    events.sort((a, b) => a.ts - b.ts);
  });

  return coreEvents;
}

/**
 * 计算所有事件的时间范围
 */
function computeTimeRange(execEvents) {
  if (execEvents.length === 0) return { start: 0, end: 0, duration: 0 };

  let minTs = Infinity;
  let maxEnd = -Infinity;

  execEvents.forEach(e => {
    const start = e.ts;
    const end = e.ts + (e.dur || 0);
    if (start < minTs) minTs = start;
    if (end > maxEnd) maxEnd = end;
  });

  return {
    start: minTs,
    end: maxEnd,
    duration: maxEnd - minTs,
  };
}

/**
 * 提取所有操作类型 (color 字段)
 */
function extractOperationTypes(execEvents) {
  const types = new Set();
  execEvents.forEach(e => {
    const opType = e.args?.color || extractOpFromName(e.name) || 'unknown';
    types.add(opType);
  });
  return [...types].sort();
}

/**
 * 从 event name 提取操作类型 (备用方法)
 * 格式: "0-3-5-24-3(bn-after-matmul2)"
 */
function extractOpFromName(name) {
  if (!name) return 'unknown';
  const match = name.match(/\(([^)]+)\)$/);
  return match ? match[1] : name;
}

function stripLabelSuffix(rawName, label) {
  if (!rawName || !label) return rawName || '';
  const suffix = `(${label})`;
  return rawName.endsWith(suffix) ? rawName.slice(0, -suffix.length).trim() : rawName;
}

function parseSeqNo(rawName) {
  const stitchMatch = String(rawName || '').match(/\[Stitch\s+(\d+)\]/i);
  if (stitchMatch) return Number(stitchMatch[1]);
  const numericPrefix = String(rawName || '').match(/^(\d+)-/);
  return numericPrefix ? Number(numericPrefix[1]) : null;
}

function normalizeCoreTaskEvent(task, coreName, tid, taskIndex, minTs) {
  const rawName = String(task?.taskName || task?.name || `task_${task?.taskId ?? taskIndex}`);
  const label = String(task?.semanticLabel || task?.label || extractOpFromName(rawName) || 'unknown');
  const start = Number(task?.execStart) || 0;
  const end = Number(task?.execEnd);
  const dur = Number.isFinite(end) ? Math.max(0.001, end - start) : Math.max(0.001, Number(task?.dur) || 0.001);
  const seqNo = parseSeqNo(rawName);

  return {
    pid: 0,
    tid,
    ph: 'X',
    ts: start,
    dur,
    name: rawName,
    label,
    rawName,
    displayName: stripLabelSuffix(rawName, label) || rawName,
    laneKind: coreName.startsWith('AIC') ? 'aic' : (coreName.startsWith('AIV') ? 'aiv' : 'other'),
    seqNo,
    taskId: task?.taskId ?? taskIndex,
    subGraphId: task?.subGraphId ?? null,
    inputRawMagic: Array.isArray(task?.inputRawMagic) ? task.inputRawMagic : [],
    outputRawMagic: Array.isArray(task?.outputRawMagic) ? task.outputRawMagic : [],
    args: {
      taskId: task?.taskId ?? taskIndex,
      color: label,
      subGraphId: task?.subGraphId ?? null,
    },
    relTs: start - minTs,
    relEnd: start - minTs + dur,
  };
}

function enrichTraceEvent(event, threadMap, index) {
  const label = String(event.args?.color || extractOpFromName(event.name) || 'unknown');
  const rawName = String(event.name || `${label}_${index}`);
  const coreName = threadMap.get(event.tid) || `Core_${event.tid}`;
  event.label = event.label || label;
  event.rawName = event.rawName || rawName;
  event.displayName = event.displayName || stripLabelSuffix(rawName, label) || rawName;
  event.laneKind = event.laneKind || (coreName.startsWith('AIC') ? 'aic' : (coreName.startsWith('AIV') ? 'aiv' : 'other'));
  event.seqNo = event.seqNo ?? parseSeqNo(rawName);
  event.taskId = event.taskId ?? (event.args?.taskId || event.args?.TaskId || index);
  event.inputRawMagic = Array.isArray(event.inputRawMagic) ? event.inputRawMagic : [];
  event.outputRawMagic = Array.isArray(event.outputRawMagic) ? event.outputRawMagic : [];
}

/**
 * 构建操作类型 → 颜色映射
 */
function buildColorMap(operationTypes) {
  // 预定义常见操作类型颜色
  const predefined = {
    'matmul': '#4A9EFF',
    'bn-after-matmul2': '#5BC8FF',
    'SoftMax': '#A78BFA',
    'softmax': '#A78BFA',
    'LayerNorm': '#34D399',
    'layernorm': '#34D399',
    'Add': '#FCD34D',
    'add': '#FCD34D',
    'Mul': '#F97316',
    'mul': '#F97316',
    'Cast': '#94A3B8',
    'cast': '#94A3B8',
    'Relu': '#FB7185',
    'relu': '#FB7185',
    'Transpose': '#22D3EE',
    'transpose': '#22D3EE',
    'Reshape': '#A3E635',
    'reshape': '#A3E635',
    'Gather': '#E879F9',
    'gather': '#E879F9',
  };

  const colorPalette = [
    '#4A9EFF', '#5BC8FF', '#A78BFA', '#34D399', '#FCD34D',
    '#F97316', '#FB7185', '#22D3EE', '#A3E635', '#E879F9',
    '#60A5FA', '#F472B6', '#4ADE80', '#FACC15', '#38BDF8',
    '#FB923C', '#C084FC', '#86EFAC', '#FDE68A', '#67E8F9',
  ];

  const colorMap = {};
  let paletteIndex = 0;

  operationTypes.forEach(opType => {
    if (predefined[opType]) {
      colorMap[opType] = predefined[opType];
    } else {
      colorMap[opType] = colorPalette[paletteIndex % colorPalette.length];
      paletteIndex++;
    }
  });

  colorMap['unknown'] = '#64748B';
  return colorMap;
}

/**
 * 获取事件的操作类型
 */
function getEventOpType(event) {
  return event.args?.color || extractOpFromName(event.name) || 'unknown';
}

/**
 * 解析 execution-hint 字段中的时间信息
 */
function parseExecutionHint(hint) {
  if (!hint) return null;
  const result = {};
  const avgMatch = hint.match(/Average Execution Time:\s*([\d.]+)/);
  const maxMatch = hint.match(/Max Execution Time:\s*([\d.]+)/);
  const minMatch = hint.match(/Min Execution Time:\s*([\d.]+)/);
  if (avgMatch) result.avg = parseFloat(avgMatch[1]);
  if (maxMatch) result.max = parseFloat(maxMatch[1]);
  if (minMatch) result.min = parseFloat(minMatch[1]);
  return result;
}

/**
 * 获取核心类型 (AIC / AIV / OTHER)
 */
function getCoreType(coreName) {
  if (coreName.startsWith('AIC')) return 'AIC';
  if (coreName.startsWith('AIV')) return 'AIV';
  return 'OTHER';
}

/**
 * 从任务名称中提取分组 ID（第一个数字段）
 * 例: "0-0-0-1-1(bn-after-matmul2)" → "0"
 *     "3-5-24-3(matmul)"            → "3"
 */
function extractGroupId(name) {
  if (!name) return null;
  const m = name.match(/^(\d+)/);
  return m ? m[1] : null;
}

/**
 * 构建任务分组区间数组，按名称第一位数字分组，计算每组的时间跨度
 * 返回 [{id, start, end, count}] (start/end 为相对于 timeRange.start 的偏移量，单位 μs)
 */
function buildGroupBands(execEvents, timeRange) {
  const groups = new Map(); // id -> {id, start, end, count}

  execEvents.forEach(e => {
    const gid = extractGroupId(e.name);
    if (gid === null) return;

    const relStart = e.ts - timeRange.start;
    const relEnd   = relStart + (e.dur || 0);

    if (!groups.has(gid)) {
      groups.set(gid, { id: gid, start: relStart, end: relEnd, count: 0 });
    }
    const g = groups.get(gid);
    if (relStart < g.start) g.start = relStart;
    if (relEnd   > g.end)   g.end   = relEnd;
    g.count++;
  });

  // 按开始时间排序
  return [...groups.values()].sort((a, b) => a.start - b.start);
}

/**
 * 对核心进行排序: AIC 在前，AIV 在后，按编号排序
 */
function sortCoreNames(coreNames) {
  return [...coreNames].sort((a, b) => {
    const typeA = getCoreType(a);
    const typeB = getCoreType(b);
    if (typeA !== typeB) {
      if (typeA === 'AIC') return -1;
      if (typeB === 'AIC') return 1;
      if (typeA === 'AIV') return -1;
      if (typeB === 'AIV') return 1;
    }
    // 同类型按编号排序
    const numA = parseInt(a.replace(/[^0-9]/g, '')) || 0;
    const numB = parseInt(b.replace(/[^0-9]/g, '')) || 0;
    return numA - numB;
  });
}

  <script>
/**
 * analyzer.js - 算子性能分析模块
 * 从泳道图数据中提取性能指标并识别瓶颈
 */

'use strict';

/**
 * 主分析入口
 * @param {Object} parsedData - parser.js 返回的解析数据
 * @returns {Object} 分析结果
 */
function analyzePerformance(parsedData) {
  const { coreEvents, timeRange, colorMap } = parsedData;

  // 1. 计算每个核心的性能指标
  const coreMetrics = computeCoreMetrics(coreEvents, timeRange);

  // 2. 计算汇总指标
  const summaryMetrics = computeSummaryMetrics(coreMetrics, timeRange);

  // 3. 分析操作类型分布
  const opDistribution = analyzeOperationDistribution(parsedData.execEvents);

  // 4. 检测性能瓶颈
  const bottlenecks = detectBottlenecks(coreMetrics, summaryMetrics, opDistribution);

  // 5. 生成优化建议
  const recommendations = generateRecommendations(bottlenecks, summaryMetrics);

  // 6. 计算综合评分
  const rating = computeOverallRating(summaryMetrics);

  return {
    coreMetrics,
    summaryMetrics,
    opDistribution,
    bottlenecks,
    recommendations,
    rating,
  };
}

/**
 * 计算每个核心的性能指标
 */
function computeCoreMetrics(coreEvents, globalTimeRange) {
  const metrics = new Map();

  coreEvents.forEach((events, coreName) => {
    if (events.length === 0) return;

    // 时间范围 (使用全局起止时间)
    const spanStart = globalTimeRange.start;
    const spanEnd = globalTimeRange.end;
    const totalSpan = spanEnd - spanStart;

    // 活跃时间 (任务持续时间总和)
    let totalActiveTime = 0;
    events.forEach(e => { totalActiveTime += (e.dur || 0); });

    // 空闲时间 (总跨度 - 活跃时间)
    const idleTime = Math.max(0, totalSpan - totalActiveTime);

    // 核心利用率
    const utilization = totalSpan > 0 ? (totalActiveTime / totalSpan) * 100 : 0;

    // 计算 gap (任务间的空隙, 即气泡)
    const gaps = computeGaps(events);
    const totalGapTime = gaps.reduce((sum, g) => sum + g.duration, 0);
    const bubbleRate = totalActiveTime + totalGapTime > 0
      ? (totalGapTime / (totalActiveTime + totalGapTime)) * 100
      : 0;

    // 任务持续时间统计
    const durations = events.map(e => e.dur || 0);
    const avgDuration = durations.length > 0
      ? durations.reduce((a, b) => a + b, 0) / durations.length : 0;
    const maxDuration = Math.max(...durations);
    const minDuration = Math.min(...durations);
    const stdDuration = computeStdDev(durations);

    // 操作类型分布
    const opBreakdown = {};
    events.forEach(e => {
      const op = getEventOpType(e);
      if (!opBreakdown[op]) opBreakdown[op] = { count: 0, totalDuration: 0 };
      opBreakdown[op].count++;
      opBreakdown[op].totalDuration += (e.dur || 0);
    });

    // 核心类型
    const coreType = getCoreType(coreName);

    metrics.set(coreName, {
      coreName,
      coreType,
      taskCount: events.length,
      totalSpan,
      totalActiveTime,
      idleTime,
      utilization,
      totalGapTime,
      bubbleRate,
      gaps,
      avgDuration,
      maxDuration,
      minDuration,
      stdDuration,
      opBreakdown,
      events, // 保留原始事件引用
    });
  });

  return metrics;
}

/**
 * 计算任务间的 gap (空隙)
 */
function computeGaps(events) {
  if (events.length < 2) return [];
  const gaps = [];
  for (let i = 0; i < events.length - 1; i++) {
    const end = events[i].ts + (events[i].dur || 0);
    const nextStart = events[i + 1].ts;
    const gapDur = nextStart - end;
    if (gapDur > 0.01) { // 忽略极小的浮点误差
      gaps.push({
        start: end,
        end: nextStart,
        duration: gapDur,
        afterEventIndex: i,
      });
    }
  }
  return gaps;
}

/**
 * 计算汇总性能指标
 */
function computeSummaryMetrics(coreMetrics, timeRange) {
  const aicMetrics = [];
  const aivMetrics = [];

  coreMetrics.forEach(m => {
    if (m.coreType === 'AIC') aicMetrics.push(m);
    else if (m.coreType === 'AIV') aivMetrics.push(m);
  });

  const allMetrics = [...aicMetrics, ...aivMetrics];

  // 平均核心利用率
  const avgUtilization = allMetrics.length > 0
    ? allMetrics.reduce((s, m) => s + m.utilization, 0) / allMetrics.length : 0;
  const avgAicUtilization = aicMetrics.length > 0
    ? aicMetrics.reduce((s, m) => s + m.utilization, 0) / aicMetrics.length : 0;
  const avgAivUtilization = aivMetrics.length > 0
    ? aivMetrics.reduce((s, m) => s + m.utilization, 0) / aivMetrics.length : 0;

  // 平均气泡率
  const avgBubbleRate = allMetrics.length > 0
    ? allMetrics.reduce((s, m) => s + m.bubbleRate, 0) / allMetrics.length : 0;
  const avgAicBubbleRate = aicMetrics.length > 0
    ? aicMetrics.reduce((s, m) => s + m.bubbleRate, 0) / aicMetrics.length : 0;
  const avgAivBubbleRate = aivMetrics.length > 0
    ? aivMetrics.reduce((s, m) => s + m.bubbleRate, 0) / aivMetrics.length : 0;

  // AIC 负载均衡 (基于活跃时间的变异系数)
  const aicActiveTimes = aicMetrics.map(m => m.totalActiveTime);
  const aicLoadBalance = computeLoadBalance(aicActiveTimes);

  // AIV 负载均衡
  const aivActiveTimes = aivMetrics.map(m => m.totalActiveTime);
  const aivLoadBalance = computeLoadBalance(aivActiveTimes);

  // 总体负载均衡
  const allActiveTimes = allMetrics.map(m => m.totalActiveTime);
  const overallLoadBalance = computeLoadBalance(allActiveTimes);

  // 总执行时间
  const totalExecutionTime = timeRange.duration;

  // 最大/最小利用率
  const maxUtilization = allMetrics.length > 0 ? Math.max(...allMetrics.map(m => m.utilization)) : 0;
  const minUtilization = allMetrics.length > 0 ? Math.min(...allMetrics.map(m => m.utilization)) : 0;

  // 核心数量
  const aicCount = aicMetrics.length;
  const aivCount = aivMetrics.length;

  // 总任务数
  const totalTasks = allMetrics.reduce((s, m) => s + m.taskCount, 0);

  return {
    avgUtilization,
    avgAicUtilization,
    avgAivUtilization,
    avgBubbleRate,
    avgAicBubbleRate,
    avgAivBubbleRate,
    aicLoadBalance,
    aivLoadBalance,
    overallLoadBalance,
    totalExecutionTime,
    maxUtilization,
    minUtilization,
    aicCount,
    aivCount,
    totalTasks,
    aicMetrics,
    aivMetrics,
    allMetrics,
  };
}

/**
 * 计算负载均衡度 (100% = 完美均衡, 0% = 严重不均衡)
 * 基于变异系数 (CV = std_dev / mean)
 */
function computeLoadBalance(values) {
  if (values.length <= 1) return 100;
  const mean = values.reduce((a, b) => a + b, 0) / values.length;
  if (mean <= 0) return 0;
  const stdDev = computeStdDev(values);
  const cv = stdDev / mean;
  return Math.max(0, Math.min(100, (1 - cv) * 100));
}

/**
 * 计算标准差
 */
function computeStdDev(values) {
  if (values.length === 0) return 0;
  const mean = values.reduce((a, b) => a + b, 0) / values.length;
  const variance = values.reduce((sum, v) => sum + Math.pow(v - mean, 2), 0) / values.length;
  return Math.sqrt(variance);
}

/**
 * 分析操作类型分布
 */
function analyzeOperationDistribution(execEvents) {
  const opStats = {};

  execEvents.forEach(e => {
    const op = getEventOpType(e);
    if (!opStats[op]) {
      opStats[op] = { count: 0, totalDuration: 0, minDuration: Infinity, maxDuration: -Infinity };
    }
    opStats[op].count++;
    opStats[op].totalDuration += (e.dur || 0);
    opStats[op].minDuration = Math.min(opStats[op].minDuration, e.dur || 0);
    opStats[op].maxDuration = Math.max(opStats[op].maxDuration, e.dur || 0);
  });

  // 计算百分比并排序
  const totalDuration = Object.values(opStats).reduce((s, v) => s + v.totalDuration, 0);
  const sorted = Object.entries(opStats)
    .map(([op, stats]) => ({
      op,
      ...stats,
      percentage: totalDuration > 0 ? (stats.totalDuration / totalDuration) * 100 : 0,
      avgDuration: stats.count > 0 ? stats.totalDuration / stats.count : 0,
    }))
    .sort((a, b) => b.totalDuration - a.totalDuration);

  return { opStats: sorted, totalDuration };
}

/**
 * 检测性能瓶颈
 */
function detectBottlenecks(coreMetrics, summaryMetrics, opDistribution) {
  const bottlenecks = [];

  // 瓶颈 1: 核心利用率低
  if (summaryMetrics.avgUtilization < 50) {
    const worstCores = summaryMetrics.allMetrics
      .filter(m => m.utilization < 50)
      .sort((a, b) => a.utilization - b.utilization)
      .slice(0, 5);
    bottlenecks.push({
      id: 'low_utilization',
      type: '核心利用率低',
      severity: 'critical',
      severityLabel: '严重',
      value: summaryMetrics.avgUtilization,
      unit: '%',
      description: `平均核心利用率仅为 ${summaryMetrics.avgUtilization.toFixed(1)}%，核心大量时间处于空闲状态`,
      detail: `AIC 平均: ${summaryMetrics.avgAicUtilization.toFixed(1)}%，AIV 平均: ${summaryMetrics.avgAivUtilization.toFixed(1)}%`,
      affectedCores: worstCores.map(m => m.coreName),
      rootCause: [
        '任务粒度过小，调度开销占比高',
        '任务间依赖关系导致长时间等待',
        '内存访问不连续，导致 cache miss 频繁',
        'Tilesize 设置不合理，算术强度低',
      ],
      impact: '严重影响算子吞吐量，核心算力未得到充分利用',
      threshold: 50,
    });
  } else if (summaryMetrics.avgUtilization < 70) {
    bottlenecks.push({
      id: 'moderate_utilization',
      type: '核心利用率偏低',
      severity: 'warning',
      severityLabel: '警告',
      value: summaryMetrics.avgUtilization,
      unit: '%',
      description: `平均核心利用率为 ${summaryMetrics.avgUtilization.toFixed(1)}%，仍有较大优化空间`,
      detail: `AIC 平均: ${summaryMetrics.avgAicUtilization.toFixed(1)}%，AIV 平均: ${summaryMetrics.avgAivUtilization.toFixed(1)}%`,
      affectedCores: summaryMetrics.allMetrics
        .filter(m => m.utilization < 70)
        .sort((a, b) => a.utilization - b.utilization)
        .slice(0, 5)
        .map(m => m.coreName),
      rootCause: [
        '任务调度策略待优化',
        '等待前驱任务完成时间较长',
        '内存访问模式有优化空间',
      ],
      impact: '影响算子性能，存在优化空间',
      threshold: 70,
    });
  }

  // 瓶颈 2: 气泡率高
  if (summaryMetrics.avgBubbleRate > 20) {
    const worstCores = summaryMetrics.allMetrics
      .filter(m => m.bubbleRate > 20)
      .sort((a, b) => b.bubbleRate - a.bubbleRate)
      .slice(0, 5);
    bottlenecks.push({
      id: 'high_bubble_rate',
      type: '调度气泡率高',
      severity: 'critical',
      severityLabel: '严重',
      value: summaryMetrics.avgBubbleRate,
      unit: '%',
      description: `平均气泡率为 ${summaryMetrics.avgBubbleRate.toFixed(1)}%，任务间存在大量调度等待`,
      detail: `AIC 气泡率: ${summaryMetrics.avgAicBubbleRate.toFixed(1)}%，AIV 气泡率: ${summaryMetrics.avgAivBubbleRate.toFixed(1)}%`,
      affectedCores: worstCores.map(m => m.coreName),
      rootCause: [
        '任务粒度过小，调度开销与执行时间比值高',
        'stitch 参数设置过小，任务合并不足',
        '循环展开因子不合适，产生大量小任务',
      ],
      impact: '严重浪费核心算力，任务调度开销超过实际计算时间',
      threshold: 20,
    });
  } else if (summaryMetrics.avgBubbleRate > 10) {
    bottlenecks.push({
      id: 'moderate_bubble_rate',
      type: '调度气泡率偏高',
      severity: 'warning',
      severityLabel: '警告',
      value: summaryMetrics.avgBubbleRate,
      unit: '%',
      description: `平均气泡率为 ${summaryMetrics.avgBubbleRate.toFixed(1)}%，存在一定调度等待`,
      detail: `AIC 气泡率: ${summaryMetrics.avgAicBubbleRate.toFixed(1)}%，AIV 气泡率: ${summaryMetrics.avgAivBubbleRate.toFixed(1)}%`,
      affectedCores: summaryMetrics.allMetrics
        .filter(m => m.bubbleRate > 10)
        .sort((a, b) => b.bubbleRate - a.bubbleRate)
        .slice(0, 5)
        .map(m => m.coreName),
      rootCause: ['调度策略有优化空间', '任务粒度可适当增大'],
      impact: '影响算子性能，有优化潜力',
      threshold: 10,
    });
  }

  // 瓶颈 3: 负载不均衡
  const minBalance = Math.min(summaryMetrics.aicLoadBalance, summaryMetrics.aivLoadBalance);
  if (summaryMetrics.aicCount > 1 && summaryMetrics.aicLoadBalance < 70) {
    const aicTimes = summaryMetrics.aicMetrics.map(m => m.totalActiveTime);
    const maxTime = Math.max(...aicTimes);
    const minTime = Math.min(...aicTimes);
    const maxCore = summaryMetrics.aicMetrics.find(m => m.totalActiveTime === maxTime);
    const minCore = summaryMetrics.aicMetrics.find(m => m.totalActiveTime === minTime);
    bottlenecks.push({
      id: 'aic_imbalance',
      type: 'AIC 核心负载不均衡',
      severity: summaryMetrics.aicLoadBalance < 50 ? 'critical' : 'warning',
      severityLabel: summaryMetrics.aicLoadBalance < 50 ? '严重' : '警告',
      value: summaryMetrics.aicLoadBalance,
      unit: '%',
      description: `AIC 核心负载均衡度仅 ${summaryMetrics.aicLoadBalance.toFixed(1)}%，核心间工作量差异显著`,
      detail: `最忙: ${maxCore?.coreName} (${maxTime.toFixed(1)}μs), 最闲: ${minCore?.coreName} (${minTime.toFixed(1)}μs), 差值: ${(maxTime - minTime).toFixed(1)}μs`,
      affectedCores: summaryMetrics.aicMetrics
        .sort((a, b) => b.totalActiveTime - a.totalActiveTime)
        .slice(0, 3)
        .map(m => m.coreName),
      rootCause: [
        '任务分配策略不均，部分核心分配更多计算',
        'Tile 切分不均匀，导致工作量差异',
        '动态 shape 下边界 tile 处理时间更长',
      ],
      impact: '最快核心等待最慢核心，整体性能受限于负载最重的核心',
      threshold: 70,
    });
  }

  if (summaryMetrics.aivCount > 1 && summaryMetrics.aivLoadBalance < 70) {
    const aivTimes = summaryMetrics.aivMetrics.map(m => m.totalActiveTime);
    const maxTime = Math.max(...aivTimes);
    const minTime = Math.min(...aivTimes);
    const maxCore = summaryMetrics.aivMetrics.find(m => m.totalActiveTime === maxTime);
    const minCore = summaryMetrics.aivMetrics.find(m => m.totalActiveTime === minTime);
    bottlenecks.push({
      id: 'aiv_imbalance',
      type: 'AIV 核心负载不均衡',
      severity: summaryMetrics.aivLoadBalance < 50 ? 'critical' : 'warning',
      severityLabel: summaryMetrics.aivLoadBalance < 50 ? '严重' : '警告',
      value: summaryMetrics.aivLoadBalance,
      unit: '%',
      description: `AIV 核心负载均衡度仅 ${summaryMetrics.aivLoadBalance.toFixed(1)}%，向量核心工作量分布不均`,
      detail: `最忙: ${maxCore?.coreName} (${maxTime.toFixed(1)}μs), 最闲: ${minCore?.coreName} (${minTime.toFixed(1)}μs)`,
      affectedCores: summaryMetrics.aivMetrics
        .sort((a, b) => b.totalActiveTime - a.totalActiveTime)
        .slice(0, 3)
        .map(m => m.coreName),
      rootCause: [
        'Vector tile 切分不均',
        '动态轴处理导致部分核心工作量更多',
        '内存对齐问题影响某些核心的效率',
      ],
      impact: 'AIV 核心整体效率降低，部分核心空闲等待',
      threshold: 70,
    });
  }

  // 瓶颈 4: AIC/AIV 计算不平衡
  if (summaryMetrics.aicCount > 0 && summaryMetrics.aivCount > 0) {
    const aicAvgUtil = summaryMetrics.avgAicUtilization;
    const aivAvgUtil = summaryMetrics.avgAivUtilization;
    const imbalanceRatio = Math.abs(aicAvgUtil - aivAvgUtil);
    if (imbalanceRatio > 25) {
      const dominant = aicAvgUtil > aivAvgUtil ? 'AIC (Cube)' : 'AIV (Vector)';
      const idle = aicAvgUtil > aivAvgUtil ? 'AIV (Vector)' : 'AIC (Cube)';
      bottlenecks.push({
        id: 'aic_aiv_imbalance',
        type: 'Cube/Vector 计算不平衡',
        severity: 'warning',
        severityLabel: '警告',
        value: imbalanceRatio,
        unit: '%',
        description: `${dominant} 核心利用率 (${Math.max(aicAvgUtil, aivAvgUtil).toFixed(1)}%) 显著高于 ${idle} (${Math.min(aicAvgUtil, aivAvgUtil).toFixed(1)}%)`,
        detail: `AIC 利用率: ${aicAvgUtil.toFixed(1)}%，AIV 利用率: ${aivAvgUtil.toFixed(1)}%`,
        affectedCores: [],
        rootCause: [
          `算法计算主要集中在 ${dominant} 核心，导致另一类型核心空闲等待`,
          '算子计算结构偏向某种计算类型 (矩阵乘 vs 逐元素)',
          '任务调度未充分利用所有类型核心',
        ],
        impact: `${idle} 核心未被充分利用，硬件资源浪费`,
        threshold: 25,
      });
    }
  }

  // 瓶颈 5: 任务时间差异过大 (长尾任务)
  summaryMetrics.allMetrics.forEach(m => {
    if (m.taskCount > 5) {
      const cv = m.stdDuration / m.avgDuration;
      if (cv > 0.5 && m.maxDuration > m.avgDuration * 3) {
        bottlenecks.push({
          id: `long_tail_${m.coreName}`,
          type: `长尾任务 (${m.coreName})`,
          severity: 'info',
          severityLabel: '提示',
          value: m.maxDuration,
          unit: 'μs',
          description: `${m.coreName} 存在长尾任务，最长任务 ${m.maxDuration.toFixed(2)}μs，平均 ${m.avgDuration.toFixed(2)}μs，差异 ${cv.toFixed(1)}x`,
          detail: `变异系数: ${(cv * 100).toFixed(1)}%，最大/最小比: ${(m.maxDuration / m.minDuration).toFixed(1)}x`,
          affectedCores: [m.coreName],
          rootCause: [
            '边界 tile 大小与内部 tile 不一致',
            '内存访问模式在某些迭代中效率更低',
          ],
          impact: '少量长耗时任务影响整体执行时间',
          threshold: null,
        });
      }
    }
  });

  // 按严重程度排序
  const severityOrder = { critical: 0, warning: 1, info: 2 };
  bottlenecks.sort((a, b) => (severityOrder[a.severity] || 99) - (severityOrder[b.severity] || 99));

  return bottlenecks;
}

/**
 * 计算综合性能评分
 */
function computeOverallRating(summaryMetrics) {
  // 各指标评分 (0-100)
  const utilizationScore = Math.min(100, summaryMetrics.avgUtilization);
  const bubbleScore = Math.max(0, 100 - summaryMetrics.avgBubbleRate * 3);
  const balanceScore = summaryMetrics.overallLoadBalance;

  // 加权平均
  const overallScore = utilizationScore * 0.4 + bubbleScore * 0.35 + balanceScore * 0.25;

  let stars, label, color;
  if (overallScore >= 90) {
    stars = 5; label = '优秀'; color = '#10B981';
  } else if (overallScore >= 75) {
    stars = 4; label = '良好'; color = '#3B82F6';
  } else if (overallScore >= 55) {
    stars = 3; label = '一般'; color = '#F59E0B';
  } else if (overallScore >= 35) {
    stars = 2; label = '较差'; color = '#EF4444';
  } else {
    stars = 1; label = '很差'; color = '#7F1D1D';
  }

  return {
    stars,
    label,
    color,
    score: overallScore,
    breakdown: {

function stableHash(input) {
  let hash = 2166136261;
  const value = String(input || '');
  for (let i = 0; i < value.length; i += 1) {

class SwimlaneRenderer {
  constructor(container, labelContainer) {

  // ─── 初始化 ───────────────────────────────────────────────────

  _bindEvents() {

  // ─── 数据加载 ─────────────────────────────────────────────────
  loadData(parsedData, analysisResult) {

    this.sortedCores = sortCoreNames([...parsedData.coreEvents.keys()])
      .filter(n => !n.startsWith('Fake'));

      b.affectedCores?.forEach(c => this.bottleneckCores.add(c))

    this._initView();
    this._resize();
