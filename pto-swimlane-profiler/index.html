<script>
/* ============================================================
   4. 旧版随机模型生成器（仅保留为历史参考，运行时不调用）

   剧本: 一个 transformer 解码层跑 3 次迭代 (L0/L1/L2)。
   解码层被切成 8 个 mix 子图, 静态绑定到 32 个 1C2V wrap
   (每子图 4 个 wrap; 每个 wrap = 1 AIC + 2 AIV)。

   植入瓶颈:
     - 子图 g1 "Attention Score" 是全局瓶颈。
     - 根因在 g1 的 Wrap 07: 该 wrap 的 AIC 跑了一个超大 BMM
       (K 维未切分), 单 task 耗时 ~2.5x 正常值。
     - Wrap 07 的两个 AIV 算完一小段后, 长时间等待该 AIC 的 SyncSet。
     - g1 其余 wrap (04/05/07) 的 AIC 早早算完, AIV 也早完 -> 出现明显空转,
       形成"负载不均": 一个 wrap 拖慢整个子图。
   ============================================================ */
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

const SCENARIO = {
  bottleneckGroup: 1,   // Attention Score
  slowWrap: 6,          // 全局 wrap 编号 (g1 的本地 k=2)
};

const TASK_COLORMAP = window.PtoSwimlaneTaskPattern.createTaskColormap({
  labelColors: {
    QKV: '#3F7DF6',
    AttnQK: '#9B6BF0',
    AttnV: '#1FB6C9',
    'FFN-Up': '#EF8A3C',
    'FFN-Dn': '#86C541',
    Resid: '#E25A92',
    OutProj: '#6FAE9A',
    'KV-Upd': '#C9A24B',
  },
  laneKindColors: {
    host: '#7C8DB8',
    memory: '#7C8DB8',
    cpu: '#7C8DB8',
    aic: '#5A92E6',
    aiv: '#9B6BF0',
    mte: '#EAB308',
    other: '#7C8DB8',
  },
});

function buildModel() {
  const rand = mulberry32(0x5117A2);
  const rnd = (a, b) => a + rand() * (b - a);
  const rndi = (a, b) => Math.floor(a + rand() * (b - a + 1));
  const pick = (arr) => arr[Math.floor(rand() * arr.length)];

  /* 8 个 mix 子图 (颜色属 data-viz exempt) */
  const groups = [
    { id: 0, name: 'QKV Projection',     short: 'QKV',     cScale: 1.00, wChar: 0.20 },
    { id: 1, name: 'Attention Score',    short: 'AttnQK',  cScale: 1.08, wChar: 0.30 },
    { id: 2, name: 'Attention Context',  short: 'AttnV',   cScale: 1.00, wChar: 0.22 },
    { id: 3, name: 'FFN Up · GeLU',      short: 'FFN-Up',  cScale: 1.06, wChar: 0.18 },
    { id: 4, name: 'FFN Down',           short: 'FFN-Dn',  cScale: 1.04, wChar: 0.24 },
    { id: 5, name: 'Residual · RMSNorm', short: 'Resid',   cScale: 0.72, wChar: 0.12 },
    { id: 6, name: 'Output Projection',  short: 'OutProj', cScale: 0.86, wChar: 0.18 },
    { id: 7, name: 'KV Cache Update',    short: 'KV-Upd',  cScale: 0.78, wChar: 0.16 },
  ].map((group) => ({
    ...group,
    color: TASK_COLORMAP.colorForTask({ colorKey: group.short }, 'semantic'),
  }));

  /* Host + A5: 4 AI CPU + 32 AIC + 64 AIV (显示顺序见 buildOrder) */
  const cores = [];
  cores.push({ key: 'host_cpu', label: 'Host CPU', kind: 'host', section: 'Host', laneGroup: 'host' });
  cores.push({ key: 'host_memory', label: 'Memory', kind: 'memory', section: 'Host', laneGroup: 'host' });
  cores.push({ key: 'cpu_ctrl', label: 'AI CPU 控制', kind: 'cpu', section: 'AI CPU', laneGroup: 'ai_cpu' });
  for (let i = 1; i <= 3; i++) {
    cores.push({ key: 'cpu_sched_' + i, label: 'AI CPU 调度 ' + i, kind: 'cpu', section: 'AI CPU', laneGroup: 'ai_cpu' });
  }
  for (let die = 1; die <= 2; die++) {
    for (let core = 1; core <= 16; core++) {
      const wrap = (die - 1) * 16 + (core - 1);
      cores.push({
        key: 'aic_' + wrap,
        label: `Core_${core}_AIC`,
        kind: 'aic',
        section: 'AIC',
        laneGroup: 'die' + die,
        die,
        core,
        group: Math.floor(wrap / 4),
        wrap,
      });
    }
    for (let core = 1; core <= 16; core++) {
      const wrap = (die - 1) * 16 + (core - 1);
      for (let vec = 0; vec < 2; vec++) {
        cores.push({
          key: 'aiv_' + (2 * wrap + vec),
          label: `Core_${core}_AIV_${vec}`,
          kind: 'aiv',
          section: 'AIV',
          laneGroup: 'die' + die,
          die,
          core,
          vector: vec,
          group: Math.floor(wrap / 4),
          wrap,
        });
      }
    }
  }
  cores.forEach((c, i) => { c.idx = i; });
  const idxOf = {};
  cores.forEach((c) => { idxOf[c.key] = c.idx; });
  const aicIdxOfWrap = (w) => idxOf['aic_' + w];
  const aivIdxOfWrap = (w) => [idxOf['aiv_' + (2 * w)], idxOf['aiv_' + (2 * w + 1)]];

  const AIC_OPS = ['MatMul Tile', 'BMM K-split', 'MatMul Accum', 'GEMM Pack'];
  const AIC_SLOW_OP = 'BMM (K 未切分)';
  const AIV_OPS = ['Softmax', 'RMSNorm', 'GeLU Act', 'Add Bias', 'Cast fp16', 'Reduce Sum', 'Eltwise Mul', 'RoPE Apply'];

  const tasks = [];
  const edges = [];
  let taskSeq = 0, edgeSeq = 0;
  const tasksByCore = cores.map(() => []);
  const mk = (coreIdx, name, start, computeEnd, end, group, wrap, kind, inN, outN) => {
    const t = {
      id: 't' + (taskSeq++), coreIdx, name, start, computeEnd, end, group, wrap, kind,
      inputRawMagic: [],
      outputRawMagic: [],
      syncIn: [], syncOut: [],
    };
    tasks.push(t);
    tasksByCore[coreIdx].push(t);
    return t;
  };
  const addEdge = (group, wrap, dir, prod, prodT, waiter, waitStartT) => {
    const e = {
      id: 'e' + (edgeSeq++), group, wrap, dir,
      fromCore: prod.coreIdx, fromT: prodT, fromTask: prod.id,
      toCore: waiter.coreIdx, toT: waitStartT, toTask: waiter.id,
      wait: waiter.end - waitStartT,
    };
    edges.push(e);
    prod.syncOut.push(e.id);
    waiter.syncIn.push(e.id);
    return e;
  };

  const LAYERS = 3, LAYER0 = 80, LAYER_SPAN = 820, STAGGER = 84;

  for (let L = 0; L < LAYERS; L++) {
    const layerStart = LAYER0 + L * LAYER_SPAN;
    mk(idxOf['cpu_ctrl'], '层调度', layerStart - 50, layerStart - 26, layerStart - 26, null, null, 'cpu', 0, 0);

    for (let g = 0; g < groups.length; g++) {
      const gcfg = groups[g];
      const winStart = layerStart + g * STAGGER;
      const schedCore = idxOf['cpu_sched_' + ((g % 3) + 1)];
      mk(schedCore, '子图启动', winStart - 22, winStart - 8, winStart - 8, g, null, 'cpu', 0, 0);

      let groupComputeEnd = winStart;

      for (let k = 0; k < 4; k++) {
        const w = g * 4 + k;
        const isSlow = (w === SCENARIO.slowWrap);
        const aicCore = aicIdxOfWrap(w);
        const aivCores = aivIdxOfWrap(w);

        /* ---- AIC: matmul tile ---- */
        const aicTasks = [];
        let cursor = winStart + 10 + rnd(0, 12);
        if (isSlow) {
          /* 超大 BMM: 3 个长 task, 几乎无等待 (它是被等的一方) */
          for (let s = 0; s < 3; s++) {
            const dur = rnd(78, 116);
            const start = cursor, computeEnd = start + dur, end = computeEnd + rnd(0, 6);
            aicTasks.push(mk(aicCore, s === 0 ? AIC_SLOW_OP : 'BMM Accum', start, computeEnd, end, g, w, 'aic', 3, 1));
            cursor = end + rnd(4, 9);
          }
        } else {
          const n = rndi(4, 6);
          for (let s = 0; s < n; s++) {
            const dur = rnd(16, 40) * gcfg.cScale;
            const wait = rand() < 0.22 ? rnd(8, 22) : 0;
            const start = cursor, computeEnd = start + dur, end = computeEnd + wait;
            aicTasks.push(mk(aicCore, pick(AIC_OPS), start, computeEnd, end, g, w, 'aic', rndi(2, 3), 1));
            cursor = end + rnd(3, 8);
          }
        }
        const aicComputeDone = aicTasks[aicTasks.length - 1].computeEnd;
        groupComputeEnd = Math.max(groupComputeEnd, aicComputeDone);

        /* ---- AIV: 向量算子, 等待 AIC ---- */
        aivCores.forEach((aivCore, half) => {
          let cur = winStart + 26 + rnd(0, 14);
          const n = isSlow ? rndi(5, 6) : rndi(6, 9);
          for (let s = 0; s < n; s++) {
            const dur = rnd(9, 24);
            let wait = 0, prod = null, waitStartT = null;
            if (isSlow && s < 3) {
              /* 剧本核心: 算一小段后长时间停等 Wrap06 的超大 BMM */
              prod = aicTasks[s];
              waitStartT = cur + dur;
              const end = prod.computeEnd + rnd(5, 16);
              const t = mk(aivCore, pick(AIV_OPS), cur, waitStartT, Math.max(end, waitStartT + 6), g, w, 'aiv', rndi(1, 2), 1);
              addEdge(g, w, 'aic2aiv', prod, prod.computeEnd, t, waitStartT);
              cur = t.end + rnd(2, 6);
              continue;
            }
            /* 普通 wrap: 部分 task 等待对应 AIC */
            if (rand() < 0.42) {
              prod = aicTasks[Math.min(aicTasks.length - 1, 1 + (s % 2))];
              if (prod.computeEnd > cur + dur + 2) {
                waitStartT = cur + dur;
                wait = prod.computeEnd - waitStartT + rnd(3, 12) * (1 + gcfg.wChar);
              }
            }
            const start = cur, computeEnd = start + dur, end = computeEnd + Math.max(0, wait);
            const t = mk(aivCore, pick(AIV_OPS), start, computeEnd, end, g, w, 'aiv', rndi(1, 2), 1);
            if (prod && waitStartT != null) addEdge(g, w, 'aic2aiv', prod, prod.computeEnd, t, computeEnd);
            cur = end + rnd(2, 7);
          }
        });

        /* AIV → AIC 回写同步 (普通 wrap, 1 条/wrap): AIC 末 task 等 AIV 结果 */
        if (!isSlow && rand() < 0.7) {
          const aivList = tasksByCore[aivCores[0]];
          const prod = aivList[rndi(1, Math.max(1, aivList.length - 2))];
          const lastAic = aicTasks[aicTasks.length - 1];
          if (prod && prod.computeEnd > lastAic.computeEnd - 6) {
            lastAic.end = prod.computeEnd + rnd(5, 14);
            addEdge(g, w, 'aiv2aic', prod, prod.computeEnd, lastAic, lastAic.computeEnd);
          }
        }
      }
    }
  }

  const timelineEnd = Math.max(...tasks.map((t) => t.end));
  const layerMarks = [];
  for (let L = 0; L < LAYERS; L++) layerMarks.push({ t: LAYER0 + L * LAYER_SPAN, label: String(L + 1), layer: L });

  return { cores, groups, tasks, edges, timelineEnd, layerMarks, idxOf, aicIdxOfWrap, aivIdxOfWrap, LAYERS, LAYER0, LAYER_SPAN, STAGGER };
}


/* ============================================================
   6. 渲染基础
   ============================================================ */
const DATASET = window.SWIMLANE_PROFILER_DATA;
if (!DATASET?.runs?.length) throw new Error('swimlane-data.js 未加载或没有运行记录');

function coreLaneOrder(a, b) {

function focusInfo() {
  /* 返回当前需高亮的 task / edge / group / wrap, 用于渐进式聚焦 */
  const relTasks = new Set();
  const relEdges = new Set();
  let dimGroup = null, dimWrap = null;
  const focusTask = state.selTask || state.hoverTask;
  if (state.level === 'group' && state.selGroup != null) dimGroup = state.selGroup;
  if (state.level === 'wrap' && state.selWrap != null) { dimGroup = groupForWrap(state.selWrap); dimWrap = state.selWrap; }
  if (state.level === 'task' && state.selTask) {
    dimGroup = state.selTask.group;
    dimWrap = state.selTask.wrap;
  }
  let crossLayerMode = null;
  let dependencyMode = Boolean(state.selTask);
  if (state.selTask) {
    const dep = dependencyClosure(state.selTask);
    dep.tasks.forEach((id) => relTasks.add(id));
    dep.edges.forEach((id) => relEdges.add(id));
    const crossLayer = crossLayerClosure(state.selTask);
    crossLayer.tasks.forEach((id) => relTasks.add(id));
    crossLayerMode = crossLayer.mode;
    if (crossLayerMode) {
      dimGroup = null;
      dimWrap = null;
    }
  } else if (focusTask) {
    const crossLayer = crossLayerClosure(focusTask);
    if (crossLayer.mode) {
      const dep = dependencyClosure(focusTask);
      dep.tasks.forEach((id) => relTasks.add(id));
      dep.edges.forEach((id) => relEdges.add(id));
      crossLayer.tasks.forEach((id) => relTasks.add(id));
      crossLayerMode = crossLayer.mode;
      dimGroup = null;
      dimWrap = null;
    } else {
      relTasks.add(focusTask.id);
      focusTask.syncIn.concat(focusTask.syncOut).forEach((eid) => {
        const edge = edgeById[eid];
        if (!edge || !edgeVisibleInCurrentMode(edge)) return;
        relEdges.add(eid);
        relTasks.add(edge.fromTask);
        relTasks.add(edge.toTask);
      });
    }
  }
  const relCoreIds = new Set([...relTasks].map((id) => taskById[id]?.coreIdx).filter(Number.isFinite));
  const showDependencyCurves = dependencyMode || (Boolean(crossLayerMode) && relEdges.size > 0);
  return { relTasks, relEdges, relCoreIds, dimGroup, dimWrap, focusTask,
    dependencyMode, showDependencyCurves, crossLayerMode };
}

function edgeVisibleInCurrentMode(edge) {
  return state.mixMode || edge.relation !== 'sync';
}

function dependencyClosure(rootTask) {
  const tasks = new Set([rootTask.id]);
  const edges = new Set();
  const visit = (seed, edgeKey, nextKey) => {
    const queue = [seed];
    const seen = new Set([seed.id]);
    while (queue.length) {
      const cur = queue.shift();
      cur[edgeKey].forEach((eid) => {
        const e = edgeById[eid];
        if (!e || !edgeVisibleInCurrentMode(e)) return;
        edges.add(eid);
        const next = taskById[e[nextKey]];
        if (!next) return;
        tasks.add(next.id);
        if (!seen.has(next.id)) {
          seen.add(next.id);
          queue.push(next);
        }
      });
    }
  };
  visit(rootTask, 'syncIn', 'fromTask');
  visit(rootTask, 'syncOut', 'toTask');
  return { tasks, edges };
}

const AICPU_SCHED_TO_WORKER_PHASE = Object.freeze({
  DEV_TASK_RCV: 'DEV_TASK_RCV_MODEL',
  DEV_TASK_SEND_FIRST_LEAF_TASK: 'DEV_TASK_WAIT_RCV_FIRST_LEAF_TASK',
  DEV_TASK_SYNC_CORE_STOP: 'DEV_TASK_WAIT_SYNC_STOP_NOTIFY',
});
const AICPU_WORKER_TO_SCHED_PHASE = Object.freeze(Object.fromEntries(
  Object.entries(AICPU_SCHED_TO_WORKER_PHASE).map(([schedulerPhase, workerPhase]) => [workerPhase, schedulerPhase]),
));

function crossLayerClosure(rootTask) {
  const tasks = new Set([rootTask.id]);
  const devTaskId = rootTask.devTaskId;
  if (!devTaskId) return { tasks, mode: null };

  const schedulerId = rootTask.schedulerOwnerId ?? rootTask.schedulerId;
  const isBuild = rootTask.phase === 'DEV_TASK_BUILD';
  const isSchedExec = rootTask.phase === 'DEV_TASK_SCHED_EXEC';
  const isWorkerExec = rootTask.phase === 'DEV_TASK_ALL_LEAF_TASK_EXEC';
  const isMachineTask = rootTask.phase === 'MACHINE_LEAF_TASK' || rootTask.kind === 'aic' || rootTask.kind === 'aiv';

  if (isBuild) {
    MODEL.tasks.forEach((task) => {
      if (task.devTaskId === devTaskId) tasks.add(task.id);
    });
    return { tasks, mode: 'devtask' };
  }

  const workerPhase = AICPU_SCHED_TO_WORKER_PHASE[rootTask.phase];
  if (workerPhase && schedulerId != null) {
    MODEL.tasks.forEach((task) => {
      if (task.devTaskId !== devTaskId) return;
      const sameScheduler = (task.schedulerOwnerId ?? task.schedulerId) === schedulerId;
      if (task.phase === 'DEV_TASK_BUILD'
          || (task.phase === rootTask.phase && sameScheduler)
          || (task.phase === workerPhase && sameScheduler)) tasks.add(task.id);
    });
    return { tasks, mode: 'scheduler-phase-pair' };
  }

  const schedulerPhase = AICPU_WORKER_TO_SCHED_PHASE[rootTask.phase];
  if (schedulerPhase && schedulerId != null && rootTask.workerCoreId != null) {
    MODEL.tasks.forEach((task) => {
      if (task.devTaskId !== devTaskId) return;
      const sameScheduler = (task.schedulerOwnerId ?? task.schedulerId) === schedulerId;
      const sameWorker = task.workerCoreId === rootTask.workerCoreId;
      if (task.phase === 'DEV_TASK_BUILD'
          || (task.phase === schedulerPhase && sameScheduler)
          || (task.phase === rootTask.phase && sameScheduler && sameWorker)) tasks.add(task.id);
    });
    return { tasks, mode: 'worker-phase-pair' };
  }

  if (isSchedExec && schedulerId != null) {
    MODEL.tasks.forEach((task) => {
      if (task.devTaskId !== devTaskId) return;
      const sameScheduler = (task.schedulerOwnerId ?? task.schedulerId) === schedulerId;
      if (task.phase === 'DEV_TASK_BUILD'
          || (task.phase === 'DEV_TASK_SCHED_EXEC' && sameScheduler)
          || (task.phase === 'DEV_TASK_ALL_LEAF_TASK_EXEC' && sameScheduler)
          || (task.phase === 'MACHINE_LEAF_TASK' && sameScheduler)) tasks.add(task.id);
    });
    return { tasks, mode: 'scheduler-partition' };
  }

  if ((isWorkerExec || isMachineTask) && schedulerId != null && rootTask.workerCoreId != null) {
    MODEL.tasks.forEach((task) => {
      if (task.devTaskId !== devTaskId) return;
      const sameScheduler = (task.schedulerOwnerId ?? task.schedulerId) === schedulerId;
      const sameWorker = task.workerCoreId === rootTask.workerCoreId;
      if (task.phase === 'DEV_TASK_BUILD'
          || (task.phase === 'DEV_TASK_SCHED_EXEC' && sameScheduler)
          || (task.phase === 'DEV_TASK_ALL_LEAF_TASK_EXEC' && sameScheduler && sameWorker)
          || (task.phase === 'MACHINE_LEAF_TASK' && sameScheduler && sameWorker)) tasks.add(task.id);
    });
    return { tasks, mode: 'worker-chain' };
  }

  return { tasks, mode: null };
}

function drawBody() {
  const w = bodyW(), h = bodyH(), scale = pxPerUs();
  bctx.clearRect(0, 0, w, h);
  const fi = focusInfo();

  /* 行底纹 */
  for (let row = 0; row < rowItems.length; row++) {
    const item = rowItems[row];
    const y = rowTop(row), rh = rowHeight(row);
    if (item.type === 'section') {
      bctx.fillStyle = 'rgba(255,255,255,0.026)';
      bctx.fillRect(0, y, w, rh);
      continue;
    }
    if (isRowHovered(row)) {
      bctx.fillStyle = 'rgba(255,255,255,0.045)';
      bctx.fillRect(0, y, w, rh);
    }
  }

  /* Mix 模式按单个 Wrap instance 框选 1C2V / 1C1V，不合并多个 Wrap。 */
  if (state.mixMode) drawWrapBands(fi);

  /* 调用范围 barrier：任务区只保留虚线，不延伸局部时间刻度实线。 */
  MODEL.layerMarks.forEach((m) => {
    const x = Math.round(m.t * scale) + 0.5;
    bctx.strokeStyle = 'rgba(255,255,255,0.15)'; bctx.setLineDash([4, 4]);
    bctx.beginPath(); bctx.moveTo(x, 0); bctx.lineTo(x, h); bctx.stroke();
    bctx.setLineDash([]);
  });

  /* section / wrap / group 分隔线 */
  drawSeparators(bctx, w);

  /* task bars */
  const fontFamily = "'Inter', sans-serif";
  for (const t of MODEL.tasks) {
    const row = taskRow(t);
    if (!Number.isFinite(row)) continue;
    const related = !fi.dependencyMode || fi.relTasks.has(t.id);
    const baseColor = related ? taskBaseColor(t) : '#6F7480';

    let alpha = 1;
    if (state.syncPathOnly && t.syncIn.length === 0 && t.syncOut.length === 0) alpha = 0.16;
    if (fi.dependencyMode) {
      if (!related) alpha = Math.min(alpha, 0.24);
    } else {
      if (fi.dimWrap != null) { if (t.wrap !== fi.dimWrap) alpha = Math.min(alpha, 0.2); }
      else if (fi.dimGroup != null) { if (t.group !== fi.dimGroup) alpha = Math.min(alpha, 0.2); }
      if (fi.focusTask && !fi.relTasks.has(t.id)) alpha = Math.min(alpha, 0.34);
    }
    if (!taskMatchesQuery(t)) alpha = Math.min(alpha, 0.15);

    const core = MODEL.cores[t.coreIdx];
    const expanded = state.expandedLaneCores.has(core.idx);
    const sourceSegments = expanded
      ? (t.pipelineSegments || [])
      : (state.mixMode && t.microSegments?.length ? t.microSegments : [
        { kind: 'compute', start: t.start, end: t.end },
      ]);
    sourceSegments.forEach((segment) => {
      const segmentRow = expanded ? subRowOf[core.idx]?.[segment.sublane] : row;
      if (!Number.isFinite(segmentRow)) return;
      const bar = barMetricsForRow(segmentRow);
      const x = segment.start * scale;
      const width = Math.max(0, segment.end - segment.start) * scale;
      const y = rowTop(segmentRow) + bar.pad;
      const segmentSelected = segment.id
        ? state.selSubtask?.id === segment.id
        : Boolean(state.selTask?.id === t.id && !state.selSubtask);
      const segmentHovered = segment.id
        ? state.hoverSubtask?.id === segment.id
        : Boolean(state.hoverTask?.id === t.id && !state.hoverSubtask);
      bctx.globalAlpha = alpha;
      if (segment.kind === 'wait') {
        if (width >= 1) {
          drawWaitSegment(x, y, width, bar.height, fi.dependencyMode && !related);
          drawSubtaskFocus(x, y, width, bar.height, segmentSelected, segmentHovered);
        }
      } else if (segment.kind === 'set') {
        bctx.fillStyle = '#1FB6C9';
        bctx.fillRect(Math.round(x), y - 1, 2, bar.height + 2);
      } else if (width >= 1) {
        const renderTask = segment.id ? subtaskView(t, segment) : t;
        window.PtoSwimlaneTaskPattern.drawTaskBar(bctx, {
          x, y, width, height: bar.height, baseColor, fontFamily, task: renderTask,
          isSelected: segmentSelected,
          isRelated: fi.relTasks.has(t.id) && fi.focusTask && fi.focusTask.id !== t.id,
          isEmphasized: segmentHovered,
        });
      }
    });
    bctx.globalAlpha = 1;
  }

  if (fi.showDependencyCurves) drawDependencyCurves(fi);
  else if (state.mixMode) drawSyncCurves(fi);
  copyCanvasPixels(bodyCanvas, compareBodyCanvas);
}

function wrapBandKey(wrapId, iteration) {
  return `${iteration}:${wrapId}`;
}

function wrapBandSpecs() {
  const scale = pxPerUs();
  const specs = [];
  for (let iteration = 0; iteration < MODEL.LAYERS; iteration++) {
    for (const wrap of MODEL.wraps || []) {
      const tasks = MODEL.tasks.filter((task) => task.wrap === wrap.id && task.iteration === iteration);
      if (!tasks.length) continue;
      const rows = [...new Set(tasks.map((task) => taskRow(task)).filter(Number.isFinite))];
      if (!rows.length) continue;
      const start = Math.min(...tasks.map((task) => task.start)) - 0.8;
      const end = Math.max(...tasks.map((task) => task.end)) + 0.8;
      const firstRow = Math.min(...rows);
      const lastRow = Math.max(...rows);
      specs.push({
        key: wrapBandKey(wrap.id, iteration),
        wrapId: wrap.id,
        iteration,
        groupId: groupForWrap(wrap.id),
        x: start * scale,
        y: rowTop(firstRow),
        width: Math.max(1, (end - start) * scale),
        height: rowBottom(lastRow) - rowTop(firstRow),
      });
    }
  }
  return specs;
}

function drawWrapBands(fi) {
  for (const spec of wrapBandSpecs()) {
    const grp = MODEL.groups[spec.groupId];
    const isFocus = fi.dimWrap === spec.wrapId;
    const isHovered = state.hoverWrapBandKey === spec.key;
    const groupFocus = fi.dimWrap == null && fi.dimGroup === spec.groupId;
    const faded = !isHovered && ((fi.dimWrap != null && !isFocus)
      || (fi.dimWrap == null && fi.dimGroup != null && !groupFocus));
    const bright = isHovered || isFocus;
    bctx.save();
    bctx.fillStyle = hexToRgba(grp.color, faded ? 0.018 : (bright ? 0.11 : 0.04));
    bctx.fillRect(spec.x, spec.y, spec.width, spec.height);
    bctx.strokeStyle = hexToRgba(grp.color, faded ? 0.12 : (bright ? 0.94 : 0.34));
    bctx.lineWidth = bright ? 1.4 : 1;
    bctx.setLineDash([5, 3]);
    bctx.beginPath();
    bctx.roundRect(spec.x + 0.5, spec.y + 1.5, spec.width - 1, spec.height - 3, 8);
    bctx.stroke();
    bctx.setLineDash([]);
    bctx.font = "600 8px 'JetBrains Mono', monospace";
    bctx.textAlign = 'left';
    bctx.textBaseline = 'alphabetic';
    bctx.fillStyle = hexToRgba(grp.color, faded ? 0.2 : (bright ? 0.96 : 0.5));
    bctx.fillText(`Wrap ${wrapInstanceDisplayId(spec.wrapId, spec.iteration)}`, spec.x + 1, Math.max(8, spec.y - 2));
    bctx.restore();
  }
}

function hitWrapBand(px, py) {
  if (!state.mixMode) return null;
  const specs = wrapBandSpecs();
  for (let index = specs.length - 1; index >= 0; index--) {
    const spec = specs[index];
    if (px >= spec.x && px <= spec.x + spec.width && py >= spec.y && py <= spec.y + spec.height) return spec;
  }
  return null;
}

function drawSeparators(ctx, w) {
  const line = (row, color, weight) => {
    const y = rowTop(row) + 0.5;
    ctx.strokeStyle = color; ctx.lineWidth = weight;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  };
  rowItems.forEach((item, row) => {
    if (item.type === 'section') line(row, 'rgba(255,255,255,0.16)', 1);
  });
  copyCanvasPixels(laneCanvas, compareLaneCanvas);
}

function drawWaitSegment(x, y, w, h, muted = false) {
  const waitColor = muted ? '#6F7480' : '#FFAA3B';
  bctx.save();
  bctx.beginPath(); bctx.roundRect(x, y, w, h, 2); bctx.clip();
  bctx.fillStyle = hexToRgba(waitColor, muted ? 0.18 : 0.14);
  bctx.fillRect(x, y, w, h);
  bctx.strokeStyle = muted ? 'rgba(111,116,128,0.48)' : 'rgba(255,170,59,0.5)';
  bctx.lineWidth = 1;
  for (let i = -h; i < w + h; i += 5) {
    bctx.beginPath(); bctx.moveTo(x + i, y + h); bctx.lineTo(x + i + h, y); bctx.stroke();
  }
  bctx.restore();
  bctx.strokeStyle = muted ? 'rgba(111,116,128,0.44)' : 'rgba(255,170,59,0.4)';
  bctx.lineWidth = 1;
  bctx.beginPath(); bctx.roundRect(x + 0.5, y + 0.5, Math.max(0, w - 1), h - 1, 2); bctx.stroke();
  if (w >= 6) {
    bctx.fillStyle = waitColor;
    bctx.beginPath();
    bctx.moveTo(x, y - 1); bctx.lineTo(x + 5, y - 1); bctx.lineTo(x + 2.5, y + 3.5);
    bctx.closePath(); bctx.fill();
  }
}

function drawSubtaskFocus(x, y, w, h, selected, hovered) {
  if (!selected && !hovered) return;
  bctx.save();
  bctx.strokeStyle = selected ? 'rgba(255,255,255,0.96)' : 'rgba(255,255,255,0.72)';
  bctx.lineWidth = selected ? 1.5 : 1;
  bctx.beginPath();
  bctx.roundRect(x + 0.5, y + 0.5, Math.max(0, w - 1), Math.max(0, h - 1), 2);
  bctx.stroke();
  bctx.restore();
}

/* 依赖贝塞尔曲线：渐进显示
   overview -> 不画; group -> 该子图弧线中等; wrap -> 该 wrap 弧线强;
   任务 -> 选中任务弧线最强, 同 Wrap 其余弱 */
function drawDependencyCurves(fi) {
  const edges = MODEL.edges.filter((e) => fi.relEdges.has(e.id) && edgeVisibleInCurrentMode(e));
  edges.forEach((e) => drawDependencyCurve(e, true));
}

function drawSyncCurves(fi) {
  let visible, strongPred;
  if (fi.focusTask) {
    visible = MODEL.edges.filter((e) => e.wrap === fi.focusTask.wrap);
    strongPred = (e) => fi.relEdges.has(e.id);
  } else if (fi.dimWrap != null) {
    visible = MODEL.edges.filter((e) => e.wrap === fi.dimWrap);
    strongPred = () => true;
  } else if (fi.dimGroup != null) {
    visible = MODEL.edges.filter((e) => e.group === fi.dimGroup);
    strongPred = () => false;
  } else {
    return; /* overview: 保持干净, 不画弧线 */
  }
  /* 先弱后强, 保证强线在上层 */
  visible.filter((e) => !strongPred(e)).forEach((e) => drawDependencyCurve(e, false));
  visible.filter((e) => strongPred(e)).forEach((e) => drawDependencyCurve(e, true));
  /* 选中 task 的同步点 barrier 竖线 */
  if (fi.focusTask) {
    fi.focusTask.syncIn.concat(fi.focusTask.syncOut).forEach((eid) => {
      const e = edgeById[eid];
      if (!e || e.relation !== 'sync') return;
      const color = MODEL.groups[e.group]?.color || KIND_ACCENT.aic;
      drawBarrier(e.fromT, color);
      drawBarrier(e.toT, color);
    });
  }
}

function drawDependencyCurve(e, strong) {
  const scale = pxPerUs();
  const fromRow = taskRow(taskById[e.fromTask]), toRow = taskRow(taskById[e.toTask]);
  if (!Number.isFinite(fromRow) || !Number.isFinite(toRow)) return;
  const x1 = e.fromT * scale, y1 = rowMidY(fromRow);
  const x2 = e.toT * scale, y2 = rowMidY(toRow);
  const fromColor = taskBaseColor(taskById[e.fromTask]);
  const toColor = taskBaseColor(taskById[e.toTask]);
  const grad = bctx.createLinearGradient(x1, y1, x2, y2);
  grad.addColorStop(0, hexToRgba(fromColor, strong ? 0.98 : 0.32));
  grad.addColorStop(1, hexToRgba(toColor, strong ? 0.98 : 0.32));
  const midX = x1 + (x2 - x1) * 0.5;
  bctx.save();
  bctx.strokeStyle = grad;
  bctx.lineWidth = strong ? 1.7 : 1;
  /* 任务依赖为实线；AI Core 内部同步/等待为虚线。 */
  bctx.setLineDash(e.relation === 'sync' ? (strong ? [6, 4] : [4, 4]) : []);
  bctx.beginPath();
  bctx.moveTo(x1, y1);
  bctx.bezierCurveTo(midX, y1, midX, y2, x2, y2);
  bctx.stroke();
  bctx.setLineDash([]);
  bctx.fillStyle = hexToRgba(fromColor, strong ? 1 : 0.5);
  bctx.beginPath(); bctx.arc(x1, y1, strong ? 2.6 : 1.8, 0, Math.PI * 2); bctx.fill();
  bctx.fillStyle = hexToRgba(toColor, strong ? 1 : 0.5);
  const arrow = strong ? 5.2 : 4.2;
  const direction = Math.sign(x2 - x1) || 1;
  bctx.beginPath();
  bctx.moveTo(x2, y2);
  bctx.lineTo(x2 - direction * arrow, y2 - arrow * 0.72);
  bctx.lineTo(x2 - direction * arrow, y2 + arrow * 0.72);
  bctx.closePath();
  bctx.fill();
  bctx.restore();
}

function drawBarrier(tUs, color) {
  const x = Math.round(tUs * pxPerUs()) + 0.5;
  bctx.save();
  bctx.strokeStyle = hexToRgba(color, 0.45);
  bctx.lineWidth = 1; bctx.setLineDash([2, 3]);
  bctx.beginPath(); bctx.moveTo(x, 0); bctx.lineTo(x, bodyH()); bctx.stroke();
  bctx.restore();
}

/* ---- 时间轴 ---- */
function drawAxis() {
  const w = bodyW(), scale = pxPerUs();
  actx.clearRect(0, 0, w, AXIS_H);
  actx.fillStyle = 'rgba(255,255,255,0.40)';
  actx.font = "500 10px 'JetBrains Mono', monospace";
  actx.textBaseline = 'middle';
  const { majorStep, minorStep } = adaptiveTimeSteps(MODEL.timelineEnd, w, 54);
  for (let t = 0; t <= MODEL.timelineEnd + minorStep * 0.25; t += minorStep) {
    const x = Math.round(t * scale) + 0.5;
    const major = Math.abs(t / majorStep - Math.round(t / majorStep)) < 1e-6;
    actx.strokeStyle = major ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.10)';
    actx.beginPath();
    actx.moveTo(x, major ? AXIS_H - 11 : AXIS_H - 6); actx.lineTo(x, AXIS_H); actx.stroke();
    if (major) { actx.textAlign = 'left'; actx.fillText(formatTimeTick(t) + 'μs', x + 3, 9); }
  }
  MODEL.layerMarks.forEach((m) => {
    const x = m.t * scale;
    const hovered = state.hoverLayer === m.layer;
    if (hovered) {
      actx.fillStyle = 'rgba(255,255,255,0.10)';
      actx.beginPath();
      actx.roundRect(x + 1, 12, 52, 18, 4);
      actx.fill();
    }
    actx.fillStyle = hovered ? 'rgba(255,255,255,0.94)' : 'rgba(255,255,255,0.62)';
    actx.font = "600 10px 'Inter', sans-serif";
    actx.textAlign = 'left';
    actx.fillText('Stitch ' + m.label, x + 4, 22);
    if (hovered) {
      actx.fillStyle = 'rgba(255,255,255,0.78)';
      actx.fillRect(x + 4, 29, 44, 1);
    }
  });
}

function adaptiveTimeSteps(total, pixelWidth, targetLabelPx = 58) {
  const targetTicks = Math.max(4, Math.min(64, Math.floor(pixelWidth / targetLabelPx)));
  const rawStep = Math.max(Number.EPSILON, total / targetTicks);
  const magnitude = 10 ** Math.floor(Math.log10(rawStep));
  const normalized = rawStep / magnitude;
  const nice = [1, 2, 2.5, 5, 10].find((candidate) => candidate >= normalized) || 10;
  const majorStep = nice * magnitude;
  const minorStep = majorStep / (nice === 2.5 ? 5 : 2);
  return { majorStep, minorStep };
}

function formatTimeTick(value) {
  if (Math.abs(value) >= 100 || Number.isInteger(value)) return String(Math.round(value));
  return value.toFixed(1).replace(/\.0$/, '');
}

function layerWindow(layer) {
  const tasks = MODEL.tasks.filter((t) => t.iteration === layer);
  if (!tasks.length) return null;
  const start = Math.max(0, Math.min(...tasks.map((t) => t.start)) - 8);
  const end = Math.min(MODEL.timelineEnd, Math.max(...tasks.map((t) => t.end)) + 8);
  return { start, end };
}

function fitLayer(layer) {
  const win = layerWindow(layer);
  if (!win) return;
  const span = Math.max(1, win.end - win.start);
  const desiredZoom = Math.floor((MODEL.timelineEnd / span) * 100);
  setZoom(desiredZoom);
  window.requestAnimationFrame(() => {
    bodyWrap.scrollLeft = Math.max(0, win.start * pxPerUs());
    axisWrap.scrollLeft = bodyWrap.scrollLeft;
    overviewWrap.scrollLeft = bodyWrap.scrollLeft;
    syncGlobalRulerBrush();
  });
}

function hitLayerLabel(canvasX, canvasY) {
  if (canvasY < 8 || canvasY > AXIS_H) return null;
  const scale = pxPerUs();
  return MODEL.layerMarks.find((m) => {
    const x = m.t * scale;
    return canvasX >= x && canvasX <= x + 62;
  }) || null;
}

function laneUtil(coreIdx, sublane = null) {
  const core = MODEL.cores[coreIdx];
  const explicit = sublane ? core?.sublaneUtilization?.[sublane] : core?.utilization;
  if (Number.isFinite(explicit)) {
    return { active: explicit * MODEL.timelineEnd, ratio: explicit };
  }
  let active = 0;
  MODEL.tasks.forEach((t) => {
    if (t.coreIdx !== coreIdx) return;
    if (sublane) {
      (t.pipelineSegments || []).forEach((segment) => {
        if (segment.sublane === sublane) active += Math.max(0, segment.end - segment.start);
      });
      return;
    }
    active += t.end - t.start;
  });
  const ratio = Math.max(0, Math.min(1, active / Math.max(1, MODEL.timelineEnd)));
  return { active, ratio };
}
function laneUtilForItem(item) {
  if (!item || (item.type !== 'core' && item.type !== 'subcore')) return null;
  return laneUtil(item.coreIdx, item.type === 'subcore' ? item.sublane : null);
}

function hitLaneUtil(canvasX, canvasY) {
  const row = hitRowAt(canvasY);
  if (row < 0 || row >= rowItems.length) return null;
  if (canvasX < 104 || canvasX > LABEL_W - 2) return null;
  const item = rowItems[row];
  const coreIdx = rowToCore[row];
  if (coreIdx == null || (item.type !== 'core' && item.type !== 'subcore')) return null;
  return { core: MODEL.cores[coreIdx], sublane: item.sublane || null, item, util: laneUtilForItem(item), key: rowLaneKey(row) };
}

function hitLaneSection(canvasX, canvasY) {
  const row = hitRowAt(canvasY);
  if (row < 0 || row >= rowItems.length) return null;
  const item = rowItems[row];
  if (item.type !== 'section') return null;
  return item;
}

function hitExpandableLane(canvasX, canvasY) {
  const row = hitRowAt(canvasY);
  if (row < 0 || row >= rowItems.length) return null;
  const item = rowItems[row];
  if (item.type !== 'core') return null;
  const core = MODEL.cores[item.coreIdx];
  if (!isExpandableCore(core)) return null;
  return { item, core, row, inIcon: canvasX >= 4 && canvasX <= 22 };
}

/* ---- 泳道标签列 ---- */
function drawLanes() {
  const h = bodyH();
  lctx.clearRect(0, 0, LABEL_W, h);
  lctx.textBaseline = 'middle';
  const fi = focusInfo();
  for (let row = 0; row < rowItems.length; row++) {
    const item = rowItems[row];
    const y = rowTop(row), rh = rowHeight(row);
    if (item.type === 'section') {
      const collapsed = state.collapsedLaneGroups.has(item.id);
      const groupRelated = fi.crossLayerMode && MODEL.cores.some((core) => core.laneGroup === item.id && fi.relCoreIds.has(core.idx));
      lctx.fillStyle = groupRelated ? 'rgba(255,255,255,0.085)' : 'rgba(255,255,255,0.04)';
      lctx.fillRect(0, y, LABEL_W, rh);
      lctx.fillStyle = 'rgba(255,255,255,0.72)';
      lctx.font = "700 10px 'Inter', sans-serif";
      lctx.textAlign = 'left';
      lctx.beginPath();
      if (collapsed) {
        lctx.moveTo(9, y + ROW_H / 2 - 4);
        lctx.lineTo(15, y + ROW_H / 2);
        lctx.lineTo(9, y + ROW_H / 2 + 4);
      } else {
        lctx.moveTo(7, y + ROW_H / 2 - 2);
        lctx.lineTo(16, y + ROW_H / 2 - 2);
        lctx.lineTo(11.5, y + ROW_H / 2 + 4);
      }
      lctx.closePath();
      lctx.fill();
      lctx.fillText(item.label, 24, y + ROW_H / 2 + 0.5);
      lctx.fillStyle = 'rgba(255,255,255,0.34)';
      lctx.font = "600 9px 'JetBrains Mono', monospace";
      lctx.textAlign = 'right';
      lctx.fillText(String(item.count), LABEL_W - 8, y + ROW_H / 2 + 0.5);
      continue;
    }
    if (item.type !== 'core' && item.type !== 'subcore') continue;

    const c = MODEL.cores[item.coreIdx];
    const hovered = isRowHovered(row);
    if (hovered) {
      lctx.fillStyle = 'rgba(255,255,255,0.055)';
      lctx.fillRect(0, y, LABEL_W, rh);
    }
    const dim = fi.crossLayerMode && fi.dependencyMode
      ? !fi.relCoreIds.has(c.idx)
      : (fi.dimWrap != null && !coreParticipates(c.idx, null, fi.dimWrap))
        || (fi.dimWrap == null && fi.dimGroup != null && !coreParticipates(c.idx, fi.dimGroup));

    if (item.type === 'core' && c.kind === 'aic') {
      lctx.fillStyle = dim ? 'rgba(124,141,184,0.24)' : 'rgba(124,141,184,0.68)';
      lctx.fillRect(0, y + 2, 3, Math.max(2, rh - 4));
    }

    if (item.type === 'core' && hovered && isExpandableCore(c)) {
      const expanded = state.expandedLaneCores.has(c.idx);
      lctx.fillStyle = 'rgba(255,255,255,0.62)';
      lctx.beginPath();
      if (expanded) {
        lctx.moveTo(8, y + rh / 2 - 2);
        lctx.lineTo(17, y + rh / 2 - 2);
        lctx.lineTo(12.5, y + rh / 2 + 4);
      } else {
        lctx.moveTo(10, y + rh / 2 - 4);
        lctx.lineTo(16, y + rh / 2);
        lctx.lineTo(10, y + rh / 2 + 4);
      }
      lctx.closePath();
      lctx.fill();
    }

    /* 标签 */
    lctx.fillStyle = dim ? 'rgba(255,255,255,0.3)' : (item.type === 'subcore' ? 'rgba(255,255,255,0.56)' : 'rgba(255,255,255,0.8)');
    lctx.font = item.type === 'subcore' ? "500 10px 'Inter', sans-serif" : "500 11px 'Inter', sans-serif";
    lctx.textAlign = 'left';
    const label = item.type === 'subcore' ? item.sublane : c.label;
    const labelX = item.type === 'subcore' ? 38 : 24;
    const labelMax = item.type === 'subcore' ? 62 : 80;
    lctx.fillText(label, labelX, y + rh / 2 + 0.5, labelMax);

    const util = laneUtilForItem(item);
    const ux = 108;
    const uh = item.type === 'subcore' ? 5 : 8;
    const uy = y + rh / 2 - uh / 2;
    const uw = 42;
    const utilHovered = state.hoverLaneUtilKey === rowLaneKey(row);
    lctx.fillStyle = utilHovered ? 'rgba(255,255,255,0.11)' : 'rgba(255,255,255,0.055)';
    lctx.beginPath();
    lctx.roundRect(ux, uy, uw, uh, 2);
    lctx.fill();
    const lowUtilization = util.ratio < LOW_UTILIZATION_THRESHOLD;
    const utilColor = lowUtilization
      ? (utilHovered ? 'rgba(255,170,59,0.94)' : 'rgba(255,170,59,0.72)')
      : (utilHovered ? 'rgba(124,141,184,0.86)' : 'rgba(124,141,184,0.62)');
    lctx.fillStyle = dim
      ? (lowUtilization ? 'rgba(255,170,59,0.32)' : 'rgba(124,141,184,0.28)')
      : utilColor;
    lctx.beginPath();
    lctx.roundRect(ux, uy, Math.max(2, uw * util.ratio), uh, 2);
    lctx.fill();
    if (utilHovered) {
      lctx.strokeStyle = 'rgba(255,255,255,0.24)';
      lctx.lineWidth = 1;
      lctx.beginPath();
      lctx.roundRect(ux + 0.5, uy + 0.5, uw - 1, uh - 1, 2);
      lctx.stroke();
    }
    lctx.fillStyle = dim
      ? (lowUtilization ? 'rgba(255,170,59,0.38)' : 'rgba(255,255,255,0.22)')
      : (lowUtilization ? 'rgba(255,170,59,0.88)' : 'rgba(255,255,255,0.42)');
    lctx.font = item.type === 'subcore' ? "600 8px 'JetBrains Mono', monospace" : "600 9px 'JetBrains Mono', monospace";
    lctx.textAlign = 'right';
    lctx.fillText(Math.round(util.ratio * 100) + '%', LABEL_W - 7, y + rh / 2 + 0.5);
  }
  /* 分隔线 */
  const line = (row, color, weight) => {
    const yy = rowTop(row) + 0.5;
    lctx.strokeStyle = color; lctx.lineWidth = weight;
    lctx.beginPath(); lctx.moveTo(0, yy); lctx.lineTo(LABEL_W, yy); lctx.stroke();
  };
  rowItems.forEach((item, row) => {
    if (item.type === 'section') line(row, 'rgba(255,255,255,0.16)', 1);
  });
}

function smoothPath(points) {
  if (!points.length) return '';
  if (points.length === 1) return `M${points[0].x},${points[0].y}`;
  let d = `M${points[0].x.toFixed(2)},${points[0].y.toFixed(2)}`;
  for (let i = 0; i < points.length - 1; i++) {
    const p0 = points[Math.max(0, i - 1)];
    const p1 = points[i];
    const p2 = points[i + 1];
    const p3 = points[Math.min(points.length - 1, i + 2)];
    const cp1x = p1.x + (p2.x - p0.x) / 6;
    const cp1y = p1.y + (p2.y - p0.y) / 6;
    const cp2x = p2.x - (p3.x - p1.x) / 6;
    const cp2y = p2.y - (p3.y - p1.y) / 6;
    d += ` C${cp1x.toFixed(2)},${cp1y.toFixed(2)} ${cp2x.toFixed(2)},${cp2y.toFixed(2)} ${p2.x.toFixed(2)},${p2.y.toFixed(2)}`;
  }
  return d;
}

function clampMetric(v, lo, hi) {
  return Math.max(lo, Math.min(hi, v));
}

function physicalAiCoreKey(core) {
  const die = core?.aiCoreDieId ?? core?.die;
  if (die != null && core?.core != null) return `${die}:${core.core}`;
  if (core?.wrap != null) return `wrap:${core.wrap}`;
  return `lane:${core?.idx}`;
}

function buildOverviewMetrics() {
  const samples = 72;
  const metricDefs = [
    { key: 'hostQueue', label: 'Host CPU 队列', unit: '', max: 8, color: '#7C8DB8' },
    { key: 'activeAi', label: '活跃 AI Core', unit: ' 核', max: 32, color: '#5A92E6' },
    { key: 'aivIdle', label: 'AIV 空闲', unit: '%', max: 100, color: '#FFAA3B' },
    { key: 'ubLive', label: 'UB Live', unit: '%', max: 100, color: '#9B6BF0' },
    { key: 'mteBw', label: 'MTE 带宽', unit: ' GB/s', max: 900, color: '#04D793' },
  ];
  const series = metricDefs.map((m) => ({ ...m, values: [] }));
  for (let i = 0; i < samples; i++) {
    const f = i / Math.max(1, samples - 1);
    const t = f * MODEL.timelineEnd;
    let hostActive = 0, aivTotal = 0, aivWaiting = 0, mteActive = 0;
    const activeAiCores = new Set();
    MODEL.tasks.forEach((task) => {
      const core = MODEL.cores[task.coreIdx];
      const active = t >= task.start && t <= task.end;
      const computing = t >= task.start && t <= task.computeEnd;
      const waiting = t > task.computeEnd && t <= task.end;
      if (core.kind === 'cpu' && active) hostActive++;
      if ((core.kind === 'aic' || core.kind === 'aiv') && computing) activeAiCores.add(physicalAiCoreKey(core));
      if (core.kind === 'aiv') {
        aivTotal++;
        if (waiting) aivWaiting++;
      }
      if (core.kind === 'mte' && active) mteActive++;
    });
    const aiCompute = activeAiCores.size;
    const pulse = 0.5 + 0.5 * Math.sin(f * Math.PI * 9);
    const bottleneck = Math.exp(-Math.pow((t - (MODEL.LAYER0 + MODEL.LAYER_SPAN + MODEL.STAGGER * 1.4)) / 230, 2));
    series[0].values.push(clampMetric(hostActive + 1.6 * pulse + 2.2 * bottleneck, 0, 8));
    series[1].values.push(clampMetric(aiCompute, 0, 32));
    series[2].values.push(clampMetric((aivWaiting / Math.max(1, aivTotal)) * 100 + 20 * bottleneck, 0, 100));
    series[3].values.push(clampMetric(34 + aiCompute * 0.72 + mteActive * 8 + 18 * bottleneck + 8 * pulse, 0, 100));
    series[4].values.push(clampMetric(120 + mteActive * 230 + 90 * pulse + 140 * Math.max(0, Math.sin(f * Math.PI * 6)), 0, 900));
  }
  return series;
}

function renderOverviewBand() {
  const w = bodyW();
  const h = 62;
  const top = 7;
  const bottom = 9;
  overviewMetricSeries = buildOverviewMetrics();
  const grid = [0.25, 0.5, 0.75].map((p) => {
    const y = top + (h - top - bottom) * p;
    return `<path d="M0 ${y.toFixed(2)} H${w}" stroke="rgba(255,255,255,0.055)" stroke-width="1"></path>`;
  }).join('');
  const layerGuides = MODEL.layerMarks.map((mark) => {
    const x = mark.t * pxPerUs();
    return `<path d="M${x.toFixed(2)} 0 V${h}" stroke="rgba(255,255,255,0.24)" stroke-width="1" stroke-dasharray="4 4"></path>`;
  }).join('');
  const paths = overviewMetricSeries.map((metric) => {
    const points = metric.values.map((value, i) => {
      const f = i / Math.max(1, metric.values.length - 1);
      const y = top + (1 - value / metric.max) * (h - top - bottom);
      return { x: f * w, y };
    });
    const line = smoothPath(points);
    const area = `${line} L${w.toFixed(2)},${(h - bottom).toFixed(2)} L0,${(h - bottom).toFixed(2)} Z`;
    return `<path d="${area}" fill="${metric.color}" opacity="0.10"></path><path d="${line}" fill="none" stroke="${metric.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.88"></path>`;
  }).join('');
  let marker = '';
  if (state.selTask) {
    const selected = selectedTaskView();
    const x = selected.start * pxPerUs();
    const mw = Math.max(2, (selected.end - selected.start) * pxPerUs());
    marker = `<div class="sl-overview-marker" style="left:${x}px;width:${mw}px"></div>`;
  }
  overviewBand.style.width = w + 'px';
  overviewBand.innerHTML = `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" aria-hidden="true">${grid}${layerGuides}${paths}</svg>${marker}<div class="sl-overview-tooltip pto-swimlane-task-tooltip" id="overviewTooltip" hidden aria-hidden="true"></div>`;
}

function renderGlobalRuler() {
  if (!globalRulerTicks) return;
  const rulerWidth = visibleTrackW();
  globalRulerScale.style.width = rulerWidth + 'px';
  const { majorStep, minorStep } = adaptiveTimeSteps(MODEL.timelineEnd, rulerWidth, 46);
  let html = '';
  for (let t = 0; t <= MODEL.timelineEnd + minorStep * 0.25; t += minorStep) {
    const major = Math.abs(t / majorStep - Math.round(t / majorStep)) < 1e-6;
    html += `<div class="sl-global-ruler__tick ${major ? 'is-major' : ''}" style="left:${(t / MODEL.timelineEnd * 100).toFixed(4)}%">${major ? formatTimeTick(t) + 'μs' : ''}</div>`;
  }
  globalRulerTicks.innerHTML = html;
  syncGlobalRulerBrush();
}

function syncGlobalRulerBrush() {
  if (!globalRulerBrush) return;
  const w = bodyW();
  const visible = Math.max(1, bodyWrap.clientWidth || visibleTrackW());
  const leftF = Math.max(0, Math.min(1, bodyWrap.scrollLeft / w));
  const widthF = Math.max(0.01, Math.min(1 - leftF, visible / w));
  const trackW = visibleTrackW();
  const isFull = leftF <= 0.002 && widthF >= 0.998;
  globalRulerBrush.style.left = (isFull ? 0 : leftF * trackW) + 'px';
  globalRulerBrush.style.width = (isFull ? trackW : Math.max(3, widthF * trackW)) + 'px';
}

function formatMetricValue(metric, value) {
  if (metric.key === 'hostQueue') return value.toFixed(1);
  if (metric.key === 'activeAi') return Math.round(value) + metric.unit;
  if (metric.key === 'mteBw') return Math.round(value) + metric.unit;
  return value.toFixed(1) + metric.unit;
}

function showTimestampGuideAt(clientX) {
  if (!timestampGuide || !swimlaneScrollShell) return;
  const shellRect = swimlaneScrollShell.getBoundingClientRect();
  const left = Math.max(LABEL_W, Math.min(shellRect.width - 1, clientX - shellRect.left));
  timestampGuide.style.left = left + 'px';
  timestampGuide.hidden = false;
  timestampGuide.setAttribute('aria-hidden', 'false');
  if (state.secondaryViewMode === 'comparison' && compareTimestampGuide && compareGrid) {
    const compareRect = compareGrid.getBoundingClientRect();
    const compareLeft = Math.max(LABEL_W, Math.min(compareRect.width - 1, clientX - compareRect.left));
    compareTimestampGuide.style.left = compareLeft + 'px';
    compareTimestampGuide.hidden = false;
    compareTimestampGuide.setAttribute('aria-hidden', 'false');
  }
}

function hideTimestampGuide() {
  if (timestampGuide) {
    timestampGuide.hidden = true;
    timestampGuide.setAttribute('aria-hidden', 'true');
  }
  if (compareTimestampGuide) {
    compareTimestampGuide.hidden = true;
    compareTimestampGuide.setAttribute('aria-hidden', 'true');
  }
}

function showOverviewTooltip(e) {
  if (!overviewMetricSeries.length) return;
  const rect = overviewBand.getBoundingClientRect();
  if (!rect.width) return;
  const x = Math.max(0, Math.min(rect.width, e.clientX - rect.left));
  const f = x / rect.width;
  const idx = Math.max(0, Math.min(overviewMetricSeries[0].values.length - 1, Math.round(f * (overviewMetricSeries[0].values.length - 1))));
  const t = f * MODEL.timelineEnd;
  const tip = document.getElementById('overviewTooltip');
  if (!tip) return;
  showTimestampGuideAt(e.clientX);
  const rows = overviewMetricSeries.map((metric) => (
    `<div class="pto-swimlane-task-tooltip__row"><span class="pto-swimlane-task-tooltip__key"><span class="sl-overview-tip-swatch" style="background:${metric.color}"></span>${metric.label}</span><span class="pto-swimlane-task-tooltip__value">${formatMetricValue(metric, metric.values[idx])}</span></div>`
  )).join('');
  tip.innerHTML = `<div class="pto-swimlane-task-tooltip__title">时间戳 ${t.toFixed(1)}μs</div>${rows}`;
  tip.hidden = false;
  tip.classList.add('is-visible');
  tip.setAttribute('aria-hidden', 'false');
  const tw = tip.offsetWidth || 214;
  const left = x + 12 + tw > rect.width ? x - tw - 12 : x + 12;
  tip.style.left = Math.max(2, Math.min(rect.width - tw - 2, left)) + 'px';
  tip.style.top = '6px';
}

function hideOverviewTooltip() {
  const tip = document.getElementById('overviewTooltip');
  hideTimestampGuide();
  if (tip) {
    tip.classList.remove('is-visible');
    tip.setAttribute('aria-hidden', 'true');
    tip.hidden = true;
  }
}

  if (!runHistoryBody) return;
  if (swimlanePaneTitle) swimlanePaneTitle.textContent = `${state.selectedRunId} · merged_swimlane`;
  runHistoryBody.innerHTML = `<div class="sl-history-stack">${runList().map(runCardHtml).join('')}</div>`;
  runHistoryBody.querySelectorAll('.sl-run-card__head[data-run-id]').forEach((btn) => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.runId;
      state.openArtifactMenu = null;
      if (state.expandedRuns.has(id)) state.expandedRuns.delete(id);
      else state.expandedRuns.add(id);
      renderRunHistory();
    });
  });
  runHistoryBody.querySelectorAll('[data-artifact-select][data-run-id]').forEach((btn) => {
    btn.addEventListener('click', () => {
      if (btn.disabled || btn.dataset.artifactSelect !== 'merged_swimlane.json') return;
      state.openArtifactMenu = null;
      loadRun(btn.dataset.runId);
      renderRunHistory();
    });
  });
  runHistoryBody.querySelectorAll('[data-artifact-more]').forEach((btn) => {
    btn.addEventListener('click', (event) => {
      event.stopPropagation();
      if (btn.disabled) return;
      const key = btn.dataset.artifactMore;
      state.openArtifactMenu = state.openArtifactMenu === key ? null : key;
      renderRunHistory();
    });
  });
  runHistoryBody.querySelectorAll('[data-artifact-action]').forEach((btn) => {
    btn.addEventListener('click', (event) => {
      event.stopPropagation();
      if (btn.disabled) return;
      const action = btn.dataset.artifactAction;
      const runId = btn.dataset.runId;
      state.openArtifactMenu = null;
      renderRunHistory();
      if (action === 'compare' && runId && runId !== state.selectedRunId) openRunComparison(runId);
    });

function loadRun(runId) {
  const next = RUN_BY_ID[runId];
  if (!next || next === CURRENT_RUN) return;
  CURRENT_RUN = next;
  MODEL = next.model;
  rebuildModelIndexes();
  taskTooltipPayloads.clear();
  laneTooltipPayloads.clear();
  subtaskViewCache.clear();
  Object.assign(state, {
    selectedRunId: runId,
    level: 'overview',
    selGroup: null,
    selWrap: null,
    selTask: null,
    selSubtask: null,
    hoverTask: null,
    hoverSubtask: null,
    hoverWrapBandKey: null,
    comparisonRunId: null,
    reportTab: 'overview',
    taskReportTab: 'overview',
    pmuGroup: next.pmu.group || 2,
  });
  state.expandedLaneCores.clear();
  state.collapsedLaneGroups = new Set(['host', 'ai_core_worker_phases']);
  state.expandedRuns.add(runId);
  setBlockGraphOpen(false);
  buildOrder();
  layout();
  renderInspector();
  document.getElementById('projectName').textContent = next.projectName;
}

function bindRunHistoryDismiss() {
  document.addEventListener('click', (event) => {
    if (!state.openArtifactMenu) return;
    if (event.target.closest('[data-artifact-more], .sl-history-artifact-menu')) return;

}

function hitTest(px, py) {
  const row = hitRowAt(py);
  if (row < 0 || row >= rowItems.length) return null;
  const coreIdx = rowToCore[row];
  if (coreIdx == null) return null;
  const scale = pxPerUs();
  for (const t of MODEL.tasks) {
    if (t.coreIdx !== coreIdx) continue;
    if (state.mixMode && t.microSegments?.length) {
      const expanded = state.expandedLaneCores.has(coreIdx);
      const sublane = expanded ? rowItems[row]?.sublane : null;
      const segments = expanded ? (t.pipelineSegments || []) : t.microSegments;
      const segment = segments.find((candidate) => candidate.id
        && (!expanded || candidate.sublane === sublane)
        && (expanded || taskRow(t) === row)
        && px >= candidate.start * scale - 1 && px <= candidate.end * scale + 1);
      if (segment) return { task: t, segment };
    }
    if (state.expandedLaneCores.has(coreIdx)) {
      const sublane = rowItems[row]?.sublane;
      const hit = (t.pipelineSegments || []).some((segment) => segment.sublane === sublane
        && px >= segment.start * scale - 1 && px <= segment.end * scale + 1);
      if (hit) return { task: t, segment: null };
      continue;
    }
    if (taskRow(t) === row && px >= t.start * scale - 1 && px <= t.end * scale + 1) return { task: t, segment: null };
  }
  return null;
}

  if (!syncingComparisonScroll && state.secondaryViewMode === 'comparison' && compareBodyWrap) {
    syncingComparisonScroll = true;

});
function forwardLaneWheel(event, targetWrap) {
  if (!targetWrap) return;
  const unit = event.deltaMode === 1 ? ROW_H : event.deltaMode === 2 ? targetWrap.clientHeight : 1;
  const deltaX = (event.deltaX + (event.shiftKey ? event.deltaY : 0)) * unit;
  const deltaY = (event.shiftKey ? 0 : event.deltaY) * unit;
  const beforeLeft = targetWrap.scrollLeft;
  const beforeTop = targetWrap.scrollTop;
  targetWrap.scrollLeft += deltaX;
  targetWrap.scrollTop += deltaY;
  if (targetWrap.scrollLeft !== beforeLeft || targetWrap.scrollTop !== beforeTop) event.preventDefault();
}

compareLaneWrap?.addEventListener('wheel', (event) => forwardLaneWheel(event, compareBodyWrap), { passive: false });

  if (!syncingComparisonScroll && bodyWrap.scrollLeft !== compareBodyWrap.scrollLeft) {
    syncingComparisonScroll = true;
    bodyWrap.scrollLeft = compareBodyWrap.scrollLeft;
    axisWrap.scrollLeft = compareBodyWrap.scrollLeft;
    overviewWrap.scrollLeft = compareBodyWrap.scrollLeft;
    syncingComparisonScroll = false;
    syncGlobalRulerBrush();
  }
  hideTimestampGuide();
});

function scrollWrapIntoView(w) {
  let range = wrapRowRange(w);
  if (!range) {
    const coreIds = [...new Set(MODEL.tasks.filter((task) => task.wrap === w).map((task) => task.coreIdx))];
    coreIds.forEach((coreIdx) => state.collapsedLaneGroups.delete(MODEL.cores[coreIdx]?.laneGroup));
    buildOrder();
    layout();
    range = wrapRowRange(w);
  }
  if (!range) return;
  const [r0, r1] = range;
  const top = rowTop(r0), mid = (top + rowBottom(r1)) / 2;
  bodyWrap.scrollTop = Math.max(0, mid - bodyWrap.clientHeight / 2);
}

function scrollTaskIntoView(t) {
  let row = taskRow(t);
  if (!Number.isFinite(row)) {
    const core = MODEL.cores[t.coreIdx];
    if (core?.laneGroup) state.collapsedLaneGroups.delete(core.laneGroup);
    buildOrder();
    layout();
    row = taskRow(t);
  }
  if (!Number.isFinite(row)) return;
  const y = rowMidY(row);
  const x = (t.start + t.end) / 2 * pxPerUs();
  bodyWrap.scrollTop = Math.max(0, y - bodyWrap.clientHeight / 2);
  bodyWrap.scrollLeft = Math.max(0, x - bodyWrap.clientWidth / 2);
  axisWrap.scrollLeft = bodyWrap.scrollLeft;

}

   9. Inspector (概览 → 子图 → Wrap → Task 下钻)
   ============================================================ */
function coreStats(coreIdx, group, wrap) {
  let compute = 0, wait = 0, n = 0;
  for (const t of MODEL.tasks) {
    if (t.coreIdx !== coreIdx) continue;
    if (group != null && t.group !== group) continue;
    compute += t.computeEnd - t.start; wait += t.end - t.computeEnd; n++;
  }
  return { compute, wait, n, ratio: wait / (compute + wait || 1) };
}
function groupStats(g) {
  let compute = 0, wait = 0;
  for (const t of MODEL.tasks) {
    if (t.group !== g) continue;
    if (MODEL.cores[t.coreIdx].kind !== 'aic' && MODEL.cores[t.coreIdx].kind !== 'aiv') continue;
    compute += t.computeEnd - t.start; wait += t.end - t.computeEnd;
  }
  return { compute, wait, ratio: wait / (compute + wait || 1) };
}
function wrapStats(w) {
  const tasks = MODEL.tasks.filter((task) => task.wrap === w);
  const s = (kind, vector = null) => {
    const selected = tasks.filter((task) => {
      const core = MODEL.cores[task.coreIdx];
      return core.kind === kind && (vector == null || core.vector === vector);
    });
    const compute = selected.reduce((sum, task) => sum + task.computeEnd - task.start, 0);
    const wait = selected.reduce((sum, task) => sum + task.end - task.computeEnd, 0);
    return { compute, wait, n: selected.length, ratio: wait / (compute + wait || 1) };
  };
  const all = [s('aic'), s('aiv', 0), s('aiv', 1)];
  let compute = 0, wait = 0;
  all.forEach((x) => { compute += x.compute; wait += x.wait; });
  return { aic: all[0], aiv0: all[1], aiv1: all[2], ratio: wait / (compute + wait || 1) };
}

function runMetricChips() {
  let compute = 0, wait = 0;
  MODEL.tasks.forEach((t) => { compute += t.computeEnd - t.start; wait += t.end - t.computeEnd; });
  const ratio = (wait / (compute + wait) * 100).toFixed(1);
  const syncCount = MODEL.edges.filter((edge) => edge.relation === 'sync').length;
  const dependencyCount = MODEL.edges.length - syncCount;
  return `<div class="sl-report-metrics">
    <span class="stat-chip">${MODEL.cores.length} 条泳道</span>
    <span class="stat-chip">${MODEL.tasks.length} 个任务</span>
    <span class="stat-chip">${dependencyCount} 条任务依赖</span>
    <span class="stat-chip">${syncCount} 条同步/等待</span>
    <span class="stat-chip" style="color:var(--warning)">同步等待 ${ratio}%</span>
  </div>`;
}

function runAggregateStats() {
  let compute = 0, wait = 0, active = 0;
  const laneUtils = MODEL.cores
    .filter((core) => core.kind === 'aic' || core.kind === 'aiv')
    .map((core) => laneUtil(core.idx).ratio);
  MODEL.tasks.forEach((t) => {
    compute += t.computeEnd - t.start;
    wait += t.end - t.computeEnd;
    active += t.end - t.start;
  });
  const total = compute + wait || 1;
  const avgLaneUtil = laneUtils.reduce((sum, ratio) => sum + ratio, 0) / Math.max(1, laneUtils.length);
  const minUtil = Math.min(...laneUtils);
  const maxUtil = Math.max(...laneUtils);
  const balance = maxUtil > 0 ? minUtil / maxUtil : 1;
  return {
    tasks: MODEL.tasks.length,
    syncEdges: MODEL.edges.filter((edge) => edge.relation === 'sync').length,
    dependencyEdges: MODEL.edges.filter((edge) => edge.relation !== 'sync').length,
    duration: MODEL.timelineEnd,
    waitRatio: wait / total,
    avgLaneUtil,
    avgBubble: 1 - avgLaneUtil,
    loadBalance: balance,
    extraGmUbKiB: CURRENT_RUN.summaryMetrics.extraGmUbKiB,
    ubHeadroomKiB: CURRENT_RUN.summaryMetrics.ubHeadroomKiB,
    mte2Util: CURRENT_RUN.summaryMetrics.mte2Util,
  };
}

function topTasks() {
  return CURRENT_RUN.anomalies.map((anomaly) => {
    const task = taskById[anomaly.taskId];
    const compute = task.computeEnd - task.start;
    const wait = task.end - task.computeEnd;
    const bubble = anomaly.bubbleDuration || 0;
    return { task, anomaly, compute, wait, bubble, total: task.end - task.start || 1 };
  });
}

        return `${index ? '<span class="sl-object-path__sep">›</span>' : ''}<span class="sl-object-path__item ${current ? 'is-current' : ''}" ${current ? '' : `data-object-nav="${part.k}"`}>${part.label}</span>`;

}

function renderInspector() {
  const title = document.getElementById('inspTitle');
  const body = document.getElementById('inspBody');
  let html = '';
  title.textContent = '性能统计';

  if (!state.mixMode) {
    html = '';
    if (state.selTask) html += taskDetailHtml(selectedTaskView());
    else html += defaultReportHtml();
    body.innerHTML = html;
    bindInspector();
    return;
  }

  if (state.level === 'task' && state.selTask) {
    html += taskDetailHtml(selectedTaskView());
  } else if (state.level === 'wrap' && state.selWrap != null) {
    html += objectSelectionHeaderHtml() + wrapDetailHtml(state.selWrap);
  } else if (state.level === 'group' && state.selGroup != null) {
    html += objectSelectionHeaderHtml() + groupDetailHtml(state.selGroup);
  } else {
    html += overviewHtml();
  }
  body.innerHTML = html;
  bindInspector();
}

function overviewHtml() {
  const primaryAnomaly = topTasks()[0];
  const primaryGroup = primaryAnomaly?.task.group;
  let html = defaultReportHtml();
  if (state.reportTab !== 'overview') return html;
  html += `<div class="sl-insp-section">
    <div class="sl-insp-hint">4 个 Stitch，按 <b>${MODEL.groups.length} 个诊断分组</b>组织。Wrap 是运行时任务分组，
    不等同于物理 Core 编号；同一物理泳道在不同调用中可承载不同 Wrap。${escapeHtml(CURRENT_RUN.iterationDefinition)}<br>
    任务颜色按<b>语义诊断分组</b>编码，不按 Core、Wrap 或异常等级编码。虚线框表示跨多个 Wrap 的 L2 诊断分组；选中 Wrap 后出现的实线框表示当前 Wrap 的任务范围。</div>
  </div>
  <div class="sl-insp-section"><div class="sl-insp-section-label">${MODEL.groups.length} 个 Mix 子图 · 同步等待占比</div>`;

  html += `<div class="sl-callout">
    <b>剧本 · 定位提示</b><br>
    <b>${bg.name}</b> 的同步等待占比明显高于其它子图。根因疑似落在它的某个
    1C2V Wrap —— 一个 AIC 把整组其它核拖在 SyncWait 上。
    <button class="btn btn-sm btn-solid sl-btn-drill" data-drill="bottleneck">▶ 下钻到瓶颈 Wrap</button>
  </div>
  <div class="sl-insp-section"><div class="sl-insp-section-label">硬件拓扑</div>
    <div class="sl-kv"><span class="sl-kv-key">AI CPU</span><span class="sl-kv-val">1 个控制核 + 4 个调度核</span></div>
    <div class="sl-kv"><span class="sl-kv-key">1C2V Wrap</span><span class="sl-kv-val">32 · 每组 1 AIC + 2 AIV</span></div>
    <div class="sl-kv"><span class="sl-kv-key">AIC / AIV</span><span class="sl-kv-val">32 / 64</span></div>
    <div class="sl-kv"><span class="sl-kv-key">DIE</span><span class="sl-kv-val">2 · 每 DIE 16 AIC + 32 AIV</span></div>
  </div>`;

}

function groupDetailHtml(g) {
  const grp = MODEL.groups[g];
  const st = groupStats(g);
  const pct = (st.ratio * 100).toFixed(0);
  let html = `<div class="sl-report-card sl-task-basic-card">
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
      <span class="sl-pill" style="color:${grp.color}"><span class="sl-dot" style="width:8px;height:8px;background:${grp.color}"></span>${grp.short}</span>
      <span class="sl-pill ${st.ratio >= 0.35 ? 'is-warn' : 'is-ok'}">${st.ratio >= 0.35 ? '同步瓶颈' : '同步健康'}</span>
    </div>
    <div class="sl-kv"><span class="sl-kv-key">绑定 Wrap</span><span class="sl-kv-val">W${wrapDisplayId(g * 4)}–W${wrapDisplayId(g * 4 + 3)}</span></div>
    <div class="sl-kv"><span class="sl-kv-key">同步等待占比</span><span class="sl-kv-val" style="color:${pct >= 35 ? 'var(--warning)' : 'inherit'}">${pct}%</span></div>
  </div>
  <div class="sl-report-card"><div class="sl-report-card__title">4 个 1C2V Wrap · 等待占比</div>`;
  let slowW = -1, slowR = -1;
  for (let k = 0; k < 4; k++) {
    const w = g * 4 + k;
    const ws = wrapStats(w);
    if (ws.ratio > slowR) { slowR = ws.ratio; slowW = w; }
  }
  for (let k = 0; k < 4; k++) {
    const w = g * 4 + k;
    const ws = wrapStats(w);
    const pctw = (ws.ratio * 100).toFixed(0);
    const flag = w === slowW;
    html += `<div class="sl-row ${flag ? 'is-flag' : ''}" data-wrap="${w}">
        <span class="sl-dot" style="background:${grp.color}"></span>
        <span class="sl-row-name">Wrap ${wrapDisplayId(w)} <small>跨 3 次调用动态映射到物理泳道</small></span>
        <span class="sl-row-meta">${pctw}%</span></div>
      <div class="sl-meter"><div class="sl-meter-fill" style="width:${pctw}%;background:${flag ? 'var(--warning)' : grp.color}"></div></div>`;
  }
  html += `</div>`;
  if (g === topTasks()[0]?.task.group) {
    html += `<div class="sl-callout">
      <b>Wrap ${wrapDisplayId(slowW)}</b> 的等待占比远高于同组其它 Wrap。
      该 Wrap 的 AIC 在跑一个超大 BMM, 同组其它 Wrap 早早算完后空转 —— 典型的<b>核间负载不均</b>。
      点击该 Wrap 行查看 1C2V 内部三个核的耗时拆解。</div>`;
  }
  return html;
}

function wrapDetailHtml(w) {
  const g = groupForWrap(w);
  const grp = MODEL.groups[g];

  const wrap = MODEL.wraps.find((item) => item.id === w);
  const representative = wrap?.instances?.[0];
  const aicCore = representative?.aicCoreIdx;
  const aivCores = representative?.aivCoreIdxs || [];
  const cores3 = [
    { ci: aicCore, st: ws.aic, role: 'AIC (Cube)' },
    { ci: aivCores[0], st: ws.aiv0, role: 'AIV-0 (Vector)' },
    { ci: aivCores[1], st: ws.aiv1, role: 'AIV-1 (Vector)' },

  let html = `<div class="sl-report-card sl-task-basic-card">
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">

    </div>
    <div class="sl-insp-hint">Wrap 是运行时 1C2V 任务分组，不是物理 Core 编号。下表泳道名取 Stitch 1 的映射；后续 Stitch 会重映射。</div>
  </div>
  <div class="sl-report-card"><div class="sl-report-card__title">单元内三核 · 计算与同步等待</div>`;
  cores3.forEach((c) => {
    const tot = c.st.compute + c.st.wait || 1;
    const cp = (c.st.compute / tot * 100), wp = (c.st.wait / tot * 100);
    html += `<div style="margin-top:8px">
      <div class="sl-kv" style="padding-bottom:3px;border:0">
        <span class="sl-kv-key">${c.ci != null ? laneDisplayLabel(MODEL.cores[c.ci]) : '—'} · ${c.role}</span>

      <div class="sl-meter">
        <div class="sl-meter-fill" style="width:${cp}%;background:${grp.color};float:left"></div>
        <div class="sl-meter-fill" style="width:${wp}%;background:repeating-linear-gradient(135deg,rgba(255,170,59,0.9) 0 3px,rgba(255,170,59,0.35) 3px 6px);float:left"></div>
      </div></div>`;
  });
  html += `</div>`;
  const syncN = MODEL.edges.filter((e) => e.wrap === w && e.relation === 'sync').length;
  const dependencyN = MODEL.edges.filter((e) => e.wrap === w && e.relation !== 'sync').length;
  html += `<div class="sl-report-card">
    <div class="sl-kv"><span class="sl-kv-key">同步/等待（虚线）</span><span class="sl-kv-val">${syncN}</span></div>
    <div class="sl-kv"><span class="sl-kv-key">任务依赖（实线）</span><span class="sl-kv-val">${dependencyN}</span></div>
  </div>`;
  if (w === topTasks()[0]?.task.wrap) {
    html += `<div class="sl-callout">
      <b>根因锁定</b> —— <b>${laneDisplayLabel(MODEL.cores[aicCore])}</b> 在跑一个「K 维未切分」的超大 BMM,
      单任务计算量约为正常 tile 的 2.5x。它一直没发出 SyncSet,
      配对的两个 AIV 算完一小段后就长时间停等。<br>
      优化方向: 对该 BMM 做 K-split, 把单核长任务拆成多个 tile, 让 AIV 不必整段等待。</div>`;
  } else {
    html += `<div class="sl-callout is-success">
      该 Wrap 三核耗时较均衡。点击任务查看单个任务的同步事件。</div>`;

function taskOverviewHtml(t) {
  const grp = t.group != null ? MODEL.groups[t.group] : null;
  const compute = t.computeEnd - t.start;
  const wait = t.end - t.computeEnd;
  const total = (t.end - t.start) || 1;
  const ratio = wait / total;
  const pct = (ratio * 100).toFixed(0);
  const ins = t.syncIn.map((id) => edgeById[id]).filter(Boolean);
  const outs = t.syncOut.map((id) => edgeById[id]).filter(Boolean);
  const incomingSync = state.mixMode ? ins.filter((edge) => edge.relation === 'sync') : [];
  const outgoingSync = state.mixMode ? outs.filter((edge) => edge.relation === 'sync') : [];
  const incomingDependencies = ins.filter((edge) => edge.relation !== 'sync');
  const outgoingDependencies = outs.filter((edge) => edge.relation !== 'sync');
  const visibleRelationCount = incomingDependencies.length + outgoingDependencies.length + incomingSync.length + outgoingSync.length;
  let html = `<div class="sl-task-tab-panel">
    <div class="sl-insp-section">
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
        <span class="sl-pill" style="color:${grp ? grp.color : 'var(--accent)'}">
          <span class="sl-dot" style="width:8px;height:8px;background:${grp ? grp.color : 'var(--accent)'}"></span>
          ${grp ? grp.short : MODEL.cores[t.coreIdx].section}</span>
        <span class="sl-pill ${ratio >= 0.3 ? 'is-warn' : 'is-ok'}">${ratio >= 0.3 ? '同步瓶颈' : '计算主导'}</span>
      </div>
      ${t.inputRawMagic.length + t.outputRawMagic.length > 0 ? `<div class="sl-kv"><span class="sl-kv-key">输入 / 输出</span><span class="sl-kv-val">输入 ${t.inputRawMagic.length} · 输出 ${t.outputRawMagic.length}</span></div>` : ''}
      ${t.coveredTaskIds ? `<div class="sl-kv"><span class="sl-kv-key">调度覆盖</span><span class="sl-kv-val">${t.coveredTaskIds.length} 个 AI Core 任务</span></div>` : ''}
    </div>
    <div class="sl-insp-section"><div class="sl-insp-section-label">计算与同步等待</div>
      <div class="sl-meter" style="height:14px">
        <div class="sl-meter-fill" style="width:${compute / total * 100}%;background:${grp ? grp.color : 'var(--accent)'};float:left"></div>
        <div class="sl-meter-fill" style="width:${pct}%;background:repeating-linear-gradient(135deg,rgba(255,170,59,0.9) 0 3px,rgba(255,170,59,0.35) 3px 6px);float:left"></div>
      </div>
      <div class="sl-kv"><span class="sl-kv-key">计算段</span><span class="sl-kv-val">${compute.toFixed(1)}μs</span></div>
      <div class="sl-kv"><span class="sl-kv-key">同步等待段</span><span class="sl-kv-val" style="color:var(--warning)">${wait.toFixed(1)}μs · ${pct}%</span></div>
    </div>
    <div class="sl-insp-section"><div class="sl-insp-section-label">任务关系 (${visibleRelationCount})</div>`;
  if (visibleRelationCount === 0) {
    html += `<div class="sl-insp-hint">${state.mixMode
      ? `该任务无登记的前后依赖或核间同步/等待关系。${wait > 0 ? '末段为未归因的屏障等待。' : ''}`
      : '该任务无登记的前后依赖。打开 Mix 模式可同时查看核间同步/等待关系。'}</div>`;
  }
  incomingDependencies.forEach((e) => {
    html += `<div class="sl-sync-item">← <b>前置依赖（实线）</b> · 来源 <span class="mono">${laneDisplayLabel(MODEL.cores[e.fromCore])}</span>
      @ <span class="mono">${e.fromT.toFixed(1)}μs</span></div>`;
  });
  outgoingDependencies.forEach((e) => {
    html += `<div class="sl-sync-item">→ <b>后继依赖（实线）</b> · 指向 <span class="mono">${laneDisplayLabel(MODEL.cores[e.toCore])}</span>
      @ <span class="mono">${e.toT.toFixed(1)}μs</span></div>`;
  });
  incomingSync.forEach((e) => {
    html += `<div class="sl-sync-item">▼ <b>SyncWait</b> · 等待 <span class="mono">${laneDisplayLabel(MODEL.cores[e.fromCore])}</span>
      的 SyncSet @ <span class="mono">${e.fromT.toFixed(1)}μs</span>，虚线表示内部同步/等待；等待耗时 <span class="mono">${e.wait.toFixed(1)}μs</span></div>`;
  });
  outgoingSync.forEach((e) => {
    html += `<div class="sl-sync-item">▲ <b>SyncSet</b> · 向 <span class="mono">${laneDisplayLabel(MODEL.cores[e.toCore])}</span>
      发出信号 @ <span class="mono">${e.fromT.toFixed(1)}μs</span>（虚线）</div>`;
  });
  html += `</div>`;
  if (wait > 0) {
    html += `<div class="sl-callout">
      该任务实际计算仅 <b>${compute.toFixed(0)}μs</b>, 另有 <b>${wait.toFixed(0)}μs</b> 在等待同步。
      ${incomingSync.length ? '优先缩短上游 <b>' + laneDisplayLabel(MODEL.cores[incomingSync[0].fromCore]) + '</b> 的前序计算量。'

  }
  return `${html}</div>`;
}
