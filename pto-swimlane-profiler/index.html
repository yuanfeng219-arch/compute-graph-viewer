function blockGraphSpec(t) {
  const graph = CURRENT_RUN.blockGraph;
  if (!graph) return null;
  return { ...graph, selectedTaskId: t?.id || null };
}

function blockGraphEdgePath(source, target) {
  const x1 = source.x + Number(source.frame?.width || 190);
  const y1 = source.y + Number(source.frame?.height || source.frame?.minHeight || 72) / 2;
  const x2 = target.x;
  const y2 = target.y + Number(target.frame?.height || target.frame?.minHeight || 72) / 2;
  const bend = Math.max(36, Math.abs(x2 - x1) * 0.42);
  return `M${x1},${y1} C${x1 + bend},${y1} ${x2 - bend},${y2} ${x2},${y2}`;
}

function renderBlockGraph(t) {
  const helper = window.PtoPassIrGraphNodePattern;
  if (!helper || !blockGraphMount || !blockGraphTitle) return;
  const graph = blockGraphSpec(t);
  if (!graph) return;
  blockGraphTitle.textContent = graph.name;
  blockGraphTitle.title = `${graph.graphType} · leafHash ${graph.leafHash} · ${graph.provenance}`;
  blockGraphMount.innerHTML = '';
  blockGraphMount.style.width = `${graph.canvas.width}px`;
  blockGraphMount.style.height = `${graph.canvas.height}px`;
  blockGraphMount.dataset.leafHash = graph.leafHash;
  blockGraphMount.dataset.provenance = graph.provenance;

  const nodeById = Object.fromEntries(graph.nodes.map((node) => [node.id, node]));
  const edgeLayer = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  edgeLayer.setAttribute('class', 'sl-block-graph-edge-layer');
  edgeLayer.setAttribute('viewBox', `0 0 ${graph.canvas.width} ${graph.canvas.height}`);
  edgeLayer.setAttribute('width', String(graph.canvas.width));
  edgeLayer.setAttribute('height', String(graph.canvas.height));
  edgeLayer.setAttribute('aria-hidden', 'true');
  edgeLayer.innerHTML = `<defs><marker id="sl-block-graph-arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,4 L0,8 z" fill="var(--foreground-muted)"></path></marker></defs>`;
  graph.edges.forEach((edge) => {
    const source = nodeById[edge.from];
    const target = nodeById[edge.to];
    if (!source || !target) return;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('class', 'sl-block-graph-edge-line');
    path.setAttribute('d', blockGraphEdgePath(source, target));
    path.dataset.edgeId = edge.id;
    edgeLayer.appendChild(path);
  });
  blockGraphMount.appendChild(edgeLayer);

  graph.nodes.forEach((node) => {
    const slot = document.createElement('div');
    slot.className = 'sl-block-graph-node';
    slot.style.left = `${node.x}px`;
    slot.style.top = `${node.y}px`;
    const card = helper.buildNodeCardElement(node, {
      compact: true,
      selected: false,
    });
    card.addEventListener('click', (event) => {
      event.stopPropagation();
      blockGraphMount.querySelectorAll('.node-card.selected').forEach((item) => item.classList.remove('selected'));
      card.classList.add('selected');
    });
    slot.appendChild(card);
    blockGraphMount.appendChild(slot);
  });
}

function blockGraphIsOpen() {
  return Boolean(blockGraphView && !blockGraphView.hidden);
}

function renderSecondaryViewMode() {
  const graphMode = state.secondaryViewMode === 'graph';
  const comparisonMode = state.secondaryViewMode === 'comparison';
  if (blockGraphViewport) blockGraphViewport.hidden = !graphMode;
  if (compareSwimlaneView) {
    compareSwimlaneView.hidden = !comparisonMode;
    compareSwimlaneView.setAttribute('aria-hidden', String(!comparisonMode));
  }
}

function blockGraphGutter() {
  const previous = blockGraphView?.previousElementSibling;
  return previous?.classList.contains('pto-workbench-shell__split-gutter') ? previous : null;
}

function applyBlockGraphTransform() {
  if (!blockGraphStage) return;
  blockGraphStage.style.transform = `translate(${blockGraphViewState.x}px, ${blockGraphViewState.y}px) scale(${blockGraphViewState.scale})`;
}

function blockGraphContentSize() {
  return {
    width: Math.max(1, blockGraphMount?.offsetWidth || blockGraphMount?.scrollWidth || 1),
    height: Math.max(1, blockGraphMount?.offsetHeight || blockGraphMount?.scrollHeight || 1),
  };
}

function centerBlockGraph(scale = 1) {
  if (!blockGraphViewport || !blockGraphMount || !blockGraphIsOpen() || state.secondaryViewMode !== 'graph') return;
  const content = blockGraphContentSize();
  blockGraphViewState.scale = Math.max(0.12, Math.min(1.8, scale));
  blockGraphViewState.x = (blockGraphViewport.clientWidth - content.width * blockGraphViewState.scale) / 2;
  blockGraphViewState.y = (blockGraphViewport.clientHeight - content.height * blockGraphViewState.scale) / 2;
  applyBlockGraphTransform();
}

function fitBlockGraph() {
  if (!blockGraphViewport || !blockGraphMount || !blockGraphIsOpen() || state.secondaryViewMode !== 'graph') return;
  const content = blockGraphContentSize();
  const inset = 24;
  const availableWidth = Math.max(1, blockGraphViewport.clientWidth - inset * 2);
  const availableHeight = Math.max(1, blockGraphViewport.clientHeight - inset * 2);
  const scale = Math.max(0.12, Math.min(1.25, Math.min(
    availableWidth / content.width,
    availableHeight / content.height,
  )));
  centerBlockGraph(scale);
}

function zoomBlockGraph(nextScale, anchorX = null, anchorY = null) {
  if (!blockGraphViewport || !blockGraphIsOpen() || state.secondaryViewMode !== 'graph') return;
  const previousScale = blockGraphViewState.scale;
  const scale = Math.max(0.12, Math.min(1.8, nextScale));
  const x = Number.isFinite(anchorX) ? anchorX : blockGraphViewport.clientWidth / 2;
  const y = Number.isFinite(anchorY) ? anchorY : blockGraphViewport.clientHeight / 2;
  const worldX = (x - blockGraphViewState.x) / previousScale;
  const worldY = (y - blockGraphViewState.y) / previousScale;
  blockGraphViewState.scale = scale;
  blockGraphViewState.x = x - worldX * scale;
  blockGraphViewState.y = y - worldY * scale;
  applyBlockGraphTransform();
}

function setBlockGraphOpen(open) {
  if (!blockGraphView) return;
  if (!open) {
    state.secondaryViewMode = null;
    state.comparisonRunId = null;
    hideTimestampGuide();
  }
  renderSecondaryViewMode();
  blockGraphView.hidden = !open;
  blockGraphView.setAttribute('aria-hidden', String(!open));
  const gutter = blockGraphGutter();
  if (gutter) gutter.hidden = !open;
  window.requestAnimationFrame(() => {
    frameController?.refresh?.();
    layout();
    if (open && state.secondaryViewMode === 'graph') window.requestAnimationFrame(fitBlockGraph);
    if (open && state.secondaryViewMode === 'comparison') {
      window.requestAnimationFrame(() => {
        syncComparisonCanvases();
        compareBodyWrap.scrollLeft = bodyWrap.scrollLeft;
        compareLaneWrap.scrollTop = compareBodyWrap.scrollTop;
      });
    }
  });
}

function openBlockGraph(t) {
  if (!t || !blockGraphView) return;
  state.secondaryViewMode = 'graph';
  state.comparisonRunId = null;
  renderBlockGraph(t);
  setBlockGraphOpen(true);
}

function openRunComparison(runId) {
  if (!runId || runId === state.selectedRunId || !blockGraphView) return;
  const comparedRun = RUN_BY_ID[runId];
  if (!comparedRun) return;
  state.secondaryViewMode = 'comparison';
  state.comparisonRunId = runId;
  blockGraphTitle.textContent = `${comparedRun.id} · merged_swimlane`;
  setBlockGraphOpen(true);
}

function bindBlockGraphPanel() {
  setBlockGraphOpen(false);
  closeBlockGraph?.addEventListener('click', () => setBlockGraphOpen(false));
  blockGraphFit?.addEventListener('click', fitBlockGraph);
  blockGraphZoomOut?.addEventListener('click', () => zoomBlockGraph(blockGraphViewState.scale / 1.15));
  blockGraphZoomIn?.addEventListener('click', () => zoomBlockGraph(blockGraphViewState.scale * 1.15));

  if (blockGraphViewport) {
    blockGraphViewport.addEventListener('pointerdown', (event) => {
      if (event.button !== 0) return;
      if (event.target.closest('button, .node-card, .sl-block-graph-canvas-tools')) return;
      blockGraphViewState.dragging = true;
      blockGraphViewState.pointerId = event.pointerId;
      blockGraphViewState.startClientX = event.clientX;
      blockGraphViewState.startClientY = event.clientY;
      blockGraphViewState.startX = blockGraphViewState.x;
      blockGraphViewState.startY = blockGraphViewState.y;
      blockGraphViewport.classList.add('is-panning');
      blockGraphViewport.setPointerCapture?.(event.pointerId);
    });
    blockGraphViewport.addEventListener('pointermove', (event) => {
      if (!blockGraphViewState.dragging || event.pointerId !== blockGraphViewState.pointerId) return;
      blockGraphViewState.x = blockGraphViewState.startX + event.clientX - blockGraphViewState.startClientX;
      blockGraphViewState.y = blockGraphViewState.startY + event.clientY - blockGraphViewState.startClientY;
      applyBlockGraphTransform();
    });
    const stopPanning = (event) => {
      if (!blockGraphViewState.dragging || event.pointerId !== blockGraphViewState.pointerId) return;
      blockGraphViewState.dragging = false;
      blockGraphViewState.pointerId = null;
      blockGraphViewport.classList.remove('is-panning');
      blockGraphViewport.releasePointerCapture?.(event.pointerId);
    };
    blockGraphViewport.addEventListener('pointerup', stopPanning);
    blockGraphViewport.addEventListener('pointercancel', stopPanning);
    blockGraphViewport.addEventListener('click', (event) => {
      if (event.target.closest('button, .node-card, .sl-block-graph-canvas-tools')) return;
      blockGraphMount.querySelectorAll('.node-card.selected').forEach((item) => item.classList.remove('selected'));
    });
    blockGraphViewport.addEventListener('wheel', (event) => {
      event.preventDefault();
      const rect = blockGraphViewport.getBoundingClientRect();
      const factor = event.deltaY < 0 ? 1.1 : 1 / 1.1;
      zoomBlockGraph(
        blockGraphViewState.scale * factor,
        event.clientX - rect.left,
        event.clientY - rect.top,
      );
    }, { passive: false });
    blockGraphViewport.addEventListener('dblclick', fitBlockGraph);
    blockGraphViewport.addEventListener('keydown', (event) => {
      if (event.key === '+' || event.key === '=') zoomBlockGraph(blockGraphViewState.scale * 1.15);
      else if (event.key === '-') zoomBlockGraph(blockGraphViewState.scale / 1.15);
      else if (event.key.toLowerCase() === 'f') fitBlockGraph();
      else return;
      event.preventDefault();
    });
  }

  if ('ResizeObserver' in window && blockGraphViewport) {
    graphResizeObserver = new ResizeObserver(() => {
      if (blockGraphIsOpen() && state.secondaryViewMode === 'graph') window.requestAnimationFrame(fitBlockGraph);
    });
    graphResizeObserver.observe(blockGraphViewport);
  }
  frameEl.addEventListener('pto-ide-bottom-panel-change', () => {
    window.requestAnimationFrame(() => {
      layout();
      if (blockGraphIsOpen() && state.secondaryViewMode === 'graph') window.requestAnimationFrame(fitBlockGraph);
      if (blockGraphIsOpen() && state.secondaryViewMode === 'comparison') window.requestAnimationFrame(syncComparisonCanvases);
    });
  });
}

function bindInspector() {
  const body = document.getElementById('inspBody');
  body.querySelectorAll('.sl-crumb-item').forEach((el) => {
    el.addEventListener('click', () => {
      const nav = el.dataset.nav;
      if (nav === 'overview') goOverview();
      else if (nav === 'group' && state.selGroup != null) selectGroup(state.selGroup);
      else if (nav === 'wrap' && state.selWrap != null) selectWrap(state.selWrap);
    });
  });
  body.querySelectorAll('[data-object-nav]').forEach((el) => {
    el.addEventListener('click', () => {
      if (el.dataset.objectNav === 'group' && state.selGroup != null) selectGroup(state.selGroup);
    });
  });
  body.querySelectorAll('[data-group]').forEach((el) => {
    el.addEventListener('click', () => selectGroup(Number(el.dataset.group)));
  });
  body.querySelectorAll('[data-wrap]').forEach((el) => {
    el.addEventListener('click', () => selectWrap(Number(el.dataset.wrap)));
  });
  body.querySelectorAll('[data-report-tab]').forEach((el) => {
    el.addEventListener('click', () => {
      state.reportTab = el.dataset.reportTab;
      renderInspector();
      document.getElementById('inspBody').scrollTop = 0;
    });
  });
  body.querySelectorAll('[data-task-report-tab]').forEach((el) => {
    el.addEventListener('click', () => {
      state.taskReportTab = el.dataset.taskReportTab;
      renderInspector();
      document.getElementById('inspBody').scrollTop = 0;
    });
  });
  body.querySelectorAll('[data-pmu-group]').forEach((el) => {
    el.addEventListener('click', () => {
      state.pmuGroup = Number(el.dataset.pmuGroup);
      renderInspector();
      document.getElementById('inspBody').scrollTop = 0;
    });
  });
  body.querySelectorAll('[data-task-id]').forEach((el) => {
    el.addEventListener('click', () => {
      const task = taskById[el.dataset.taskId];
      if (!task) return;
      selectTask(task);
      scrollTaskIntoView(task);
    });
  });
  const returnDefault = body.querySelector('[data-return-default]');
  if (returnDefault) returnDefault.addEventListener('click', () => {
    state.reportTab = 'overview';
    state.taskReportTab = 'overview';
    goOverview();
  });
  const returnMixOverview = body.querySelector('[data-return-mix-overview]');
  if (returnMixOverview) returnMixOverview.addEventListener('click', () => {
    state.reportTab = 'overview';
    goOverview();
  });
  const viewBlockGraph = body.querySelector('[data-view-block-graph]');
  if (viewBlockGraph) viewBlockGraph.addEventListener('click', () => openBlockGraph(state.selTask));
  const drill = body.querySelector('[data-drill="bottleneck"]');
  if (drill) drill.addEventListener('click', () => selectWrap(topTasks()[0].task.wrap));
}

function refreshFrameLayout() {
  window.requestAnimationFrame(() => {
    frameController?.refresh?.();
    layout();
  });
}

function bindTopPanelActions() {
  const railExplorerToggle = frameEl.querySelector('[data-ide-toggle="explorer"]');
  const terminalToggle = frameEl.querySelector('[data-ide-toggle="terminal"]');
  const explorerIsOpen = () => railExplorerToggle?.getAttribute('aria-expanded') !== 'false';
  const setExplorerOpen = (open) => {
    if (railExplorerToggle && explorerIsOpen() !== open) railExplorerToggle.click();
  };
  const setInspectorOpen = (open) => {
    if (!topInspectorToggle || !inspectorPane) return;
    inspectorPane.hidden = !open;
    const leftGutter = inspectorPane.previousElementSibling;
    if (leftGutter?.classList.contains('pto-workbench-shell__split-gutter')) {
      leftGutter.hidden = !open;
    }
    topInspectorToggle.classList.toggle('is-selected', open);
    topInspectorToggle.setAttribute('aria-expanded', String(open));
    topInspectorToggle.setAttribute('aria-pressed', String(open));
    refreshFrameLayout();
  };

  if (topExplorerToggle && railExplorerToggle) {
    const syncExplorerState = () => {
      const expanded = explorerIsOpen();
      topExplorerToggle.classList.toggle('is-selected', expanded);
      topExplorerToggle.setAttribute('aria-expanded', String(expanded));
      topExplorerToggle.setAttribute('aria-pressed', String(expanded));
    };
    topExplorerToggle.addEventListener('click', () => railExplorerToggle.click());
    new MutationObserver(syncExplorerState).observe(railExplorerToggle, {
      attributes: true,
      attributeFilter: ['aria-expanded', 'aria-pressed', 'class'],
    });
    syncExplorerState();
  }

  if (topInspectorToggle && inspectorPane) {
    topInspectorToggle.addEventListener('click', () => setInspectorOpen(inspectorPane.hidden));
    setInspectorOpen(!inspectorPane.hidden);
  }

  if (railTerminalToggle && terminalToggle) {
    const syncTerminalState = () => {
      const expanded = terminalToggle.getAttribute('aria-expanded') === 'true';
      railTerminalToggle.classList.toggle('is-selected', expanded);
      railTerminalToggle.setAttribute('aria-expanded', String(expanded));
      railTerminalToggle.setAttribute('aria-pressed', String(expanded));
    };
    railTerminalToggle.addEventListener('click', () => terminalToggle.click());
    new MutationObserver(syncTerminalState).observe(terminalToggle, {
      attributes: true,
      attributeFilter: ['aria-expanded', 'aria-pressed', 'class'],
    });
    syncTerminalState();
  }

  return {
    explorerIsOpen,
    setExplorerOpen,
    inspectorIsOpen: () => !inspectorPane.hidden,
    setInspectorOpen,
  };
}

function applyResponsivePaneState() {
  if (!panelActions) return;
  const width = frameEl.getBoundingClientRect().width;
  const nextMode = width <= 840 ? 'compact' : width <= 1180 ? 'medium' : 'wide';
  if (nextMode === responsivePaneMode) return;
  responsivePaneMode = nextMode;

  if (nextMode === 'compact') {
    if (panelActions.explorerIsOpen()) {
      autoCollapsedExplorer = true;
      panelActions.setExplorerOpen(false);
    }
    if (panelActions.inspectorIsOpen()) {
      autoCollapsedInspector = true;
      panelActions.setInspectorOpen(false);
    }
    return;
  }

  if (nextMode === 'medium') {
    if (panelActions.explorerIsOpen()) {
      autoCollapsedExplorer = true;
      panelActions.setExplorerOpen(false);
    }
    if (autoCollapsedInspector) {
      panelActions.setInspectorOpen(true);
      autoCollapsedInspector = false;
    }
    return;
  }

  if (autoCollapsedExplorer) {
    panelActions.setExplorerOpen(true);
    autoCollapsedExplorer = false;
  }
  if (autoCollapsedInspector) {
    panelActions.setInspectorOpen(true);
    autoCollapsedInspector = false;
  }
}

/* ============================================================
   10. 启动
   ============================================================ */
function init() {
  document.getElementById('projectName').textContent = CURRENT_RUN.projectName;
  const initialFrameWidth = frameEl.getBoundingClientRect().width;
  if (initialFrameWidth <= 1180) {
    frameEl.dataset.explorerCollapsed = 'true';
    document.getElementById('scenarioPane').hidden = true;
    autoCollapsedExplorer = true;
  }
  if (initialFrameWidth <= 840) {
    inspectorPane.hidden = true;
    autoCollapsedInspector = true;
  }
  frameController = window.PtoIdeFrame?.init(frameEl, {
    splitOptions: {
      default: {
        onResize: () => window.requestAnimationFrame(() => layout()),
      },
    },
  });
  buildOrder();
  renderRunHistory();
  bindRunHistoryDismiss();
  layout();
  renderInspector();
  panelActions = bindTopPanelActions();
  bindBlockGraphPanel();
  initSharedCanvasTooltip();
  applyResponsivePaneState();
  if ('ResizeObserver' in window && canvasPane) {
    canvasResizeObserver = new ResizeObserver(() => window.requestAnimationFrame(() => layout()));
    canvasResizeObserver.observe(canvasPane);
    frameResizeObserver = new ResizeObserver(() => window.requestAnimationFrame(applyResponsivePaneState));
    frameResizeObserver.observe(frameEl);
  }
}
init();
</script>
