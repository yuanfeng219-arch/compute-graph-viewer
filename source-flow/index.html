      // ── Pipeline Column View ──────────────────────────────────────────────
      // Public entry: render the vertical pipeline scene with AntV X6.
      function renderPipelineColumnView(originalGraph, nodesLayer, edgesSvg, colorMap, options = {}) {
        return renderPipelineColumnViewAntv(originalGraph, nodesLayer, edgesSvg, colorMap, options);
        const graph = buildPipelineOpOnlyGraph(originalGraph);
        const { nodes, edges } = graph;
        const nodeById = new Map(nodes.map(n => [n.id, n]));
        const opNodes = nodes.filter(n => n.type === 'op');
        const stubNodes = nodes.filter(n => n.type === 'stub');

        // ── 1. Build topology maps for the (potentially transformed) graph ──
        const succ = new Map(nodes.map(n => [n.id, []]));
        const pred = new Map(nodes.map(n => [n.id, []]));
        for (const e of edges) {
          succ.get(e.source)?.push(e.target);
          pred.get(e.target)?.push(e.source);
        }

        // ── 2. Assign nodes to pipelines ──
        const PIPELINE_ORDER = ['Key', 'Query', 'Weight'];
        const nodePipeline = new Map();

        const findPipeline = (nodeId) => {
          const n = nodeById.get(nodeId);
          if (!n) return null;
          if (n.type === 'stub') return n.data?.pipelineHint || null;
          if (n.type === 'op') {
            const parsed = parsePipelineLabel(getSemanticKey(n));
            if (parsed && parsed.pipeline !== 'Prolog') return parsed.pipeline;
          }
          return null;
        };

        for (const n of opNodes) {
          const p = findPipeline(n.id);
          if (p) nodePipeline.set(n.id, p);
        }

        // Assign nodes without explicit pipeline to nearest semantic lane.
        for (const n of opNodes) {
          if (nodePipeline.has(n.id)) continue;

          let found = null;
          const visited = new Set([n.id]);
          const queue = [...(succ.get(n.id) || [])];
          while (queue.length && !found) {
            const id = queue.shift();
            if (visited.has(id)) continue;
            visited.add(id);
            const p = findPipeline(id) || nodePipeline.get(id);
            if (p) { found = p; break; }
            queue.push(...(succ.get(id) || []));
          }
          if (!found) {
            const q2 = [...(pred.get(n.id) || [])];
            while (q2.length && !found) {
              const id = q2.shift();
              if (visited.has(id)) continue;
              visited.add(id);
              const p = findPipeline(id) || nodePipeline.get(id);
              if (p) { found = p; break; }
              q2.push(...(pred.get(id) || []));
            }
          }
          if (found) nodePipeline.set(n.id, found);
        }

        const discoveredPipelines = [...new Set(opNodes.map(n => nodePipeline.get(n.id)).filter(Boolean))];
        const fallbackPipeline = discoveredPipelines[0] || 'Main';
        for (const n of opNodes) {
          if (!nodePipeline.has(n.id)) nodePipeline.set(n.id, fallbackPipeline);
        }
        for (const n of stubNodes) {
          if (nodePipeline.has(n.id)) continue;
          const neighbors = [...(pred.get(n.id) || []), ...(succ.get(n.id) || [])];
          const found = neighbors.map(id => nodePipeline.get(id)).find(Boolean) || fallbackPipeline;
          nodePipeline.set(n.id, found);
        }

        const nodeCol = nodePipeline;

        // ── 4. Topological sort (ops only) ──
        const inDegree = new Map(opNodes.map(n => [n.id, 0]));
        for (const e of edges) {
          if (inDegree.has(e.source) && inDegree.has(e.target)) {
            inDegree.set(e.target, (inDegree.get(e.target) || 0) + 1);
          }
        }
        const topoOrder = [];
        const topoQueue = opNodes
          .filter(n => (inDegree.get(n.id) ?? 0) === 0)
          .map(n => n.id);
        const topoVisited = new Set(topoQueue);
        while (topoQueue.length) {
          const id = topoQueue.shift();
          topoOrder.push(id);
          for (const s of (succ.get(id) || [])) {
            if (!inDegree.has(s)) continue;
            const deg = (inDegree.get(s) || 1) - 1;
            inDegree.set(s, deg);
            if (deg <= 0 && !topoVisited.has(s)) { topoVisited.add(s); topoQueue.push(s); }
          }
        }
        for (const n of opNodes) {
          if (!topoVisited.has(n.id)) topoOrder.push(n.id);
        }

        // ── 5. Layout constants ──
        const activePipelines = PIPELINE_ORDER.filter(p => discoveredPipelines.includes(p));
        discoveredPipelines.forEach(p => {
          if (!activePipelines.includes(p)) activePipelines.push(p);
        });
        if (!activePipelines.length) activePipelines.push(fallbackPipeline);
        const COL_W = 232;
        const COL_GAP = 72;
        const NODE_W = 196;
        const NODE_V_GAP = 20;
        const HEADER_H = 46;
        const PAD_LEFT = 44;
        const PAD_RIGHT = 44;
        const PAD_BOTTOM = 56;
        const STUB_W = 2;
        const STUB_H = 14;
        const STUB_OFFSET = 34;

        const colX = new Map(); // pipeline → left edge X of column
        activePipelines.forEach((p, i) => {
          colX.set(p, PAD_LEFT + i * (COL_W + COL_GAP));
        });

        // ── 6. Position op nodes per column in topo order ──
        const posMap = new Map();
        const colCursor = new Map(activePipelines.map(p => [p, HEADER_H + 18]));

        // We'll render nodes off-screen first to measure heights, then position them
        const probe = document.createElement('div');
        probe.style.cssText = 'position:fixed;top:-9999px;left:-9999px;visibility:hidden;pointer-events:none;';
        probe.style.width = NODE_W + 'px';
        document.body.appendChild(probe);

        const measuredH = new Map();

        for (const id of topoOrder) {
          const n = nodeById.get(id);
          if (!n) continue;
          const col = nodeCol.get(id);
          if (!col || !colX.has(col)) continue;

          // Measure height
          if (!measuredH.has(id)) {
            const dummy = document.createElement('div');
            dummy.className = `node-card node-card-${n.type}`;
            dummy.dataset.compact = '';
            dummy.style.width = NODE_W + 'px';
            dummy.innerHTML = buildCompactOpCard(n);
            probe.appendChild(dummy);
            const h = dummy.getBoundingClientRect().height || 44;
            measuredH.set(id, Math.max(h, 30));
            probe.innerHTML = '';
          }

          const h = measuredH.get(id) || 44;
          const x = colX.get(col) + (COL_W - NODE_W) / 2;
          const y = colCursor.get(col) || HEADER_H;
          posMap.set(id, { x, y, w: NODE_W, h });
          colCursor.set(col, y + h + NODE_V_GAP);
        }
        document.body.removeChild(probe);

        // ── 7. Position hidden boundary stubs near the connected op ──
        for (const n of stubNodes) {
          const pipeline = nodeCol.get(n.id) || fallbackPipeline;
          const centerX = (colX.get(pipeline) || PAD_LEFT) + COL_W / 2;
          const upstreamOpId = (pred.get(n.id) || []).find(id => nodeById.get(id)?.type === 'op');
          const downstreamOpId = (succ.get(n.id) || []).find(id => nodeById.get(id)?.type === 'op');
          const sourcePos = upstreamOpId ? posMap.get(upstreamOpId) : null;
          const targetPos = downstreamOpId ? posMap.get(downstreamOpId) : null;

          let y = HEADER_H - STUB_OFFSET;
          if (n.data?.stubKind === 'input' && targetPos) {
            y = Math.max(18, targetPos.y - STUB_OFFSET);
          } else if (n.data?.stubKind === 'output' && sourcePos) {
            y = sourcePos.y + sourcePos.h + STUB_OFFSET - STUB_H;
          }

          posMap.set(n.id, { x: centerX - STUB_W / 2, y, w: STUB_W, h: STUB_H });
        }

        // ── 8. Canvas size ──
        const positionedNodes = [...posMap.values()];
        const maxBottom = positionedNodes.length
          ? Math.max(...positionedNodes.map(pos => pos.y + pos.h))
          : HEADER_H + PAD_BOTTOM;
        const canvasW = PAD_LEFT + activePipelines.length * COL_W + Math.max(activePipelines.length - 1, 0) * COL_GAP + PAD_RIGHT;
        const canvasH = maxBottom + PAD_BOTTOM;

        // ── 9. Clear + setup SVG ──
        nodesLayer.innerHTML = '';
        nodesLayer.style.position = 'relative';

        const svgNs = 'http://www.w3.org/2000/svg';
        edgesSvg.setAttribute('width', canvasW);
        edgesSvg.setAttribute('height', canvasH);
        while (edgesSvg.children.length > 1) edgesSvg.removeChild(edgesSvg.lastChild);

        const edgeGroup = document.createElementNS(svgNs, 'g');
        edgeGroup.setAttribute('class', 'edges-group');

        // Spine lines per pipeline
        for (const p of activePipelines) {
          const cx = colX.get(p) + COL_W / 2;
          const maxY = colCursor.get(p) || HEADER_H;
          const line = document.createElementNS(svgNs, 'line');
          line.setAttribute('x1', cx); line.setAttribute('y1', HEADER_H - 6);
          line.setAttribute('x2', cx); line.setAttribute('y2', maxY);
          line.setAttribute('stroke', 'rgba(255,255,255,0.08)');
          line.setAttribute('stroke-width', '1');
          line.setAttribute('stroke-dasharray', '4 4');
          edgeGroup.appendChild(line);
        }

        // Edges as elbow connectors
        for (const e of edges) {
          const sp = posMap.get(e.source);
          const tp = posMap.get(e.target);
          if (!sp || !tp) continue;

          const x1 = sp.x + sp.w / 2;
          const y1 = sp.y + sp.h;
          const x2 = tp.x + tp.w / 2;
          const y2 = tp.y;

          const srcNode = nodeById.get(e.source);
          let d;
          let midX;
          let midY;
          if (Math.abs(x1 - x2) < 4) {
            d = `M ${x1} ${y1} L ${x2} ${y2}`;
            midX = x1;
            midY = (y1 + y2) / 2;
          } else {
            const elbowY = Math.min(y1 + 20, (y1 + y2) / 2);
            d = `M ${x1} ${y1} L ${x1} ${elbowY} L ${x2} ${elbowY} L ${x2} ${y2}`;
            midX = (x1 + x2) / 2;
            midY = elbowY;
          }

          const path = document.createElementNS(svgNs, 'path');
          path.setAttribute('d', d);
          path.setAttribute('fill', 'none');
          path.setAttribute('data-source', e.source);
          path.setAttribute('data-target', e.target);
          path.setAttribute('class', srcNode?.type === 'op' ? 'edge edge-op' : 'edge edge-default');
          edgeGroup.appendChild(path);

          if (e.tensorLabels?.length) {
            const labelGroup = document.createElement('div');
            labelGroup.className = 'vt-edge-label-group';
            labelGroup.style.left = `${midX}px`;
            labelGroup.style.top = `${midY}px`;
            e.tensorLabels.forEach(label => {
              const item = document.createElement('div');
              item.className = 'vt-edge-label-item';
              item.textContent = label.name + (label.shape ? ` ${label.shape}` : '');
              labelGroup.appendChild(item);
            });
            nodesLayer.appendChild(labelGroup);
          }
        }
        edgesSvg.appendChild(edgeGroup);

        // ── 10. Pipeline header labels ──
        for (const p of activePipelines) {
          const cx = colX.get(p) + COL_W / 2;
          const repOp = nodes.find(n => nodePipeline.get(n.id) === p);
          const labelColor = repOp ? (colorMap?.get(repOp.id) || '#aaa') : '#aaa';

          const labelEl = document.createElement('div');
          labelEl.style.cssText = `position:absolute;left:${colX.get(p)}px;top:8px;width:${COL_W}px;`
            + `text-align:center;font-size:12px;font-weight:600;font-family:var(--text-mono);`
            + `color:${labelColor};letter-spacing:.06em;pointer-events:none;text-transform:uppercase;`;
          labelEl.textContent = p;
          nodesLayer.appendChild(labelEl);
        }

        // ── 11. Render all node pills ──
        for (const [id, pos] of posMap) {
          const n = nodeById.get(id);
          if (!n || n.type !== 'op') continue;

          const el = document.createElement('div');
          el.style.cssText = `position:absolute;left:${pos.x}px;top:${pos.y}px;width:${pos.w}px;`;
          el.dataset.nodeId = id;
          el.dataset.compact = '';
          el.className = `node-card node-card-${n.type}`;

          const color = colorMap?.get(id) ?? null;
          if (color) el.style.setProperty('--node-accent', color);

          el.innerHTML = buildCompactOpCard(n);

          el.addEventListener('click', ev => {
            ev.stopPropagation();
            handleNodeClick(n, el);
          });

          nodesLayer.appendChild(el);
        }

        return { canvasW, canvasH };
      }
      function pipelineAwareLayout(graph, layoutResult, options = {}) {
        const { positions, layerNodes } = layoutResult;
        const { nodes, edges } = graph;
        const compact = !!options.compact;
        const laneH = compact ? 220 : 440;

        const pred = new Map(nodes.map(n => [n.id, []]));
        const succ = new Map(nodes.map(n => [n.id, []]));
        for (const e of edges) {
          pred.get(e.target)?.push(e.source);
          succ.get(e.source)?.push(e.target);
        }

        const PIPELINE_ORDER = ['Key', 'Query', 'Weight'];
        const nodePipeline = new Map();

        for (const n of nodes) {
          if (n.type !== 'op') continue;
          const parsed = parsePipelineLabel(getSemanticKey(n));
          if (parsed && parsed.pipeline !== 'Prolog') nodePipeline.set(n.id, parsed.pipeline);
        }

        for (const n of nodes) {
          if (n.type !== 'op' || nodePipeline.has(n.id)) continue;
          const parsed = parsePipelineLabel(getSemanticKey(n));
          if (parsed?.pipeline === 'Prolog') {
            const visited = new Set([n.id]);
            const queue = [...(succ.get(n.id) || [])];
            let found = null;
            while (queue.length && !found) {
              const id = queue.shift();
              if (visited.has(id)) continue;
              visited.add(id);
              if (nodePipeline.has(id)) { found = nodePipeline.get(id); break; }
              queue.push(...(succ.get(id) || []));
            }
            if (found) nodePipeline.set(n.id, found);
          }
        }

        const activePipelines = PIPELINE_ORDER.filter(p => [...nodePipeline.values()].includes(p));
        const pipelineLaneY = new Map(activePipelines.map((p, i) => [p, PAD + i * laneH]));

        const newY = new Map();
        for (const n of nodes) {
          if (n.type !== 'op') continue;
          const lane = nodePipeline.get(n.id);
          if (lane) {
            newY.set(n.id, pipelineLaneY.get(lane));
          }
        }

        function collectOpYs(nodeId) {
          const node = nodes.find(n => n.id === nodeId);
          if (!node) return [];

          // 对于RESHAPE等MEMORY操作，需要找到它的目标pipeline
          if (node.type === 'op' && getSemanticKey(node) === 'cat:MEMORY') {
            const visited = new Set([nodeId]);
            const queue = [...(succ.get(nodeId) || [])];
            let targetLane = null;

            while (queue.length > 0 && !targetLane) {
              const id = queue.shift();
              if (visited.has(id)) continue;
              visited.add(id);

              if (nodePipeline.has(id)) {
                targetLane = nodePipeline.get(id);
                break;
              }
              queue.push(...(succ.get(id) || []));
            }

            if (targetLane && pipelineLaneY.has(targetLane)) {
              return [pipelineLaneY.get(targetLane)];
            }
          }

          // 默认策略：优先下游操作，然后上游操作
          // Priority 1: direct successor ops (bias downstream)
          const succYs = (succ.get(nodeId) || []).filter(id => newY.has(id)).map(id => newY.get(id));
          if (succYs.length) return succYs;

          // Priority 2: direct predecessor ops
          const predYs = (pred.get(nodeId) || []).filter(id => newY.has(id)).map(id => newY.get(id));
          if (predYs.length) return predYs;

          // Priority 3: 2-hop BFS
          const ys = [];
          const neighbors = [...(succ.get(nodeId) || []), ...(pred.get(nodeId) || [])];
          for (const nb of neighbors) {
            for (const n2 of [...(succ.get(nb) || []), ...(pred.get(nb) || [])]) {
              if (newY.has(n2)) ys.push(newY.get(n2));
            }
          }
          return ys;
        }

        // 为所有非op节点（以及没被分配的cat:MEMORY操作）计算Y坐标
        for (const n of nodes) {
          if (n.type === 'op' && getSemanticKey(n) !== 'cat:MEMORY') continue;
          if (newY.has(n.id)) continue;

          const ys = collectOpYs(n.id);
          if (ys.length > 0) {
            // 使用平均值，但偏向于最小值（更靠近顶部）
            const avgY = ys.reduce((a, b) => a + b, 0) / ys.length;
            const minY = Math.min(...ys);
            // 偏向最小值，但不要过于极端
            newY.set(n.id, Math.min(avgY, minY + 20));
          } else {
            newY.set(n.id, positions.get(n.id)?.y ?? PAD);
          }
        }

        // Refined collision resolution:
        // Instead of forcing everything down by cursor, we respect the calculated newY.
        // We only nudge nodes down if they literally overlap, and we try to keep pipeline nodes 
        // exactly on their lane if possible.
        // Refined collision resolution:
        // Separate layer nodes into "Strict" (pipeline specific ops or MEMORY ops specifically aligned)
        // and "Flexible" (tensors, outcast, or miscellaneous ops).
        for (const ids of layerNodes) {
          const strictNodes = [];
          const flexNodes = [];

          for (const id of ids) {
            const node = nodes.find(n => n.id === id);
            const isPipeline = nodePipeline.has(id);
            const isMemory = node?.type === 'op' && getSemanticKey(node) === 'cat:MEMORY';
            if (isPipeline || isMemory) {
              strictNodes.push(id);
            } else {
              flexNodes.push(id);
            }
          }

          strictNodes.sort((a, b) => (newY.get(a) ?? 0) - (newY.get(b) ?? 0));
          flexNodes.sort((a, b) => (newY.get(a) ?? 0) - (newY.get(b) ?? 0));

          const occupiedBlocks = [];

          // 1. Lock strict nodes 
          for (const id of strictNodes) {
            const h = positions.get(id)?.h ?? 44;
            let y = newY.get(id) ?? PAD;

            // Prevent strict nodes from overlapping each other by nudging slightly if needed
            for (const block of occupiedBlocks) {
              if (y < block.end && y + h > block.start) {
                y = block.end + 8;
              }
            }

            newY.set(id, y);
            occupiedBlocks.push({ start: y, end: y + h, id });
            occupiedBlocks.sort((a, b) => a.start - b.start);
          }

          // 2. Flow flex nodes around strict nodes
          for (const id of flexNodes) {
            const h = positions.get(id)?.h ?? 44;
            let y = newY.get(id) ?? PAD;

            // Push y down until it clears all occupied blocks
            let conflict = true;
            while (conflict) {
              conflict = false;
              for (const block of occupiedBlocks) {
                // overlap check
                if (y < block.end && y + h > block.start) {
                  y = block.end + 8;
                  conflict = true;
                  break;
                }
              }
            }

            newY.set(id, y);
            occupiedBlocks.push({ start: y, end: y + h, id });
            occupiedBlocks.sort((a, b) => a.start - b.start);
          }
        }

        const newPositions = new Map(positions);
        for (const [id, y] of newY) {
          const pos = newPositions.get(id);
          if (pos) newPositions.set(id, { ...pos, y });
        }
        const maxBottom = Math.max(...[...newPositions.values()].map(p => p.y + p.h));
        return { ...layoutResult, positions: newPositions, canvasH: maxBottom + PAD };
      }

    })();
  </script>
