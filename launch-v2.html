<style>
* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
}

html {
  height: auto;
  overflow-x: hidden;
  overflow-y: auto;
  scrollbar-color: color-mix(in srgb, var(--foreground-muted) 52%, transparent) transparent;
  scrollbar-width: thin;
}

body {
  min-width: 320px;
  height: auto;
  min-height: 100vh;
  overflow-x: hidden;
  overflow-y: auto;
  display: block;
  position: relative;
  isolation: isolate;
  background: #ffffff;
  background-attachment: fixed;
  color: var(--foreground);
  font-family: var(--font-sans);
}
* {
  scrollbar-color: color-mix(in srgb, var(--foreground-muted) 52%, transparent) transparent;
  scrollbar-width: thin;
}
*::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
*::-webkit-scrollbar-track {
  background: transparent;
}
*::-webkit-scrollbar-thumb {
  min-height: 32px;
  border: 2px solid transparent;
  border-radius: var(--radius-pill);
  background: color-mix(in srgb, var(--foreground-muted) 56%, transparent);
  background-clip: content-box;
}
*::-webkit-scrollbar-thumb:hover {
  background: color-mix(in srgb, var(--foreground-secondary) 62%, transparent);
  background-clip: content-box;
}
*::-webkit-scrollbar-corner {
  background: transparent;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background: url("assets/bg.png") left top / auto 100vh no-repeat;
  opacity: 0.15;
  transform: scaleX(-1);
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 12% 6%, rgba(247, 183, 219, 0.41) 0, rgba(247, 183, 219, 0) 34%),
    radial-gradient(circle at 88% 8%, rgba(247, 191, 132, 0.34) 0, rgba(247, 191, 132, 0) 30%),
    radial-gradient(circle at 46% 0%, rgba(189, 169, 232, 0.32) 0, rgba(189, 169, 232, 0) 34%),
    linear-gradient(180deg, #f8efff 0%, #eef4ff 47%, #e9eef8 100%);
  opacity: 0.2;
}

a {
  color: inherit;
  text-decoration: none;
}

button,
input,
select {
  font: inherit;
}

.svg-icon {
  width: 18px;
  height: 18px;
  display: inline-block;
  flex: 0 0 auto;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.cann-app {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.cann-topbar {
  position: sticky;
  top: 0;
  z-index: var(--z-modal);
  background: rgba(255, 255, 255, 0.5);
  border-bottom: 1px solid var(--border-subtle);
  backdrop-filter: blur(16px);
}

.cann-primary {
  height: 62px;
  padding: 0 32px;
  display: grid;
  grid-template-columns: minmax(260px, 1fr) minmax(320px, 520px) minmax(260px, 1fr);
  align-items: center;
  gap: var(--space-6);
  overflow: hidden;
  transition:
    height var(--duration-base) var(--easing-default),
    padding var(--duration-base) var(--easing-default),
    opacity var(--duration-fast) var(--easing-default),
    transform var(--duration-base) var(--easing-default);
}

.cann-topbar.is-collapsed .cann-primary {
  height: 0;
  padding-top: 0;
  padding-bottom: 0;
  opacity: 0;
  pointer-events: none;
  transform: translateY(-8px);
}

.cann-brand,
.cann-actions,
.cann-nav {
  display: flex;
  align-items: center;
}

.cann-brand {
  min-width: 0;
  gap: var(--space-3);
}

.cann-actions {
  justify-content: flex-end;
  gap: var(--space-3);
  min-width: 0;
}

.cann-menu {
  width: 36px;
  height: 36px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 0;
  border-radius: var(--radius-md);
  color: var(--foreground-secondary);
  background: transparent;
  cursor: pointer;
}

.cann-logo {
  width: 84px;
  height: 32px;
  flex: 0 0 auto;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  overflow: visible;
}

.cann-logo img {
  width: 84px;
  height: 32px;
  display: block;
}

.cann-name {
  color: var(--foreground);
  font-size: 19px;
  font-weight: 700;
  line-height: 1;
  white-space: nowrap;
}

.follow-pill {
  height: 32px;
  padding: 0 13px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-default);
  background: var(--surface-1);
  color: var(--foreground-secondary);
  font-size: 13px;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
}

.global-search {
  min-width: 0;
  height: 38px;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-pill);
  background: color-mix(in srgb, var(--surface-1) 88%, var(--background));
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: 0 16px;
  color: var(--foreground-muted);
}

.search-icon {
  width: 17px;
  height: 17px;
}

.global-search input {
  min-width: 0;
  width: 100%;
  border: 0;
  outline: 0;
  background: transparent;
  color: var(--foreground);
}

.global-search input::placeholder {
  color: var(--foreground-muted);
}

.create-btn {
  min-width: 130px;
  border-radius: var(--radius-pill);
}

.bell-btn,
.avatar-btn {
  position: relative;
  width: 36px;
  height: 36px;
  border: 0;
  border-radius: var(--radius-pill);
  background: transparent;
  color: var(--foreground-secondary);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.notify-count {
  position: absolute;
  top: 2px;
  right: -1px;
  min-width: 22px;
  height: 18px;
  padding: 0 5px;
  border-radius: var(--radius-pill);
  background: var(--danger);
  color: var(--primary-foreground);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
}

.avatar-btn {
  background:
    radial-gradient(circle at 50% 42%, color-mix(in srgb, var(--warning) 28%, white) 0 32%, transparent 34%),
    color-mix(in srgb, var(--warning) 18%, var(--surface-1));
  color: color-mix(in srgb, var(--warning) 70%, var(--foreground));
}

.cann-nav-wrap {
  height: 58px;
  padding: 0 132px;
  display: flex;
  align-items: center;
}

.cann-nav {
  height: 100%;
  gap: 28px;
}

.cann-nav-link {
  height: 100%;
  display: inline-flex;
  align-items: center;
  gap: 9px;
  position: relative;
  color: var(--foreground-secondary);
  font-size: 15px;
  font-weight: 700;
  white-space: nowrap;
}

.cann-nav-link.is-active {
  color: var(--foreground);
}

.cann-nav-link.is-active::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 3px;
  border-radius: 0;
  background: var(--foreground);
}

.nav-icon {
  color: var(--foreground-disabled);
  width: 17px;
  height: 17px;
}

.cann-nav-link.is-active .nav-icon,
.cann-nav-link:first-child .nav-icon {
  color: var(--danger);
}

.count-badge {
  min-width: 23px;
  height: 20px;
  padding: 0 7px;
  border-radius: var(--radius-sm);
  background: var(--surface-3);
  color: var(--foreground-secondary);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
}

.page-shell {
  width: min(1680px, calc(100vw - 96px));
  margin: 0 auto;
  padding: 22px 0 28px;
  display: grid;
  grid-template-columns: 230px minmax(0, 1fr);
  gap: 32px;
}

.side-nav {
  position: sticky;
  top: 136px;
  max-height: calc(100vh - 92px);
  overflow: auto;
  align-self: start;
  padding-top: 18px;
  transition: top var(--duration-base) var(--easing-default);
}

body.is-header-collapsed .side-nav {
  top: 76px;
}

.side-title {
  margin: 0 0 16px;
  padding-left: 18px;
  color: var(--foreground);
  font-size: 18px;
  font-weight: 800;
}

.side-list {
  display: grid;
  gap: var(--space-2);
}

.side-item {
  width: 100%;
  min-height: 46px;
  padding: 0 16px;
  border: 0;
  border-radius: var(--radius-md);
  background: transparent;
  color: var(--foreground-secondary);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-3);
  cursor: pointer;
  text-align: left;
}

.side-item:hover {
  background: rgba(255, 255, 255, 0.34);
  color: var(--foreground);
}

.side-item.is-active {
  background: rgba(255, 255, 255, 0.50);
  color: var(--foreground);
}

.side-label {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  min-width: 0;
  font-size: 14px;
  font-weight: 700;
}

.side-icon {
  width: 18px;
  height: 18px;
  color: var(--foreground-muted);
  flex: 0 0 auto;
}

.side-count {
  color: var(--foreground-muted);
  font-size: 12px;
  font-weight: 700;
}

.side-legend {
  margin: 18px 12px 0;
  padding-top: 16px;
  border-top: 1px solid var(--border-subtle);
  display: grid;
  gap: 8px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--foreground-muted);
  font-size: 12px;
}

.legend-item .status-pill {
  flex: 0 0 auto;
}

.main-column {
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.section-head {
  min-height: 42px;
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: var(--space-4);
}

.section-title {
  margin: 0;
  color: var(--foreground);
  font-size: 20px;
  font-weight: 800;
}

.section-subtitle {
  margin: 5px 0 0;
  color: var(--foreground-muted);
  font-size: 13px;
}

.result-count {
  color: var(--foreground-muted);
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 16px;
  align-content: start;
  padding: 2px 0 8px;
}

.launch-card {
  width: 100%;
  min-height: 0;
  position: relative;
  display: flex;
  flex-direction: column;
  cursor: pointer;
  overflow: hidden;
  border: 0;
  transition:
    transform var(--duration-fast) var(--easing-default),
    box-shadow var(--duration-fast) var(--easing-default);
}

.launch-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 16px 34px rgba(15, 23, 42, 0.09);
}

.card-preview {
  margin: 10px 10px 0;
  aspect-ratio: 16 / 9;
  border: 0;
  border-radius: var(--radius-md);
  background:
    linear-gradient(135deg, color-mix(in srgb, var(--surface-2) 70%, white), var(--surface-1));
  overflow: hidden;
  flex: 0 0 auto;
}

.card-preview img,
.card-preview iframe {
  display: block;
  width: 100%;
  height: 100%;
  border: 0;
}

.card-preview img {
  object-fit: cover;
  object-position: top center;
}

.card-preview img.is-contain {
  object-fit: cover;
  padding: 0;
}

.preview-duo {
  width: 100%;
  height: 100%;
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 1px;
  background: var(--surface-2);
}

.preview-duo img {
  min-width: 0;
  object-position: left top;
}

.card-preview iframe {
  pointer-events: none;
  transform: scale(0.82);
  transform-origin: top left;
  width: 122%;
  height: 122%;
  background: var(--surface-1);
}

.preview-placeholder {
  height: 100%;
  display: grid;
  place-items: center;
  padding: var(--space-4);
  color: var(--foreground-muted);
  font-size: 13px;
  font-weight: 700;
  text-align: center;
}

.launch-card .card-demo-header {
  padding: 10px 13px 9px;
  flex: 1;
  min-height: 0;
  gap: 4px;
  overflow: hidden;
}

.card-kicker {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-2);
  color: var(--foreground-muted);
  font-size: 11px;
  font-weight: 700;
  line-height: 1.2;
}

.card-group-name {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.card-group-name::before {
  content: "";
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--foreground-muted);
  flex: 0 0 auto;
}

.status-pill {
  height: 19px;
  padding: 0 7px;
  border-radius: var(--radius-pill);
  background: var(--surface-3);
  color: var(--foreground-secondary);
  display: inline-flex;
  align-items: center;
  font-size: 11px;
  font-weight: 700;
  flex: 0 0 auto;
}

.status-pill.is-live {
  background: color-mix(in srgb, var(--success) 16%, var(--surface-1));
  color: color-mix(in srgb, var(--success) 60%, var(--foreground));
}

.status-pill.is-proto {
  background: color-mix(in srgb, var(--warning) 18%, var(--surface-1));
  color: color-mix(in srgb, var(--warning) 62%, var(--foreground));
}

.status-pill.is-doc {
  background: color-mix(in srgb, var(--accent) 18%, var(--surface-1));
  color: color-mix(in srgb, var(--accent) 55%, var(--foreground));
}

.launch-card .card-demo-title {
  display: -webkit-box;
  overflow: hidden;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  font-size: 15.5px;
  line-height: 1.2;
}

.launch-card .card-demo-sub {
  margin-top: 1px;
  color: var(--foreground-muted);
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 0.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.launch-card .card-demo-description {
  display: -webkit-box;
  overflow: hidden;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  max-height: 46px;
  margin-top: 5px;
  overflow: hidden;
}

.tag-chip {
  height: var(--tag-height);
  padding: 0 var(--tag-padding-x);
  border-radius: var(--tag-radius);
  border: 1px solid var(--comp-tag-border);
  background: var(--comp-tag-bg);
  color: var(--comp-tag-fg);
  display: inline-flex;
  align-items: center;
  font-size: 11px;
  font-weight: 700;
  line-height: 1;
}

.launch-card .card-demo-footer {
  margin-top: auto;
  min-height: 34px;
  padding: 5px 12px 10px;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: var(--space-2);
  border-top: 0;
}

.launch-card:not(.has-variants) .card-demo-header {
  padding-bottom: 12px;
}

.launch-card.has-variants .tag-row {
  display: none;
}

.variant-list {
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 6px;
  overflow: hidden;
}

.variant-link {
  min-width: 58px;
  max-width: 122px;
  min-height: 28px;
  padding-inline: 11px;
  border-radius: var(--radius-md);
  overflow: hidden;
  text-overflow: ellipsis;
  font-weight: 700;
}

.empty-state {
  min-height: 260px;
  border-radius: var(--radius-lg);
  border: 1px dashed var(--border-default);
  background: var(--surface-1);
  color: var(--foreground-muted);
  display: none;
  place-items: center;
  align-content: center;
  text-align: center;
  gap: 6px;
  padding: var(--space-6);
}

.empty-state.is-visible {
  display: grid;
}

.empty-state .empty-title {
  margin: 0;
  color: var(--foreground-secondary);
  font-size: 15px;
  font-weight: 700;
}

.empty-state .empty-hint {
  margin: 0 0 10px;
  font-size: 13px;
}

@media (max-width: 1280px) {
  .cann-primary {
    padding: 0 22px;
    grid-template-columns: minmax(220px, 1fr) minmax(260px, 420px) minmax(220px, 1fr);
  }

  .cann-nav-wrap {
    padding: 0 88px;
  }

  .page-shell {
    width: min(1180px, calc(100vw - 48px));
    grid-template-columns: 210px minmax(0, 1fr);
    gap: 24px;
  }
}

@media (max-width: 1080px) {
  .card-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 920px) {
  .cann-primary {
    height: auto;
    min-height: 118px;
    padding: 14px 18px;
    grid-template-columns: 1fr auto;
    grid-template-areas:
      "brand actions"
      "search search";
    gap: var(--space-3);
  }

  .cann-brand {
    grid-area: brand;
  }

  .global-search {
    grid-area: search;
  }

  .cann-actions {
    grid-area: actions;
  }

  .cann-nav-wrap {
    height: 52px;
    padding: 0 18px;
    overflow-x: auto;
  }

  .cann-nav {
    gap: 22px;
  }

  .page-shell {
    width: min(100%, calc(100vw - 28px));
    grid-template-columns: 1fr;
  }

  .side-nav {
    position: static;
    padding-top: 0;
    max-height: none;
    overflow: hidden;
  }

  .side-title {
    padding-left: 0;
  }

  .side-list {
    display: flex;
    overflow-x: auto;
    padding-bottom: 4px;
  }

  .side-item {
    width: auto;
    flex: 0 0 auto;
  }
}

@media (max-width: 640px) {
  .cann-primary {
    grid-template-columns: 1fr;
    grid-template-areas:
      "brand"
      "search"
      "actions";
  }

  .cann-actions {
    justify-content: flex-start;
    width: 100%;
  }

  .create-btn {
    min-width: 0;
    flex: 1;
  }

  .cann-name,
  .follow-pill {
    display: none;
  }

  .card-grid {
    grid-template-columns: 1fr;
  }

  .section-head {
    align-items: flex-start;
    flex-direction: column;
  }
}
</style>

const visibleLaunchItems = launchItems.filter((item) => !item.hidden);

const STATUS_META = {
  "hi-fi": { label: "可体验", cls: "is-live" },
  "lo-fi": { label: "原型", cls: "is-proto" },
  "doc": { label: "文档", cls: "is-doc" }
};

const state = {
  category: "all",
  query: "",
  status: "all",
  sort: "default"
};

const categoryList = document.getElementById("categoryList");
const grid = document.getElementById("grid");
const emptyState = document.getElementById("emptyState");
const resultCount = document.getElementById("resultCount");
const activeTitle = document.getElementById("activeTitle");
const topbar = document.querySelector(".cann-topbar");
const globalSearch = document.getElementById("globalSearch");

function itemTargetAttrs(href) {
  const isExternal = /^https?:\/\//.test(href);
  return isExternal ? ' target="_blank" rel="noreferrer"' : "";
}

function normalize(value) {
  return String(value || "").trim().toLowerCase();
}

function renderCategories() {
  const counts = visibleLaunchItems.reduce((acc, item) => {
    acc[item.group] = (acc[item.group] || 0) + 1;
    return acc;
  }, {});

  categoryList.innerHTML = categories.map((category) => {
    const count = category.id === "all" ? visibleLaunchItems.length : (counts[category.id] || 0);
    const active = state.category === category.id ? " is-active" : "";
    return `
      <button class="side-item${active}" type="button" data-category="${category.id}">
        <span class="side-label"><svg class="svg-icon side-icon" aria-hidden="true"><use href="#${category.icon}"></use></svg>${category.label}</span>
        <span class="side-count">${count}</span>
      </button>
    `;
  }).join("");
}

function getFilteredItems() {
  const query = normalize(state.query);
  let items = visibleLaunchItems.filter((item) => {
    const inCategory = state.category === "all" || item.group === state.category;
    const inStatus = state.status === "all" || item.status === state.status;
    const haystack = normalize([
      item.title,
      item.sub,
      item.group,
      item.status,
      (STATUS_META[item.status] || {}).label,
      item.desc,
      item.href,
      ...(item.tags || []),
      ...(item.variants || []).map((variant) => `${variant.label} ${variant.href}`)
    ].join(" "));
    return inCategory && inStatus && (!query || haystack.includes(query));
  });

  if (state.sort === "title") {
    items = [...items].sort((a, b) => a.title.localeCompare(b.title, "zh-CN"));
  } else if (state.sort === "group") {
    items = [...items].sort((a, b) => {
      const groupResult = a.group.localeCompare(b.group, "zh-CN");
      return groupResult || a.title.localeCompare(b.title, "zh-CN");
    });
  }

  return items;
}

function renderPreview(item) {
  if (item.previewFrame) {
    return `<iframe src="${item.previewFrame}" title="${item.title} 预览" loading="lazy"></iframe>`;
  }

  if (item.preview) {
    const fitClass = item.fit === "contain" ? " class=\"is-contain\"" : "";
    if (item.previewDark) {
      return `
        <div class="preview-duo">
          <img${fitClass} src="${item.preview}" alt="${item.title} 浅色静态预览" loading="lazy" decoding="async">
          <img${fitClass} src="${item.previewDark}" alt="${item.title} 深色静态预览" loading="lazy" decoding="async">
        </div>
      `;
    }
    return `<img${fitClass} src="${item.preview}" alt="${item.title} 静态预览" loading="lazy" decoding="async">`;
  }

  return `<div class="preview-placeholder">${item.group}</div>`;
}

function renderCard(item) {
  const variants = item.variants || [];
  const hasVariants = variants.length > 0;
  const footerHtml = hasVariants ? variants.map((variant) => `
    <a class="btn btn-sm variant-link" href="${variant.href}"${itemTargetAttrs(variant.href)}>${variant.label}</a>
  `).join("") : "";

  const tagHtml = (item.tags || []).slice(0, 3).map((tag) => `<span class="tag-chip">${tag}</span>`).join("");
  const status = STATUS_META[item.status] || { label: item.status, cls: "" };

  return `
    <article class="card-demo launch-card${hasVariants ? " has-variants" : ""}" data-group="${item.group}" data-status="${item.status}" data-href="${item.href}" role="link" tabindex="0">
      <a class="card-preview" href="${item.href}"${itemTargetAttrs(item.href)} aria-label="打开 ${item.title}">
        ${renderPreview(item)}
      </a>
      <div class="card-demo-header">
        <div class="card-kicker">
          <span class="card-group-name">${item.group}</span>
          <span class="status-pill${status.cls ? " " + status.cls : ""}">${status.label}</span>
        </div>
        <a class="card-demo-title" href="${item.href}"${itemTargetAttrs(item.href)}>${item.title}</a>
        ${item.sub ? `<div class="card-demo-sub">${item.sub}</div>` : ""}
        <div class="card-demo-description">${item.desc}</div>
        <div class="tag-row">${tagHtml}</div>
      </div>
      ${hasVariants ? `<div class="card-demo-footer">
        <div class="variant-list">${footerHtml}</div>
      </div>` : ""}
    </article>
  `;
}

function renderGrid() {
  const items = getFilteredItems();
  const activeCategory = categories.find((category) => category.id === state.category);
  activeTitle.textContent = state.category === "all" ? "全部项目" : activeCategory.label;
  resultCount.textContent = `${items.length}/${visibleLaunchItems.length}`;
  grid.innerHTML = items.map(renderCard).join("");
  emptyState.classList.toggle("is-visible", items.length === 0);
}

function syncSearch(value) {
  state.query = value;
  if (globalSearch.value !== value) globalSearch.value = value;
  renderGrid();
}

categoryList.addEventListener("click", (event) => {
  const button = event.target.closest("[data-category]");
  if (!button) return;
  state.category = button.dataset.category;
  renderCategories();
  renderGrid();
});

globalSearch.addEventListener("input", (event) => syncSearch(event.target.value));

const resetFilters = document.getElementById("resetFilters");
resetFilters.addEventListener("click", () => {
  state.category = "all";
  state.query = "";
  globalSearch.value = "";
  renderCategories();
  renderGrid();
});

grid.addEventListener("click", (event) => {
  if (event.target.closest("a, button, input, select")) return;
  const card = event.target.closest(".launch-card[data-href]");
  if (!card) return;
  const href = card.dataset.href;
  if (/^https?:\/\//.test(href)) {
    window.open(href, "_blank", "noreferrer");
  } else {
    window.location.href = href;
  }
});

grid.addEventListener("keydown", (event) => {
  if (event.key !== "Enter" && event.key !== " ") return;
  const card = event.target.closest(".launch-card[data-href]");
  if (!card) return;
  event.preventDefault();
  card.click();
});

window.addEventListener("keydown", (event) => {
  const isTyping = ["INPUT", "TEXTAREA", "SELECT"].includes(document.activeElement.tagName);
  if (event.key === "/" && !isTyping) {
    event.preventDefault();
    globalSearch.focus();
  }
});

let lastScrollY = window.scrollY;
let scrollTicking = false;

function setHeaderCollapsed(collapsed) {
  topbar.classList.toggle("is-collapsed", collapsed);
  document.body.classList.toggle("is-header-collapsed", collapsed);
}

function updateHeaderOnScroll() {
  const currentY = window.scrollY;
  const delta = currentY - lastScrollY;

  if (currentY <= 8) {
    setHeaderCollapsed(false);
  } else if (delta > 8) {
    setHeaderCollapsed(true);
  } else if (delta < -8) {
    setHeaderCollapsed(false);
  }

  lastScrollY = currentY;
  scrollTicking = false;
}

window.addEventListener("scroll", () => {
  if (scrollTicking) return;
  scrollTicking = true;
  window.requestAnimationFrame(updateHeaderOnScroll);
}, { passive: true });

renderCategories();
renderGrid();
</script>
