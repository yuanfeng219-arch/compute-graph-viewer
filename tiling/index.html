<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ascend Tiling Viz Workbench</title>
  <link rel="stylesheet" href="../vendor/pto-design-system/tokens/foundation.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/tokens/semantic.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/tokens/components.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/css/style.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/workbench-shell/pattern.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/floating-playback-control/pattern.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/ide-frame/pattern.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/swimlane-task/pattern.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/aic-core-object/pattern.css?v=7823129">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/aiv-core-object/pattern.css?v=7823129">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/memory-architecture/pattern.css?v=7823129">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/hardware-architecture-viewport/pattern.css?v=7823129">
  <link rel="stylesheet" href="src/styles.css?v=20260603-info-panel-v3">
</head>
<body class="avz-page">
  <section class="pto-ide-frame avz-frame" data-ide-frame data-host="standalone" aria-label="Ascend tiling visualization workbench">
    <header class="pto-ide-frame__topbar pto-ide-frame__standalone-chrome">
      <div class="pto-ide-frame__topbar-left">
        <div class="avz-brand">
          <div class="avz-brand__title">Ascend Tiling Viz</div>
        </div>
      </div>
      <div class="pto-ide-frame__topbar-center" aria-hidden="true"></div>
      <div class="pto-ide-frame__topbar-right"></div>
    </header>

    <div class="pto-ide-frame__body">
      <div class="pto-ide-frame__workarea">
        <div class="pto-ide-frame__split avz-main-split" data-ide-split="avz-main" data-storage-key="pto-tiling-avz-main-equal-v1" data-split-direction="horizontal" data-sizes="33.33,33.34,33.33" data-min-size="300,460,340" data-gutter-size="10">
          <section class="pto-ide-frame__pane" data-ide-pane="source">
            <header class="pto-ide-frame__pane-header avz-pane-header">
              <div class="avz-pane-heading">
                <h2 class="pto-ide-frame__pane-title avz-pane-title">Source</h2>
                <span class="pto-ide-frame__pane-meta" id="sourceMeta">Fixture source</span>
              </div>
            </header>
            <div class="pto-ide-frame__pane-body avz-pane-body">
              <div class="avz-sample-list" id="sampleList" aria-label="Samples"></div>
              <div class="avz-source" id="sourceLines" aria-label="Source listing"></div>
            </div>
          </section>

          <section class="pto-ide-frame__pane" data-ide-pane="visualizer">
            <header class="pto-ide-frame__pane-header avz-pane-header">
              <div class="avz-pane-heading">
                <h2 class="pto-ide-frame__pane-title avz-pane-title" id="visualTitle">Tensor 3D Viewport</h2>
                <span class="pto-ide-frame__pane-meta" id="stepMeta"></span>
              </div>
              <div class="avz-viewport-actions" aria-label="Viewport controls">
                <button class="btn btn-sm btn-icon btn-ghost" id="zoomOut" type="button" title="Zoom out" aria-label="Zoom out">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="M8 11h6"></path><path d="m16 16 5 5"></path></svg>
                </button>
                <button class="btn btn-sm btn-icon btn-ghost" id="zoomIn" type="button" title="Zoom in" aria-label="Zoom in">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="M8 11h6"></path><path d="M11 8v6"></path><path d="m16 16 5 5"></path></svg>
                </button>
                <button class="btn btn-sm btn-icon btn-ghost" id="fitView" type="button" title="Fit view" aria-label="Fit view">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3H5a2 2 0 0 0-2 2v3"></path><path d="M16 3h3a2 2 0 0 1 2 2v3"></path><path d="M8 21H5a2 2 0 0 1-2-2v-3"></path><path d="M16 21h3a2 2 0 0 0 2-2v-3"></path></svg>
                </button>
                <button class="btn btn-sm btn-icon btn-ghost" id="viewportInfo" type="button" aria-label="Logical tensor info" aria-expanded="false" aria-controls="traceInfoPanel">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
                </button>
              </div>
            </header>
            <div class="pto-ide-frame__pane-body avz-pane-body avz-visual-pane">
              <section class="avz-section avz-section--tensor">
                <div class="avz-tensor-stage" id="tensorStage">
                  <canvas class="avz-tensor-canvas" id="tensorCanvas" width="960" height="520" aria-label="Logical tensor 3D viewport"></canvas>
                  <div class="avz-tile-lens avz-tile-lens--overlay" id="tileLens" aria-label="On-chip tile lens"></div>
                  <div class="avz-tensor-fallback" id="tensorFallback" hidden>No WebGL context. Showing the 2D logical tile fallback.</div>
                </div>
              </section>
              <div class="panel-shell panel-shell-quiet avz-section avz-section--timeline avz-bottom-hover">
                <div class="avz-section__head">
                  <span>Execution Timeline</span>
                  <span class="avz-kicker" id="timelineKicker"></span>
                </div>
                <canvas class="avz-timeline-canvas" id="timelineCanvas" height="96" aria-label="Execution timeline"></canvas>
                <div class="avz-playback-inline" id="playbackMount" aria-label="Playback controls"></div>
              </div>
              <aside class="panel-shell avz-info-panel" id="traceInfoPanel" hidden aria-label="Trace visual reading guide">
                <header class="panel-shell-header avz-info-panel__head">
                  <div>
                    <h2 class="panel-shell-title pto-ide-frame__pane-title">怎么看图</h2>
                    <span class="panel-shell-meta pto-ide-frame__pane-meta" id="traceInfoMeta">当前帧说明</span>
                  </div>
                  <button class="btn btn-sm btn-icon btn-ghost" id="closeTraceInfo" type="button" aria-label="Close trace info">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
                  </button>
                </header>
                <div class="avz-info-panel__body" id="traceInfoContent"></div>
              </aside>
            </div>
          </section>

          <aside class="pto-ide-frame__pane pto-hw-viewport avz-architecture-viewport-root" data-ide-pane="architecture" id="architectureViewportRoot" aria-label="Memory Architecture">
            <header class="pto-ide-frame__pane-header avz-pane-header avz-architecture-header">
              <div class="avz-pane-heading">
                <h2 class="pto-ide-frame__pane-title avz-pane-title">Memory Architecture</h2>
                <span class="pto-ide-frame__pane-meta">Ascend 950B</span>
              </div>
              <div class="pto-hw-viewport__controls avz-architecture-controls">
                <div class="pto-hw-viewport__tools" aria-label="Memory architecture viewport controls">
                  <button class="pto-hw-viewport__tool" id="architectureDetailToggle" type="button" aria-pressed="false">细节关</button>
                  <button class="pto-hw-viewport__tool" id="archZoomOut" type="button" title="Zoom out" aria-label="Zoom out memory architecture">−</button>
                  <span class="pto-hw-viewport__readout" id="archZoomReadout">60%</span>
                  <button class="pto-hw-viewport__tool" id="archZoomIn" type="button" title="Zoom in" aria-label="Zoom in memory architecture">+</button>
                  <button class="pto-hw-viewport__tool" id="archFitView" type="button" title="Fit view" aria-label="Fit memory architecture view">Fit</button>
                </div>
              </div>
            </header>
            <div class="pto-ide-frame__pane-body avz-pane-body avz-architecture-pane">
              <div class="pto-hw-viewport__stage avz-architecture-viewport" id="architectureViewport">
                <div class="pto-hw-viewport__scale avz-architecture-scale" id="architectureMap"></div>
              </div>
              <div class="avz-architecture-blocks" id="architectureBlocks"></div>
            </div>
          </aside>
        </div>
        <aside class="panel-shell avz-inspector-drawer" id="inspectorDrawer" hidden>
          <header class="panel-shell-header avz-inspector-drawer__head">
            <div>
              <h2 class="panel-shell-title pto-ide-frame__pane-title">Inspector</h2>
              <span class="panel-shell-meta pto-ide-frame__pane-meta" id="inspectorMeta">选中对象</span>
            </div>
            <button class="btn btn-sm btn-icon btn-ghost" id="closeInspector" type="button" aria-label="Close inspector">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
            </button>
          </header>
          <div class="inspector-rail avz-inspector" id="inspector"></div>
        </aside>
      </div>
    </div>
  </section>

  <script src="../vendor/pto-design-system/patterns/workbench-shell/pattern.js"></script>
  <script src="../vendor/pto-design-system/patterns/floating-playback-control/pattern.js"></script>
  <script src="../vendor/pto-design-system/patterns/ide-frame/pattern.js"></script>
  <script src="../vendor/pto-design-system/patterns/swimlane-task/pattern.js"></script>
  <script src="../vendor/pto-design-system/patterns/aiv-core-object/pattern.js?v=9426696"></script>
  <script src="../vendor/pto-design-system/patterns/aic-core-object/pattern.js?v=9426696"></script>
  <script src="../vendor/pto-design-system/patterns/memory-architecture/pattern.js?v=9426696"></script>
  <script src="../vendor/pto-design-system/patterns/hardware-architecture-viewport/pattern.js?v=9426696"></script>
  <script src="src/app.js?v=20260603-info-panel-v3"></script>
</body>
</html>
