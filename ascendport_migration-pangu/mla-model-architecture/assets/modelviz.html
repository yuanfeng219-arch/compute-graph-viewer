  <script src="../../../vendor/pto-design-system/patterns/model-graphviz/pattern.js?v=mla-accuracy-heatmap-v5"></script>
  <script>
    const MODEL_VIZ_UI_VERSION = 'source-compatibility-v28';
    const state = {
      schema: null,
      graph: null,
      visibleGraph: null,
      mappingDocument: null,
      controller: null,
      baseHierarchy: null,
      collapsedClusters: new Set(),
      activeNodeId: null,
      activeMappingId: null,
      operatorPopoverOpen: false,
      accuracyOverlay: new Map(),
      accuracyFixed: false,
      initialAccuracyFitDone: false,
    };

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>'"]/g, (char) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      })[char]);
    }

    function relationLabel(value) {
      return ({
        structural_rewrite: '结构重写',
        memory_space_rewrite: '存储层次重写',
        staged_direct_mapping: '分级直接映射',
        pipeline_rewrite: '流水重写',
        many_to_one_fusion: '多对一融合',
        removed_with_replacement: '删除并替换',
        semantic_direct_mapping: '语义直接映射',
        numeric_rewrite: '数值语义重写',
        loop_body_rewrite: '循环体重写',
        semantic_mapping_with_codegen_gap: '映射与原型有差异',
        cross_kernel_workspace: '跨核工作区',
        two_stage_rewrite: '二阶段重写',
      })[value] || value;
    }

    function mappingById(mappingId) {
      return state.mappingDocument?.mappings?.find((item) => item.id === mappingId) || null;
    }

    function nodeById(nodeId) {
      return state.schema?.nodes?.find((item) => item.id === nodeId)
        || state.visibleGraph?.nodes?.find((item) => item.id === nodeId)
        || null;
    }

    function mappingIdsForNode(node) {
      if (!node) return [];
      const canonicalNodes = new Map((state.schema?.nodes || []).map((item) => [item.id, item]));
      const nodeIds = Array.isArray(node.descendantNodeIds) && node.descendantNodeIds.length
        ? node.descendantNodeIds
        : [node.id];
      return [...new Set([
        ...(node.attrs?.mapping_ids || []),
        ...nodeIds.flatMap((nodeId) => canonicalNodes.get(nodeId)?.attrs?.mapping_ids || []),
      ])];
    }

    function mappingsForNode(node) {
      return mappingIdsForNode(node).map(mappingById).filter(Boolean);
    }

    function incompatibleMappingsForNode(node) {
      return mappingsForNode(node).filter((mapping) => mapping.relation === 'removed_with_replacement');
    }

    function compatibilityForNode(node) {
      const mappings = incompatibleMappingsForNode(node);
      if (!mappings.length) return null;
      return {
        status: 'incompatible',
        statusLabel: '源端不兼容',
        badge: mappings.length > 1 ? `${mappings.length} 项不兼容` : '不兼容',
        mappings,
      };
    }

    function preferredMappingForNode(node) {
      const mappings = mappingsForNode(node);
      return mappings.find((mapping) => mapping.relation === 'removed_with_replacement')
        || mappings.find((mapping) => mapping.target?.implementation_status === 'prototype_divergence')
        || mappings.find((mapping) => mapping.target?.implementation_status === 'planned_not_emitted')
        || mappings[0]
        || null;
    }

    function nodeTypeLabel(node) {
      return node?.op_type || node?.state_type || node?.typeLabel
        || (node?.kind === 'module' ? 'Module' : 'Tensor');
    }

    function hostNodeAnchor(nodeId) {
      if (!nodeId) return null;
      const element = document.querySelector(`#graphStage .pto-model-graphviz-node[data-node-id="${nodeId}"]`);
      if (!element) return null;
      const rect = element.getBoundingClientRect();
      return {
        left: rect.left,
        top: rect.top,
        right: rect.right,
        bottom: rect.bottom,
        width: rect.width,
        height: rect.height,
      };
    }

    function postToHost(message) {
      if (window.parent === window) return;
      window.parent.postMessage(message, '*');
    }

    function sourceProvenanceForNode(node) {
      if (!node) return [];
      const nodeIds = Array.isArray(node.descendantNodeIds) && node.descendantNodeIds.length
        ? node.descendantNodeIds
        : [node.id];
      const canonicalNodes = new Map((state.schema?.nodes || []).map((item) => [item.id, item]));
      const provenance = [
        ...(node.provenance || []),
        ...nodeIds.flatMap((nodeId) => canonicalNodes.get(nodeId)?.provenance || []),
      ];
      const seen = new Set();
      return provenance.filter((item) => {
        const line = Number(item?.line);
        if (!Number.isInteger(line) || line <= 0) return false;
        const key = `${item.path || item.source || ''}:${line}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function sourceLinesForNode(node) {
      return [...new Set(sourceProvenanceForNode(node).map((item) => Number(item.line)))]
        .sort((left, right) => left - right);
    }

    function hostNodePayload(node) {
      if (!node) return null;
      const provenance = sourceProvenanceForNode(node)[0] || null;
      return {
        id: node.id,
        label: node.label,
        kind: node.kind,
        opType: nodeTypeLabel(node),
        sourceLines: sourceLinesForNode(node),
        provenance: provenance ? {
          path: provenance.path,
          line: provenance.line,
          fact: provenance.fact,
        } : null,
      };
    }

    function hostMappingPayload(mapping) {
      if (!mapping) return null;
      return {
        id: mapping.id,
        source: {
          primitive: mapping.source?.primitive,
          lines: mapping.source?.lines || [],
        },
        target: {
          api: mapping.target?.api,
          executionUnit: mapping.target?.execution_unit,
          implementationStatus: mapping.target?.implementation_status,
        },
        relation: relationLabel(mapping.relation),
        note: mapping.note,
      };
    }

    function hostAccuracyPayload(nodeId) {
      const overlay = state.visibleGraph?.nodes?.find((item) => item.id === nodeId)?.accuracyOverlay
        || state.accuracyOverlay.get(nodeId);
      if (!overlay) return null;
      return {
        status: overlay.status,
        statusLabel: overlay.statusLabel,
        error: overlay.error,
        metric: overlay.metric,
        badge: overlay.badge,
        testedCount: overlay.testedCount || 1,
      };
    }

    function hostCompatibilityPayload(node) {
      const compatibility = compatibilityForNode(node);
      if (!compatibility) return null;
      return {
        status: compatibility.status,
        statusLabel: compatibility.statusLabel,
        badge: compatibility.badge,
        sourcePrimitives: compatibility.mappings.map((mapping) => mapping.source?.primitive).filter(Boolean),
        resolutions: compatibility.mappings.map((mapping) => mapping.target?.api).filter(Boolean),
      };
    }

    function notifyHostSelection() {
      postToHost({
        type: 'pto-mla-modelviz-selection',
        uiVersion: MODEL_VIZ_UI_VERSION,
        node: hostNodePayload(nodeById(state.activeNodeId)),
        mapping: hostMappingPayload(mappingById(state.activeMappingId)),
        compatibility: hostCompatibilityPayload(nodeById(state.activeNodeId)),
        accuracy: hostAccuracyPayload(state.activeNodeId),
        anchor: hostNodeAnchor(state.activeNodeId),
      });
    }

    function notifyHostAnchor() {
      if (!state.operatorPopoverOpen || window.parent === window) return;
      postToHost({
        type: 'pto-mla-modelviz-anchor',
        uiVersion: MODEL_VIZ_UI_VERSION,
        nodeId: state.activeNodeId,
        anchor: hostNodeAnchor(state.activeNodeId),
      });
    }

    function tensorText(edge) {
      const tensor = edge.tensor || {};
      const parts = [tensor.name, tensor.shape, tensor.dtype].filter(Boolean);
      if (Array.isArray(tensor.constraints) && tensor.constraints.length) parts.push(tensor.constraints.join(', '));
      return parts.join(' · ');
    }

    function rectForNode(node) {
      return {
        left: node.x - node.width / 2,
        top: node.y - node.height / 2,
        right: node.x + node.width / 2,
        bottom: node.y + node.height / 2,
      };
    }

    function rectForCluster(cluster) {
      return {
        left: cluster.x,
        top: cluster.y,
        right: cluster.x + cluster.width,
        bottom: cluster.y + cluster.height,
      };
    }

    function boundsOf(rects) {
      if (!rects.length) return null;
      return {
        left: Math.min(...rects.map((rect) => rect.left)),
        top: Math.min(...rects.map((rect) => rect.top)),
        right: Math.max(...rects.map((rect) => rect.right)),
        bottom: Math.max(...rects.map((rect) => rect.bottom)),
      };
    }

    function defaultCollapsedIds() {
      const groups = state.schema?.visual_layout?.groups || [];
      const defaultDepth = Number(state.schema?.visual_layout?.default_collapse_depth ?? 2);
      const parentByChild = new Map();
      groups.forEach((group) => (group.children || []).forEach((childId) => parentByChild.set(childId, group.id)));
      const depthOf = (groupId) => {
        let depth = 0;
        let current = parentByChild.get(groupId);
        while (current) {
          depth += 1;
          current = parentByChild.get(current);
        }
        return depth;
      };
      return groups
        .filter((group) => group.collapsed_by_default || group.default_collapsed || depthOf(group.id) >= defaultDepth)
        .map((group) => group.id);
    }

    function collapsedAncestorForNode(nodeId) {
      const ancestors = state.baseHierarchy?.ancestorClustersForNode(nodeId) || [];
      const collapsed = ancestors.filter((clusterId) => state.collapsedClusters.has(clusterId));
      return collapsed.find((clusterId) => !hiddenByCollapsedAncestor(clusterId)) || null;
    }

    function hiddenByCollapsedAncestor(clusterId) {
      return (state.baseHierarchy?.ancestorClustersForCluster(clusterId) || [])
        .some((ancestorId) => state.collapsedClusters.has(ancestorId));
    }

    function layoutVisibleNodes(nodes) {
      const byId = new Map(nodes.map((node) => [node.id, node]));
      const place = (id, x, y, width, height) => {
        const node = byId.get(id);
        if (!node) return null;
        node.x = x;
        node.y = y;
        if (width) node.width = width;
        if (height) node.height = height;
        return node;
      };
      const placeFolded = (id, x, y, width = 480) => {
        const node = place(id, x, y, width, 64);
        if (node) node.typeLabel = node.typeLabel || 'Module';
        return node;
      };
      const root = byId.get('mla_decode_group');
      if (root?.collapsed) {
        placeFolded('mla_decode_group', 760, 180, 520);
        return;
      }

      place('runtime_config', 760, 190, 240, 52);
      place('kernel_dispatch', 760, 300, 480, 64);

      if (!placeFolded('input_stage_group', 760, 484)) {
        place('q_stage', 540, 484, 360, 62);
        place('kv_stage', 980, 484, 360, 62);
      }
      // Match the model-graphviz asset convention: auxiliary tensors live in
      // side lanes at the y-range of the operator they feed.
      place('query', 180, 454, 240, 52);
      place('position_query', 180, 514, 250, 52);
      place('latent_kv', 1350, 454, 240, 52);
      place('position_key', 1350, 514, 250, 52);

      let cursorY = 720;
      const placeSequence = (clusterId, memberIds, options = {}) => {
        const x = options.x || 760;
        const width = options.width || 480;
        const rowGap = options.rowGap || 116;
        const afterGap = options.afterGap || 176;
        if (placeFolded(clusterId, x, cursorY, width)) {
          cursorY += afterGap;
          return;
        }
        let lastY = cursorY;
        memberIds.forEach((nodeId, index) => {
          const y = cursorY + index * rowGap;
          if (place(nodeId, x, y, width, 62)) lastY = y;
        });
        cursorY = lastY + afterGap;
      };

      if (placeFolded('tile_loop_group', 760, cursorY)) {
        cursorY += 190;
      } else {
        placeSequence('score_compute_group', ['qk_gemm', 'pe_gemm', 'score_block_max']);
        placeSequence('online_softmax_group', ['running_max_merge', 'score_exponential', 'score_sum', 'online_state_update', 'output_rescale']);
        placeSequence('value_accumulation_group', ['pv_gemm'], { afterGap: 216 });
      }

      if (placeFolded('finalize_group', 760, cursorY)) {
        cursorY += 190;
      } else {
        place('output_normalize', 760, cursorY, 480, 62);
        const branchY = cursorY + 178;
        place('no_split_store', 540, branchY, 360, 60);
        let splitBottom = branchY;
        if (!placeFolded('split_combine_group', 980, branchY, 400)) {
          const splitOps = [
            'lse_encode',
            'partial_result_store',
            'split_lse_max',
            'split_lse_sum',
            'partial_weight',
            'split_output_accumulate',
            'split_output_store',
          ];
          splitOps.forEach((nodeId, index) => {
            const y = branchY + index * 116;
            if (place(nodeId, 1260, y, 360, 60)) splitBottom = y;
          });
          const partialStoreY = byId.get('partial_result_store')?.y || branchY + 116;
          const lseMaxY = byId.get('split_lse_max')?.y || branchY + 232;
          place('partial_output_workspace', 1640, partialStoreY, 260, 54);
          place('split_lse_workspace', 1640, lseMaxY, 250, 54);
        }
        cursorY = Math.max(branchY, splitBottom) + 196;
      }
      place('mla_output', 760, cursorY, 240, 54);
    }

    function accuracyNumber(value) {
      if (typeof value === 'number') return Number.isFinite(value) ? value : null;
      const parsed = Number.parseFloat(String(value ?? '').trim());
      return Number.isFinite(parsed) ? parsed : null;
    }

    function accuracyMetricBadge(overlay) {
      if (overlay?.metricKind === 'cosine_similarity') {
        const value = accuracyNumber(overlay.value);
        return `cos ${value == null ? String(overlay.error ?? '—') : value.toFixed(4)}`;
      }
      return `误差 ${String(overlay?.error ?? overlay?.value ?? '—')}`;
    }

    function accuracyBadgeWidth(text) {
      const characters = Array.from(String(text));
      const textWidth = characters.reduce((width, character) => (
        width + (/[\u3400-\u9fff]/u.test(character) ? 14 : 8)
      ), 0);
      return Math.ceil(textWidth) + 8;
    }

    function accuracyHeatValue(overlay) {
      const value = accuracyNumber(overlay?.value ?? overlay?.error);
      if (value == null) return null;
      const threshold = Math.max(
        Number.EPSILON,
        accuracyNumber(overlay?.thresholdValue) ?? (overlay?.metricKind === 'cosine_similarity' ? 0.999 : 1e-3),
      );
      const ratio = overlay?.metricKind === 'cosine_similarity'
        ? Math.max(0, 1 - value) / Math.max(Number.EPSILON, 1 - threshold)
        : Math.max(0, value) / threshold;
      if (ratio <= 1) return Math.max(0, ratio * 0.5);
      return Math.min(1, 0.5 + 0.5 * Math.log10(ratio) / Math.log10(31));
    }

    function accuracyHeatAccentColor(overlay) {
      const heat = accuracyHeatValue(overlay);
      if (heat == null) return 'var(--foreground-secondary)';
      return heat <= 0.5
        ? `color-mix(in srgb, var(--success) ${Math.round((1 - heat * 2) * 100)}%, var(--warning))`
        : `color-mix(in srgb, var(--warning) ${Math.round((2 - heat * 2) * 100)}%, var(--danger))`;
    }

    function accuracyHeatColor(overlay) {
      const heat = accuracyHeatValue(overlay);
      if (heat == null) return 'color-mix(in srgb, var(--surface-4) 72%, var(--background))';
      return `color-mix(in srgb, ${accuracyHeatAccentColor(overlay)} 72%, var(--background))`;
    }

    function accuracyBadgeColor(overlay) {
      const heat = accuracyHeatValue(overlay);
      if (heat == null) return 'color-mix(in srgb, var(--surface-4) 52%, var(--background))';
      return `color-mix(in srgb, ${accuracyHeatAccentColor(overlay)} 52%, var(--background))`;
    }

    function aggregateAccuracyOverlay(nodeIds) {
      const entries = nodeIds.map((nodeId) => state.accuracyOverlay.get(nodeId)).filter(Boolean);
      if (!entries.length) return null;
      const hottest = entries.reduce((current, entry) => (
        (accuracyHeatValue(entry) ?? -1) > (accuracyHeatValue(current) ?? -1) ? entry : current
      ), entries[0]);
      const failures = entries.filter((entry) => entry.status === 'fail');
      const fixed = entries.filter((entry) => entry.status === 'fixed');
      if (failures.length) {
        return {
          ...hottest,
          status: 'fail', statusLabel: '异常', badge: accuracyMetricBadge(hottest),
          metric: `${entries.length} 个子算子已校验 · ${failures.length} 个异常`,
          testedCount: entries.length,
        };
      }
      if (fixed.length) {
        return {
          ...hottest,
          status: 'fixed', statusLabel: '已修复', badge: accuracyMetricBadge(hottest),
          metric: `${entries.length} 个子算子复测通过`,
          testedCount: entries.length,
        };
      }
      return {
        ...hottest,
        status: 'pass', statusLabel: '通过', badge: accuracyMetricBadge(hottest),
        metric: `${entries.length} 个子算子精度通过`,
        testedCount: entries.length,
      };
    }

    function applyAccuracyOverlay(graph) {
      graph.nodes.forEach((node) => {
        delete node.accuracyOverlay;
        delete node.overlayKind;
        const overlay = state.accuracyOverlay.get(node.id)
          || aggregateAccuracyOverlay(node.descendantNodeIds || []);
        if (!overlay) return;
        node.accuracyOverlay = overlay;
        node.overlayKind = `accuracy-${overlay.status}`;
      });
      return graph;
    }

    function createCompatibilityBadge(node, compatibility) {
      const namespace = 'http://www.w3.org/2000/svg';
      const text = String(compatibility.badge || compatibility.statusLabel || '不兼容');
      const width = 100;
      const height = 34;
      const group = document.createElementNS(namespace, 'g');
      group.setAttribute('class', 'compatibility-node-badge');
      group.setAttribute('transform', `translate(${node.width / 2 - width - 12}, ${-height / 2})`);
      const rect = document.createElementNS(namespace, 'rect');
      rect.setAttribute('width', width);
      rect.setAttribute('height', height);
      rect.setAttribute('rx', height / 2);
      rect.setAttribute('ry', height / 2);
      const label = document.createElementNS(namespace, 'text');
      label.setAttribute('x', width / 2);
      label.setAttribute('y', height / 2);
      label.textContent = text;
      group.append(rect, label);
      return group;
    }

    function decorateCompatibilityGraph() {
      const stage = document.getElementById('graphStage');
      stage.querySelectorAll('.compatibility-node-badge').forEach((badge) => badge.remove());
      stage.querySelectorAll('.pto-model-graphviz-node[data-node-id]').forEach((group) => {
        group.classList.remove('is-source-incompatible');
        delete group.dataset.compatibilityStatus;
      });
      if (document.documentElement.dataset.view === 'accuracy') return;

      stage.querySelectorAll('.pto-model-graphviz-node[data-node-id]').forEach((group) => {

        group.dataset.compatibilityStatus = compatibility.status;
        group.appendChild(createCompatibilityBadge(node, compatibility));

    function createAccuracyBadge(node, overlay) {
      const namespace = 'http://www.w3.org/2000/svg';
      const text = accuracyMetricBadge(overlay);
      const width = accuracyBadgeWidth(text);
      const height = 30;
      const group = document.createElementNS(namespace, 'g');
      group.setAttribute('class', `accuracy-node-badge is-${overlay.status}`);
      group.setAttribute('transform', `translate(${-node.width / 2 + 8}, ${-height / 2})`);
      group.dataset.accuracyHeat = String(accuracyHeatValue(overlay) ?? '');
      group.style.setProperty('--accuracy-heat-color', accuracyHeatAccentColor(overlay));
      group.style.setProperty('--accuracy-badge-color', accuracyBadgeColor(overlay));
      const rect = document.createElementNS(namespace, 'rect');
      rect.setAttribute('width', width);
      rect.setAttribute('height', height);
      rect.setAttribute('rx', height / 2);
      rect.setAttribute('ry', height / 2);
      const label = document.createElementNS(namespace, 'text');
      label.setAttribute('x', width / 2);
      label.setAttribute('y', height / 2);
      label.textContent = text;
      group.append(rect, label);
      return group;
    }

    function decorateAccuracyGraph() {
      const stage = document.getElementById('graphStage');
      const isAccuracyView = document.documentElement.dataset.view === 'accuracy';
      stage.classList.toggle('is-accuracy-overlay', state.accuracyOverlay.size > 0);
      stage.querySelectorAll('.accuracy-node-badge').forEach((badge) => badge.remove());
      stage.querySelectorAll('.pto-model-graphviz-node[data-node-id]').forEach((group) => {
        group.classList.remove('is-accuracy-pass', 'is-accuracy-fail', 'is-accuracy-fixed');
        delete group.dataset.accuracyStatus;
        delete group.dataset.accuracyHeat;
        const rect = Array.from(group.children).find((child) => child.tagName?.toLowerCase() === 'rect');
        rect?.style.removeProperty('fill');
        rect?.style.removeProperty('fill-opacity');
      });
      if (!state.accuracyOverlay.size) return;
      const nodesById = new Map((state.visibleGraph?.nodes || []).map((node) => [node.id, node]));
      stage.querySelectorAll('.pto-model-graphviz-node[data-node-id]').forEach((group) => {
        const node = nodesById.get(group.dataset.nodeId);
        const overlay = node?.accuracyOverlay;
        const rect = Array.from(group.children).find((child) => child.tagName?.toLowerCase() === 'rect');
        if (!overlay) {
          if (isAccuracyView && ['op', 'module'].includes(node?.kind) && rect) {
            rect.style.fill = 'color-mix(in srgb, var(--surface-4) 72%, var(--background))';
            rect.style.fillOpacity = '1';
          }
          return;
        }
        const heat = accuracyHeatValue(overlay);
        group.classList.add(`is-accuracy-${overlay.status}`);
        group.dataset.accuracyStatus = overlay.status;
        group.dataset.accuracyHeat = heat == null ? '' : heat.toFixed(4);
        if (rect) {
          rect.style.fill = accuracyHeatColor(overlay);
          rect.style.fillOpacity = '1';
        }
        group.appendChild(createAccuracyBadge(node, overlay));
      });
    }

    function buildVisibleGraph() {
      const base = state.graph;
      const hierarchy = state.baseHierarchy;
      const baseClusters = new Map(base.clusters.map((cluster) => [cluster.id, cluster]));
      const baseNodes = new Map(base.nodes.map((node) => [node.id, node]));
      const visibleClusterIds = new Set(base.clusters
        .filter((cluster) => !state.collapsedClusters.has(cluster.id) && !hiddenByCollapsedAncestor(cluster.id))
        .map((cluster) => cluster.id));

      const nodes = base.nodes
        .filter((node) => !collapsedAncestorForNode(node.id))
        .map((node) => ({ ...node }));

      state.collapsedClusters.forEach((clusterId) => {
        if (hiddenByCollapsedAncestor(clusterId)) return;
        const cluster = baseClusters.get(clusterId);
        if (!cluster) return;
        const descendants = Array.from(hierarchy.descendantNodesOfCluster(clusterId))
          .map((nodeId) => baseNodes.get(nodeId))
          .filter(Boolean)
          .sort((left, right) => left.y - right.y || left.x - right.x);
        const anchor = descendants[0] || {
          x: cluster.x + cluster.width / 2,
          y: cluster.y + cluster.height / 2,
        };
        const parent = hierarchy.clusterParent.get(clusterId) || null;
        const group = (state.schema?.visual_layout?.groups || []).find((item) => item.id === clusterId);
        nodes.push({
          id: clusterId,
          label: cluster.label,
          typeLabel: group?.badge || `${descendants.length} child operators`,
          kind: 'module',
          x: anchor.x,
          y: anchor.y,
          width: Math.max(240, Math.min(340, 132 + String(cluster.label || '').length * 7)),
          height: 60,
          colorKey: cluster.colorKey,
          parent: parent && visibleClusterIds.has(parent) ? parent : null,
          collapsed: true,
          collapsedClusterId: clusterId,
          descendantNodeIds: descendants.map((node) => node.id),
        });
      });

      nodes.forEach((node) => {
        if (compatibilityForNode(node)) {
          node.colorKey = 'sem:attention';
        } else if (node.colorKey === 'sem:attention') {
          node.colorKey = 'sem:linear';
        }
      });
      layoutVisibleNodes(nodes);
      const visibleNodeIds = new Set(nodes.map((node) => node.id));

      nodes.forEach((node) => {
        if (node.collapsed) return;
        if (!node.parent || !visibleClusterIds.has(node.parent)) delete node.parent;
      });

      const clusterCache = new Map();
      function projectCluster(clusterId) {
        if (clusterCache.has(clusterId)) return clusterCache.get(clusterId);
        if (!visibleClusterIds.has(clusterId)) return null;
        const source = baseClusters.get(clusterId);
        const directNodes = nodes.filter((node) => node.parent === clusterId);
        const childIds = (source.children || []).filter((childId) => visibleClusterIds.has(childId));
        const children = childIds.map(projectCluster).filter(Boolean);
        const childRects = [...directNodes.map(rectForNode), ...children.map(rectForCluster)];
        const childBounds = boundsOf(childRects);
        if (!childBounds) return null;
        const parent = hierarchy.clusterParent.get(clusterId);
        const nested = Boolean(parent && visibleClusterIds.has(parent));
        const padX = nested ? 36 : 44;
        const padTop = nested ? 56 : 64;
        const padBottom = nested ? 36 : 44;
        const projected = {
          ...source,
          x: childBounds.left - padX,
          y: childBounds.top - padTop,
          width: childBounds.right - childBounds.left + padX * 2,
          height: childBounds.bottom - childBounds.top + padTop + padBottom,
          parent: nested ? parent : null,
          nodes: directNodes.map((node) => node.id),
          children: children.map((child) => child.id),
        };
        clusterCache.set(clusterId, projected);
        return projected;
      }

      const clusters = base.clusters.map((cluster) => projectCluster(cluster.id)).filter(Boolean);
      const remapEndpoint = (nodeId) => collapsedAncestorForNode(nodeId) || nodeId;
      const edgeKeys = new Set();
      const edges = [];
      base.edges.forEach((edge) => {
        const source = remapEndpoint(edge.source);
        const target = remapEndpoint(edge.target);
        if (source === target || !visibleNodeIds.has(source) || !visibleNodeIds.has(target)) return;
        const key = `${source}->${target}`;
        if (edgeKeys.has(key)) return;
        edgeKeys.add(key);
        edges.push({ ...edge, source, target });
      });

      const graphBounds = boundsOf([...nodes.map(rectForNode), ...clusters.map(rectForCluster)]);
      const shiftX = 44 - graphBounds.left;
      const shiftY = 44 - graphBounds.top;
      nodes.forEach((node) => { node.x += shiftX; node.y += shiftY; });
      clusters.forEach((cluster) => { cluster.x += shiftX; cluster.y += shiftY; });

      const edgeCurves = new Map([
        ['e_q_stage', {
          sourceAnchor: 'right',
          targetAnchor: 'left',
          curve: 'horizontal',
        }],
        ['e_qpe_stage', {
          sourceAnchor: 'right',
          targetAnchor: 'left',
          curve: 'horizontal',
        }],
        ['e_kv_stage', {
          sourceAnchor: 'left',
          targetAnchor: 'right',
          curve: 'horizontal',
        }],
        ['e_kpe_stage', {
          sourceAnchor: 'left',
          targetAnchor: 'right',
          curve: 'horizontal',
        }],
        ['e_norm_no_store', {
          sourceAnchor: 'bottom',
          targetAnchor: 'top',
          curve: 'vertical',
        }],
        ['e_norm_partial', {
          sourceAnchor: 'bottom',
          targetAnchor: 'top',
          curve: 'vertical',
        }],
        ['e_no_output', {
          sourceAnchor: 'bottom',
          targetAnchor: 'top',
          curve: 'vertical',
        }],
        ['e_split_output', {
          sourceAnchor: 'bottom',
          targetAnchor: 'top',
          curve: 'vertical',
        }],
        ['e_dispatch_q', { sourceAnchor: 'bottom', targetAnchor: 'top', curve: 'vertical' }],
        ['e_dispatch_kv', { sourceAnchor: 'bottom', targetAnchor: 'top', curve: 'vertical' }],
      ]);
      edges.forEach((edge) => Object.assign(edge, edgeCurves.get(edge.id) || {}));

      return applyAccuracyOverlay({
        ...base,
        width: Math.ceil(graphBounds.right - graphBounds.left + 88),
        height: Math.ceil(graphBounds.bottom - graphBounds.top + 88),
        nodes,
        edges,
        clusters,
      });
    }

    function updateFoldReadout() {
      const total = state.graph?.clusters?.length || 0;
      document.getElementById('foldReadout').textContent = `${state.collapsedClusters.size}/${total} parents folded`;
    }

    function graphPointForId(graph, itemId) {
      if (!graph || !itemId) return null;
      const node = graph.nodes?.find((item) => item.id === itemId);
      if (node) return { x: node.x, y: node.y };
      const cluster = graph.clusters?.find((item) => item.id === itemId);
      if (cluster) return { x: cluster.x + cluster.width / 2, y: cluster.y + cluster.height / 2 };
      return null;
    }

    function preservedTransform(previousGraph, nextGraph, previous, anchorId) {
      if (!previous) return null;
      const stage = document.getElementById('graphStage');
      const oldPoint = graphPointForId(previousGraph, anchorId);
      const newPoint = graphPointForId(nextGraph, anchorId);
      if (oldPoint && newPoint) {
        const screenX = previous.tx + oldPoint.x * previous.zoom;
        const screenY = previous.ty + oldPoint.y * previous.zoom;
        return {
          zoom: previous.zoom,
          tx: screenX - newPoint.x * previous.zoom,
          ty: screenY - newPoint.y * previous.zoom,
        };
      }
      const centerX = stage.clientWidth / 2;
      const centerY = stage.clientHeight / 2;
      const graphX = (centerX - previous.tx) / previous.zoom;
      const graphY = (centerY - previous.ty) / previous.zoom;
      return {
        zoom: previous.zoom,
        tx: centerX - graphX * previous.zoom,
        ty: centerY - graphY * previous.zoom,
      };
    }

    function syncZoomReadout() {
      const transform = state.controller?.getTransform?.();
      document.getElementById('zoomReadout').textContent = transform ? `${Math.round(transform.zoom * 100)}%` : '—';

      state.initialAccuracyFitDone = true;

        : `${state.visibleGraph.nodes.length}/${state.schema.nodes.length} visible nodes · ${state.schema.edges.length} tensor/state edges · ${mappingCount} operator mappings · ${incompatibleCount} source-incompatible nodes · parent +/− controls`;

    function popoverPosition(canvasRect, nodeRect, panelSize, gap, inset) {
      let left = nodeRect.right - canvasRect.left + gap;
      let top = nodeRect.bottom - canvasRect.top + gap;
      let horizontal = 'right';
      let vertical = 'bottom';
      if (left + panelSize.width > canvasRect.width - inset) {
        left = nodeRect.left - canvasRect.left - panelSize.width - gap;
        horizontal = 'left';
      }
      if (top + panelSize.height > canvasRect.height - inset) {
        top = nodeRect.top - canvasRect.top - panelSize.height - gap;
        vertical = 'top';
      }
      left = Math.max(inset, Math.min(left, canvasRect.width - panelSize.width - inset));
      top = Math.max(inset, Math.min(top, canvasRect.height - panelSize.height - inset));
      return { left, top, horizontal, vertical };
    }

    function positionOperatorPopover(nodeId = state.activeNodeId) {
      const popover = document.getElementById('operatorDetailPopover');
      if (!state.operatorPopoverOpen || !nodeId) return;
      if (window.parent !== window && document.documentElement.dataset.embed) {
        notifyHostAnchor();
        return;
      }
      if (!popover.classList.contains('is-visible')) return;
      const canvas = document.querySelector('.mla-viz__canvas');
      const nodeElement = document.querySelector(`#graphStage .pto-model-graphviz-node[data-node-id="${nodeId}"]`);
      if (!canvas || !nodeElement) {
        hideOperatorPopover();
        return;
      }
      const rootStyle = getComputedStyle(document.documentElement);
      const gap = Number.parseFloat(rootStyle.getPropertyValue('--space-3'));
      const inset = Number.parseFloat(rootStyle.getPropertyValue('--space-3'));
      const position = popoverPosition(
        canvas.getBoundingClientRect(),
        nodeElement.getBoundingClientRect(),
        { width: popover.offsetWidth, height: popover.offsetHeight },
        gap,
        inset,
      );
      popover.dataset.horizontal = position.horizontal;
      popover.dataset.vertical = position.vertical;
      popover.style.left = `${position.left}px`;
      popover.style.top = `${position.top}px`;
    }

    let operatorPopoverFrame = 0;
    function scheduleOperatorPopoverPosition() {
      if (operatorPopoverFrame) cancelAnimationFrame(operatorPopoverFrame);
      operatorPopoverFrame = requestAnimationFrame(() => {
        operatorPopoverFrame = 0;
        positionOperatorPopover();
      });
    }

    function renderOperatorPopover() {
      const node = nodeById(state.activeNodeId);
      if (!node) {
        hideOperatorPopover();
        return;
      }
      state.operatorPopoverOpen = true;
      const popover = document.getElementById('operatorDetailPopover');
      if (window.parent !== window && document.documentElement.dataset.embed) {
        popover.classList.remove('is-visible');
        scheduleOperatorPopoverPosition();
        return;
      }
      popover.innerHTML = operatorPopoverHtml(node, mappingById(state.activeMappingId));
      popover.classList.add('is-visible');
      scheduleOperatorPopoverPosition();
    }

    function modelArchitectureColormapFor(pattern, graph) {
      if (typeof pattern?.modelArchitectureColormap === 'function') {
        return pattern.modelArchitectureColormap(graph);
      }
      return pattern?.standardColormap || {};
    }

    function renderGraph(options = {}) {
      const pattern = window.PtoModelGraphvizPattern;
      const previousGraph = state.visibleGraph;
      const previousTransform = state.controller?.getTransform?.() || null;
      const nextGraph = buildVisibleGraph();
      const initialTransform = options.preserveTransform
        ? preservedTransform(previousGraph, nextGraph, previousTransform, options.anchorId)
        : null;
      state.controller?.destroy?.();
      state.visibleGraph = nextGraph;
      state.controller = pattern.renderController(document.getElementById('graphStage'), state.visibleGraph, {
        ariaLabel: 'AscendPort example_mla_decode.py MLA operator architecture graph',
        colormap: modelArchitectureColormapFor(pattern, state.visibleGraph),
        className: 'pto-model-architecture-stage',
        fitMode: 'readable',
        viewportPadding: 36,
        minReadableZoom: 0.44,
        autoFit: !options.preserveTransform,
        initialTransform,
        interaction: { panZoom: true, selectable: true, selectableClusters: false, relatedHighlight: true },
        overlays: { evidence: false, edgeTags: true },
        reportOverlays: false,
        onSelect: ({ nodeId }) => handleNodeSelection(nodeId),
      });
      decorateCompatibilityGraph();
      decorateAccuracyGraph();
      updateFoldReadout();
      updateGraphStatus();
      if (options.focusNodeId && state.visibleGraph.nodes.some((node) => node.id === options.focusNodeId)) {
        state.controller.selectNode(options.focusNodeId, { source: 'fold-projection' });
      }
      window.requestAnimationFrame(() => {
        syncZoomReadout();
        positionOperatorPopover();
      });
    }

    function setClusterCollapsed(clusterId, collapsed) {
      if (!state.baseHierarchy?.clusters?.has(clusterId)) return;
      if (collapsed) state.collapsedClusters.add(clusterId);
      else state.collapsedClusters.delete(clusterId);
      renderGraph({ preserveTransform: true, anchorId: clusterId });
    }

    function expandForNode(nodeId) {
      const ancestors = state.baseHierarchy?.ancestorClustersForNode(nodeId) || [];
      let changed = false;
      ancestors.forEach((clusterId) => {
        if (!state.collapsedClusters.delete(clusterId)) return;
        changed = true;
      });
      if (changed) renderGraph({ focusNodeId: nodeId, preserveTransform: true, anchorId: nodeId });
      return changed;
    }

    function handleNodeSelection(nodeId) {
      const node = nodeById(nodeId);
      if (!node) return;
      state.activeNodeId = nodeId;
      state.activeMappingId = preferredMappingForNode(node)?.id || null;
      renderOperatorPopover();
      notifyHostSelection();
    }

    async function loadArchitecture() {
      const loadJson = async (url, fallbackId) => {
        if (window.location.protocol !== 'file:') {
          try {
            const response = await fetch(url, { cache: 'no-store' });
            if (response.ok) return response.json();
          } catch (_) {
            // The synchronized embedded payload is the standalone fallback.
          }
        }
        const embedded = document.getElementById(fallbackId)?.textContent;
        if (!embedded) throw new Error(`missing embedded fallback: ${fallbackId}`);
        return JSON.parse(embedded);
      };
      [state.schema, state.graph, state.mappingDocument] = await Promise.all([
        loadJson('../outputs/model_architecture.json', 'defaultSchemaJson'),
        loadJson('../outputs/model_architecture_graph.json', 'defaultGraphJson'),
        loadJson('../outputs/operator_mapping.json', 'defaultMappingJson'),
      ]);
      const pattern = window.PtoModelGraphvizPattern;
      if (!pattern?.renderController) throw new Error('PTO model-graphviz renderer is unavailable');
      state.baseHierarchy = pattern.buildHierarchy(state.graph);
      state.collapsedClusters = new Set(defaultCollapsedIds());
      renderGraph();
      postToHost({
        type: 'pto-mla-modelviz-ready',
        uiVersion: MODEL_VIZ_UI_VERSION,
        view: document.documentElement.dataset.view || 'architecture',
        nodes: state.schema.nodes.length,
        edges: state.schema.edges.length,
        mappings: state.mappingDocument.mappings.length,
      });
    }

    const graphStage = document.getElementById('graphStage');
    graphStage.addEventListener('click', (event) => {
      const toggle = event.target.closest?.('.pto-model-graphviz-toggle');
      if (!toggle) return;
      const clusterId = toggle.closest('[data-cluster-id]')?.dataset.clusterId;
      const nodeId = toggle.closest('[data-node-id]')?.dataset.nodeId;
      const targetId = clusterId || nodeId;
      if (!targetId || !state.baseHierarchy?.clusters?.has(targetId)) return;
      event.preventDefault();
      event.stopImmediatePropagation();
      setClusterCollapsed(targetId, Boolean(clusterId));
    }, true);

    graphStage.addEventListener('keydown', (event) => {
      if (event.key !== 'Enter' && event.key !== ' ') return;
      const clusterId = event.target.closest?.('[data-cluster-id]')?.dataset.clusterId;
      const nodeId = event.target.closest?.('[data-node-id]')?.dataset.nodeId;
      const targetId = clusterId || nodeId;
      if (!targetId || !state.baseHierarchy?.clusters?.has(targetId)) return;
      event.preventDefault();
      event.stopImmediatePropagation();
      setClusterCollapsed(targetId, Boolean(clusterId));
    }, true);

    graphStage.addEventListener('click', (event) => {
      if (event.target.closest?.('[data-node-id]')) return;
      hideOperatorPopover();
    });

    document.getElementById('foldDefaultButton').addEventListener('click', () => {
      state.collapsedClusters = new Set(defaultCollapsedIds());
      renderGraph({ preserveTransform: true });
    });
    document.getElementById('expandAllButton').addEventListener('click', () => {
      state.collapsedClusters.clear();
      renderGraph({ preserveTransform: true });
    });
    function zoomAtCenter(factor) {
      const transform = state.controller?.getTransform?.();
      if (!transform || !state.controller?.setTransform) return;
      const stage = document.getElementById('graphStage');
      const px = stage.clientWidth / 2;
      const py = stage.clientHeight / 2;
      const zoom = Math.max(0.18, Math.min(2.8, transform.zoom * factor));
      state.controller.setTransform({
        zoom,
        tx: px - (px - transform.tx) * (zoom / transform.zoom),
        ty: py - (py - transform.ty) * (zoom / transform.zoom),
      });
      syncZoomReadout();
      scheduleOperatorPopoverPosition();
    }
    document.getElementById('zoomOutButton').addEventListener('click', () => zoomAtCenter(0.88));
    document.getElementById('zoomInButton').addEventListener('click', () => zoomAtCenter(1.14));
    document.getElementById('fitButton').addEventListener('click', () => {
      state.controller?.fit?.();
      window.requestAnimationFrame(() => {
        syncZoomReadout();
        positionOperatorPopover();
      });
    });
    graphStage.addEventListener('wheel', () => {
      window.requestAnimationFrame(syncZoomReadout);
      scheduleOperatorPopoverPosition();
    }, { passive: true });
    graphStage.addEventListener('pointermove', scheduleOperatorPopoverPosition, { passive: true });
    graphStage.addEventListener('pointerup', scheduleOperatorPopoverPosition);
    window.addEventListener('resize', scheduleOperatorPopoverPosition);
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') hideOperatorPopover();
    });
    window.addEventListener('message', (event) => {
      if (event.source !== window.parent) return;
      if (event.data?.type === 'pto-mla-modelviz-dismiss-context') {
        hideOperatorPopover({ notifyHost: false });
        return;
      }
      if (event.data?.type === 'pto-mla-modelviz-set-accuracy') {
        if (event.data.uiVersion !== MODEL_VIZ_UI_VERSION) return;
        const items = Array.isArray(event.data.items) ? event.data.items : [];
        state.accuracyOverlay = new Map(items
          .filter((item) => item?.nodeId && ['pass', 'fail', 'fixed'].includes(item.status))
          .map((item) => [item.nodeId, { ...item }]));
        state.accuracyFixed = Boolean(event.data.fixed);
        if (state.schema && state.graph && state.visibleGraph) {
          state.visibleGraph = applyAccuracyOverlay(state.visibleGraph);
          decorateAccuracyGraph();
          updateGraphStatus();
          fitAccuracyGraphOnce();
          if (state.activeNodeId) {
            renderOperatorPopover();
            notifyHostSelection();
          }
        }
        return;
      }
      if (event.data?.type !== 'pto-mla-modelviz-focus-node') return;
      const nodeId = event.data.nodeId;
      if (!nodeById(nodeId)) return;
      expandForNode(nodeId);
      state.controller?.selectNode?.(nodeId, { source: 'workbench-host' });
      handleNodeSelection(nodeId);
    });
    loadArchitecture().catch((error) => {
      document.getElementById('statusText').textContent = `加载失败：${error.message}`;
    });
  </script>
</body>
</html>
