<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>910B / 950 算子迁移特征分类</title>
<link rel="stylesheet" href="../vendor/pto-design-system/css/style.css">
<link rel="stylesheet" href="../vendor/pto-design-system/patterns/workbench-shell/pattern.css">
<link rel="stylesheet" href="../vendor/pto-design-system/patterns/hardware-architecture-viewport/pattern.css">
<style>
:root {
  --background: #101010;
  --background-elevated: #141414;
  --surface-1: #161616;
  --surface-2: #1c1c1c;
  --surface-3: #262626;
  --surface-4: #313131;

  --foreground: rgba(255, 255, 255, 0.90);
  --foreground-secondary: rgba(255, 255, 255, 0.60);
  --foreground-muted: rgba(255, 255, 255, 0.40);

  --border-subtle: rgba(255, 255, 255, 0.06);
  --border-default: rgba(255, 255, 255, 0.10);
  --border-strong: rgba(255, 255, 255, 0.16);

  --primary: #4369ef;
  --primary-hover: #5a92e6;
  --accent: #ffaa3b;
  --success: #04d793;
  --danger: #ff4b7b;

  --diff-new: #4ad9e7;
  --diff-removed: #ff8a8a;

  --state-hover: rgba(255, 255, 255, 0.06);
  --state-selected: rgba(67, 105, 239, 0.18);

  --font-sans: 'Inter', 'Source Han Sans SC', 'PingFang SC', 'Noto Sans SC', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;

  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-pill: 999px;

  --shadow-md: 0 6px 18px rgba(0, 0, 0, 0.34);
  --shadow-lg: 0 12px 30px rgba(0, 0, 0, 0.42);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: var(--background);
  color: var(--foreground);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

body {
  display: grid;
  grid-template-rows: 56px 1fr;
  height: 100vh;
  overflow: hidden;
}

/* ============ Header ============ */
header.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: color-mix(in srgb, var(--background) 92%, black);
  border-bottom: 1px solid var(--border-subtle);
}
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.2px;
}
.brand .home-btn {
  width: 30px; height: 30px;
  border-radius: 8px;
  border: 1px solid var(--border-default);
  background: var(--surface-2);
  display: grid; place-items: center;
  color: var(--foreground-secondary);
  text-decoration: none;
  transition: background 120ms ease, color 120ms ease, border-color 120ms ease, transform 120ms ease;
}
.brand .home-btn:hover {
  background: var(--surface-3);
  color: var(--accent);
  border-color: color-mix(in srgb, var(--accent) 40%, var(--border-strong));
}
.brand .home-btn:active { transform: translateY(1px); }
.brand .home-btn svg { display: block; }
.brand .title-sub {
  color: var(--foreground-secondary);
  font-weight: 400;
  font-size: 12px;
  margin-left: 4px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ============ Main Grid ============ */
main.layout {
  display: flex;
  flex-direction: row;
  align-items: stretch;
  height: 100%;
  overflow: hidden;
  min-height: 0;
  padding: 10px;
  gap: 0;
  background: var(--background);
}

/* ============ Left Nav ============ */
nav.left-nav {
  background: var(--surface-2);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  overflow-y: auto;
  padding: 16px 12px;
}
nav.left-nav h2 {
  margin: 4px 8px 12px 8px;
  font-size: 11px;
  font-weight: 500;
  color: var(--foreground-muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.nav-item {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 10px 10px;
  border-radius: var(--radius-md);
  cursor: pointer;
  margin-bottom: 2px;
  border: 1px solid transparent;
  transition: background 120ms ease, border-color 120ms ease;
}
.nav-item:hover {
  background: var(--state-hover);
}
.nav-item.active {
  background: var(--state-selected);
  border-color: color-mix(in srgb, var(--primary) 45%, transparent);
}
.nav-item .num {
  flex: 0 0 22px;
  height: 22px;
  border-radius: var(--radius-sm);
  background: var(--surface-3);
  display: grid; place-items: center;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--foreground-secondary);
}
.nav-item.active .num {
  background: var(--primary);
  color: #fff;
}
.nav-item .meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.nav-item .title {
  font-size: 13px;
  font-weight: 500;
  color: var(--foreground);
  line-height: 1.35;
}
.nav-item .sub {
  font-size: 11px;
  color: var(--foreground-muted);
  line-height: 1.3;
}

.nav-divider {
  height: 1px;
  background: var(--border-subtle);
  margin: 12px 8px;
}

/* ============ Middle Detail ============ */
section.detail {
  overflow-y: auto;
  padding: 28px 32px 48px 32px;
  background: var(--surface-2);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  min-width: 0;
}
.detail-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}
.detail-badge {
  display: inline-flex;
  align-items: center;
  height: 22px;
  padding: 0 10px;
  border-radius: var(--radius-pill);
  background: color-mix(in srgb, var(--accent) 18%, transparent);
  border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
  color: var(--accent);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.3px;
}
.detail-num {
  font-family: var(--font-mono);
  color: var(--foreground-muted);
  font-size: 12px;
}
.detail-title {
  font-size: 24px;
  font-weight: 700;
  margin: 4px 0 4px 0;
  line-height: 1.25;
}
.detail-subtitle {
  font-size: 13px;
  color: var(--foreground-secondary);
  margin-bottom: 20px;
}

.essence {
  border: 1px solid color-mix(in srgb, var(--accent) 30%, var(--border-default));
  padding: 14px 16px;
  background: color-mix(in srgb, var(--accent) 8%, var(--surface-1));
  border-radius: var(--radius-md);
  margin-bottom: 24px;
  font-size: 13.5px;
  line-height: 1.6;
  color: var(--foreground);
}
.essence strong { color: var(--accent); font-weight: 600; }
.essence .label {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent);
  margin-right: 6px;
  font-weight: 600;
}

.section-h {
  font-size: 13px;
  font-weight: 600;
  color: var(--foreground);
  margin: 24px 0 10px 0;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-h::before {
  content: "";
  width: 3px; height: 14px;
  background: var(--primary);
  border-radius: 2px;
}

/* Tables */
table.spec {
  width: 100%;
  border-collapse: collapse;
  background: var(--surface-1);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  overflow: hidden;
  font-size: 12.5px;
}
table.spec thead th {
  background: var(--surface-2);
  font-size: 11px;
  font-weight: 600;
  color: var(--foreground-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  text-align: left;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-default);
}
table.spec tbody td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-subtle);
  vertical-align: top;
  color: var(--foreground);
  line-height: 1.5;
}
table.spec tbody tr:last-child td { border-bottom: none; }
table.spec tbody tr:hover td { background: rgba(255,255,255,0.02); }
table.spec code,
table.spec .code {
  font-family: var(--font-mono);
  font-size: 11.5px;
  background: var(--surface-3);
  padding: 1px 6px;
  border-radius: 4px;
  color: var(--foreground);
  white-space: nowrap;
}
.pill {
  display: inline-flex;
  align-items: center;
  height: 18px;
  padding: 0 8px;
  border-radius: var(--radius-pill);
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.3px;
}
.pill.A { color: var(--success); background: color-mix(in srgb, var(--success) 14%, transparent); border: 1px solid color-mix(in srgb, var(--success) 30%, transparent); }
.pill.B { color: var(--diff-new); background: color-mix(in srgb, var(--diff-new) 14%, transparent); border: 1px solid color-mix(in srgb, var(--diff-new) 30%, transparent); }
.pill.C { color: var(--danger); background: color-mix(in srgb, var(--danger) 14%, transparent); border: 1px solid color-mix(in srgb, var(--danger) 30%, transparent); }
.pill.opp { color: var(--accent); background: color-mix(in srgb, var(--accent) 14%, transparent); border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); }
.pill.neutral { color: var(--foreground-muted); background: var(--surface-3); border: 1px solid var(--border-default); }
.pill.del { color: var(--diff-removed); background: color-mix(in srgb, var(--diff-removed) 14%, transparent); border: 1px solid color-mix(in srgb, var(--diff-removed) 30%, transparent); }
.pill.new { color: var(--diff-new); background: color-mix(in srgb, var(--diff-new) 14%, transparent); border: 1px solid color-mix(in srgb, var(--diff-new) 30%, transparent); }

.note {
  margin-top: 12px;
  padding: 12px 14px;
  background: var(--surface-1);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  font-size: 12.5px;
  line-height: 1.6;
  color: var(--foreground-secondary);
}
.note strong { color: var(--foreground); font-weight: 600; }

.reverse-map dt {
  font-size: 13px;
  color: var(--foreground);
  font-weight: 500;
  margin-top: 12px;
}
.reverse-map dd {
  font-size: 12.5px;
  color: var(--foreground-secondary);
  margin: 4px 0 0 16px;
  line-height: 1.5;
}

/* Lead block: subject · motivation · effect */
.lead {
  display: grid;
  grid-template-columns: 56px 1fr;
  gap: 10px 14px;
  align-items: start;
  padding: 14px 16px;
  background: var(--surface-1);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  margin-bottom: 16px;
}
.lead .lead-label {
  font-size: 10.5px;
  color: var(--foreground-muted);
  letter-spacing: 0.5px;
  font-weight: 600;
  text-transform: uppercase;
  padding-top: 3px;
  white-space: nowrap;
}
.lead .lead-value {
  font-size: 13px;
  line-height: 1.55;
  color: var(--foreground);
}
.lead .lead-value.actor { font-weight: 600; }
.lead .lead-value.goal  { color: var(--foreground-secondary); }
.lead .lead-arrow {
  grid-column: 1 / -1;
  height: 1px;
  background: var(--border-subtle);
  margin: 2px 0;
}

/* Legend strip for category detail pages */
.legend-strip {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  padding: 10px 12px;
  background: var(--surface-1);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  margin-bottom: 20px;
  font-size: 12px;
}
.legend-strip .legend-label {
  color: var(--foreground-muted);
  font-size: 11px;
  margin-right: 4px;
}
.legend-strip .legend-pair {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 8px 3px 4px;
  border-radius: var(--radius-pill);
  background: var(--surface-2);
  color: var(--foreground-secondary);
  font-size: 11.5px;
}

/* A/B/C detail cards (in speedlookup view) */
.abc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 14px;
  margin-bottom: 24px;
}
.abc-card {
  background: var(--surface-1);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.abc-card .card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.abc-card .card-title {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.3;
  color: var(--foreground);
}
.abc-card .card-tagline {
  font-size: 11.5px;
  color: var(--foreground-muted);
  font-style: italic;
}
.abc-card h4 {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--foreground-muted);
  margin: 0 0 4px 0;
}
.abc-card ul, .abc-card ol {
  margin: 0;
  padding-left: 18px;
  font-size: 12px;
  line-height: 1.55;
  color: var(--foreground);
}
.abc-card ul li, .abc-card ol li {
  margin-bottom: 4px;
}
.abc-card ul li::marker { color: var(--foreground-muted); }
.abc-card ol li::marker { color: var(--foreground-muted); font-weight: 600; }
.abc-card .card-section + .card-section { margin-top: 4px; }

/* ============ Right Hardware Pane ============ */
aside.right-pane {
  background: var(--surface-2);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  display: grid;
  grid-template-rows: 56px 1fr 60px;
  overflow: hidden;
}
.hw-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--surface-2);
}
.hw-toolbar .title {
  font-size: 12px;
  font-weight: 600;
  color: var(--foreground);
  letter-spacing: 0.3px;
}
.hw-toolbar .title small {
  color: var(--foreground-muted);
  font-weight: 400;
  margin-left: 6px;
}
.hw-controls {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 3px;
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  background: var(--surface-3);
}
.hw-control {
  appearance: none;
  height: 24px;
  min-width: 24px;
  padding: 0 8px;
  border: 0;
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--foreground-secondary);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
}
.hw-control:hover,
.hw-control:focus-visible {
  color: var(--foreground);
  background: var(--surface-4);
}
.hw-control[disabled] {
  color: var(--foreground-muted);
  opacity: 0.35;
  cursor: default;
}
.hw-zoom-readout {
  min-width: 38px;
  cursor: default;
}

.seg {
  display: inline-flex;
  background: var(--surface-3);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  overflow: hidden;
  padding: 2px;
  gap: 2px;
}
.seg button {
  appearance: none;
  background: transparent;
  border: none;
  color: var(--foreground-secondary);
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 500;
  padding: 4px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 120ms ease, color 120ms ease;
}
.seg button:hover { color: var(--foreground); }
.seg button.active {
  background: var(--primary);
  color: #fff;
}

.hw-frame-wrap {
  position: relative;
  overflow: hidden;
  background: var(--background);
  --hw-scale: 0.6;
}
.hw-frame-wrap iframe {
  width: calc(100% / var(--hw-scale));
  height: calc(100% / var(--hw-scale));
  border: 0;
  display: block;
  transform: scale(var(--hw-scale));
  transform-origin: top left;
}

.hw-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  border-top: 1px solid var(--border-subtle);
  background: var(--surface-2);
  gap: 12px;
}
.diff-btn {
  appearance: none;
  height: 30px;
  padding: 0 14px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-default);
  background: var(--surface-3);
  color: var(--foreground);
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all 120ms ease;
}
.diff-btn:hover { background: var(--surface-4); }
.diff-btn.active {
  background: color-mix(in srgb, var(--diff-new) 18%, var(--surface-3));
  border-color: color-mix(in srgb, var(--diff-new) 50%, transparent);
  color: var(--diff-new);
}
.diff-btn .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--foreground-muted);
}
.diff-btn.active .dot {
  background: var(--diff-new);
  box-shadow: 0 0 6px var(--diff-new);
}

.legend {
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 11px;
  color: var(--foreground-muted);
}
.legend .swatch {
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.legend .swatch::before {
  content: "";
  width: 8px; height: 8px;
  border-radius: 2px;
  background: var(--accent);
}
.legend .swatch.new::before { background: var(--diff-new); }
.legend .swatch.del::before { background: var(--diff-removed); }

/* ============ Scrollbar ============ */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: var(--surface-3);
  border-radius: 6px;
  border: 2px solid transparent;
  background-clip: padding-box;
}
::-webkit-scrollbar-thumb:hover { background: var(--surface-4); background-clip: padding-box; border: 2px solid transparent; }

/* ============ Helpers ============ */
.arrow { color: var(--foreground-muted); margin: 0 4px; }
.delete-mark { color: var(--diff-removed); font-weight: 600; }
.new-mark { color: var(--diff-new); font-weight: 600; }
.muted { color: var(--foreground-muted); }
</style>
</head>
<body>

<header class="layout-header layout-header-filled workbench-shell-header topbar">
  <div class="brand">
    <a href="../launch.html" class="home-btn" aria-label="返回 launch 首页" title="返回 launch">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 10.5 12 3l9 7.5V20a1.5 1.5 0 0 1-1.5 1.5h-4V14h-7v7.5h-4A1.5 1.5 0 0 1 3 20z"/>
      </svg>
    </a>
    <span>910B → 950 算子迁移特征分类</span>
    <span class="title-sub">9 类本质差异 × 硬件架构联动</span>
  </div>
  <div class="header-right">
    <div class="seg" id="arch-seg" role="tablist" aria-label="架构切换">
      <button data-arch="910b" class="active">910B</button>
      <button data-arch="950b">950</button>
    </div>
  </div>
</header>

<main class="workbench-frame-split layout">
  <nav class="workbench-pane left-nav" id="left-nav">
    <h2>速查 · 先看这里</h2>
    <div class="nav-item" data-cat="map">
      <div class="num">★</div>
      <div class="meta">
        <div class="title">三类迁移场景 A / B / C</div>
        <div class="sub">识别特征 + 处理方式 + 反向映射</div>
      </div>
    </div>
    <div class="nav-divider"></div>
    <h2>9 类本质差异</h2>
    <div id="nav-list"></div>
  </nav>

  <section class="workbench-pane detail" id="detail"></section>

  <aside class="workbench-pane right-pane pto-hw-viewport">
    <div class="hw-toolbar pto-hw-viewport__toolbar">
      <div class="title pto-hw-viewport__title">硬件架构图 <small id="hw-status">910B</small></div>
      <div class="hw-controls pto-hw-viewport__controls pto-hw-viewport__tools" aria-label="画布设置">
        <button type="button" class="hw-control pto-hw-viewport__tool" id="hw-detail-toggle" aria-pressed="true">细节开</button>
        <button type="button" class="hw-control pto-hw-viewport__tool" id="hw-zoom-out" aria-label="缩小">−</button>
        <button type="button" class="hw-control hw-zoom-readout pto-hw-viewport__tool pto-hw-viewport__readout" id="hw-zoom-reset" aria-label="重置缩放">60%</button>
        <button type="button" class="hw-control pto-hw-viewport__tool" id="hw-zoom-in" aria-label="放大">+</button>
      </div>
    </div>
    <div class="hw-frame-wrap pto-hw-viewport__stage">
      <iframe class="pto-hw-viewport__frame" id="hw-iframe" src="hardware-frame.html?preset=ascend910b" title="hardware architecture"></iframe>
    </div>
    <div class="hw-footer">
      <button id="diff-btn" class="diff-btn" disabled title="切换到 950 后启用">
        <span class="dot"></span>

function pill(kind, text) {
  const label = text || kind;
  return `<span class="pill ${kind}">${escapeHTML(label)}</span>`;
}
function escapeHTML(s) {
  return String(s).replace(/[&<>]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[ch]));
}

      '矩阵计算使用 L0A/L0B/L0C、<code>LoadData</code>、<code>Mmad</code>、<code>Fixpipe</code>',
      '使用 <code>int4b_t</code> Cube Matmul',
      '使用 4:2 结构化稀疏',
      '使用 <code>SetLoadDataBoundary</code>',
      '代码假设 GM → L0 或 L1 → GM 通路存在',
      '写死 UB 大小、bank group、核数、分形布局',
    ],
    actions: [
      '<strong>不能</strong>只改 <code>CMAKE_ASC_ARCHITECTURES</code>',
      '先按迁移指南逐项检查数据通路和矩阵分形',
      '重写或拆分搬运路径，例如 GM → L1 → L0',
      'int4 路径改为 Vector Cast 到 int8，或改用 950 的 MXFP/FP8 低比特方案',
      '重新调 tiling 和 bank 规避策略',
    ],
  },
};

const REVERSE_MAP = {
  reverse: {
    head: ['算子里只命中…', '多半属于', '因为'],
    rows: [
      ['仅类别 1 的 <code>dav-2201, dav-3510</code> 双声明', pill('A','A'), '主观就奔着跨架构去'],
      ['类别 2（RegBase 全家）+ 类别 1 的 <code>dav-3510</code>', pill('B','B'), '950 原生编程对象'],
      ['类别 3（SIMT）', pill('B','B'), '950 原生执行模型'],
      ['类别 7（MX / Histograms）', pill('B','B'), '950 原生 ISA'],
      ['类别 4 / 5 / 6 任一', pill('C','C'), '触到了 Cube 硬件假设'],
      ['类别 8（UB bank 写死）', pill('C','C'), 'SRAM 微架构假设'],
      ['类别 9 的 Subnormal / IA 检查', pill('C','C') + ' <span class="muted">(兼 A 精度风险)</span>', '数值 / 调试假设'],
    ],
  },
};

/* ====================================================================
   STATE + RENDER
   ==================================================================== */
let state = {
  arch: '910b',       // '910b' | '950b'
  selectedId: 'map',  // category id or 'map'
  diff: false,        // show-diff toggled
  iframeReady: false,
  hwDetailsVisible: true,
  hwZoomIndex: 2,
};

const HW_ZOOM_LEVELS = [0.4, 0.5, 0.6, 0.7, 0.8, 0.9, 1, 1.1, 1.2];
const TAXONOMY_SPLIT_KEY = 'ascend950-taxonomy-column-sizes-v3';
const TAXONOMY_SPLIT_DEFAULT = [18, 46, 36];
const TAXONOMY_SPLIT_MIN = [200, 440, 360];

let splitLayoutFrame = 0;
function scheduleSplitLayoutRefresh() {
  if (splitLayoutFrame) cancelAnimationFrame(splitLayoutFrame);
  splitLayoutFrame = requestAnimationFrame(() => {
    splitLayoutFrame = 0;
    syncHardwareControls();
  });
}

function initTaxonomySplit() {
  const shell = window.PtoWorkbenchShell;
  if (!shell?.initResizablePanes) return;
  shell.initResizablePanes({
    panes: ['#left-nav', '#detail', '.right-pane'],
    direction: 'horizontal',
    sizes: TAXONOMY_SPLIT_DEFAULT,
    minSize: TAXONOMY_SPLIT_MIN,
    gutterSize: 10,
    storageKey: TAXONOMY_SPLIT_KEY,
    gutterLabel: '调整相邻栏宽度',
    onResize: scheduleSplitLayoutRefresh,
  });
}

const DIFF_950_NEW = {
  selectors: ['[data-aiv-node="exec:SIMT"]', '[data-aic-node="buffer:FP"]'],
  routes: ['aic-to-aiv1', 'aiv2-to-aic', 'l2-to-aiv2', 'l2-to-aiv2-dcache', 'aiv2-to-l2'],
};

function renderNav() {
  const list = document.getElementById('nav-list');
  list.innerHTML = CATEGORIES.map(cat => `
    <div class="nav-item ${state.selectedId === cat.id ? 'active' : ''}" data-cat="${cat.id}">
      <div class="num">${cat.id}</div>
      <div class="meta">
        <div class="title">${escapeHTML(cat.title)}</div>
        <div class="sub">${escapeHTML(cat.sub)}</div>
      </div>
    </div>
  `).join('');

  // Mark "map" entry active state
  document.querySelectorAll('[data-cat="map"]').forEach(el => {
    el.classList.toggle('active', state.selectedId === 'map');
  });
}

function renderTable(tbl) {
  const head = tbl.head.map(h => `<th>${h}</th>`).join('');
  const rows = tbl.rows.map(r => `<tr>${r.map(cell => `<td>${cell}</td>`).join('')}</tr>`).join('');
  return `<table class="spec"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table>`;
}

function renderLegendStrip() {
  return `
    <div class="legend-strip">
      <span class="legend-label">表中"提示"标记：</span>
      <span class="legend-pair">${pill('A','A')}<span>重编译试试</span></span>
      <span class="legend-pair">${pill('B','B')}<span>950 原生能力</span></span>
      <span class="legend-pair">${pill('C','C')}<span>重写硬件路径</span></span>
      <span class="legend-pair">${pill('opp','优化机会')}<span>新增能力，主动用</span></span>
      <span class="legend-pair">${pill('del','删')}<span>2201 → 3510 移除</span></span>
      <span class="legend-pair">${pill('new','新增')}<span>3510 独有</span></span>
    </div>
  `;
}

function renderLead(lead) {
  if (!lead) return '';
  return `
    <div class="lead">
      <div class="lead-label">主语</div>
      <div class="lead-value actor">${lead.actor}</div>
      <div class="lead-label">目标</div>
      <div class="lead-value goal">为了 ${lead.goal}</div>
      <div class="lead-arrow"></div>
      <div class="lead-label">结果</div>
      <div class="lead-value">${lead.effect}</div>
    </div>
  `;
}

function renderDetailCategory(cat) {
  return `
    <div class="detail-head">
      <span class="detail-num">类别 ${cat.id}</span>
      <span class="detail-badge">${escapeHTML(cat.badge)}</span>
    </div>
    <h1 class="detail-title">${escapeHTML(cat.title)}</h1>
    <div class="detail-subtitle">${escapeHTML(cat.sub)}</div>

    ${renderLead(cat.lead)}
    ${renderLegendStrip()}

    <div class="essence">
      <span class="label">本质</span>${cat.essence}
    </div>

    <div class="section-h">关键词与对照</div>
    ${renderTable(cat.table)}

    ${cat.note ? `<div class="note">${cat.note}</div>` : ''}
  `;
}

function renderAbcCard(d) {
  const features = d.features.map(f => `<li>${f}</li>`).join('');
  const actions = d.actions.map(a => `<li>${a}</li>`).join('');
  return `
    <div class="abc-card ${d.kind}">
      <div class="card-head">
        <div>
          <div class="card-title">${escapeHTML(d.title)}</div>
          <div class="card-tagline">${escapeHTML(d.tagline)}</div>
        </div>
        ${pill(d.kind, d.kind)}
      </div>
      <div class="card-section">
        <h4>识别特征（典型）</h4>
        <ul>${features}</ul>
      </div>
      <div class="card-section">
        <h4>处理方式</h4>
        <ol>${actions}</ol>
      </div>
    </div>
  `;
}

function renderDetailMap() {
  return `
    <div class="detail-head">
      <span class="detail-num">速查</span>
      <span class="detail-badge">A / B / C</span>
    </div>
    <h1 class="detail-title">三类迁移场景</h1>
    <div class="detail-subtitle">先建立 A/B/C 心智模型；再去看左侧 9 类本质差异，"提示"列就懂了</div>

    <div class="section-h">三类速查（识别特征 + 处理方式）</div>
    <div class="abc-grid">
      ${renderAbcCard(ABC_DETAIL.A)}
      ${renderAbcCard(ABC_DETAIL.B)}
      ${renderAbcCard(ABC_DETAIL.C)}
    </div>

    <div class="section-h">反向映射：9 类信号 → A / B / C</div>
    ${renderTable(REVERSE_MAP.reverse)}

    <div class="note">
      <strong>记忆口诀：</strong> A 是"改 CMake 试试看"；B 是"它本来就是 950 的，反过来要不要给 2201 写降级版"；C 是"得重写硬件路径"。
    </div>
  `;
}

function renderDetail() {
  const el = document.getElementById('detail');
  if (state.selectedId === 'map') {
    el.innerHTML = renderDetailMap();
  } else {
    const cat = CATEGORIES.find(c => c.id === state.selectedId);
    el.innerHTML = renderDetailCategory(cat);
  }
  el.scrollTop = 0;
}

/* ====================================================================
   HARDWARE FRAME COMM
   ==================================================================== */
const iframe = document.getElementById('hw-iframe');

function syncHardwareControls() {
  const scale = HW_ZOOM_LEVELS[state.hwZoomIndex] || 0.6;
  const wrap = document.querySelector('.hw-frame-wrap');
  const detailBtn = document.getElementById('hw-detail-toggle');
  const zoomOut = document.getElementById('hw-zoom-out');
  const zoomIn = document.getElementById('hw-zoom-in');
  const zoomReset = document.getElementById('hw-zoom-reset');
  wrap?.style.setProperty('--hw-scale', String(scale));
  if (detailBtn) {
    detailBtn.textContent = state.hwDetailsVisible ? '细节开' : '细节关';
    detailBtn.setAttribute('aria-pressed', state.hwDetailsVisible ? 'true' : 'false');
  }
  if (zoomReset) zoomReset.textContent = `${Math.round(scale * 100)}%`;
  if (zoomOut) zoomOut.disabled = state.hwZoomIndex <= 0;
  if (zoomIn) zoomIn.disabled = state.hwZoomIndex >= HW_ZOOM_LEVELS.length - 1;
}

function postHardwareDetails() {
  if (!state.iframeReady) return;
  iframe.contentWindow.postMessage({
    type: 'hardware-details',
    visible: state.hwDetailsVisible,
  }, '*');
}

function syncArchUi() {
  document.querySelectorAll('#arch-seg button').forEach((button) => {
    button.classList.toggle('active', button.dataset.arch === state.arch);
  });
  document.getElementById('hw-status').textContent = state.arch === '910b' ? '910B' : '950';

  const diffBtn = document.getElementById('diff-btn');
  if (state.arch === '910b') {
    diffBtn.disabled = true;
    diffBtn.classList.remove('active');
    state.diff = false;
    diffBtn.title = '切换到 950 后启用';
  } else {
    diffBtn.disabled = false;
    diffBtn.title = '高亮 950 相对 910B 的新增节点 / 通路';
  }
}

function postHardwareArch() {
  if (!state.iframeReady || !iframe.contentWindow) return;
  iframe.contentWindow.postMessage({
    type: 'hardware-arch-change',
    preset: state.arch === '910b' ? 'ascend910b' : 'ascend950b',
  }, '*');
}

function markIframeReady() {
  if (state.iframeReady) return;
  state.iframeReady = true;
  applyArch();
  postHardwareDetails();
}

function ensureIframeReady() {
  if (state.iframeReady) return;
  try {
    const readyState = iframe.contentDocument?.readyState;
    if (readyState === 'interactive' || readyState === 'complete') {
      markIframeReady();
    }
  } catch (error) {
    // File/iframe access can be restricted in some browsers; message/load events still cover the normal path.
  }
}

window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'hardware-ready') {
    markIframeReady();
  }
});

iframe.addEventListener('load', () => {
  requestAnimationFrame(markIframeReady);
});

window.addEventListener('load', () => {
  requestAnimationFrame(ensureIframeReady);
  setTimeout(ensureIframeReady, 250);
});

function applyArch() {
  syncArchUi();
  postHardwareArch();
  postHardwareDetails();

  // Hardware arch change can take a moment to apply; re-apply highlight after.
  setTimeout(applyHighlight, 120);
}

function applyHighlight() {
  if (!state.iframeReady) return;

  let selectors = [];
  let routes = [];

  // Category-driven highlight
  if (state.selectedId !== 'map') {
    const cat = CATEGORIES.find(c => c.id === state.selectedId);
    const hl = cat?.hl?.[state.arch] || { selectors: [], routes: [] };
    selectors = [...hl.selectors];
    routes = [...hl.routes];
  }

  // Diff overlay (only when on 950 and active)
  if (state.diff && state.arch === '950b') {
    selectors = [...selectors, ...DIFF_950_NEW.selectors];
    routes = [...routes, ...DIFF_950_NEW.routes];
  }

  iframe.contentWindow.postMessage({
    type: 'hardware-focus',
    selectors,
    routes,
  }, '*');
}

/* ====================================================================
   EVENT BINDING
   ==================================================================== */
document.getElementById('left-nav').addEventListener('click', (e) => {
  const item = e.target.closest('.nav-item');
  if (!item) return;
  const cat = item.dataset.cat;
  state.selectedId = cat === 'map' ? 'map' : Number(cat);
  renderNav();
  renderDetail();
  applyHighlight();
});

document.getElementById('arch-seg').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-arch]');
  if (!btn) return;
  state.arch = btn.dataset.arch;
  applyArch();
});

document.getElementById('diff-btn').addEventListener('click', () => {
  if (state.arch !== '950b') return;
  state.diff = !state.diff;
  document.getElementById('diff-btn').classList.toggle('active', state.diff);
  applyHighlight();
});

document.getElementById('hw-detail-toggle').addEventListener('click', () => {
  state.hwDetailsVisible = !state.hwDetailsVisible;
  syncHardwareControls();
  postHardwareDetails();
});

document.getElementById('hw-zoom-out').addEventListener('click', () => {
  state.hwZoomIndex = Math.max(0, state.hwZoomIndex - 1);
  syncHardwareControls();
});

document.getElementById('hw-zoom-in').addEventListener('click', () => {
  state.hwZoomIndex = Math.min(HW_ZOOM_LEVELS.length - 1, state.hwZoomIndex + 1);
  syncHardwareControls();
});

document.getElementById('hw-zoom-reset').addEventListener('click', () => {
  state.hwZoomIndex = HW_ZOOM_LEVELS.indexOf(0.6);
  syncHardwareControls();
});

/* ====================================================================
   INIT
   ==================================================================== */
renderNav();
renderDetail();
syncHardwareControls();
syncArchUi();
initTaxonomySplit();
// applyArch fires once iframe sends 'hardware-ready'.
</script>

</body>
</html>
