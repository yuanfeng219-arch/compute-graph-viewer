<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ascend 950B 硬件路径工作台</title>
  <link rel="stylesheet" href="../design-system-share/css/style.css">
  <link rel="stylesheet" href="../design-system-share/patterns/aic-core-object/pattern.css">
  <link rel="stylesheet" href="../design-system-share/patterns/aiv-core-object/pattern.css">
  <link rel="stylesheet" href="../design-system-share/patterns/memory-architecture/pattern.css">
  <style>
    body {
      min-width: 1360px;
      background: var(--background);
    }

    .wb-page {
      display: grid;
      grid-template-rows: 58px minmax(0, 1fr);
      height: 100vh;
      overflow: hidden;
    }

    .wb-brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      min-width: 0;
    }

    .wb-brand-mark {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-md);
      background: linear-gradient(180deg, var(--surface-4), var(--surface-2));
      border: 1px solid var(--border-default);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--success);
      font: 700 13px / 1 var(--font-mono);
    }

    .wb-title-stack {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .wb-title {
      font: var(--text-title-2);
      color: var(--foreground);
      white-space: nowrap;
    }

    .wb-subtitle {
      color: var(--foreground-muted);
      font: var(--text-label);
      letter-spacing: 0;
      white-space: nowrap;
    }

    .wb-context {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      min-width: 0;
      flex-wrap: wrap;
    }

    .wb-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: var(--tag-height);
      padding: 0 var(--space-2);
      border-radius: var(--tag-radius);
      border: 1px solid var(--comp-tag-border);
      background: var(--comp-tag-bg);
      color: var(--foreground-secondary);
      font: var(--text-label);
      letter-spacing: 0;
      white-space: nowrap;
    }

    .wb-chip strong {
      color: var(--foreground);
      font-weight: var(--font-weight-semibold);
    }

    .wb-chip.is-verdict {
      color: var(--success);
      border-color: color-mix(in srgb, var(--success) 24%, transparent);
      background: color-mix(in srgb, var(--success) 10%, transparent);
    }

    .wb-workbench {
      min-height: 0;
      padding: var(--space-4);
      display: grid;
      grid-template-columns: minmax(440px, 34%) minmax(520px, 42%) minmax(320px, 24%);
      grid-template-rows: minmax(0, 1fr);
      gap: var(--space-4);
    }

    .wb-panel {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .wb-source-panel {
      grid-column: 1;
      grid-row: 1;
    }

    .wb-hardware-panel {
      grid-column: 2;
      grid-row: 1;
    }

    .wb-inspector-panel {
      grid-column: 3;
      grid-row: 1;
    }

    .wb-source-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding: var(--space-3) 0;
    }

    .source-line {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) auto;
      gap: var(--space-3);
      padding: 1px 0;
      position: relative;
      align-items: baseline;
    }

    .source-line-tag {
      align-self: center;
      margin-right: var(--space-3);
    }

    .tk-comment { color: var(--foreground-muted); font-style: italic; }
    .tk-keyword { color: #c792ea; }
    .tk-type    { color: #82aaff; }
    .tk-string  { color: #c3e88d; }
    .tk-number  { color: #f78c6c; }
    .tk-fn      { color: #82aaff; }

    .source-line-no {
      color: var(--foreground-muted);
      font: var(--text-mono);
      text-align: right;
      user-select: none;
      padding-right: var(--space-2);
      opacity: 0.55;
    }

    .source-line-code {
      color: color-mix(in srgb, var(--foreground) 88%, transparent);
      font: 500 12px / 1.5 var(--font-mono);
      white-space: pre;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: var(--space-3);
    }

    .source-line.is-key {
      cursor: pointer;
    }

    .source-line.is-key::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--surface-4);
      border-radius: 0 2px 2px 0;
    }

    .source-line.is-key:hover {
      background: color-mix(in srgb, var(--surface-2) 60%, transparent);
    }

    .source-line.is-key.is-compute::before { background: var(--success); }
    .source-line.is-key.is-memory::before { background: var(--primary-hover); }
    .source-line.is-key.is-control::before { background: var(--warning); }

    .source-line.is-key .source-line-no {
      opacity: 1;
      color: var(--foreground-secondary);
      font-weight: 600;
    }

    .source-line.is-key.is-selected {
      background: color-mix(in srgb, var(--primary) 14%, transparent);
    }

    .source-line.is-key.is-selected .source-line-code {
      color: var(--foreground);
    }

    .line-detail {
      margin: 2px var(--space-3) var(--space-3) 56px;
    }

    .line-detail-card {
      min-width: 0;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      background: color-mix(in srgb, var(--surface-1) 88%, transparent);
      padding: var(--space-3);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: var(--space-3);
      cursor: pointer;
      transition: background var(--duration-fast) var(--easing-default), border-color var(--duration-fast) var(--easing-default);
    }

    .line-detail-card:hover {
      background: var(--surface-1);
      border-color: var(--border-default);
    }

    .line-detail.is-open .line-detail-card {
      background: color-mix(in srgb, var(--primary) 10%, var(--surface-2));
      border-color: color-mix(in srgb, var(--primary) 60%, var(--border-default));
    }

    .line-detail-main {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .line-detail-head {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex-wrap: wrap;
    }

    .line-detail-title {
      min-width: 0;
      color: var(--foreground);
      font: var(--text-body-sm);
      line-height: 1.45;
    }

    .line-detail-path {
      color: var(--foreground-secondary);
      font: var(--text-body-sm);
      line-height: 1.45;
    }

    .line-detail-expanded {
      display: none;
      gap: var(--space-2);
    }

    .line-detail.is-open .line-detail-expanded {
      display: grid;
    }

    .line-detail-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(64px, 1fr));
      gap: var(--space-2);
      align-self: start;
    }

    .line-mini-metric {
      border-radius: var(--radius-md);
      border: 1px solid transparent;
      background: var(--surface-1);
      padding: var(--space-2);
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .line-mini-metric span {
      color: var(--foreground-muted);
      font: var(--text-label);
      letter-spacing: 0;
      white-space: nowrap;
    }

    .line-mini-metric strong {
      color: var(--foreground);
      font: 700 12px / 1.1 var(--font-sans);
      white-space: nowrap;
    }

    .wb-panel .panel-shell-header {
      min-height: 50px;
      flex: 0 0 auto;
    }

    .wb-header-copy {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .wb-panel-kicker {
      color: var(--foreground-muted);
      font: var(--text-label);
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .wb-panel-subtitle {
      color: var(--foreground-secondary);
      font: var(--text-body-sm);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mode-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 22px;
      padding: 0 var(--space-2);
      border-radius: var(--radius-pill);
      background: var(--surface-3);
      border: 1px solid var(--border-default);
      color: var(--foreground-secondary);
      font: var(--text-label);
      letter-spacing: 0;
      white-space: nowrap;
    }

    .mode-tag.is-compute {
      color: var(--success);
      border-color: color-mix(in srgb, var(--success) 30%, transparent);
    }

    .mode-tag.is-memory {
      color: var(--primary-hover);
      border-color: color-mix(in srgb, var(--primary-hover) 32%, transparent);
    }

    .mode-tag.is-control {
      color: var(--warning);
      border-color: color-mix(in srgb, var(--warning) 32%, transparent);
    }

    .hardware-viewport {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding: 0 var(--space-2) var(--space-2);
      position: relative;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      grid-template-columns: minmax(0, 1fr);
    }

    .hardware-scale {
      width: max-content;
      height: max-content;
      transform-origin: top left;
      position: relative;
      place-self: center;
    }

    .hardware-frame {
      display: block;
      width: 1200px;
      height: 820px;
      border: 0;
      background: transparent;
      transform-origin: top left;
    }

    .hardware-frame-fallback {
      color: var(--foreground-secondary);
      font: var(--text-body-sm);
    }

    .hardware-status {
      position: sticky;
      left: 0;
      bottom: 0;
      z-index: var(--z-raised);
      width: max-content;
      max-width: 100%;
      margin-top: var(--space-3);
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      padding: var(--space-2);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-subtle);
      background: color-mix(in srgb, var(--background-elevated) 92%, transparent);
      backdrop-filter: blur(12px);
    }

    .path-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 0 var(--space-2);
      border-radius: var(--radius-pill);
      background: var(--surface-3);
      border: 1px solid var(--border-default);
      color: var(--foreground-secondary);
      font: var(--text-label);
      letter-spacing: 0;
    }

    .path-chip::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--foreground-muted);
    }

    .path-chip.is-active::before {
      background: var(--warning);
    }

    .inspector-body {
      min-height: 0;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      padding: var(--space-3);
    }

    .inspector-section {
      min-width: 0;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-subtle);
      background: var(--surface-1);
      padding: var(--space-3);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .inspector-section-title {
      color: var(--foreground-muted);
      font: var(--text-label);
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .inspector-controls {
      position: relative;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 2px;
      padding: 3px;
      background: color-mix(in srgb, var(--surface-2) 60%, transparent);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      --tier-x: 3px;
      --tier-w: 0px;
    }

    .inspector-controls::before {
      content: "";
      position: absolute;
      top: 3px;
      bottom: 3px;
      left: 0;
      width: var(--tier-w);
      transform: translateX(var(--tier-x));
      background: var(--background-elevated);
      border-radius: calc(var(--radius-md) - 3px);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.28), 0 0 0 1px color-mix(in srgb, var(--border-default) 60%, transparent);
      transition: transform 240ms cubic-bezier(0.4, 0, 0.2, 1), width 240ms cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      z-index: 0;
    }

    .inspector-controls .btn {
      position: relative;
      z-index: 1;
      background: transparent;
      border: 0;
      color: var(--foreground-muted);
      transition: color 200ms ease;
    }

    .inspector-controls .btn:hover {
      background: transparent;
      color: var(--foreground-secondary);
    }

    .inspector-controls .btn.is-selected {
      background: transparent;
      color: var(--foreground);
      font-weight: var(--font-weight-semibold);
    }

    .evidence-body {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .evidence-summary,
    .evidence-explain,
    .evidence-metrics {
      min-width: 0;
      border-radius: var(--radius-lg);
      border: 1px solid transparent;
      background: color-mix(in srgb, var(--surface-2) 82%, transparent);
      padding: var(--space-3);
    }

    .evidence-summary {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .summary-line {
      color: var(--foreground);
      font: var(--text-mono);
    }

    .summary-path {
      color: var(--foreground-secondary);
      font: var(--text-body-sm);
      line-height: 1.5;
    }

    .reason-list {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .reason-pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0 var(--space-2);
      border-radius: var(--radius-pill);
      border: 1px solid var(--border-default);
      background: var(--comp-tag-bg);
      color: var(--foreground-secondary);
      font: var(--text-label);
      letter-spacing: 0;
      white-space: nowrap;
    }

    .evidence-explain {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: var(--space-3);
    }

    .evidence-block {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .rewrite-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
    }

    .rewrite-apply {
      flex: 0 0 auto;
    }

    .evidence-label {
      color: var(--foreground-muted);
      font: var(--text-label);
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .evidence-text {
      color: var(--foreground-secondary);
      font: var(--text-body-sm);
      line-height: 1.55;
    }

    .rewrite-code {
      color: var(--foreground);
      background: var(--background);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-2);
      font: var(--text-mono);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      overflow: auto;
    }

    .evidence-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-2);
    }

    .metric-card {
      min-width: 0;
      border-radius: var(--radius-md);
      border: 1px solid transparent;
      background: var(--surface-1);
      padding: var(--space-2);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .slider-row {
      display: grid;
      gap: var(--space-2);
      padding: var(--space-3);
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--surface-2) 82%, transparent);
      border: 1px solid var(--border-subtle);
    }

    .slider-row div {
      display: flex;
      justify-content: space-between;
      gap: var(--space-2);
      color: var(--foreground-secondary);
      font: var(--text-body-sm);
    }

    .slider-row input {
      width: 100%;
    }

    .analysis-list,
    .hybrid-split,
    .mode-signal-list {
      display: grid;
      gap: var(--space-2);
    }

    .finding,
    .hybrid-card,
    .mode-signal {
      min-width: 0;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      background: color-mix(in srgb, var(--surface-2) 82%, transparent);
      padding: var(--space-3);
      display: grid;
      gap: var(--space-2);
    }

    .finding strong,
    .hybrid-card strong,
    .mode-signal strong {
      color: var(--foreground);
      font: var(--text-body-sm);
    }

    .finding p,
    .hybrid-card p,
    .mode-signal p {
      color: var(--foreground-secondary);
      font: var(--text-body-sm);
      line-height: 1.5;
    }

    .reason-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: var(--space-3);
      align-items: center;
      padding: var(--space-2) 0;
      border-bottom: 1px solid var(--border-subtle);
    }

    .reason-row:last-child {
      border-bottom: 0;
    }

    .reason-row code {
      color: var(--danger);
      font-family: var(--font-mono);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    #reasonList {
      display: grid;
      gap: 0;
    }

    .metric-label {
      color: var(--foreground-muted);
      font: var(--text-label);
      letter-spacing: 0;
    }

    .metric-value {
      color: var(--foreground);
      font: 700 15px / 1.2 var(--font-sans);
      white-space: normal;
      overflow-wrap: anywhere;
    }

    @media (max-width: 1420px) {
      body {
        min-width: 1360px;
      }

      .wb-workbench {
        grid-template-columns: minmax(420px, 34%) minmax(500px, 42%) minmax(300px, 24%);
      }

      .evidence-body {
        grid-template-columns: minmax(0, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="wb-page">
    <header class="layout-header layout-header-filled">
      <div class="layout-header-left">
        <a href="../launch.html" class="home-link" title="Back to Launcher">⌂</a>
        <div class="wb-brand">
          <span class="wb-brand-mark">950</span>
          <div class="wb-title-stack">
            <div class="wb-title">硬件路径工作台</div>
            <div class="wb-subtitle">代码 ↔ 硬件 ↔ 决策同步审查</div>
          </div>
        </div>
        <div class="wb-context" aria-label="Context">
          <span class="wb-chip">内核 <strong>fp8_mmad_masked_reduce</strong></span>
          <span class="wb-chip">目标 <strong>Ascend 950B</strong></span>
          <span class="wb-chip">分析层级 <strong>T2 静态 + 画像</strong></span>
          <span class="wb-chip is-verdict">结论 <strong>混合路径</strong></span>
        </div>
      </div>
      <div class="layout-header-right">
        <button class="btn btn-sm" type="button" id="analyzeBtn">分析</button>
        <button class="btn btn-solid btn-sm" type="button">应用建议</button>
      </div>
    </header>

    <main class="wb-workbench">
      <section class="panel-shell panel-shell-quiet wb-panel wb-source-panel" aria-label="Kernel source">
        <header class="panel-shell-header">
          <div class="wb-header-copy">
            <span class="wb-panel-kicker">内核源代码</span>
            <h1 class="panel-shell-title">fp8_mmad_masked_reduce.tik</h1>
          </div>
          <div class="panel-shell-meta">
            <span class="wb-chip">100 行</span>
            <span class="wb-chip is-verdict">6 行已标注</span>
          </div>
        </header>
        <div class="wb-source-body layout-surface-fill-strong" id="sourceBody" role="listbox" aria-label="Kernel source lines"></div>
      </section>

      <section class="panel-shell panel-shell-quiet wb-panel wb-hardware-panel" id="hardwarePanel" aria-label="950B hardware architecture map">
        <header class="panel-shell-header">
          <div class="wb-header-copy">
            <span class="wb-panel-kicker">硬件架构图</span>
            <h2 class="panel-shell-title">Ascend 950B 当前数据路径</h2>
          </div>
          <div class="panel-shell-meta">
            <div class="segmented-control segmented-control-muted" aria-label="Path filter">
              <button class="btn btn-sm is-selected" type="button" data-path-kind="compute">计算路径</button>
              <button class="btn btn-sm" type="button" data-path-kind="memory">访存路径</button>
              <button class="btn btn-sm" type="button" data-path-kind="control">控制路径</button>
            </div>
            <div class="toolbar-control">
              <button class="btn btn-sm btn-ghost" type="button" id="fitBtn">适配</button>
              <button class="btn btn-sm btn-ghost" type="button" id="actualBtn">1:1</button>
              <span class="toolbar-readout" id="zoomReadout">100%</span>
            </div>
          </div>
        </header>
        <div class="hardware-viewport layout-surface-fill" id="hardwareViewport">
          <div class="hardware-scale" id="hardwareScale">
            <iframe class="hardware-frame" id="hardwareFrame" src="./hardware-frame.html" title="Ascend 950B architecture map"></iframe>
          </div>
          <div class="hardware-status" id="pathChips"></div>
        </div>
      </section>

      <section class="panel-shell panel-shell-quiet wb-panel wb-inspector-panel" aria-label="Inspector">
        <header class="panel-shell-header">
          <div class="wb-header-copy">
            <h2 class="panel-shell-title">Inspector</h2>
          </div>
          <div class="panel-shell-meta">
            <span class="wb-chip" id="selectedLineChip">第 48 行</span>
            <span class="wb-chip is-verdict" id="selectedVerdictChip">SIMD / Cube</span>
          </div>
        </header>
        <div class="panel-shell-body inspector-body layout-surface-fill">
          <section class="inspector-section" aria-label="Decision basis">
            <span class="inspector-section-title">基本解释</span>
            <div class="evidence-body" id="evidenceBody"></div>

    function highlightCpp(code) {
      const escaped = code
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      const re = /(\/\/.*$)|(&quot;[^&]*?&quot;)|(\b\d+\b)|([A-Za-z_][A-Za-z0-9_]*)/g;
      let out = '';
      let last = 0;
      let m;
      while ((m = re.exec(escaped)) !== null) {
        if (m.index > last) out += escaped.slice(last, m.index);
        if (m[1]) out += `<span class="tk-comment">${m[1]}</span>`;
        else if (m[2]) out += `<span class="tk-string">${m[2]}</span>`;
        else if (m[3]) out += `<span class="tk-number">${m[3]}</span>`;
        else if (m[4]) {
          const id = m[4];
          const next = escaped[re.lastIndex];
          if (CPP_KEYWORDS.has(id)) out += `<span class="tk-keyword">${id}</span>`;
          else if (CPP_TYPES.has(id)) out += `<span class="tk-type">${id}</span>`;
          else if (next === '(') out += `<span class="tk-fn">${id}</span>`;
          else out += id;
        }
        last = re.lastIndex;
      }
      if (last < escaped.length) out += escaped.slice(last);
      return out;
    }

      }
      if (line.kind === 'memory') {
        items.push(['NDDMA / 128B Sector', '访存检查会继续标注 stride、slice、broadcast 和 sector 命中率，未命中时进入重写建议。']);
      }
      if (line.id === 'l57') {
        items.push(['C-V 交接点', '这一行是 Cube 域到 Vector 域的边界，FixPipe / BufferID 的顺序语义要进入白盒报告。']);
      }
      if (line.id === 'l82') {
        items.push(['SIMT 岛', 'mask 随元素变化，建议把最小分支区域拆成 SIMT region，避免拖慢前后的 SIMD 主干。']);
      }
      if (state.tailLength === 0) {
        items.push(['What-if', 'tail length 为 0 时，当前 kernel 可以收敛到 PURE SIMD，SIMT 岛和切换开销都可以消失。']);
      } else {
        items.push(['What-if', `tail length = ${state.tailLength}，保留 SIMT tail region；若 tail 密度继续升高，需要 T3 仿真校准分歧成本。`]);
      }
      if (state.kTile <= 64) {
        items.push(['Tile 风险', 'K tile 偏小，Cube 利用率会下降，Inspector 会提高 SIMT 或重切 tile 的权重。']);
      } else if (state.kTile >= 256) {
        items.push(['寄存器压力', 'K tile 偏大，T2/T3 需要检查寄存器 spill 和 UB handoff 是否抵消 SIMD 收益。']);
      }
      return items;
    }

    function extraReasonCodes(line) {
      const codes = [];
      if (line.id === 'l57') codes.push('bufferid_migration_candidate', 'fixpipe_burst_boundary');
      if (line.id === 'l82') codes.push('simt_region_split', 'lane_mask_penalty');
      if (line.kind === 'memory') codes.push('sector_128b_watch', 'nddma_rewrite_candidate');
      if (line.kind === 'compute') codes.push('dual_issue_candidate');
      if (state.tailLength === 0) codes.push('counterfactual_tail_zero');
      return codes;
    }

    function hybridSplitCards(line) {
      const simtText = state.tailLength === 0
        ? 'tail 已清零，SIMT 岛可以被折叠，CI 只需要保留 reason code 追踪。'
        : `tail=${state.tailLength}，mask / ragged 分支保留为 SIMT 岛，避免 SIMD lane masking 侵蚀主循环吞吐。`;
      const handoffText = line.id === 'l57'
        ? '当前行就是主交接点：L0C 经 FixPipe / C-V 直通路进入 AIV UB，建议在报告中显式标注同步边界。'
        : '主交接点仍在 L57：FixPipe、C-V 直通路和 BufferID 语义决定 Hybrid 切换成本。';
      return [
        ['SIMD trunk', `L42-L73 保持 GM/L2 预取、Cube FP8 MMAD 和 Vector epilogue 的稠密路径，K tile=${state.kTile}。`],
        ['SIMT island', simtText],
        ['Handoff cost', handoffText],
        ['White-box report', 'Feature enablement report 应列出 NDDMA、C-V 直通路、FixPipe、BufferID、MXFPx 的使能率和未使能原因。']
      ];
    }

    function renderInspectorDetails() {
      const line = selectedLine();
      const tier = TIER_TEXT[state.tier];
      const modeTag = qs('#modeTag');
      if (!modeTag) return;
      modeTag.textContent = `${tier[1]} analysis`;
      qsa('[data-tier]').forEach((button) => {
        button.classList.toggle('is-selected', button.dataset.tier === state.tier);
      });
      syncTierIndicator();
      qs('#kValue').textContent = state.kTile;
      qs('#tailValue').textContent = state.tailLength;
      qs('#analysisList').innerHTML = analysisFindings(line).map((item) => finding(item[0], item[1])).join('');
      const codes = line.reasons.map(reasonCode).concat(extraReasonCodes(line));
      qs('#reasonList').innerHTML = codes.map((code, index) => `
        <div class="reason-row">
          <code>${escapeHtml(code)}</code>
          <span class="wb-chip">${index === 0 ? 'primary' : index < line.reasons.length ? 'supporting' : '950'}</span>
        </div>
      `).join('');
      qs('#hybridSplit').innerHTML = hybridSplitCards(line).map((item) => `
        <article class="hybrid-card">
          <strong>${escapeHtml(item[0])}</strong>
          <p>${escapeHtml(item[1])}</p>
        </article>
      `).join('');
    }

    function renderInspector() {
      renderEvidence();
      renderInspectorDetails();
    }

    function onApplyRewrite(btn) {
      const original = btn.textContent;
      btn.textContent = '已应用';
      btn.disabled = true;
      setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 1600);
    }

    function renderPathChips() {
      const line = selectedLine();
      const chips = qs('#pathChips');
      chips.innerHTML = '';
      line.path.split('→').map((item) => item.trim()).forEach((item, index) => {
        const chip = document.createElement('span');
        chip.className = `path-chip ${index > 0 && index < line.path.split('→').length - 1 ? 'is-active' : ''}`;
        chip.textContent = item;
        chips.appendChild(chip);
      });
    }

    function clearHardwareFocus() {
      postHardwareFocus([], []);
    }

    function applyHardwareFocus() {
      const line = selectedLine();
      postHardwareFocus(line.selectors, line.routes);
    }

    function selectLine(id) {
      state.selectedId = id;
      const selected = selectedLine();
      state.pathKind = selected.kind;
      syncPathButtons();
      renderSource();
      renderInspector();
      renderPathChips();
      applyHardwareFocus();
    }

    function syncPathButtons() {
      qsa('[data-path-kind]').forEach((button) => {
        button.classList.toggle('is-selected', button.dataset.pathKind === state.pathKind);
      });
    }

    function selectPathKind(kind) {
      state.pathKind = kind;
      const next = LINES.find((line) => line.kind === kind);
      if (next) state.selectedId = next.id;
      syncPathButtons();
      renderSource();
      renderInspector();
      renderPathChips();
      applyHardwareFocus();
    }

    function renderHardware() {
      const frame = qs('#hardwareFrame');
      frame.addEventListener('load', () => {
        state.frameReady = true;
        requestAnimationFrame(() => {
          if (state.fitted) fitHardware();
          applyHardwareFocus();
        });
      });
    }

    function fitHardware() {
      const viewport = qs('#hardwareViewport');
      const scaleEl = qs('#hardwareScale');
      if (!viewport || !scaleEl) return;
      const availableWidth = Math.max(1, viewport.clientWidth - 28);
      const availableHeight = Math.max(1, viewport.clientHeight - 76);
      const scale = Math.min(1, availableWidth / state.frameSize.width, availableHeight / state.frameSize.height);
      setHardwareScale(Math.max(0.36, scale));
      state.fitted = true;
    }

    function actualSizeHardware() {
      setHardwareScale(1);
      state.fitted = false;
    }

    function setHardwareScale(scale) {
      const scaleEl = qs('#hardwareScale');
      const frame = qs('#hardwareFrame');
      const naturalWidth = state.frameSize.width;
      const naturalHeight = state.frameSize.height;
      state.scale = scale;
      scaleEl.style.width = `${Math.ceil(naturalWidth * scale)}px`;
      scaleEl.style.height = `${Math.ceil(naturalHeight * scale)}px`;
      frame.style.width = `${naturalWidth}px`;
      frame.style.height = `${naturalHeight}px`;
      frame.style.transform = `scale(${scale})`;
      qs('#zoomReadout').textContent = `${Math.round(scale * 100)}%`;
    }

    function postHardwareFocus(selectors, routes) {
      const frame = qs('#hardwareFrame');
      if (!state.frameReady || !frame.contentWindow) return;
      frame.contentWindow.postMessage({
        type: 'hardware-focus',
        selectors,
        routes,
      }, '*');
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function syncTierIndicator() {
      const container = qs('.inspector-controls');
      if (!container) return;
      const sel = container.querySelector('.is-selected');
      if (!sel) return;
      const cr = container.getBoundingClientRect();
      const sr = sel.getBoundingClientRect();
      container.style.setProperty('--tier-x', `${sr.left - cr.left}px`);
      container.style.setProperty('--tier-w', `${sr.width}px`);
    }
    window.addEventListener('resize', syncTierIndicator);

    qsa('[data-path-kind]').forEach((button) => {
      button.addEventListener('click', () => selectPathKind(button.dataset.pathKind));
    });
    qsa('[data-tier]').forEach((button) => {
      button.addEventListener('click', () => {
        state.tier = button.dataset.tier;
        renderInspector();
      });
    });
    qs('#kSlider').addEventListener('input', (event) => {
      state.kTile = Number(event.target.value);
      renderInspector();
    });
    qs('#tailSlider').addEventListener('input', (event) => {
      state.tailLength = Number(event.target.value);
      renderInspector();
    });
    qs('#fitBtn').addEventListener('click', fitHardware);
    qs('#actualBtn').addEventListener('click', actualSizeHardware);
    qs('#analyzeBtn').addEventListener('click', () => selectLine(state.selectedId));
    window.addEventListener('message', (event) => {
      if (!event.data || (event.data.type !== 'hardware-ready' && event.data.type !== 'hardware-size')) return;
      state.frameSize = {
        width: Math.max(1, Number(event.data.width) || state.frameSize.width),
        height: Math.max(1, Number(event.data.height) || state.frameSize.height),
      };
      state.frameReady = true;
      if (state.fitted) fitHardware();
      applyHardwareFocus();
    });
    window.addEventListener('resize', () => {
      if (state.fitted) fitHardware();
    });

    state.selectedId = 'l42';
    state.pathKind = 'memory';
    syncPathButtons();
    renderSource();
    renderInspector();
    renderPathChips();
    renderHardware();
    setTimeout(() => {
      selectLine('l42');
    }, 50);
  </script>
</body>
</html>
