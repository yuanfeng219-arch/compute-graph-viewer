<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swimlane Viewer</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23121318'/%3E%3Crect x='12' y='18' width='40' height='8' rx='4' fill='%237b57bf'/%3E%3Crect x='12' y='30' width='28' height='8' rx='4' fill='%234d79d4'/%3E%3Crect x='12' y='42' width='34' height='8' rx='4' fill='%234da56d'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="../vendor/pto-design-system/tokens/foundation.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/tokens/semantic.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/css/style.css?v=2">
  <link rel="stylesheet" href="./styles.css?v=2">
<style>
html.preview .toolbar,
html.preview #swSummary,
html.preview #swEmptyState,
html.preview .sw-analysis-row,
html.preview .sw-insight-grid,
html.preview .sw-resource-panel,
html.preview .sw-data-mode-bar,
html.preview .sw-chart-controls,
html.preview #swDiffSummary,
html.preview .sw-chart-panel-head,
html.preview #swComparePanel,
html.preview #swDetailPanel,
html.preview .sw-journey-panel,
html.preview .sw-journey-toggle,
html.preview .sw-lane-header,
html.preview .sw-lane-label-viewport { display: none !important; }
html.preview .sw-page { overflow: hidden; }
html.preview #swViewer { flex: 1; }
html.preview .sw-chart-stack,
html.preview .sw-chart-panel,
html.preview .sw-grid {
  height: 100vh;
  min-height: 100vh;
}
html.preview .sw-grid {
  grid-template-columns: 1fr !important;
  grid-template-rows: 46px 1fr !important;
}
html.preview * { pointer-events: none !important; cursor: default !important; }
</style>
<script>if(new URLSearchParams(location.search).get('preview')==='1')document.documentElement.classList.add('preview');</script>
</head>
<body class="swimlane-page">
  <div class="sw-page">
    <header class="toolbar">
      <div class="toolbar-l">
        <a class="home-link" href="../launch.html" title="Back To Home" aria-label="Back To Home">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 6.2L7 2l5 4.2v5.1a.7.7 0 01-.7.7H8.6V8.9a.6.6 0 00-.6-.6H6a.6.6 0 00-.6.6V12H2.7a.7.7 0 01-.7-.7V6.2z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
          </svg>
        </a>
        <span class="graph-title" id="swFileMeta">正在准备内置泳道样例</span>
        <div id="swSummary" class="graph-stats"></div>
      </div>
      <div class="toolbar-r">
        <div class="sw-search-group">
          <button id="swSearchToggle" class="sw-search-icon-btn" type="button" aria-label="搜索">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.4"/>
              <line x1="10.5" y1="10.5" x2="14" y2="14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </button>
          <input id="swSearchInput" class="sw-search-input" type="search" placeholder="搜索 task / lane / label">
          <button id="swSearchPrev" class="btn btn-icon sw-search-nav" type="button" aria-label="上一个匹配" title="上一个匹配">↑</button>
          <button id="swSearchNext" class="btn btn-icon sw-search-nav" type="button" aria-label="下一个匹配" title="下一个匹配">↓</button>
          <span id="swSearchCount" class="sw-search-count">0 / 0</span>
        </div>
        <div class="sw-action-group">
          <button id="swResourceToggleBtn" class="btn sw-resource-cta" type="button">加载本地资源</button>
        </div>
        <input id="swFolderInput" type="file" webkitdirectory directory multiple accept=".json,.py,application/json,text/x-python" hidden>
        <input id="swFileInput" type="file" accept=".json,application/json" hidden>
        <input id="swCompareFileInput" type="file" accept=".json,application/json" hidden>
        <input id="swProgramFileInput" type="file" accept=".json,application/json" hidden>
      </div>
    </header>

    <section id="swResourcePanel" class="sw-resource-panel" hidden>
      <div class="sw-resource-panel-head">
        <div>
          <div class="sw-resource-panel-title">资源管理</div>
          <div class="sw-resource-panel-sub">优先绑定整个模块目录，单文件导入只作为手动覆盖。</div>
        </div>
        <button id="swResourceCloseBtn" class="sw-resource-close btn btn-icon" type="button" aria-label="关闭资源面板">×</button>
      </div>
      <div class="sw-resource-panel-body">
        <section class="sw-resource-section">
          <div class="sw-resource-section-head">
            <span class="sw-resource-section-title">模块目录</span>
            <span class="sw-resource-section-note">推荐入口</span>
          </div>
          <div id="swResourceFolderStatus" class="sw-resource-status-list"></div>
          <div class="sw-resource-actions">
            <button id="swOpenFolderBtn" class="btn" type="button">选择模块目录</button>
          </div>
        </section>
        <section class="sw-resource-section">
          <div class="sw-resource-section-head">
            <span class="sw-resource-section-title">手动覆盖</span>
            <span class="sw-resource-section-note">只在自动识别不准时使用</span>
          </div>
          <div id="swResourceFilesStatus" class="sw-resource-status-list"></div>
          <div class="sw-resource-actions">
            <button id="swOpenLocalBtn" class="btn" type="button">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M1.5 4h3.5l1.5 1.5H12a.5.5 0 01.5.5v6a.5.5 0 01-.5.5H2a.5.5 0 01-.5-.5V4.5A.5.5 0 011.5 4z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
              </svg>
              导入主泳道
            </button>
            <button id="swOpenCompareBtn" class="btn" type="button">导入参考泳道</button>
            <button id="swBindProgramBtn" class="btn" type="button">导入 Program</button>
          </div>
        </section>
      </div>
    </section>

    <section id="swEmptyState" class="empty-state">
      <div class="empty-card">
        <div class="empty-icon-wrap">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect x="3" y="5" width="22" height="4" rx="2" fill="rgba(123,87,191,0.9)"/>
            <rect x="3" y="12" width="15" height="4" rx="2" fill="rgba(77,121,212,0.9)"/>
            <rect x="3" y="19" width="18" height="4" rx="2" fill="rgba(77,165,109,0.9)"/>
          </svg>
        </div>
        <h2 class="empty-title">Swimlane 执行视图</h2>
        <p class="empty-sub">页面默认打开内置样例，也可直接选择整个 <code>output_deepseek</code> 文件夹，自动识别 <code>merged_swimlane.json</code> 与 <code>program.json</code>。</p>
      </div>
    </section>

    <section id="swViewer" class="sw-viewer" hidden>
      <div class="sw-shell">
        <div class="sw-analysis-row" aria-hidden="true"></div>

        <div class="sw-chart-stack" id="swChartStack">
          <section class="sw-chart-panel" id="swPrimaryPanel" data-chart-key="primary">
            <div class="sw-chart-panel-head">
              <div>
                <div class="sw-chart-panel-title" id="swPrimaryPanelTitle">Primary</div>
                <div class="sw-chart-panel-meta" id="swPrimaryPanelMeta"></div>
              </div>
            </div>
            <div class="sw-chart-controls">
              <div class="sw-chart-controls-section sw-chart-controls-section--mode">
                <span class="sw-controls-section-label">模式</span>
                <div class="sw-chart-controls-row">
                  <span class="sw-filter-label">样例</span>
                  <div class="sw-toggle-group">
                    <button id="swBeforeBtn" class="btn sw-toggle-btn sw-toggle-active" type="button">Before</button>
                    <button id="swAfterBtn"  class="btn sw-toggle-btn" type="button">After</button>
                  </div>
                  <span class="sw-filter-label">视图</span>
                  <div class="sw-view-mode-group">
                    <button id="swSingleViewBtn" class="btn sw-view-mode-btn" type="button">单视图</button>
                    <button id="swCompareViewBtn" class="btn sw-view-mode-btn" type="button">对比</button>
                    <button id="swDiffViewBtn" class="btn sw-view-mode-btn" type="button">Diff</button>
                  </div>
                </div>
              </div>
              <div class="sw-chart-controls-section">
                <span class="sw-controls-section-label">筛选</span>
                <div class="sw-chart-controls-row">
                  <span class="sw-filter-label">Lane</span>
                  <div id="swLaneKindFilters" class="sw-chip-row"></div>
                </div>
                <div class="sw-chart-controls-row">
                  <span class="sw-filter-label">Stitch</span>
                  <div id="swSeqFilters" class="sw-chip-row"></div>
                </div>
              </div>
              <div class="sw-chart-controls-section sw-chart-controls-section--quick">
                <div class="sw-zoom-group">
                  <button id="swZoomOutBtn" class="btn" type="button">缩小</button>
                  <button id="swZoomInBtn"  class="btn" type="button">放大</button>
                  <button id="swZoomFitBtn" class="btn" type="button">适配</button>
                </div>
                <div class="sw-more-menu-wrap">
                  <button id="swMoreControlsBtn" class="btn sw-more-menu-btn" type="button" aria-expanded="false">更多</button>
                  <div id="swMoreControlsMenu" class="sw-more-menu" hidden>
                    <div class="sw-more-menu-section">
                      <div class="sw-more-menu-title">显示</div>
                      <div class="sw-chart-controls-row">
                        <span class="sw-filter-label">Color</span>
                        <select id="swColorMode" class="sw-select">
                          <option value="semantic">语义标签</option>
                          <option value="engine">执行单元 / Lane</option>
                          <option value="stitch">Stitch（仅泳道）</option>
                          <option value="subgraph">子图 / Leaf</option>
                        </select>
                      </div>
                      <div class="sw-chart-controls-row">
                        <span class="sw-filter-label">Sort</span>
                        <select id="swSortMode" class="sw-select">
                          <option value="default">默认顺序</option>
                          <option value="gap">按最大气泡</option>
                          <option value="util">按利用率</option>
                          <option value="taskCount">按任务数</option>
                          <option value="duration">按工作时长</option>
                        </select>
                      </div>
                    </div>
                    <div class="sw-more-menu-section">
                      <div class="sw-more-menu-title">分析</div>
                      <div class="sw-chart-controls-row">
                        <button id="swToggleBubbles" class="btn" type="button">Bubbles</button>
                        <button id="swMeasureModeBtn" class="btn" type="button">Measure</button>
                        <button id="swClearRangeBtn" class="btn" type="button">清除区间</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div id="swBindingStatus" class="sw-status-pill-row"></div>
            </div>
            <section id="swDiffSummary" class="sw-diff-inline" hidden>
              <div class="sw-card-head">
                <h2 class="sw-card-title">Diff</h2>
                <div id="swCompareStatus" class="sw-card-meta"></div>
              </div>
              <div id="swDiffMetrics" class="sw-diff-metrics"></div>
              <div id="swDiffTopLanes" class="sw-diff-list"></div>
            </section>
            <div class="sw-grid">
              <div class="sw-lane-header" id="swPrimaryLaneHeader"></div>
              <div class="sw-timeline-viewport" id="swPrimaryTimelineViewport">
                <div class="sw-timeline-track" id="swPrimaryTimelineTrack"></div>
              </div>
              <div class="sw-lane-label-viewport" id="swPrimaryLaneLabelViewport">
                <div class="sw-lane-label-track" id="swPrimaryLaneLabelTrack"></div>
              </div>
              <div class="sw-lane-main-viewport" id="swPrimaryLaneMainViewport">
                <svg id="swDepOverlay" class="sw-dep-overlay" aria-hidden="true"></svg>
                <div class="sw-lane-main-track" id="swPrimaryLaneMainTrack"></div>
              </div>
            </div>
          </section>

          <section class="sw-chart-panel" id="swComparePanel" data-chart-key="compare" hidden>
            <div class="sw-chart-panel-head">
              <div>
                <div class="sw-chart-panel-title" id="swComparePanelTitle">Reference</div>
                <div class="sw-chart-panel-meta" id="swComparePanelMeta"></div>
              </div>
            </div>
            <div class="sw-grid">
              <div class="sw-lane-header" id="swCompareLaneHeader"></div>
              <div class="sw-timeline-viewport" id="swCompareTimelineViewport">
                <div class="sw-timeline-track" id="swCompareTimelineTrack"></div>
              </div>
              <div class="sw-lane-label-viewport" id="swCompareLaneLabelViewport">
                <div class="sw-lane-label-track" id="swCompareLaneLabelTrack"></div>
              </div>
              <div class="sw-lane-main-viewport" id="swCompareLaneMainViewport">
                <div class="sw-lane-main-track" id="swCompareLaneMainTrack"></div>
              </div>
            </div>
          </section>
        </div>

        <!-- Ghost elements: hidden from layout but kept for JS data binding -->
        <div class="sw-insight-grid" aria-hidden="true">
          <div id="swRangeSummary" hidden></div>
          <div id="swLaneInsights" hidden></div>
          <div id="swLabelInsights" hidden></div>
          <div id="swExplanation" hidden></div>
        </div>
      </div>
    </section>
  </div>

  <!-- Split View Container -->
  <div id="swSplitContainer" class="sw-split-container" hidden>
    <div class="sw-split-top" id="swSplitTop">
      <div class="sw-split-top-bar">
        <span class="sw-split-top-label" id="swSplitLabel">Pass IR</span>
        <button id="swSplitClose" class="sw-split-close-btn btn" type="button">关闭分屏 ×</button>
      </div>
      <iframe id="swGraphIframe" class="sw-split-iframe" src="" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
    </div>
    <div class="sw-split-divider" id="swSplitDivider" title="拖动调整分屏比例"></div>
    <div class="sw-split-bottom" id="swSplitBottom">
      <!-- Swimlane chart will be moved here when split is active -->
    </div>
  </div>

  <aside class="detail-panel sw-detail-panel" id="swDetailPanel">
    <div class="detail-header">
      <div class="detail-type-badge" id="swDetailBadge">TASK</div>
      <span class="detail-name" id="swDetailName">Task detail</span>
      <button class="btn btn-icon detail-close" id="swDetailClose" type="button" aria-label="关闭">×</button>
    </div>
    <div class="sw-detail-subhead" id="swDetailDataset"></div>
    <div class="detail-body" id="swDetailBody"></div>
  </aside>

  <!-- Journey Panel -->
  <aside id="swJourneyPanel" class="sw-journey-panel sw-journey-panel--hidden">
    <div class="sw-journey-header">
      <span class="sw-journey-title">分析旅程</span>
      <button id="swJourneyClose" class="sw-journey-close" type="button" title="收起">×</button>
    </div>
    <div id="swJourneyCards" class="sw-journey-cards"></div>
  </aside>
  <button id="swJourneyToggle" class="sw-journey-toggle" type="button" title="分析旅程">⊞</button>

  <div id="swTaskPopup" class="sw-task-popup" hidden>
    <div class="sw-task-popup-header">
      <span class="sw-task-popup-badge" id="swPopupBadge">AIC</span>
      <span class="sw-task-popup-name" id="swPopupName"></span>
      <button class="sw-task-popup-close" id="swPopupClose" type="button">×</button>
    </div>
    <div class="sw-task-popup-body" id="swPopupBody"></div>
  </div>

  <script>
  (function() {
    const STITCH_COLORS = ['#7b57bf', '#4d79d4', '#4da56d', '#d98f55', '#45b5c4', '#c86aa0', '#00a6fb', '#eab308'];

    const LABEL_COLORS = {
      'Prolog-Quant': '#9b6bde',
      'Query-Linear': '#7b57bf',
      'Query-Dequant': '#4d79d4',
      'Query-Hadamard': '#6f63c5',
      'Weight-Linear': '#4da56d',
      'Key-Linear': '#d98f55',
      'Key-Hadamard': '#e39b63',
      'Key-LayerNorm': '#c86aa0',
      'Key-Rope2D': '#45b5c4',
      fake: '#6f6a64',
      unknown: '#6f6a64',
    };

    const LANE_KIND_COLORS = {
      fake: '#6f6a64',
      aic: '#7b57bf',
      aiv: '#4d79d4',
      aicpu: '#4da56d',
      other: '#8c847c',
    };

    function stableHash(input) {
      let hash = 2166136261;
      const value = String(input || '');
      for (let i = 0; i < value.length; i += 1) {
        hash ^= value.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function hueColor(input, saturation, lightness) {
      const hash = stableHash(input);
      const hue = hash % 360;
      return `hsl(${hue} ${saturation}% ${lightness}%)`;
    }

    window.PTO_COLORMAP = {
      colorForLaneKind(kind) {
        return LANE_KIND_COLORS[kind] || LANE_KIND_COLORS.other;
      },
      colorForTask(task, mode = 'semantic') {
        if (mode === 'stitch') {
          const index = Math.abs(task?.seqNo || 0) % STITCH_COLORS.length;
          return STITCH_COLORS[index];
        }
        if (mode === 'engine') {
          return this.colorForLaneKind(task?.laneKind);
        }
        if (mode === 'subgraph') {
          const key = task?.subgraphKey || task?.subGraphId || task?.leafHash || task?.label;
          return hueColor(key, 58, 56);
        }
        return LABEL_COLORS[task?.label] || hueColor(task?.label, 54, 54);
      },
    };
  })();
  </script>
  <script src="./data.js?v=2"></script>
  <script src="./app.js?v=2"></script>
</body>
</html>
