<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">former/tail 尾块策略示意图</title>
  <desc id="desc">Host 将不均分的总工作量拆成 former cores 与 tail cores 两组，kernel 按 core index 选择不同长度。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#151925"/><stop offset="1" stop-color="#101010"/></linearGradient>
    <style>
      .t{font-family:Inter, PingFang SC, Microsoft YaHei, sans-serif;fill:#e6e6e6}.muted{fill:#9aa3b5}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.label{font-size:12px;letter-spacing:.6px}.h{font-size:22px;font-weight:700}.s{font-size:14px}.small{font-size:12px}.box{fill:#1c2230;stroke:#343e55;stroke-width:1}.line{stroke:#667085;stroke-width:1.5;fill:none}.blue{fill:#5a92e6}.orange{fill:#ffaa3b}.dark{fill:#101521}.tag{fill:#242b3d}
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L8,4.5 L0,9 Z" fill="#7c8db8"/></marker>
  </defs>
  <rect width="960" height="560" rx="18" fill="url(#bg)"/>
  <text class="t h" x="44" y="54">former/tail：按核分出两套工作量</text>
  <text class="t muted s" x="44" y="82">适用于总长度无法均分到各核，但希望多数核心仍走规整、无分支的主路径。</text>

  <rect class="box" x="44" y="122" width="244" height="164" rx="12"/>
  <text class="t label muted" x="66" y="153">HOST / TILING</text>
  <text class="t s" x="66" y="183">总工作量：1,000</text>
  <text class="t s" x="66" y="211">BLOCK_DIM：8</text>
  <rect class="tag" x="66" y="231" width="196" height="32" rx="6"/>
  <text class="t mono small" x="78" y="252">former: 7 × 128</text>
  <text class="t mono small" x="78" y="277">tail: 1 × 104</text>

  <path class="line" d="M289 203 H356" marker-end="url(#arrow)"/>
  <text class="t muted small" x="306" y="190">长度写入 tiling data</text>

  <rect class="box" x="372" y="122" width="544" height="164" rx="12"/>
  <text class="t label muted" x="394" y="153">DEVICE / KERNEL</text>
  <text class="t mono small" x="394" y="181">if (GetBlockIdx() &lt; formerNum)  coreLength = formerLength;</text>
  <text class="t mono small" x="394" y="205">else                             coreLength = tailLength;</text>
  <g transform="translate(394 226)">
    <rect class="blue" width="57" height="32" rx="5"/><rect class="blue" x="64" width="57" height="32" rx="5"/><rect class="blue" x="128" width="57" height="32" rx="5"/><rect class="blue" x="192" width="57" height="32" rx="5"/><rect class="blue" x="256" width="57" height="32" rx="5"/><rect class="blue" x="320" width="57" height="32" rx="5"/><rect class="blue" x="384" width="57" height="32" rx="5"/><rect class="orange" x="448" width="57" height="32" rx="5"/>
    <g class="t mono small"><text x="13" y="21">c0</text><text x="77" y="21">c1</text><text x="141" y="21">c2</text><text x="205" y="21">c3</text><text x="269" y="21">c4</text><text x="333" y="21">c5</text><text x="397" y="21">c6</text><text x="461" y="21">c7</text></g>
  </g>

  <text class="t label muted" x="44" y="344">每个核心的实际覆盖范围</text>
  <g transform="translate(44 365)">
    <rect class="blue" width="107" height="54" rx="7"/><rect class="blue" x="114" width="107" height="54" rx="7"/><rect class="blue" x="228" width="107" height="54" rx="7"/><rect class="blue" x="342" width="107" height="54" rx="7"/><rect class="blue" x="456" width="107" height="54" rx="7"/><rect class="blue" x="570" width="107" height="54" rx="7"/><rect class="blue" x="684" width="107" height="54" rx="7"/><rect class="orange" x="798" width="87" height="54" rx="7"/>
    <g class="t mono small"><text x="12" y="22">core 0</text><text x="16" y="41">128</text><text x="126" y="22">core 1</text><text x="130" y="41">128</text><text x="240" y="22">core 2</text><text x="244" y="41">128</text><text x="354" y="22">core 3</text><text x="358" y="41">128</text><text x="468" y="22">core 4</text><text x="472" y="41">128</text><text x="582" y="22">core 5</text><text x="586" y="41">128</text><text x="696" y="22">core 6</text><text x="700" y="41">128</text><text x="810" y="22">tail</text><text x="814" y="41">104</text></g>
  </g>
  <rect x="44" y="460" width="872" height="54" rx="10" fill="#182238"/>
  <circle cx="70" cy="487" r="7" fill="#5a92e6"/><text class="t small" x="86" y="492">former cores：相同长度，可复用主循环</text>
  <circle cx="422" cy="487" r="7" fill="#ffaa3b"/><text class="t small" x="438" y="492">tail core：用独立长度参数，避免越界</text>
</svg>
