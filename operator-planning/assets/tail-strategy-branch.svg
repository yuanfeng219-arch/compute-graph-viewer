<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">branch 尾块策略示意图</title>
  <desc id="desc">Kernel 使用统一 tile 循环，最后一个 tile 通过条件分支或 mask 只处理有效范围。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#171724"/><stop offset="1" stop-color="#101010"/></linearGradient>
    <pattern id="hatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="8" height="8" fill="#2b2630"/><rect width="3" height="8" fill="#ff4b7b" opacity=".7"/></pattern>
    <style>.t{font-family:Inter,PingFang SC,Microsoft YaHei,sans-serif;fill:#e6e6e6}.muted{fill:#9aa3b5}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.label{font-size:12px;letter-spacing:.6px}.h{font-size:22px;font-weight:700}.s{font-size:14px}.small{font-size:12px}.box{fill:#1c2230;stroke:#343e55}.line{stroke:#7c8db8;stroke-width:1.5;fill:none}.blue{fill:#5a92e6}.yellow{fill:#ffbf4d}.tag{fill:#252b3d}</style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L8,4.5 L0,9 Z" fill="#7c8db8"/></marker>
  </defs>
  <rect width="960" height="560" rx="18" fill="url(#bg)"/>
  <text class="t h" x="44" y="54">branch：同一循环，最后一块走边界分支</text>
  <text class="t muted s" x="44" y="82">适用于主要 tile 规整、仅最后一块不满时；控制流在尾部判断有效长度。</text>
  <rect class="box" x="44" y="122" width="872" height="126" rx="12"/>
  <text class="t label muted" x="66" y="151">KERNEL LOOP</text>
  <text class="t mono small" x="66" y="181">for (tile = 0; tile &lt; tileNum; tile++) {</text>
  <text class="t mono small" x="88" y="207">valid = (tile == last) ? tailLength : tileLength;  Compute(valid);</text>
  <text class="t mono small" x="66" y="231">}</text>
  <text class="t small" x="578" y="210" fill="#ffbf4d">只有最后一个 tile 进入边界判断</text>
  <path class="line" d="M480 271 V304" marker-end="url(#arrow)"/>
  <text class="t label muted" x="44" y="337">统一 tile 序列</text>
  <g transform="translate(44 358)">
    <rect class="blue" width="143" height="70" rx="8"/><rect class="blue" x="151" width="143" height="70" rx="8"/><rect class="blue" x="302" width="143" height="70" rx="8"/><rect class="yellow" x="453" width="143" height="70" rx="8"/><rect fill="url(#hatch)" x="596" width="80" height="70" rx="0 8 8 0"/>
    <g class="t mono small"><text x="18" y="27">tile 0</text><text x="18" y="49">128 valid</text><text x="169" y="27">tile 1</text><text x="169" y="49">128 valid</text><text x="320" y="27">tile 2</text><text x="320" y="49">128 valid</text><text x="471" y="27">last tile</text><text x="471" y="49">104 valid</text></g>
    <text class="t small" x="610" y="40">24 无效</text>
  </g>
  <path class="line" d="M566 435 V469" marker-end="url(#arrow)"/>
  <rect x="390" y="478" width="352" height="42" rx="8" class="tag"/>
  <text class="t mono small" x="411" y="504">if (index &lt; validLength) write();</text>
  <rect x="44" y="478" width="266" height="42" rx="8" fill="#182238"/>
  <text class="t small" x="62" y="504">✓ 主路径简单</text><text class="t small" x="181" y="504" fill="#ffbf4d">△ 尾部有分支 / mask</text>
</svg>
