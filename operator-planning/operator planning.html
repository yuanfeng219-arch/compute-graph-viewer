<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ascend C 算子设计 IDE 演示</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../vendor/pto-design-system/tokens/foundation.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/tokens/semantic.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/tokens/components.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/css/style.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/workbench-shell/pattern.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/ide-frame/pattern.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/floating-playback-control/pattern.css">
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--ide-gradient-bg);
      color: var(--foreground);
      font-family: var(--font-sans);
    }

    :root,
    :root[data-theme='dark'] {
      --ide-bg-start: #12151b;
      --ide-bg-mid: #0d1016;
      --ide-bg-end: #080b10;
      --ide-glow-left: 48 122 255;
      --ide-glow-right: 25 204 168;
      --ide-glow-center: 255 170 59;
      --ide-glow-lower: 124 141 184;
      --ide-glow-bottom: 67 105 239;
      --ide-dot-color: 116 140 190;
      --ide-dot-hot-color: 25 204 168;
      --ide-cursor-color: 67 105 239;
      --ide-gradient-left-alpha: 0.13;
      --ide-gradient-right-alpha: 0.10;
      --ide-gradient-center-alpha: 0.045;
      --ide-gradient-lower-alpha: 0.04;
      --ide-aura-left-alpha: 0.16;
      --ide-aura-right-alpha: 0.14;
      --ide-aura-center-alpha: 0.06;
      --ide-aura-lower-alpha: 0.05;
      --ide-aura-bottom-alpha: 0.06;
      --ide-dot-opacity: 0;
      --ide-dot-size: 1px;
      --ide-dot-gap: 22px;
      --ide-dot-hot-radius: 220px;
      --ide-cursor-x: 50%;
      --ide-cursor-y: 40%;
      --ide-cursor-alpha: 0;
      --ide-cursor-radius: 380px;
      --ide-gradient-bg:
        radial-gradient(circle at top left, rgb(var(--ide-glow-left) / var(--ide-gradient-left-alpha)), transparent 28%),
        radial-gradient(circle at top right, rgb(var(--ide-glow-right) / var(--ide-gradient-right-alpha)), transparent 30%),
        radial-gradient(circle at 52% 8%, rgb(var(--ide-glow-center) / var(--ide-gradient-center-alpha)), transparent 34%),
        radial-gradient(circle at 20% 86%, rgb(var(--ide-glow-lower) / var(--ide-gradient-lower-alpha)), transparent 34%),
        linear-gradient(180deg, var(--ide-bg-start) 0%, var(--ide-bg-mid) 44%, var(--ide-bg-end) 100%);
      --ide-aura-bg:
        radial-gradient(circle at var(--ide-cursor-x) var(--ide-cursor-y), rgb(var(--ide-cursor-color) / var(--ide-cursor-alpha)) 0, transparent var(--ide-cursor-radius)),
        radial-gradient(circle at 12% 12%, rgb(var(--ide-glow-left) / var(--ide-aura-left-alpha)), transparent 0 22rem),
        radial-gradient(circle at 88% 8%, rgb(var(--ide-glow-right) / var(--ide-aura-right-alpha)), transparent 0 24rem),
        radial-gradient(circle at 52% 18%, rgb(var(--ide-glow-center) / var(--ide-aura-center-alpha)), transparent 0 20rem),
        radial-gradient(circle at 18% 78%, rgb(var(--ide-glow-lower) / var(--ide-aura-lower-alpha)), transparent 0 18rem),
        radial-gradient(circle at 72% 86%, rgb(var(--ide-glow-bottom) / var(--ide-aura-bottom-alpha)), transparent 0 18rem);
      --ide-frame-page-bg: #101114;
      --ide-frame-bg: #101114;
      --operator-blue: #5a92e6;
      --operator-cyan: #19cca8;
      --operator-amber: #ffaa3b;
      --operator-red: #ff4b7b;
      --operator-purple: #9b7cff;
      --info: var(--operator-blue);
      --aic: var(--operator-purple);
      --aiv: var(--operator-cyan);
      --mte: var(--operator-amber);
      --viz-grid: color-mix(in srgb, var(--foreground) 13%, transparent);
      --viz-cell: color-mix(in srgb, var(--operator-blue) 20%, transparent);
      --viz-cell-strong: color-mix(in srgb, var(--operator-blue) 42%, transparent);
      --viz-active: color-mix(in srgb, var(--operator-red) 72%, transparent);
      --viz-pad: color-mix(in srgb, var(--foreground) 9%, transparent);
    }

    .asc-demo-frame {
      width: 100vw;
      height: 100vh;
      aspect-ratio: auto;
      border-radius: 0;
      box-shadow: none;
      background: var(--ide-gradient-bg);
    }

    .asc-demo-frame .pto-ide-frame__topbar,
    .asc-demo-frame .pto-ide-frame__body {
      position: relative;
      z-index: 1;
    }

    .asc-demo-frame .pto-ide-frame__topbar-center { display: none; }
    .asc-demo-frame .pto-ide-frame__split {
      --pto-workbench-shell-gutter: 8px;
      padding-left: 0;
      padding-bottom: 0;
      background: transparent;
      overflow: visible;
    }
    .asc-demo-frame .pto-workbench-shell__split-gutter {
      background: transparent;
      box-shadow: none;
    }

    .top-actions { display: flex; gap: 4px; }
    .icon-btn {
      width: 28px;
      height: 28px;
      display: inline-grid;
      place-items: center;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--foreground-muted);
      cursor: pointer;
    }
    .icon-btn:hover,
    .icon-btn.is-active {
      background: var(--ide-frame-control-bg);
      color: var(--foreground);
    }
    .icon-btn svg,
    .rail-icon,
    .mini-icon {
      width: 17px;
      height: 17px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .explorer-body {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: auto;
    }
    .explorer-title {
      padding: 0 2px;
      color: var(--foreground-secondary);
      font: var(--text-label);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .operator-card {
      width: 100%;
      padding: 10px;
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--foreground) 4%, transparent);
      color: var(--foreground-secondary);
      text-align: left;
      cursor: pointer;
    }
    .operator-card:hover,
    .operator-card.is-active {
      background: var(--state-selected);
      border-color: color-mix(in srgb, var(--foreground) 10%, transparent);
      color: var(--foreground);
    }
    .operator-card__top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
    }
    .operator-card__id {
      color: var(--foreground-muted);
      font: var(--text-mono);
    }
    .operator-card__title {
      margin: 0 0 6px;
      color: var(--foreground);
      font: 700 12.5px / 1.25 var(--font-sans);
    }
    .operator-card__desc {
      margin: 0;
      color: var(--foreground-muted);
      font: var(--text-body-sm);
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      height: 20px;
      padding: 0 7px;
      border-radius: var(--radius-pill);
      background: color-mix(in srgb, var(--foreground) 7%, transparent);
      color: var(--foreground-secondary);
      font: 700 10px / 1 var(--font-sans);
      white-space: nowrap;
    }
    .status-badge.is-ready { color: var(--success); }
    .status-badge.is-designing { color: var(--warning); }
    .status-badge.is-compared { color: var(--operator-cyan); }

    .tab-strip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-bottom: 1px solid color-mix(in srgb, var(--foreground) 7%, transparent);
    }
    .tab-btn {
      height: 26px;
      padding: 0 10px;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--foreground-muted);
      font: var(--text-label);
      cursor: pointer;
    }
    .tab-btn:hover,
    .tab-btn.is-active {
      background: var(--state-selected);
      color: var(--foreground);
    }

    .workbench {
      height: 100%;
      overflow: auto;
      padding: 14px;
    }
    .view { display: none; height: 100%; min-height: 620px; }
    .view.is-active { display: block; }
    .view-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 14px;
      height: 100%;
      min-height: 620px;
    }
    .view-main,
    .view-side,
    .viz-panel {
      
      min-width: 0;
      border: 1px solid color-mix(in srgb, var(--foreground) 8%, transparent);
      border-radius: var(--radius-lg);
      background: color-mix(in srgb, var(--ide-frame-pane-bg) 78%, transparent);
      overflow: hidden;
    }
    .view-grid.pipeline-view-grid {
      height: auto;
      min-height: 100%;
      align-items: start;
    }
    .pipeline-view-grid > .view-main,
    .pipeline-view-grid > .view-side {
      overflow: visible;
    }
    .pipeline-view-grid > .view-side {
      position: sticky;
      top: 0;
      max-height: calc(100vh - 150px);
      overflow: auto;
    }
    .section-head {
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 12px;
      border-bottom: 1px solid color-mix(in srgb, var(--foreground) 7%, transparent);
      background: color-mix(in srgb, var(--foreground) 4%, transparent);
    }
    .section-head h3 {
      margin: 0;
      color: var(--foreground);
      font: var(--ide-frame-title-font);
    }
    .section-meta {
      color: var(--foreground-muted);
      font: var(--text-mono);
    }
    .section-body { padding: 12px; }

    .overview-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      gap: 14px;
    }
    .summary-panel {
      border-top: 1px solid color-mix(in srgb, var(--foreground) 8%, transparent);
      padding: 14px 0 0;
      margin-top: 14px;
    }
    .summary-panel:first-child {
      border-top: 0;
      padding-top: 0;
      margin-top: 0;
    }
    .summary-panel h3,
    .side-title {
      margin: 0 0 9px;
      color: var(--foreground);
      font: 700 13px / 1.25 var(--font-sans);
    }
    .summary-panel p {
      margin: 0;
      color: var(--foreground-secondary);
      font: var(--text-body-sm);
    }
    .formula {
      display: block;
      margin-top: 8px;
      padding: 10px;
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--foreground) 5%, transparent);
      color: var(--foreground);
      font: 600 13px / 1.5 var(--font-mono);
    }
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .metric {
      padding: 10px;
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--foreground) 5%, transparent);
    }
    .metric span {
      display: block;
      color: var(--foreground-muted);
      font: var(--text-label);
    }
    .metric b {
      display: block;
      margin-top: 5px;
      color: var(--foreground);
      font: 700 15px / 1.25 var(--font-sans);
    }
    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .api-select-field {
      display: grid;
      gap: 6px;
      margin-top: 10px;
    }
    .api-select-field label {
      color: var(--foreground-secondary);
      font: var(--text-label);
    }
    .api-select {
      width: 100%;
      height: 34px;
      border: 1px solid color-mix(in srgb, var(--foreground) 10%, transparent);
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--foreground) 5%, transparent);
      color: var(--foreground);
      padding: 0 10px;
      font: var(--text-body-sm);
      outline: none;
    }
    .api-select:focus {
      border-color: color-mix(in srgb, var(--operator-cyan) 45%, transparent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--operator-cyan) 12%, transparent);
    }
    .api-select option {
      color: #101820;
      background: #f7fafc;
    }
    .api-note {
      margin: 0;
      color: var(--foreground-muted);
      font: var(--text-caption);
    }
    .op-load3d-stage {
      position: relative;
    }
    .op-load3d-playback-mount {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: min(1180px, calc(100% - 24px));
      z-index: 6;
      pointer-events: none;
    }
    .op-load3d-playback-mount .pto-floating-playback {
      position: static;
      inset: auto;
      width: 100%;
      display: flex;
      justify-content: center;
      transform: none;
      pointer-events: auto;
    }
    .pto-ide-frame__bottom-dock,
    .pto-ide-frame__status-strip {
      display: none;
    }

    .table-like {
      display: grid;
      gap: 1px;
      overflow: hidden;
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--foreground) 8%, transparent);
    }
    .table-like div {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      font: var(--text-body-sm);
    }
    .table-like span {
      padding: 8px;
      background: color-mix(in srgb, var(--ide-frame-pane-bg) 86%, transparent);
      color: var(--foreground-secondary);
    }
    .table-like .head span {
      color: var(--foreground);
      font-weight: 700;
    }

    .control-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .control-field {
      display: grid;
      gap: 6px;
    }
    .control-field label {
      display: block;
      color: var(--foreground-secondary);
      font: var(--text-label);
    }
    .control-field output {
      display: none;
      color: var(--foreground);
      font: var(--text-mono);
    }
    .control-field input[type="range"] {
      width: 100%;
      accent-color: var(--primary);
    }
    .api-learn-controls {
      --learn-line: color-mix(in srgb, var(--foreground) 12%, transparent);
      --learn-text: var(--foreground);
      --learn-muted: var(--foreground-secondary);
      --learn-faint: var(--foreground-tertiary);
      --learn-cyan-soft: color-mix(in srgb, var(--operator-cyan) 18%, transparent);
      display: grid;
      gap: 10px;
      align-content: start;
    }
    .api-learn-controls .group {
      display: grid;
      gap: 10px;
      border-bottom: 1px solid var(--learn-line);
      padding-bottom: 10px;
    }
    .api-learn-controls .group-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--learn-text);
      font-size: 12px;
      font-weight: 720;
      letter-spacing: 0.02em;
    }
    .api-learn-controls .hint-text {
      color: var(--learn-faint);
      font-size: 11px;
      line-height: 1.45;
    }
    .api-learn-controls .field {
      display: grid;
      gap: 5px;
    }
    .api-learn-controls .field label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--learn-muted);
      font-size: 12px;
    }
    .api-learn-controls .field output {
      display: inline;
      color: var(--learn-text);
      font-variant-numeric: tabular-nums;
    }
    .api-learn-controls .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .api-learn-controls .input,
    .api-learn-controls select {
      width: 100%;
      height: 34px;
      border: 1px solid var(--learn-line);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.055);
      color: var(--learn-text);
      outline: none;
      padding: 0 10px;
      font-size: 12px;
    }
    .api-learn-controls select option {
      color: #101820;
      background: #f7fafc;
    }
    .api-learn-controls .input:focus,
    .api-learn-controls select:focus {
      border-color: rgba(72, 199, 232, 0.45);
      box-shadow: 0 0 0 3px rgba(72, 199, 232, 0.12);
    }
    .api-learn-controls .seg {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }
    .api-learn-controls .seg button,
    .api-learn-controls .preset {
      min-height: 34px;
      border: 1px solid var(--learn-line);
      border-radius: 11px;
      color: var(--learn-muted);
      background: rgba(255, 255, 255, 0.045);
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease, color 120ms ease;
      white-space: nowrap;
    }
    .api-learn-controls .seg button:active,
    .api-learn-controls .preset:active {
      transform: translateY(1px);
    }
    .api-learn-controls .seg button.active {
      color: var(--learn-text);
      border-color: rgba(72, 199, 232, 0.35);
      background: var(--learn-cyan-soft);
    }
    .api-learn-controls .presets {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }
    .api-learn-controls .preset {
      padding: 0 8px;
      font-size: 11px;
      text-align: left;
    }
    .api-learn-controls .side-footer {
      display: grid;
      gap: 9px;
      padding-top: 11px;
      border-top: 1px solid var(--learn-line);
    }
    .api-learn-controls .play-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 7px;
    }
    .api-learn-controls .btn {
      min-height: 34px;
      border: 1px solid var(--learn-line);
      border-radius: 11px;
      color: var(--learn-muted);
      background: rgba(255, 255, 255, 0.045);
      font-size: 12px;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease, color 120ms ease;
      white-space: nowrap;
    }
    .api-learn-controls .btn:active {
      transform: translateY(1px);
    }
    .api-learn-controls .btn.warn {
      color: rgba(33, 23, 5, 0.96);
      border-color: rgba(255, 191, 77, 0.3);
      background: var(--warning);
      font-weight: 720;
    }
    .api-learn-controls .btn:disabled,
    .api-learn-controls select:disabled,
    .api-learn-controls input:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }
    .api-learn-controls .scrub {
      display: grid;
      gap: 5px;
    }
    .api-learn-controls input[type="range"] {
      width: 100%;
      accent-color: var(--operator-cyan);
    }
    .api-learn-controls .step-pill {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      border: 1px solid var(--learn-line);
      border-radius: 11px;
      color: var(--learn-text);
      background: rgba(255, 255, 255, 0.045);
      font: 700 11px / 1 var(--font-mono);
      white-space: nowrap;
    }
    .api-learn-controls .derived {
      display: grid;
      gap: 6px;
      padding-top: 9px;
      border-top: 1px solid var(--learn-line);
      color: var(--learn-muted);
      font-size: 11px;
      line-height: 1.45;
    }
    .api-learn-controls .derived strong {
      color: var(--learn-text);
      font-weight: 720;
    }
    .number-control,
    .stepper-control {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 6px;
    }
    .number-control input,
    .stepper-control input {
      width: 100%;
      height: 32px;
      border: 1px solid color-mix(in srgb, var(--foreground) 10%, transparent);
      border-radius: var(--radius-sm);
      background: color-mix(in srgb, var(--foreground) 5%, transparent);
      color: var(--foreground);
      font: var(--text-mono);
    }
    .number-control input {
      padding: 0 10px;
    }
    .number-control--with-slider {
      grid-template-columns: minmax(0, 1fr) 112px;
      align-items: center;
      column-gap: 10px;
    }
    .stepper-pair {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }
    .stepper-control {
      grid-template-columns: 32px 54px 32px;
      align-items: center;
      justify-content: start;
    }
    .stepper-control button {
      width: 32px;
      height: 32px;
      border: 1px solid color-mix(in srgb, var(--foreground) 10%, transparent);
      border-radius: var(--radius-sm);
      background: color-mix(in srgb, var(--foreground) 5%, transparent);
      color: var(--foreground-secondary);
      font: 700 15px / 1 var(--font-sans);
      cursor: pointer;
    }
    .stepper-control button:hover {
      background: var(--state-selected);
      color: var(--foreground);
    }
    .stepper-control input {
      padding: 0;
      text-align: center;
    }
    .control-field select {
      width: 100%;
      height: 30px;
      border: 1px solid color-mix(in srgb, var(--foreground) 10%, transparent);
      border-radius: var(--radius-sm);
      background: color-mix(in srgb, var(--foreground) 5%, transparent);
      color: var(--foreground);
      font: var(--text-body-sm);
    }

    .scheme-row,
    .check-row,
    .inspector-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 28px;
      color: var(--foreground-secondary);
      font: var(--text-body-sm);
    }
    .check-row b,
    .inspector-row b { color: var(--foreground); font-weight: 700; }
    .check-row.is-warning b { color: var(--warning); }
    .check-row.is-danger b { color: var(--danger); }
    .check-row.is-ok b { color: var(--success); }
    .check-list {
      display: grid;
      gap: 8px;
    }
    .check-row--diagnostic {
      min-height: auto;
      padding: 9px;
      display: grid;

      background: color-mix(in srgb, var(--tile-color) 72%, var(--surface-3));

      font: 700 10px / 1.1 var(--font-sans);
      text-align: center;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.18);
    }
    .pipeline-block span {
      max-width: 100%;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .pipeline-block.is-wait {
      background: color-mix(in srgb, var(--tile-color) 54%, var(--surface-3));
      color: white;
    }
    .pipeline-block.is-selected {
      outline: 2px solid color-mix(in srgb, var(--foreground) 82%, transparent);
      outline-offset: -2px;
    }
    .pipeline-block:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }
    .tile-schedule {
      display: grid;
      grid-template-columns: 86px minmax(560px, 1fr);
      gap: 10px;
      min-width: 680px;
    }
    .tile-schedule__label {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
      min-height: 68px;
      color: var(--foreground-secondary);
      font: var(--text-label);
    }
    .tile-schedule__label b {
      color: var(--foreground);
      font: 700 12px / 1.2 var(--font-sans);
    }
    .tile-schedule__label span {
      color: var(--foreground-muted);
      font: 600 10px / 1.2 var(--font-sans);
    }
    .tile-schedule__row {
      position: relative;
      min-height: 68px;
      overflow: hidden;
      border-radius: var(--radius-sm);
      background:
        repeating-linear-gradient(90deg, transparent 0 58px, color-mix(in srgb, var(--foreground) 6%, transparent) 59px 60px),
        color-mix(in srgb, var(--foreground) 4%, transparent);
    }
    .tile-stage-block {
      position: absolute;
      top: 10px;
      left: calc(var(--start) * 1%);
      width: calc(var(--dur) * 1%);
      min-width: 54px;
      height: 48px;
      display: grid;
      align-content: center;
      gap: 2px;
      padding: 0 7px;
      border: 0;
      border-radius: var(--radius-sm);
      background: color-mix(in srgb, var(--tile-color) 72%, var(--surface-3));
      color: white;
      cursor: pointer;
      text-align: left;
    }
    .tile-stage-block b,
    .tile-stage-block span {
      display: block;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .tile-stage-block b {
      font: 800 10px / 1.1 var(--font-sans);
    }
    .tile-stage-block span {
      font: 600 9px / 1.1 var(--font-sans);
      opacity: 0.82;
    }
    .tile-stage-block.is-selected {
      outline: 2px solid color-mix(in srgb, var(--foreground) 86%, transparent);
      outline-offset: -2px;
    }
    .pipe-evidence-map {
      display: grid;
      grid-template-columns: repeat(3, minmax(210px, 1fr));
      gap: 10px;
      min-width: 680px;
    }
    .pipe-evidence-card {
      min-width: 0;
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 0;
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--foreground) 5%, transparent);
      color: var(--foreground);
      text-align: left;
      cursor: pointer;
      box-shadow: inset 3px 0 0 color-mix(in srgb, var(--pipe-color) 86%, transparent);
    }
    .pipe-evidence-card.is-selected {
      outline: 2px solid color-mix(in srgb, var(--foreground) 78%, transparent);
      outline-offset: -2px;
    }
    .pipe-evidence-card__head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }
    .pipe-evidence-card h4 {
      margin: 0;
      color: var(--foreground);
      font: 700 12px / 1.25 var(--font-sans);
    }
    .pipe-evidence-card small {
      display: block;
      margin-top: 3px;
      color: var(--foreground-muted);
      font: 600 10px / 1.2 var(--font-sans);
    }
    .pipe-evidence-card__metric {
      color: var(--foreground);
      font: 800 14px / 1 var(--font-sans);
      white-space: nowrap;
    }
    .pipe-evidence-card__bar {
      height: 6px;
      overflow: hidden;
      border-radius: var(--radius-pill);
      background: color-mix(in srgb, var(--foreground) 7%, transparent);
    }
    .pipe-evidence-card__bar span {
      display: block;
      width: var(--util);
      height: 100%;
      border-radius: inherit;
      background: color-mix(in srgb, var(--pipe-color) 78%, white 6%);
    }
    .pipe-evidence-card__body {
      display: grid;
      gap: 6px;
      color: var(--foreground-secondary);
      font: var(--text-body-sm);
      line-height: 1.45;
    }
    .pipe-evidence-card__body b {
      color: var(--foreground);
    }
    .lifetime-panel {
      display: grid;
      gap: 12px;
    }
    .lifetime-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .lifetime-summary__item,
    .lifetime-card {
      min-width: 0;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--foreground) 5%, transparent);
    }
    .lifetime-summary__item span,
    .lifetime-field span {
      display: block;
      color: var(--foreground-muted);
      font: var(--text-label);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .lifetime-summary__item b {
      display: block;
      margin-top: 5px;
      color: var(--foreground);
      font: 700 12px / 1.3 var(--font-sans);
    }
    .lifetime-card-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .lifetime-card {
      display: grid;
      gap: 10px;
      box-shadow: inset 3px 0 0 color-mix(in srgb, var(--tile-color) 86%, transparent);
    }
    .lifetime-card__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .lifetime-card__tile {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 5px 9px;
      border-radius: var(--radius-sm);
      background: color-mix(in srgb, var(--tile-color) 70%, var(--surface-3));
      color: white;
      font: 700 11px / 1 var(--font-sans);
    }
    .lifetime-card__where {
      min-width: 0;
      color: var(--foreground-secondary);
      font: var(--text-body-sm);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .lifetime-field {
      display: grid;
      gap: 4px;
    }
    .lifetime-field b {
      color: var(--foreground);
      font: 600 12px / 1.45 var(--font-sans);
    }
    .lifetime-empty {
      padding: 12px;
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--foreground) 5%, transparent);
      color: var(--foreground-secondary);
      font: var(--text-body-sm);
    }
    .instruction-map {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .instruction-map span {
      min-height: 22px;
      padding: 5px 8px;
      border-radius: var(--radius-sm);
      background: color-mix(in srgb, var(--foreground) 7%, transparent);
      color: var(--foreground-secondary);
      font: 600 10px / 1.2 var(--font-mono);
    }
    .pipeline-list {
      display: grid;
      gap: 7px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .pipeline-list li {
      padding: 8px 9px;
      border-radius: var(--radius-sm);
      background: color-mix(in srgb, var(--foreground) 5%, transparent);
      color: var(--foreground-secondary);
      font: var(--text-body-sm);
      line-height: 1.45;
    }
    .pipeline-handoff-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .pipeline-handoff-card.is-wide {
      grid-column: span 2;
    }
    .pipeline-toggle {
      margin-left: auto;
    }
    .compare-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .compare-card {
      padding: 10px;
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--foreground) 5%, transparent);
    }
    .compare-card h4 {
      margin: 0 0 9px;
      color: var(--foreground);
      font: var(--text-label);
    }

    .format-layout {
      display: grid;
      grid-template-columns: minmax(250px, 0.72fr) minmax(0, 1.28fr);
      gap: 12px;
      align-items: start;
    }
    .format-control-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .format-control-grid .control-field:first-child,
    .format-control-grid .control-field:nth-child(2) {
      grid-column: 1 / -1;
    }
    .format-formula {
      display: grid;
      gap: 8px;
      color: var(--foreground-secondary);
      font: var(--text-body-sm);
    }
    .format-code {
      display: block;
      padding: 8px;
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--foreground) 5%, transparent);
      color: var(--foreground);
      font: var(--text-mono);
      overflow-x: auto;
      white-space: nowrap;
    }
    .format-canvas-stack {
      display: grid;
      gap: 12px;
      min-width: 0;
    }
    .format-grid-scroll {
      overflow: auto;
      max-height: 360px;
      padding: 12px;
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--foreground) 4%, transparent);
    }
    .format-grid {
      display: grid;
      gap: 4px;
      min-width: max-content;
      width: max-content;
    }
    .format-ribbon-scroll {
      overflow-x: auto;
      padding: 12px;
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--foreground) 4%, transparent);
    }
    .format-ribbon {
      display: flex;
      gap: 4px;
      min-width: max-content;
    }
    .format-cell {
      width: 44px;
      height: 44px;
      padding: 4px;
      display: grid;
      grid-template-rows: auto 1fr;
      align-items: center;
      border: 1px solid var(--viz-grid);
      border-radius: var(--radius-sm);
      background: var(--viz-cell);
      color: var(--foreground-secondary);
      font: 700 10px / 1 var(--font-mono);
      cursor: pointer;
    }
    .format-cell small {
      color: var(--foreground-muted);
      font: 700 8px / 1 var(--font-mono);
    }
    .format-cell.is-active,
    .format-cell:hover {
      background: var(--viz-active);
      color: white;
      border-color: color-mix(in srgb, var(--operator-red) 70%, transparent);
    }
    .format-cell.is-pad {
      background:
        repeating-linear-gradient(45deg, color-mix(in srgb, var(--foreground) 8%, transparent) 0 1px, transparent 1px 8px),
        var(--viz-pad);
      color: var(--foreground-muted);
    }
    .format-cell.is-gap {
      border-style: dashed;
      background: color-mix(in srgb, var(--foreground) 3%, transparent);
      color: var(--foreground-muted);
    }
    .format-trace {
      min-height: 68px;
      white-space: normal;
      line-height: 1.55;
    }

    .inspector {
      padding: 12px;
      display: grid;
      gap: 14px;
      overflow: auto;
    }
    .inspector-section {
      display: grid;
      gap: 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid color-mix(in srgb, var(--foreground) 8%, transparent);
    }
    .inspector-section:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }
    .inspector-section h3 {
      margin: 0;
      color: var(--foreground);
      font: var(--ide-frame-title-font);
    }
    .soft-note {
      padding: 10px;
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--foreground) 5%, transparent);
      color: var(--foreground-secondary);
      font: var(--text-body-sm);
    }

    .terminal-lines {
      padding: 10px 12px;
      color: var(--foreground-secondary);
      font: var(--text-mono);
      line-height: 1.7;
      white-space: pre-wrap;
    }

    @media (max-width: 1100px) {
      .view-grid,
      .overview-grid,
      .api-layout,
      .api-canvas,
      .format-layout,
      .tiling-layout,
      .tiling-code-layout,
      .load3d-diagram {
        grid-template-columns: 1fr;
      }
      .hardware-target-grid { grid-template-columns: 1fr; }
      .view { min-height: auto; }
      .api-canvas { grid-auto-rows: auto; }
      .compare-grid { grid-template-columns: 1fr; }
      .pipeline-brief,
      .pipeline-contract-grid,
      .pipeline-handoff-grid,
      .lifetime-summary {
        grid-template-columns: 1fr;
      }
      .pipeline-handoff-card.is-wide {
        grid-column: auto;
      }
      .load3d-volume,
      .load3d-slab {
        min-height: 240px;
      }
      .load3d-link {
        height: 140px;
      }
    }
  </style>
</head>

  <script>
    (() => {
      const operators = [
        {
          id: 'OP-001',
          title: 'Elementwise Add',
          status: '未开始',
          type: '入门算子',
          requirement: '为 C = A + B 创建一个最小算子设计，并说明 shape、dtype 和第一版 tiling 如何确定。',
          performanceGoal: '第一版设计优先保证覆盖完整、tile 简单且适合 vector 处理。',
          formula: 'C[i] = A[i] + B[i]',
          inputs: [['A', '1024 x 1024', 'half / ND'], ['B', '1024 x 1024', 'half / ND']],
          outputs: [['C', '1024 x 1024', 'half / ND']],
          apis: ['DataCopy', 'Add', 'DataCopy'],
          tiling: '将线性元素按核切分；tile 长度按 32B 对齐。'
        },
        {
          id: 'OP-002',
          title: 'Copy 与对齐',
          status: '设计中',
          type: '数据搬运',
          requirement: '搬运带 stride 的 tensor 切片，同时保持对齐，并解释 tail 处理方式。',
          performanceGoal: '减少非对齐 DataCopy 片段，并显式暴露 tail 策略决策。',
          formula: 'Y[n] = X[n * stride]',
          inputs: [['X', '4096 x 64', 'int8 / ND']],
          outputs: [['Y', '2048 x 64', 'int8 / ND']],
          apis: ['DataCopy', 'SetLoadDataPaddingValue'],
          tiling: '优先使用 32B 对齐分块；切片不足时对 tail 做 padding。'
        },
        {
          id: 'OP-003',
          title: 'Load3D 滑窗展开',
          status: '已对比',
          type: 'API 数据变换',
          requirement: '使用 Load3D 为 Cube 计算准备 feature map tile，并解释每个滑窗如何变成矩阵数据。',
          performanceGoal: '在规划 pipeline 之前，先暴露数据搬运、repeatMode 和 layout 决策。',

                  <button class="btn btn-solid btn-sm" type="button" data-open-view="format">打开 Format 实验室</button>
                </div>
              </div>
            </section>
            <section class="view-side">
              <header class="section-head"><h3>张量 / API</h3><span class="section-meta">模拟规格</span></header>
              <div class="section-body">
                <h3 class="side-title">输入</h3>
                ${renderTensorTable(p.inputs)}
                <h3 class="side-title" style="margin-top:14px">输出</h3>
                ${renderTensorTable(p.outputs)}
                <h3 class="side-title" style="margin-top:14px">需要使用的接口</h3>
                <div class="api-select-field">
                  <label for="overviewApiSelect">API</label>
                  <select class="api-select" id="overviewApiSelect" data-api-jump-select aria-label="选择 API 可视化">
                    ${p.apis.map((api) => `<option value="${api}" ${api === state.selectedApi ? 'selected' : ''}>${api}</option>`).join('')}
                  </select>
                </div>
              </div>
            </section>
          </div>
        `;
        $$('[data-open-view]').forEach((btn) => {
          btn.addEventListener('click', () => {
            state.view = btn.dataset.openView;
            if (state.view === 'pipeline') state.operatorId = 'OP-004';
            if (state.view === 'api') state.selectedApi = p.apis.includes('Load3D') ? 'Load3D' : p.apis[0];
            renderAll();
          });
        });
        $('[data-api-jump-select]')?.addEventListener('change', (event) => {
            stopApiPlayback();
            state.selectedApi = event.target.value;
            state.view = 'api';
            renderAll();
        });
      }

      function renderTensorTable(rows) {
        return `<div class="table-like">
          <div class="head"><span>名称</span><span>形状</span><span>dtype / format</span></div>
          ${rows.map((row) => `<div><span>${row[0]}</span><span>${row[1]}</span><span>${row[2]}</span></div>`).join('')}
        </div>`;
      }

      function fmt(n) {
        return Number(n || 0).toLocaleString();
      }

      function bytesFmt(bytes) {
        const value = Number(bytes || 0);
        if (value >= 1024 * 1024) return `${(value / 1048576).toFixed(2)} MB`;
        if (value >= 1024) return `${(value / 1024).toFixed(1)} KB`;
        return `${value} B`;
      }

      function currentTilingScheme() {
        const stored = tilingSchemes.find((scheme) => scheme.name === state.tilingScheme) || tilingSchemes[1];
        return {
          ...stored,
          soc: state.soc,
          dtype: state.dtype,
          inputs: state.inputCount,
          total: state.totalLen,
          blockDim: state.blockDim,
          tileNum: state.tileNum,
          bufferNum: state.bufferNum,
          tailPolicy: state.tailPolicy,
          paddingPolicy: state.paddingPolicy,
          tilingMode: state.tilingMode
        };
      }

      function applyTilingScheme(scheme) {
        state.tilingScheme = scheme.name;
        state.soc = scheme.soc;
        state.dtype = scheme.dtype;
        state.inputCount = scheme.inputs;
        state.totalLen = scheme.total;
        state.blockDim = scheme.blockDim;
        state.tileNum = scheme.tileNum;
        state.bufferNum = scheme.bufferNum;
        state.tailPolicy = scheme.tailPolicy || 'former/tail';
        state.paddingPolicy = scheme.paddingPolicy || 'padding';
        state.tilingMode = scheme.tilingMode || 'manual';
      }

      function computeTilingOutcome(scheme) {
        const soc = socProfiles[scheme.soc] || socProfiles['910b'];
        const dtypeBytes = dtypeSize[scheme.dtype] || 2;
        const blockDim = Math.max(1, Math.min(Number(scheme.blockDim) || 1, soc.cores));
        const tileNum = Math.max(1, Number(scheme.tileNum) || 1);
        const bufferNum = Math.max(1, Number(scheme.bufferNum) || 1);
        const total = Math.max(1, Number(scheme.total) || 1);
        const alignElems = Math.max(1, soc.alignBytes / dtypeBytes);
        const totalAligned = Math.floor(total / alignElems) * alignElems;
        const blocksTotal = Math.max(1, Math.floor(totalAligned / alignElems));
        const formerNum = blocksTotal % blockDim;
        const tailNum = blockDim - formerNum;
        const tailLength = Math.floor(blocksTotal / blockDim) * alignElems;
        const formerLength = tailLength + (formerNum > 0 ? alignElems : 0);
        const perCoreDisplay = formerNum > 0 ? formerLength : tailLength;
        const loopCount = tileNum * bufferNum;
        const tileLen = Math.max(1, Math.floor(perCoreDisplay / loopCount));
        const queueCount = scheme.inputs + 1;
        const queueBytes = bufferNum * tileLen * dtypeBytes;
        const ubUsed = queueCount * queueBytes;
        const ubCap = soc.ubKB * 1024;
        const ubPct = ubUsed / ubCap * 100;
        const queuePct = queueBytes / ubCap * 100;
        const queueNames = Array.from({ length: scheme.inputs }, (_, idx) => `GM stream ${idx + 1}`).concat('输出 z');
        const queueColors = ['var(--info)', 'var(--aic)', 'var(--aiv)', 'var(--mte)'];
        let consumedPct = 0;
        const ubSegments = queueNames.map((name, idx) => {
          const widthPct = Math.max(0, Math.min(100 - consumedPct, queuePct));
          const segment = {
            name,
            bytes: queueBytes,
            pct: widthPct,
            color: queueColors[idx % queueColors.length],
            remainingPct: Math.max(0, 100 - consumedPct)
          };
          consumedPct += queuePct;
          return segment;
        });
        const tileBytes = tileLen * dtypeBytes;
        const tileAligned = tileLen % alignElems === 0;
        const queueLimitOk = scheme.inputs * bufferNum <= soc.maxQueuePerPos * 2;
        const tileBigEnough = tileLen >= soc.vectorWidthBytes / dtypeBytes;
        const wasteElems = total - totalAligned;
        const splitMsg = formerNum === 0
          ? `均分：每个激活核处理 ${fmt(tailLength)} 个元素`
          : `${formerNum} 个 former 核各处理 ${fmt(formerLength)} 个元素，${tailNum} 个 tail 核各处理 ${fmt(tailLength)} 个元素（差值 ${alignElems} 个元素）`;
        const checksList = [
          {
            label: 'UB 容量',
            value: ubUsed <= ubCap ? `${bytesFmt(ubUsed)} / ${soc.ubKB} KB` : `溢出：${bytesFmt(ubUsed)}`,
            cls: ubUsed <= ubCap ? 'is-ok' : 'is-danger',
            impact: ubUsed <= ubCap ? 'UB 预算足够，当前 tile 和 buffer 配置可以落入单核容量。' : '单核 UB 容量不足，可能导致 buffer 分配失败或需要重新切分。',
            action: ubUsed <= ubCap ? '保持当前 BUFFER_NUM，继续检查对齐和 tail。' : '优先减小 BUFFER_NUM；仍溢出时降低 tileLength 或减少输入流。'
          },
          {
            label: 'TILE_LENGTH 对齐',
            value: tileAligned ? `${soc.alignBytes}B 已对齐（${tileBytes}B）` : `未按 ${soc.alignBytes}B 对齐`,
            cls: tileAligned ? 'is-ok' : 'is-warning',
            impact: tileAligned ? '搬运粒度与硬件对齐单元一致，DataCopy 边界更稳定。' : 'tile 尾部可能触发非对齐搬运或额外 mask/padding 逻辑。',
            action: tileAligned ? '无需调整；可继续比较 core 利用率。' : '调整 BLOCK_DIM 或 TILE_NUM，让 TILE_LENGTH 落到对齐单元倍数。'
          },
          {
            label: 'GM 输入流压力',
            value: queueLimitOk ? `${scheme.inputs * bufferNum} 个队列，未超过限制` : `${scheme.inputs * bufferNum} 个队列，超过限制`,
            cls: queueLimitOk ? 'is-ok' : 'is-warning',
            impact: queueLimitOk ? '队列占用在当前 demo 规则内，不会挤压 pipe 编排。' : '队列数量过高会增加 pipe 管理压力，并可能压缩 UB 可用空间。',
            action: queueLimitOk ? '保持当前输入流与 buffer 组合。' : '减少输入流数量，或关闭 Double Buffer 后重新评估 overlap 收益。'
          },
          {
            label: 'Tail 核处理',
            value: formerNum === 0 ? '没有 tail 分支' : `${formerNum} former + ${tailNum} tail`,
            cls: formerNum === 0 ? 'is-ok' : 'is-warning',
            impact: formerNum === 0 ? '多核工作量均分，kernel 边界分支较少。' : '不同 core 工作量不一致，需要 kernel 明确区分 former/tail 或 padding。',
            action: formerNum === 0 ? '可使用普通均分 kernel 路径。' : '确认 tail policy 选择 former/tail 或 padding，并验证 tail core 的搬运长度。'
          },
          {
            label: 'Vector 宽度',
            value: tileBigEnough ? `tile ${tileLen} >= ${soc.vectorWidthBytes / dtypeBytes}` : `tile ${tileLen} 低于 ${soc.vectorWidthBytes / dtypeBytes} 元素`,
            cls: tileBigEnough ? 'is-ok' : 'is-warning',
            impact: tileBigEnough ? 'tile 至少覆盖一个 vector 宽度，便于保持向量执行效率。' : 'tile 过短会降低 vector lane 利用率，循环调度开销占比变高。',
            action: tileBigEnough ? '保持当前 TILE_NUM / BUFFER_NUM 组合。' : '减少 TILE_NUM、减少 BLOCK_DIM，或增大每核 workload。'
          },
          {
            label: '末尾覆盖',
            value: wasteElems === 0 ? '无遗漏' : `${wasteElems} 个元素需要 mask 或 padding`,
            cls: wasteElems === 0 ? 'is-ok' : 'is-warning',
            impact: wasteElems === 0 ? 'total length 已按对齐单元覆盖，没有末尾遗漏。' : '末尾元素没有进入对齐 workload，可能影响正确性或输出覆盖。',
            action: wasteElems === 0 ? '无需额外处理。' : '选择 padding policy，并在 kernel tail 分支中验证 mask / padding。'
          }
        ];
        return {
          soc,
          dtypeBytes,
          blockDim,
          tileNum,
          bufferNum,
          total,
          alignElems,
          totalAligned,
          formerNum,
          tailNum,
          tailLength,
          formerLength,
          perCoreDisplay,
          loopCount,
          tileLen,
          ubUsed,
          ubPct,
          queueBytes,
          queuePct,
          ubSegments,
          tileAligned,
          splitMsg,
          checks: checksList,
          queueNames
        };
      }

      function operatorWorkloadText(operator, outcome) {
        if (operator.id === 'OP-003') return 'Ho * Wo * C0 滑窗展开';
        if (operator.id === 'OP-004') return 'M * N 输出 tile 元素';
        return '线性展开后的逻辑元素';
      }

      function operatorDerivationText(operator, outcome) {
        const input = operator.inputs[0] || ['input', '-', '-'];
        if (operator.id === 'OP-003') {
          return `Load3D 读取 ${input[0]}（${input[1]}），先把滑窗展开成 img2col 行，再进入 tile 调度。`;
        }
        if (operator.id === 'OP-004') {
          return '融合算子的 tiling 需要把 Cube 输出分区和 Vector 后处理流放在同一套 buffer 预算下评估。';
        }
        return `Tiling 从 ${input[0]} 的 shape 出发，先线性化有效逻辑范围，再按 ${outcome.soc.alignBytes}B 粒度对齐。`;
      }

      function splitDtypeFormat(spec) {
        const [dtype = '-', format = '-'] = String(spec || '- / -').split('/').map((item) => item.trim());
        return { dtype, format };
      }

      function operatorWorkloadFormula(operator, outcome) {
        if (operator.id === 'OP-003') return 'Ho * Wo * C0 → img2col 行 → tile 工作负载种子';
        if (operator.id === 'OP-004') return 'M * N output tile elements → Cube result → Vector postprocess';
        return 'flatten(shape) → linear elements';
      }

      function renderHardwareFacts(outcome) {
        const vectorElems = Math.floor(outcome.soc.vectorWidthBytes / outcome.dtypeBytes);
        return `
          <div class="tiling-fact-grid">
            <div class="tiling-fact"><span>SOC</span><b>${outcome.soc.name}</b></div>
            <div class="tiling-fact"><span>核心</span><b>${outcome.soc.cores} ${outcome.soc.coreLabel}</b></div>
            <div class="tiling-fact"><span>UB</span><b>${outcome.soc.ubKB} KB / core</b></div>
            <div class="tiling-fact"><span>对齐</span><b>${outcome.soc.alignBytes}B = ${outcome.alignElems} elems</b></div>
            <div class="tiling-fact"><span>Vector</span><b>${outcome.soc.vectorWidthBytes}B = ${vectorElems} elems</b></div>
          </div>
        `;
      }

      function renderWorkloadSummary(operator, outcome) {
        const input = operator.inputs[0] || ['input', '-', '-'];
        return `
          <div class="tiling-fact-grid">
            <div class="tiling-fact"><span>输入形状</span><b title="${input[1]}">${input[1]}</b></div>
            <div class="tiling-fact"><span>总长度</span><b>${fmt(outcome.total)}</b></div>
            <div class="tiling-fact"><span>已对齐</span><b>${fmt(outcome.totalAligned)} (${outcome.alignElems} elems/unit)</b></div>
          </div>
        `;
      }

      function blockLengthFormula(outcome, selected) {
        if (outcome.formerNum > 0) return `former core: ${fmt(outcome.tailLength)} + ${outcome.alignElems}`;
        return `${fmt(outcome.totalAligned)} / ${selected.blockDim}`;
      }

      function tileLengthFormula(outcome, selected) {
        return `floor(${fmt(outcome.perCoreDisplay)} / ${selected.tileNum} / ${selected.bufferNum})`;
      }

      function schemeTailText(scheme, outcome) {
        if (outcome.formerNum === 0) return `${scheme.tailPolicy || 'branch'}, no tail`;
        return `${outcome.formerNum} + ${outcome.tailNum}, ${scheme.paddingPolicy || 'padding'}`;
      }

      function checkClass(row) {
        return Array.isArray(row) ? row[2] : row.cls;
      }

      function schemeVerdict(outcome) {
        const states = outcome.checks.map(checkClass);
        if (states.includes('is-danger')) return { label: 'Invalid', cls: 'scheme-verdict--invalid' };
        if (states.includes('is-warning')) return { label: 'Needs review', cls: 'scheme-verdict--review' };
        return { label: 'Ready', cls: 'scheme-verdict--ready' };
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function codeDtype(dtype) {
        if (dtype === 'float') return 'float';
        if (dtype === 'bf16') return 'bfloat16_t';
        if (dtype === 'int8') return 'int8_t';
        return 'half';
      }

      function tilingCodeForScheme(scheme, outcome) {
        const dtypeC = codeDtype(scheme.dtype);
        const inputNames = Array.from({ length: Math.max(1, scheme.inputs) }, (_, i) => String.fromCharCode(120 + i));
        const outputName = String.fromCharCode(120 + inputNames.length);
        const sig = inputNames.concat(outputName).map((name) => `GM_ADDR ${name}`).join(', ');
        const tilingKey = outcome.formerNum === 0 ? 0 : 2;
        let kernel = '';
        kernel += '// =====================================================\n';
        kernel += '// Generated by CANN Tiling Planner\n';
        kernel += `// SOC: ${outcome.soc.name}   dtype: ${scheme.dtype}   TilingKey: ${tilingKey}\n`;
        kernel += '// =====================================================\n\n';
        kernel += '#include "kernel_operator.h"\n';
        kernel += 'using namespace AscendC;\n\n';
        kernel += `constexpr int32_t USE_CORE_NUM = ${scheme.blockDim};\n`;
        kernel += `constexpr int32_t TILE_NUM     = ${scheme.tileNum};\n`;
        kernel += `constexpr int32_t BUFFER_NUM   = ${scheme.bufferNum};\n\n`;

        if (outcome.formerNum === 0) {
          kernel += `constexpr int32_t TOTAL_LENGTH = ${outcome.totalAligned};\n`;
          kernel += `constexpr int32_t BLOCK_LENGTH = ${outcome.perCoreDisplay};\n`;
          kernel += `constexpr int32_t TILE_LENGTH  = ${outcome.tileLen};\n\n`;
          kernel += 'class KernelOp {\n';
          kernel += 'public:\n';
          kernel += '    __aicore__ inline KernelOp() {}\n\n';
          kernel += `    __aicore__ inline void Init(${sig}) {\n`;
          inputNames.forEach((name) => {
            kernel += `        ${name}Gm.SetGlobalBuffer((__gm__ ${dtypeC}*)${name} + BLOCK_LENGTH * GetBlockIdx(), BLOCK_LENGTH);\n`;
          });
          kernel += `        ${outputName}Gm.SetGlobalBuffer((__gm__ ${dtypeC}*)${outputName} + BLOCK_LENGTH * GetBlockIdx(), BLOCK_LENGTH);\n`;
          inputNames.forEach((name) => {
            kernel += `        pipe.InitBuffer(inQueue${name.toUpperCase()}, BUFFER_NUM, TILE_LENGTH * sizeof(${dtypeC}));\n`;
          });
          kernel += `        pipe.InitBuffer(outQueue${outputName.toUpperCase()}, BUFFER_NUM, TILE_LENGTH * sizeof(${dtypeC}));\n`;
          kernel += '    }\n\n';
          kernel += '    __aicore__ inline void Process() {\n';
          kernel += '        int32_t loopCount = TILE_NUM * BUFFER_NUM;\n';
          kernel += '        for (int32_t i = 0; i < loopCount; i++) {\n';
          kernel += '            CopyIn(i);\n';
          kernel += '            Compute(i);\n';
          kernel += '            CopyOut(i);\n';
          kernel += '        }\n';
          kernel += '    }\n\n';
          kernel += 'private:\n';
          kernel += '    TPipe pipe;\n';
          inputNames.forEach((name) => {
            kernel += `    TQue<QuePosition::VECIN, BUFFER_NUM> inQueue${name.toUpperCase()};\n`;
          });
          kernel += `    TQue<QuePosition::VECOUT, BUFFER_NUM> outQueue${outputName.toUpperCase()};\n`;
          inputNames.concat(outputName).forEach((name) => {
            kernel += `    GlobalTensor<${dtypeC}> ${name}Gm;\n`;
          });
          kernel += '};\n';
        } else {
          kernel += `// Tail-core split: ${outcome.formerNum} former cores (${outcome.formerLength} elems each)\n`;
          kernel += `//                  ${outcome.tailNum} tail cores (${outcome.tailLength} elems each)\n\n`;
          kernel += 'class KernelOp {\n';
          kernel += 'public:\n';
          kernel += `    __aicore__ inline void Init(${sig}, const TilingData& t) {\n`;
          kernel += '        if (GetBlockIdx() < t.formerNum) {\n';
          kernel += '            this->coreLength = t.formerLength;\n';
          kernel += '            this->tileLength = t.formerTileLength;\n';
          kernel += '            this->tileNum    = t.formerTileNum;\n';
          inputNames.forEach((name) => {
            kernel += `            ${name}Gm.SetGlobalBuffer(\n`;
            kernel += `                (__gm__ ${dtypeC}*)${name} + t.formerLength * GetBlockIdx(),\n`;
            kernel += '                t.formerLength);\n';
          });
          kernel += '        } else {\n';
          kernel += '            this->coreLength = t.tailLength;\n';
          kernel += '            this->tileLength = t.tailTileLength;\n';
          kernel += '            this->tileNum    = t.tailTileNum;\n';
          inputNames.forEach((name) => {
            kernel += `            ${name}Gm.SetGlobalBuffer(\n`;
            kernel += `                (__gm__ ${dtypeC}*)${name} + t.formerLength * t.formerNum\n`;
            kernel += '                    + t.tailLength * (GetBlockIdx() - t.formerNum),\n';
            kernel += '                t.tailLength);\n';
          });
          kernel += '        }\n';
          kernel += '        // InitBuffer uses formerTileLength (the larger) so tail cores fit too\n';
          inputNames.forEach((name) => {
            kernel += `        pipe.InitBuffer(inQueue${name.toUpperCase()}, BUFFER_NUM,\n`;
            kernel += `                        t.formerTileLength * sizeof(${dtypeC}));\n`;
          });
          kernel += '    }\n';
          kernel += '};\n';
        }

        let host = '';
        host += '// op_host/tiling.h\n';
        host += '#include "register/tilingdata_base.h"\n\n';
        host += 'namespace optiling {\n';
        host += 'BEGIN_TILING_DATA_DEF(TilingData)\n';
        if (outcome.formerNum === 0) {
          host += '  TILING_DATA_FIELD_DEF(uint32_t, totalLength);\n';
          host += '  TILING_DATA_FIELD_DEF(uint32_t, tileNum);\n';
        } else {
          host += '  TILING_DATA_FIELD_DEF(uint32_t, formerNum);\n';
          host += '  TILING_DATA_FIELD_DEF(uint32_t, tailNum);\n';
          host += '  TILING_DATA_FIELD_DEF(uint32_t, formerLength);\n';
          host += '  TILING_DATA_FIELD_DEF(uint32_t, tailLength);\n';
          host += '  TILING_DATA_FIELD_DEF(uint32_t, formerTileNum);\n';
          host += '  TILING_DATA_FIELD_DEF(uint32_t, formerTileLength);\n';
          host += '  TILING_DATA_FIELD_DEF(uint32_t, tailTileNum);\n';
          host += '  TILING_DATA_FIELD_DEF(uint32_t, tailTileLength);\n';
          host += '  TILING_DATA_FIELD_DEF(uint32_t, alignNum);\n';
        }
        host += 'END_TILING_DATA_DEF;\n';
        host += 'REGISTER_TILING_DATA_CLASS(CustomOp, TilingData)\n';
        host += '}\n';
        host += `\n// op_host/tiling.cpp — SetTilingKey(${tilingKey});\n`;
        return { kernel, host };
      }

      function renderTilingCode(selected, outcome) {
        const code = tilingCodeForScheme(selected, outcome);
        return `
          <section class="viz-panel tiling-code-panel">
            <header class="section-head">
              <h3>Tiling 代码</h3>
              <div class="top-actions">
                <button class="btn btn-sm btn-ghost" type="button" id="copyTilingCode">复制代码</button>
                <button class="btn btn-sm btn-ghost" type="button" id="downloadTilingCode">下载 .cpp</button>
              </div>
            </header>
            <div class="section-body">
              <div class="tiling-code-layout">
                <div class="tiling-code-block">
                  <div class="tiling-code-block__head"><h4>生成的 kernel 骨架</h4><span>${outcome.soc.name} · ${selected.dtype}</span></div>
                  <pre class="tiling-code-pre" id="kernelSkeletonCode">${escapeHtml(code.kernel)}</pre>
                </div>
                <div class="tiling-code-block">
                  <div class="tiling-code-block__head"><h4>Host 侧 Tiling 结构体</h4><span>op_host/tiling.h</span></div>
                  <pre class="tiling-code-pre tiling-code-pre--host" id="hostTilingCode">${escapeHtml(code.host)}</pre>
                </div>
              </div>
            </div>
          </section>
        `;
      }

      function renderSchemePicker() {
        return `
          <section class="viz-panel scheme-picker">
            <header class="section-head">
              <h3>Tiling 方案</h3>
              <button class="btn btn-sm" type="button" id="addTilingScheme">新增</button>
            </header>
            <div class="section-body">
              <div class="scheme-card-grid">
                ${tilingSchemes.map((scheme) => {
                  const s = computeTilingOutcome(scheme);
                  const queueCount = scheme.inputs * scheme.bufferNum;
                  const queueLimit = s.soc.maxQueuePerPos * 2;
                  const selectedScheme = scheme.name === state.tilingScheme;
                  const verdict = schemeVerdict(s);
                  return `
                    <article class="scheme-option ${selectedScheme ? 'is-active' : ''}" role="button" tabindex="0" data-tiling-scheme="${scheme.name}">
                      <div class="scheme-option__top">
                        <h4>${scheme.name}</h4>
                        <div class="scheme-option__actions">
                          <span class="scheme-option__badge">${scheme.tilingMode === 'manual' ? '手动' : '自动'}</span>
                          ${scheme.custom ? `<button class="scheme-option__delete" type="button" data-delete-tiling-scheme="${scheme.name}" aria-label="删除 ${scheme.name}" title="删除">×</button>` : ''}
                        </div>
                      </div>
                      <div class="scheme-verdict ${verdict.cls}"><span>结论</span><b>${verdict.label}</b></div>
                      <div class="scheme-option__facts">

      function rangeField(id, label, min, max, value, step) {
        return `<div class="control-field"><label for="${id}">${label}</label><input id="${id}" type="range" min="${min}" max="${max}" step="${step}" value="${value}"></div>`;
      }

      function totalInputField(key, label, min, max, value, step) {
        return `<div class="control-field"><label for="${key}">${label}</label><div class="number-control number-control--with-slider"><input id="${key}Range" type="range" min="${min}" max="${max}" step="${step}" value="${value}" data-number-field="${key}"><input id="${key}" type="number" min="${min}" max="${max}" step="${step}" value="${value}" data-number-field="${key}" inputmode="numeric"></div></div>`;
      }

      function stepperField(key, label, min, max, value, step) {
        return `<div class="control-field"><label for="${key}">${label}</label><div class="stepper-control"><button type="button" aria-label="Decrease ${label}" data-stepper-target="${key}" data-delta="${-step}" data-min="${min}" data-max="${max}" data-step="${step}">-</button><input id="${key}" type="number" min="${min}" max="${max}" step="${step}" value="${value}" readonly tabindex="-1"><button type="button" aria-label="Increase ${label}" data-stepper-target="${key}" data-delta="${step}" data-min="${min}" data-max="${max}" data-step="${step}">+</button></div></div>`;
      }

      function clampToStep(value, min, max, step) {
        const bounded = Math.max(min, Math.min(max, value));
        return Math.round(bounded / step) * step;
      }

      function bindRange(id) {
        const input = document.getElementById(id);
        if (!input) return;
        input.addEventListener('input', () => {
          state[id] = Number(input.value);
          const out = document.getElementById(`${id}Out`);

      function checks(rows) {
        return `<div class="check-list">${rows.map((row) => {
          if (!Array.isArray(row)) {
            return `
              <div class="check-row check-row--diagnostic ${row.cls}">
