      }

      function load3dParams() {
        const p = state.api;
        const Ci = p.Ci ?? p.C1 ?? 1;
        return {
          Hi: p.H,
          Wi: p.W,
          Ci,
          C0: p.C0,
          Hk: p.filterH,
          Wk: p.filterW,
          strideH: p.strideH,
          strideW: p.strideW,
          padTop: p.padTop,
          padRight: p.padRight ?? 0,
          padBottom: p.padBottom ?? 0,
          padLeft: p.padLeft,
          padValue: p.padValue ?? 0,
          dilationH: p.dilationH,
          dilationW: p.dilationW,
          repeatMode: p.repeatMode,
          repeatTime: p.repeatTime,
          jumpStride: p.jumpStride ?? 1,
          showChannelPadding: p.showChannelPadding !== false
        };
      }

      function load3dShape(p) {
        const effectiveKernelH = (p.Hk - 1) * p.dilationH + 1;
        const effectiveKernelW = (p.Wk - 1) * p.dilationW + 1;
        const Ho = Math.floor((p.Hi + p.padTop + p.padBottom - effectiveKernelH) / p.strideH) + 1;
        const Wo = Math.floor((p.Wi + p.padLeft + p.padRight - effectiveKernelW) / p.strideW) + 1;
        const C1 = Math.ceil(p.Ci / p.C0);
        const physicalSlots = C1 * p.C0;
        return {
          effectiveKernelH,
          effectiveKernelW,
          Ho,
          Wo,
          C1,
          physicalSlots,
          paddingChannels: physicalSlots - p.Ci,
          valid: Ho > 0 && Wo > 0,
          rows: Math.max(0, Ho * Wo),
          cols: Math.max(0, p.Hk * p.Wk * p.Ci)
        };
      }

      function load3dPatches(p, shape) {
        if (!shape.valid) return [];
        const patches = [];
        for (let oh = 0; oh < shape.Ho; oh += 1) {
          for (let ow = 0; ow < shape.Wo; ow += 1) {
            const baseH = oh * p.strideH - p.padTop;
            const baseW = ow * p.strideW - p.padLeft;
            const row = oh * shape.Wo + ow;
            const elements = [];
            for (let kh = 0; kh < p.Hk; kh += 1) {
              for (let kw = 0; kw < p.Wk; kw += 1) {
                for (let c = 0; c < p.Ci; c += 1) {
                  const srcH = baseH + kh * p.dilationH;
                  const srcW = baseW + kw * p.dilationW;
                  const col = ((kh * p.Wk) + kw) * p.Ci + c;
                  const isPadding = srcH < 0 || srcH >= p.Hi || srcW < 0 || srcW >= p.Wi;
                  elements.push({ oh, ow, row, kh, kw, c, col, srcH, srcW, srcC: c, isPadding });
                }
              }
            }
            patches.push({ oh, ow, row, baseH, baseW, elements });
          }
        }
        return patches;
      }

      function load3dTotalSteps(patches) {
        return patches.reduce((sum, patch) => sum + patch.elements.length, 0);
      }

      function load3dContext(patches) {
        if (!patches.length) return { patch: null, element: null, step: 0, maxStep: 0 };
        const maxStep = Math.max(0, load3dTotalSteps(patches) - 1);
        let cursor = Math.max(0, Math.min(maxStep, state.apiStep || 0));
        let patch = patches[0];
        let element = patch.elements[0];
        for (const candidate of patches) {
          if (cursor < candidate.elements.length) {
            patch = candidate;
            element = candidate.elements[cursor];
            break;
          }
          cursor -= candidate.elements.length;
        }
        return { patch, element, step: Math.max(0, Math.min(maxStep, state.apiStep || 0)), maxStep };
      }

      function load3dSourceLabel(h, w, c, isPadding) {
        return isPadding ? 'PAD' : `x${h}${w}${c}`;
      }

      function load3dTensorPoint(originX, originY, unit, depthX, depthY, col, row, depth) {
        return {
          x: originX + col * unit + depth * depthX,
          y: originY + row * unit - depth * depthY
        };
      }

      function load3dDrawQuad(ctx, p0, p1, p2, p3, fill, stroke, lineWidth = 1) {
        ctx.beginPath();
        ctx.moveTo(p0.x, p0.y);
        ctx.lineTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.lineTo(p3.x, p3.y);
        ctx.closePath();
        ctx.fillStyle = fill;
        ctx.fill();
        ctx.strokeStyle = stroke;
        ctx.lineWidth = lineWidth;
        ctx.stroke();
      }

      function load3dDrawVoxel(ctx, originX, originY, unit, depthX, depthY, col, row, depth, faces) {
        const gap = 0.065;
        const point = (cc, rr, dd) => load3dTensorPoint(originX, originY, unit, depthX, depthY, cc, rr, dd);
        const c0 = col + gap;
        const c1 = col + 1 - gap;
        const r0 = row + gap;
        const r1 = row + 1 - gap;
        const d0 = depth + gap;
        const d1 = depth + 1 - gap;
        const f0 = point(c0, r0, d0);
        const f1 = point(c1, r0, d0);
        const f2 = point(c1, r1, d0);
        const f3 = point(c0, r1, d0);
        const b0 = point(c0, r0, d1);
        const b1 = point(c1, r0, d1);
        const b2 = point(c1, r1, d1);
        load3dDrawQuad(ctx, f0, f1, b1, b0, faces.top, faces.topEdge || faces.edge, faces.topLineWidth || faces.lineWidth || 1);
        load3dDrawQuad(ctx, f1, f2, b2, b1, faces.east, faces.edge, faces.lineWidth || 1);
        load3dDrawQuad(ctx, f0, f1, f2, f3, faces.south, faces.edge, faces.lineWidth || 1);
        return { center: { x: (f0.x + f1.x + f2.x + f3.x) / 4, y: (f0.y + f1.y + f2.y + f3.y) / 4 } };
      }

      function load3dFrame(ctx, originX, originY, unit, depthX, depthY, cols, rows, depth) {
        const p = (c, r, d) => load3dTensorPoint(originX, originY, unit, depthX, depthY, c, r, d);
        const corners = {
          f0: p(0, 0, 0),
          f1: p(cols, 0, 0),
          f2: p(cols, rows, 0),
          f3: p(0, rows, 0),
          b0: p(0, 0, depth),
          b1: p(cols, 0, depth),
          b2: p(cols, rows, depth),
          b3: p(0, rows, depth)
        };
        ctx.save();
        ctx.fillStyle = 'rgba(236,242,248,0.82)';
        ctx.font = '700 13px ui-monospace, SFMono-Regular, Menlo, monospace';
        ctx.textAlign = 'center';
        ctx.fillText('Wi', (corners.f2.x + corners.f3.x) / 2, corners.f2.y + 24);
        ctx.textAlign = 'right';
        ctx.fillText('Hi', corners.f3.x - 10, (corners.f0.y + corners.f3.y) / 2);
        ctx.textAlign = 'center';
        ctx.fillText('Ci', (corners.f0.x + corners.b0.x) / 2, (corners.f0.y + corners.b0.y) / 2 - 14);
        ctx.restore();
      }

      function load3dFaces(kind) {
        const palettes = {
          base: { top: 'rgba(74,80,88,0.80)', east: 'rgba(59,65,74,0.80)', south: 'rgba(48,54,64,0.80)', edge: 'rgba(10,12,16,0.62)' },
          pad: { top: 'rgba(90,96,104,0.25)', east: 'rgba(54,60,68,0.25)', south: 'rgba(42,48,56,0.25)', edge: 'rgba(190,200,212,0.18)' },
          channelPad: { top: 'rgba(74,80,88,0.22)', east: 'rgba(59,65,74,0.20)', south: 'rgba(48,54,64,0.20)', edge: 'rgba(190,200,212,0.14)' },
          window: { top: 'rgba(72,199,232,0.90)', east: 'rgba(37,143,170,0.90)', south: 'rgba(27,116,143,0.90)', edge: 'rgba(138,235,255,0.90)', lineWidth: 1.15, topLineWidth: 1.4 },
          sampled: { top: 'rgba(72,199,232,1)', east: 'rgba(35,148,176,1)', south: 'rgba(25,122,150,1)', edge: 'rgba(167,240,255,1)', lineWidth: 1.25, topLineWidth: 1.6 },
          current: { top: '#ffbf4d', east: '#c98220', south: '#a96819', edge: 'rgba(255,244,214,0.9)', lineWidth: 1.5, topLineWidth: 2 },
          skipped: { top: 'rgba(255,255,255,0.08)', east: 'rgba(255,255,255,0.055)', south: 'rgba(255,255,255,0.045)', edge: 'rgba(255,255,255,0.18)' }
        };
        return palettes[kind] || palettes.base;
      }

      function load3dDrawNchwCanvas(canvas, p) {
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.max(1, Math.floor(rect.width * dpr));
        canvas.height = Math.max(1, Math.floor(rect.height * dpr));
        const ctx = canvas.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, rect.width, rect.height);
        const layers = Math.min(p.Ci, 4);
        const fitW = (rect.width - 84) / Math.max(1, p.Wi + layers * 0.52);
        const fitH = (rect.height - 92) / Math.max(1, p.Hi + layers * 0.38);
        const unit = Math.max(14, Math.min(34, fitW, fitH));
        const depthX = unit * 0.52;
        const depthY = unit * 0.38;
        const objectW = p.Wi * unit + layers * depthX;
        const objectH = p.Hi * unit + layers * depthY;
        const originX = Math.max(44, (rect.width - objectW) / 2 + 10);
        const originY = Math.max(66 + layers * depthY, (rect.height - objectH) / 2 + layers * depthY + 16);
        load3dFrame(ctx, originX, originY, unit, depthX, depthY, p.Wi, p.Hi, layers);
        const cells = [];
        for (let c = 0; c < layers; c += 1) {
          for (let h = 0; h < p.Hi; h += 1) {
            for (let w = 0; w < p.Wi; w += 1) cells.push({ c, h, w, depth: c });
          }
        }
        cells.sort((a, b) => (b.depth - a.depth) || (b.h - a.h) || (a.w - b.w));
        const faces = { top: 'rgb(74,80,88)', east: 'rgb(59,65,74)', south: 'rgb(48,54,64)', edge: 'rgba(10,12,16,0.72)' };
        ctx.font = '700 10px ui-monospace, SFMono-Regular, Menlo, monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        for (const cell of cells) {
          const result = load3dDrawVoxel(ctx, originX, originY, unit, depthX, depthY, cell.w, cell.h, cell.depth, faces);
          if (cell.c === 0 && p.Hi * p.Wi <= 36) {
            ctx.fillStyle = 'rgba(235,243,252,0.72)';
            ctx.fillText(`${cell.h}${cell.w}`, result.center.x, result.center.y + 1);
          }
        }
      }

      function load3dDrawA1Canvas(canvas, p, shape, patch, element) {
        if (!canvas || !patch || !element) return;
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.max(1, Math.floor(rect.width * dpr));
        canvas.height = Math.max(1, Math.floor(rect.height * dpr));
        const ctx = canvas.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, rect.width, rect.height);
        const totalH = p.Hi + p.padTop + p.padBottom;
        const totalW = p.Wi + p.padLeft + p.padRight;
        const layers = p.showChannelPadding ? p.C0 : p.Ci;
        const fitW = (rect.width - 96) / Math.max(1, totalW + layers * 0.56);
        const fitH = (rect.height - 94) / Math.max(1, totalH + layers * 0.42);
        const unit = Math.max(8, Math.min(30, fitW, fitH));
        const depthX = unit * 0.56;
        const depthY = unit * 0.42;
        const objectW = totalW * unit + layers * depthX;
        const objectH = totalH * unit + layers * depthY;
        const originX = Math.max(54, (rect.width - objectW) / 2 + 14);
        const originY = Math.max(58 + layers * depthY, (rect.height - objectH) / 2 + layers * depthY + 18);
        const windowCoords = new Set();
        const skippedCoords = new Set();
        const sampledKeys = new Set(patch.elements.map((item) => `${item.srcH},${item.srcW},${item.c}`));
        for (let kh = 0; kh < p.Hk; kh += 1) {
          for (let kw = 0; kw < p.Wk; kw += 1) {
            const h = patch.baseH + kh * p.dilationH;
            const w = patch.baseW + kw * p.dilationW;
            for (let c = 0; c < p.Ci; c += 1) windowCoords.add(`${h},${w},${c}`);
          }
        }
        if (p.dilationH > 1 || p.dilationW > 1) {
          const maxH = patch.baseH + (p.Hk - 1) * p.dilationH;
          const maxW = patch.baseW + (p.Wk - 1) * p.dilationW;
          for (let h = patch.baseH; h <= maxH; h += 1) {
            for (let w = patch.baseW; w <= maxW; w += 1) {
              for (let c = 0; c < p.Ci; c += 1) {
                const key = `${h},${w},${c}`;
                if (!windowCoords.has(key)) skippedCoords.add(key);
              }
            }
          }
        }
        load3dFrame(ctx, originX, originY, unit, depthX, depthY, totalW, totalH, layers);
        const items = [];
        for (let c = 0; c < layers; c += 1) {
          for (let ph = 0; ph < totalH; ph += 1) {
            for (let pw = 0; pw < totalW; pw += 1) {
              const h = ph - p.padTop;
              const w = pw - p.padLeft;
              const key = `${h},${w},${c}`;
              const isPadding = h < 0 || h >= p.Hi || w < 0 || w >= p.Wi;
              const isChannelPad = p.showChannelPadding && c >= p.Ci;
              let kind = isChannelPad ? 'channelPad' : (isPadding ? 'pad' : 'base');
              if (skippedCoords.has(key)) kind = 'skipped';
              if (windowCoords.has(key)) kind = 'window';
              if (sampledKeys.has(key)) kind = 'sampled';
              if (key === `${element.srcH},${element.srcW},${element.c}`) kind = 'current';
              items.push({ ph, pw, h, w, c, kind, isPadding, isChannelPad, key });
            }
          }
        }
        items.sort((a, b) => {
          if (b.c !== a.c) return b.c - a.c;
          if (b.ph !== a.ph) return b.ph - a.ph;
          return a.pw - b.pw;
        });
        ctx.font = '700 10px ui-monospace, SFMono-Regular, Menlo, monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const showPaddingLabels = totalH * totalW <= 36;
        for (const item of items) {
          const result = load3dDrawVoxel(ctx, originX, originY, unit, depthX, depthY, item.pw, item.ph, item.c, load3dFaces(item.kind));
          const isMappedLabel = item.kind === 'current' || item.kind === 'sampled' || item.kind === 'window';
          const isVisiblePaddingLabel = item.isPadding && showPaddingLabels;
          if (item.kind !== 'skipped' && !item.isChannelPad && (isMappedLabel || isVisiblePaddingLabel)) {
            ctx.fillStyle = item.kind === 'current' ? '#211603' : 'rgba(240,247,252,0.86)';
            ctx.fillText(load3dSourceLabel(item.h, item.w, item.c, item.isPadding), result.center.x, result.center.y + 1);
          }
          if (item.kind === 'skipped') {
            ctx.fillStyle = 'rgba(255,255,255,0.38)';
            ctx.beginPath();
            ctx.arc(result.center.x, result.center.y, 2.2, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      function renderLoad3dNativeCanvases() {
        const p = load3dParams();
        const shape = load3dShape(p);
        if (!shape.valid) return;
        const patches = load3dPatches(p, shape);
        const ctx = load3dContext(patches);
        load3dDrawNchwCanvas(document.getElementById('opLoad3dNchwCanvas'), p);
        load3dDrawA1Canvas(document.getElementById('opLoad3dA1Canvas'), p, shape, ctx.patch, ctx.element);
      }

      function load3dStepLimit() {
        const p = load3dParams();
        const shape = load3dShape(p);
        const total = load3dTotalSteps(load3dPatches(p, shape));
        return { shape, total, maxStep: Math.max(0, total - 1) };
      }

      function stopApiPlayback() {
        state.apiPlaying = false;
        if (apiPlaybackTimer) clearInterval(apiPlaybackTimer);
        apiPlaybackTimer = null;
      }

      function preserveActiveInput(renderFn) {
        const active = document.activeElement;
        const focusState = active instanceof HTMLInputElement && active.id
          ? { id: active.id, type: active.type, value: active.value }
          : null;
        renderFn();
        if (!focusState) return;
        const next = document.getElementById(focusState.id);
        if (!(next instanceof HTMLInputElement)) return;
        next.focus({ preventScroll: true });
        if (typeof next.setSelectionRange === 'function' && (focusState.type === 'number' || focusState.type === 'text')) {
          const caret = String(next.value).length;
          try {
            next.setSelectionRange(caret, caret);
          } catch {
            // Some number inputs do not support selection ranges.
          }
        }
      }

      function renderApiAndInspector() {
        preserveActiveInput(() => {
          renderApi();
          renderInspector();
        });
      }

      function setApiStep(step) {
        const { maxStep } = load3dStepLimit();
        state.apiStep = Math.max(0, Math.min(maxStep, step));
        renderApiAndInspector();
      }

      function startApiPlayback() {
        const { shape, total, maxStep } = load3dStepLimit();
        if (!shape.valid || total <= 0) return;
        state.apiPlaying = true;
        if (state.apiStep >= maxStep) state.apiStep = 0;
        if (apiPlaybackTimer) clearInterval(apiPlaybackTimer);
        apiPlaybackTimer = setInterval(() => {
          const limit = load3dStepLimit();
          if (!limit.shape.valid || limit.total <= 0 || state.apiStep >= limit.maxStep) {
            stopApiPlayback();
            renderApiAndInspector();
            return;
          }
          state.apiStep += 1;
          renderApiAndInspector();
        }, Math.round(720 / (state.apiSpeed || 1)));
        renderApiAndInspector();
      }

      function mountApiPlaybackControl(patches) {
        const mount = document.getElementById('apiPlaybackMount');
        if (!mount) return;
        mount.replaceChildren();
        if (state.selectedApi !== 'Load3D' || !patches.length) return;
        const ids = {
          shell: 'apiPlaybackShell',
          toggle: 'apiPlaybackToggle',
          collapsedButton: 'apiPlaybackCollapsedButton',
          collapsedIcon: 'apiPlaybackCollapsedIcon',
          controls: 'apiPlaybackControls',
          stepBack: 'apiPlaybackPrev',
          play: 'apiPlaybackPlay',
          stepForward: 'apiPlaybackNext',
          replay: 'apiPlaybackReplay',
          scrubber: 'apiPlaybackScrubber',
          scrubberLabel: 'apiPlaybackScrubberLabel',
          scrubberOpname: 'apiPlaybackScrubberOpname',
          scrubberHover: 'apiPlaybackScrubberHover'
        };
        const control = window.PtoFloatingPlaybackControl.createControl({
          className: 'pto-floating-playback--preview',
          ids,
        });
        mount.appendChild(control);
        const controller = window.PtoFloatingPlaybackControl.init({
          root: mount,
          ids,
          isPlaying: () => state.apiPlaying,
        });
        const hover = window.PtoFloatingPlaybackControl.initScrubberHover({
          root: mount,
          ids,
          totalSteps: () => load3dTotalSteps(patches),
          getLabelForStep: (step) => {
            const stateAtStep = stepToState(step, patches);
            const patch = patches[stateAtStep.patchIndex];
            const element = patch?.elements?.[stateAtStep.elementIndex];
            return element ? `oh ${element.oh}, ow ${element.ow}` : `Step ${step}`;
          },
        });
        const stepLabel = mount.querySelector(`#${ids.scrubberLabel}`);
        const opname = mount.querySelector(`#${ids.scrubberOpname}`);
        const scrubber = mount.querySelector(`#${ids.scrubber}`);
        const syncPlayback = () => {
          controller.sync({ isPlaying: () => state.apiPlaying });
          if (stepLabel) stepLabel.textContent = `${state.apiStep + 1} / ${Math.max(1, load3dTotalSteps(patches))}`;
          if (opname) {
            const ctx = currentContext(patches);
            opname.textContent = ctx.element ? `patch ${ctx.patch.row}, element ${ctx.patch.elements.indexOf(ctx.element)}` : '-';
          }
          if (scrubber) scrubber.value = String(state.apiStep);
        };
        const goStep = (nextStep) => {
          state.apiStep = nextStep;
          syncPlayback();
          renderApiAndInspector();
        };
        mount.querySelector(`#${ids.stepBack}`)?.addEventListener('click', () => {
          stopApiPlayback();
          goStep(Math.max(0, state.apiStep - 1));
        });
        mount.querySelector(`#${ids.play}`)?.addEventListener('click', () => {
          if (state.apiPlaying) {
            stopApiPlayback();
            syncPlayback();
            return;
          }
          startApiPlayback();
        });
        mount.querySelector(`#${ids.stepForward}`)?.addEventListener('click', () => {
          stopApiPlayback();
          const maxStep = Math.max(0, load3dTotalSteps(patches) - 1);
          goStep(Math.min(maxStep, state.apiStep + 1));
        });
        mount.querySelector(`#${ids.replay}`)?.addEventListener('click', () => {
          stopApiPlayback();
          goStep(0);
          startApiPlayback();
        });
        scrubber?.addEventListener('input', (event) => {
          stopApiPlayback();
          goStep(Number(event.target.value));
        });
        syncPlayback();
      }

      const LOAD3D_ISO = {
        angle: Math.PI / 6,
        unit: 46,
        zUnit: 29
      };
      LOAD3D_ISO.cos = Math.cos(LOAD3D_ISO.angle);
      LOAD3D_ISO.sin = Math.sin(LOAD3D_ISO.angle);

      function isoPoint(originX, originY, unit, zUnit, c, r, k) {
        return {
          x: originX + (c - r) * LOAD3D_ISO.cos * unit,
          y: originY + (c + r) * LOAD3D_ISO.sin * unit - (k * zUnit)
        };
      }

      function svgQuad(points, fill, stroke, strokeWidth, extra = '') {
        return `<polygon points="${points.map((p) => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')}" fill="${fill}" stroke="${stroke}" stroke-width="${strokeWidth}" ${extra}></polygon>`;
      }

      function svgCube(originX, originY, unit, zUnit, c, r, k, palette) {
        const g = 0.12;
        const c0 = c + g, c1 = c + 1 - g, r0 = r + g, r1 = r + 1 - g, k0 = k + g, k1 = k + 1 - g;
        const T0 = isoPoint(originX, originY, unit, zUnit, c0, r0, k1);
        const T1 = isoPoint(originX, originY, unit, zUnit, c1, r0, k1);
        const T2 = isoPoint(originX, originY, unit, zUnit, c1, r1, k1);
        const T3 = isoPoint(originX, originY, unit, zUnit, c0, r1, k1);
        const E3 = isoPoint(originX, originY, unit, zUnit, c1, r0, k0);
        const E2 = isoPoint(originX, originY, unit, zUnit, c1, r1, k0);
        const S3 = isoPoint(originX, originY, unit, zUnit, c0, r1, k0);
        return `
          <g class="load3d-cube">
            ${svgQuad([T1, E3, E2, T2], palette.east, palette.edge, 1)}
            ${svgQuad([T3, T2, E2, S3], palette.south, palette.edge, 1)}
            ${svgQuad([T0, T1, T2, T3], palette.top, palette.edge, palette.topLw || 1)}
          </g>
        `;
      }

      function renderLoad3dVolumeSvg(sampled, win, cols, rows) {
        const p = state.api;
        const depth = Math.max(5, Math.min(8, p.repeatTime + 3));
        const viewW = 900;
        const viewH = 440;
        const unit = 42;
        const zUnit = 28;
        const originX = 356;
        const originY = 280;
        const sampledMap = new Set(sampled.map((item) => item.key));
        const cubes = [];

        for (let k = depth - 1; k >= 0; k -= 1) {
          for (let r = 0; r < rows; r += 1) {
            for (let c = 0; c < cols; c += 1) {
              const srcH = r - p.padTop;
              const srcW = c - p.padLeft;
              const key = `${srcH},${srcW}`;
              const inWindow = r >= win.h && c >= win.w && r <= win.h + (p.filterH - 1) * p.dilationH && c <= win.w + (p.filterW - 1) * p.dilationW;
              const isPad = srcH < 0 || srcW < 0 || srcH >= p.H || srcW >= p.W;
              const isSampled = sampledMap.has(key);
              const isBorder = r === 0 || c === 0 || r === rows - 1 || c === cols - 1;
              const showShell = isBorder || inWindow || (k < 2 && sampledMap.has(key));
              if (!showShell) continue;

              const base = isPad
                ? { top: 'rgba(78,78,78,0.95)', east: 'rgba(60,60,60,0.95)', south: 'rgba(52,52,52,0.95)', edge: 'rgba(24,24,24,0.72)' }
                : { top: '#4a4a4a', east: '#3d3d3d', south: '#313131', edge: 'rgba(17,17,17,0.75)' };
              const ghost = {
                top: 'rgba(172,184,196,0.08)',
                east: 'rgba(172,184,196,0.04)',
                south: 'rgba(172,184,196,0.03)',
                edge: 'rgba(190,200,212,0.22)',
                topLw: 1
              };
              const active = {
                top: 'rgba(77,151,255,0.92)',
                east: 'rgba(63,126,214,0.92)',
                south: 'rgba(53,104,176,0.92)',
                edge: 'rgba(18,34,64,0.60)',
                topLw: 1.3
              };
              const palette = inWindow
                ? (k === 0 ? active : ghost)
                : (isBorder ? base : (isSampled ? { ...active, top: 'rgba(77,151,255,0.32)', east: 'rgba(63,126,214,0.22)', south: 'rgba(53,104,176,0.18)', edge: 'rgba(116,140,190,0.24)' } : base));
              cubes.push({ c, r, k, key, show: svgCube(originX, originY, unit, zUnit, c, r, k, palette) });
            }
          }
        }

        cubes.sort((a, b) => (a.c + a.r + a.k) - (b.c + b.r + b.k));
        const zAxes = `
          <text x="136" y="92" class="load3d-svg__axis load3d-svg__axis--accent">K = ${depth} ↑</text>
          <text x="98" y="382" class="load3d-svg__axis">M</text>
          <text x="700" y="378" class="load3d-svg__axis">N</text>
        `;
        const highlight = sampled.filter((item) => item.key === (state.selectedSource || sampled[0]?.key));
        const focus = highlight[0] || sampled[0];
        const focusLabel = focus ? `${focus.srcH},${focus.srcW}` : 'n/a';
        return `
          <svg class="load3d-volume-svg" viewBox="0 0 ${viewW} ${viewH}" role="img" aria-label="Load3D 等距体块示意">
            <defs>
              <linearGradient id="load3d-volume-bg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="rgba(255,255,255,0.04)"></stop>
                <stop offset="100%" stop-color="rgba(255,255,255,0.01)"></stop>
              </linearGradient>
            </defs>
            <rect x="20" y="22" width="860" height="390" rx="20" fill="url(#load3d-volume-bg)" stroke="rgba(255,255,255,0.04)"></rect>
            ${cubes.map((cube) => cube.show).join('')}
            ${highlight.map((item) => {
              const srcH = item.srcH + p.padTop;
              const srcW = item.srcW + p.padLeft;
              const x = item.key === (state.selectedSource || item.key) ? 1 : 0;
              const ghostRows = Array.from({ length: depth - 1 }, (_, idx) => {
                const k = idx + 1;
                return svgCube(originX, originY, unit, zUnit, srcW, srcH, k, {
                  top: 'rgba(172,184,196,0.06)',
                  east: 'rgba(172,184,196,0.03)',
                  south: 'rgba(172,184,196,0.02)',
                  edge: 'rgba(185,195,205,0.18)',
                  topLw: 1
                });
              }).join('');
              return `
                <g opacity="1">
                  ${ghostRows}
                  ${x ? svgCube(originX, originY, unit, zUnit, srcW, srcH, 0, {
                    top: 'rgba(77,151,255,0.92)',
                    east: 'rgba(63,126,214,0.92)',
                    south: 'rgba(53,104,176,0.92)',
                    edge: 'rgba(18,34,64,0.66)',
                    topLw: 1.3
                  }) : ''}
                </g>
              `;
            }).join('')}
            ${zAxes}
            <text x="46" y="54" class="load3d-svg__note">feature map volume</text>
            <text x="46" y="76" class="load3d-svg__subnote">selected source ${focusLabel} · repeatMode ${p.repeatMode}</text>
          </svg>
        `;
      }

      function renderLoad3dSlabSvg(sampled) {
        const rows = sampled.length;
        const viewW = 320;
        const viewH = 420;
        const lineGap = 56;
        const baseY = 78;
        const blocks = sampled.map((item, idx) => {
          const y = baseY + idx * lineGap;
          const x = 28 + idx * 4;
          return `
            <g transform="translate(${x}, ${y})">
              <rect x="0" y="0" width="240" height="42" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"></rect>
              <polygon points="12,10 128,10 148,26 32,26" fill="rgba(77,151,255,0.22)" stroke="rgba(77,151,255,0.28)"></polygon>
              <polygon points="128,10 228,10 212,26 148,26" fill="rgba(77,151,255,0.14)" stroke="rgba(77,151,255,0.24)"></polygon>
              <polygon points="32,26 148,26 148,36 32,36" fill="rgba(172,184,196,0.10)" stroke="rgba(185,195,205,0.16)"></polygon>
              <text x="10" y="16" fill="rgba(231,231,231,0.82)" font-size="10" font-weight="700" font-family="var(--font-mono)">row ${idx + 1}</text>
              <text x="10" y="32" fill="rgba(181,188,198,0.70)" font-size="9" font-family="var(--font-mono)">${item.key}</text>
              <text x="156" y="16" fill="rgba(231,231,231,0.92)" font-size="10" font-weight="700" font-family="var(--font-sans)">filter[${item.kh},${item.kw}]</text>
              <text x="156" y="32" fill="rgba(181,188,198,0.72)" font-size="9" font-family="var(--font-mono)">source ${item.srcH}, ${item.srcW}</text>
            </g>
          `;
        }).join('');
        return `
          <svg class="load3d-slab-svg" viewBox="0 0 ${viewW} ${viewH}" role="img" aria-label="Load3D im2col slab">
            <rect x="12" y="18" width="292" height="382" rx="18" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)"></rect>
            <text x="26" y="46" fill="rgba(231,231,231,0.90)" font-size="14" font-weight="700" font-family="var(--font-sans)">im2col target slab</text>
            <text x="26" y="66" fill="rgba(181,188,198,0.72)" font-size="10" font-family="var(--font-mono)">source points are projected row by row</text>
            ${blocks}
          </svg>
        `;
      }

      function renderLoad3dScene() {
        const p = load3dParams();
        const shape = load3dShape(p);
        const patches = load3dPatches(p, shape);
        const ctx = load3dContext(patches);
        if (!shape.valid || !ctx.patch || !ctx.element) {
          return `
            <section class="viz-panel op-load3d-stage">
              <header class="section-head">
                <h3>参数沙盒</h3>
                <span class="section-meta">NCHW → NC1HWC0 → A2</span>
              </header>
              <div class="op-load3d-empty">
                <div>
                  <strong>当前参数无法产生输出位置</strong>
                  <div>当前 kernel / dilation / padding 组合让 Ho 或 Wo 小于等于 0。请增大 padding、减小 kernel、减小 dilation 或调整 stride。</div>
                </div>
              </div>
            </section>
          `;
        }
        const { patch, element } = ctx;
        const currentSourceText = element.isPadding
          ? `PAD(${p.padValue})`
          : `x[h=${element.srcH}, w=${element.srcW}, c=${element.srcC}]`;
        const cols = Math.max(1, shape.cols);
        const rows = Math.max(1, shape.rows);
        const cellMin = cols > 28 ? '14px' : cols > 16 ? '22px' : '34px';
        const cellIdeal = cols > 28 ? '26px' : cols > 16 ? '34px' : '46px';
        const showText = rows * cols <= 180;
        const inputVisibleLayers = Math.min(p.Ci, 4);
        const written = new Set();
        patches.forEach((candidate, patchIndex) => {
          candidate.elements.forEach((item, elementIndex) => {
            const step = patches.slice(0, patchIndex).reduce((sum, prior) => sum + prior.elements.length, 0) + elementIndex;
            if (step <= ctx.step) written.add(`${item.row},${item.col}`);
          });
        });
        const cells = [];
        for (let row = 0; row < rows; row += 1) {
          for (let col = 0; col < cols; col += 1) {
            const mapped = patches[row]?.elements[col];
            const active = row === element.row && col === element.col;
            const classes = ['op-load3d-cell'];
            if (row === element.row) classes.push('is-current-row');
            if (col === element.col) classes.push('is-current-col');
            if (written.has(`${row},${col}`)) classes.push('is-written');
            if (mapped?.isPadding) classes.push('is-pad');
            if (active) classes.push('is-active');
            const content = showText && mapped ? (mapped.isPadding ? 'PAD' : `x${mapped.srcH}${mapped.srcW}${mapped.srcC}`) : '';
            const title = mapped ? `row=${row}, col=${col}, kh=${mapped.kh}, kw=${mapped.kw}, c=${mapped.c}, src=(${mapped.srcH},${mapped.srcW},${mapped.srcC})` : '';
            cells.push(`<div class="${classes.join(' ')}" title="${title}">${content}</div>`);
          }
        }
        return `
          <section class="viz-panel op-load3d-stage">
            <header class="section-head">
              <h3>参数沙盒</h3>
              <span class="section-meta">NCHW → NC1HWC0 → A2</span>
            </header>
            <div class="op-load3d-playback-mount" id="apiPlaybackMount"></div>
            <div class="op-load3d-body">
              <section class="op-load3d-input">
                <div class="op-load3d-views">
                  <div class="op-load3d-canvas-card">
                    <div class="op-load3d-viz-head">
                      <div class="op-load3d-viz-meta">
                        <h4>输入形状</h4>
                        <div>N=1, C=${p.Ci}, H=${p.Hi}, W=${p.Wi}</div>
                        ${p.Ci > inputVisibleLayers ? `<div class="op-load3d-viz-note">仅显示前 ${inputVisibleLayers} 个通道切片</div>` : ''}
                      </div>
                    </div>
                    <canvas class="op-load3d-canvas" id="opLoad3dNchwCanvas" aria-label="NCHW input tensor"></canvas>
                  </div>
                  <div class="op-load3d-canvas-card">
                    <div class="op-load3d-viz-head">
                      <div class="op-load3d-viz-meta">
                        <h4>A1 布局</h4>
                        <div><b>N=1, C1=${shape.C1}, H=${p.Hi}, W=${p.Wi}, C0=${p.C0}</b></div>
                        <div class="op-load3d-viz-note">填充：${p.padTop} ${p.padRight} ${p.padBottom} ${p.padLeft}${!p.showChannelPadding && shape.paddingChannels > 0 ? ` · 隐藏的 C0 padding lanes：${shape.paddingChannels}` : ''}</div>
                      </div>
                      <div class="op-load3d-viz-status">当前：行 ${element.row}, 列 ${element.col}</div>
                    </div>
                    <canvas class="op-load3d-canvas" id="opLoad3dA1Canvas" aria-label="NC1HWC0 A1 布局"></canvas>
                  </div>
                </div>
                <aside class="op-load3d-inspector">
                  <h4>参数总览</h4>
                  <div class="op-load3d-kv">
                    <div class="op-load3d-kv-row"><span>当前输出位置</span><code>oh=${patch.oh}, ow=${patch.ow}</code></div>
                    <div class="op-load3d-kv-row"><span>左上角 H / W</span><code>${patch.baseH}, ${patch.baseW}</code></div>
                    <div class="op-load3d-kv-row"><span>取滤窗 H / W</span><code>kh=${element.kh}, kw=${element.kw}</code></div>
                    <div class="op-load3d-kv-row"><span>C1 索引 / c</span><code>c1=0, c=${element.c}</code></div>
                    <div class="op-load3d-kv-row"><span>源坐标</span><code>${currentSourceText}</code></div>
                    <div class="op-load3d-kv-row"><span>C1</span><code>ceil(${p.Ci} / ${p.C0}) = ${shape.C1}</code></div>
                    <div class="op-load3d-kv-row"><span>物理通道</span><code>${shape.physicalSlots}</code></div>
                    <div class="op-load3d-kv-row"><span>padding 通道</span><code>${shape.paddingChannels}</code></div>
                  </div>
                  <div class="op-load3d-formula">
                    <div><code>srcH = leftTopH + kh * dilationH</code></div>
                    <div><code>srcW = leftTopW + kw * dilationW</code></div>
                    <div>当前点会写入 A2 的第 <code>${element.row}</code> 行、第 <code>${element.col}</code> 列。</div>
                  </div>
                </aside>
              </section>
              <section class="op-load3d-matrix">
                <div class="op-load3d-viz-head op-load3d-matrix-head">
                  <div class="op-load3d-viz-meta">
                    <h4>A2 逻辑矩阵</h4>
                    <div>形状 = (${shape.Ho} * ${shape.Wo}, ${p.Hk} * ${p.Wk} * ${p.Ci}) = ${shape.rows} x ${shape.cols}</div>
                    <div>C0 padding lane 只表示物理对齐槽位，不进入逻辑 A2 展开矩阵。</div>
                    <div class="op-load3d-legend" aria-label="A2 矩阵颜色图例">
                      <span><i class="op-load3d-swatch row"></i>当前窗口行</span>
                      <span><i class="op-load3d-swatch col"></i>当前采样列</span>
                      <span><i class="op-load3d-swatch written"></i>已写入</span>
                      <span><i class="op-load3d-swatch pad"></i>PAD 来源</span>
                      <span><i class="op-load3d-swatch active"></i>当前写入 cell</span>
                    </div>
                  </div>
                  <div class="op-load3d-pills">
                    <span class="op-load3d-pill is-hot">row = oh * Wo + ow = ${element.row}</span>
                    <span class="op-load3d-pill">col = ((kh * Wk) + kw) * Ci + c = ${element.col}</span>
                  </div>
                </div>
                <div class="op-load3d-matrix-scroll" aria-label="A2 逻辑矩阵滚动区域">
                  <div class="op-load3d-grid" style="--cols:${cols};--cell-min:${cellMin};--cell-ideal:${cellIdeal};">
                    ${cells.join('')}
                  </div>
                </div>
              </section>
            </div>
          </section>
        `;
      }

      function renderApi() {
        const p = currentOperator();
        if (!p.apis.includes(state.selectedApi)) state.selectedApi = p.apis[0] || 'Load3D';
        const isLoad3D = state.selectedApi === 'Load3D';
        const sampled = sampleCoords();
        const win = currentWindow();
        const sampleSummary = sampled.map((item) => `${item.kh},${item.kw} → ${item.srcH},${item.srcW}`).join(' · ');
        $('#apiView').innerHTML = `
          <div class="api-layout">
            <aside class="view-side">
              <header class="section-head"><h3>API 可视化</h3><span class="section-meta">${state.selectedApi}</span></header>
              <div class="section-body control-stack">
                <div class="api-select-field">
                  <label for="apiSelect">API</label>
                  <select class="api-select" id="apiSelect" data-api-select aria-label="选择 API 可视化">
                    ${p.apis.map((api) => `<option value="${api}" ${api === state.selectedApi ? 'selected' : ''}>${api}</option>`).join('')}
                  </select>
                </div>
                <p class="api-note">${isLoad3D ? 'Load3D 是这个算子的细节映射演示。' : `${state.selectedApi} 已选中。当前这个 UX 演示仍把细节元素映射放在 Load3D 上。`}</p>
                <div class="control-stack" id="apiControls"></div>
              </div>
            </aside>
            <section class="api-canvas">
              ${isLoad3D ? renderLoad3dScene() : ''}
              ${!isLoad3D ? `<article class="viz-panel load3d-insight">
                <header class="section-head"><h3>三维读法</h3><span class="section-meta">调参数时会发生什么</span></header>
                <div class="section-body">
                  <div class="load3d-summary">
                    <p>Load3D 不是把 feature map 直接摊平成一张表，而是先把采样窗放到三维体上，再把命中的点按滑窗顺序投影到 im2col 目标行。</p>
                    <code>${sampleSummary}</code>
                  </div>
                  <div class="load3d-facts">
                    <div class="load3d-fact"><span>窗口</span><b>${p.filterH} × ${p.filterW}，从 ${win.h},${win.w} 开始</b></div>
                    <div class="load3d-fact"><span>重复</span><b>${p.repeatTime} 次重复写入，模式 ${p.repeatMode}</b></div>
                    <div class="load3d-fact"><span>填充</span><b>top ${p.padTop} / left ${p.padLeft} / bottom ${p.padBottom} / right ${p.padRight}</b></div>
                  </div>
                </div>
              </article>
              <article class="viz-panel load3d-params">
                <header class="section-head"><h3>映射规则</h3><span class="section-meta">源点 → 窗口 → 行</span></header>
                <div class="section-body">
                  <div class="load3d-note">选中的源点 cell 会在三维体上高亮。窗内点先被采样，再沿着对角方向进入目标 slab，因此你看到的是“体素被抽取并排成行”，不是 2D 平铺。</div>
                  <div class="load3d-summary">
                    <p>当前状态更像一个立体切片的工作台：左侧负责定位源体素，中间负责投影方向，右侧负责把每个采样点落到矩阵行。</p>
                    <code>源点[h,w] → 滤窗 → 采样点 → im2col 行</code>
                  </div>
                </div>
              </article>` : ''}
            </section>
          </div>
        `;
        if (isLoad3D) {
          requestAnimationFrame(() => {
            renderLoad3dNativeCanvases();
            mountApiPlaybackControl(load3dPatches(load3dParams(), load3dShape(load3dParams())));
          });
        } else {
          const mount = document.getElementById('apiPlaybackMount');
          if (mount) mount.replaceChildren();
        }
        renderApiControls();
        $('[data-api-select]')?.addEventListener('change', (event) => {
          stopApiPlayback();
          state.selectedApi = event.target.value;
          renderAll();
        });
      }

      function renderApiControls() {
        const fieldMap = { Hi: 'H', Wi: 'W', Hk: 'filterH', Wk: 'filterW' };
        const fields = [
          { key: 'Hi', label: 'Hi', min: 1, max: 8, group: '输入源参数' },
          { key: 'Wi', label: 'Wi', min: 1, max: 8, group: '输入源参数' },
          { key: 'Ci', label: 'Ci', min: 1, max: 16, group: '输入源参数' },
          { key: 'Hk', label: 'Hk', min: 1, max: 5, group: '窗口参数' },
          { key: 'Wk', label: 'Wk', min: 1, max: 5, group: '窗口参数' },
          { key: 'strideH', label: 'strideH', min: 1, max: 4, group: '滑动参数' },
          { key: 'strideW', label: 'strideW', min: 1, max: 4, group: '滑动参数' },
          { key: 'padTop', label: 'padTop', min: 0, max: 3, group: '填充参数' },
          { key: 'padRight', label: 'padRight', min: 0, max: 3, group: '填充参数' },
          { key: 'padBottom', label: 'padBottom', min: 0, max: 3, group: '填充参数' },
          { key: 'padLeft', label: 'padLeft', min: 0, max: 3, group: '填充参数' },
          { key: 'padValue', label: 'padValue', min: 0, max: 9, group: '填充参数' },
          { key: 'dilationH', label: 'dilationH', min: 1, max: 3, group: '膨胀参数' },
          { key: 'dilationW', label: 'dilationW', min: 1, max: 3, group: '膨胀参数' },
          { key: 'repeatTime', label: 'repeatTime', min: 1, max: 8, group: '重复参数' },
          { key: 'jumpStride', label: 'jumpStride', min: 1, max: 16, group: '重复参数' }
        ];
        const presets = [
          { name: '基础展开', values: { Hi: 4, Wi: 4, Ci: 1, C0: 16, Hk: 2, Wk: 2, strideH: 1, strideW: 1, padTop: 0, padRight: 0, padBottom: 0, padLeft: 0, dilationH: 1, dilationW: 1 } },
          { name: 'RGB 输入', values: { Hi: 5, Wi: 5, Ci: 3, C0: 16, Hk: 3, Wk: 3, strideH: 1, strideW: 1, padTop: 0, padRight: 0, padBottom: 0, padLeft: 0, dilationH: 1, dilationW: 1 } },
          { name: 'Padding', values: { Hi: 4, Wi: 4, Ci: 1, C0: 16, Hk: 3, Wk: 3, strideH: 1, strideW: 1, padTop: 1, padRight: 1, padBottom: 1, padLeft: 1, dilationH: 1, dilationW: 1 } },
          { name: 'Dilation', values: { Hi: 7, Wi: 7, Ci: 3, C0: 16, Hk: 3, Wk: 3, strideH: 1, strideW: 1, padTop: 0, padRight: 0, padBottom: 0, padLeft: 0, dilationH: 2, dilationW: 2 } },
          { name: 'NC1HWC0', values: { Hi: 5, Wi: 5, Ci: 3, C0: 16, Hk: 3, Wk: 3, strideH: 1, strideW: 1, padTop: 0, padRight: 0, padBottom: 0, padLeft: 0, dilationH: 1, dilationW: 1 } }
        ];
        const apiKey = (key) => fieldMap[key] || key;
        const getValue = (key) => state.api[apiKey(key)] ?? 0;
        const clampValue = (value, min, max) => Math.max(min, Math.min(max, value));
        const intValue = (value, fallback) => {
          const next = Number.parseInt(value, 10);
          return Number.isFinite(next) ? next : fallback;
        };
        const applyValues = (values) => {
          Object.entries(values).forEach(([key, value]) => {
            state.api[apiKey(key)] = value;
          });
        };
        const groups = new Map();
        fields.forEach((field) => {
          if (!groups.has(field.group)) groups.set(field.group, []);
          groups.get(field.group).push(field);
        });
        const p = load3dParams();
        const shape = load3dShape(p);
        const patches = load3dPatches(p, shape);
        const totalSteps = load3dTotalSteps(patches);
        state.apiStep = Math.max(0, Math.min(state.apiStep || 0, Math.max(0, totalSteps - 1)));
        if (!shape.valid || totalSteps <= 0) stopApiPlayback();
        const groupHtml = Array.from(groups.entries()).map(([title, groupFields]) => {
          const body = groupFields.map((field) => `
            <div class="field">
              <label for="api-learn-${field.key}">${field.label}</label>
              <input class="input" id="api-learn-${field.key}" type="number" min="${field.min}" max="${field.max}" value="${getValue(field.key)}">
            </div>
          `).join('');
          const extra = title === '输入源参数' ? `
            <div class="field">
              <label for="api-learn-C0">C0</label>
              <select id="api-learn-C0">
                <option value="16" ${state.api.C0 === 16 ? 'selected' : ''}>16</option>
                <option value="32" ${state.api.C0 === 32 ? 'selected' : ''}>32</option>
              </select>
            </div>
            <div class="field" style="grid-column: 1 / -1;">
              <label>padding 通道</label>
              <div class="seg">
                <button type="button" data-api-learn-channel-padding="1" class="${state.api.showChannelPadding ? 'active' : ''}">显示</button>
                <button type="button" data-api-learn-channel-padding="0" class="${!state.api.showChannelPadding ? 'active' : ''}">隐藏</button>
              </div>
            </div>
          ` : '';
          const repeatMode = title === '重复参数' ? `
            <div class="field">
              <label>repeatMode</label>
              <div class="seg">
                <button type="button" data-api-learn-repeat="0" class="${state.api.repeatMode === 0 ? 'active' : ''}">模式 0</button>
                <button type="button" data-api-learn-repeat="1" class="${state.api.repeatMode === 1 ? 'active' : ''}">模式 1</button>
              </div>
            </div>
            <div class="hint-text">${state.api.repeatMode === 0 ? '模式 0：强调 filter 内部 W 方向推进。' : '模式 1：强调滑窗 leftTop H 方向推进。'} 学习视角，不是完整微指令仿真。</div>
          ` : '';
          return `
            <section class="group">
              <div class="group-title">${title}</div>
              <div class="grid-2">${body}${extra}</div>
              ${repeatMode}
            </section>
          `;
        }).join('');
        $('#apiControls').innerHTML = `
          <div class="api-learn-controls">
            <section class="group">
              <div class="group-title">预设场景</div>
              <div class="presets">
                ${presets.map((preset, index) => `<button class="preset" type="button" data-api-learn-preset="${index}">${preset.name}</button>`).join('')}
              </div>
            </section>
            ${groupHtml}
          </div>
        `;
        fields.forEach((field) => {
          const input = document.getElementById(`api-learn-${field.key}`);
          input.addEventListener('input', () => {
            state.api[apiKey(field.key)] = clampValue(intValue(input.value, getValue(field.key)), field.min, field.max);
            const nextParams = load3dParams();
            const nextShape = load3dShape(nextParams);
            state.apiStep = Math.min(state.apiStep, Math.max(0, load3dTotalSteps(load3dPatches(nextParams, nextShape)) - 1));
            renderApiAndInspector();
          });
        });
        $('#api-learn-C0')?.addEventListener('change', (event) => {
          state.api.C0 = Number(event.target.value);
          renderApiAndInspector();
        });
        $$('[data-api-learn-channel-padding]').forEach((btn) => {
          btn.addEventListener('click', () => {
            state.api.showChannelPadding = btn.dataset.apiLearnChannelPadding === '1';
            renderApiAndInspector();
          });
        });
        $$('[data-api-learn-repeat]').forEach((btn) => {
          btn.addEventListener('click', () => {
            state.api.repeatMode = Number(btn.dataset.apiLearnRepeat);
            state.apiStep = 0;
            renderApiAndInspector();
          });
        });
        $$('[data-api-learn-preset]').forEach((btn) => {
          btn.addEventListener('click', () => {
            applyValues(presets[Number(btn.dataset.apiLearnPreset)].values);
            state.api.padValue = 0;
            state.api.repeatMode = 0;
            state.api.repeatTime = 1;
            state.api.jumpStride = 1;
            state.apiStep = 0;
            renderApiAndInspector();
          });
        });
      }

      function currentWindow() {
        const p = state.api;
        const step = Math.max(0, Math.min(5, state.apiStep));
        const baseH = step >= 3 ? p.strideH : 0;
        const baseW = step >= 2 ? p.strideW : 0;
        return { h: baseH + p.padTop, w: baseW + p.padLeft };
      }

      function renderFeatureGrid() {
        const p = state.api;
        const rows = p.H + p.padTop + p.padBottom;
        const cols = p.W + p.padLeft + p.padRight;
        const win = currentWindow();
        const sampled = sampleCoords();
        const grid = $('#featureGrid');
        grid.style.gridTemplateColumns = `repeat(${cols}, 28px)`;
        grid.innerHTML = Array.from({ length: rows * cols }, (_, idx) => {
          const r = Math.floor(idx / cols);
          const c = idx % cols;
          const srcH = r - p.padTop;
          const srcW = c - p.padLeft;
          const isPad = srcH < 0 || srcW < 0 || srcH >= p.H || srcW >= p.W;
          const inWindow = r >= win.h && c >= win.w && r <= win.h + (p.filterH - 1) * p.dilationH && c <= win.w + (p.filterW - 1) * p.dilationW;
          const key = `${srcH},${srcW}`;
          const isSampled = sampled.some((item) => item.key === key);
          const selected = state.selectedSource === key;
          return `<button class="feature-cell ${isPad ? 'is-pad' : ''} ${inWindow ? 'is-window' : ''} ${isSampled ? 'is-sampled' : ''} ${selected ? 'is-selected' : ''}" type="button" data-source="${key}" title="源坐标 ${key}">${isPad ? 'pad' : srcH * p.W + srcW}</button>`;
        }).join('');
        $$('[data-source]', grid).forEach((cell) => {
          cell.addEventListener('click', () => {
            state.selectedSource = cell.dataset.source;
            state.selectedMatrix = null;
            renderApi();
            renderInspector();
          });
        });
      }

      function sampleCoords() {
        const p = state.api;
        const win = currentWindow();
        const coords = [];
        for (let kh = 0; kh < p.filterH; kh += 1) {
          for (let kw = 0; kw < p.filterW; kw += 1) {
            const srcH = win.h + kh * p.dilationH - p.padTop;
            const srcW = win.w + kw * p.dilationW - p.padLeft;
            coords.push({ kh, kw, srcH, srcW, key: `${srcH},${srcW}` });
          }
        }
        return coords;
      }

      function renderFilterBox() {
        const sampled = sampleCoords();
        $('#filterBox').innerHTML = Array.from({ length: 9 }, (_, i) => {
          const kh = Math.floor(i / 3);
          const kw = i % 3;
          const hit = sampled.some((item) => item.kh === kh && item.kw === kw);
          return `<div class="filter-cell ${hit ? 'is-sampled' : ''}">${kh},${kw}</div>`;
        }).join('');
      }

      function renderMatrix() {
        const p = state.api;
        const sampled = sampleCoords();
        const offset = p.repeatMode === 0 ? state.apiStep * 4 : state.apiStep * 12;
        $('#matrixMeta').textContent = `repeatMode ${p.repeatMode}`;
        $('#matrixGrid').innerHTML = Array.from({ length: 96 }, (_, i) => {
          const row = Math.floor(i / 12);
          const col = i % 12;
          const local = i - offset;
          const filled = local >= 0 && local < sampled.length * 2;
          const sample = sampled[local % sampled.length];
          const selected = state.selectedMatrix === String(i) || (sample && sample.key === state.selectedSource && filled);
          const isPad = sample && (sample.srcH < 0 || sample.srcW < 0 || sample.srcH >= p.H || sample.srcW >= p.W);
          return `<button class="matrix-cell ${filled ? 'is-filled' : ''} ${isPad ? 'is-pad' : ''} ${selected ? 'is-selected' : ''}" type="button" data-matrix="${i}" data-source="${sample ? sample.key : ''}">${filled ? (isPad ? 'P' : local % sampled.length) : ''}</button>`;
        }).join('');
        $$('[data-matrix]').forEach((cell) => {
          cell.addEventListener('click', () => {
            state.selectedMatrix = cell.dataset.matrix;
            if (cell.dataset.source) state.selectedSource = cell.dataset.source;
            renderApi();
            renderInspector();
          });
        });
      }

      function renderMapping() {
        const p = state.api;
        const [h, w] = (state.selectedSource || '1,1').split(',').map(Number);
        const isPad = h < 0 || w < 0 || h >= p.H || w >= p.W;
        const matrix = state.selectedMatrix || 'auto';
        $('#mappingText').innerHTML = `
          <p>当前选择把一个 feature map 位置解释为 Load3D 的滑窗取样，再展开到目标矩阵。</p>
          <code>${isPad ? `padding(${p.padValue})` : `源点[h=${h}, w=${w}, c0=0..15]`} -> 滤窗 -> img2col[cell=${matrix}]</code>
          <p>repeatMode=${p.repeatMode} 会改变下一次 repeat 写入矩阵的位置：模式 0 偏向窗口位置移动，模式 1 偏向在 feature map 上推进 C0 / 窗口序列。</p>
        `;
      }

      function buildPipelineInputContract(operator, tilingScheme, tilingOutcome) {
        const inputList = operator.inputs.map((item) => `${item[0]}[${item[1]}] ${item[2]}`);
        const outputList = operator.outputs.map((item) => `${item[0]}[${item[1]}] ${item[2]}`);
        const firstInput = operator.inputs[0] || ['input', '-', '-'];
        const firstInputMeta = splitDtypeFormat(firstInput[2]);
        const queueCount = tilingScheme.inputs * tilingScheme.bufferNum;
        const queueLimit = tilingOutcome.soc.maxQueuePerPos * 2;
        const verdict = schemeVerdict(tilingOutcome).label;
        return {
          operatorId: operator.id,
          operatorTitle: operator.title,
          useCase: operator.formula,
          requirement: operator.requirement,
          performanceGoal: operator.performanceGoal,
          inputs: inputList,
          outputs: outputList,
          apiPlan: operator.apis,
          dtype: tilingScheme.dtype || firstInputMeta.dtype,
          format: firstInputMeta.format,
          workloadSeed: operatorWorkloadFormula(operator, tilingOutcome),
          workloadText: operatorWorkloadText(operator, tilingOutcome),
          soc: tilingOutcome.soc.name,
          blockDim: tilingOutcome.blockDim,
          tileNum: tilingOutcome.tileNum,
          bufferNum: tilingOutcome.bufferNum,
          tailPolicy: tilingScheme.tailPolicy || 'branch',
          paddingPolicy: tilingScheme.paddingPolicy || 'padding',
          tilingScheme: tilingScheme.name,
          tileLength: tilingOutcome.tileLen,
          ubBudget: `${tilingOutcome.ubPct.toFixed(0)}% (${bytesFmt(tilingOutcome.ubUsed)} / ${tilingOutcome.soc.ubKB} KB)`,
          queueBudget: `${queueCount}/${queueLimit} queue slots`,
          alignment: tilingOutcome.tileAligned ? `${tilingOutcome.soc.alignBytes}B aligned` : `not aligned to ${tilingOutcome.soc.alignBytes}B`,
          verdict,
          constraints: [
            `SOC ${tilingOutcome.soc.name} · ${tilingOutcome.soc.coreLabel}`,
            `BLOCK_DIM=${tilingOutcome.blockDim}, TILE_NUM=${tilingOutcome.tileNum}, BUFFER_NUM=${tilingOutcome.bufferNum}`,
            `tail=${tilingScheme.tailPolicy || 'branch'}, padding=${tilingScheme.paddingPolicy || 'padding'}`,
            `UB ${tilingOutcome.ubPct.toFixed(0)}%, queue ${queueCount}/${queueLimit}`
          ]
        };
      }

      function buildPipelineOutputContract(inputContract, scenario, selectedBlock) {
        const selectedStage = `${selectedBlock.tile} ${selectedBlock.stage}`;
        const stageRisk = pipelineStageMeta[selectedBlock.lane]?.risk || 'check profiling evidence';
        const waitReason = selectedBlock.waitReason || 'No explicit wait; validate overlap with adjacent tile stages.';
        return {
          selectedPlan: scenario.name,
          selectedStage,
          requiredInputs: [
            inputContract.tilingScheme,
            `BLOCK_DIM=${inputContract.blockDim}`,
            `TILE_NUM=${inputContract.tileNum}`,
            `BUFFER_NUM=${inputContract.bufferNum}`,
            inputContract.ubBudget
          ],
          expectedBenefit: scenario.expectedBenefit,
          mainRisks: scenario.risks,
          codeImplications: scenario.codeImplications,
          profilingValidation: scenario.profilingChecklist,
          reviewVerdict: scenario.reviewVerdict,
          tilingFeedback: scenario.tilingFeedback,
          selectedStageImpact: selectedBlock.bufferImpact,
          selectedStageWait: waitReason,
          selectedStageRisk: stageRisk,
          selectedStageEvidence: `${selectedBlock.pipe}: ${selectedBlock.instructionHints.join(', ')}`
        };
      }

      function renderContractItems(items) {
        return items.map(([label, value]) => `

            <b>${escapeHtml(value)}</b>

      function renderPipelineList(items) {

      function currentPipelineContracts(scenario, selected) {
        const operator = operators.find((item) => item.id === 'OP-004') || currentOperator();
        const tilingScheme = currentTilingScheme();
        const tilingOutcome = computeTilingOutcome(tilingScheme);
        const inputContract = buildPipelineInputContract(operator, tilingScheme, tilingOutcome);
        const outputContract = buildPipelineOutputContract(inputContract, scenario, selected);
        return { inputContract, outputContract };
      }

      function currentPipelineScenario() {
        return pipelineScenarios[state.pipeline] || pipelineScenarios.auto;
      }

      function pipelineBlockCenter(block) {
        return block.start + block.duration / 2;
      }

      function pipelineBlockForTime(scenario, time) {
        const active = scenario.lanes.filter((block) => time >= block.start && time <= block.start + block.duration);
        if (active.length) return active.sort((a, b) => pipelineExecutionOrder.indexOf(a.lane) - pipelineExecutionOrder.indexOf(b.lane))[0];
        return scenario.lanes.slice().sort((a, b) => Math.abs(pipelineBlockCenter(a) - time) - Math.abs(pipelineBlockCenter(b) - time))[0];
      }

      function currentPipelineBlock(scenario) {
        const selected = scenario.lanes.find((block) => block.id === state.selectedPipelineBlock);
        if (selected) return selected;
        if (state.selectedPipelineTime != null) return pipelineBlockForTime(scenario, state.selectedPipelineTime);
        return scenario.lanes.find((block) => block.lane === 'cube') || scenario.lanes[0];
      }

      function renderPipelineMetric(label, value) {
        return `<div class="pipeline-metric"><span>${label}</span><b>${escapeHtml(value)}</b></div>`;
      }

      function pipelineSelectedTime(selected) {
        return state.selectedPipelineTime != null ? state.selectedPipelineTime : pipelineBlockCenter(selected);
      }

      function renderPipelineLinks(scenario, selectedTime) {
        const laneHeight = 54;
        const rowGap = 8;
        const fullHeight = pipelineLanes.length * laneHeight + (pipelineLanes.length - 1) * rowGap;
        const laneIndex = new Map(pipelineLanes.map((lane, index) => [lane.id, index]));
        const pointsByTile = {};
        scenario.lanes.forEach((block) => {
          if (!pointsByTile[block.tile]) pointsByTile[block.tile] = [];
          pointsByTile[block.tile].push({
            order: pipelineExecutionOrder.indexOf(block.lane),
            x: block.start + block.duration / 2,
            y: (laneIndex.get(block.lane) || 0) * (laneHeight + rowGap) + laneHeight / 2
          });
        });
        return `
          <svg class="pipeline-links" viewBox="0 0 100 ${fullHeight}" style="height:${fullHeight}px" preserveAspectRatio="none" aria-hidden="true">
            <line class="pipeline-cursor" x1="${selectedTime.toFixed(2)}" y1="0" x2="${selectedTime.toFixed(2)}" y2="${fullHeight}"></line>
            ${Object.entries(pointsByTile).map(([tile, points]) => {
              const sorted = points.sort((a, b) => a.order - b.order);
              const d = sorted.map((point) => `${point.x.toFixed(2)},${point.y.toFixed(2)}`).join(' ');
              return `<polyline class="pipeline-link" style="--tile-color:${pipelineTileColors[tile] || 'var(--foreground-muted)'}" points="${d}"></polyline>`;
            }).join('')}
          </svg>
        `;
      }

      function renderPipelineLanes(scenario, selected) {
        const selectedTime = pipelineSelectedTime(selected);
        return `
          <div class="pipeline-lanes">
            ${renderPipelineLinks(scenario, selectedTime)}
            ${pipelineLanes.map((lane) => {
              const blocks = scenario.lanes.filter((block) => block.lane === lane.id);
              return `
                <div class="pipeline-lane-label"><b>${lane.title}</b><span>${lane.meta}</span></div>
                <div class="pipeline-lane" aria-label="${lane.title}">
                  ${blocks.map((block) => `
                    <button
                      class="pipeline-block ${lane.id === 'sync' ? 'is-wait' : ''} ${selected.id === block.id ? 'is-selected' : ''}"
                      type="button"
                      data-pipeline-block="${block.id}"
                      style="--start:${block.start};--dur:${block.duration};--tile-color:${pipelineTileColors[block.tile] || 'var(--foreground-muted)'}"
                      title="${escapeHtml(`${block.stage} · ${block.pipe} · ${block.api}`)}">
                      <span>${escapeHtml(block.tile)}</span>
                    </button>
                  `).join('')}
                </div>
              `;
            }).join('')}
          </div>
        `;
      }

      function activeResidencyAtTime(scenario, selectedTime) {
        return scenario.lanes
          .filter((block) => selectedTime >= block.start && selectedTime <= block.start + block.duration)
          .map((block) => {
            const tier = pipelineResidencyTiers.find((item) => item.lanes.includes(block.lane));
            const meta = pipelineStageMeta[block.lane];
            return {
              ...block,
              tier: tier?.id || block.lane,
              tierLabel: tier?.label || block.pipe,
              region: tier?.region || block.stage,
              size: tier?.size || 'mock',
              aliveBecause: meta?.aliveBecause || 'tile stage is still active',
              releaseWhen: meta?.releaseWhen || 'stage completes',
              blocks: meta?.blocks || 'no downstream blocker in this simplified model',
              risk: meta?.risk || 'check profiling evidence'
            };
          });
      }

      function renderResidencyView(scenario, selected) {
        const selectedTime = pipelineSelectedTime(selected);
        const active = activeResidencyAtTime(scenario, selectedTime);
        const bottleneck = active.find((item) => item.lane === 'copyout')
          || active.find((item) => item.lane === 'sync')
          || active.find((item) => item.lane === 'cube')
          || active[0];
        const bottleneckText = bottleneck
          ? `${bottleneck.tile} on ${bottleneck.tierLabel}: ${bottleneck.blocks}`

        return `

            ${active.length ? `

                    <div class="lifetime-field"><span>阻塞对象</span><b>${escapeHtml(item.blocks)}</b></div>
                    <div class="lifetime-field"><span>风险</span><b>${escapeHtml(item.risk)}</b></div>
                  </article>
                `).join('')}
              </div>
            ` : `<div class="lifetime-empty">选中的时间点没有活跃 tile。点击时间轴 block 或 lane 背景，可以切换到其他时间点。</div>`}
          </div>
        `;
      }
