                </section>
                <section class="viz-panel">
                  <header class="section-head"><h3>Buffer 生命周期分析</h3><span class="section-meta">选中时间 · 释放 / 阻塞原因</span></header>
                  <div class="section-body">
                    ${renderResidencyView(scenario, selected)}
                  </div>
                </section>
                <section class="viz-panel">
                  <header class="section-head"><h3>方案交接</h3><span class="section-meta">代码 · profiling · 评审</span></header>
                  <div class="section-body">
                    ${renderPlanHandoff(outputContract)}
                  </div>
                </section>
              </div>
            </section>
            <aside class="view-side">
              <header class="section-head"><h3>Pipeline 检查器</h3><span class="section-meta">pipe / instruction</span></header>
              ${renderPipelineInspector(scenario, selected, outputContract, 'pipe')}
            </aside>
          </div>
        `;
        $$('[data-pipeline]').forEach((btn) => {
          btn.addEventListener('click', () => {
            state.pipeline = btn.dataset.pipeline;
            state.selectedPipelineBlock = null;
            state.selectedPipelineTime = null;
            renderAll();
          });
        });
        $$('[data-pipeline-block]').forEach((btn) => {
          btn.addEventListener('click', () => {
            state.selectedPipelineBlock = btn.dataset.pipelineBlock;
            const scenarioNow = currentPipelineScenario();
            const block = scenarioNow.lanes.find((item) => item.id === state.selectedPipelineBlock);
            state.selectedPipelineTime = block ? pipelineBlockCenter(block) : null;
            renderAll();
          });
        });
        $$('.pipeline-lane').forEach((lane) => {
          lane.addEventListener('click', (event) => {
            if (event.target.closest('[data-pipeline-block]')) return;
            const rect = lane.getBoundingClientRect();
            const x = Math.max(0, Math.min(100, (event.clientX - rect.left) / rect.width * 100));
            const scenarioNow = currentPipelineScenario();
            const block = pipelineBlockForTime(scenarioNow, x);
            state.selectedPipelineTime = x;
            state.selectedPipelineBlock = block?.id || null;
            renderAll();
          });
        });
      }

      function renderFormat() {
        const info = calculateFormatLayout(state.format);
        const logicalSize = state.format.rows * state.format.cols;
        const physicalSize = info.paddedRows * info.paddedCols;
        const overhead = (physicalSize / logicalSize).toFixed(2);
        const addressMap = buildFormatAddressMap(state.format, info);
        const maxAddr = Math.max(...addressMap.keys());
        $('#formatView').innerHTML = `
          <div class="view-grid">
            <section class="view-main">
              <header class="section-head"><h3>Format 实验室 · 数据布局计算器</h3><span class="section-meta">${state.format.layout} / ${state.format.dtype}</span></header>
              <div class="section-body format-layout">
                <div class="control-stack">
                  <article class="viz-panel">
                    <header class="section-head"><h3>控制项</h3><span class="section-meta">shape / dtype / format</span></header>
                    <div class="section-body format-control-grid">
                      <div class="control-field">
                        <label for="formatLayout">布局格式</label>
                        <select id="formatLayout" data-format-field="layout">
                          ${['NZ', 'ZN', 'ZZ', 'NN', 'NDExt', 'DNExt', 'ND', 'DN'].map((item) => `<option value="${item}" ${state.format.layout === item ? 'selected' : ''}>${item}</option>`).join('')}
                        </select>
                      </div>
                      <div class="control-field">
                        <label for="formatDtype">数据类型</label>
                        <select id="formatDtype" data-format-field="dtype">
                          ${[
                            ['float16', 'float16 / half'],
                            ['float32', 'float32'],
                            ['int8', 'int8'],
                            ['fp8_e8m0_t', 'fp8_e8m0_t']
                          ].map(([value, label]) => `<option value="${value}" ${state.format.dtype === value ? 'selected' : ''}>${label}</option>`).join('')}
                        </select>
                      </div>
                      ${formatRangeField('rows', '行数', 1, 32, state.format.rows)}
                      ${formatRangeField('cols', '列数', 1, 32, state.format.cols)}
                    </div>
                  </article>
                  <article class="viz-panel">
                    <header class="section-head"><h3>地址规则</h3><span class="section-meta">1D 映射</span></header>
                    <div class="section-body format-formula">
                      <span>C0 对齐</span>
                      <code class="format-code">C0_ELEMENT = ${info.c0} (sizeof(T) = ${info.sizeofT}B)</code>
                      <span>对齐后的形状</span>
                      <code class="format-code">${formatShapeText(info)}</code>
                      <span>对齐后的 stride</span>
                      <code class="format-code">${formatStrideText(info)}</code>
                      <span>映射公式</span>
                      <code class="format-code">${formatRuleText(state.format, info)}</code>
                    </div>
                  </article>
                </div>
                <div class="format-canvas-stack">
                  <article class="viz-panel">
                    <header class="section-head"><h3>2D 逻辑矩阵</h3><span class="section-meta">${state.format.rows} x ${state.format.cols}, padded ${info.paddedRows} x ${info.paddedCols}</span></header>
                    <div class="section-body">
                      <div class="format-grid-scroll">
                        <div class="format-grid" style="grid-template-columns: repeat(${info.paddedCols}, 44px)">
                          ${renderFormatLogicalCells(state.format, info)}
                        </div>
                      </div>
                    </div>
                  </article>
                  <article class="viz-panel">
                    <header class="section-head"><h3>1D 物理内存</h3><span class="section-meta">offset 0 ... ${maxAddr}</span></header>
                    <div class="section-body">
                      <div class="format-ribbon-scroll">
                        <div class="format-ribbon">
                          ${renderFormatRibbon(addressMap, maxAddr)}
                        </div>
                      </div>
                    </div>
                  </article>
                </div>
              </div>
            </section>
            <aside class="view-side">
              <header class="section-head"><h3>映射检查器</h3><span class="section-meta">悬停单元格</span></header>
              <div class="section-body">
                <div class="soft-note">在 2D 矩阵或 1D ribbon 上移动，查看逻辑坐标如何编码成物理偏移。Padding 单元格暴露的是对齐代价，而不是用户数据。</div>
                ${checks([
                  ['逻辑元素', logicalSize, 'is-ok'],
                  ['物理元素', physicalSize, physicalSize === logicalSize ? 'is-ok' : 'is-warning'],
                  ['Padding 元素', physicalSize - logicalSize, physicalSize === logicalSize ? 'is-ok' : 'is-warning'],
                  ['内存开销', `${overhead}x`, Number(overhead) === 1 ? 'is-ok' : 'is-warning']
                ])}
                <div class="format-code format-trace" id="formatTrackStatus" style="margin-top:12px">悬停单元格以追踪逻辑坐标 (r, c) -> 物理偏移。</div>
                <div class="format-code format-trace" id="formatTrackFormula" style="margin-top:8px">addr(r, c) = -</div>
              </div>
            </aside>
          </div>
        `;
        $$('[data-format-field]').forEach((input) => {
          input.addEventListener('change', () => {
            state.format[input.dataset.formatField] = input.value;
            renderAll();
          });
        });
        bindFormatRangeControls();
        $$('.format-cell[data-format-addr]').forEach((cell) => {
          cell.addEventListener('mouseenter', () => highlightFormatCell(cell));
          cell.addEventListener('focus', () => highlightFormatCell(cell));
          cell.addEventListener('mouseleave', clearFormatHighlight);
          cell.addEventListener('blur', clearFormatHighlight);
        });
      }

      function formatRangeField(key, label, min, max, value) {
        return `
          <div class="control-field">
            <label for="format-${key}">${label}</label>
            <input id="format-${key}" data-format-range="${key}" type="range" min="${min}" max="${max}" step="1" value="${value}">
          </div>
        `;
      }

      function bindFormatRangeControls() {
        $$('[data-format-range]').forEach((input) => {
          input.addEventListener('input', () => {
            const key = input.dataset.formatRange;
            state.format[key] = Number(input.value);
            renderAll();
          });
        });
      }

      function calculateFormatLayout(config) {
        const sizeofT = config.dtype === 'float32' ? 4 : (config.dtype === 'int8' || config.dtype === 'fp8_e8m0_t' ? 1 : 2);
        const c0 = 32 / sizeofT;
        const rows = config.rows;
        const cols = config.cols;
        const info = {
          shapeRow0: '-',
          shapeRow1: rows,
          shapeCol0: '-',
          shapeCol1: cols,
          strideRow0: '-',
          strideRow1: cols,
          strideCol0: '-',
          strideCol1: 1,
          paddedRows: rows,
          paddedCols: cols,
          c0,
          sizeofT
        };

        if (config.layout === 'NZ') {
          Object.assign(info, {
            shapeRow0: 16,
            shapeCol0: c0,
            shapeRow1: Math.ceil(rows / 16),
            shapeCol1: Math.ceil(cols / c0),
            paddedRows: Math.ceil(rows / 16) * 16,
            paddedCols: Math.ceil(cols / c0) * c0
          });
          Object.assign(info, {
            strideRow0: c0,
            strideRow1: c0 * 16,
            strideCol0: 1,
            strideCol1: c0 * info.paddedRows
          });
        } else if (config.layout === 'ZN') {
          Object.assign(info, {
            shapeRow0: c0,
            shapeCol0: 16,
            shapeRow1: Math.ceil(rows / c0),
            shapeCol1: Math.ceil(cols / 16),
            paddedRows: Math.ceil(rows / c0) * c0,
            paddedCols: Math.ceil(cols / 16) * 16
          });
          Object.assign(info, {
            strideRow0: 1,
            strideRow1: c0 * info.paddedCols,
            strideCol0: c0,
            strideCol1: c0 * 16
          });
        } else if (config.layout === 'ZZ') {
          Object.assign(info, {
            shapeRow0: 16,
            shapeCol0: c0,
            shapeRow1: Math.ceil(rows / 16),
            shapeCol1: Math.ceil(cols / c0),
            paddedRows: Math.ceil(rows / 16) * 16,
            paddedCols: Math.ceil(cols / c0) * c0
          });
          Object.assign(info, {
            strideRow0: c0,
            strideRow1: 16 * info.paddedCols,
            strideCol0: 1,
            strideCol1: c0 * 16
          });
        } else if (config.layout === 'NN') {
          Object.assign(info, {
            shapeRow0: 2,
            shapeCol0: 16,
            shapeRow1: Math.ceil(rows / 2),
            shapeCol1: Math.ceil(cols / 16),
            paddedRows: Math.ceil(rows / 2) * 2,
            paddedCols: Math.ceil(cols / 16) * 16
          });
          Object.assign(info, {
            strideRow0: 1,
            strideRow1: 32,
            strideCol0: 2,
            strideCol1: rows * 16
          });
        } else if (config.layout === 'DN' || config.layout === 'DNExt') {
          info.strideRow1 = 1;
          info.strideCol1 = rows;
        }

        if (config.layout === 'NDExt' || config.layout === 'DNExt') {
          info.shapeRow0 = 1;
          info.shapeCol0 = 1;
          info.strideRow0 = 0;
          info.strideCol0 = 0;
        }
        return info;
      }

      function getFormatAddress(config, r, c, info) {
        if (config.layout === 'ND' || config.layout === 'NDExt' || config.layout === 'DN' || config.layout === 'DNExt') {
          return { idx: r * info.strideRow1 + c * info.strideCol1, ir: 0, or: r, ic: 0, oc: c };
        }
        const ir = r % info.shapeRow0;
        const or = Math.floor(r / info.shapeRow0);
        const ic = c % info.shapeCol0;
        const oc = Math.floor(c / info.shapeCol0);
        return {
          idx: oc * info.strideCol1 + or * info.strideRow1 + ic * info.strideCol0 + ir * info.strideRow0,
          ir,
          or,
          ic,
          oc
        };
      }

      function buildFormatAddressMap(config, info) {
        const addressMap = new Map();
        for (let r = 0; r < info.paddedRows; r += 1) {
          for (let c = 0; c < info.paddedCols; c += 1) {
            const address = getFormatAddress(config, r, c, info);
            addressMap.set(address.idx, { r, c, isPad: r >= config.rows || c >= config.cols, address });
          }
        }
        return addressMap;
      }

      function renderFormatLogicalCells(config, info) {
        const cells = [];
        for (let r = 0; r < info.paddedRows; r += 1) {
          for (let c = 0; c < info.paddedCols; c += 1) {
            const address = getFormatAddress(config, r, c, info);
            const isPad = r >= config.rows || c >= config.cols;
            cells.push(`<button class="format-cell ${isPad ? 'is-pad' : ''}" type="button" data-format-addr="${address.idx}" data-format-r="${r}" data-format-c="${c}" data-format-pad="${isPad}" data-format-ir="${address.ir}" data-format-or="${address.or}" data-format-ic="${address.ic}" data-format-oc="${address.oc}"><small>(${r},${c})</small><span>@${address.idx}</span></button>`);
          }
        }
        return cells.join('');
      }

      function renderFormatRibbon(addressMap, maxAddr) {
        return Array.from({ length: maxAddr + 1 }, (_, addr) => {
          const item = addressMap.get(addr);
          if (!item) return `<button class="format-cell is-gap" type="button" disabled><small>@${addr}</small><span>gap</span></button>`;
          return `<button class="format-cell ${item.isPad ? 'is-pad' : ''}" type="button" data-format-addr="${addr}" data-format-r="${item.r}" data-format-c="${item.c}" data-format-pad="${item.isPad}" data-format-ir="${item.address.ir}" data-format-or="${item.address.or}" data-format-ic="${item.address.ic}" data-format-oc="${item.address.oc}"><small>@${addr}</small><span>(${item.r},${item.c})</span></button>`;
        }).join('');
      }

      function formatShapeText(info) {
        return typeof info.shapeRow0 === 'number'
          ? `形状 = ((${info.shapeRow0}, ${info.shapeRow1}), (${info.shapeCol0}, ${info.shapeCol1}))`
          : `形状 = (${info.shapeRow1}, ${info.shapeCol1})`;
      }

      function formatStrideText(info) {
        return typeof info.strideRow0 === 'number'
          ? `步长 = ((${info.strideRow0}, ${info.strideRow1}), (${info.strideCol0}, ${info.strideCol1}))`
          : `步长 = (${info.strideRow1}, ${info.strideCol1})`;
      }

      function formatRuleText(config, info) {
        if (config.layout === 'NZ') return `addr(r, c) = floor(c / ${info.c0}) * ${info.strideCol1} + floor(r / 16) * ${info.strideRow1} + (c % ${info.c0}) * 1 + (r % 16) * ${info.c0}`;
        if (config.layout === 'ZN') return `addr(r, c) = floor(r / ${info.c0}) * ${info.strideRow1} + floor(c / 16) * ${info.strideCol1} + (c % 16) * ${info.c0} + (r % ${info.c0})`;
        if (config.layout === 'ZZ') return `addr(r, c) = floor(r / 16) * ${info.strideRow1} + floor(c / ${info.c0}) * ${info.strideCol1} + (r % 16) * ${info.c0} + (c % ${info.c0})`;
        if (config.layout === 'NN') return `addr(r, c) = floor(c / 16) * ${info.strideCol1} + floor(r / 2) * 32 + (c % 16) * 2 + (r % 2)`;
        if (config.layout === 'DN' || config.layout === 'DNExt') return `addr(r, c) = c * ${config.rows} + r`;
        return `addr(r, c) = r * ${config.cols} + c`;
      }

      function highlightFormatCell(cell) {
        const addr = cell.dataset.formatAddr;
        const r = Number(cell.dataset.formatR);
        const c = Number(cell.dataset.formatC);
        const isPad = cell.dataset.formatPad === 'true';
        $$('.format-cell.is-active').forEach((item) => item.classList.remove('is-active'));
        $$(`.format-cell[data-format-addr="${addr}"]`).forEach((item) => item.classList.add('is-active'));
        const traceStatus = $('#formatTrackStatus');
        const traceFormula = $('#formatTrackFormula');
        if (traceStatus) {
          traceStatus.textContent = `${isPad ? 'Padding cell' : 'Valid data'}: logical (${r}, ${c}) -> physical offset @${addr}`;
        }
        if (traceFormula) {
          traceFormula.textContent = formatTraceText(cell, addr, r, c);
        }
      }

      function formatTraceText(cell, addr, r, c) {
        const config = state.format;
        const info = calculateFormatLayout(config);
        const ir = Number(cell.dataset.formatIr);
        const or = Number(cell.dataset.formatOr);
        const ic = Number(cell.dataset.formatIc);
        const oc = Number(cell.dataset.formatOc);
        if (config.layout === 'NZ' || config.layout === 'ZZ') {
          return `addr(${r}, ${c}) = ${oc} * ${info.strideCol1} + ${or} * ${info.strideRow1} + ${ic} * ${info.strideCol0} + ${ir} * ${info.strideRow0} = ${addr}`;
        }
        if (config.layout === 'ZN') {
          return `addr(${r}, ${c}) = ${or} * ${info.strideRow1} + ${oc} * ${info.strideCol1} + ${ic} * ${info.strideCol0} + ${ir} * ${info.strideRow0} = ${addr}`;
        }
        if (config.layout === 'NN') {
          return `addr(${r}, ${c}) = ${oc} * ${info.strideCol1} + ${or} * 32 + ${ic} * 2 + ${ir} = ${addr}`;
        }
        return `addr(${r}, ${c}) = ${addr}`;
      }

      function clearFormatHighlight() {
        $$('.format-cell.is-active').forEach((item) => item.classList.remove('is-active'));
        const traceStatus = $('#formatTrackStatus');
        const traceFormula = $('#formatTrackFormula');
        if (traceStatus) traceStatus.textContent = 'Hover a cell to trace logical (r, c) -> physical offset.';
        if (traceFormula) traceFormula.textContent = 'addr(r, c) = -';
      }

      function renderInspector() {
        // Inspector is intentionally disabled for this demo variant.
      }

      function renderAll() {
        preserveActiveInput(() => {
          const p = currentOperator();
          renderOperators();
          renderOverview();
          renderTiling();
          renderApi();
          renderPipeline();
          renderFormat();
          renderInspector();
          $$('[data-view]').forEach((view) => view.classList.toggle('is-active', view.dataset.view === state.view));
          $$('[data-view-tab]').forEach((tab) => tab.classList.toggle('is-active', tab.dataset.viewTab === state.view));
          $('#mainTitle').textContent = p.title;
          $('#mainMeta').textContent = `${p.id} · ${p.type}`;
          $('#topCrumb').textContent = `${p.id} / ${viewLabel(state.view)}`;
          $('#statusOperator').textContent = p.id;
          $('#statusView').textContent = viewLabel(state.view);
          const mockLog = $('#mockLog');
          if (mockLog) mockLog.textContent = '';
        });
      }

      function pipelineSnapshotText() {
        const scenario = currentPipelineScenario();
        const selected = currentPipelineBlock(scenario);
        const { inputContract, outputContract } = currentPipelineContracts(scenario, selected);
        return [
          `ascend-operators % export --review-snapshot ${inputContract.operatorId}`,
          `输入契约: ${inputContract.operatorTitle} · ${inputContract.soc} · ${inputContract.dtype} · ${inputContract.tilingScheme}`,
          `Tiling: BLOCK_DIM=${inputContract.blockDim}, TILE_NUM=${inputContract.tileNum}, BUFFER_NUM=${inputContract.bufferNum}, UB=${inputContract.ubBudget}, 队列=${inputContract.queueBudget}`,
          `选定方案: ${outputContract.selectedPlan}`,
          `选中阶段: ${outputContract.selectedStage} · ${outputContract.selectedStageEvidence}`,
          `代码交接: ${outputContract.codeImplications.join(' | ')}`,
          `profiling 检查清单: ${outputContract.profilingValidation.join(' | ')}`,
          `评审结论: ${outputContract.reviewVerdict}`
        ].join('\n');
      }

      function initTabs() {
        $$('[data-view-tab]').forEach((tab) => {
          tab.addEventListener('click', () => {
            state.view = tab.dataset.viewTab;
            if (state.view === 'pipeline') state.operatorId = 'OP-004';
            renderAll();
          });
        });
      }

      function initFrame() {
        window.PtoIdeFrame?.initAll?.();
        $('#themeToggle').addEventListener('click', () => {
          const root = document.documentElement;
          root.dataset.theme = root.dataset.theme === 'dark' ? 'light' : 'dark';
        });
        $('#exportBtn').addEventListener('click', () => {
          const mockLog = $('#mockLog');
          if (mockLog) mockLog.textContent = pipelineSnapshotText();
        });
      }

      initTabs();
      renderAll();
      initFrame();
    })();
  </script>
</body>
</html>
