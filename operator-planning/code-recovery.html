{
    AscendC::TPipe pipe;
    AscendC::TQue<AscendC::TPosition::VECIN, 1> inQueueX;
    AscendC::TQue<AscendC::TPosition::VECIN, 1> inQueueY;
    AscendC::TQue<AscendC::TPosition::VECOUT, 1> outQueueZ;
    AscendC::GlobalTensor<float> xGm;
    AscendC::GlobalTensor<float> yGm;
    AscendC::GlobalTensor<float> zGm;
    uint32_t blockLength = totalLength / AscendC::GetBlockNum();
    xGm.SetGlobalBuffer((__gm__ float*)x + blockLength * AscendC::GetBlockIdx(), blockLength);
    yGm.SetGlobalBuffer((__gm__ float*)y + blockLength * AscendC::GetBlockIdx(), blockLength);
    zGm.SetGlobalBuffer((__gm__ float*)z + blockLength * AscendC::GetBlockIdx(), blockLength);
    pipe.InitBuffer(inQueueX, 1, blockLength * sizeof(float));
    pipe.InitBuffer(inQueueY, 1, blockLength * sizeof(float));
    pipe.InitBuffer(outQueueZ, 1, blockLength * sizeof(float));
    AscendC::LocalTensor<float> xLocal = inQueueX.AllocTensor<float>();
    AscendC::LocalTensor<float> yLocal = inQueueY.AllocTensor<float>();
    AscendC::DataCopy(xLocal, xGm, blockLength);
    AscendC::DataCopy(yLocal, yGm, blockLength);
    inQueueX.EnQue(xLocal);
    inQueueY.EnQue(yLocal);
    xLocal = inQueueX.DeQue<float>();
    yLocal = inQueueY.DeQue<float>();
    AscendC::LocalTensor<float> zLocal = outQueueZ.AllocTensor<float>();
    AscendC::Add(zLocal, xLocal, yLocal, blockLength);
    outQueueZ.EnQue<float>(zLocal);
    inQueueX.FreeTensor(xLocal);
    inQueueY.FreeTensor(yLocal);
    zLocal = outQueueZ.DeQue<float>();
    AscendC::DataCopy(zGm, zLocal, blockLength);
    outQueueZ.FreeTensor(zLocal);
}

int32_t main(int32_t argc, char* argv[])
{
    uint32_t numBlocks = 8;
    constexpr uint32_t totalLength = 8 * 2048;
    add_custom<<<numBlocks, 0, stream>>>(xDevice, yDevice, zDevice, totalLength);
}`;

      context: { operator: 'add_custom', kind: 'Vector', dtype: 'float', format: 'ND', shape: '[8, 2048]', cores: 8, total: 16384, perCore: 2048, bytesPerBuffer: '8 KiB', tail: '当前样例无 tail' },
      stages: [
        { id: 'stage:copyin', label: 'CopyIn', lane: 'MTE2', detail: 'GM x/y → UB LocalTensor → VECIN EnQue', lines: [47, 52], evidence: 'confirmed', color: 'var(--primary)' },
        { id: 'stage:add', label: 'Vector Add', lane: 'V', detail: 'VECIN DeQue → Add → VECOUT EnQue', lines: [55, 61], evidence: 'confirmed', color: 'var(--success)' },
        { id: 'stage:copyout', label: 'CopyOut', lane: 'MTE3', detail: 'VECOUT DeQue → UB z → GM z → Free', lines: [64, 66], evidence: 'confirmed', color: 'var(--warning)' }
      ],
      buffers: [
        { id: 'buffer:queue:x', label: 'xLocal', queue: 'inQueueX', position: 'VECIN / UB', depth: 1, lines: [27, 27], role: 'input' },
        { id: 'buffer:queue:y', label: 'yLocal', queue: 'inQueueY', position: 'VECIN / UB', depth: 1, lines: [28, 28], role: 'input' },
        { id: 'buffer:queue:z', label: 'zLocal', queue: 'outQueueZ', position: 'VECOUT / UB', depth: 1, lines: [29, 29], role: 'output' }
      ],
      partition: { id: 'partition:core', lines: [36, 40], launchLines: [72, 73] }
    };
    let sourceText = fallbackSource;
    let selected = null;
    let selectedCore = 0;
    let memoryMounted = false;
    let memoryPattern = null;
    let memoryViewport = null;
    let routeOverlay = null;

    function highlightCppCode(code) {
      return escapeHtml(code)
        .replace(/\b(__global__|__vector__|void|return|const|auto|if|else|for|while|class|struct|template|typename|using|namespace)\b/g, '<span class="syntax-keyword">$1</span>')
        .replace(/\b(uint8_t|uint32_t|int32_t|float|double|bool|size_t)\b/g, '<span class="syntax-type">$1</span>')
        .replace(/\b(AscendC|TPipe|TQue|TPosition|GlobalTensor|LocalTensor)\b/g, '<span class="syntax-api">$1</span>')
        .replace(/\b(InitBuffer|SetGlobalBuffer|AllocTensor|DataCopy|EnQue|DeQue|FreeTensor|GetBlockNum|GetBlockIdx|Add)\b/g, '<span class="syntax-function">$1</span>')
        .replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="syntax-number">$1</span>');
    }
    function highlightCppLine(line) {
      const fragments = line.split(/(\/\/.*$|"(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*')/);
      return fragments.map((fragment) => {
        if (!fragment) return '';
        if (fragment.startsWith('//')) return `<span class="syntax-comment">${escapeHtml(fragment)}</span>`;
        if (fragment.startsWith('"') || fragment.startsWith("'")) return `<span class="syntax-string">${escapeHtml(fragment)}</span>`;
        return highlightCppCode(fragment);
      }).join('');
    }
    function renderSource() {
      $('[data-source-lines]').innerHTML = sourceText.split('\n').map((line, index) => `<div class="source-line" data-source-line="${index + 1}"><span class="source-line-number">${index + 1}</span><code class="source-line-code">${highlightCppLine(line) || ' '}</code></div>`).join('');
    }
    function focusLines(range) {
      $$('.source-line').forEach((line) => line.classList.remove('is-evidence'));
      if (!range) return;
      for (let number = range[0]; number <= range[1]; number += 1) $(`[data-source-line="${number}"]`)?.classList.add('is-evidence');
      $(`[data-source-line="${range[0]}"]`)?.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
    function inspect(item) {
      selected = item;
      focusLines(item.lines);
      renderPipeline();
      renderLifecycle();
      renderTiling();
      bindViewActions();
    }

    function contextStrip() {
      const c = model.context;
      return `<div class="context-strip"><div class="context-fact"><span>Kernel</span><code>${c.operator} · ${c.kind}</code></div><div class="context-fact"><span>Tensor contract</span><code>${c.dtype} · ${c.format} · ${c.shape}</code></div><div class="context-fact"><span>Partition</span><code>${c.cores} cores × ${c.perCore} elements</code></div><div class="context-fact"><span>Runtime evidence</span><strong>Not attached</strong></div></div>`;
    }
    function renderPipeline() {
      const laneOrder = ['MTE2', 'V', 'MTE3'];
      $('[data-model-view="pipeline"]').innerHTML = `<div class="view-heading"><div><h1>Pipeline</h1><p>复用 Operator Planning 的 lane 语言，但横向位置只表示 CopyIn → Add → CopyOut 的偏序，不表示真实耗时或 overlap。</p></div><span class="evidence-chip is-confirmed">代码确认</span></div>${contextStrip()}<div class="pipeline-shell">${laneOrder.map((lane, laneIndex) => { const stage = model.stages.find((item) => item.lane === lane); return `<div class="pipeline-row"><div class="pipeline-label"><strong>${lane}</strong><span>${lane === 'V' ? 'Vector compute' : lane === 'MTE2' ? 'GM → UB' : 'UB → GM'}</span></div><div class="pipeline-track">${[0,1,2].map((column) => column === laneIndex ? `<button class="pipeline-block${selected?.id === stage.id ? ' is-selected' : ''}" type="button" data-select-id="${stage.id}" style="--block-color:${stage.color}"><strong>${stage.label}</strong><span>${stage.detail}</span></button>` : '<div class="pipeline-spacer"></div>').join('')}</div></div>`; }).join('')}</div><div class="queue-boundaries"><div class="queue-boundary"><strong>VECIN ready</strong><br>CopyIn 后 x/y <code>EnQue</code></div><div class="queue-boundary"><strong>VECIN consumed</strong><br>Add 前 <code>DeQue</code>，完成后 Free</div><div class="queue-boundary"><strong>VECOUT drained</strong><br>z <code>DeQue</code> 后 CopyOut + Free</div></div><div class="pipeline-note"><strong>不能从源码推出：</strong>lane 的实际开始时间、长度、硬件 overlap、stall 与吞吐。TQue depth 1 只确认队列容量，不等价于性能结论。</div>`;
    }

    function memoryMarkup() {
      return `<div class="view-heading"><div><h1>Memory Path</h1><p>整张图是 Ascend 910B 的硬件映射；Memory Path 是其中被代码证据激活的路径。当前 Vector Add 只使用 AIV 的 GM/L2、UB、Vector、MTE2/MTE3，不使用 AIC/Cube。</p></div><span class="evidence-chip is-confirmed">代码确认</span></div><div class="path-summary"><button class="path-step" type="button" data-memory-focus="copyin"><span>01 · MTE2</span><strong>CopyIn</strong><code>GM/L2 → UB · xLocal/yLocal</code></button><button class="path-step" type="button" data-memory-focus="compute"><span>02 · Vector</span><strong>Add</strong><code>UB x/y → Vector → UB z</code></button><button class="path-step" type="button" data-memory-focus="copyout"><span>03 · MTE3</span><strong>CopyOut</strong><code>UB z → GM/L2</code></button></div><section class="pto-hw-viewport memory-path-viewport" data-memory-viewport><header class="pto-hw-viewport__toolbar"><div class="pto-hw-viewport__title"><strong>Hardware mapping</strong><small>Ascend 910B · implemented path</small></div><div class="pto-hw-viewport__controls"><div class="pto-hw-viewport__tools"><button class="btn btn-sm btn-ghost pto-hw-viewport__tool" type="button" data-memory-detail aria-pressed="true">细节开</button><button class="btn btn-sm btn-ghost pto-hw-viewport__tool" type="button" data-memory-zoom-out aria-label="缩小">−</button><span class="pto-hw-viewport__readout" data-memory-readout>60%</span><button class="btn btn-sm btn-ghost pto-hw-viewport__tool" type="button" data-memory-zoom-in aria-label="放大">+</button></div></div></header><div class="pto-hw-viewport__stage memory-path-stage" data-memory-stage><div class="pto-hw-viewport__scale" data-memory-scale><div class="memory-path-graph" data-memory-graph></div></div></div></section><div class="unknown-note"><strong>AIC/Cube 灰显不代表异常：</strong>它们属于芯片结构，但不是 GM-001 的执行路径。Memory Path 表达资源与搬运；Pipeline 表达阶段与依赖，两者不能合并成同一语义。</div>`;
    }
    function refreshMemoryOverlay() { requestAnimationFrame(() => routeOverlay?.render?.()); }
    function mountMemory() {
      if (memoryMounted) return;
      const root = $('[data-memory-viewport]');
      const graph = $('[data-memory-graph]');
      memoryPattern = window.PtoMemoryArchitecturePattern;
      const viewportPattern = window.PtoHardwareArchitectureViewport;
      if (!root || !graph || !memoryPattern?.renderArchitecture || !viewportPattern?.mount) return;
      memoryPattern.renderArchitecture(graph, 'ascend910b');
      routeOverlay = memoryPattern.createRouteOverlay(graph, 'ascend910b');
      memoryPattern.attachHoverInteractions?.(graph, 'ascend910b');
      memoryPattern.attachPathFocusInteractions?.(graph, 'ascend910b');
      memoryPattern.setBufferBlocks?.(graph, [
        { core: 'mem950-aiv1', buffer: 'UB', label: 'xLocal · 8 KiB', state: 'enqueued', tone: 'input', cellRange: [0, 9], sourceTile: 'tensor:x/core-slice' },
        { core: 'mem950-aiv1', buffer: 'UB', label: 'yLocal · 8 KiB', state: 'enqueued', tone: 'input', cellRange: [11, 20], sourceTile: 'tensor:y/core-slice' },
        { core: 'mem950-aiv1', buffer: 'UB', label: 'zLocal · 8 KiB', state: 'produced', tone: 'output', cellRange: [22, 31], sourceTile: 'tensor:z/core-slice' }
      ]);
      memoryViewport = viewportPattern.mount(root, { mode: 'inline', viewport: '[data-memory-stage]', scaleEl: '[data-memory-scale]', inlineHost: '[data-memory-graph]', detailToggle: '[data-memory-detail]', zoomOut: '[data-memory-zoom-out]', zoomIn: '[data-memory-zoom-in]', readout: '[data-memory-readout]', scale: .6, defaultScale: .6, fitted: false, fitOnMount: false, fitPaddingX: 32, fitPaddingY: 48, detailsVisible: true, onDetailChange: refreshMemoryOverlay, onScaleChange: refreshMemoryOverlay, onPanChange: refreshMemoryOverlay });
      routeOverlay?.render?.();
      memoryMounted = true;
      requestAnimationFrame(() => { const stage = $('.pto-mem950', graph); if (stage && memoryViewport) { memoryViewport.setFrameSize(Math.ceil(stage.scrollWidth || 1200), Math.ceil(stage.scrollHeight || 820)); memoryViewport.fit(); } refreshMemoryOverlay(); });
    }
    function focusMemory(kind, button) {
      $$('.path-step').forEach((item) => item.classList.toggle('is-selected', item === button));
      const graph = $('[data-memory-graph]');
      const payload = kind === 'copyin'
        ? { selectors: ['[data-mem950-node="rail:GM"]', '[data-mem950-node="rail:L2"]', '#mem950-aiv1 [data-aiv-node="buffer:UB"]'], routes: ['l2-to-aiv1'] }
        : kind === 'compute'
          ? { selectors: ['#mem950-aiv1 [data-aiv-node="buffer:UB"]', '#mem950-aiv1 [data-aiv-node="vector:Vector"]'], routes: [] }
          : { selectors: ['#mem950-aiv1 [data-aiv-node="buffer:UB"]', '[data-mem950-node="rail:L2"]', '[data-mem950-node="rail:GM"]'], routes: ['aiv1-to-l2'] };
      memoryPattern?.setPathFocus?.(graph, 'ascend910b', payload);
      refreshMemoryOverlay();
      const stage = model.stages.find((item) => item.id === (kind === 'copyin' ? 'stage:copyin' : kind === 'compute' ? 'stage:add' : 'stage:copyout'));
      if (stage) inspect(stage, 'pipeline');
    }

    const inputStates = [
      ['Alloc', 'Queue owns free slot'], ['CopyIn', 'MTE2 writes LocalTensor'], ['EnQue', 'ready in VECIN'], ['DeQue', 'compute owns tensor'], ['Add consumes', 'read by Vector'], ['Free', 'slot reusable']
    ];
    const outputStates = [
      ['Alloc', 'Queue grants slot'], ['Add writes', 'Vector produces z'], ['EnQue', 'ready in VECOUT'], ['DeQue', 'CopyOut owns tensor'], ['CopyOut', 'MTE3 reads z'], ['Free', 'slot reusable']
    ];
    function renderLifecycle() {
      const rows = model.buffers.map((buffer) => { const states = buffer.role === 'input' ? inputStates : outputStates; return `<div class="lifecycle-row${selected?.id === buffer.id ? ' is-selected' : ''}"><div class="lifecycle-label"><strong>${buffer.label}</strong><span>${buffer.queue}</span></div>${states.map(([name, detail], index) => `<button class="lifecycle-state${name === 'EnQue' || name === 'DeQue' ? ' is-queue' : name.includes('Add') || name === 'CopyOut' ? ' is-consume' : name === 'Free' ? ' is-release' : ''}${selected?.id === `${buffer.id}:${index}` ? ' is-selected' : ''}" type="button" data-buffer-id="${buffer.id}" data-state-index="${index}"><strong>${name}</strong><span>${detail}</span></button>`).join('')}</div>`; }).join('');
      $('[data-model-view="lifecycle"]').innerHTML = `<div class="view-heading"><div><h1>Buffer Lifecycle</h1><p>生命周期不是“buffer 活跃了多久”，而是 LocalTensor 在 TQue 与 stage 之间何时可写、ready、被谁持有、何时释放。EnQue / DeQue 是所有权边界。</p></div><span class="evidence-chip is-confirmed">代码确认</span></div>${contextStrip()}<div class="lifecycle-layout"><div class="lifecycle-table">${rows}</div><aside class="queue-ownership"><div class="queue-owner"><span>VECIN · depth 1</span><strong>inQueueX owns xLocal</strong><code>Alloc → EnQue → DeQue → Free</code></div><div class="queue-owner"><span>VECIN · depth 1</span><strong>inQueueY owns yLocal</strong><code>Alloc → EnQue → DeQue → Free</code></div><div class="queue-owner"><span>VECOUT · depth 1</span><strong>outQueueZ owns zLocal</strong><code>Alloc → EnQue → DeQue → Free</code></div><div class="unknown-note"><strong>当前事实：</strong>每个 queue 只有一个 slot，kernel 没有 tile loop，因此这里没有 Ping/Pong 轮转，也不能声称出现了 double buffering。</div></aside></div>`;
    }

    function renderTiling() {
      const c = model.context;
      const coreButtons = Array.from({ length: c.cores }, (_, index) => `<button class="core-cell${index === selectedCore ? ' is-selected' : ''}" type="button" data-core="${index}">C${String(index).padStart(2, '0')}</button>`).join('');
      const tensorRows = ['x', 'y', 'z'].map((tensor) => `<div class="tensor-partition"><strong>${tensor}</strong>${Array.from({ length: c.cores }, (_, index) => `<button class="tensor-slice${index === selectedCore ? ' is-selected' : ''}" type="button" data-core="${index}">${index}</button>`).join('')}</div>`).join('');
      const offset = selectedCore * c.perCore;
      $('[data-model-view="tiling"]').innerHTML = `<div class="view-heading"><div><h1>Tiling</h1><p>GM-001 没有核内 tile loop，所以视图止于 per-core slice，不虚构更细 tile。</p></div><span class="evidence-chip is-confirmed">代码确认</span></div><div class="tiling-head"><div><h2>核间切分</h2><p>线性均分：8 个核 × 2048 elements · float</p></div><span class="evidence-chip is-confirmed">8 cores · no tail</span></div><div class="core-strip">${coreButtons}</div><div class="tiling-spaces"><section class="tiling-space"><div class="space-head"><strong>全局计算空间</strong><code>[8, 2048] · 16384 elements</code></div>${tensorRows}<div class="tiling-factline"><strong>映射规则：</strong><code>blockLength = totalLength / GetBlockNum()</code>；x/y/z 对同一 core 使用相同连续范围。</div></section><section class="tiling-space"><div class="space-head"><strong>选中核 C${String(selectedCore).padStart(2, '0')}</strong><code>offset ${offset} · length ${c.perCore}</code></div><div class="selected-core-space"><div class="core-formula"><div class="formula-buffer"><strong>x slice</strong><code>[${offset}, ${offset + c.perCore})</code></div><span class="formula-op">+</span><div class="formula-buffer"><strong>y slice</strong><code>[${offset}, ${offset + c.perCore})</code></div><span class="formula-op">=</span><div class="formula-buffer"><strong>z slice</strong><code>[${offset}, ${offset + c.perCore})</code></div></div><div class="tiling-factline"><strong>UB footprint / core：</strong>xLocal 8 KiB + yLocal 8 KiB + zLocal 8 KiB，queue depth 均为 1。</div><div class="tiling-factline"><strong>Tail：</strong>当前 16384 可被 8 整除。代码没有 remainder 分支；换成不整除输入时是静态风险，不是当前样例的运行错误。</div></div></section></div>`;
    }

    function renderAllViews() {
      renderPipeline();
      if (!memoryMounted) {
        $('[data-model-view="memory"]').innerHTML = memoryMarkup();
        mountMemory();
      }
      renderLifecycle();
      renderTiling();
      bindViewActions();
    }
    function setActiveAnchor(view) {
      $$('[data-anchor-view]').forEach((link) => {
        const active = link.dataset.anchorView === view;
        link.classList.toggle('is-selected', active);
        if (active) link.setAttribute('aria-current', 'location');
        else link.removeAttribute('aria-current');
      });
    }
    function initAnchorNavigation() {
      const scrollRoot = $('[data-model-scroll]');
      const sections = $$('[data-model-view]');
      if (!scrollRoot || !sections.length) return;
      $$('[data-anchor-view]').forEach((link) => link.addEventListener('click', (event) => {
        event.preventDefault();
        const target = $(`#${link.getAttribute('href').slice(1)}`);
        if (!target) return;
        setActiveAnchor(link.dataset.anchorView);
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        history.replaceState(null, '', link.getAttribute('href'));
      }));
      const syncAnchor = () => {
        const rootTop = scrollRoot.getBoundingClientRect().top + 32;
        const atBottom = scrollRoot.scrollTop + scrollRoot.clientHeight >= scrollRoot.scrollHeight - 2;
        let current = atBottom ? sections[sections.length - 1] : sections[0];
        if (!atBottom) sections.forEach((section) => { if (section.getBoundingClientRect().top <= rootTop) current = section; });
        setActiveAnchor(current.dataset.modelView);
      };
      scrollRoot.addEventListener('scroll', syncAnchor, { passive: true });
      syncAnchor();
    }
    function bindViewActions() {
      $$('[data-select-id]').forEach((button) => button.onclick = () => { const item = model.stages.find((stage) => stage.id === button.dataset.selectId); if (item) inspect(item, 'pipeline'); });
      $$('[data-buffer-id]').forEach((button) => button.onclick = () => { const buffer = model.buffers.find((item) => item.id === button.dataset.bufferId); if (!buffer) return; const stateIndex = Number(button.dataset.stateIndex); const states = buffer.role === 'input' ? inputStates : outputStates; inspect({ ...buffer, id: `${buffer.id}:${stateIndex}`, label: `${buffer.label} · ${states[stateIndex][0]}`, detail: states[stateIndex][1], lines: buffer.role === 'input' ? [47, 61] : [57, 66], evidence: 'confirmed' }, 'lifecycle'); });
      $$('[data-core]').forEach((button) => button.onclick = () => { selectedCore = Number(button.dataset.core); inspect({ id: `partition:core:${selectedCore}`, label: `Core ${selectedCore} 分片`, detail: `offset ${selectedCore * model.context.perCore} · length ${model.context.perCore}`, lines: model.partition.lines, evidence: 'confirmed' }, 'tiling'); });
      $$('[data-memory-focus]').forEach((button) => button.onclick = () => focusMemory(button.dataset.memoryFocus, button));
    }
    function recover() {
      const hasQueues = /TQue<AscendC::TPosition::VECIN,\s*1>/.test(sourceText) && /TQue<AscendC::TPosition::VECOUT,\s*1>/.test(sourceText);
      const hasStages = /DataCopy\(xLocal/.test(sourceText) && /Add\(zLocal/.test(sourceText) && /DataCopy\(zGm/.test(sourceText);
      const hasPartition = /GetBlockNum\(\)/.test(sourceText) && /GetBlockIdx\(\)/.test(sourceText);
      $('[data-source-status]').innerHTML = hasQueues && hasStages && hasPartition ? `<strong>已恢复 GM-001：</strong>3 queues · 3 logical stages · 8 core slices · 0 runtime observations。` : `<strong>恢复不完整：</strong>未满足 GM-001 的 queue、stage 或 partition 证据；缺失部分不会补成确定事实。`;
      selected = null; focusLines(null); renderAllViews();
    }

    window.PtoIdeFrame?.initAll?.();
    $('[data-recover]').addEventListener('click', recover);
    renderSource(); renderAllViews(); initAnchorNavigation();
    fetch(sourceUrl).then((response) => response.ok ? response.text() : Promise.reject(new Error('source unavailable'))).then((text) => { sourceText = text; renderSource(); recover(); }).catch(() => { sourceText = fallbackSource; renderSource(); recover(); $('[data-source-status]').innerHTML += ' 当前宿主未加载原文件，已使用同语义内嵌源码。'; });
  })();
  </script>
</body>
</html>
