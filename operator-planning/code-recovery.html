<html lang="zh-CN" data-theme="dark">
<head>

  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; min-height: 100%; margin: 0; overflow: auto; background: var(--ide-frame-page-bg); color: var(--foreground); font-family: var(--font-sans); }
    code, pre { font-family: var(--font-mono); }
    button { font: inherit; }
    .recovery-frame { width: 100%; height: max(820px, calc((100vw - 40px) * .75)); min-height: 820px; }
    .recovery-frame .pto-ide-frame__topbar-center { display: none; }
    .recovery-frame .pto-ide-frame__topbar-left,
    .recovery-frame .pto-ide-frame__topbar-right { flex: 1 1 auto; }
    .workspace-title { color: var(--foreground); font: var(--ide-frame-title-font); }
    .workspace-meta { color: var(--foreground-muted); font: var(--ide-frame-meta-font); }
    .pane-scroll { min-height: 0; overflow: auto; }
    .source-toolbar, .view-toolbar { display: flex; align-items: center; justify-content: space-between; gap: var(--space-2); padding: var(--space-2) var(--space-3); border-bottom: 1px solid var(--border-subtle); }
    .source-toolbar-actions { display: inline-flex; align-items: center; gap: var(--space-2); }
    .source-toolbar span, .view-toolbar span { color: var(--foreground-secondary); font: var(--text-body-sm); }
    .source-surface { min-width: 0; padding: var(--space-2) 0 var(--space-4); }
    .source-editor-pane .pto-ide-frame__pane-body {
      min-width: 0;
      min-height: 0;
      height: 0;
      flex: 1 1 0;
      overflow-x: hidden;
      overflow-y: scroll;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      scrollbar-color: var(--foreground-muted) transparent;
    }
    .source-editor-pane .pto-ide-frame__pane-body::-webkit-scrollbar { width: 10px; }
    .source-editor-pane .pto-ide-frame__pane-body::-webkit-scrollbar-track { background: transparent; }
    .source-editor-pane .pto-ide-frame__pane-body::-webkit-scrollbar-thumb { border: 3px solid transparent; border-radius: var(--radius-pill); background: var(--foreground-muted); background-clip: padding-box; }
    .source-editor-pane .pto-ide-frame__tabstrip { padding-left: var(--space-2); }
    .source-editor-tab { display: inline-flex; align-items: center; min-height: 32px; padding: 0 var(--space-3); border: 0; border-bottom: 1px solid transparent; background: transparent; color: var(--foreground-muted); font: var(--text-body-sm); cursor: pointer; }
    .source-editor-tab.is-active { border-bottom-color: var(--primary); color: var(--foreground); }
    .source-line { display: grid; grid-template-columns: 44px minmax(0, 1fr) auto; align-items: start; min-height: 22px; padding-right: var(--space-3); color: var(--foreground-secondary); font: var(--text-mono); font-size: 11px; line-height: 22px; }
    .source-line.is-annotated { cursor: pointer; }
    .source-line.is-annotated:hover { background: color-mix(in srgb, var(--surface-2) 70%, transparent); }
    .source-line-number { padding-right: var(--space-2); color: var(--foreground-disabled); text-align: right; user-select: none; }
    .source-line-code { min-width: 0; white-space: pre-wrap; overflow-wrap: anywhere; word-break: break-word; }
    .source-line.is-evidence { background: color-mix(in srgb, var(--primary) 13%, transparent); color: var(--foreground); }
    .source-line-tag {  align-self: center; min-height: 20px; margin-left: var(--space-3); padding: 0 var(--space-3); border-color:color-mix(in srgb, var(--warning) 28%, transparent);border:1px solid var(--comp-tag-border); border-radius: var(--radius-pill); background: color-mix(in srgb, currentColor 10%, transparent); color: var(--foreground-secondary); font: 500 12px/20px var(--font-sans); letter-spacing: .01em; white-space: nowrap; }
    .source-line-tag.is-tiling,
    .source-line-tag.is-buffer,
    .source-line-tag.is-compute,
    .source-line-tag.is-sync { color: var(--warning); }
    .source-line-tag.is-memory { color: var(--primary-hover); }
    .source-line-detail { margin: 2px var(--space-3) var(--space-3) 44px; padding: var(--space-3); border-radius: var(--radius-md); background: var(--surface-2); color: var(--foreground-secondary); font: var(--text-body-sm); line-height: 1.5; }
    .source-line-detail strong { color: var(--foreground); }
    .source-line-detail code { display: block; margin-top: var(--space-1); color: var(--foreground-muted); font: var(--text-label); }
    .syntax-keyword { color: #c792ea; }
    .syntax-type { color: #82aaff; }
    .syntax-api { color: #89ddff; }
    .syntax-function { color: #82aaff; }
    .syntax-string { color: #c3e88d; }
    .syntax-number { color: #f78c6c; }
    .syntax-comment { color: var(--foreground-muted); font-style: italic; }
    .source-status { padding: var(--space-3); color: var(--foreground-secondary); border-top: 1px solid var(--border-subtle); font: var(--text-body-sm); line-height: 1.55; }
    .model-tabstrip { padding: var(--space-2) var(--space-3); border-bottom: 1px solid var(--border-subtle); }
    .model-anchor-nav { display: flex; justify-content: center; gap: var(--space-3); }
    .model-anchor-nav .tab-control-item { display: inline-flex; align-items: center; justify-content: center; color: var(--foreground-secondary); text-decoration: none; padding: 0 var(--space-3); }
    .model-anchor-nav .tab-control-item.is-selected { color: var(--foreground); }
    .model-scroll { padding: var(--space-4); scroll-behavior: smooth; }
    .model-view { margin-bottom: var(--space-4); padding: 16px; border: 0; border-radius: var(--radius-lg); background: var(--surface-1); scroll-margin-top: var(--space-4); }
    .model-view:last-child { margin-bottom: 0; }
    .view-heading { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-3); margin-bottom: var(--space-4); }
    .view-heading h1 { margin: 0 0 var(--space-1); font: var(--text-title-2); font-size: 16px;}
    .view-heading p { max-width: 760px; margin: 0; color: var(--foreground-secondary); font: var(--text-body-sm); line-height: 1.55; }
    .evidence-chip { display: inline-flex; align-items: center; min-height: 22px; padding: 0 var(--space-2); border-radius: var(--radius-pill); background: var(--surface-3); color: var(--foreground-secondary); font: var(--text-label); white-space: nowrap; }
    .evidence-chip.is-confirmed { color: var(--success); }
    .evidence-chip.is-inferred { color: var(--warning); }
    .evidence-chip.is-observed { color: var(--primary-hover); }
    .evidence-chip.is-unknown { color: var(--foreground-muted); }
    .context-strip { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: var(--space-2); margin-bottom: var(--space-4); }
    .context-fact { min-width: 0; padding: var(--space-3); background: var(--surface-2); border-radius: var(--radius-md); }
    .context-fact span { display: block; color: var(--foreground-muted); font: var(--text-label); }
    .context-fact strong, .context-fact code { display: block; margin-top: var(--space-1); overflow: hidden; color: var(--foreground); font: var(--text-body-sm); text-overflow: ellipsis; white-space: nowrap; }
    .pipeline-shell { display: grid; gap: var(--space-2); }
    .pipeline-row { display: grid; grid-template-columns: 132px minmax(0, 1fr); gap: var(--space-2); align-items: center; }
    .pipeline-label { display: grid; gap: 2px; color: var(--foreground-secondary); font: var(--text-label); }
    .pipeline-label strong { color: var(--foreground); font: var(--text-body-sm); }
    .pipeline-track { min-height: 64px; display: grid; grid-template-columns: repeat(var(--stage-count, 3), minmax(120px, 1fr)); gap: var(--space-2); padding: var(--space-2); border-radius: var(--radius-md); background: color-mix(in srgb, var(--foreground) 4%, transparent); }
    .pipeline-block { min-width: 0; min-height: 48px; padding: var(--space-2); border: 0; border-radius: var(--radius-sm); background: color-mix(in srgb, var(--block-color) 72%, var(--surface-3)); color: white; text-align: left; cursor: pointer; }
    .pipeline-block strong, .pipeline-block span { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pipeline-block strong { font: 700 11px/1.2 var(--font-sans); }
    .pipeline-block span { margin-top: 3px; font: 500 9px/1.2 var(--font-mono); opacity: .82; }
    .pipeline-block.is-selected { box-shadow: 0 0 0 2px var(--foreground); }
    .pipeline-spacer { min-height: 1px; }
    .queue-boundaries { display: grid; grid-template-columns: repeat(var(--fact-count, 3), minmax(0, 1fr)); gap: var(--space-2); margin: var(--space-3) 0 0 140px; }
    .queue-boundary { padding: var(--space-2); border-radius: var(--radius-sm); background: var(--surface-1); color: var(--foreground-secondary); font: var(--text-body-sm); }
    .queue-boundary strong { color: var(--foreground); }
    .pipeline-note, .unknown-note { margin-top: var(--space-4); padding: var(--space-3); border-radius: var(--radius-md); background: color-mix(in srgb, var(--warning) 9%, var(--surface-2)); color: var(--foreground-secondary); font: var(--text-body-sm); line-height: 1.55; }
    .memory-path-controls { display: flex; align-items: center; gap: var(--space-1); flex-wrap: wrap; }
    .memory-path-controls .btn.is-selected { background: var(--surface-4); color: var(--foreground); }
    .memory-path-viewport { height: 480px; min-height: 0; overflow: hidden; }
    .memory-path-stage { height: 424px; min-height: 0; overflow: hidden; }
    .memory-path-graph { min-width: 1120px; min-height: 760px; }
    .path-summary { display: grid; grid-template-columns: repeat(var(--path-count, 3), minmax(0, 1fr)); gap: var(--space-2); margin-bottom: var(--space-3); }
    .path-step { padding: var(--space-3); border: 0; border-radius: var(--radius-md); background: var(--surface-2); color: var(--foreground); text-align: left; cursor: pointer; }
    .path-step span { display: block; color: var(--foreground-muted); font: var(--text-label); }
    .path-step strong { display: block; margin-top: var(--space-1); font: var(--text-body-sm); }
    .path-step code { display: block; margin-top: var(--space-1); color: var(--foreground-secondary); font-size: 10px; }
    .path-step.is-selected { background: var(--surface-4); box-shadow: 0 0 0 1px var(--primary); }
    .lifecycle-layout { display: grid; gap: var(--space-4); align-items: start; }
    .lifecycle-table { display: grid; gap: var(--space-2); min-width: 0; }
    .lifecycle-row { min-width: 0; display: grid; grid-template-columns: 92px repeat(6, minmax(58px, 1fr)); gap: var(--space-1); align-items: center; padding: var(--space-2); border-radius: var(--radius-md); }
    .lifecycle-row.is-selected { background: var(--surface-2); }
    .lifecycle-label { display: grid; gap: 2px; }
    .lifecycle-label strong { font: var(--text-body-sm); }
    .lifecycle-label span { color: var(--foreground-muted); font: var(--text-label); }
    .lifecycle-state { min-height: 48px; min-width: 0; display: grid; align-content: center; gap: 2px; padding: 6px; border: 0; border-radius: var(--radius-sm); background: var(--surface-2); color: var(--foreground-secondary); text-align: left; cursor: pointer; overflow: hidden; }
    .lifecycle-state strong { color: var(--foreground); font: var(--text-label); }
    .lifecycle-state span { font: 500 9px/1.2 var(--font-mono); }
    .lifecycle-state.is-queue { background: color-mix(in srgb, var(--primary) 16%, var(--surface-2)); }
    .lifecycle-state.is-consume { background: color-mix(in srgb, var(--success) 12%, var(--surface-2)); }
    .lifecycle-state.is-release { background: color-mix(in srgb, var(--foreground) 7%, var(--surface-2)); }
    .lifecycle-state.is-selected { box-shadow: 0 0 0 2px var(--foreground); }
    .queue-ownership { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: var(--space-2); }
    .queue-ownership .unknown-note { grid-column: 1 / -1; }
    .queue-owner { padding: var(--space-3); border-radius: var(--radius-md); background: var(--surface-1); }
    .queue-owner span { display: block; color: var(--foreground-muted); font: var(--text-label); }
    .queue-owner strong { display: block; margin-top: var(--space-1); font: var(--text-body-sm); }
    .queue-owner code { display: block; margin-top: var(--space-1); color: var(--foreground-secondary); font-size: 10px; }
    .tiling-head { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-3); }
    .tiling-head h2 { margin: 0; font-size: 12px; }
    .tiling-head p { margin: var(--space-1) 0 0; color: var(--foreground-muted); font: var(--text-body-sm); }
    .core-strip { margin: 24px 0; }
    .core-cell { min-height: 40px; width: 40px; margin-right: 10px;border: 0; border-radius: var(--radius-md); background: color-mix(in srgb, var(--primary) 9%, var(--surface-3)); color: var(--foreground-secondary); cursor: pointer; }
    .core-cell.is-selected { background: color-mix(in srgb, var(--primary) 52%, var(--surface-3)); color: var(--foreground); box-shadow: 0 0 0 1px var(--primary-hover); }
    .tiling-spaces { display: grid; grid-template-columns: minmax(0, 0.6fr) minmax(280px, .8fr); gap: var(--space-5); }
    .tiling-space { min-width: 0; }
    .space-head { display: flex; align-items: baseline; justify-content: space-between; gap: var(--space-2); margin-bottom: var(--space-3); }
    .space-head strong { font: var(--text-title-2); font-size: 12px;}
    .space-head code { color: var(--foreground-muted); }
    .tensor-partition {gap: var(--space-1); align-items: center; margin-bottom: var(--space-2); }
    .tensor-partition > strong { color: var(--foreground-secondary);margin-right:10px; font: var(--text-body-sm); }
    .tensor-slice { min-height: 32px;width:32px;margin-right:10px; border: 0; border-radius: var(--radius-sm); background: var(--surface-2); color: var(--foreground-muted); cursor: pointer; }
    .tensor-slice.is-selected { background: color-mix(in srgb, var(--primary) 38%, var(--surface-3)); color: var(--foreground); box-shadow: 0 0 0 1px var(--primary-hover); }
    .selected-core-space { display: grid; gap: var(--space-2); padding: var(--space-4); border-radius: var(--radius-lg); background: var(--surface-1); }
    .core-formula { display: grid; grid-template-columns: 1fr auto 1fr auto 1fr; gap: var(--space-2); align-items: center; }
    .formula-buffer { min-width: 0; padding: var(--space-3); border-radius: var(--radius-md); background: var(--surface-3); text-align: center; }
    .formula-buffer strong, .formula-buffer code { display: block; }
    .formula-buffer code { margin-top: var(--space-1); color: var(--foreground-secondary); font-size: 10px; }
    .formula-op { color: var(--success); font: var(--text-title-1); }
    .tiling-factline { padding: var(--space-3); border-radius: var(--radius-md); background: var(--surface-2); color: var(--foreground-secondary); font: var(--text-body-sm); line-height: 1.55; }
    .tiling-factline strong { color: var(--foreground); }
    .matmul-tiling-diagrams { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--space-5); margin-top: var(--space-4); }
    .matmul-tiling-figure { min-width: 0; margin: 0; }
    .matmul-tiling-figure-head { display: flex; align-items: baseline; justify-content: space-between; gap: var(--space-2); margin-bottom: var(--space-2); }
    .matmul-tiling-figure-head strong { font: var(--text-title-2); font-size: 12px; }
    .matmul-tiling-figure-head span { color: var(--foreground-muted); font: var(--text-body-sm); }
    .matmul-matrix-svg { display: block; width: 100%; min-width: 0; color: var(--foreground-muted); }
    .matmul-matrix-svg .matrix-cell { fill: color-mix(in srgb, var(--foreground) 3%, transparent); stroke: color-mix(in srgb, var(--foreground) 30%, transparent); stroke-width: 1; }
    .matmul-matrix-svg .matrix-cell.is-active { fill: color-mix(in srgb, var(--primary) 35%, var(--surface-3)); stroke: var(--primary-hover); stroke-width: 1.5; }
    .matmul-matrix-svg .matrix-cell.is-shared { fill: color-mix(in srgb, var(--warning) 20%, var(--surface-3)); stroke: var(--warning); stroke-width: 1.5; }
    .matmul-matrix-svg .matrix-cell.is-output { fill: color-mix(in srgb, var(--success) 20%, var(--surface-3)); stroke: var(--success); stroke-width: 1.5; }
    .matmul-matrix-svg .matrix-label { fill: var(--foreground); font: 600 10px var(--font-sans); }
    .matmul-matrix-svg .matrix-axis { fill: var(--foreground-muted); font: 9px var(--font-mono); }
    .matmul-tiling-formula { margin-top: var(--space-4); }
    .kv-list { display: grid; gap: var(--space-2); }
    .kv { display: grid; grid-template-columns: 76px minmax(0, 1fr); gap: var(--space-2); color: var(--foreground-secondary); font: var(--text-body-sm); }
    .kv span { color: var(--foreground-muted); }
    .kv code { overflow-wrap: anywhere; }
    @media (max-width: 1080px) {
      .context-strip, .path-summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .lifecycle-layout, .tiling-spaces, .matmul-tiling-diagrams { grid-template-columns: 1fr; }
      .core-strip { grid-template-columns: repeat(4, minmax(64px, 1fr)); }
    }
  </style>
</head>
<body>
  <section class="pto-ide-frame recovery-frame" data-ide-frame data-host="standalone" aria-label="Code Recovery workbench">
    <header class="pto-ide-frame__topbar pto-ide-frame__standalone-chrome">
      <div class="pto-ide-frame__topbar-left">
        <div class="pto-ide-frame__host-chip"><svg class="pto-ide-frame__host-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v14H4z"></path><path d="m8 9 3 3-3 3"></path><path d="M13 15h3"></path></svg><span>IDE</span></div>
        <div class="pto-ide-frame__workspace"><span class="workspace-title">Code Recovery</span><span class="workspace-meta" data-workspace-meta>GM-001 · Vector Add / TPipe + TQue</span></div>
      </div>
      <div class="pto-ide-frame__topbar-center"></div>
      <div class="pto-ide-frame__topbar-right"></div>
    </header>
    <div class="pto-ide-frame__body">
      <nav class="pto-ide-frame__activity-rail pto-ide-frame__standalone-chrome" aria-label="Activity rail">
        <button class="btn btn-icon btn-ghost pto-ide-frame__rail-button" type="button" aria-label="Explorer"><svg class="pto-ide-frame__rail-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9l-.81-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"></path></svg></button>
        <button class="btn btn-icon btn-ghost pto-ide-frame__rail-button" type="button" aria-label="Search"><svg class="pto-ide-frame__rail-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg></button>
        <button class="btn btn-icon btn-ghost pto-ide-frame__rail-button" type="button" aria-label="Source control"><svg class="pto-ide-frame__rail-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="6" r="3"></circle><path d="M6 15V3"></path><path d="M9 18a9 9 0 0 0 9-9"></path></svg></button>
        <button class="btn btn-icon btn-ghost pto-ide-frame__rail-button" type="button" aria-label="Terminal"><svg class="pto-ide-frame__rail-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="m7 9 3 3-3 3"></path><path d="M12 15h5"></path></svg></button>
      </nav>
      <div class="pto-ide-frame__workarea">
        <div class="pto-ide-frame__split" data-ide-split="standalone-main" data-storage-key="code-recovery-gm001-editor-split-v1" data-split-direction="horizontal" data-sizes="42,58" data-min-size="360,560">
          <section class="pto-ide-frame__pane source-editor-pane" data-ide-pane="editor-preview" aria-label="Source editor">
            <div class="pto-ide-frame__tabstrip" role="tablist" aria-label="Open source files"><button class="source-editor-tab is-active" type="button" role="tab" aria-selected="true" data-operator-tab="vector">add_tpipe_tque.asc</button><button class="source-editor-tab" type="button" role="tab" aria-selected="false" data-operator-tab="matmul">matmul_basic_api.asc</button></div>
            <div class="pto-ide-frame__pane-body pane-scroll" data-source-scroll tabindex="0" aria-label="Scrollable Ascend C source editor"><div class="source-toolbar"><span data-golden-label>Golden Model GM-001</span><div class="source-toolbar-actions"><button class="btn btn-sm btn-ghost" type="button" data-toggle-annotations aria-pressed="true">隐藏标注</button><button class="btn btn-sm" type="button" data-recover>重新恢复</button></div></div><div class="source-surface" data-source-lines aria-label="Ascend C source"></div><div class="source-status" data-source-status>加载完整算子源码并恢复模型…</div></div>
          </section>
          <main class="pto-ide-frame__pane" data-ide-pane="editor-preview" aria-label="Implemented execution model editor">
            <header class="pto-ide-frame__pane-header"><h2 class="pto-ide-frame__pane-title">Implemented execution model</h2><span class="pto-ide-frame__pane-meta">代码确认 + 静态边界</span></header>
            <div class="model-tabstrip"><nav class="tab-control model-anchor-nav" aria-label="Execution model sections"><a class="tab-control-item is-selected" href="#tiling-view" data-anchor-view="tiling" aria-current="location">Tiling</a><a class="tab-control-item" href="#memory-view" data-anchor-view="memory">Memory Path</a><a class="tab-control-item" href="#pipeline-view" data-anchor-view="pipeline">Pipeline</a><a class="tab-control-item" href="#lifecycle-view" data-anchor-view="lifecycle">Buffer Lifecycle</a></nav></div>

/* !
 * \file add_tpipe_tque.asc
 * \brief 基于TPipe和TQue的Add向量加法样例，演示按核切分输入数据，
 *        并通过队列完成GM到UB搬入、UB内向量加法和结果写回GM的完整流程。
 */
#include "acl/acl.h"
#include "kernel_operator.h"
#include "data_utils.h"

#ifdef ASCENDC_CPU_DEBUG
#include "cpu_debug_launch.h"
#endif

__global__ __vector__ void add_custom(__gm__ uint8_t* x, __gm__ uint8_t* y, __gm__ uint8_t* z, uint32_t totalLength)
{
    AscendC::TPipe pipe;
    AscendC::TQue<AscendC::TPosition::VECIN, 1> inQueueX;
    AscendC::TQue<AscendC::TPosition::VECIN, 1> inQueueY;
    AscendC::TQue<AscendC::TPosition::VECOUT, 1> outQueueZ;
    AscendC::GlobalTensor<float> xGm;
    AscendC::GlobalTensor<float> yGm;
    AscendC::GlobalTensor<float> zGm;

    // totalLength 表示全局输入长度；GetBlockNum() 返回本次启动的核数，
    // 这里按核数均分每个 block 的处理区间。
    uint32_t blockLength = totalLength / AscendC::GetBlockNum();
    // 根据 block_idx 计算当前核在 GM 中的起始地址，确保各核访问互不重叠的数据分片。
    xGm.SetGlobalBuffer((__gm__ float*)x + blockLength * AscendC::GetBlockIdx(), blockLength);
    yGm.SetGlobalBuffer((__gm__ float*)y + blockLength * AscendC::GetBlockIdx(), blockLength);
    zGm.SetGlobalBuffer((__gm__ float*)z + blockLength * AscendC::GetBlockIdx(), blockLength);
    // 为输入和输出队列申请与 blockLength 对应的 UB 缓冲，保持 TPipe/TQue 的编程范式。
    pipe.InitBuffer(inQueueX, 1, blockLength * sizeof(float));
    pipe.InitBuffer(inQueueY, 1, blockLength * sizeof(float));
    pipe.InitBuffer(outQueueZ, 1, blockLength * sizeof(float));

    // 使用 DataCopy 将输入从 GM 搬运到 UB，并通过 EnQue 将 LocalTensor 入队，供后续计算阶段 DeQue 取用。
    AscendC::LocalTensor<float> xLocal = inQueueX.AllocTensor<float>();
    AscendC::LocalTensor<float> yLocal = inQueueY.AllocTensor<float>();
    AscendC::DataCopy(xLocal, xGm, blockLength);
    AscendC::DataCopy(yLocal, yGm, blockLength);
    inQueueX.EnQue(xLocal);
    inQueueY.EnQue(yLocal);

    // DeQue 取出输入张量，在 UB 内执行 Add，并将结果 EnQue 到输出队列，供后续写回 GM。
    xLocal = inQueueX.DeQue<float>();
    yLocal = inQueueY.DeQue<float>();
    AscendC::LocalTensor<float> zLocal = outQueueZ.AllocTensor<float>();
    AscendC::Add(zLocal, xLocal, yLocal, blockLength);
    outQueueZ.EnQue<float>(zLocal);
    inQueueX.FreeTensor(xLocal);
    inQueueY.FreeTensor(yLocal);

    // 从输出队列取出结果，并写回当前核负责的 GM 分片。
    zLocal = outQueueZ.DeQue<float>();
    AscendC::DataCopy(zGm, zLocal, blockLength);
    outQueueZ.FreeTensor(zLocal);
}

int32_t main(int32_t argc, char* argv[])
{
    // 启动 8 个核并行处理，每个核负责总长度的 1/8。
    uint32_t numBlocks = 8;
    constexpr uint32_t totalLength = 8 * 2048;
    size_t inputByteSize = totalLength * sizeof(float);
    size_t outputByteSize = totalLength * sizeof(float);
    uint8_t* xHost = nullptr;
    uint8_t* yHost = nullptr;
    uint8_t* zHost = nullptr;
    uint8_t* xDevice = nullptr;
    uint8_t* yDevice = nullptr;
    uint8_t* zDevice = nullptr;

    aclInit(nullptr);
    int32_t deviceId = 0;
    aclrtSetDevice(deviceId);
    aclrtStream stream = nullptr;
    aclrtCreateStream(&stream);

    aclrtMallocHost((void**)(&xHost), inputByteSize);
    aclrtMallocHost((void**)(&yHost), inputByteSize);
    aclrtMallocHost((void**)(&zHost), outputByteSize);
    aclrtMalloc((void**)&xDevice, inputByteSize, ACL_MEM_MALLOC_HUGE_FIRST);
    aclrtMalloc((void**)&yDevice, inputByteSize, ACL_MEM_MALLOC_HUGE_FIRST);
    aclrtMalloc((void**)&zDevice, outputByteSize, ACL_MEM_MALLOC_HUGE_FIRST);

    ReadFile("./input/input_x.bin", inputByteSize, xHost, inputByteSize);
    ReadFile("./input/input_y.bin", inputByteSize, yHost, inputByteSize);
    aclrtMemcpy(xDevice, inputByteSize, xHost, inputByteSize, ACL_MEMCPY_HOST_TO_DEVICE);
    aclrtMemcpy(yDevice, inputByteSize, yHost, inputByteSize, ACL_MEMCPY_HOST_TO_DEVICE);

    add_custom<<<numBlocks, 0, stream>>>(xDevice, yDevice, zDevice, totalLength);
    aclrtSynchronizeStream(stream);
    aclrtMemcpy(zHost, outputByteSize, zDevice, outputByteSize, ACL_MEMCPY_DEVICE_TO_HOST);
    WriteFile("./output/output.bin", zHost, outputByteSize);

    aclrtFree(xDevice);
    aclrtFree(yDevice);
    aclrtFree(zDevice);
    aclrtFreeHost(xHost);
    aclrtFreeHost(yHost);
    aclrtFreeHost(zHost);

    aclrtDestroyStream(stream);
    aclrtResetDevice(deviceId);
    aclFinalize();

    return 0;
}

/* !
 * \file matmul_basic_api.asc
 * \brief 使用静态Tensor编程模式实现矩阵乘法，展示Cube单元的基本使用方法
 */

#include "acl/acl.h"
#include "kernel_operator.h"
#include "data_utils.h"

#ifdef ASCENDC_CPU_DEBUG
#include "cpu_debug_launch.h"
#endif

// half type, cube block: [16, 16]
constexpr uint32_t CUBE_BLOCK = 16;

template <uint32_t M, uint32_t K, uint32_t N, uint32_t singleCoreM, uint32_t baseM, uint32_t baseK, uint32_t baseN>
__global__ __cube__ void mmad_custom(__gm__ uint8_t* a, __gm__ uint8_t* b, __gm__ uint8_t* c)
{
    AscendC::InitSocState();
    AscendC::GlobalTensor<half> aGM;
    AscendC::GlobalTensor<half> bGM;
    AscendC::GlobalTensor<half> cGM;
    uint32_t mIterIdx = AscendC::GetBlockIdx() % (M / singleCoreM);
    aGM.SetGlobalBuffer((__gm__ half*)a + mIterIdx * singleCoreM * K);
    bGM.SetGlobalBuffer((__gm__ half*)b);
    cGM.SetGlobalBuffer((__gm__ half*)c + mIterIdx * singleCoreM * N);
    AscendC::LocalMemAllocator<AscendC::Hardware::L1> l1Allocator;
    AscendC::LocalMemAllocator<AscendC::Hardware::L0A> l0aAllocator;
    AscendC::LocalMemAllocator<AscendC::Hardware::L0B> l0bAllocator;
    AscendC::LocalMemAllocator<AscendC::Hardware::L0C> l0cAllocator;
    // 使用LocalMemAllocator按申请顺序分配片上内存，避免手动维护LocalTensor地址偏移。
    AscendC::LocalTensor<half> a1Local = l1Allocator.Alloc<AscendC::TPosition::A1, half>(baseM * baseK);
    AscendC::LocalTensor<half> b1Local = l1Allocator.Alloc<AscendC::TPosition::B1, half>(baseK * baseN);
    AscendC::LocalTensor<half> a2Local = l0aAllocator.Alloc<AscendC::TPosition::A2, half>(baseM * baseK);
    AscendC::LocalTensor<half> b2Local = l0bAllocator.Alloc<AscendC::TPosition::B2, half>(baseK * baseN);
    AscendC::LocalTensor<float> cLocal = l0cAllocator.Alloc<AscendC::TPosition::CO1, float>(baseM * baseN);
    // A矩阵GM->L1调用DataCopy接口 + Nd2NzParams结构体参数:
    // {ndNum, nValue, dValue, srcNdMatrixStride, srcDValue,
    //  dstNzC0Stride, dstNzNStride, dstNzMatrixStride}
    AscendC::DataCopy(a1Local, aGM, AscendC::Nd2NzParams{1, baseM, baseK, 0, K, baseM, 1, 0});
    // B矩阵GM->L1调用DataCopy接口 + Nd2NzParams结构体参数:
    // {ndNum, nValue, dValue, srcNdMatrixStride, srcDValue,
    //  dstNzC0Stride, dstNzNStride, dstNzMatrixStride}
    AscendC::DataCopy(b1Local, bGM, AscendC::Nd2NzParams{1, baseK, baseN, 0, N, baseK, 1, 0});
    // SetFlag用于在生产者流水完成当前任务后写入同步事件，WaitFlag用于让消费者流水等待该事件；
    // HardEvent模板参数描述同步方向，EVENT_ID用于区分同类同步事件。
    // GM->L1的DataCopy由MTE2流水完成，后续L1->L0的LoadData由MTE1流水读取L1数据；
    // 这里设置MTE2_MTE1事件，使MTE1等待MTE2，避免LoadData读取到尚未搬运完成的数据。
    AscendC::SetFlag<AscendC::HardEvent::MTE2_MTE1>(EVENT_ID0);
    AscendC::WaitFlag<AscendC::HardEvent::MTE2_MTE1>(EVENT_ID0);
#if defined(__NPU_ARCH__) && (__NPU_ARCH__ == 2201)
    // A矩阵L1->L0A（Nz->Zz）
    // A矩阵L1->L0A调用LoadData接口 + LoadData2DParams结构体参数：
    // {startIndex, repeatTimes, srcStride, sid, dstGap, ifTranspose, addrMode}
    for (int i = 0; i < baseM / CUBE_BLOCK; ++i) {
        AscendC::LoadData(
            a2Local[i * baseK * CUBE_BLOCK], a1Local[i * 512 / sizeof(half)],
            AscendC::LoadData2DParams{0, baseK / CUBE_BLOCK, baseM / CUBE_BLOCK, 0, 0, false, 0});
    }
    // B矩阵L1->L0B（Nz->Zn）
    // B矩阵L1->L0B调用LoadData接口 + LoadData2DParams结构体参数：
    // {startIndex, repeatTimes, srcStride, sid, dstGap, ifTranspose, addrMode}
    for (int i = 0; i < baseK / CUBE_BLOCK; ++i) {
        AscendC::LoadData(
            b2Local[i * baseN * CUBE_BLOCK], b1Local[i * 512 / sizeof(half)],
            AscendC::LoadData2DParams{0, baseN / CUBE_BLOCK, baseK / CUBE_BLOCK, 0, 0, true, 0});
    }
#elif defined(__NPU_ARCH__) && (__NPU_ARCH__ == 3510)
    // A矩阵L1->L0A（Nz->Nz）
    // A矩阵L1->L0A调用LoadData接口 + LoadData2DParamsV2结构体参数：
    // {mStartPosition, kStartPosition, mStep, kStep, srcStride, dstStride, ifTranspose, sid}
    AscendC::LoadData(
        a2Local, a1Local,
        AscendC::LoadData2DParamsV2{
            0, 0, baseM / CUBE_BLOCK, baseK / CUBE_BLOCK, baseM / CUBE_BLOCK, baseM / CUBE_BLOCK, false, 0});
    // B矩阵L1->L0B（Nz->Zn）
    // B矩阵L1->L0B调用LoadData接口 + LoadData2DParamsV2结构体参数：
    // {mStartPosition, kStartPosition, mStep, kStep, srcStride, dstStride, ifTranspose, sid}
    AscendC::LoadData(
        b2Local, b1Local,
        AscendC::LoadData2DParamsV2{
            0, 0, baseK / CUBE_BLOCK, baseN / CUBE_BLOCK, baseK / CUBE_BLOCK, baseN / CUBE_BLOCK, true, 0});
#endif
    // L1->L0的LoadData由MTE1流水完成，后续Mmad由M流水读取L0A/L0B数据；
    // 这里设置MTE1_M事件，使M流水等待MTE1，避免Mmad读取到尚未搬运完成的数据。
    AscendC::SetFlag<AscendC::HardEvent::MTE1_M>(EVENT_ID0);
    AscendC::WaitFlag<AscendC::HardEvent::MTE1_M>(EVENT_ID0);
    // 矩阵乘调用Mmad接口 + MmadParams结构体参数：{m, n, k, unitFlag, cmatrixSource, cmatrixInitVal}
    AscendC::Mmad(cLocal, a2Local, b2Local, AscendC::MmadParams{baseM, baseN, baseK, 0, false, true});

    // Mmad由M流水完成并写入L0C，后续Fixpipe由FIX流水读取L0C并搬运到GM；
    // 这里设置M_FIX事件，使FIX流水等待M流水，避免Fixpipe读取到尚未计算完成的数据。
    AscendC::SetFlag<AscendC::HardEvent::M_FIX>(EVENT_ID0);
    AscendC::WaitFlag<AscendC::HardEvent::M_FIX>(EVENT_ID0);
    // L0C->GM搬运调用Fixpipe+FixpipeParamsV220结构体参数：
    // {nSize, mSize, srcStride, dstStride, reluEn, quantPre, deqScalar,
    //  ndNum, srcNdStride, dstNdStride, unitFlag}
    AscendC::Fixpipe(
        cGM, cLocal, AscendC::FixpipeParamsV220{baseN, baseM, baseM, N, false, QuantMode_t::F322F16, 0, 1, 0, 0, 0});
    AscendC::PipeBarrier<PIPE_ALL>();
}

int32_t main(int32_t argc, char* argv[])
{
    // matmul参数
    constexpr uint32_t M = 256;
    constexpr uint32_t K = 64;
    constexpr uint32_t N = 256;
    // 单核计算量
    constexpr uint32_t singleCoreM = 128;
    // 矩阵乘执行单元Tile参数
    constexpr uint32_t baseM = 128;
    constexpr uint32_t baseK = 64;
    constexpr uint32_t baseN = 256;

    size_t aFileSize = M * K * sizeof(half);
    size_t bFileSize = K * N * sizeof(half);
    size_t cFileSize = M * N * sizeof(half);
    uint32_t numBlocks = 2;

    aclInit(nullptr);
    int32_t deviceId = 0;
    aclrtSetDevice(deviceId);
    aclrtStream stream = nullptr;
    aclrtCreateStream(&stream);

    uint8_t* aHost;
    uint8_t* aDevice;
    aclrtMallocHost((void**)(&aHost), aFileSize);
    aclrtMalloc((void**)&aDevice, aFileSize, ACL_MEM_MALLOC_HUGE_FIRST);
    ReadFile("./input/x1_gm.bin", aFileSize, aHost, aFileSize);
    aclrtMemcpy(aDevice, aFileSize, aHost, aFileSize, ACL_MEMCPY_HOST_TO_DEVICE);

    uint8_t* bHost;
    uint8_t* bDevice;
    aclrtMallocHost((void**)(&bHost), bFileSize);
    aclrtMalloc((void**)&bDevice, bFileSize, ACL_MEM_MALLOC_HUGE_FIRST);
    ReadFile("./input/x2_gm.bin", bFileSize, bHost, bFileSize);
    aclrtMemcpy(bDevice, bFileSize, bHost, bFileSize, ACL_MEMCPY_HOST_TO_DEVICE);

    uint8_t* cHost;
    uint8_t* cDevice;
    aclrtMallocHost((void**)(&cHost), cFileSize);
    aclrtMalloc((void**)&cDevice, cFileSize, ACL_MEM_MALLOC_HUGE_FIRST);

    mmad_custom<M, K, N, singleCoreM, baseM, baseK, baseN><<<numBlocks, 0, stream>>>(aDevice, bDevice, cDevice);
    aclrtSynchronizeStream(stream);

    aclrtMemcpy(cHost, cFileSize, cDevice, cFileSize, ACL_MEMCPY_DEVICE_TO_HOST);
    WriteFile("./output/output.bin", cHost, cFileSize);

    aclrtFree(aDevice);
    aclrtFreeHost(aHost);
    aclrtFree(bDevice);
    aclrtFreeHost(bHost);
    aclrtFree(cDevice);
    aclrtFreeHost(cHost);
    aclrtDestroyStream(stream);
    aclrtResetDevice(deviceId);
    aclFinalize();
    return 0;
}
  </script>

    const rows = model.buffers.map((buffer) => '<div class="lifecycle-row' + (selectedId === 'buffer:' + buffer.id ? ' is-selected' : '') + '"><div class="lifecycle-label"><strong>' + buffer.label + '</strong><span>' + buffer.owner + '</span></div>' + buffer.states.map((state, index) => '<button class="lifecycle-state' + (index === 2 ? ' is-queue' : index === 3 || index === 4 ? ' is-consume' : index === 5 ? ' is-release' : '') + '" type="button" data-buffer="' + buffer.id + '" data-state="' + index + '"><strong>' + state[0] + '</strong><span>' + state[1] + '</span></button>').join('') + '</div>').join('');
    const owners = model.buffers.map((buffer) => '<div class="queue-owner"><span>' + buffer.position + '</span><strong>' + buffer.owner + ' owns ' + buffer.label + '</strong><code>' + buffer.states.map((state) => state[0]).join(' → ') + '</code></div>').join('');
    $('[data-model-view="lifecycle"]').innerHTML = '<div class="view-heading"><div><h1>Buffer Lifecycle</h1><p>保持统一的资源生命周期表：何时分配、由哪个阶段写入、何时 ready、被谁读取，以及何时结束。</p></div><span class="evidence-chip is-confirmed">代码确认</span></div>' + contextStrip() + '<div class="lifecycle-layout"><div class="lifecycle-table">' + rows + '</div><aside class="queue-ownership">' + owners + '<div class="unknown-note"><strong>当前事实：</strong>' + model.lifecycleNote + '</div></aside></div>';
  }
  function memoryMarkup() {
    const steps = model.memorySteps.map((step) => '<button class="path-step" type="button" data-memory-focus="' + step[0] + '"><span>' + step[1] + '</span><strong>' + step[2] + '</strong><code>' + step[3] + '</code></button>').join('');
    const description = activeKey === 'vector' ? '当前 Vector Add 激活 AIV 的 GM/L2、UB、Vector、MTE2/MTE3 路径。' : '当前 Matmul 激活 AIC 的 GM/L2、L1、L0A/L0B、L0C、MTE2/MTE1/M/FIX 路径。';
    return '<div class="view-heading"><div><h1>Memory Path</h1><p>' + description + ' 资源和搬运来自代码证据，不表示真实时序。</p></div><span class="evidence-chip is-confirmed">代码确认</span></div><div class="path-summary" style="--path-count:' + model.memorySteps.length + '">' + steps + '</div><section class="pto-hw-viewport memory-path-viewport" data-memory-viewport><header class="pto-hw-viewport__toolbar"><div class="pto-hw-viewport__title"><strong>Hardware mapping</strong><small>Ascend 910B · implemented path</small></div><div class="pto-hw-viewport__controls"><div class="pto-hw-viewport__tools"><button class="btn btn-sm btn-ghost pto-hw-viewport__tool" type="button" data-memory-detail aria-pressed="true">细节开</button><button class="btn btn-sm btn-ghost pto-hw-viewport__tool" type="button" data-memory-zoom-out>−</button><span class="pto-hw-viewport__readout" data-memory-readout>60%</span><button class="btn btn-sm btn-ghost pto-hw-viewport__tool" type="button" data-memory-zoom-in>+</button></div></div></header><div class="pto-hw-viewport__stage memory-path-stage" data-memory-stage><div class="pto-hw-viewport__scale" data-memory-scale><div class="memory-path-graph" data-memory-graph></div></div></div></section><div class="unknown-note"><strong>未知边界：</strong>没有附加 trace / profiling；不显示实际 duration、overlap、stall、带宽或利用率。</div>';
  }
  function destroyMemory() {
    routeOverlay?.destroy?.();
    memoryViewport?.destroy?.();
    routeOverlay = null;
    memoryViewport = null;
  }
  function mountMemory() {
    const root = $('[data-memory-viewport]');
    const graph = $('[data-memory-graph]');
    memoryPattern = window.PtoMemoryArchitecturePattern;
    const viewportPattern = window.PtoHardwareArchitectureViewport;
    if (!root || !graph || !memoryPattern?.renderArchitecture || !viewportPattern?.mount) return;
    memoryPattern.renderArchitecture(graph, 'ascend910b');
    routeOverlay = memoryPattern.createRouteOverlay(graph, 'ascend910b');
    memoryPattern.attachHoverInteractions?.(graph, 'ascend910b');
    memoryPattern.attachPathFocusInteractions?.(graph, 'ascend910b');
    memoryPattern.setBufferBlocks?.(graph, model.memoryBlocks);
    memoryViewport = viewportPattern.mount(root, { mode:'inline', viewport:'[data-memory-stage]', scaleEl:'[data-memory-scale]', inlineHost:'[data-memory-graph]', detailToggle:'[data-memory-detail]', zoomOut:'[data-memory-zoom-out]', zoomIn:'[data-memory-zoom-in]', readout:'[data-memory-readout]', scale:.6, defaultScale:.6, fitted:false, fitOnMount:false, detailsVisible:true, onDetailChange:() => routeOverlay?.render?.(), onScaleChange:() => routeOverlay?.render?.(), onPanChange:() => routeOverlay?.render?.() });
    requestAnimationFrame(() => { const stage = $('.pto-mem950', graph); if (stage && memoryViewport) { memoryViewport.setFrameSize(Math.ceil(stage.scrollWidth || 1200), Math.ceil(stage.scrollHeight || 820)); memoryViewport.fit(); } routeOverlay?.render?.(); });
  }
  function memoryFocus(kind) {
    const graph = $('[data-memory-graph]');
    let payload;
    if (activeKey === 'vector') {
      payload = kind === 'copyin' ? { selectors:['[data-mem950-node="rail:GM"]','[data-mem950-node="rail:L2"]','#mem950-aiv1 [data-aiv-node="buffer:UB"]'], routes:['l2-to-aiv1'] } : kind === 'compute' ? { selectors:['#mem950-aiv1 [data-aiv-node="buffer:UB"]','#mem950-aiv1 [data-aiv-node="vector:Vector"]'], routes:[] } : { selectors:['#mem950-aiv1 [data-aiv-node="buffer:UB"]','[data-mem950-node="rail:L2"]','[data-mem950-node="rail:GM"]'], routes:['aiv1-to-l2'] };
    } else {
      payload = kind === 'copyin' ? { selectors:['[data-mem950-node="rail:GM"]','[data-mem950-node="rail:L2"]','#mem950-aic [data-aic-node="buffer:L1"]'], routes:['l2-to-aic'] } : kind === 'load' ? { selectors:['#mem950-aic [data-aic-node="buffer:L1"]','#mem950-aic [data-aic-node="buffer:L0A"]','#mem950-aic [data-aic-node="buffer:L0B"]'], routes:[] } : kind === 'compute' ? { selectors:['#mem950-aic [data-aic-node="buffer:L0A"]','#mem950-aic [data-aic-node="buffer:L0B"]','#mem950-aic [data-aic-node="buffer:L0C"]'], routes:[] } : { selectors:['#mem950-aic [data-aic-node="buffer:L0C"]','[data-mem950-node="rail:L2"]','[data-mem950-node="rail:GM"]'], routes:['l2-to-aic'] };
    }
    memoryPattern?.setPathFocus?.(graph, 'ascend910b', payload);
    const stage = model.stages.find((item) => item.id === (kind === 'mmad' ? 'compute' : kind === 'fix' ? 'copyout' : kind));
    if (stage) focusMatch(stage.match);
    routeOverlay?.render?.();
  }
  function bindActions() {
    $$('[data-stage]').forEach((button) => button.onclick = () => { const stage = model.stages.find((item) => item.id === button.dataset.stage); selectedId = 'stage:' + stage.id; focusMatch(stage.match); renderPipeline(); bindActions(); });
    $$('[data-buffer]').forEach((button) => button.onclick = () => { const buffer = model.buffers.find((item) => item.id === button.dataset.buffer); selectedId = 'buffer:' + buffer.id; focusMatch(buffer.match); renderLifecycle(); bindActions(); });
    $$('[data-core]').forEach((button) => button.onclick = () => { selectedCore = Number(button.dataset.core); focusMatch(activeKey === 'vector' ? /GetBlockIdx/ : /mIterIdx\s*=/); renderTiling(); bindActions(); });
    $$('[data-memory-focus]').forEach((button) => button.onclick = () => { $$('.path-step').forEach((item) => item.classList.toggle('is-selected', item === button)); memoryFocus(button.dataset.memoryFocus); });
  }
  function renderAll() {
    renderTiling();
    destroyMemory();
    $('[data-model-view="memory"]').innerHTML = memoryMarkup();
    mountMemory();
    renderPipeline();
    renderLifecycle();
    bindActions();
  }
  function recover() {
    const complete = model.recoveryChecks.every((check) => check.test(sourceText));
    $('[data-source-status]').innerHTML = complete ? '<strong>已恢复 ' + model.id + '：</strong>' + model.recoverySummary + '。' : '<strong>恢复不完整：</strong>未满足 ' + model.id + ' 的关键证据，缺失部分不会补成确定事实。';
    selectedId = null;
    renderSource();
    renderAll();
  }
  function loadCase(key) {
    activeKey = key;
    model = cases[key];
    selectedCore = 0;
    openAnnotationIndex = null;
    sourceText = embeddedSource(model);
    document.title = 'Code Recovery · ' + model.fileName;
    $('[data-workspace-meta]').textContent = model.id + ' · ' + model.label;
    $$('[data-operator-tab]').forEach((tab) => {
      const isActive = tab.dataset.operatorTab === key;
      tab.classList.toggle('is-active', isActive);
      tab.setAttribute('aria-selected', String(isActive));
    });
    $('[data-golden-label]').textContent = 'Golden Model ' + model.id;
    recover();
    fetch(model.sourceUrl).then((response) => response.ok ? response.text() : Promise.reject(new Error('source unavailable'))).then((text) => { if (activeKey !== key) return; sourceText = text.replace(/\s+$/, ''); recover(); $('[data-source-status]').innerHTML += ' 已从 asc-devkit 原文件加载。'; }).catch(() => { if (activeKey !== key) return; sourceText = embeddedSource(model); recover(); $('[data-source-status]').innerHTML += ' 当前使用页面内嵌的完整原始源码。'; });
  }
  function initAnchorNavigation() {
    const scrollRoot = $('[data-model-scroll]');
    const sections = $$('[data-model-view]');
    const setActive = (view) => $$('[data-anchor-view]').forEach((link) => { const active = link.dataset.anchorView === view; link.classList.toggle('is-selected', active); if (active) link.setAttribute('aria-current','location'); else link.removeAttribute('aria-current'); });
    $$('[data-anchor-view]').forEach((link) => link.onclick = (event) => { event.preventDefault(); const target = $(link.getAttribute('href')); target?.scrollIntoView({ behavior:'smooth', block:'start' }); setActive(link.dataset.anchorView); });
    scrollRoot.addEventListener('scroll', () => { const rootTop = scrollRoot.getBoundingClientRect().top + 32; let current = sections[0]; sections.forEach((section) => { if (section.getBoundingClientRect().top <= rootTop) current = section; }); setActive(current.dataset.modelView); }, { passive:true });
  }

  window.PtoIdeFrame?.initAll?.();
  $$('[data-operator-tab]').forEach((tab) => { tab.onclick = () => loadCase(tab.dataset.operatorTab); });
  $('[data-recover]').onclick = recover;
  $('[data-toggle-annotations]').onclick = () => { annotationsVisible = !annotationsVisible; if (!annotationsVisible) openAnnotationIndex = null; renderSource(); };
  initAnchorNavigation();
  loadCase('vector');
})();
  </script>
</body>
</html>
