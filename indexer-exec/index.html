<script type="text/babel">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

// ── Palette from colormap.js ───────────────────────────────────────────────
const PIPE = (() => {
  const make = (h, s) => ({
    h:      hslToHex({ h: h/360, s, l: 0.74 }),
    accent: hslToHex({ h: h/360, s, l: 0.58 }),
    bg:     hslToHex({ h: h/360, s: s*0.5, l: 0.10 }),
    dim:    hslToHex({ h: h/360, s: s*0.5, l: 0.07 }),
  });
  return {
    query:  make(215, 0.72),
    key:    make(265, 0.68),
    weight: make(145, 0.65),
    shared: { h: '#94A3B8', accent: '#64748B', bg: '#1C2130', dim: '#141820' },
  };
})();

const UNIT = {
  cube:    { border: '#8B5CF6', text: '#C4B5FD', label: 'CUBE' },
  vector:  { border: '#3B82F6', text: '#93C5FD', label: 'VEC'  },
  memory:  { border: '#14B8A6', text: '#5EEAD4', label: 'MEM'  },
  scatter: { border: '#C85001', text: '#FCA98A', label: 'SCAT' },
};

function heatColor(frac) {
  const t = Math.max(0, Math.min(1, frac));
  return hslToHex({ h: (1 - t) * 0.611, s: 0.70 + t * 0.15, l: 0.60 - t * 0.14 });
}

  // WEIGHT

  { from: "reshape",    to: "q_view"    }, { from: "reshape",    to: "q_cossin"  },

  { from: "q_rope3d",   to: "q_concat"  }, { from: "q_nope",     to: "q_concat"  },
  { from: "q_concat",   to: "q_hadamard"}, { from: "q_hadamard", to: "q_quant"   },
  { from: "q_quant",    to: "q_assemble"},
  { from: "k_view",    to: "k_linear"  }, { from: "k_linear",   to: "k_layernorm"},

const NODE_MAP  = {};
NODES.forEach(n => NODE_MAP[n.id] = n);
const TOTAL_TIME = Math.max(...NODES.map(n => n.start + n.duration));
const MAX_DUR    = Math.max(...NODES.map(n => n.duration));
const SVG_W = 1760, SVG_H = 1170;

// ── Unit icon ──────────────────────────────────────────────────────────────
function UnitIcon({ unit }) {
  const props = { width: 10, height: 10, viewBox: "0 0 10 10" };
  switch (unit) {
    case 'cube': return (
      <svg {...props}><rect x="1" y="1" width="4" height="4" fill="none" stroke="white" strokeWidth="1.2"/><rect x="5" y="5" width="4" height="4" fill="none" stroke="white" strokeWidth="1.2"/><line x1="3" y1="3" x2="7" y2="7" stroke="white" strokeWidth="0.8" strokeOpacity="0.6"/></svg>
    );
    case 'vector': return (
      <svg {...props}><path d="M1 5h8M6 2l3 3-3 3" stroke="white" strokeWidth="1.2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
    );
    case 'memory': return (
      <svg {...props}><rect x="1" y="3" width="8" height="4" rx="1" stroke="white" strokeWidth="1.2" fill="none"/><line x1="3.5" y1="3" x2="3.5" y2="7" stroke="white" strokeWidth="0.8" strokeOpacity="0.55"/><line x1="6.5" y1="3" x2="6.5" y2="7" stroke="white" strokeWidth="0.8" strokeOpacity="0.55"/></svg>
    );
    case 'scatter': return (
      <svg {...props}><circle cx="2" cy="2" r="1.2" fill="white" fillOpacity="0.7"/><circle cx="8" cy="5" r="1.2" fill="white" fillOpacity="0.7"/><circle cx="3" cy="8" r="1.2" fill="white" fillOpacity="0.7"/><line x1="2" y1="2" x2="8" y2="5" stroke="white" strokeWidth="0.8" strokeOpacity="0.45"/><line x1="8" y1="5" x2="3" y2="8" stroke="white" strokeWidth="0.8" strokeOpacity="0.45"/></svg>
    );
    default: return null;
  }
}

// ── NodeCard (HTML, pass-ir classes) ──────────────────────────────────────
function NodeCard({ node, selected, hovered, onSelect, onHover, playhead, dimmed }) {
  const pipe    = PIPE[node.pipeline];
  const unit    = UNIT[node.unit];
  const isSel   = selected === node.id;
  const durFrac = node.duration / MAX_DUR;
  const heat    = heatColor(durFrac);
  const endTime = node.start + node.duration;

  let progress = 0, execState = 'pending';
  if (playhead !== null) {
    if (playhead >= endTime)       { progress = 1; execState = 'done'; }
    else if (playhead > node.start){ progress = (playhead - node.start) / node.duration; execState = 'running'; }
  }

  // Data rows: core always, then tiles or memW (max 1 extra)
  const rows = [['core', node.core]];
  if (node.tiles)        rows.push(['tiles', `×${node.tiles}`]);
  else if (node.memW > 0) rows.push(['mem W', `${(node.memW/1024).toFixed(0)}K`]);
  else if (node.memR > 0) rows.push(['mem R', `${(node.memR/1024).toFixed(0)}K`]);

  return (
    <div
      className={`node-card node-card-op${isSel ? ' selected' : ''}`}
      style={{
        position: 'absolute', left: node.x, top: node.y, width: node.w,
        '--node-accent': pipe.accent,
        opacity: dimmed ? 0.10 : 1,
        transition: 'opacity 0.15s ease',
      }}
      onClick={(e) => { e.stopPropagation(); onSelect(isSel ? null : node.id); }}
      onMouseEnter={() => onHover(node.id)}
      onMouseLeave={() => onHover(null)}
    >
      {/* Tags row */}
      <div className="node-head">
        <span className="node-tag" style={{ background: pipe.dim, color: pipe.h, borderColor: pipe.accent + '28' }}>
          {node.pipeline.toUpperCase()}
        </span>
        <span className="node-tag" style={{ background: unit.border + '18', color: unit.text, borderColor: unit.border + '20' }}>
          {unit.label}
        </span>
        {node.status === 'warning' && (
          <span className="node-tag" style={{ background: 'rgba(69,26,3,0.25)', color: '#FBBF24', borderColor: 'rgba(146,64,14,0.35)' }}>⚠</span>
        )}
      </div>

      {/* Op pill */}
      <div className="op-pill">
        <div className="op-pill-icon">
          <UnitIcon unit={node.unit} />
        </div>
        <span className="op-pill-name">{node.name}</span>
        <span className="op-pill-latency">{node.duration.toFixed(3)}ms</span>
      </div>

      {/* Data rows */}
      <div className="node-rows">
        {rows.map(([k, v]) => (
          <div key={k} className="node-row">
            <span className="row-key">{k}</span>
            <span className="row-val">{v}</span>
          </div>
        ))}
      </div>

      {/* Execution progress overlay */}
      {playhead !== null && progress > 0 && (
        <div className="node-exec-overlay" style={{
          width: `${progress * 100}%`,
          background: execState === 'running' ? pipe.accent : '#ffffff',
          opacity: execState === 'running' ? 0.09 : 0.04,
        }} />
      )}

      {/* Duration heat bar */}
      <div className="node-heat-bar" style={{
        width: `${durFrac * 100}%`, background: heat, opacity: 0.85,
      }} />

    </div>
  );
}

// ── GraphEdge (SVG) ────────────────────────────────────────────────────────
function GraphEdge({ edge, selected, hovered, playhead }) {
  const from = NODE_MAP[edge.from], to = NODE_MAP[edge.to];
  if (!from || !to) return null;

  const activeId = hovered || selected;
  const isActive = activeId && (edge.from === activeId || edge.to === activeId);
  const edgeDone = playhead !== null && playhead >= to.start;

  const x1 = from.x + from.w, y1 = from.y + from.h / 2;
  const x2 = to.x,            y2 = to.y   + to.h   / 2;
  const dx = x2 - x1;
  const cp = Math.max(Math.abs(dx) * 0.45, 40);
  const fromPipe = PIPE[from.pipeline];

  const waitTime = Math.max(0, to.start - (from.start + from.duration));
  const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;

  return (
    <g>
      <path
        d={`M${x1},${y1} C${x1+cp},${y1} ${x2-cp},${y2} ${x2},${y2}`}
        fill="none"
        stroke={isActive ? fromPipe.accent : edgeDone ? '#4A5568' : '#3D5070'}
        strokeWidth={isActive ? 1.8 : 1}
        opacity={activeId ? (isActive ? 1 : 0.08) : 0.72}
        markerEnd={isActive ? "url(#arrow-active)" : "url(#arrow)"}
        strokeDasharray={from.pipeline !== to.pipeline ? "5,3" : "none"}
      />
      {isActive && waitTime > 0.005 && (
        <g>
          <rect x={mx-19} y={my-8} width={38} height={14} rx={3}
            fill="#0A0E18" stroke="#1E293B" strokeWidth={0.5} />
          <text x={mx} y={my+0.5} fill="#F59E0B" fontSize={7}
            fontFamily="'JetBrains Mono',monospace" textAnchor="middle" dominantBaseline="middle">
            +{waitTime.toFixed(2)}ms
          </text>
        </g>
      )}
    </g>
  );
}

// ── DetailPanel ────────────────────────────────────────────────────────────
function DetailPanel({ nodeId, onClose, onNavigate }) {
  const node = nodeId ? NODE_MAP[nodeId] : null;
  if (!node) return null;

  const pipe    = PIPE[node.pipeline];
  const unit    = UNIT[node.unit];
  const endTime = node.start + node.duration;
  const heat    = heatColor(node.duration / MAX_DUR);
  const deps      = EDGES.filter(e => e.to   === node.id).map(e => NODE_MAP[e.from]).filter(Boolean);
  const consumers = EDGES.filter(e => e.from === node.id).map(e => NODE_MAP[e.to]).filter(Boolean);

  const execRows = [
    ['Start',    `${node.start.toFixed(3)} ms`],
    ['End',      `${endTime.toFixed(3)} ms`],
    ['Duration', `${node.duration.toFixed(3)} ms`],
    ['% Total',  `${((node.duration/TOTAL_TIME)*100).toFixed(1)}%`],
    ['Core',     node.core],
    ['Unit',     node.unit.toUpperCase()],
    ...(node.tiles  ? [['Tiles', `×${node.tiles}`]] : []),
    ...(node.memR>0 ? [['Mem R', `${node.memR} KB`]] : []),
    ...(node.memW>0 ? [['Mem W', `${node.memW} KB`]] : []),
  ];

  return (
    <>
      <div className="detail-header">
        <span className="detail-type-badge" style={{
          background: pipe.dim, color: pipe.h,
          border: `1px solid ${pipe.accent}28`,
        }}>
          {node.pipeline.toUpperCase()}
        </span>
        <span className="detail-name">{node.name}</span>
        <button className="btn detail-close" onClick={onClose}>✕</button>
      </div>

      <div className="detail-body">

        {/* Execution */}
        <div className="detail-section">
          <div className="detail-section-title">Execution</div>
          {execRows.map(([k, v]) => (
            <div key={k} className="detail-row">
              <span className="detail-row-key">{k}</span>
              <span className="detail-row-val">{v}</span>
            </div>
          ))}
        </div>

        {/* Timeline waterfall */}
        <div className="detail-section">
          <div className="detail-section-title">Timeline</div>
          <div style={{ position: 'relative', height: 14, background: 'rgba(255,255,255,0.04)', borderRadius: 3, overflow: 'hidden' }}>
            <div style={{
              position: 'absolute', height: '100%', borderRadius: 2,
              left: `${(node.start/TOTAL_TIME)*100}%`,
              width: `${Math.max((node.duration/TOTAL_TIME)*100, 2)}%`,
              background: `linear-gradient(90deg, ${pipe.accent}, ${heat})`,
            }} />
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 4, fontSize: 9.5, color: 'var(--text-label)', fontFamily: 'var(--text-mono)' }}>
            <span>0ms</span><span>{TOTAL_TIME.toFixed(2)}ms</span>
          </div>
        </div>

        {/* Description */}
        <div className="detail-section">
          <div className="detail-section-title">Description</div>
          <div style={{ fontSize: 10.5, color: 'var(--text-secondary)', lineHeight: 1.65, fontFamily: 'var(--text-mono)' }}>
            {node.desc}
          </div>
        </div>

        {/* Warning */}
        {node.status === 'warning' && (
          <div className="detail-section">
            <div className="detail-section-title">Diagnostics</div>
            <div style={{ padding: '6px 8px', borderRadius: 5, background: 'rgba(69,26,3,0.22)', border: '1px solid rgba(146,64,14,0.32)', color: '#FBBF24', fontSize: 10.5, lineHeight: 1.55, fontFamily: 'var(--text-mono)' }}>
              ⚠ Duration anomaly — tiles T3, T7 are 18% slower. L2 bank conflict on AIC 3, 7.
            </div>
          </div>
        )}

        {/* Depends on */}
        {deps.length > 0 && (
          <div className="detail-section">
            <div className="detail-section-title">Depends On ({deps.length})</div>
            <div className="detail-connections">
              {deps.map(d => {
                const dp = PIPE[d.pipeline];
                return (
                  <span key={d.id} className="detail-conn-chip"
                    style={{ borderColor: dp.accent + '45', color: dp.h }}
                    onClick={() => onNavigate(d.id)}>
                    {d.name}
                  </span>
                );
              })}
            </div>
          </div>
        )}

        {/* Feeds into */}
        {consumers.length > 0 && (
          <div className="detail-section">
            <div className="detail-section-title">Feeds Into ({consumers.length})</div>
            <div className="detail-connections">
              {consumers.map(d => {
                const dp = PIPE[d.pipeline];
                return (
                  <span key={d.id} className="detail-conn-chip"
                    style={{ borderColor: dp.accent + '45', color: dp.h }}
                    onClick={() => onNavigate(d.id)}>
                    {d.name}
                  </span>
                );
              })}
            </div>
          </div>
        )}

      </div>
    </>
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  const [selected,  setSelected]  = useState(null);
  const [hovered,   setHovered]   = useState(null);
  const [playhead,  setPlayhead]  = useState(null);
  const [isPlaying, setIsPlaying] = useState(false);
  const [zoom,      setZoom]      = useState(0.68);
  const [leftOpen,  setLeftOpen]  = useState(true);
  const animRef   = useRef(null);
  const startRef  = useRef(null);
  const iframeRef = useRef(null);

  const handleIframeLoad = useCallback(() => {
    const doc = iframeRef.current?.contentDocument;
    if (!doc) return;
    const header = doc.querySelector('header.toolbar');
    if (header) header.style.display = 'none';
    const btnV32 = doc.getElementById('btn-v3_2');
    if (btnV32) btnV32.click();
  }, []);

  // BFS: connected node set for dimming
  const activeId = hovered || selected;
  const connectedNodes = useMemo(() => {
    if (!activeId) return new Set();
    const s = new Set([activeId]);
    const vU = new Set(), vD = new Set();
    const up = id => { if (vU.has(id)) return; vU.add(id); s.add(id); EDGES.forEach(e => { if (e.to   === id) { s.add(e.from); up(e.from); } }); };
    const dn = id => { if (vD.has(id)) return; vD.add(id); s.add(id); EDGES.forEach(e => { if (e.from === id) { s.add(e.to);   dn(e.to);   } }); };
    up(activeId); dn(activeId);
    return s;
  }, [activeId]);

  // Playback
  useEffect(() => {
    if (!isPlaying) { if (animRef.current) cancelAnimationFrame(animRef.current); return; }
    startRef.current = performance.now() - ((playhead || 0) * 700);
    const tick = ts => {
      const e = (ts - startRef.current) / 700;
      if (e >= TOTAL_TIME) { setPlayhead(TOTAL_TIME); setIsPlaying(false); return; }
      setPlayhead(e);
      animRef.current = requestAnimationFrame(tick);
    };
    animRef.current = requestAnimationFrame(tick);
    return () => { if (animRef.current) cancelAnimationFrame(animRef.current); };
  }, [isPlaying]);

  const handleWheel = useCallback(e => {
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      setZoom(z => Math.max(0.3, Math.min(2.5, z - e.deltaY * 0.002)));
    }
  }, []);

  return (
    <div className="eg-root pass-ir-page">
      {/* ── Toolbar ── */}
      <header className="toolbar eg-toolbar">
        <div className="toolbar-l">
          <a className="home-link" href="../launch.html" title="Back to Home" aria-label="Back to Home">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2 6.2L7 2l5 4.2v5.1a.7.7 0 01-.7.7H8.6V8.9a.6.6 0 00-.6-.6H6a.6.6 0 00-.6.6V12H2.7a.7.7 0 01-.7-.7V6.2z"
                stroke="currentColor" strokeWidth="1.2" strokeLinejoin="round" />
            </svg>
          </a>
          <div className="toolbar-sep" />
          <svg width="18" height="18" viewBox="0 0 16 16" style={{ flexShrink: 0 }}>
            <rect x="1" y="2" width="5" height="5" rx="1.5" fill={PIPE.query.accent}  opacity="0.85" />
            <rect x="10" y="2" width="5" height="5" rx="1.5" fill={PIPE.key.accent}   opacity="0.80" />
            <rect x="5.5" y="9" width="5" height="5" rx="1.5" fill={PIPE.weight.accent} opacity="0.80" />
            <line x1="3.5" y1="7" x2="8" y2="9" stroke="#334155" strokeWidth="0.9" />
            <line x1="12.5" y1="7" x2="8" y2="9" stroke="#334155" strokeWidth="0.9" />
          </svg>
          <span className="eg-title">IndexerPrologQuant</span>
          <span className="eg-badge">Computation Graph · Execution</span>
          <span className="eg-meta">Ascend 910B · {NODES.length} nodes · {TOTAL_TIME.toFixed(3)}ms</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          {/* Heat legend */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 7.5, color: '#475569', fontFamily: "'JetBrains Mono',monospace" }}>
            <span>Fast</span>
            <div style={{ width: 50, height: 5, borderRadius: 3, background: `linear-gradient(90deg, ${heatColor(0)}, ${heatColor(0.5)}, ${heatColor(1)})` }} />
            <span>Slow</span>
          </div>
          <div style={{ width: 1, height: 16, background: '#1A2030' }} />
          {/* Pipeline legend */}
          <div style={{ display: 'flex', gap: 8, fontSize: 7.5, fontFamily: "'JetBrains Mono',monospace" }}>
            {[['Query', PIPE.query.accent], ['Key', PIPE.key.accent], ['Weight', PIPE.weight.accent]].map(([l, c]) => (
              <div key={l} style={{ display: 'flex', alignItems: 'center', gap: 3 }}>
                <div style={{ width: 8, height: 3, borderRadius: 1, background: c }} />
                <span style={{ color: '#475569' }}>{l}</span>
              </div>
            ))}
          </div>
        </div>
      </header>

      {/* ── Main area ── */}
      <div className="eg-main">

        {/* Left panel: model architecture iframe */}
        <div className={`eg-left${leftOpen ? '' : ' collapsed'}`}>
          <span className="eg-left-label">模型架构</span>
          <iframe ref={iframeRef} src="../model-architecture/index.html?embed&model=v3_2" title="DeepSeek V3.2 模型架构" onLoad={handleIframeLoad} />
          <button className="eg-left-toggle" onClick={() => setLeftOpen(o => !o)}>
            {leftOpen ? '‹' : '›'}
          </button>
        </div>

        {/* Canvas */}
        <div className="eg-canvas" onWheel={handleWheel} onClick={() => setSelected(null)}>
          <div className="eg-dot-grid" />

          {/* Scaled container: sets scroll dimensions */}
          <div style={{ position: 'relative', width: SVG_W * zoom, height: SVG_H * zoom }}>

            {/* SVG layer: pipeline regions + edges */}
            <svg
              width={SVG_W * zoom} height={SVG_H * zoom}
              viewBox={`0 0 ${SVG_W} ${SVG_H}`}
              style={{ position: 'absolute', top: 0, left: 0, pointerEvents: 'none', zIndex: 1 }}
            >
              <defs>
                <marker id="arrow" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
                  <path d="M0,0L6,2.5L0,5" fill="#2D3748" />
                </marker>
                <marker id="arrow-active" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
                  <path d="M0,0L7,2.5L0,5" fill="#94A3B8" />
                </marker>
              </defs>

              {/* Pipeline region backgrounds */}
              <rect x={190} y={10}  width={1580} height={420} rx={14}
                fill={PIPE.query.accent + '18'} stroke={PIPE.query.accent + '40'} strokeWidth={1} strokeDasharray="6,4" />
              <text x={206} y={28} fill={PIPE.query.accent + 'CC'} fontSize={10}
                fontFamily="'JetBrains Mono',monospace" fontWeight="700" letterSpacing="0.06em">QUERY PIPELINE</text>

              <rect x={190} y={550} width={1580} height={490} rx={14}
                fill={PIPE.key.accent + '18'} stroke={PIPE.key.accent + '40'} strokeWidth={1} strokeDasharray="6,4" />
              <text x={206} y={568} fill={PIPE.key.accent + 'CC'} fontSize={10}
                fontFamily="'JetBrains Mono',monospace" fontWeight="700" letterSpacing="0.06em">KEY PIPELINE</text>

              <rect x={385} y={940} width={580} height={200} rx={14}
                fill={PIPE.weight.accent + '18'} stroke={PIPE.weight.accent + '40'} strokeWidth={1} strokeDasharray="6,4" />
              <text x={401} y={958} fill={PIPE.weight.accent + 'CC'} fontSize={10}
                fontFamily="'JetBrains Mono',monospace" fontWeight="700" letterSpacing="0.06em">WEIGHT PIPELINE</text>

              {/* Edges */}
              {EDGES.map((e, i) => (
                <GraphEdge key={i} edge={e} selected={selected} hovered={hovered} playhead={playhead} />
              ))}
            </svg>

            {/* HTML node layer */}
            <div style={{
              position: 'absolute', top: 0, left: 0,
              width: SVG_W, height: SVG_H,
              transform: `scale(${zoom})`, transformOrigin: '0 0',
              zIndex: 2,
            }}>
              {NODES.map(n => (
                <NodeCard key={n.id} node={n}
                  selected={selected} hovered={hovered}
                  onSelect={setSelected} onHover={setHovered}
                  playhead={playhead}
                  dimmed={connectedNodes.size > 0 && !connectedNodes.has(n.id)}
                />
              ))}
            </div>
          </div>
        </div>

        {/* Detail panel — fixed overlay, slides in on select */}
        <div className={`detail-panel${selected ? ' open' : ''}`}>
          <DetailPanel
            nodeId={selected}
            onClose={() => setSelected(null)}
            onNavigate={setSelected}
          />
        </div>
      </div>

      {/* ── Footer controls ── */}
      <div className="eg-footer">
        <button className="eg-ctrl" onClick={() => { setPlayhead(0); setIsPlaying(false); }}>⏮</button>
        <button className="eg-ctrl"
          onClick={() => setIsPlaying(p => !p)}
          style={{ color: isPlaying ? '#EF4444' : '#34D399', borderColor: isPlaying ? '#7F1D1D' : '#064E3B' }}>
          {isPlaying ? '⏸' : '▶'}
        </button>
        <div style={{ flex: 1, height: 4, background: '#1A2030', borderRadius: 2, cursor: 'pointer' }}
          onClick={e => {
            const r = e.currentTarget.getBoundingClientRect();
            setPlayhead(((e.clientX - r.left) / r.width) * TOTAL_TIME);
          }}>
          <div style={{
            height: '100%', borderRadius: 2,
            width: `${((playhead || 0) / TOTAL_TIME) * 100}%`,
            background: `linear-gradient(90deg, ${PIPE.query.accent}, ${PIPE.key.accent}, ${PIPE.weight.accent})`,
            transition: isPlaying ? 'none' : 'width .1s',
          }} />
        </div>
        <span style={{ fontSize: 9, color: '#475569', minWidth: 90, textAlign: 'right', fontFamily: "'JetBrains Mono',monospace" }}>
          {(playhead || 0).toFixed(3)} / {TOTAL_TIME.toFixed(3)} ms
        </span>
        <div style={{ width: 1, height: 14, background: '#1A2030' }} />
        <button className="eg-ctrl" onClick={() => setZoom(z => Math.min(2.5, z + 0.12))}>+</button>
        <span style={{ fontSize: 9, color: '#475569', minWidth: 32, textAlign: 'center', fontFamily: "'JetBrains Mono',monospace" }}>
          {Math.round(zoom * 100)}%
        </span>
        <button className="eg-ctrl" onClick={() => setZoom(z => Math.max(0.3, z - 0.12))}>−</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
