<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/aic-core-object/pattern.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/aiv-core-object/pattern.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/memory-architecture/pattern.css">
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      min-width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
      box-sizing: border-box;
    }

    #hardwareHost {
      width: 100%;
      height: 100%;
      min-width: 100%;
      min-height: 100%;
      overflow: visible;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    #hardwareHost [data-pto-mem-arch="true"],
    #hardwareHost .pto-mem950,
    #hardwareHost .pto-mem950__layout {
      width: 100%;
      min-width: 100%;
    }

    #hardwareHost .pto-mem950__layout {
      justify-content: center;
    }

    #hardwareHost .pto-mem950__notes {
      display: none;
    }

    .is-path-focused [data-aic-node],
    .is-path-focused [data-aiv-node],
    .is-path-focused [data-mem950-node^="rail:"] {
      opacity: 0.56;
      filter: saturate(0.7);
      transition: opacity 160ms ease, filter 160ms ease, outline-color 160ms ease, box-shadow 160ms ease;
    }

    .is-path-focused .is-hardware-active {
      opacity: 1 !important;
      filter: none !important;
      outline: 2px solid color-mix(in srgb, #ffaa3b 82%, white);
      outline-offset: 3px;
      box-shadow: 0 0 0 4px color-mix(in srgb, #ffaa3b 16%, transparent);
      position: relative;
      z-index: 8;
    }

    .is-path-focused .pto-mem950__overlay [data-route-id] {
      opacity: 0.22;
      transition: opacity 160ms ease, filter 160ms ease;
    }

    .is-path-focused .pto-mem950__overlay [data-route-id].is-route-active {
      opacity: 1;
      filter: drop-shadow(0 0 7px color-mix(in srgb, #ffaa3b 66%, transparent));
    }

    .is-path-focused .pto-aic-core__route {
      opacity: 0.18;
      filter: saturate(0.65);
      transition: opacity 160ms ease, filter 160ms ease, stroke-width 160ms ease;
    }

    .is-path-focused .pto-aic-core__transport-pill {
      opacity: 0.18;
      filter: saturate(0.65);
    }

    .is-path-focused .pto-aic-core__route.is-internal-route-active {
      opacity: 0.96;
      filter: drop-shadow(0 0 6px color-mix(in srgb, #ffaa3b 58%, transparent));
      stroke-width: 2.6;
    }

    .is-path-focused .pto-aic-core__transport-pill.is-internal-route-active {
      opacity: 1;
      filter: drop-shadow(0 0 6px color-mix(in srgb, #ffaa3b 48%, transparent));
      background: #ffdf1f;
      border-color: #ffdf1f;
      color: #111111;
    }
  </style>
</head>
<body>
  <div id="hardwareHost"></div>
  <script src="../vendor/pto-design-system/patterns/aiv-core-object/pattern.js"></script>
  <script src="../vendor/pto-design-system/patterns/aic-core-object/pattern.js"></script>
  <script src="../vendor/pto-design-system/patterns/memory-architecture/pattern.js"></script>
  <script>
    let overlay = null;
    let hoverInteractions = null;

    const qs = (selector, root = document) => root.querySelector(selector);
    const qsa = (selector, root = document) => Array.from(root.querySelectorAll(selector));

    function postReady() {
      const stage = qs('#hardwareHost .pto-mem950');
      if (!stage) return;
      const rect = stage.getBoundingClientRect();
      parent.postMessage({
        type: 'hardware-ready',
        width: Math.ceil(rect.width),
        height: Math.ceil(rect.height),
      }, '*');
    }

    function activeRouteEndpoints(routeIds) {
      const preset = window.PtoMemoryArchitecturePattern?.presets?.ascend950b;
      if (!preset) return [];
      return (preset.routes || [])
        .filter((route) => routeIds.includes(route.id))
        .flatMap((route) => [route.from, route.to])
        .filter(Boolean);
    }

    function clearFocus() {
      qsa('.is-hardware-active').forEach((el) => el.classList.remove('is-hardware-active'));
      qsa('.is-route-active').forEach((el) => el.classList.remove('is-route-active'));
      qsa('.is-internal-route-active').forEach((el) => el.classList.remove('is-internal-route-active'));
    }

    function attrValue(value) {
      return String(value || '').replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    }

    function applyInternalRouteFocus(host) {
      qsa('.pto-aic-core__route[data-aic-route-from][data-aic-route-to]', host).forEach((routeEl) => {
        const core = routeEl.closest('.pto-aic-core');
        const fromEl = core?.querySelector(`[data-aic-node="${attrValue(routeEl.dataset.aicRouteFrom)}"]`);
        const toEl = core?.querySelector(`[data-aic-node="${attrValue(routeEl.dataset.aicRouteTo)}"]`);
        const isActive = Boolean(
          fromEl?.classList.contains('is-hardware-active') &&
          toEl?.classList.contains('is-hardware-active')
        );
        routeEl.classList.toggle('is-internal-route-active', isActive);
        if (isActive) {
          core?.querySelectorAll(`[data-aic-transport-to="${attrValue(routeEl.dataset.aicRouteTo)}"]`)
            .forEach((pill) => pill.classList.add('is-internal-route-active'));
        }
      });
    }

    function applyFocus(selectors = [], routeIds = []) {
      const host = qs('#hardwareHost');
      clearFocus();
      host.classList.toggle('is-path-focused', selectors.length > 0 || routeIds.length > 0);

      [...selectors, ...activeRouteEndpoints(routeIds)].forEach((selector) => {
        qsa(selector, host).forEach((el) => el.classList.add('is-hardware-active'));
      });

      routeIds.forEach((routeId) => {
        qsa(`[data-route-id="${routeId}"]`, host).forEach((el) => el.classList.add('is-route-active'));
      });

      applyInternalRouteFocus(host);
    }

    function render() {
      const host = qs('#hardwareHost');
      hoverInteractions?.destroy?.();
      window.PtoMemoryArchitecturePattern.renderArchitecture(host, 'ascend950b');
      overlay = window.PtoMemoryArchitecturePattern.createRouteOverlay(host, 'ascend950b');
      hoverInteractions = window.PtoMemoryArchitecturePattern.attachHoverInteractions(host, 'ascend950b');
      window.PtoMemoryArchitecturePattern.setDetailVisibility(host, true);
      requestAnimationFrame(() => {
        overlay?.update?.();
        requestAnimationFrame(() => {
          overlay?.update?.();
          postReady();
        });
      });
    }

    window.addEventListener('message', (event) => {
      if (!event.data || event.data.type !== 'hardware-focus') return;
      applyFocus(event.data.selectors || [], event.data.routes || []);
      requestAnimationFrame(() => overlay?.update?.());
    });

    window.addEventListener('resize', () => {
      overlay?.update?.();
      postReady();
    });

    render();
    if (document.fonts && typeof document.fonts.ready?.then === 'function') {
      document.fonts.ready.then(() => {
        overlay?.update?.();
        postReady();
      });
    }
  </script>
</body>
</html>
