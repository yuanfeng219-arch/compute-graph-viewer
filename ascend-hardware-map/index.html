<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ascend A5 架构映射</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../vendor/pto-design-system/tokens/foundation.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/tokens/semantic.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/tokens/components.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/css/style.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/workbench-shell/pattern.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/floating-playback-control/pattern.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/ide-frame/pattern.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/aic-core-object/pattern.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/aiv-core-object/pattern.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/memory-architecture/pattern.css">
  <link rel="stylesheet" href="../vendor/pto-design-system/patterns/hardware-architecture-viewport/pattern.css">
  <link rel="stylesheet" href="./app.css">
</head>
<body>
  <main class="app-shell">
    <section class="pto-ide-frame" data-ide-frame data-host="standalone" data-cursor-dots="true" aria-label="Ascend 迁移与执行流工作台">
      <header class="pto-ide-frame__topbar pto-ide-frame__standalone-chrome">
        <div class="pto-ide-frame__topbar-left">
          <div class="workspace-title">
            <strong>Ascend A5 架构映射</strong>
          </div>
        </div>
        <div class="pto-ide-frame__topbar-center">
          <div class="mode-switch" role="tablist" aria-label="工作模式">
            <button class="btn btn-sm is-selected" type="button" data-mode="migration" role="tab" aria-selected="true">迁移分类</button>
            <button class="btn btn-sm" type="button" data-mode="flow" role="tab" aria-selected="false">执行流</button>
          </div>
        </div>
        <div class="pto-ide-frame__topbar-right">
          <div class="pto-ide-frame__window-actions">
            <button class="pto-ide-frame__window-action is-selected" type="button" id="inspectorToggle" aria-label="切换检查器" aria-pressed="true" title="Inspector">
              <svg class="pto-ide-frame__window-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"></rect><path d="M15 3v18"></path></svg>
            </button>
          </div>
        </div>
      </header>

      <div class="pto-ide-frame__body">
        <nav class="pto-ide-frame__activity-rail pto-ide-frame__standalone-chrome" aria-label="Activity rail">
          <button class="btn btn-icon btn-ghost pto-ide-frame__rail-button is-selected" type="button" aria-label="Explorer" title="Explorer">
            <svg class="pto-ide-frame__rail-icon" viewBox="0 0 24 24"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9l-.81-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"></path></svg>
          </button>
          <button class="btn btn-icon btn-ghost pto-ide-frame__rail-button" type="button" aria-label="Search" title="Search" disabled>
            <svg class="pto-ide-frame__rail-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
          </button>
          <button class="btn btn-icon btn-ghost pto-ide-frame__rail-button" type="button" aria-label="Source control" title="Source control" disabled>
            <svg class="pto-ide-frame__rail-icon" viewBox="0 0 24 24"><circle cx="18" cy="18" r="3"></circle><circle cx="6" cy="6" r="3"></circle><path d="M13 6h3a2 2 0 0 1 2 2v7"></path><path d="M6 9v12"></path></svg>
          </button>
          <button class="btn btn-icon btn-ghost pto-ide-frame__rail-button" type="button" aria-label="Terminal" title="Terminal" disabled>
            <svg class="pto-ide-frame__rail-icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="m7 9 3 3-3 3"></path><path d="M12 15h5"></path></svg>
          </button>
        </nav>

        <div class="pto-ide-frame__workarea">
          <div class="pto-ide-frame__split app-main-split" data-ide-split="standalone-main" data-split-direction="horizontal" data-sizes="20,55,25" data-pixel-sizes="300" data-min-size="240,520,300">
            <aside class="pto-ide-frame__pane pto-ide-frame__explorer" data-ide-pane="explorer">
              <header class="pto-ide-frame__pane-header">
                <span class="pto-ide-frame__pane-title" id="explorerTitle">迁移分类</span>
                <span class="pto-ide-frame__pane-meta" id="explorerCount">10 项</span>
              </header>
              <div class="pto-ide-frame__pane-body explorer-body">
                <section id="migrationExplorer">
                  <div class="scenario-strip" aria-label="迁移判断">
                    <button class="scenario-chip" type="button" data-scenario="A"><b>A</b><span>跨代兼容</span></button>
                    <button class="scenario-chip" type="button" data-scenario="B"><b>B</b><span>950 原生</span></button>
                    <button class="scenario-chip" type="button" data-scenario="C"><b>C</b><span>硬件假设</span></button>
                  </div>
                  <div class="explorer-hint">选择一个变化项，查看硬件落点和迁移动作。</div>
                  <ol class="entity-list" id="categoryList"></ol>
                </section>
                <section id="flowExplorer" hidden>
                  <div class="explorer-hint">选择一条执行流，逐步播放数据、控制和同步路径。</div>
                  <ol class="entity-list" id="flowList"></ol>
                </section>
              </div>
            </aside>

            <section class="pto-ide-frame__pane preview-pane" data-ide-pane="editor-preview">
              <div class="pto-ide-frame__tabstrip">
                <div class="tab-control" role="tablist" aria-label="Preview tabs">
                  <button class="tab-control-item is-selected" type="button" role="tab" aria-selected="true">hardware-impact.view</button>
                </div>
              </div>
              <div class="pto-ide-frame__pane-body preview-body">
                <section class="pto-hw-viewport hardware-shell" id="hardwareViewport">
                  <header class="pto-hw-viewport__toolbar">
                    <div class="pto-hw-viewport__title">硬件影响图 <small id="selectionCaption">尚未选择分析项</small></div>
                    <div class="pto-hw-viewport__controls">
                      <div class="pto-hw-viewport__segmented" aria-label="架构切换">
                        <button class="btn btn-sm is-selected" type="button" data-arch-id="ascend910b" aria-pressed="true">910B</button>
                        <button class="btn btn-sm" type="button" data-arch-id="ascend950b" aria-pressed="false">950B</button>
                      </div>
                      <div class="pto-hw-viewport__tools">
                        <button class="btn btn-sm btn-ghost pto-hw-viewport__tool" type="button" data-detail aria-pressed="true">细节开</button>
                        <button class="btn btn-sm btn-ghost pto-hw-viewport__tool" type="button" data-fit title="适合窗口">适合</button>
                        <button class="btn btn-sm btn-ghost pto-hw-viewport__tool" type="button" data-zoom-out aria-label="缩小">−</button>
                        <span class="pto-hw-viewport__readout" data-readout>60%</span>
                        <button class="btn btn-sm btn-ghost pto-hw-viewport__tool" type="button" data-zoom-in aria-label="放大">+</button>
                      </div>
                    </div>
                  </header>
                  <div class="pto-hw-viewport__stage hardware-stage" data-stage>
                    <div class="empty-selection" id="emptySelection">
                      <span class="empty-selection__index">01</span>
                      <strong>从 Explorer 选择一个分析项</strong>
                      <p>硬件图会聚焦相关单元与数据通路；未选择时保留完整架构基线。</p>
                    </div>
                    <div class="pto-hw-viewport__scale hardware-scale" data-scale>
                      <div id="hardwareGraph"></div>
                    </div>
                  </div>
                </section>
                <div class="pto-ide-frame__floating-playback-mount" id="playbackMount" hidden></div>
              </div>
            </section>

            <aside class="pto-ide-frame__pane inspector-pane" data-ide-pane="inspector" id="inspectorPane">
              <header class="pto-ide-frame__pane-header">
                <span class="pto-ide-frame__pane-title">Inspector</span>
                <span class="pto-ide-frame__pane-meta" id="inspectorMeta">等待选择</span>
              </header>
              <div class="pto-ide-frame__pane-body inspector-body" id="inspectorBody">
                <div class="inspector-empty">
                  <span>CONTEXTUAL INSPECTOR</span>
                  <strong>选择迁移项或执行流</strong>
                  <p>这里会显示判断信号、硬件影响、迁移动作、执行步骤和证据等级。</p>
                </div>
              </div>
            </aside>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="../vendor/pto-design-system/patterns/workbench-shell/pattern.js"></script>
  <script src="../vendor/pto-design-system/patterns/floating-playback-control/pattern.js"></script>
  <script src="../vendor/pto-design-system/patterns/ide-frame/pattern.js"></script>
  <script src="../vendor/pto-design-system/patterns/aiv-core-object/pattern.js"></script>
  <script src="../vendor/pto-design-system/patterns/aic-core-object/pattern.js"></script>
  <script src="../vendor/pto-design-system/patterns/memory-architecture/pattern.js"></script>
  <script src="../vendor/pto-design-system/patterns/hardware-architecture-viewport/pattern.js"></script>
  <script src="./app.js"></script>
</body>
</html>
